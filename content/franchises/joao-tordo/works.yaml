# Bibliography (Works) - the abstract books; editions/covers are separate.
# IDs are STABLE and permanent (user data references them). Titles are the
# ORIGINAL PORTUGUESE (canonical); prose/synopses are in English. Slugs strip
# accents but keep leading articles, consistently across the franchise.
#
# Dates are first-edition years. Where a year, title form, or series membership
# is ambiguous between sources, a `note:` records the gap rather than guessing.
# English coverage is thin - Portuguese sources (joaotordo.com, Companhia das
# Letras/Penguin, national press) are the base. pt.wikipedia is used only as a
# lead; it has been wrong here on at least two points (it accents "Cecília
# Fluss", which the published cover does not, and dates "As Súplicas" to 2018
# when the Expresso collection ran in 2017).
#
# canonTier convention for this franchise, applied consistently:
#   core      - the 20 novels
#   extended  - sole-authored non-fiction books (3)
#   apocrypha - short-form pieces published in newspapers, magazines or digital
#               collections rather than as standalone books (3)
# Tier records the KIND of publication, never how confident the research was.

