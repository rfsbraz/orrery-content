# --- The Pilar Benamor detective series + late novels (2021-2025) ---

- id: joao-tordo/aguas-passadas
  title: "Águas Passadas"
  authorIds: [joao-tordo]
  published: 2021
  subseries: "Pilar Benamor"
  canonTier: core
  synopsis: >
    PSP sub-commissioner Pilar Benamor - brave, dogged, carrying her own painful
    secrets - is first on the scene of a child's murder, where she meets Cícero,
    an isolated ex-police informant. A crime novel of relentless pace.
  note: >
    Name collision worth knowing: Tordo also wrote a much earlier short story
    called "Águas Passadas", set in Venice, which is a different piece entirely
    and is the one referred back to by
    [[work:joao-tordo/cidade-liquida|Cidade Líquida]] (2012). That story is not
    catalogued as a separate work here because no publication date or venue for
    it could be established. Do not merge the two.
  sources:
    - https://penguinlivros.pt/loja/companhia-das-letras/livro/aguas-passadas/
    - https://ebookportugal.wordpress.com/2012/10/20/biblioteca-digital-dn-2o-conto-a-cidade-liquida-de-joao-tordo/

