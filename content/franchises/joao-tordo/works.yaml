# --- The Pilar Benamor detective series + late novels (2021-2025) ---

- id: joao-tordo/aguas-passadas
  title: "Águas Passadas"
  authorIds: [joao-tordo]
  published: 2021
  subseries: "Pilar Benamor"
  canonTier: core
  synopsis: >
    Thirteen days of merciless January rain over Lisbon, and a fifteen-year-old
    girl brought in by the tide at Assentiz. PSP sub-commissioner Pilar Benamor -
    brave, dogged, carrying her own painful secrets - takes the scene, and works
    the case with Cícero, a mysterious hermit. A crime novel of relentless pace.
  sources:
    - https://penguinlivros.pt/loja/companhia-das-letras/livro/aguas-passadas/

- id: joao-tordo/naufragio
  title: "Naufrágio"
  authorIds: [joao-tordo]
  published: 2022
  subseries: null
  canonTier: extended
  synopsis: >
    Aboard the small boat Narcisse, with an old guitar and a dog named Sozinho,
    a man tries to make his life mean something again - until a figure from the
    past changes course. A standalone literary novel, not a Benamor case.
  sources: [https://pt.wikipedia.org/wiki/Jo%C3%A3o_Tordo]

- id: joao-tordo/cem-anos-de-perdao
  title: "Cem Anos de Perdão"
  authorIds: [joao-tordo]
  published: 2022
  subseries: "Pilar Benamor"
  canonTier: extended
  synopsis: >
    On the remote island of St Dismas, off the English coast, a violent crime
    between brothers splits a community already uneasy with the Filhos de
    Dismas, a religious sect centuries old. The confessed killer goes to
    Brixton; the investigation stalls against the believers' fanaticism. A Pilar
    Benamor novel, second in the series.
  note: >
    SPOILER WARNING FOR FUTURE CURATORS. The official Penguin/Companhia das
    Letras blurb for this book gives away the ending of
    [[work:joao-tordo/aguas-passadas|Águas Passadas]] three times over: it names
    that book's case, calls its resolution violent, and describes Pilar's rank
    and situation afterwards. The synopsis above is deliberately built from the
    St Dismas half of the blurb only. Do NOT enrich it from the publisher copy
    without re-reading it for those leaks.
    Benamor-series membership confirmed against the publisher listing (Pilar is
    the investigator; Cícero returns from Águas Passadas).
  sources: ["https://books.google.com/books/about/Os_dias_contados.html?id=22cfEQAAQBAJ"]

- id: joao-tordo/o-nome-que-a-cidade-esqueceu
  title: "O Nome Que a Cidade Esqueceu"
  authorIds: [joao-tordo]
  published: 2023
  subseries: null
