# --- The Lugares Sem Nome period + Biografia (2014-2017) ---

- id: joao-tordo/biografia-involuntaria-dos-amantes
  title: "Biografia Involuntária dos Amantes"
  authorIds: [joao-tordo]
  published: 2014
  subseries: null
  canonTier: core
  synopsis: >
    A love story reconstructed against the narrator's will - the pivot between
    the early novels and the atmospheric island trilogy that follows.
  note: >
    English synopsis not verified beyond the title's sense.
  sources: [https://pt.wikipedia.org/wiki/Jo%C3%A3o_Tordo]

- id: joao-tordo/o-luto-de-elias-gro
  title: "O Luto de Elias Gro"
  authorIds: [joao-tordo]
  published: 2015
  subseries: "Trilogia dos Lugares Sem Nome"
  canonTier: core
  synopsis: >
    On a small island lost in the Atlantic, a man lacerated by his past shuts
    himself in an abandoned lighthouse among singular figures - the dreamer
    priest Elias Gro, a girl skilled in anatomy, an old madman who wanders the
    nights. Tordo's most atmospheric and intimate book; the first volume of the
    Trilogia dos Lugares Sem Nome.
  sources:
    - https://joaotordo.blogs.sapo.pt/a-trilogia-dos-lugares-sem-nome-150590
    - https://www.bertrand.pt/ebook/o-luto-de-elias-gro-trilogia-dos-lugares-sem-nome-1-joao-tordo/22076149

- id: joao-tordo/o-paraiso-segundo-lars-d
  title: "O Paraíso Segundo Lars D."
  authorIds: [joao-tordo]
  published: 2015
  subseries: "Trilogia dos Lugares Sem Nome"
  canonTier: core
  synopsis: >
    On a winter morning a sixty-year-old writer, Lars, finds a young woman asleep
    in his car and drives away from a lifetime's marriage - leaving behind an
    unpublished novel of his own titled "O Luto de Elias Gro". The second volume
    folds the first inside itself.
  note: >
    The metafictional link to
    [[work:joao-tordo/o-luto-de-elias-gro|O Luto de Elias Gro]] (Lars is its
    fictional author) is the trilogy's connective device; captured here in the
    synopsis and in orders.yaml rather than as a separate connections edge, since
    the subseries already threads the three books.
  sources:
    - https://joaotordo.blogs.sapo.pt/a-trilogia-dos-lugares-sem-nome-150590

- id: joao-tordo/o-deslumbre-de-cecilia-fluss
  title: "O Deslumbre de Cecilia Fluss"
  authorIds: [joao-tordo]
  published: 2017
  subseries: "Trilogia dos Lugares Sem Nome"
  canonTier: core
  synopsis: >
    Matias, a quiet university professor, is pulled back into the disappearance of
    his sister Cecilia - last seen jumping from a bridge - when a letter from the
    past reopens the wound. The third volume closes the trilogy on memory, love
    and desolation.
  note: >
    Published title uses "Cecilia" (no accent) on the cover; the name would
    ordinarily be "Cecília". Kept as published.
  sources:
    - https://www.dn.pt/lusa/o-deslumbre-de-cecilia-fluss-encerra-trilogia-de-joao-tordo-com-publicacao-em-maio-6249642.html
    - https://www.wook.pt/ebook/o-deslumbre-de-cecilia-fluss-trilogia-dos-lugares-sem-nome-3-joao-tordo/21591787

