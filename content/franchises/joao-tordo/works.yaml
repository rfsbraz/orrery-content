# Bibliography (Works) - the abstract books; editions/covers are separate.
# IDs are STABLE and permanent (user data references them). Titles are the
# ORIGINAL PORTUGUESE (canonical); prose/synopses are in English. Slugs strip
# accents but keep leading articles, consistently across the franchise.
#
# Dates are first-edition years. Where a year, title form, or series membership
# is ambiguous between sources, a `note:` records the gap rather than guessing.
# Almost all of Tordo's books are novels; the one non-fiction title is tiered
# extended. English coverage is thin - Portuguese sources (pt.wikipedia,
# joaotordo.com, Companhia das Letras/Penguin, national press) are the base.

# --- Early period: the metaphysical / international novels (2004-2013) ---

- id: joao-tordo/o-livro-dos-homens-sem-luz
  title: "O Livro dos Homens Sem Luz"
  authorIds: [joao-tordo]
  published: 2004
  subseries: null
  canonTier: core
  synopsis: >
    Tordo's debut novel, and the start of the essayistic, metaphysical strain
    that runs through his early work.
  note: >
    Synopsis kept minimal - a reliable plot summary in English was not found.
  sources: [https://pt.wikipedia.org/wiki/Jo%C3%A3o_Tordo]

- id: joao-tordo/hotel-memoria
  title: "Hotel Memória"
  authorIds: [joao-tordo]
  published: 2007
  subseries: null
  canonTier: core
  synopsis: >
    An early novel of memory and displacement. Widely reissued.
  note: >
    Title confirmed as "Hotel Memória" (not "Hotel da Memória", a common
    misrendering). Detailed synopsis not verified in English.
  sources: [https://pt.wikipedia.org/wiki/Jo%C3%A3o_Tordo]

- id: joao-tordo/as-tres-vidas
  title: "As Três Vidas"
  authorIds: [joao-tordo]
  published: 2008
  subseries: null
  canonTier: core
  synopsis: >
    A young man drifts into the orbit of an aging writer on a country estate and
    the family around him, and a story of love and family saga hardens into a
    mystery. The book that won the 2009 Prémio José Saramago and remains Tordo's
    most recommended entry point. Translated into several languages (English:
    "The Three Lives").
  note: >
    First edition 2008; the Prémio José Saramago was awarded in 2009. Some
    retailers list the book itself as 2009 - the 2008 first-edition year is used
    here.
  sources:
    - https://www.publico.pt/2009/10/18/jornal/premio-jose-saramago-paraas-tres-vidasde-joao-tordo-18039614
    - https://penguinlivros.pt/loja/companhia-das-letras/livro/as-tres-vidas/

- id: joao-tordo/o-bom-inverno
  title: "O Bom Inverno"
  authorIds: [joao-tordo]
  published: 2010
  subseries: null
  canonTier: core
  synopsis: >
    A frustrated, hypochondriac narrator travels to a Budapest literary event and
    is talked by a young Italian writer into a house lost in an Italian forest -
    called "O Bom Inverno". Shortlisted for the APE narrative-fiction award and
    the Prémio Fernando Namora.
  sources:
    - https://www.bertrand.pt/livro/o-bom-inverno-joao-tordo/9592770
    - https://pt.wikipedia.org/wiki/Jo%C3%A3o_Tordo

