# Branding for the João Tordo wing (see Orrery CONCEPT §6 - the design law).
# Restrained Portuguese-editorial, not costume: an Atlantic/limestone palette, one
# modern display serif, one quiet signature. Deliberately NOT azulejo wallpaper.
preset: atlantic-editorial
palette:
  bg: "#141a1e"       # deep Atlantic blue-grey, near-black - ocean at dusk
  surface: "#1b232a"  # a hair lifted, for cards
  ink: "#e8e4da"      # limestone / off-white - high contrast, very readable
  muted: "#8a97a1"    # sea-grey, for metadata
  accent: "#3d6f8c"   # a single muted azulejo blue, for links and markers only
displayFace: canela   # modern high-contrast display serif; Mediterranean-editorial, headings only
signature: tideline   # one thin horizontal line under the timeline - a tide mark
notes: >
  A quiet literary edition with the light of the Portuguese coast: deep blue-grey
  paper, limestone type, one muted azulejo-blue accent used only for links and
  markers. The single flourish is a thin tide line beneath the timeline. No tile
  patterns, no cork, no genre costume - readability first, restraint everywhere.
  Display face is a proposal (a modern high-contrast serif); a curator can swap it
  for any available editorial serif without changing the intent.
