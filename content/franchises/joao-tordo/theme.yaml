# Branding for the João Tordo wing (see Orrery CONCEPT §6 - the design law).
# Restrained Portuguese-editorial, not costume: an Atlantic/limestone palette, one
# modern display serif, one quiet signature. Deliberately NOT azulejo wallpaper.
preset: atlantic-editorial
palette:
  bg: "#141a1e"       # deep Atlantic blue-grey, near-black - ocean at dusk
  surface: "#1b232a"  # a hair lifted, for cards
  ink: "#e8e4da"      # limestone / off-white - high contrast, very readable
  muted: "#8a97a1"    # sea-grey, for metadata
  accent: "#3d6f8c"   # a single muted azulejo blue, for links and markers only
displayFace: canela   # modern high-contrast display serif; Mediterranean-editorial, headings only
signature: tideline   # one thin horizontal line under the timeline - a tide mark
art:
  emblem:
    object: >
      A thick bundle of typed pages tied with coarse string, its corners
      worn soft.
    why: >
      Tordo finished his debut novel in New York, printed the manuscript
      himself a dozen times, hand-addressed the envelopes and posted them to
      publishers in Portugal; when Temas e Debates wrote back, he left the
      city he had lived in for two years to become a novelist. The same
      bound stack of paper recurs, decades on, as the case files worked
      under a single lamp in the Pilar Benamor investigations.
  motifs:
    - Lisbon under relentless winter rain, streetlight smeared on wet asphalt
    - a tram or a night bus with fogged windows, seen from outside in the dark
    - a hotel room in a foreign city, one lamp lit, a suitcase still unpacked
    - a late-night jazz bar or card table, a coat still dripping on its hook
    - the Tejo at night, ferry lights doubled on black water
    - a desk kept after hours, case notes under a single lamp
  atmosphere: >
    Urban and insomniac: the city as seen by someone who has been awake too
    long. Wet rather than dry, blue-black rather than warm, melancholy held
    quietly rather than staged as gothic. Expatriate displacement carried into
    Lisbon's own nights - a narrator who could as easily be in a hotel room in
    Budapest or Venice - and, in the later books, a noir undertow of
    investigation without genre gloss.
  lineCharacter: >
    Loose wet brush and ink wash, edges bleeding and dissolving rather than
    holding a line. Wide tonal range and almost nothing fully in focus - the
    opposite instinct from a fine dip-pen line held steady, or from a dry
    graphite stroke on untouched paper.
  backgroundTexture: >
    Damp, dark blue-grey wash paper, as if the paper itself had taken on the
    rain: ink bleeds slightly into the grain rather than sitting cleanly on
    fibre, with soft-edged pooling where a wash has dried unevenly.
  accentUse: >
    Muted azulejo blue on exactly one element per image, never as a fill: a
    single lit window, a tram's headlamp, the glow of one table lamp, or a
    ribbon of light along wet paving.
  avoid:
    - rural villages, granite hamlets or whitewashed cottages - that register belongs to another wing in this catalogue
    - dry daylight, sun-bleached plains or wheat-gold colour - that register belongs to another wing in this catalogue
    - azulejo tiling as decoration, and fado/saudade cliche - shawled widows, a guitarra player as shorthand
    - postcard Lisbon - pastel trams framed like a logo, yellow funiculars, souvenir-shop Alfama
    - crime-thriller poster iconography - silhouettes, chalk outlines, neon "noir" lettering
notes: >
  A quiet literary edition with the light of the Portuguese coast: deep blue-grey
  paper, limestone type, one muted azulejo-blue accent used only for links and
  markers. The single flourish is a thin tide line beneath the timeline. No tile
  patterns, no cork, no genre costume - readability first, restraint everywhere.
  Display face is a proposal (a modern high-contrast serif); a curator can swap it
  for any available editorial serif without changing the intent.
