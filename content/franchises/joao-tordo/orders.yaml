# ADDITIONAL canon orders only. The DEFAULT order (all works, publication-
# chronological) is derived from works.yaml and is NOT listed here.
#
# Tordo has no documented whole-oeuvre reading order beyond publication - so this
# file holds exactly ONE curated order: the publisher-numbered island trilogy,
# which is a real, named, author-acknowledged grouping. No order was invented.

- id: joao-tordo/lugares-sem-nome
  name: Trilogia dos Lugares Sem Nome
  type: curated
  source: canon
  rationale: >
    The three "nameless places" novels are numbered 1-2-3 by the publisher and
    read as one arc about grief on sea-battered islands. Read in order because
    [[work:joao-tordo/o-paraiso-segundo-lars-d|O Paraíso Segundo Lars D.]] quietly
    contains [[work:joao-tordo/o-luto-de-elias-gro|O Luto de Elias Gro]] as a novel
    written by its own protagonist - a fold that only lands if the first book came
    first. This order matches publication; it exists to name and frame the trilogy,
    not to reshuffle it.
  orderedWorkIds:
    - joao-tordo/o-luto-de-elias-gro
    - joao-tordo/o-paraiso-segundo-lars-d
    - joao-tordo/o-deslumbre-de-cecilia-fluss
  debated:
    - "The trilogy's internal chronology is loose and its places are deliberately nameless; the publisher's 1-2-3 numbering is the anchor used here."
  sources:
    - https://joaotordo.blogs.sapo.pt/a-trilogia-dos-lugares-sem-nome-150590
    - https://www.wook.pt/ebook/o-deslumbre-de-cecilia-fluss-trilogia-dos-lugares-sem-nome-3-joao-tordo/21591787
