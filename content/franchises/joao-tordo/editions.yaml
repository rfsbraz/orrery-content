# Portuguese editions - the actual books a Portuguese reader buys.
#
# Tordo writes in Portuguese, so there is nothing to translate: every work's
# `title` in works.yaml IS the published Portuguese title. Per SCHEMA.md, the
# `title` field is therefore OMITTED throughout - repeating it would duplicate
# the work title rather than record a genuinely different published title. The
# publisher's own store renders titles in sentence case ("As três vidas"); that
# is house styling, not a different title, so it is not recorded either.
#
# Every ISBN below was read off the publisher's own product page on
# penguinlivros.pt (Penguin Random House Portugal, which owns the Companhia das
# Letras and Alfaguara imprints) and passes ISBN-13 check-digit validation.
# All carry Portuguese prefixes (978-989-*, 978-98958-*); no Brazilian editions
# (978-85-*, 978-65-*) are included.
#
# COVERAGE: 22 of the 26 works have a current in-print pt-PT edition with a
# verified ISBN. Eight also have a "Livro de Bolso" (pocket) edition, listed
# after. The four without an edition here are the ones the July 2026
# completeness audit added that are not standalone Companhia das Letras books:
# "Que Nós Estamos Aqui" (Fundação Francisco Manuel dos Santos, not in this
# publisher's catalogue), and the three short-form pieces. Of those, only
# "As Súplicas" has an ISBN at all - 9789899972315, Inéditos Expresso vol. II -
# but that volume is shared with Afonso Cruz's "O Abençoado", so it is not an
# edition OF the Tordo work and is deliberately not recorded as one.
#
# FIRST EDITIONS ARE NOT HERE. Tordo's early novels first appeared under other
# imprints (Quidnovi, Publicações Dom Quixote) before the backlist was
# consolidated at Companhia das Letras, and his 2024+ output is split. Those
# first-edition ISBNs could not be verified: wook.pt, bertrand.pt, fnac.pt,
# almedina.net and Porbase/BNP all returned HTTP 403 to automated fetches, and
# the one portal that was fetchable (portaldaliteratura.com) proved unreliable -
# it attributes Bruno Vieira Amaral's "Toda a Gente Tem um Plano" to Tordo.
# Rather than guess a digit, the first editions are simply omitted. See the PR
# body for the publisher timeline as far as it could be evidenced.

# --- Current trade editions (Companhia das Letras unless noted) ---

