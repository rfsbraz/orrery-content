# Creative periods.
#
# PROVENANCE WARNING (see .claude/skills/eras): the earlier claim that this
# spine was "drawn from how Portuguese criticism groups the work" did not
# survive checking IN PORTUGUESE. Portuguese press, publisher pages, academic
# work and Tordo's own interviews were searched; the only received periodisation
# found is the trilogy, which is the author's own label. The other two eras are
# our shape and are flagged rather than silently deleted.

- id: the-metaphysician
  title: The Early Novels
  period: "2004-2014"
  themes: [memory, exile and foreign cities, philosophy, noir undertow]
  provenance: none
  description: >
    The philosophy graduate writing outward-looking, essayistic fiction -
    [[work:joao-tordo/o-livro-dos-homens-sem-luz|O Livro dos Homens Sem Luz]],
    [[work:joao-tordo/hotel-memoria|Hotel Memória]], the Saramago-winning
    [[work:joao-tordo/as-tres-vidas|As Três Vidas]],
    [[work:joao-tordo/o-bom-inverno|O Bom Inverno]] - hotels, expatriate
    narrators, and a metaphysical streak under a mystery surface. As Três Vidas
    won him the Prémio José Saramago in 2009, and the run closes with
    [[work:joao-tordo/biografia-involuntaria-dos-amantes|Biografia Involuntária
    dos Amantes]] (2014), his last book before the move to Companhia das Letras.
  note: >
    UNSOURCED - recommended for removal. Retitled from "The Metaphysician",
    which was our coinage. Searched in Portuguese (Público-adjacent press,
    Visão/JL, Diário de Notícias, Renascença, Comunidade Cultura e Arte, the
    publisher's pages, PT Wikipedia, RCAAP theses): no Portuguese critic groups
    these novels as a period and none uses any label for them. The academic work
    that exists is single-novel, not periodising. The one defensible division
    available is bibliographic and neutral - these are the pre-Companhia das
    Letras books, across four publishers (Temas e Debates, Quidnovi, Dom
    Quixote, Alfaguara), before the permanent move to Companhia das Letras in
    2015. The end was moved from 2013 to 2014 so the era stops where the trilogy
    actually begins rather than mid-gap. Sources blocked to automated fetching
    and therefore unchecked: Público, Expresso, Observador, Wook, Bertrand.
  sources:
    - https://pt.wikipedia.org/wiki/Jo%C3%A3o_Tordo
    - https://penguinlivros.pt/autor/joao-tordo/

- id: lugares-sem-nome
  title: A Trilogia dos Lugares Sem Nome
  period: "2015-2017"
  themes: [islands, grief, metafiction, love and desolation]
  provenance: author
  description: >
    The trilogy of nameless places, so named by Tordo himself: "no final desta
    'trilogia dos lugares sem nome', iniciada com O luto de Elias Gro". The most
    atmospheric, interior Tordo -
    [[work:joao-tordo/o-luto-de-elias-gro|O Luto de Elias Gro]],
    [[work:joao-tordo/o-paraiso-segundo-lars-d|O Paraíso Segundo Lars D.]],
    [[work:joao-tordo/o-deslumbre-de-cecilia-fluss|O Deslumbre de Cecilia Fluss]] -
    setting grief on sea-battered, nameless islands and letting each book fold
    into the next. Announcing the first, Tordo said it would be different: a
    more atmospheric and intimate register, turned on the human soul, "no que
    ela tem de mais obscuro e luminoso".
  note: >
    RECEIVED, and the strongest era in the catalogue: the label is the author's
    own, carried on his site and his blog, used by his publisher and reported
    under that name by Diário de Notícias and Visão/JL. The Portuguese form is
    kept because that is the received term; an English translation of it would
    be a coinage again. The start date was corrected from 2014 to 2015: the
    three novels are 2015, 2015 and 2017, triple-confirmed, and there is no 2014
    book in the trilogy - Biografia Involuntária dos Amantes (2014) sits outside
    it and has been moved to the preceding era. Data trap for anyone
    re-checking: the publisher's current page for O Luto de Elias Gro lists
    "Junho de 2018", which is the in-print edition, not first publication.
  sources:
    - https://joaotordo.com/livros
    - https://www.dn.pt/lusa/o-deslumbre-de-cecilia-fluss-encerra-trilogia-de-joao-tordo-com-publicacao-em-maio-6249642.html
    - https://visao.pt/visaose7e/livros-e-discos/2017-07-03-o-deslumbre-de-cecilia-fluss-de-joao-tordo-anatomia-da-ausente/

- id: the-crime-turn
  title: The Recent Novels
  period: "2019-present"
  themes: [detective fiction, guilt, Pilar Benamor, the machinery of the past]
  provenance: none
  description: >
    The years in which Tordo opens a crime vein alongside the literary one. From
    [[work:joao-tordo/a-noite-em-que-o-verao-acabou|A Noite em que o Verão
    Acabou]] into the Pilar Benamor investigations
    ([[work:joao-tordo/aguas-passadas|Águas Passadas]],
    [[work:joao-tordo/os-dias-contados|Os Dias Contados]]), alongside standalone
    novels and the Fernando Namora-winning
    [[work:joao-tordo/felicidade|Felicidade]]. In his own words, "a minha veia
    de escritor de policiais é muito diferente da do escritor literário, o que
    escreve os meus romances" - a second vein rather than a change of direction.
  note: >
    UNSOURCED as a period, and recommended for removal - not merely because the
    label was ours, but because the author contradicts the framing. Retitled
    from "The Crime Turn". Tordo describes two parallel veins running at the
    same time, not a turn, and says what interests him is "não ter essas
    fronteiras"; his publisher likewise splits the whole body of work by genre
    ("divididos entre o romance, o policial e o ensaio") rather than by period.
    The record supports him: the non-crime Naufrágio (2022), O Nome Que a Cidade
    Esqueceu (2023) and Inventário da Solidão (2025) all land in the middle of
    the Pilar Benamor run, so a "crime period" misdescribes the shelf. No
    Portuguese critic was found naming this shift. If a wing needs a label here
    it should be for the SERIES (Águas Passadas 2021, Cem Anos de Perdão 2022,
    Os Dias Contados 2024, the last a prequel), not for a stretch of years.
    Sources blocked to automated fetching and therefore unchecked: Público,
    Expresso, Observador.
  sources:
    - https://rr.pt/noticia/vida/2021/07/23/novo-thriller-de-joao-tordo-os-ricos-e-poderosos-afinal-nao-sao-impunes/247203/
    - https://penguinlivros.pt/autor/joao-tordo/
