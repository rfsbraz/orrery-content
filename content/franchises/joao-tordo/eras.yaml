# Creative periods - a light editorial spine, drawn from how Portuguese criticism
# and the author's own framing group the work: an early metaphysical/international
# period, the atmospheric island trilogy, and the later turn to crime. Kept
# restrained; the boundaries are a curator-tunable reading aid, not a hard claim.
# Inline [[type:id|text]] references must resolve.

- id: the-metaphysician
  title: The Metaphysician
  period: "2004-2013"
  themes: [memory, exile and foreign cities, philosophy, noir undertow]
  description: >
    The philosophy graduate writing outward-looking, essayistic fiction -
    [[work:joao-tordo/o-livro-dos-homens-sem-luz|O Livro dos Homens Sem Luz]],
    [[work:joao-tordo/hotel-memoria|Hotel Memória]], the Saramago-winning
    [[work:joao-tordo/as-tres-vidas|As Três Vidas]],
    [[work:joao-tordo/o-bom-inverno|O Bom Inverno]] - hotels, expatriate
    narrators, and a metaphysical streak under a mystery surface.

- id: lugares-sem-nome
  title: The Nameless Places
  period: "2014-2017"
  themes: [islands, grief, metafiction, love and desolation]
  description: >
    The most atmospheric, interior Tordo. After
    [[work:joao-tordo/biografia-involuntaria-dos-amantes|Biografia Involuntária
    dos Amantes]], the Trilogia dos Lugares Sem Nome -
    [[work:joao-tordo/o-luto-de-elias-gro|O Luto de Elias Gro]],
    [[work:joao-tordo/o-paraiso-segundo-lars-d|O Paraíso Segundo Lars D.]],
    [[work:joao-tordo/o-deslumbre-de-cecilia-fluss|O Deslumbre de Cecilia Fluss]] -
    sets grief on sea-battered, nameless islands and lets each book fold into the
    next.

- id: the-crime-turn
  title: The Crime Turn
  period: "2019-present"
  themes: [detective fiction, guilt, Pilar Benamor, the machinery of the past]
  description: >
    A deliberate reinvention as a crime writer. From
    [[work:joao-tordo/a-noite-em-que-o-verao-acabou|A Noite em que o Verão
    Acabou]] into the Pilar Benamor investigations
    ([[work:joao-tordo/aguas-passadas|Águas Passadas]],
    [[work:joao-tordo/os-dias-contados|Os Dias Contados]]), alongside standalone
    novels and the Fernando Namora-winning
    [[work:joao-tordo/felicidade|Felicidade]]. Faster, darker, more plotted -
    the same preoccupations with memory and guilt in a new register.
