# FRANCHISE-SPECIFIC events. Author-LIFE events (birth, education, the prizes,
# the crime turn) live on the author entity (content/authors/joao-tordo.yaml).
# This file holds the franchise's cultural weather.
#
# Note on scope: José Saramago's death is kept HERE, reach: franchise, not in
# global.yaml. Right now it resonates specifically with this bundle - Saramago is
# the namesake of the prize that made Tordo's career, and the only Lusophone
# franchise in the set. If more Portuguese-language franchises are added it is a
# candidate to promote to a reach: global event. Kept franchise-scoped so it does
# not surface as noise in unrelated (English-language) franchises' timelines.
- id: saramago-death-2010
  date: 2010-06-18
  title: Death of José Saramago
  scope: culture
  reach: franchise
  impact: med
  description: >
    Portugal's only Nobel laureate in literature dies on Lanzarote, a year after
    his named prize went to [[work:joao-tordo/as-tres-vidas|As Três Vidas]]. The
    passing of the towering figure of modern Portuguese letters - the weather over
    the scene Tordo was entering.
  spoilerAfter: null
  sources: [https://en.wikipedia.org/wiki/Jos%C3%A9_Saramago]

- id: lugares-sem-nome-completed-2017
  date: 2017
  title: The Trilogia dos Lugares Sem Nome is completed
  scope: industry
  reach: franchise
  impact: med
  description: >
    [[work:joao-tordo/o-deslumbre-de-cecilia-fluss|O Deslumbre de Cecilia Fluss]]
    closes the island trilogy begun in 2015 - the high-water mark of Tordo's
    atmospheric, interior mode before the pivot to crime fiction.
  spoilerAfter: null
  sources:
    - https://www.dn.pt/lusa/o-deslumbre-de-cecilia-fluss-encerra-trilogia-de-joao-tordo-com-publicacao-em-maio-6249642.html
