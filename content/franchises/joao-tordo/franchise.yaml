id: joao-tordo
name: João Tordo
kind: author
description: >
  Two decades of Portuguese literary fiction - metaphysical, noir-tinged novels
  that gather into an atmospheric island trilogy and, later, a turn to crime.
authorIds: [joao-tordo]
themePreset: atlantic-editorial

# A second, distinct Commons photograph (not the portrait): dark wood, hard side
# light, the subject held to the right with deep negative space at the left, so
# it crops to a wide banner without losing the face. CC0, so no attribution is
# legally required; credited anyway.
images:
  header: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Joaotordo.png/960px-Joaotordo.png"
  headerCredit: "Joaotordo1975, CC0 (public domain dedication)"
  headerSource: "https://commons.wikimedia.org/wiki/File:Joaotordo.png"

# Capabilities are auto-detected from the data. This is a deliberately SPARSE
# bundle (the framework's thin end): works + a thin aura + eras + a small curated
# trilogy order + startHere. No characters.yaml and no work connections, so the
# connections map stays dark by design (see the PR notes). Everything left at
# auto; nothing forced.
features: {}

# Which shared global events actually reach this author (docs/SCHEMA.md; the
# event-resonance skill owns these decisions). The global layer is written from
# the anglophone trade, and almost none of it describes a Portuguese literary
# novelist with a small home readership. Nothing is kept by default here; the
# one global event that matters to him is claimed explicitly below.
globalEvents:
  include:
    # Sixteen months before his birth, so the lifetime gate drops it. It is the
    # single global event that made his career possible: he belongs to the first
    # Portuguese generation that never wrote around a censor, and he spends that
    # freedom on interior, metaphysical, deliberately apolitical novels rather
    # than the resistance-shaped literature the Estado Novo produced.
    - carnation-revolution-1974
  exclude:
    - chain-bookshop-1982                # a British and American shop format; his trade is Portuguese
    - online-bookselling-1995            # his readership is domestic and bookshop-led; no title answers this
    - sept-11-2001                       # the New York study years are undated, and no novel of his reaches for it
    - ebook-and-self-publishing-2007     # traditionally published in Portugal throughout; no self-publishing story
    - financial-crisis-2008              # Portugal's rupture was the 2011 bailout, and even that stays off his page
    - prestige-fantasy-adaptation-2011   # he writes for Portuguese television, but not a word of fantasy
    - covid-19-pandemic-2020             # no evidence any novel answers it; excluded rather than assumed
    - booktok-2020                       # Lusophone literary fiction is not what short-form video moves

# "Where to start" - powers the guided wizard. Four honest paths, each with a
# citable basis (a prize, a publisher-acknowledged grouping, or the crime turn).
startHere:
  paths:
    - id: the-prizewinner
      title: Start with the prizewinner
      description: >
        As Três Vidas is the book that made his name - the 2009 Prémio José
        Saramago winner and, by broad Portuguese critical consensus, the natural
        way in. Love story, family saga, and mystery in one.
      workIds:
        - joao-tordo/as-tres-vidas
      orderId: null
      fit:
        experience: [new]
        commitment: [taste]
      note: >
        Basis: the Prémio José Saramago and its standing as his most-recommended
        entry point.
    - id: island-trilogy
      title: The island trilogy
      description: >
        The Trilogia dos Lugares Sem Nome is the most atmospheric, self-contained
        Tordo - three loosely linked novels set in nameless, sea-battered places,
        the second folding the first inside itself. A complete arc without
        committing to the whole shelf.
      workIds: null
      orderId: joao-tordo/lugares-sem-nome
      fit:
        experience: [new, returning]
        commitment: [arc]
      note: >
        Basis: the publisher-numbered "Trilogia dos Lugares Sem Nome" grouping.
    - id: the-crime-turn
      title: The crime turn
      description: >
        From 2019 Tordo writes fast, dark detective fiction. Begin with his
        crime-genre debut, then the Pilar Benamor investigations, if you want the
        page-turner rather than the metaphysician.
      workIds:
        - joao-tordo/a-noite-em-que-o-verao-acabou
        - joao-tordo/aguas-passadas
      orderId: null
      fit:
        experience: [new, returning]
        commitment: [taste, arc]
      note: >
        Basis: publisher positioning of A Noite em que o Verão Acabou as his crime
        debut and the recurring Pilar Benamor series.
    - id: everything
      title: Everything, in order
      description: >
        Two decades in publication order - the philosophical early novels, the
        island trilogy, the crime turn. You watch a literary writer reinvent
        himself twice.
      workIds: null
      orderId: default
      fit:
        experience: [returning, completionist]
        commitment: [complete]

# Completeness-audited July 2026 against Portuguese primary sources. Every work
# is now individually verified against the publisher's catalogue or the author's
# own bibliography; the placeholder entries taken from the pt.wikipedia list have
# been confirmed or corrected, and five omitted works were added. The publisher's
# author page lists exactly the 22 trade titles held here as core plus extended.
sources:
  - https://joaotordo.com/lista
  - https://penguinlivros.pt/autores/joao-tordo/
  - https://ffms.pt/en/books/we-are-here-12-steps-towards-recovery
  - https://pt.wikipedia.org/wiki/Jo%C3%A3o_Tordo
