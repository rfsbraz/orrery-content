id: joao-tordo
name: João Tordo
kind: author
description: >
  Two decades of Portuguese literary fiction - metaphysical, noir-tinged novels
  that gather into an atmospheric island trilogy and, later, a turn to crime.
authorIds: [joao-tordo]
themePreset: atlantic-editorial

# A second, distinct Commons photograph (not the portrait): dark wood, hard side
# light, the subject held to the right with deep negative space at the left, so
# it crops to a wide banner without losing the face. CC0, so no attribution is
# legally required; credited anyway.
images:
  header: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Joaotordo.png/960px-Joaotordo.png"
  headerCredit: "Joaotordo1975, CC0 (public domain dedication)"
  headerSource: "https://commons.wikimedia.org/wiki/File:Joaotordo.png"

# Capabilities are auto-detected from the data. This is a deliberately SPARSE
# bundle (the framework's thin end): works + a thin aura + eras + a small curated
# trilogy order + startHere. No characters.yaml and no work connections, so the
# connections map stays dark by design. Everything left at auto; nothing forced.
features: {}

# Which shared global events actually reach this author (docs/SCHEMA.md). The
# global layer is written from the anglophone trade, and almost none of it
# describes a Portuguese literary
# novelist with a small home readership. Nothing is kept by default here; the
# one global event that matters to him is claimed explicitly below.
globalEvents:
  include:
    - carnation-revolution-1974
    - portugal-bailout-2011      # inherited from the lifetime default, not yet ruled on
  # Considered and refused. Nothing renders unless it is in `include`
  # above, so these change nothing; they are kept as the record of a
  # judgement already made, so it is not re-litigated from scratch.
  exclude:
    - chain-bookshop-1982                # a British and American shop format; his trade is Portuguese
    - online-bookselling-1995            # his readership is domestic and bookshop-led; no title answers this
    - sept-11-2001                       # the New York study years are undated, and no novel of his reaches for it
    - ebook-and-self-publishing-2007     # traditionally published in Portugal throughout; no self-publishing story
    - financial-crisis-2008              # the 2008 crash itself; no title answers it, unlike the 2011 bailout (see the note above)
    - prestige-fantasy-adaptation-2011   # he writes for Portuguese television, but not a word of fantasy
    - covid-19-pandemic-2020             # no evidence any novel answers it; excluded rather than assumed
    - booktok-2020                       # Lusophone literary fiction is not what short-form video moves
# "Where to start" - powers the guided wizard. Four honest paths, each with a
# citable basis (a prize, a publisher-acknowledged grouping, or the crime turn).
startHere:
  paths:
    # Sourcing note: the prize is a verified fact
    # (https://pt.wikipedia.org/wiki/João_Tordo - "As Três Vidas (Quidnovi),
    # Setembro de 2008, Prémio José Saramago 2009"). The claim that Portuguese
    # critics recommend it as the WAY IN was NOT sourced - no Portuguese reader
    # or critic saying "comece por aqui" could be found - so no such claim is
    # made. This path rests on the prize, which is a fact, not on a consensus we
    # cannot show. FLAGGED: a prize is not a reader saying "start here".
    - id: the-prizewinner
      title: Start with the prizewinner
      description: >
        As Três Vidas is the book that made his name - the novel that won him
        the 2009 Prémio José Saramago. Love story, family saga, and mystery in
        one. The cost is that the prize book is not the typical one: it is
        warmer and more plotted than the metaphysical novels around it.
      workIds:
        - joao-tordo/as-tres-vidas
      orderId: null
      fit:
        experience: [new]
        commitment: [taste]
    # Source: the grouping is real and author-acknowledged. His own site, in the
    # blurb for O Deslumbre de Cecília Fluss: "No final desta «trilogia dos
    # lugares sem nome», iniciada com O luto de Elias Gro" (https://joaotordo.com/livros/).
    # Publisher numbering: https://www.wook.pt/ebook/o-deslumbre-de-cecilia-fluss-trilogia-dos-lugares-sem-nome-3-joao-tordo/21591787
    # NOT sourced: anyone recommending the trilogy as an ENTRY point. The
    # grouping is received; using it as a door is our inference. Flagged.
    - id: island-trilogy
      title: The island trilogy
      description: >
        The Trilogia dos Lugares Sem Nome is the most atmospheric, self-contained
        Tordo - three loosely linked novels set in nameless, sea-battered places,
        the second folding the first inside itself. A complete arc without
        committing to the whole shelf.
      workIds: null
      orderId: joao-tordo/lugares-sem-nome
      fit:
        experience: [new, returning]
        commitment: [arc]
      note: >
        The cost is that you skip the decade of novels before it, and the
        trilogy is the most inward Tordo there is - it shows the atmosphere
        rather than the range.
    # Source: his own site describes A Noite em que o Verão Acabou (2019) as a
    # thriller ("neste thriller imparável", https://joaotordo.com/livros/); the
    # Pilar Benamor series is carried by the publisher page for Águas Passadas
    # (https://penguinlivros.pt/loja/companhia-das-letras/livro/aguas-passadas/)
    # and by works.yaml, which tiers the 2019 novel as predecessor to the series.
    # NOT sourced: anyone recommending the crime books as an entry point.
    - id: the-crime-turn
      title: The crime turn
      description: >
        From 2019 Tordo writes fast, dark detective fiction. Begin with his
        crime-genre debut, then the Pilar Benamor investigations, if you want the
        page-turner rather than the metaphysician.
      workIds:
        - joao-tordo/a-noite-em-que-o-verao-acabou
        - joao-tordo/aguas-passadas
      orderId: null
      fit:
        experience: [new, returning]
        commitment: [taste, arc]
      note: >
        The cost is that this is the newest Tordo and the least like the rest of
        him: start here and the literary novelist behind the thrillers is still
        ahead of you.
    - id: everything
      title: Everything, in order
      description: >
        Two decades in publication order - the philosophical early novels, the
        island trilogy, the crime turn. You watch a literary writer reinvent
        himself twice.
      workIds: null
      orderId: default
      fit:
        experience: [returning, completionist]
        commitment: [complete]

# Every work is individually verified against Portuguese primary sources: the
# publisher's catalogue or the author's own bibliography. The publisher's
# author page lists exactly the 22 trade titles held here as core plus extended.
sources:
  - https://joaotordo.com/lista
  - https://penguinlivros.pt/autores/joao-tordo/
  - https://ffms.pt/en/books/we-are-here-12-steps-towards-recovery
  - https://pt.wikipedia.org/wiki/Jo%C3%A3o_Tordo
