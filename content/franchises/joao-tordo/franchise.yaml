    - id: island-trilogy
      title: The island trilogy
      description: >
        The Trilogia dos Lugares Sem Nome is the most atmospheric, self-contained
        Tordo - three loosely linked novels set in nameless, sea-battered places,
        the second folding the first inside itself. A complete arc without
        committing to the whole shelf.
      workIds: null
      orderId: joao-tordo/lugares-sem-nome
      fit:
        experience: [new, returning]
        commitment: [arc]
      note: >
        Basis: the publisher-numbered "Trilogia dos Lugares Sem Nome" grouping.
    - id: the-crime-turn
      title: The crime turn
      description: >
        From 2019 Tordo writes fast, dark detective fiction. Begin with his
        crime-genre debut, then the Pilar Benamor investigations, if you want the
        page-turner rather than the metaphysician.
      workIds:
        - joao-tordo/a-noite-em-que-o-verao-acabou
        - joao-tordo/aguas-passadas
      orderId: null
      fit:
        experience: [new, returning]
        commitment: [taste, arc]
      note: >
        Basis: publisher positioning of A Noite em que o Verão Acabou as his crime
