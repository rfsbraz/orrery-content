id: gillian-flynn
name: Gillian Flynn
kind: author
description: >
  Three Midwestern crime novels built on unreliable narrators and false
  domestic surfaces, and the screen and television work Flynn has written
  from them since 2014 - from a reporter carving words into her own skin in
  [[work:gillian-flynn/sharp-objects|Sharp Objects]] to the marriage taken
  apart in [[work:gillian-flynn/gone-girl|Gone Girl]].
authorIds: [gillian-flynn]
themePreset: heartland-noir

# CAPABILITIES - left at auto rather than declared, because auto already
# produces the honest result. No eras.yaml, events.yaml, orders.yaml,
# characters.yaml or editions.yaml exists in this wing, so river, companion,
# wizard and editions all sit dark without needing an override, and hall
# stays on by default. connections activates on real data already: two works
# here point back at the Flynn novel they restage in another medium
# (gillian-flynn/gone-girl-film and gillian-flynn/sharp-objects-tv), which is
# a genuine two-edge graph rather than decoration, the same reasoning that
# keeps this on for the Chuck Palahniuk wing's Invisible Monsters Remix
# connection. No characters.yaml: nothing recurs across her separate novels -
# Nick and Amy Dunne, Camille Preaker and Libby Day each live in exactly one
# book, and the con artist of The Grownup shares no cast with any of them.

