id: gillian-flynn
name: Gillian Flynn
kind: author
description: >
  Three Midwestern crime novels built on unreliable narrators and false
  domestic surfaces, and the screen and television work Flynn has written
  from them since 2014 - from a reporter sent back to the home town that
  haunts her in [[work:gillian-flynn/sharp-objects|Sharp Objects]] to the
  marriage taken apart in [[work:gillian-flynn/gone-girl|Gone Girl]].
authorIds: [gillian-flynn]
themePreset: heartland-noir

globalEvents:
  exclude:
    - sept-11-2001            # lived through it; domestic thrillers never touched post-9/11 anxiety
    - financial-crisis-2008   # published across 2008-2012; no book answers it
    - chain-bookshop-1982     # industry infrastructure; bookshop culture never reached the page
    - online-bookselling-1995 # Amazon-era discovery; text contains no Amazon/online commerce
    - ebook-and-self-publishing-2007 # Kindle era; no ebook technology in her work
    - prestige-fantasy-adaptation-2011 # genre mismatch; Flynn writes crime thrillers, not fantasy
    - booktok-2020            # Gone Girl phenomenon predates this by 8 years; social media discovery not in text
    - covid-19-pandemic-2020  # Utopia aired Sept 2020 with eerie pandemic resonance, but written 2014-2015 (coincidence)
    - portugal-bailout-2011   # Portuguese; she's American, no connection

# CAPABILITIES - left at auto rather than declared, because auto already
# produces the honest result. No eras.yaml, events.yaml, characters.yaml or
# editions.yaml exists in this wing, and orders.yaml exists but is empty
# (see its own header), so river, companion, wizard and editions all sit
# dark without needing an override, and hall stays on by default.
# connections activates on real data already: two works here point back at
# the Flynn novel they restage in another medium (gillian-flynn/gone-girl-film
# and gillian-flynn/sharp-objects-tv), which is a genuine two-edge graph
# rather than decoration, the same reasoning that keeps this on for the
# Chuck Palahniuk wing's Invisible Monsters Remix connection. No
# characters.yaml: nothing recurs across her separate novels - Nick and Amy
# Dunne, Camille Preaker and Libby Day each live in exactly one book, and
# the con artist of The Grownup shares no cast with any of them.
#
# STARTHERE: no wizard. No source clears the bar this catalogue sets for an
# entry path - a dated, bylined recommendation from a major paper's books
# desk, a bookshop's own editorial, the publisher, or Flynn herself in an
# interview. gillian-flynn.com carries no FAQ or reading-order page. The
# Penguin Random House product pages for Gone Girl and Dark Places carry
# discussion-group questions for readers who have already finished the
# book, not entry advice. The Washington Post, Salon and AwardsWatch each
# published a Gone Girl anniversary retrospective (June 2022, July 2022,
# September 2024) without answering whether to read the novel or watch the
# film first. What is on record instead is generic "books in order" SEO
# content (bookseriesinorder.com, mostrecommendedbooks.com and near-
# identical sites) that either recites publication order or says the
# novels are standalone and it doesn't matter, with no named recommender
# behind either claim, plus unattributed Goodreads and Facebook fan Q&A -
# none of it clears the bar. A screen-to-page path - watch
# [[work:gillian-flynn/gone-girl-film|the film]] or
# [[work:gillian-flynn/sharp-objects-tv|the HBO series]], then read the
# novel it restages - is the one entry shape this wing's mix of prose and
# screen holdings makes worth naming, and no source recommends it either;
# shipping it anyway would be unsourced curatorial invention, exactly what
# the sourcing bar exists to rule out. The "Complete Gillian Flynn" omnibus
# (Crown, 2014) binds Gone Girl, Sharp Objects and Dark Places together for
# sale but states no reading sequence on its own product pages.

