# Additional reading orders. There are none on record.
#
# All three novels are standalone: no shared characters, setting or timeline
# (Camille Preaker, Libby Day, and Nick and Amy Dunne each live in exactly
# one book), so there is no in-universe sequence to reconstruct. subseries:
# null on every work in works.yaml confirms there is no publisher-numbered
# grouping the way João Tordo's trilogy or Valter Hugo Mãe's two tetralogies
# have, and no author, bookshop, publisher or critic is on record proposing
# a sequence for the three novels at all.
#
# A NOVELS-ONLY ORDER WAS CONSIDERED AND FAILS THE DIVERGENCE TEST. Sharp
# Objects (2006), Dark Places (2009) and Gone Girl (2012) publish in three
# different years, so unlike agatha-christie/poirot-novels - which exists to
# settle five same-year ties - there is no tie here for a curated order to
# settle. "The three novels, in publication order" would be byte-for-byte
# the derived default filtered down to three titles: the same sequence, nothing
# added. It was not written.
#
# THE PREQUEL/SPOILER VECTOR DOES NOT APPLY. Nothing in this wing is a
# prequel - no work is set earlier than a later-published work whose reveals
# it would front-load - so there is no ordering question of the
# robert-jordan/New-Spring kind to answer here.
#
# A screen-to-page entry path (watch the film or the HBO series, then read
# the novel it restages, or the reverse) was researched as a startHere
# candidate rather than an order, since it names at most two works per
# direction; see franchise.yaml for why it was not shipped either.
[]
