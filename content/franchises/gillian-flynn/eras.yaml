# Creative periods. There are none on record.
#
# The shape of this career is unusually visible: three novels in six years
# (Sharp Objects 2006, Dark Places 2009, Gone Girl 2012), then no novel at
# all while the writing goes to film and television (the Gone Girl
# screenplay 2014, Sharp Objects for HBO 2018, Widows 2018, Utopia 2020) and
# to introductions for other people's books. A fourth novel has been
# announced and is unpublished. Nobody on the record divides the career that
# way, or any other way, so no era is claimed and the whole 2006-2025 shelf
# sits outside any era by design.
#
# Four framings come close enough to record, and each falls short for a
# different reason.
#
# Flynn names the gap but not a period. Asked in 2018 whether the success of
# Gone Girl unsettled her: "I am starting to get anxious because I haven't
# published a book since Gone Girl, aside from The Grownup. I've done a lot
# of screenwriting, but that's different." She treats it as an unfinished
# book rather than a phase of work, and gives it no beginning, no end and no
# name (Interview, 12 Nov 2018,
# https://www.interviewmagazine.com/culture/gillian-flynn-brings-her-mid-western-noir-to-a-boil-in-widows).
# She says the same of the delay in 2025, again without naming a period:
# "It's hard to write after Gone Girl", which is "lightning in a bottle,
# never gonna be replicated. So I have to kind of accept that and finish
# writing the dang book." (People, 29 May 2025, read in syndication at
# https://www.aol.com/why-gillian-flynns-next-novel-170000325.html)
#
# Gone Girl is a dividing line in the genre, not in her catalogue. Criticism
# periodises the thriller market at 2012, not this author: CrimeReads dates
# the rise of domestic noir to "a decade after Gone Girl" and describes the
# novel bringing "the genre's readership to numbers it had never
# experienced" (https://crimereads.com/the-rise-of-domestic-noir-a-decade-after-gone-girl/).
# What that framing cuts in two is other writers' work.
#
# The three novels are sold as a set and not grouped as one by criticism. The
# Complete Gillian Flynn is a publisher's ebook bundle, and no source calls
# them a trilogy, a cycle or a run. "The Missouri novels" would also be
# false to the books: Dark Places is set on a Kansas farm.
#
# Midwestern noir and domestic noir are genre labels, not periods. The first
# is proposed to Flynn by an interviewer ("I'd argue that you created a new
# genre of crime literature called Midwestern noir", Interview 2018). The
# second is Julia Crouch's, proposed on her own blog for a body of writing
# much wider than Flynn's and defined as fiction that "takes place primarily
# in homes and workplaces, concerns itself largely (but not exclusively) with
# the female experience" (https://juliacrouch.co.uk/blog/genre-bender). Both
# cover the whole prose corpus and so cannot cut it anywhere.
#
# The strongest single essay on the work reads the four prose books as one
# undivided body, united by class rather than separated into phases: "one of
# the biggest subjects in her work, one that stretches across her four books,
# has largely gone unnoticed" (Los Angeles Review of Books, 9 Aug 2018,
# https://lareviewofbooks.org/blog/reviews/real-enemy-gillian-flynns-works-class/).
# Britannica's biography and her own site are both chronological and name no
# phase.
[]
