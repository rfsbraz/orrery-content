# Editions of Gillian Flynn: 10 English (en) editions over 6 of 11 works.
#
# COVERAGE
#   en   10 editions over 6 of 11 works: the four prose works (Sharp Objects,
#        Dark Places, Gone Girl, The Grownup) each carry a US and a UK first
#        edition, and the two apocrypha works (I'll Be Gone in the Dark,
#        Chicago's Fine Arts Building) each carry the host book's one edition.
#        No entry exists for the five screen/television works (no ISBN - a
#        screenplay or aired series is not a published book) or for Masks
#        (a comics short story printed across a newspaper supplement and a
#        periodical anthology issue, neither of which carries its own ISBN;
#        checked and confirmed absent, not merely unsearched).
#
# EVERY ENTRY BELOW IS THE WORK'S FIRST EDITION IN THAT REGION, not the
# current reissue. This author is published on both sides of the Atlantic
# under different imprints (Shaye Areheart Books/Crown in the US, Weidenfeld
# & Nicolson in the UK) with genuinely different first-publication years, and
# a later mass-market or film tie-in printing was rejected wherever the
# search surfaced one. All four novels are also long out of a US/UK dual
# market in various later paperback and film-tie-in printings not recorded
# here; a reader wanting the current stocked printing over the first should
# treat that as a live question for this file rather than a settled one.
#
# No `title` is set on any entry: every edition is in English and the work's
# own title IS the published title, so recording one would manufacture a
# translation event that never happened. No entry carries a coverUrl: none
# was sourced, and the app's ISBN-derived fallback is a supported path.
#
# SOURCING. US facts are corroborated by the publisher's own site or
# Wikipedia's infobox cross-checked against OpenLibrary's per-ISBN record. UK
# facts rest on Biblio.com's per-ISBN bibliographic page (its "First Edition"
# field, publisher, format, page count and year), which for Sharp Objects and
# Gone Girl was corroborated by independent AbeBooks and eBay first-edition
# listings quoting the identical ISBN.
#
# Sharp Objects (US): Wikipedia's own infobox ISBN, 0307341550, is a single
# transposed digit away from the true first edition and turned out on
# OpenLibrary lookup to belong to the 2007 Three Rivers Press paperback
# reprint (272pp), not the 2006 Shaye Areheart hardcover (254pp) the infobox
# describes. The hardcover's real ISBN, 9780307341549, was recovered from
# OpenLibrary's edition list for the work (matching LC classification "S53
# 2006" and the 254-page count) and independently confirmed by Biblio.
#
# Sharp Objects (UK): Biblio, AbeBooks and eBay agree on ISBN 9780297851523,
# Weidenfeld & Nicolson, hardcover, first edition, 272pp, dated 2006.
# OpenLibrary catalogues the identical ISBN under "Orion Publishing Group,
# Limited" (the same company; Weidenfeld & Nicolson is its imprint) but dated
# 2007 with no format recorded - a cataloguing inconsistency on one ISBN
# rather than a second edition, since an ISBN does not split across two real
# printings. The 2006 hardcover-first-edition date is taken as correct on the
# strength of three agreeing bookseller records against one under-specified
# library aggregator entry.
#
# The Grownup (UK): a single bookseller (bookshopapocalypse.com) lists a 2014
# "UK first edition" trade paperback under an unstated ISBN; every other
# record checked (Wikipedia, the UK trade supplier Browns Books, AbeBooks)
# places the UK Weidenfeld & Nicolson paperback at 5 November 2015, matching
# the US Crown edition's month, which is the date recorded below. The 2014
# claim is not corroborated anywhere else and is not used.

