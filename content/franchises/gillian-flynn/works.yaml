# Bibliography (Works) - the abstract works; editions and covers are separate
# metadata not recorded here. IDs are STABLE and permanent (user data
# references them). Dates are FIRST publication of the complete work.
#
# SHAPE OF THIS WING, stated plainly because it is unlike every other author
# in this catalogue: three novels and a novella across two decades, and a
# screen and television career that is genuinely most of her output since
# 2012. Both halves are hers; the tiering below sorts them by KIND of
# publication, not by which one matters more.
#
# TIERING.
#   core     the four works of prose fiction that are the reading spine:
#            three novels and the novella-length "The Grownup".
#   extended genuinely hers, off the spine because the medium is different -
#            five screen and television works, at every real level of
#            authorship from sole screenwriter and showrunner down to a
#            two-episode writing credit on an adaptation she did not create.
#            None of the five is apocrypha: none is a limited or unfinished
#            contribution, each is a credited, produced, publicly released
#            work she is named on by the production itself.
#   apocrypha not used in this wing; see the Rogues note below for the one
#            case that could have gone here and did not.
#
# THE ROGUES QUESTION. "The Grownup" first appeared as "What Do You Do?" in
# Rogues (2014), a 21-story anthology edited by George R. R. Martin and
# Gardner Dozois that is overwhelmingly other authors' work. That could argue
# for treating Rogues itself as a contributor-tier entry, the way this
# repo's Chuck Palahniuk wing tiers "Burnt Tongues". It is not treated that
# way here, because the two cases differ in what the story became: Palahniuk's
# 1995 short story never got its own bibliographic life outside that
# anthology and was folded into Fight Club as a chapter, so it is recorded as
# a life event rather than a work. Flynn's story instead won the 2015 Edgar
# Award for Best Short Story under Rogues and was then republished in 2015 as
# its own standalone book, The Grownup, by Crown in the US and Weidenfeld &
# Nicolson in the UK - a real, independently bibliographed work of hers, not
# a fragment inside somebody else's anthology. It is recorded once, as that
# work, with the anthology origin in its note; Rogues itself is not a
# separate entry, since a 21-author SF/fantasy anthology cover in this
# nine-work wing's derived order would misrepresent both books.
#
# DELIBERATELY EXCLUDED, each for a stated reason:
#   - A fourth novel, in progress for Penguin Random House as of 2025
#     (confirmed by Flynn in a 2023 interview and discussed again in 2025
#     reporting): unpublished, no title known, nothing to record yet.
#   - An HBO limited series adapting Dark Places, announced in January 2024
#     with Flynn as co-creator, writer and co-showrunner: announced but not
#     produced or aired. Recording an unproduced credit would be exactly the
#     kind of claim this repo does not make; it belongs here only once it
#     exists to be watched, read or seen.
#   - A film adaptation of The Grownup, in development since a 2016 Universal
#     announcement and reconfirmed as in-progress by Flynn in a 2022 podcast
#     interview: same reasoning, unproduced.
#   - Attack of the 50 Foot Woman, a Tim Burton remake reported in February
#     2024 with a Flynn screenplay: unproduced.
#   - Her Entertainment Weekly journalism (1998-2008) and the handful of
#     later magazine essays listed on her own Wikipedia bibliography (Time,
#     The New Yorker, Powell's, Elle): biography and occasional prose, not
#     books, and not works in the sense this schema tracks. The EW years are
#     recorded on the author entity instead.
#   - Individual chapters or scenes are not separately listed; none of her
#     work has been extracted into a standalone reprint the way, for example,
#     a single Palahniuk story sometimes has.
#
# COMPLETE against the reachable record: her own Wikipedia "Published works"
# and "Filmography" tables (Fiction: 3 novels, one comic short story, one
# short story; Film and TV: Gone Girl, Widows, Sharp Objects, Utopia) turned
# up nothing beyond the nine works below and the excluded, unproduced tail
# above.

- id: gillian-flynn/sharp-objects
  title: "Sharp Objects"
  authorIds: [gillian-flynn]
  published: 2006
  subseries: null
  canonTier: core
  synopsis: >
    Camille Preaker, a St. Louis crime reporter recently released from a
    psychiatric hospital, is sent back to her hometown of Wind Gap, Missouri,
    to cover the murder of one girl and the disappearance of another. Staying
    in her controlling mother's house with the half-sister she barely knows,
    she finds she cannot report the story without going back through her own
    past.
  note: >
    Flynn's debut, written nights and weekends while she was a television
    critic at Entertainment Weekly. SPOILER CARE. The novel's ending turns on
    what actually happened to the two murdered girls and to Camille's late
    sister Marian, and none of that appears here or should be added: this
    synopsis stops at the premise HBO's own miniseries used to sell the show,
    a reporter with a hospital stay behind her sent home to cover a killing.
    Do not extend it toward the family's secret.
  sources:
    - https://en.wikipedia.org/wiki/Sharp_Objects
    - https://en.wikipedia.org/wiki/Gillian_Flynn

- id: gillian-flynn/dark-places
  title: "Dark Places"
  authorIds: [gillian-flynn]
  published: 2009
  subseries: null
  canonTier: core
  synopsis: >
    Libby Day was seven when she escaped through a window as her mother and
    two sisters were murdered in their Kansas farmhouse, and testified
    afterward that her teenage brother Ben did it. Twenty-four years later,
    broke and living off donations from true-crime obsessives, she agrees to
    meet a club convinced Ben is innocent, and to go back over a night she
    has spent half her life trying not to remember.
  note: >
    Set against the rural poverty and Satanic-panic hysteria of the 1980s
    Midwest. SPOILER CARE: this stays at what really did happen to Libby's
    family and to Ben, kept out entirely. Flynn herself has a cameo in the
    2015 film; she is developing a separate HBO limited series of the novel,
    announced in 2024 but unproduced, so it is not recorded as a work here
    (see the wing-level note in this file).
  sources:
    - https://en.wikipedia.org/wiki/Dark_Places_(Flynn_novel)
    - https://en.wikipedia.org/wiki/Gillian_Flynn

- id: gillian-flynn/gone-girl
  title: "Gone Girl"
  authorIds: [gillian-flynn]
  published: 2012
  subseries: null
  canonTier: core
  synopsis: >
    On the morning of his fifth wedding anniversary, Nick Dunne comes home to
    find his wife Amy gone, the house disturbed, and the small lies of his
    marriage becoming very large ones under the eyes of the police and the
    press.
  note: >
    Flynn's third novel and by far her best known: over fifteen million
    copies sold worldwide by 2016, eight weeks atop the New York Times
    bestseller list, and widely credited with making the unreliable-narrator
    domestic thriller a commercial category. SPOILER CARE, and this is the
    landmine of the whole wing: the novel's structure depends entirely on
    what a reader does and does not know about Amy partway through, and one
    of the most famous reveals in modern popular fiction sits there. This
    synopsis states only what page one gives a reader - a missing wife, a
    husband under suspicion - and must never be extended even by a clause.
    Do not describe Amy's diary, her whereabouts, or what either spouse turns
    out to have done; do not reason from the 2014 film's marketing, which by
    its release date could assume an audience that already knew.
  sources:
    - https://en.wikipedia.org/wiki/Gone_Girl_(novel)
    - https://en.wikipedia.org/wiki/Gillian_Flynn

- id: gillian-flynn/the-grownup
  title: "The Grownup"
  authorIds: [gillian-flynn]
  published: 2014
  subseries: null
  canonTier: core
  synopsis: >
    A con artist working as a fake psychic is hired to cleanse a wealthy
    client's Victorian house of a presence she insists is haunting it, and
    finds herself pulled into a family with much stranger problems than a
    ghost.
  note: >
    First published as "What Do You Do?" in Rogues (2014), a 21-story
    anthology edited by George R. R. Martin and Gardner Dozois; won the 2015
    Edgar Award for Best Short Story, and was republished under its current
    title as a standalone book in November 2015 (Crown in the US, Weidenfeld
    & Nicolson in the UK). Recorded here rather than as a Rogues anthology
    entry; see the wing-level tiering note in this file for why. SPOILER
    CARE: the novella turns on two successive reveals about who is lying to
    whom, neither named here.
  sources:
    - https://en.wikipedia.org/wiki/The_Grownup
    - https://en.wikipedia.org/wiki/Rogues_(anthology)
    - https://en.wikipedia.org/wiki/Gillian_Flynn

- id: gillian-flynn/masks
  title: "Masks"
  authorIds: [gillian-flynn]
  published: 2014
  subseries: null
  canonTier: extended
  authorRole: author
  synopsis: >
    A short story told in comics form, written by Flynn and drawn by Dave
    Gibbons.
  note: >
    First run as a preview in The Guardian's "Weekend comics special" in
    April 2014, then collected that year in the long-running anthology
    series Dark Horse Presents. No plot summary is reachable in the sources
    checked, so none is asserted beyond the form and the collaborators;
    Gibbons is credited as illustrator only and is not recorded in
    withAuthorIds, since this repo has no author entity for him and the
    schema has no illustrator role (the same treatment as the artists on the
    Chuck Palahniuk wing's Fight Club comics).
  sources:
    - https://en.wikipedia.org/wiki/Gillian_Flynn

- id: gillian-flynn/gone-girl-film
  title: "Gone Girl"
  authorIds: [gillian-flynn]
  published: 2014
  subseries: null
  canonTier: extended
  authorRole: author
  connections:
    - gillian-flynn/gone-girl
  synopsis: >
    Flynn's own screenplay adaptation of
    [[work:gillian-flynn/gone-girl|her 2012 novel]], directed by David
    Fincher and starring Ben Affleck and Rosamund Pike as Nick and Amy Dunne.
  note: >
    Released October 3, 2014; Flynn is sole credited screenwriter. Won her
    the Critics' Choice Movie Award for Best Adapted Screenplay and earned
    Golden Globe, BAFTA and WGA nominations. Tiered extended rather than
    core: it is entirely hers, but a screenplay restaging an existing novel
    is a different kind of work from the prose spine, the same distinction
    the Chuck Palahniuk wing draws around its non-novel formats. Recorded as
    a connection back to the novel rather than a subseries, since the two are
    one story in two forms - the same treatment as that wing's Invisible
    Monsters Remix.
  sources:
    - https://en.wikipedia.org/wiki/Gone_Girl_(novel)
    - https://en.wikipedia.org/wiki/Gillian_Flynn

- id: gillian-flynn/sharp-objects-tv
  title: "Sharp Objects"
  authorIds: [gillian-flynn]
  published: 2018
  subseries: null
  canonTier: extended
  authorRole: co-author
  connections:
    - gillian-flynn/sharp-objects
  synopsis: >
    An eight-episode HBO adaptation of
    [[work:gillian-flynn/sharp-objects|her 2006 novel]], created by Marti
    Noxon and directed by Jean-Marc Vallee, starring Amy Adams as Camille
    Preaker.
  note: >
    CREDIT, stated precisely because it is easy to overclaim. Marti Noxon is
    the credited creator and showrunner; Flynn is not. Flynn wrote the
    teleplay for episode 2 ("Dirt") alone and episode 7 ("Falling") together
    with Scott Brown, and served as an executive producer across all eight
    episodes (confirmed by her own Wikipedia filmography table: Writer yes,
    Executive producer yes, Creator no, Showrunner no). That is a real and
    citable writing credit, which is why the work is recorded at all, but it
    is a co-author's share of someone else's adaptation rather than a work
    she made - the reason it sits in extended rather than core alongside
    Utopia, where she is credited as sole writer of all eight episodes and
    showrunner. Marti Noxon and Scott Brown are not recorded in
    withAuthorIds; neither has an author entity in this repo yet.
  sources:
    - https://en.wikipedia.org/wiki/Sharp_Objects_(miniseries)
    - https://en.wikipedia.org/wiki/Gillian_Flynn

- id: gillian-flynn/widows
  title: "Widows"
  authorIds: [gillian-flynn]
  published: 2018
  subseries: null
  canonTier: extended
  authorRole: co-author
  synopsis: >
    A heist thriller Flynn co-wrote with director Steve McQueen, adapting
    Lynda La Plante's 1983 British television series: four women left with
    their dead husbands' debts plan to finish the job that killed them.
  note: >
    Screenplay credited to Flynn and McQueen jointly (confirmed by Flynn's
    own Wikipedia filmography table, which lists her as a co-writer with the
    director on this title alone). Premiered at Toronto, September 2018;
    released in the UK and US that November. Steve McQueen is not recorded
    in withAuthorIds; he has no author entity in this repo, and is a
    filmmaker rather than a prose author in the sense this schema tracks -
    named here in prose instead, the same treatment the Chuck Palahniuk wing
    gives its uncredited illustrators and co-editors.
  sources:
    - https://en.wikipedia.org/wiki/Widows_(2018_film)
    - https://en.wikipedia.org/wiki/Gillian_Flynn

- id: gillian-flynn/utopia
  title: "Utopia"
  authorIds: [gillian-flynn]
  published: 2020
  subseries: null
  canonTier: extended
  authorRole: author
  synopsis: >
    An eight-episode Amazon series Flynn created and wrote in full, adapting
    Dennis Kelly's 2013 British series: a group of comic-book fans discover
    that the cult graphic novel they are obsessed with seems to predict real
    disease outbreaks, and become the target of an organization that wants
    it destroyed.
  note: >
    Flynn is credited as writer of all eight episodes, showrunner, creator
    and executive producer (confirmed by her own Wikipedia filmography
    table - the only title of hers marked yes on all four). First developed
    for HBO from 2014 with David Fincher attached to direct and executive
    produce; that version was cancelled in 2015 over budget, and Amazon
    revived it for a 2020 series order. Premiered September 25, 2020;
    cancelled after one season that November. The most fully hers of the
    five screen works in this wing, and tiered extended rather than core for
    the same reason as the others: a television series is a different kind
    of work from the prose spine, not a lesser one.
  sources:
    - https://en.wikipedia.org/wiki/Utopia_(2020_TV_series)
    - https://en.wikipedia.org/wiki/Gillian_Flynn
