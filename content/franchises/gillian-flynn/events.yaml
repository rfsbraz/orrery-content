#
# Three entries, placed across the years that carried her highest-visibility
# decade with the least context: the novel's leap from modest expectations to
# a fixture on the bestseller lists (2013), the reception debate its women
# provoked and that she answered on the record (2014), and the HBO deal that
# collapsed mid-decade before Amazon revived it (2015).
#
# Candidates tested and left out:
#   - the film's reported changes to the novel's third act: describing what
#     changed means describing what the novel does at its climax, so this
#     wing carries none of it, in prose or in a date
#   - the 2015 Edgar Award for [[work:gillian-flynn/the-grownup|The Grownup]]:
#     already carried in that work's own note in works.yaml; a duplicate
#     event here would pad the count rather than add to it
#   - Gillian Flynn Books, her 2021 Zando imprint: an author-life fact,
#     already carried as a life event on the author entity, not a franchise
#     event

- id: gone-girl-bestseller-run-2013
  date: 2013
  title: From modest expectations to a fixture on the list
  scope: industry
  reach: franchise
  impact: med
  description: >
    [[work:gillian-flynn/gone-girl|Gone Girl]] was Flynn's third novel, and
    by her own account everyone involved expected it to build modestly on
    the first two the way Sharp Objects and Dark Places had; her editor
    liked the manuscript but privately thought its ending was a risk.
    Instead the novel entered the New
    York Times bestseller list the week it was published, rose to No. 1 the
    following week, sold roughly two million copies within its first year,
    and went on to spend 91 weeks total on that list, eight of them at No.
    1. The distance between what everyone expected of a Gillian Flynn novel
    and what this one became is why a screenplay, and everything in
    television that followed it, exists at all.
  spoilerAfter: null
  sources:
    - https://www.northwestern.edu/magazine/spring2013/alumnilife/gillian-flynn-gone-girl.html
    - https://time.com/3429666/gillian-flynns-marriage-plot/
    - https://gulfnews.com/entertainment/books/gillian-flynn-on-the-gone-girl-phenomenon-1.1411915

- id: gone-girl-misogynist-question-2014
  date: 2014-09-25
  title: Answering for her own women, in print
  scope: culture
  reach: franchise
  impact: high
  description: >
    Ahead of the film's release, TIME put Flynn on its cover and asked her
    directly about a charge that had followed
    [[work:gillian-flynn/gone-girl|Gone Girl]] since publication: that
    writing women the way she does was itself a kind of misogyny. "I've certainly been called a misogynist," she told the
    magazine, "and that to me is strange. It feels so old-fashioned to
    think because you write about awful women that you don't like women. To
    me it's worse to only write about good women. I'm tired of women as the
    supporting character, women as the helpmate, women as the adorably
    flawed heroine." The question outlived this book: it is the same
    defense she has since made of Camille Preaker, of Libby Day, and of
    every woman she has written who was allowed to be something other than
    likable.
  spoilerAfter: null
  sources:
    - https://time.com/3429666/gillian-flynns-marriage-plot/
    - https://time.com/3472314/gone-girl-movie-book-feminist-misogynist/

- id: utopia-hbo-collapse-2015
  date: 2015
  dateRange: "2013-2018"
  title: A television deal dies, then doesn't
  scope: industry
  reach: franchise
  impact: med
  description: >
    In 2013, on the set of the Gone Girl film, David Fincher told Flynn he
    knew what to do with her life for the next couple of years: adapt the
    British series Utopia for HBO, with him directing. She spent two years
    writing ten episodes. In 2015 Fincher and HBO's production head broke
    down over the budget, by her account roughly nine million dollars
    apart, and the network shelved it. "We were playing a little bit of a
    game of chicken," she said afterward. The scripts sat unproduced for
    three years until Amazon ordered [[work:gillian-flynn/utopia|Utopia]]
    to series on April 19, 2018, this time with Flynn alone as showrunner.
  spoilerAfter: null
  sources:
    - https://www.hollywoodreporter.com/movies/movie-features/gillian-flynn-talks-utopia-and-6-year-journey-to-screen-we-were-playing-a-little-bit-of-a-game-of-chicken-4060720/
    - https://en.wikipedia.org/wiki/Utopia_(2020_TV_series)
