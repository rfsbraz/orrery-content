# Branding for the Gillian Flynn wing (see Orrery CONCEPT §6 - the design
# law, and docs/SCHEMA.md#themeyaml). Distinct from every existing wing,
# checked before choosing: the other two near-black-and-cold entries in the
# catalogue are Chuck Palahniuk (blue-grey near-black, antiseptic green,
# sourceSerif, a firm "rule") and the Cosmere (blue-black, brass gold,
# spectral, "filament"/thread). Flynn needed a third cold register that
# reads as neither. Where those two go dark, this wing goes the other way:
# a cold, overcast, newsprint-pale ground rather than a near-black one - the
# only light-ground wing in the catalogue besides Agatha Christie's warm
# ivory, and pointedly not warm. The accent is a bruise-plum, unclaimed by
# any other wing's hue (Palahniuk's green sits near 160, King's oxblood near
# 10, this sits near 300) and true to the material: carved skin, a diary
# entry, a body found posed rather than hidden.
preset: heartland-noir
palette:
  bg: "#e2dfda"       # cold overcast newsprint-grey, not warm ivory and not near-black
  surface: "#eae7e1"  # a shade lifted, for cards
  ink: "#1c1a1a"       # near-black ink - crisp, very high contrast on pale ground
  muted: "#726d68"     # dry newsprint grey, for metadata
  accent: "#5c3a52"    # one restrained bruise-plum, for links and markers only
displayFace: sourceSerif  # from the app's implemented set (fraunces | spectral | sourceSerif);
                           # the plainest curated serif, fitting a bibliography that runs
                           # through two newsrooms (Camille's, Nick's) and Flynn's own decade
                           # as a working journalist
signature: rule            # a single straight incision - a copy-desk rule, a scored line,
                            # a word carved in a straight stroke; distinct from Palahniuk's
                            # and Valter Hugo Mae's own use of "rule" because nothing else
                            # here reads clinical or inked - this one reads cut
art:
  motifs:
    - a screen door on a humid porch, the house behind it too tidy
    - flat Missouri farmland to the horizon, heat-haze instead of storm
    - a hand-written diary page, the handwriting a little too careful
    - chain-link and cornfield at the edge of a small town's last street
    - a hog-farm outbuilding seen from a distance, never up close
    - a single straight scored line, like a ruler-drawn cut or a redacted row
  atmosphere: >
    Overcast and airless rather than gothic-dark: flat Midwestern daylight,
    humidity instead of rain, menace hidden inside good manners and a clean
    front lawn rather than in shadow. Interiors are genteel until looked at
    twice - a good rug, dust where it should not be, a room kept exactly as
    it was. People are composed in the frame the way they are composed for
    the cameras that come to a small town after a killing.
  lineCharacter: >
    Clean, controlled, almost clinical linework - ballpoint-pen precision
    rather than expressive ink or a tremulous dip pen, closer to a reporter's
    notebook or a case file than to gothic illustration. Straight strokes
    over loose ones; nothing scratchy, nothing decorative.
  backgroundTexture: >
    Cold newsprint-grey paper with a faint halftone dot pattern, the texture
    of a photocopied police report or a printed newspaper page rather than
    laid paper or vellum.
  accentUse: >
    Bruise-plum on exactly one element per image, never as a fill: a single
    flower in an otherwise empty vase, a ribbon, a shadow along a jawline, a
    lit window at dusk in an otherwise pale house.
  avoid:
    - knives, blades or any literal reading of "sharp objects"
    - blood, gore or slasher-horror texture
    - tabloid/true-crime poster lettering and lurid crime-scene tape
    - tornado or storm imagery - the menace here is stillness, not weather
    - southern-gothic decay (moss, plantation ruin) - this is the Midwest,
      not the South, and the houses are clean, not crumbling
    - sexualized violence in any form
notes: >
  A cold-daylight edition, not a paperback-thriller poster: overcast
  newsprint-grey paper, near-black type, one bruise-plum accent used only for
  links and markers, and a single straight rule as the sole structural
  gesture. The palette is deliberately not dark-mode gothic - Flynn's
  Midwest is flat noon light and manicured front lawns, not shadow - and
  deliberately not warm: no farmhouse amber, no autumnal cosiness, nothing
  that would let the domestic setting read as comfortable. No knives, no
  blood, no tabloid lettering, no literal "sharp objects": the menace here
  is surfaces, not weapons.
