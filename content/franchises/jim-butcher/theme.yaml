# Branding for the Jim Butcher wing (see Orrery CONCEPT SS6 - the design law).
# Three genres share this wing (contemporary-noir detective fiction, Roman
# epic fantasy, steampunk), so the palette pulls one thing genuinely common to
# all three rather than costuming any single series: artificial light against
# a dark sky - Chicago's sodium streetlamps over Harry's wet pavement, an
# airship's running lanterns and brass fittings over the Spires' void, a
# legion's watch-fires over the Calderon frontier at night. Restraint over
# genre signage; no wizard hats, no Shardblade-style props, no togas.
preset: streetlamp-noir
palette:
  bg: "#13111f"       # near-black with a violet-indigo cast - a city night sky,
                      # not King's warm near-black or Sanderson's cool blue-black
  surface: "#1d1a2c"  # a hair lifted, for cards
  ink: "#efe8dc"      # warm bone/parchment - a used paperback's page, not a
                      # cold digital white
  muted: "#8b8296"    # dusty violet-grey, for metadata
  accent: "#d98a3d"   # warm sodium-amber - streetlamp glow, brass, banked
                      # firelight; used sparingly
displayFace: spectral # a modern literary serif, calm rather than pulpy; headings only
signature: none       # deliberately: see note below

# `signature: none` is a considered choice, not an oversight. Every other
# multi-series wing's signature element (King's Beam, Sanderson's filament)
# stands for a real connective thread running through that author's whole
# catalogue. This wing's three series confirm the opposite: Butcher has said
# on the record that a Dresden Files/Codex Alera crossover would need a whole
# book to even answer (see franchise.yaml), and no shared thread exists to
# draw. Inventing one purely for visual unity would assert, in the interface,
# a connection the author has denied in interviews - exactly the kind of
# "our own reading in a serif font" CURATION.md warns against, applied to
# design instead of prose. The palette and the amber accent carry this wing's
# identity; the works are left to string themselves along the shelf without a
# fabricated line drawn between them.
art:
  emblem:
    object: >
      A battered hand lantern, its glass panes soot-smudged and its wick
      trimmed low, held at the end of a bare arm so its light claims only a
      few feet of the dark around it.
    why: >
      A carried, hand-held light rather than a fixed one, because all three
      series ground their light-after-dark in a documented reason of their
      own rather than a shared mood: Harry Dresden's own magic reliably
      fries powered electronics, so his home, lab and cases run on oil and
      candlelight out of stated necessity, not atmosphere; the Calderon
      frontier's Rome-analog legions still stand picket by the same
      hand-carried oil flame a night watch has always used; and a Spire
      war-vessel still hangs and carries lanterns as the one signal a storm
      cannot jam, exactly the "running lanterns" the palette above already
      grounds this wing in. The object is small and personal, held by
      someone doing a job, never lighting a stage.
  motifs:
    - a hand lantern or storm lamp held at arm's length, its light claiming
      a small circle and leaving the rest to guesswork
    - rain-slicked pavement, dew-soaked canvas or frost on a hull plate,
      each catching a single light source and nothing else
    - a doorway, gate or ship's rail stood at as a threshold - the place a
      stakeout, a sentry or a lookout holds between the light and the dark
    - brass, iron or leather fittings worn smooth and dark with handling - a
      door-catch, a sword-belt buckle, a rail fitting - the tool a hand
      returns to often enough to polish
    - a work-table lit by one lamp, papers, maps or gear laid out mid-task,
      the rest of the room given up to shadow
    - fog, low smoke or high-altitude mist swallowing the middle distance so
      only the foreground and one far light survive
  atmosphere: >
    Tense and alert rather than cosy or awed - the specific quiet of someone
    on duty after dark in a job that punishes a mistake. One small claimed
    pool of light holds back a much larger dark, and the figure inside it is
    working, not admiring the view. Interiors are a cramped office, a watch
    tent or an airship's gondola, lit by whatever the figure is carrying;
    exteriors are a wet street, a picket line or a night sky with weather
    moving in. Never gothic haunting, never comic warmth, never epic-fantasy
    wonder - the mood of overtime, not of a ghost story or a coronation.
  lineCharacter: >
    Hard-edged chiaroscuro: a dip-pen contour with shadow held as one flat,
    confident pool of ink rather than built up from hatching, so light and
    dark meet at a single clean boundary the way a strong lamp actually
    falls, never a graduated tone. Cross-hatching appears only as a sparing
    accent on a rounded surface, never as the shadow itself - the opposite
    instinct from the Discworld wing's dense stipple. Curves stay incidental
    to the objects drawn, never the decorative interlace of the Wheel of
    Time wing's weave; here the line is a boundary, not a pattern.
  backgroundTexture: >
    Damp, cockled paper that has been rained on and dried under tension:
    faint tide-lines, fibre lifted slightly at the edges, ink feathering a
    fraction of a millimetre wherever a wash meets an unworked patch. Cool
    and a little rough - not the warm homespun weave of a wing built on
    cloth, and not a toned satirical broadsheet plate.
  accentUse: >
    Sodium-amber on exactly one element per image, never a wash or a fill:
    the lit glass or flame of a carried lantern, one window still lit down
    an otherwise dark street, or a single brass fitting catching the light.
    Where a scene has no obvious carried light, the accent falls on the one
    warm-lit edge nearest the eye and nowhere else.
  avoid:
    - pointed wizard hats, staffs held aloft, glowing spell-effects or
      special-effects magic as spectacle
    - trench-coat-and-fedora hardboiled-detective costuming, noir-parody
      signage (neon "P.I." signs, venetian-blind shadow bars)
    - toga-and-laurel Roman costume drama, gladiator-parade armour worn as
      pageantry rather than a soldier's working kit
    - brass-goggles-and-gears steampunk kitsch, exposed clockwork drawn as
      decoration rather than a working machine's plain guts
    - urban-fantasy-paperback cover cliches - a leather-clad figure posed
      front-on, exposed midriff, a full-moon werewolf silhouette
    - dense stippled cross-hatching filling a whole shadow, or flowing
      interlaced/braided decorative border work - both belong to other
      wings on this shelf, not this one
    - amber or gold used as a wash, glow or fill rather than one exact lit
      surface
notes: >
  One wing, three genres, one real throughline: artificial light held against
  the dark by people doing dangerous jobs after sundown. Cool violet-black
  night, warm bone-parchment text, a single restrained amber accent for
  streetlamp/brass/firelight. No signature element, and that omission is
  itself the point - see above. A curator tunes the exact hues.
