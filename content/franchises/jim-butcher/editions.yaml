# Editions of Jim Butcher: English (en) only. 33 of 34 works.
#
# Butcher writes in English and no pt-PT translation of this wing exists, so
# every entry here is the ORIGINAL-language edition. It carries no `title`
# (the work title IS the published title - see
# SCHEMA.md's rule on omitting `title` when a work is already in that
# language) and no `coverUrl` anywhere: works.yaml already carries an Open
# Library cover for every work that has one, and duplicating that here would
# just be a second place for the two to drift apart.
#
# ONE EDITION PER WORK, chosen for being the most clearly-attested currently
# catalogued printing, not necessarily the very first one:
#   - Roc / Ace (Penguin Random House US) is used wherever a clean US record
#     surfaced - Roc for the Dresden Files through Skin Game, Ace for Codex
#     Alera, and the Ace-descended "Penguin Publishing Group" imprint for
#     Peace Talks onward and the Cinder Spires.
#   - Orbit UK (catalogued by OpenLibrary/BookWatch under "Little, Brown Book
#     Group Limited" or plain "Orbit") is used wherever no clean US ISBN
#     surfaced for that work (Summer Knight, Death Masks, Blood Rites, Small
#     Favor, Skin Game, Peace Talks). This is a different, real, currently
#     catalogued English edition of the same unchanged text - not a fallback
#     of last resort - so `language: en` (bare, no region) is correct for
#     both: nothing about the book differs between the US and UK printings.
#   - Subterranean Press / Podium / Pocket Star for the specialty items and
#     the licensed Spider-Man tie-in, where those are the only or the
#     clearly-intended edition.
#
# `format` is set ONLY where a source explicitly states the binding (an
# OpenLibrary `physical_format` field, or an explicit "Roc Hardcover" / "Ace
# Hardcover" in the publisher name itself). Most backlist mass-market entries
# below have neither field, so `format` is absent on them, the same as the
# Palahniuk file's `shock-induction` and first `fight-club` entries.
#
# SOURCING: every ISBN below was opened at OpenLibrary (a MARC/library-record
# aggregator, not a wiki) and its `works` key cross-checked against the
# correct work id from works.yaml to rule out a same-titled but wrong record.
# Storm Front's edition is additionally cross-checked against ISFDB, which
# independently lists the identical ISBN under "Roc / New American Library".
# The Codex Alera and Cinder Spires Ace/Ace Hardcover records carry LCCNs.
#
# THREE TRAPS THIS FILE DELIBERATELY AVOIDS, found while researching it:
#   - Del Rey's two "Jim Butcher's the Dresden files" OpenLibrary records
#     (9780345506399, 9780345507464) are the Del Rey GRAPHIC NOVEL
#     adaptations (Storm Front Vol. 1 and the original story "Welcome to the
#     Jungle"), confirmed via their own by_statement fields naming an
#     "adaptation," a penciller and an inker. Neither is a print edition of
#     any prose work here.
#   - "Wizard for Hire" (SFBC, 2005) and "Wizard Under Fire" (SFBC, 2007,
#     754 pages) are Science Fiction Book Club two-novel OMNIBUS bind-ups
#     (Storm Front+Fool Moon and Grave Peril+Summer Knight respectively, the
#     754-page count for a single novel being the tell) - excluded per the
#     rule against an omnibus ISBN standing in for one work.
#   - The several Buzzy Multimedia CD/audio ISBNs surfacing for Storm Front,
#     Fool Moon and Summer Knight are audiobooks, not the print editions a
#     "buy this book" link should point a reader at.
#
# WARRIORBORN HAS NO ENTRY, DELIBERATELY. jim-butcher.com's own announcement
# post states it "was released September 19, 2023 as an ebook and an
# audiobook" - no print edition exists, and neither format is recorded on
# OpenLibrary or ISFDB with an ISBN. This matches works.yaml's own note on the
# work. Nothing to invent here; the app will show the work with no buy link.

