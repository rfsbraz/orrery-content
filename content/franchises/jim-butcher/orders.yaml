# Additional reading orders. There are none on record.
#
# The Dresden Files is read in strict publication order by every guide
# checked (the author's own site presents the novels only in numbered
# publication order; no in-universe reshuffling is proposed anywhere), and
# the two short-story collections already sit correctly in that same derived
# order by their publication year (Side Jobs 2010, between Changes and Ghost
# Story; Brief Cases 2018, between Skin Game and Peace Talks) - so no curated
# order is needed to place them; the default handles it.
#
# Codex Alera is six novels, one continuous story, complete, with no side
# material to sequence.
#
# The Cinder Spires is two novels and one interstitial novella, already
# correctly ordered by the default (Warriorborn 2023 sits, by its own book
# 1.5 numbering, between The Aeronaut's Windlass 2015 and The Olympian
# Affair 2023) - too short a shelf yet for an alternate order to earn its
# keep.
#
# NO CROSS-SERIES ORDER WAS ATTEMPTED. A combined "read all three series
# interleaved" order would require a claim about how they relate that this
# wing does not make (see franchise.yaml): the three do not share a universe,
# so there is no in-universe timeline to interleave them against, only three
# separate publication timelines already fully expressed by the derived
# default.
[]
