# FRANCHISE-SPECIFIC events only. Author-LIFE events live on the author entity
# (content/authors/jim-butcher.yaml). Shared world/culture events live in
# content/events/global.yaml.
#
# Three entries span the shelf's working middle as well as its edges: the
# 2009 bestseller breakthrough, the 2013 launch of a second ongoing series,
# and the 2020 manuscript split that explains the longest gap in the first.
#
# Candidates tested and left out:
#   - the 2007 Sci-Fi Channel television pilot and single season: industry
#     trivia with no mark on the books themselves; the series continued
#     unaffected by the show's cancellation
#   - the real reason for the 2014-2020 gap between Skin Game and Peace
#     Talks: a single New York Times profile (2025), marking the series'
#     25th anniversary, has Butcher discuss depression and a suicide
#     attempt around the writing of Changes (2010) as part of that period,
#     in his own words, for what the profile frames as the first time he
#     has done so on the record. Every other outlet reporting the same
#     account (a science-fiction newsletter, a fan forum's paywall-bypass
#     copy, a partisan blog) cites that one interview rather than
#     independently confirming it, and no earlier interview or public
#     statement carries any part of it. One source, however credible and
#     however directly attributed to the author himself, is not two
#     (CURATION.md section 6); nothing about it is recorded here
#   - the planned 20-25 book, "case files then a final trilogy" structure:
#     recorded instead in eras.yaml's rejection note, since it is a shape for
#     unwritten books rather than an event with a date

- id: turn-coat-number-one-2009
  date: 2009-04
  title: Turn Coat debuts at number one
  scope: industry
  reach: franchise
  impact: med
  description: >
    [[work:jim-butcher/turn-coat|Turn Coat]], the eleventh Dresden Files
    novel, debuts at number one on The New York Times hardcover fiction
    bestseller list, nine years and ten books into the series. It is the
    first of what becomes an unbroken run: every Dresden novel published
    over the following decade, through
    [[work:jim-butcher/skin-game|Skin Game]] in 2014, opens at number one in
    turn. A series that spent its first decade building a readership one
    book at a time becomes, from here, a guaranteed bestseller on release
    day.
  spoilerAfter: null
  sources:
    - https://en.wikipedia.org/wiki/Turn_Coat
    - https://www.newsweek.com/dresden-files-book-17-release-date-battle-ground-peace-talks-1494226

- id: cinder-spires-deal-2013
  date: 2013
  title: A second series, sold as a seven-figure bet on steampunk
  scope: industry
  reach: franchise
  impact: med
  description: >
    Butcher first floats the idea in an August 2012 status update to
    readers, promising a steampunk series once
    [[work:jim-butcher/cold-days|Cold Days]] is revised. Publishers Weekly
    reports the follow-through the next year, a seven-figure, three-book
    deal with his existing publisher, Roc, for
    [[work:jim-butcher/the-aeronauts-windlass|The Aeronaut's Windlass]] and
    two sequels - Butcher's first new ongoing series since
    [[franchise:jim-butcher|Codex Alera]] concluded in 2009, and proof his
    publisher was willing to back an unproven genre on his name alone. In a
    Reddit AMA around the same time, Butcher describes the pitch himself:
    "kinda League of Extraordinary Gentlemen meets Sherlock meets
    Hornblower." The book would not reach shelves for two more years, and
    Butcher continued alternating it with Dresden novels rather than
    pausing the older series to write it.
  spoilerAfter: null
  sources:
    - https://www.jim-butcher.com/posts/2013/jim-sells-rights-to-steampunk-series
    - https://reactormag.com/jim-butcher-reddit-ama-highlights/
    - https://blog.karenwoodward.org/2012/10/jim-butcher-begins-another-series.html

- id: peace-talks-battle-ground-split-2020
  date: 2020
  title: One manuscript splits into two novels
  scope: industry
  reach: franchise
  impact: med
  description: >
    [[work:jim-butcher/peace-talks|Peace Talks]] and
    [[work:jim-butcher/battle-ground|Battle Ground]] were written as a
    single manuscript that grew into what Butcher called a "Frankensteinian
    thing." He agreed to split it into two books on the condition both hit
    shelves the same year, which is why book sixteen and book seventeen of
    The Dresden Files publish only ten weeks apart, in July and September
    2020, after a six-year gap since Skin Game - the longest silence in the
    series' history, broken by two books at once rather than one.
  spoilerAfter: null
  sources:
    - https://www.newsweek.com/dresden-files-book-17-release-date-battle-ground-peace-talks-1494226
    - https://en.wikipedia.org/wiki/Peace_Talks_(novel)
