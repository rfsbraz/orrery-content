# --- The Cinder Spires (ongoing) ---
- id: jim-butcher/the-aeronauts-windlass
  title: "The Aeronaut's Windlass"
  authorIds: [jim-butcher]
  published: 2015
  subseries: "The Cinder Spires"
  canonTier: core
  synopsis: >
    Humanity lives in mile-high spires above a hostile, monster-haunted
    surface, sailing between them on crystal-powered airships. When Spire
    Albion is attacked, a disgraced privateer captain, a young noblewoman
    and her cousin, and a very opinionated cat are drawn into a hidden war
    between spires.
  note: Nominated for the Hugo Award for Best Novel, 2016.
  sources:
    - https://en.wikipedia.org/wiki/The_Aeronaut%27s_Windlass

- id: jim-butcher/warriorborn
  title: "Warriorborn"
  authorIds: [jim-butcher]
  published: 2023
  subseries: "The Cinder Spires"
  canonTier: apocrypha
  synopsis: >
    Sent to recover something "misplaced" on a colony spire that has cut
    off all contact, Lieutenant Benedict Sorellin-Lancaster and a squad of
    Warriorborn find a weapon that could upend the balance of power between
    the spires.
  note: >
    Ebook/audio-only novella, published as book 1.5 - between
    [[work:jim-butcher/the-aeronauts-windlass|The Aeronaut's Windlass]] and
    [[work:jim-butcher/the-olympian-affair|The Olympian Affair]].
  sources:
    - https://www.goodreads.com/book/show/195463561-warriorborn

- id: jim-butcher/the-olympian-affair
  title: "The Olympian Affair"
  authorIds: [jim-butcher]
  published: 2023
  subseries: "The Cinder Spires"
  canonTier: core
  synopsis: >
    A diplomatic mission to a trade conference on Spire Olympia draws
    Captain Grimm and the crew of the Predator into rising tensions with
    Spire Aurora, as etherealist magic and airship combat threaten to break
    an uneasy peace.
  sources:
    - https://www.penguinrandomhouse.com/books/315101/the-olympian-affair-by-jim-butcher/

