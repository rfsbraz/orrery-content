# Bibliography (Works) - the abstract books; editions/covers are separate metadata.
# IDs are STABLE and permanent (user data references them). Dates are year-precision
# unless a source states a full date. The default reading order (all works in
# publication order) is DERIVED from this file, so every published work belongs
# here.
#
# Coverage: every novel across all three series, the two numbered short-fiction
# collections that stand as their own books (Side Jobs, Brief Cases), four
# standalone limited-run novellas (the illustrated Backup and the Working for
# Bigfoot omnibus, both later folded into those collections; The Law and Out
# Law, neither yet collected), the one Cinder Spires novella (Warriorborn), and
# the licensed Spider-Man tie-in novel (The Darkest Hours).
#
# Deliberately NOT catalogued as individual works: the several dozen Dresden
# Files short stories and microfictions published only inside shared
# anthologies (My Big Fat Supernatural Wedding, Many Bloody Returns, Blood
# Lite, Instinct: An Animal Rescuers Anthology, and others) or as free web
# fiction. Every one of them is already collected inside Side Jobs or Brief
# Cases, or is recent enough that it is not yet collected at all; the same
# grain the stephen-king wing uses applies here too: collections are works,
# the individual stories inside an anthology of many authors' work are not.
#
# Also deliberately NOT catalogued: the three multi-author anthologies Butcher
# co-EDITED with Kerrie L. Hughes (Shadowed Souls 2016, Heroic Hearts 2022,
# Paranormal Payback 2026), each carrying one of his own Dresden stories. His
# stories in them are anthology-only shorts (excluded on the grain above); the
# volumes themselves are editor-role, not authored. Left out because the
# derived reading order sorts by publication year with no canonTier weighting,
# so an editor-role apocryphal volume would fall into the main sequence between
# his own novels. Recorded here so the omission is a documented data decision,
# not an oversight; reversible if they are later ruled in as authored.
#
# A book is also not "his" merely because his name is on it: the Dresden
# Files graphic novels (Welcome to the Jungle and others) are written from
# Butcher's plot outlines by other credited writers (Mark Powers) and drawn
# by other artists, the same distinction the stephen-king wing draws around
# the Dark Tower comics - so they are not catalogued as works here either.

