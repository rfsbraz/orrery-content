# Creative periods. There are none on record.
#
# No critic, reference work or settled fan consensus divides this author's
# career, or any of his series, into named creative periods. Readers widely
# describe the Dresden Files as shifting from episodic "case of the week"
# novels toward a single escalating arc, with Changes (2010) as its pivot, but
# that is a described evolution, not a received periodisation with period names
# a reader would recognise the way "the Golden Decade" or "the Bachman years"
# are recognised. The recurring fan question is whether the series divides into
# arcs at all and where (the long-running "ongoing serial or story arcs?"
# discussions); an open debate is the opposite of a settled period. The
# fandom wiki carries no named arc divisions.
#
# Butcher's own stated shape - "25: 22 'case books'... capped with a
# double-length apocalyptic trilogy" (https://www.jim-butcher.com/faq) - is a
# plan for a whole series still being written, not a division of the eighteen
# novels published so far; it names no start or end year and no named periods.
# No source periodises Codex Alera (six novels, one continuous arc, complete)
# or The Cinder Spires (two novels and a novella, too short to divide).
#
# A whole-career periodisation by publication chronology (early Dresden, a
# Codex Alera interlude, mature Dresden and Spires) fails on the record itself,
# not only on sourcing: the three series are concurrent, not sequential. A
# Dresden Files novel appeared every year from 2000 to 2014 while the six Codex
# Alera novels ran 2004-2009 alongside them, and The Cinder Spires (from 2015)
# overlaps the late Dresden run - so there is no early/interlude/late sequence
# to draw. An era renders full-bleed across the wing's whole timeline; any
# "early Dresden" span would also swallow the concurrent Codex Alera, a Roman
# epic fantasy sharing neither genre nor world, under one plate.
#
# eras: [] is the honest record of a career no one has divided into periods,
# including its author. If the "case books then apocalyptic trilogy" shape
# becomes a visible, named periodisation once the series concludes, that is a
# call to make then.
[]
