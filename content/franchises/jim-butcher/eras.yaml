# Creative periods. There are none on record.
#
# Butcher has described a shape for the Dresden Files, but it is a plan for
# unwritten books, not a period of already-published work with a visible
# theme: he has said the series was conceived as roughly 20-25 standalone
# "case files" capped by a concluding "Big Apocalyptic Trilogy", and that the
# count has stretched as the story grew (multiple interviews, collected at
# https://www.jim-butcher.com/faq/ and secondary reading-order guides). That
# is a structural promise about the ending, not a periodisation of the
# eighteen novels published so far - it names no start or end year, and nobody
# reads early Dresden Files against a "case files era" the way King's work is
# read against a named decade. No source periodises Codex Alera (six novels,
# one continuous arc, complete) or The Cinder Spires (two novels and one
# novella so far, too short to divide) either.
#
# Nothing here is invented to fill the slot: eras: [] is the honest record of
# a career that has not yet been divided into periods by anyone, including
# its author. If the finished "case files then trilogy" shape becomes visible
# once the series concludes, that is this skill's call to make then, not a
# guess to make now.
[]
