# FRANCHISE-SPECIFIC events only. Author-LIFE events (birth, the Alzheimer's
# announcement, the knighthood, death, the steamroller) live on the author entity
# (content/authors/terry-pratchett.yaml), since they follow the person. Shared
# world/culture events live in content/events/global.yaml. Inline references use
# [[type:id|text]] and must resolve.

- id: discworld-begins-1983
  date: 1983
  title: The Disc is launched
  scope: industry
  reach: franchise
  impact: high
  description: >
    [[work:terry-pratchett/the-colour-of-magic|The Colour of Magic]] introduces the flat
    world on four elephants on the star turtle Great A'Tuin. What begins as a
    fantasy parody becomes a 41-novel, three-decade project and one of the
    best-selling series in British publishing.
  spoilerAfter: null
  sources: [https://en.wikipedia.org/wiki/Discworld]

- id: good-omens-cowriting-1988
  date: 1988
  title: Good Omens is co-written by phone and floppy disk
  scope: industry
  reach: franchise
  impact: med
  description: >
    [[work:terry-pratchett/good-omens|Good Omens]] began as a Neil Gaiman
    fragment - a parody of Richmal Crompton's William books - that Gaiman had
    sent Pratchett for feedback; Pratchett wrote back enthusiastically eight
    months later and the two decided, on their own initiative rather than
    their publisher's, to finish it together. Through 1988 they plotted it on
    daily phone calls and posted floppy disks of pages back and forth, each
    rewriting and footnoting the other's chapters until, by Pratchett's own
    account, neither author was entirely sure who had written what.
  spoilerAfter: null
  sources: [https://en.wikipedia.org/wiki/Good_Omens]

- id: wyrd-sisters-stage-debut-1991
  date: 1991-05-15
  title: The first stage adaptation of a Discworld novel
  scope: culture
  reach: franchise
  impact: low
  description: >
    [[work:terry-pratchett/wyrd-sisters|Wyrd Sisters]], adapted by Stephen
    Briggs, was first performed by the amateur Studio Theatre Club at the
    Unicorn Theatre in Abingdon, Oxfordshire, 15-18 May 1991 - the first
    Discworld novel staged anywhere. Briggs's amateur-rights adaptations
    became a recurring channel for the books for the rest of Pratchett's
    career.
  spoilerAfter: null
  sources:
    - "https://colinsmythe.co.uk/terry-pratchett/discworld/convention-reports-index/terry-pratchett-chronology/"

- id: truckers-tv-adaptation-1992
  date: 1992-01-10
  title: Truckers reaches the screen - his first TV adaptation
  scope: industry
  reach: franchise
  impact: med
  description: >
    Cosgrove Hall's 13-part stop-motion adaptation of
    [[work:terry-pratchett/truckers|Truckers]] aired on ITV's CITV strand
    from 10 January to 3 April 1992 - Pratchett's first work adapted for the
    screen, in any form. The Nomes reached television four years before the
    first Discworld production, Cosgrove Hall's own animated Soul Music and
    Wyrd Sisters (1996-97).
  spoilerAfter: null
  sources:
    - https://en.wikipedia.org/wiki/Truckers_(1992_TV_series)
    - "https://colinsmythe.co.uk/terry-pratchett/discworld/convention-reports-index/terry-pratchett-chronology/"

- id: planet-hollywood-launch-1993
  date: 1993-10-28
  title: Gollancz and Corgi throw a joint launch at Planet Hollywood
  scope: industry
  reach: franchise
  impact: low
  description: >
    Hardback publisher Gollancz and paperback publisher Corgi held a joint
    launch party at Planet Hollywood in London's West End for
    [[work:terry-pratchett/men-at-arms|Men at Arms]] and
    [[work:terry-pratchett/lords-and-ladies|Lords and Ladies]] together - the
    kind of coordinated, celebrity-venue marketing push that would have been
    unthinkable for the small-press
    [[work:terry-pratchett/the-carpet-people|Carpet People]] two decades
    earlier, and a marker of how far Discworld had moved into the publishing
    mainstream.
  spoilerAfter: null
  sources:
    - "https://colinsmythe.co.uk/terry-pratchett/discworld/convention-reports-index/terry-pratchett-chronology/"

- id: discworld-video-game-1995
  date: 1995-03-17
  title: Discworld arrives as a video game
  scope: industry
  reach: franchise
  impact: med
  description: >
    Pratchett had turned down game licences since a 1986 tie-in adaptation of
    [[work:terry-pratchett/the-colour-of-magic|The Colour of Magic]] sold
    poorly; designer Gregg Barnett won him over by proposing an original
    point-and-click story spanning the whole series rather than one book.
    Discworld, voiced by Eric Idle as Rincewind and loosely built around
    [[work:terry-pratchett/guards-guards|Guards! Guards!]], was published by
    Psygnosis for MS-DOS on 17 March 1995 - the first Discworld video game to
    reach players.
  spoilerAfter: null
  sources: [https://en.wikipedia.org/wiki/Discworld_(video_game)]

- id: discworld-dictation-shift
  date: 2009
  title: The late novels are written by dictation
  scope: industry
  reach: franchise
  impact: high
  description: >
    As Alzheimer's made typing impossible, Pratchett composed the final books by
    dictation - to speech software and to his assistant Rob Wilkins, with growing
    help from his daughter Rhianna. From roughly
    [[work:terry-pratchett/unseen-academicals|Unseen Academicals]] onward the prose is
    spoken rather than typed, which colours the rhythm and urgency of late
    Discworld.
  spoilerAfter: null
  sources: [https://en.wikipedia.org/wiki/Terry_Pratchett]

- id: discworld-convention-1996
  date: 1996-06-28
  title: Fans found the Discworld Convention
  scope: culture
  reach: franchise
  impact: low
  description: >
    Members of the Usenet newsgroup alt.fan.pratchett organised the first
    Discworld Convention at the Britannia Sacha Hotel in Manchester, 28-30
    June 1996, with Pratchett and illustrator Josh Kirby as guests of honour.
    Pratchett was guest of honour at every UK convention that followed. At the
    ninth, in 2014, the organisers announced he could not travel for health
    reasons; he took part in an on-camera Q&A from home instead, and his black
    hat was named guest of honour in his place.
  spoilerAfter: null
  sources:
    - https://en.wikipedia.org/wiki/International_Discworld_Convention
    - "https://colinsmythe.co.uk/terry-pratchett/discworld/convention-reports-index/terry-pratchett-chronology/"

- id: shepherds-crown-posthumous-2015
  date: 2015-08-27
  title: The final Discworld novel published posthumously
  scope: industry
  reach: franchise
  impact: high
  description: >
    [[work:terry-pratchett/the-shepherds-crown|The Shepherd's Crown]] was released five
    months after Pratchett's death, largely complete but unpolished by his usual
    standard - he was known to rewrite until the last moment. Rhianna Pratchett
    and Rob Wilkins prepared it for publication as he left it.
  spoilerAfter: null
  sources: [https://discworld.fandom.com/wiki/The_Shepherd's_Crown]

- id: rhianna-pratchett-stewardship-2015
  date: 2015
  title: Rhianna Pratchett takes stewardship - the Disc closes
  scope: industry
  reach: franchise
  impact: med
  description: >
    As executor and custodian of the estate, Rhianna Pratchett confirmed that
    [[work:terry-pratchett/the-shepherds-crown|The Shepherd's Crown]] would be the last
    Discworld novel and that no new Discworld books would be written by other
    hands. The series is closed by design; adaptations continue, new novels do not.
  spoilerAfter: null
  sources: [https://en.wikipedia.org/wiki/Rhianna_Pratchett]

- id: gnu-terry-pratchett-2015
  date: 2015-03
  title: "GNU Terry Pratchett"
  scope: culture
  reach: franchise
  impact: med
  description: >
    Fans wrote Pratchett's name into the infrastructure of the web itself,
    embedding the HTTP header "X-Clacks-Overhead: GNU Terry Pratchett" so his name
    keeps travelling in the overhead. It echoes [[work:terry-pratchett/going-postal|Going
    Postal]], where a clacks operator keeps a dead man's name moving down the
    towers so that, in the Disc's phrase, a man is not truly dead while his name is
    still spoken.
  spoilerAfter: null
  sources: [https://en.wikipedia.org/wiki/Terry_Pratchett]
