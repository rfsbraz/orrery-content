# Recurring figures that thread the Disc together (docs/SCHEMA.md). Kept to a
# tight roster of genuine connective tissue, not a character wiki. Appearances are
# the meaningful ones, not every cameo. Granny Weatherwax's arc-ending appearance
# carries spoilerAfter, since her fate damages the experience of that book.

- id: terry-pratchett/death
  name: Death
  aka: ["The Grim Reaper", "Mr Bill Door"]
  description: >
    The Disc's Death: a seven-foot skeleton in a black robe who speaks IN SMALL
    CAPITALS, keeps cats, and is forever, fondly, trying to understand the humans
    he collects. He cameos in nearly every Discworld novel and leads his own
    thread - the connective figure of the whole series.
  appearsIn:
    - workId: terry-pratchett/the-colour-of-magic
      note: His first appearance, chasing a tourist who keeps not dying on schedule.
    - workId: terry-pratchett/mort
      note: Takes an apprentice and goes looking for what humans have that he does not.
    - workId: terry-pratchett/reaper-man
      note: Made mortal, he learns to live - and to fear the end - as a farmhand.
    - workId: terry-pratchett/soul-music
    - workId: terry-pratchett/hogfather
      note: Takes over the Hogfather's sleigh to keep belief itself alive.
    - workId: terry-pratchett/thief-of-time
  sources:
    - https://wiki.lspace.org/Death

- id: terry-pratchett/lord-vetinari
  name: Havelock Vetinari
  aka: ["The Patrician", "Lord Vetinari"]
  description: >
    The Patrician of Ankh-Morpork: a former Assassin who rules the great city by
    understanding it better than it understands itself. He runs the Disc's central
    stage, so he threads the Watch, the Moist von Lipwig books and the standalones.
  appearsIn:
    - workId: terry-pratchett/guards-guards
      note: Rules from the Oblong Office; sets the Watch its impossible tasks.
    - workId: terry-pratchett/men-at-arms
    - workId: terry-pratchett/jingo
    - workId: terry-pratchett/night-watch
      note: His own younger, watchful self appears in the revolution.
    - workId: terry-pratchett/the-truth
      note: Framed for a crime, at the centre of the newspaper plot.
    - workId: terry-pratchett/going-postal
      note: Hands Moist von Lipwig his choice between the Post Office and the drop.
    - workId: terry-pratchett/making-money
  sources:
    - https://wiki.lspace.org/Havelock_Vetinari

- id: terry-pratchett/granny-weatherwax
  name: Esmerelda "Granny" Weatherwax
  aka: ["Esme Weatherwax", "Mistress Weatherwax", "Granny"]
  description: >
    The most formidable witch on the Disc - all headology, iron will and refusal
    of the easy path. She anchors the Witches thread and crosses forward into the
    Tiffany Aching books as the standard the next generation is measured against.
  appearsIn:
    - workId: terry-pratchett/equal-rites
      note: Her first appearance, fighting to get a girl into a wizards' university.
    - workId: terry-pratchett/wyrd-sisters
    - workId: terry-pratchett/witches-abroad
    - workId: terry-pratchett/lords-and-ladies
    - workId: terry-pratchett/maskerade
    - workId: terry-pratchett/carpe-jugulum
      note: A crisis of faith brings her closer to the edge than ever.
    - workId: terry-pratchett/a-hat-full-of-sky
      note: Quietly takes the measure of young Tiffany Aching.
    - workId: terry-pratchett/the-shepherds-crown
      note: Her story reaches its end here, and the whole Disc feels the loss.
      spoilerAfter: terry-pratchett/the-shepherds-crown
  sources:
    - https://wiki.lspace.org/Granny_Weatherwax

- id: terry-pratchett/sam-vimes
  name: Samuel Vimes
  aka: ["Sir Samuel Vimes", "Commander Vimes", "His Grace the Duke of Ankh"]
  description: >
    From a drunk in a gutter to Commander of the Watch and reluctant Duke - the
    Disc's angriest, most stubborn conscience, policing the line between order and
    the darkness in himself. The spine of the City Watch thread.
  appearsIn:
    - workId: terry-pratchett/guards-guards
      note: Rock bottom, and the case that gives him a reason to stand up.
    - workId: terry-pratchett/men-at-arms
    - workId: terry-pratchett/feet-of-clay
    - workId: terry-pratchett/jingo
    - workId: terry-pratchett/the-fifth-elephant
    - workId: terry-pratchett/night-watch
      note: Sent into his own past to become the mentor he once had.
    - workId: terry-pratchett/thud
    - workId: terry-pratchett/snuff
  sources:
    - https://wiki.lspace.org/Samuel_Vimes

- id: terry-pratchett/rincewind
  name: Rincewind
  aka: ["Rincewind the Wizzard"]
  description: >
    A failed wizard who knows exactly one spell and one survival strategy -
    running away, fast. The Disc's first protagonist and its most reluctant
    adventurer, threading the early parody novels.
  appearsIn:
    - workId: terry-pratchett/the-colour-of-magic
      note: Reluctant guide to the Disc's first tourist.
    - workId: terry-pratchett/the-light-fantastic
    - workId: terry-pratchett/sourcery
    - workId: terry-pratchett/eric
    - workId: terry-pratchett/interesting-times
    - workId: terry-pratchett/the-last-continent
    - workId: terry-pratchett/the-last-hero
  sources:
    - https://wiki.lspace.org/Rincewind

- id: terry-pratchett/the-librarian
  name: The Librarian
  aka: ["The Orangutan"]
  description: >
    The librarian of Unseen University, transformed into an orangutan by a magical
    accident and perfectly happy to stay that way - do not call him a monkey. Keeper
    of the most dangerous books on the Disc and a widely-loved recurring cameo.
  appearsIn:
    - workId: terry-pratchett/guards-guards
      note: Helps the Watch through the library's more perilous shelves.
    - workId: terry-pratchett/moving-pictures
    - workId: terry-pratchett/men-at-arms
    - workId: terry-pratchett/the-last-continent
    - workId: terry-pratchett/unseen-academicals
  sources:
    - https://wiki.lspace.org/The_Librarian
