# Branding for the Discworld wing (see Orrery CONCEPT §6 - the design law).
# Personality through a considered palette, one modern display face, and one
# signature - NOT genre costume. No turtle kitsch, no cartoon dragons, no word
# art. Warm and bookish, with a single atmospheric idea: the edge of the Disc.
preset: warm-vellum
palette:
  bg: "#17131c"       # deep warm night - the dark A'Tuin swims through, with a violet warmth
  surface: "#221b29"  # a hair lifted, for cards
  ink: "#ece4d4"      # warm vellum - high contrast, very readable
  muted: "#9c8f9e"    # dusty mauve-grey, for metadata
  accent: "#d9a441"   # warm amber - the tiny orbiting sun / starlight, used sparingly
displayFace: instrument-serif  # modern high-contrast editorial serif; headings only
signature: horizon    # a single thin luminous arc low across the view - the curve
                      # of the world seen edge-on from the rim, starlight behind it
art:
  motifs:
    - a guild workshop - assassins', thieves' or the Watch's - tools of a
      working trade laid out with a straight face
    - a crowded Ankh-Morpork street, market stalls and signage jostling
    - a printing press or a post office sorting room stacked with letters
    - a clacks tower against the sky, one lamp lit
    - a witch's kitchen table, herbs and a boiling pot taken entirely
      seriously
    - an object with a joke built into its construction - a sign painted
      over an older sign, a ledger with a suspiciously round number
  atmosphere: >
    Warm and humane, street-level and crowded, the joke sitting in the
    objects and the signage rather than in anyone's face. Working trades
    taken as seriously as they take themselves - a guild, a press, a post
    office - so the comedy reads as affection for how a city actually runs,
    never as mockery of the people running it.
  lineCharacter: >
    Dense cross-hatching and stipple, plate-engraved and satirical in the
    Hogarth or Punch sense - caricature carried by objects, signage and
    crowding rather than by exaggerated faces. Busier and warmer than a
    technical line, never a delicate dip-pen tremor.
  backgroundTexture: >
    Warm vellum with the toned-plate texture of a nineteenth-century
    satirical broadsheet, sepia ink bleeding softly into the paper's grain.
  accentUse: >
    Warm amber on exactly one element per image, never as a fill: a single
    gas lamp, a coin changing hands, one lit window in a clacks tower.
  avoid:
    - generic fantasy art - dragons, wizards or costume standing in for
      character
    - pastiche of Josh Kirby's or Paul Kidby's own cover art
    - the turtle and elephants used as a literal crutch
    - twee whimsy - the humour lives in the working detail, not decoration
notes: >
  A serious, warm edition, not a comic-fantasy poster. The one idea is the rim:
  a thin bright arc of the Disc's edge against a warm night sky, a horizon you are
  standing at the edge of. That single atmospheric line carries the whimsy so the
  rest can stay quiet - vellum type on warm dark paper, one amber accent for links
  and markers. No turtle, no elephants, no jokes in the furniture; the books are
  funny enough that the frame should not try to be.
