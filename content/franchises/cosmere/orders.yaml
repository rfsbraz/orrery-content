# ADDITIONAL canon orders only. The DEFAULT order - all published works in
# publication-chronological order - is derived automatically from works.yaml and
# is NOT listed here. Each order references stable Work IDs only.
#
# The Cosmere is the cross-series chronology franchise, so it ships three
# additional orders: the standard community recommended order, the in-universe
# chronological order, and Sanderson's own (deliberately loose) guidance.

- id: cosmere/recommended-reading-order
  name: The standard recommended reading order
  type: community
  source: canon
  rationale: >
    The order most Cosmere guides converge on for a newcomer: start with the
    self-contained Mistborn trilogy, take in the standalones, then read the
    Stormlight Archive and Mistborn Era 2 roughly interleaved, with the novellas
    slotted where they land, and finish on the recent standalones and
    [[work:cosmere/wind-and-truth|Wind and Truth]]. It trades strict chronology
    for the best reading experience, keeping later-set books that spoil earlier
    ones in their published sequence.
  orderedWorkIds:
    - cosmere/the-final-empire
    - cosmere/the-well-of-ascension
    - cosmere/the-hero-of-ages
    - cosmere/warbreaker
    - cosmere/elantris
    - cosmere/the-emperors-soul
    - cosmere/the-way-of-kings
    - cosmere/words-of-radiance
    - cosmere/edgedancer
    - cosmere/the-alloy-of-law
    - cosmere/shadows-of-self
    - cosmere/the-bands-of-mourning
    - cosmere/mistborn-secret-history
    - cosmere/oathbringer
    - cosmere/dawnshard
    - cosmere/rhythm-of-war
    - cosmere/the-lost-metal
    - cosmere/shadows-for-silence
    - cosmere/sixth-of-the-dusk
    - cosmere/tress-of-the-emerald-sea
    - cosmere/yumi-and-the-nightmare-painter
    - cosmere/the-sunlit-man
    - cosmere/wind-and-truth
    - cosmere/isles-of-the-emberdark
  debated:
    - "Elantris placement: some guides open with it as the first-published Cosmere book; others (and Sanderson) place it after Mistborn because Mistborn is the smoother entry."
    - "Mistborn: Secret History is placed after The Bands of Mourning here because it spoils the end of Mistborn Era 1 and lands better once Era 2 is underway; some read it immediately after The Hero of Ages."
    - "The novellas collected in Arcanum Unbounded (Shadows for Silence, Sixth of the Dusk, The Hope of Elantris, The Eleventh Metal) can be read together via the collection rather than at these individual points."
    - "The Sunlit Man is deliberately placed late; it carries mild connective spoilers and reads best with Stormlight and Era 2 context, though it stands alone."
  sources:
    - https://thequilltolive.com/2025/07/25/cosmere-reading-order/
    - https://booknookcook.com/cosmere-reading-order/
    - https://storytellingdb.com/the-cosmere-reading-order/

- id: cosmere/chronological-inuniverse
  name: In-universe chronological order
  type: chronological-inuniverse
  source: canon
  rationale: >
    The order events occur on the Cosmere's internal timeline rather than the
    order the books were written. Sanderson has said cross-series dating is
    intentionally imprecise and still shifting, so this is a best-effort
    community reconstruction: the "modern" cluster (Sel, Scadrial's first era,
    Nalthis, Roshar) sits close together, Mistborn's second era is centuries
    later, and the far-future stories close the line. Not recommended for a first
    read - several early-set books were published later and spoil books set after
    them.
  orderedWorkIds:
    - cosmere/white-sand
    - cosmere/elantris
    - cosmere/the-hope-of-elantris
    - cosmere/the-emperors-soul
    - cosmere/the-final-empire
    - cosmere/the-well-of-ascension
    - cosmere/the-hero-of-ages
    - cosmere/mistborn-secret-history
    - cosmere/warbreaker
    - cosmere/the-way-of-kings
    - cosmere/words-of-radiance
    - cosmere/edgedancer
    - cosmere/oathbringer
    - cosmere/dawnshard
    - cosmere/rhythm-of-war
    - cosmere/wind-and-truth
    - cosmere/shadows-for-silence
    - cosmere/the-alloy-of-law
    - cosmere/shadows-of-self
    - cosmere/the-bands-of-mourning
    - cosmere/the-lost-metal
    - cosmere/sixth-of-the-dusk
    - cosmere/the-sunlit-man
    - cosmere/isles-of-the-emberdark
  debated:
    - "The interleaving of Elantris/Sel, Mistborn Era 1, Warbreaker and the Stormlight Archive is genuinely unsettled; these worlds are roughly contemporaneous and their exact relative dates are not fixed even by the author."
    - "White Sand's (Taldain's) position is one of the fuzziest; it is placed early here by convention but could move."
    - "Stormlight Arc 1 and Mistborn Era 2 are close in time and their ordering relative to each other is debated; Wind and Truth is placed before Era 2 here, but strong cases exist for overlap."
    - "Sixth of the Dusk and Isles of the Emberdark (First of the Sun) sit late but before/around The Sunlit Man, which is the furthest-future published Cosmere story."
  sources:
    - https://www.thepopverse.com/literary-brandon-sanderson-cosmere-guide-release-order-chronological-order
    - https://www.inwhatorder.com/cosmere/chronological
    - https://coppermind.net/wiki/Cosmere

- id: cosmere/author-recommended
  name: Sanderson's own guidance
  type: author-recommended
  source: canon
  rationale: >
    Sanderson declines to mandate a single order. His FAQ says any Cosmere series
    is a fine place to start, that you should read each series in its own internal
    order (do not jump into book two first), and that the standalones can go
    almost anywhere. His five listed "good first book" options are
    [[work:cosmere/the-final-empire|The Final Empire]],
    [[work:cosmere/the-emperors-soul|The Emperor's Soul]],
    [[work:cosmere/the-way-of-kings|The Way of Kings]],
    [[work:cosmere/elantris|Elantris]] and [[work:cosmere/warbreaker|Warbreaker]].
    This sequence follows his rules - each series intact, standalones folded in -
    rather than imposing an order he explicitly leaves open.
  orderedWorkIds:
    - cosmere/elantris
    - cosmere/the-emperors-soul
    - cosmere/the-final-empire
    - cosmere/the-well-of-ascension
    - cosmere/the-hero-of-ages
    - cosmere/warbreaker
    - cosmere/the-way-of-kings
    - cosmere/words-of-radiance
    - cosmere/edgedancer
    - cosmere/oathbringer
    - cosmere/dawnshard
    - cosmere/rhythm-of-war
    - cosmere/wind-and-truth
    - cosmere/the-alloy-of-law
    - cosmere/shadows-of-self
    - cosmere/the-bands-of-mourning
    - cosmere/the-lost-metal
    - cosmere/tress-of-the-emerald-sea
    - cosmere/yumi-and-the-nightmare-painter
    - cosmere/the-sunlit-man
    - cosmere/isles-of-the-emberdark
  debated:
    - "Sanderson stresses this is one valid arrangement, not the order; he considers series choice interchangeable."
    - "He specifically warns against starting with The Alloy of Law, since it spoils the original Mistborn trilogy - hence Era 2 follows Era 1 here."
  sources:
    - https://faq.brandonsanderson.com/knowledge-base/what-order-should-i-read-them-in/
    - https://www.brandonsanderson.com/pages/where-do-i-start
