# Bibliography (Works) - the abstract books; editions/covers are separate metadata.
# IDs are STABLE and permanent (user data references them). Dates are year-precision
# unless a source states a full date. The default reading order (all works in
# publication order) is DERIVED from this file - so completeness is the goal.
#
# Coverage: all Cosmere novels (Elantris, Mistborn Era 1 + Era 2, the Stormlight
# Archive, Warbreaker, the 2023 Secret Projects, Wind and Truth, Isles of the
# Emberdark), the significant novellas, the Arcanum Unbounded collection, the
# White Sand graphic novels (extended), and minor short fiction (apocrypha). The
# non-Cosmere Secret Project (The Frugal Wizard's Handbook) is deliberately
# excluded - it is not set in the Cosmere.

