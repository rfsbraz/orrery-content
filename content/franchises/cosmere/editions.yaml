# Portuguese (pt-PT) editions of the Cosmere.
#
# Two publishers hold the Portuguese rights across different eras:
#   - Edições Saída de Emergência published Mistborn Era 1 (2014-2016) and stopped there.
#   - Kathartika picked Sanderson up in 2024 and is working through The Stormlight
#     Archive plus the standalones.
# Jorge Candeias is the translator of record for every Portuguese Sanderson to date.
#
# Only editions verified against a real Portuguese listing are here. Works with no
# entry have no published pt-PT edition. Brazilian editions
# (Trama / Leya Brasil) are deliberately excluded: they are a different translation
# with different ISBNs and are never valid pt-PT.

