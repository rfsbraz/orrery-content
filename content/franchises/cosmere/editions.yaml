  workId: cosmere/the-final-empire
  isbn13: "9789896376383"
  language: pt-PT
  title: "O Império Final"
  translator: "Jorge Candeias"
  format: paperback
  publisher: Edições Saída de Emergência
  year: 2014
  note: >
    Published in the Bang! collection as book 1 of "Mistborn - Nascida nas Brumas".
  sources:
    - "https://www.saidadeemergencia.com/produto/o-imperio-final/"
    - "http://id.bnportugal.gov.pt/bib/bibnacional/1879988"

