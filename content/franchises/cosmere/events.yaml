# FRANCHISE-SPECIFIC events only. Author-LIFE events (birth, the Wheel of Time
# succession, the 2022 Kickstarter, etc.) live on the author entity
# (content/authors/brandon-sanderson.yaml), since they follow the person. Shared
# world/culture events live in content/events/global.yaml. Inline references use
# [[type:id|text]] and must resolve.
- id: cosmere/arcanum-unbounded-2016
  date: 2016-11-22
  title: The Cosmere becomes explicit
  scope: culture
  reach: franchise
  impact: high
  description: >
    [[work:cosmere/arcanum-unbounded|Arcanum Unbounded]] gathers short fiction from
    across the worlds and, crucially, adds an in-universe scholar's essays that
    map the shared universe for the first time. What had been a game of hidden
    cameos becomes a stated framework readers can follow deliberately.
  spoilerAfter: null
  sources: [https://en.wikipedia.org/wiki/Arcanum_Unbounded]

- id: cosmere/year-of-sanderson-2023
  date: 2023
  title: The Year of Sanderson
  scope: industry
  reach: franchise
  impact: med
  description: >
    The novels funded by the 2022 Kickstarter ship across a single year at an
    unheard-of cadence, three of them Cosmere standalones -
    [[work:cosmere/tress-of-the-emerald-sea|Tress of the Emerald Sea]],
    [[work:cosmere/yumi-and-the-nightmare-painter|Yumi and the Nightmare Painter]]
    and [[work:cosmere/the-sunlit-man|The Sunlit Man]] - each opening a new corner
    of the universe.
  spoilerAfter: null
  sources: [https://www.brandonsanderson.com/]

- id: cosmere/stormlight-arc-one-closes-2024
  date: 2024-12-06
  title: The first Stormlight arc closes
  scope: industry
  reach: franchise
  impact: high
  description: >
    [[work:cosmere/wind-and-truth|Wind and Truth]] ends the first five-book arc of
    the Stormlight Archive, the Cosmere's central pillar, bringing a decade and a
    half of build-up to its first great resolution before a planned pause in the
    series.
  spoilerAfter: cosmere/rhythm-of-war
  sources: [https://en.wikipedia.org/wiki/Wind_and_Truth]
