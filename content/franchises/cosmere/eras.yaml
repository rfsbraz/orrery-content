# Creative periods - the narrative spine of the aura. These track Sanderson's
# arc as a writer, not the Cosmere's internal timeline. Inline references use
# [[type:id|text]] and must resolve.
- id: cosmere/the-long-apprenticeship
  title: The Long Apprenticeship
  period: "1997-2005"
  themes: [trunk novels, hard magic, worldbuilding, the Cosmere conceived]
  description: >
    Years of unpublished novels written around night-shift jobs and study at
    Brigham Young University. The rejections built both a craft and a private
    cosmology - the shared universe that later books would inhabit. The period
    ends when [[work:cosmere/elantris|Elantris]], the sixth of those drafts, sells
    to Tor and reaches print in 2005.

- id: cosmere/debut-and-the-wheel-of-time
  title: Debut and the Wheel of Time Years
  period: "2005-2010"
  themes: [breakout, rule-bound magic systems, the shared universe seeded, dual workload]
  description: >
    The foundations are laid fast: [[work:cosmere/elantris|Elantris]], the Mistborn
    trilogy ([[work:cosmere/the-final-empire|The Final Empire]] onward) and
    [[work:cosmere/warbreaker|Warbreaker]] establish Sanderson's signature of tight,
    consequential magic. Mid-decade, chosen to finish Robert Jordan's Wheel of
    Time, he writes at a punishing double pace - closing that series while opening
    his own epic with [[work:cosmere/the-way-of-kings|The Way of Kings]] in 2010.

- id: cosmere/building-the-cosmere
  title: Building the Cosmere
  period: "2011-2020"
  themes: [the universe made explicit, novellas, deepening connections, peak Stormlight]
  description: >
    The shared universe stops being a private game and becomes text: the second
    Mistborn era begins with [[work:cosmere/the-alloy-of-law|The Alloy of Law]],
    the Stormlight Archive grows into the tentpole
    ([[work:cosmere/words-of-radiance|Words of Radiance]],
    [[work:cosmere/oathbringer|Oathbringer]],
    [[work:cosmere/rhythm-of-war|Rhythm of War]]), the Hugo-winning
    [[work:cosmere/the-emperors-soul|The Emperor's Soul]] and a run of novellas
    fill the corners, and [[work:cosmere/arcanum-unbounded|Arcanum Unbounded]]
    maps the whole thing for readers.

- id: cosmere/the-dragonsteel-era
  title: The Dragonsteel Era
  period: "2021-present"
  themes: [self-publishing, record crowdfunding, standalones, closing arcs]
  description: >
    Sanderson builds his career around his own company. The 2022 record-breaking
    Kickstarter yields the 2023 "Year of Sanderson" standalones -
    [[work:cosmere/tress-of-the-emerald-sea|Tress of the Emerald Sea]],
    [[work:cosmere/yumi-and-the-nightmare-painter|Yumi and the Nightmare Painter]],
    [[work:cosmere/the-sunlit-man|The Sunlit Man]] - while
    [[work:cosmere/the-lost-metal|The Lost Metal]] ends the second Mistborn era and
    [[work:cosmere/wind-and-truth|Wind and Truth]] closes the first arc of the
    Stormlight Archive.
