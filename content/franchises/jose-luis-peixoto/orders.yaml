# Additional reading orders. There are none on record.
#
# Every one of the eleven novels carries subseries: null in works.yaml - no
# publisher-numbered trilogy or named grouping exists to give an order a
# spine, unlike João Tordo's Trilogia dos Lugares Sem Nome (publisher
# 1-2-3) or Valter Hugo Mãe's two author-named tetralogies. Quetzal, his
# publisher since 2007, groups nothing across his catalogue beyond issuing
# the books.
#
# The one same-year publication - Morreste-me (self-published author
# edition, May 2000, 500 copies) and Nenhum Olhar (Temas e Debates, 2000,
# Prémio José Saramago 2001) - is the only tie the derived order leaves
# arbitrary. A curated order exists to settle exactly this kind of tie
# (agatha-christie/poirot-novels resolves five), but one pair in an
# eleven-novel spine is a single adjacent swap, not a reading experience a
# reader can feel; it does not clear the divergence test on its own.
#
# No entry-point consensus is on record either. Peixoto's interviews run
# biographical and craft-focused rather than reader-facing "start here"
# guidance, and no Portuguese bookshop or critic's reading guide answering
# that question was found. One Brazilian aggregator site names Morreste-me
# and A Criança em Ruínas as an easier entry, but the same page misdates
# Em teu Ventre's genre as "Mistério" and its author as "Desconhecido" -
# unreliable enough on its own subject that it is not used as a source for
# anyone else's.
[]
