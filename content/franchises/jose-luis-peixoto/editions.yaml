# Portuguese editions - the actual books a Portuguese reader buys.
#
# Peixoto writes in Portuguese, so there is nothing to translate: every work's
# `title` in works.yaml IS the published Portuguese title. Per SCHEMA.md the
# `title` field is therefore OMITTED throughout - repeating it would duplicate
# the work title rather than record a genuinely different published title.
#
# Quetzal Editores (LeYa group) holds the rights to almost the entire
# backlist and keeps reissuing it: every core novel and all but two of the
# extended works below are Quetzal's own current printing, opened directly on
# quetzaleditores.pt (blocked live, so read via web.archive.org - see
# CURATION.md's trap registry) and matched on ISBN, binding ("Capa mole" ->
# paperback, "Capa dura" -> hardcover), print month and page count. Quetzal
# has used two successive ISBN prefix ranges over time - 978-972-564-xxxx-x
# up to about 2012, 978-989-722-xxxx-x from about 2012 on - so a work's
# OpenLibrary record sometimes lists an older Quetzal print run under a
# different ISBN than the one recorded here; that is a prior printing, not a
# disagreement, and only the current printing is recorded (never a
# superseded reprint, per the "most recent in-print" default rule).
#
# 15 of the 24 entries below have their exact ISBN independently corroborated
# by OpenLibrary's own record for the same work (noted per entry); the
# remainder - mostly 2016+ printings OpenLibrary has not indexed yet - rest
# on Quetzal's own catalogue alone, the top-ranked source in the sourcing
# hierarchy. "Todos os Escritores..." is additionally cross-checked against
# the BNP catalogue. "Hoje Não" and "Estrangeiras" are not Quetzal titles;
# each is sourced to an independent retailer/bookseller record instead (Wook,
# Bertrand, Quetzal and Infopedia all blocked automated fetches throughout).
#
# COVERAGE: 24 of 27 works have a verified edition. The three without one are
# all theatre: Anátema, À Manhã and Quando o Inverno Chegar were staged (in
# Paris, and twice at Lisbon's Teatro São Luiz) but no book edition of any of
# them exists, so the app correctly shows no store link for them. No
# Brazilian (978-85/978-65)
# edition is recorded anywhere in this file, even though several works have
# one (e.g. "Livro", Companhia das Letras, ISBN 978-85-359-2019-2): a pt-BR
# printing is a different book with a different ISBN, per the region-strict
# language rule, and reissue history for prior Quetzal print runs is
# summarised above rather than recorded as separate editions.

