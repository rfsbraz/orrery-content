# FRANCHISE-SPECIFIC events. Author-LIFE events (birth, the prizes, the
# Moonspell collaboration) live on the author entity
# (content/authors/jose-luis-peixoto.yaml). This file holds the franchise's
# cultural weather.
#
# Kept franchise-scoped rather than moved to events/global.yaml for the same
# reason the valter-hugo-mae wing keeps its own copy of the same event:
# what a writer's death means to a given body of work is a per-author
# judgement, and Saramago's weight here is direct - he is the namesake of
# the prize that made Peixoto's career at 27, nine years before Peixoto
# published a novel built around him.

- id: peixoto-saramago-death-2010
  date: 2010-06-18
  title: Death of José Saramago
  scope: culture
  reach: franchise
  impact: med
  description: >
    Portugal's only Nobel laureate in literature dies on Lanzarote, nine
    years after the prize carrying his name made Peixoto its youngest-ever
    winner at 27. The nine years between were not just a namesake's prize:
    Peixoto has said the two travelled together, he was a guest in
    Saramago's home several times, and he took away advice and reflections
    from Saramago that stayed with him - "não concordo com tudo o que
    Saramago defendia, mas concordo com a convicção dele" (I don't agree
    with everything Saramago stood for, but I agree with his conviction).
    Saramago's own life and work later become the direct subject of
    [[work:jose-luis-peixoto/autobiografia|Autobiografia]] (2019), which
    fictionalises episodes from his life alongside a young writer's; Peixoto
    has said he would have found it intimidating to publish that book with
    Saramago still alive.
  spoilerAfter: null
  sources:
    - https://en.wikipedia.org/wiki/José_Saramago
    - https://www.tsf.pt/portugal/cultura/teria-sido-intimidante-escrever-este-livro-com-jose-saramago-vivo-11128116.html

- id: peixoto-cemiterio-francisco-lazaro
  date: 2006
  title: A marathon runner's death gives Cemitério de Pianos its second Francisco
  scope: culture
  reach: franchise
  impact: med
  description: >
    At the book's launch, Peixoto told Lusa that the character sharing the
    novel's central Francisco's name and part of his fate is drawn from
    Francisco Lázaro, the Portuguese marathon runner who collapsed and died
    of heatstroke after 30km of the 1912 Stockholm Olympics marathon, a death
    that shook the country at the time. Peixoto has said the character is
    only circumstantially based on the athlete, who "sempre me fascinou"
    (always fascinated me); he also built in a deliberate echo of the
    biblical Lazarus, raised from the dead and, like the novel's Francisco,
    given two sisters named Maria and Marta.
  note: >
    Sourced to the book's own October 2007 Portugal launch (RTP, quoting
    Peixoto via Lusa; Portuguese Wikipedia's own Cemitério de Pianos page
    agrees), one year later than this wing's works.yaml, which lists 2006.
    The Lázaro connection is jacket copy, not a reveal: Bloomsbury's own
    cover text for the English edition (The Piano Cemetery) names it
    outright, "Peixoto weaves the tragic true story of the marathon-runner,
    Francisco Lázaro, into a rich narrative of love, betrayal, domestic
    happiness and dashed hopes", and gives the family the surname Lázaro.
    That same jacket dates the Stockholm Olympics to 1908; they were 1912,
    which is the date used here.
  spoilerAfter: null
  sources:
    - https://www.rtp.pt/noticias/cultura/jose-luis-peixoto-lanca-cemiterio-de-pianos_n159118
    - https://pt.wikipedia.org/wiki/Cemitério_de_Pianos

- id: peixoto-coreia-do-norte-2012
  date: 2012-04
  title: A phone call home, and a scare that ends in a lost coat
  scope: culture
  reach: franchise
  impact: low
  description: >
    Travelling North Korea in April 2012 for [[work:jose-luis-peixoto/dentro-do-segredo|Dentro
    do Segredo]] - among the guides' fixed smiles, a confiscated phone
    returned only at the end of the trip, and photographs he was told not to
    take but took anyway - Peixoto has described the one time real fear
    caught up with him: after phoning his children in Portugal, who did not
    know their father was in North Korea, and mailing a postcard, hotel
    staff summoned him to reception over the postcard's sending point. He
    braced for trouble. They only wanted to know if a forgotten coat was
    his.
  spoilerAfter: null
  sources:
    - https://visao.pt/atualidade/cultura/2013-04-10-jose-luis-peixoto-na-des-conhecida-coreia-do-norte-2/
