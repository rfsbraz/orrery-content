  title: "A Criança em Ruínas"
  authorIds: [jose-luis-peixoto]
  published: 2001
  subseries: null
  canonTier: extended
  synopsis: >
    Peixoto's poetry debut, reissued several times since first publication.
    Won the Prémio da Sociedade Portuguesa de Autores in 2013 for the best
