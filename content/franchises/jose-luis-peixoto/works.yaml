  title: "Regresso a Casa"
  authorIds: [jose-luis-peixoto]
  published: 2020
  subseries: null
  canonTier: extended
  synopsis: >
    A poetry collection; no further thematic detail is recorded here.
  sources:
    - https://pt.wikipedia.org/wiki/José_Luís_Peixoto

# --- Travel literature ---

- id: jose-luis-peixoto/dentro-do-segredo
  title: "Dentro do Segredo"
  authorIds: [jose-luis-peixoto]
  published: 2012
  subseries: null
  canonTier: extended
  synopsis: >
    A travel narrative from April 2012, when Peixoto was among the foreign
    observers admitted to North Korea for the centennial of Kim Il-sung's
    birth, taken on one of the longest tours the regime had authorised in
    decades, through places closed to outsiders for sixty years.
  sources:
    - https://pt.wikipedia.org/wiki/José_Luís_Peixoto

- id: jose-luis-peixoto/o-caminho-imperfeito
  title: "O Caminho Imperfeito"
  authorIds: [jose-luis-peixoto]
  published: 2017
  subseries: null
  canonTier: extended
  synopsis: >
    A travel narrative that opens as a journey through Thailand beyond its
    tourist circuit and turns into something closer to an investigation
    after a discovery of dismembered human remains at a Bangkok post
    office. Illustrated throughout by Hugo Makarov.
  sources:
    - https://pt.wikipedia.org/wiki/José_Luís_Peixoto

- id: jose-luis-peixoto/onde
  title: "Onde"
  authorIds: [jose-luis-peixoto]
  published: 2022
  subseries: null
  canonTier: extended
  synopsis: >
    Fragments of poetic prose mapping the municipalities of Abrantes,
    Constância and Sardoal - a literary itinerary through the territory of
    poets António Botto, Camões and Gil Vicente rather than a plotted
    narrative.
  note: >
    Portuguese Wikipedia's own bibliography files this under "Ficção", but
    the publisher's and press's own description (a "roteiro literário" of
    poetic-prose fragments, no characters or plot) reads as travel writing
    rather than a novel, so it is tiered and grouped here instead.
  sources:
    - https://pt.wikipedia.org/wiki/José_Luís_Peixoto

