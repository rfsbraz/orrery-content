- id: jose-luis-peixoto/cemiterio-de-pianos
  title: "Cemitério de Pianos"
  authorIds: [jose-luis-peixoto]
  published: 2006
  subseries: null
  canonTier: core
  synopsis: >
    A novel that moves between a Lisbon piano workshop in the early
    twentieth century and a marathon runner decades later, threading one
    family's losses through Portugal's own history. Published in English as
    The Piano Cemetery (Bloomsbury); won Spain's Premio Cálamo Otra Mirada
    in 2007 for the year's best foreign novel published there.
  note: >
    Dated 2006, against the Portuguese Wikipedia article's own prose, which
    says the book was launched in October 2007. That article contradicts
    itself: its infobox gives Bertrand, 2006, ISBN 972-25-1534-9. OpenLibrary
    records a first publication of 2006 with Bertrand Editora among the
    publishers, so 2006 stands and the 2007 sentence is the outlier.
  images:
    cover: "https://covers.openlibrary.org/b/id/10436450-L.jpg"
    coverCredit: "Open Library"
    coverSource: "https://openlibrary.org/works/OL16606078W"
    # Jacket pictured is the Clipper (UK) English edition, "The Piano
    # Cemetery" - Open Library holds no cover for a Portuguese printing.
  sources:
    - https://pt.wikipedia.org/wiki/José_Luís_Peixoto
    - https://en.wikipedia.org/wiki/José_Luís_Peixoto
    - https://openlibrary.org/search.json?q=cemiterio+de+pianos+peixoto

