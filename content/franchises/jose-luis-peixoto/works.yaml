- id: jose-luis-peixoto/a-casa-a-escuridao
  title: "A Casa, a Escuridão"
  authorIds: [jose-luis-peixoto]
  published: 2002
  subseries: null
  canonTier: extended
  synopsis: >
    Peixoto's second poetry collection, published the same year as the
    similarly titled novel [[work:jose-luis-peixoto/uma-casa-na-escuridao|Uma
    Casa na Escuridão]] and read as its poetic counterpart: chapters that
    track a relationship from its first stirrings to its ending.
  sources:
    - https://pt.wikipedia.org/wiki/José_Luís_Peixoto

- id: jose-luis-peixoto/gaveta-de-papeis
  title: "Gaveta de Papéis"
  authorIds: [jose-luis-peixoto]
  published: 2008
  subseries: null
  canonTier: extended
  synopsis: >
    A poetry collection. Won the Prémio de Poesia Daniel Faria in 2008,
    awarded to the best poetry book published in Portugal by a poet under
    35.
  sources:
    - https://en.wikipedia.org/wiki/José_Luís_Peixoto

