- id: jose-luis-peixoto/autobiografia
  title: "Autobiografia"
  authorIds: [jose-luis-peixoto]
  published: 2019
  subseries: null
  canonTier: core
  synopsis: >
    A metafictional novel in which a young writer in 1990s Lisbon
    repeatedly crosses paths with José Saramago, blending real episodes
    from Saramago's life with invented ones. Peixoto's own career was
    launched by the prize carrying Saramago's name.
  note: >
    Quetzal's own synopsis presents the premise (Saramago turned into a
    character, a novel called Autobiografia) and then withholds where it
    goes: "uma surpreendente proposta narrativa que, a partir de certo
    ponto, não se imagina como poderá terminar". The publisher's framing of
    the younger writer's stance toward the master is "admiração e um
    incontrolável repúdio", not homage, so the synopsis here names the
    relationship without characterising it.
    Source: https://www.quetzaleditores.pt/produtos/ficha/autobiografia/21332193
    (via web.archive.org, 2019-11-20 capture; the live page 403s).
  images:
    cover: "https://covers.openlibrary.org/b/id/10533713-L.jpg"
    coverCredit: "Open Library"
    coverSource: "https://openlibrary.org/works/OL20905527W"
  sources:
    - https://pt.wikipedia.org/wiki/José_Luís_Peixoto
    - https://en.wikipedia.org/wiki/José_Luís_Peixoto

- id: jose-luis-peixoto/almoco-de-domingo
  title: "Almoço de Domingo"
  authorIds: [jose-luis-peixoto]
  published: 2021
  subseries: null
  canonTier: core
  synopsis: >
    A biographical novel spanning 1931 to 2021, built around the life of Rui
    Nabeiro, the founder of Delta Cafés, as he revisits his own memories.
  note: >
    The book's subject is publicly known and Peixoto has discussed him by
    name, but in the novel itself the surname is withheld: he told Visão he
    left it out so the character could stand as exemplary rather than as one
    named businessman. This entry names him plainly enough to say what the
    book is, and stops short of the full "Manuel Rui Azinhais Nabeiro" the
    novel deliberately avoids.
  images:
    cover: "https://covers.openlibrary.org/b/id/13724374-L.jpg"
    coverCredit: "Open Library"
    coverSource: "https://openlibrary.org/works/OL32086650W"
  sources:
    - https://pt.wikipedia.org/wiki/José_Luís_Peixoto

- id: jose-luis-peixoto/a-montanha
  title: "A Montanha"
  authorIds: [jose-luis-peixoto]
  published: 2025
  subseries: null
  canonTier: core
  synopsis: >
    A novel gathering six strangers - Jorge, Fátima, Alice, João, Daniel
    and Filipe, drawn from as far afield as Mozambique and Venezuela - who
    meet in the waiting room of Porto's Instituto Português de Oncologia,
    bound only by illness.
  note: >
    Quetzal's own synopsis carries a second movement this entry stops short
    of: a writer travelling the world tries to build a novel out of the
    stories entrusted to him, "até que o impensável acontece". The publisher
    names the turn without disclosing it, and the synopsis here holds to the
    premise for the same reason. The novel's relation to the author's own
    father, a framing the press proposes and he declines, is not a premise
    fact and is not stated here.
    Source: https://www.quetzaleditores.pt/produtos/ficha/a-montanha/28076053
    (via web.archive.org, 2026-02-08 capture).
  # No cover: October 2025 is too recent for Open Library to have indexed a
  # cover, checked by both title search and by ISBN cover lookup
  # (9789897228919).
  sources:
    - https://pt.wikipedia.org/wiki/José_Luís_Peixoto

