  synopsis: >
    A Portuguese, a Brazilian and a Cape Verdean woman, trying to enter the
    United States, are held together for hours in an airport border-police
    room, and gradually reveal what each thinks of the others and of her own
    country: a play about the shared and divided spaces of one language
    spread across the world. A Teatro Municipal do Porto coproduction
    directed by João Branco, premiered 8-9 July 2016 at the Rivoli's small
    auditorium, then staged in Brazil and Cape Verde; published as a book by
    Rosa de Porcelana.
