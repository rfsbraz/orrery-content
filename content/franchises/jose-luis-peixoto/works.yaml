- id: jose-luis-peixoto/onde
  title: "Onde"
  authorIds: [jose-luis-peixoto]
  published: 2022
  subseries: null
  canonTier: extended
  synopsis: >
    Fragments of poetic prose mapping the municipalities of Abrantes,
    Constância and Sardoal - a literary itinerary through the territory of
    poets António Botto, Camões and Gil Vicente rather than a plotted
    narrative.
  note: >
    Portuguese Wikipedia's own bibliography files this under "Ficção", but
    the publisher's and press's own description (a "roteiro literário" of
    poetic-prose fragments, no characters or plot) reads as travel writing
    rather than a novel, so it is tiered and grouped here instead. The
    author's own bibliography page agrees it is not a "Romance": it tags
    "Onde" as "Narrativa", the only title on that page not sorted into either
    his novels or his two other travel books ("Viagens").
  # No cover: not indexed by Open Library (checked by title search and by
