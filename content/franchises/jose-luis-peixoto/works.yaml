# Bibliography (Works) - the abstract books; editions/covers are separate.
# IDs are STABLE and permanent (user data references them). Titles are the
# ORIGINAL PORTUGUESE (canonical); prose/synopses are in English.
#
# Cross-checked against Portuguese and English Wikipedia (both fetched
# directly; the two lists agree on every date but one, noted below),
# Portal da Literatura's bibliography, and, for individual titles, the
# publisher/venue page cited on that entry.
#
# canonTier convention for this franchise:
#   core      - the 11 novels: the narrative-fiction spine the prizes and
#               "Principais trabalhos" tag on Wikipedia's own infobox are
#               built from.
#   extended  - poetry (4 books), travel writing (3, including "Onde" - see
#               its own note), children's literature (2), theatre (3), the
#               one short-story chapbook (Hoje Não), the one mixed
#               collection (Cal), and the one crónicas collection (Abraço).
#               Genuinely his, off the novel-reading spine.
# No apocrypha entries: no anthology contribution or introduction-only credit
# is recorded. Poetry anthologies containing single poems by him, if any
# exist, are not recorded here.
#
# DATE NOTE: "Cal" is dated 2007 by both Portuguese Wikipedia and its own
# publisher/bookshop listings; English Wikipedia alone gives 2008. The two
# agreeing sources are followed here.
#
# NOT INCLUDED: periodical crónicas for the Jornal de Letras, Visão, GQ,
# Time Out and Notícias Magazine that were never gathered into a book beyond
# what "Abraço" (2011) already collects - no single dated volume exists for
# the rest to anchor an entry to. No pen name is used; "authorRole" is
# "author" throughout. Illustrators credited on children's and travel books
# (Daniel Silvestre da Silva, Hugo Makarov) are named in the synopsis text
# only, not modelled as authorIds or withAuthorIds: they illustrate rather
# than co-write the text.

# --- Novels ---

- id: jose-luis-peixoto/morreste-me
  title: "Morreste-me"
  authorIds: [jose-luis-peixoto]
  published: 2000
  subseries: null
  canonTier: core
  synopsis: >
    Peixoto's debut: a collection of interlinked fictions confronting the
    death of a father, the loss he has said made the rest of his books
    possible. Tagged "magnum opus" on his own Wikipedia infobox despite
    being the earliest book on the shelf.
  sources:
    - https://pt.wikipedia.org/wiki/José_Luís_Peixoto
    - https://en.wikipedia.org/wiki/José_Luís_Peixoto

- id: jose-luis-peixoto/nenhum-olhar
  title: "Nenhum Olhar"
  authorIds: [jose-luis-peixoto]
  published: 2000
  subseries: null
  canonTier: core
  synopsis: >
    A novel set in a nameless Alentejo village, following generations bound
    to the same land across an elastic, unnamed span of time. Won the
    Prémio José Saramago in 2001, the youngest winner in the prize's
    history at 27; published in English as Blank Gaze (UK, Bloomsbury) and
    The Implacable Order of Things (US, Doubleday).
  sources:
    - https://pt.wikipedia.org/wiki/José_Luís_Peixoto
    - https://en.wikipedia.org/wiki/José_Luís_Peixoto

- id: jose-luis-peixoto/uma-casa-na-escuridao
  title: "Uma Casa na Escuridão"
  authorIds: [jose-luis-peixoto]
  published: 2002
  subseries: null
  canonTier: core
  synopsis: >
    An allegorical novel built around a house consumed by an encroaching
    darkness, part of the more fable-like strand of Peixoto's fiction rather
    than the directly rural one. Published the same year as the poetry
    collection [[work:jose-luis-peixoto/a-casa-a-escuridao|A Casa, a
    Escuridão]], its similarly-titled poetic counterpart.
  sources:
    - https://pt.wikipedia.org/wiki/José_Luís_Peixoto
    - https://en.wikipedia.org/wiki/José_Luís_Peixoto

- id: jose-luis-peixoto/antidoto
  title: "Antídoto"
  authorIds: [jose-luis-peixoto]
  published: 2003
  subseries: null
  canonTier: core
  synopsis: >
    A novella of interlinked stories about love and death, written as the
    literary twin of Moonspell's album The Antidote: each song pairs with a
    chapter, and Peixoto worked through the record's own composition
    alongside the band. Book and album were released together.
  sources:
    - https://en.wikipedia.org/wiki/The_Antidote_(Moonspell_album)
    - https://pt.wikipedia.org/wiki/José_Luís_Peixoto

- id: jose-luis-peixoto/cemiterio-de-pianos
  title: "Cemitério de Pianos"
  authorIds: [jose-luis-peixoto]
  published: 2006
  subseries: null
  canonTier: core
  synopsis: >
    A novel that moves between a Lisbon piano workshop in the early
    twentieth century and a marathon runner decades later, threading one
    family's losses through Portugal's own history. Published in English as
    The Piano Cemetery (Bloomsbury); won Spain's Premio Cálamo Otra Mirada
    in 2007 for the year's best foreign novel published there.
  sources:
    - https://pt.wikipedia.org/wiki/José_Luís_Peixoto
    - https://en.wikipedia.org/wiki/José_Luís_Peixoto

- id: jose-luis-peixoto/livro
  title: "Livro"
  authorIds: [jose-luis-peixoto]
  published: 2010
  subseries: null
  canonTier: core
  synopsis: >
    A novel of Portuguese emigration to France in two parts: a rural
    village and its inhabitants, including the love story of Ilídio and
    Adelaide, and a second generation raised in Paris carrying the village
    forward into a post-Salazar world. Won Italy's Premio Salerno Libro
    d'Europa for the best European novel.
  sources:
    - https://pt.wikipedia.org/wiki/José_Luís_Peixoto
    - https://en.wikipedia.org/wiki/José_Luís_Peixoto

- id: jose-luis-peixoto/galveias
  title: "Galveias"
  authorIds: [jose-luis-peixoto]
  published: 2014
  subseries: null
  canonTier: core
  synopsis: >
    Set in Peixoto's own birthplace in January and September 1984, opening
    when a fallen celestial body craters the ground outside the village and
    leaves a smell of sulphur in the air, the food and the villagers
    themselves. Won the Oceanos prize in 2016; the first Portuguese-language
    novel translated and published in Georgia (2017), and winner of Japan's
    Best Translation Award in 2019.
  sources:
    - https://pt.wikipedia.org/wiki/José_Luís_Peixoto
    - https://en.wikipedia.org/wiki/José_Luís_Peixoto

- id: jose-luis-peixoto/em-teu-ventre
  title: "Em Teu Ventre"
  authorIds: [jose-luis-peixoto]
  published: 2015
  subseries: null
  canonTier: core
  synopsis: >
    A novel built around the 1917 Marian apparitions at Fátima, narrated
    through the mother of Lúcia, the eldest of the three shepherd children
    who reported them, weaving that religious history with a study of
    motherhood.
  sources:
    - https://pt.wikipedia.org/wiki/José_Luís_Peixoto
    - https://en.wikipedia.org/wiki/José_Luís_Peixoto

- id: jose-luis-peixoto/autobiografia
  title: "Autobiografia"
  authorIds: [jose-luis-peixoto]
  published: 2019
  subseries: null
  canonTier: core
  synopsis: >
    A metafictional novel in which a young writer in 1990s Lisbon
    repeatedly crosses paths with José Saramago, blending real episodes
    from Saramago's life with invented ones - Peixoto's own tribute to the
    writer whose prize made his career.
  sources:
    - https://pt.wikipedia.org/wiki/José_Luís_Peixoto
    - https://en.wikipedia.org/wiki/José_Luís_Peixoto

- id: jose-luis-peixoto/almoco-de-domingo
  title: "Almoço de Domingo"
  authorIds: [jose-luis-peixoto]
  published: 2021
  subseries: null
  canonTier: core
  synopsis: >
    A biographical novel spanning 1931 to 2021, built around the life of
    Manuel Rui Azinhais Nabeiro, the founder of Delta Cafés, as he
    revisits his own memories.
  sources:
    - https://pt.wikipedia.org/wiki/José_Luís_Peixoto

- id: jose-luis-peixoto/a-montanha
  title: "A Montanha"
  authorIds: [jose-luis-peixoto]
  published: 2025
  subseries: null
  canonTier: core
  synopsis: >
    A novel gathering six strangers - Jorge, Fátima, Alice, João, Daniel
    and Filipe, drawn from as far afield as Mozambique and Venezuela - who
    meet in the waiting room of Porto's Instituto Português de Oncologia,
    bound only by illness.
  sources:
    - https://pt.wikipedia.org/wiki/José_Luís_Peixoto

# --- Crónicas ---

- id: jose-luis-peixoto/abraco
  title: "Abraço"
  authorIds: [jose-luis-peixoto]
  published: 2011
  subseries: null
  canonTier: extended
  synopsis: >
    Peixoto's crónicas: 162 short newspaper columns written between 2001
    and 2011, collected into a single 655-page volume covering childhood,
    the Alentejo, fatherhood, first loves and writing itself.
  sources:
