- id: jose-luis-peixoto/cal
  title: "Cal"
  authorIds: [jose-luis-peixoto]
  published: 2007
  subseries: null
  canonTier: extended
  synopsis: >
    A mixed collection built around old age and rural memory: three poems,
    seventeen short stories and a short play, gathered under a single
    theme rather than a single form.
  sources:
