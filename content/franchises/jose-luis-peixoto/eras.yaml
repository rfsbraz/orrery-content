# Creative periods. There are none on record.
#
# Peixoto has published without interruption since 2000, moving between
# novels, poetry, theatre, chronicle and travel writing rather than through
# them in sequence. Neither he nor his critics divide that span into named
# periods, so no era is claimed here and the whole 2000-2025 shelf sits
# outside any era by design.
#
# Three framings come close enough to be worth recording, and each falls
# short for a different reason.
#
# Asked in 2011 whether Abraço closed a cycle, he agrees: "sim, este novo
# livro fecha um ciclo. Não porque abandone alguns temas que, se calhar, não
# tenho completamente resolvidos, mas também por fico com uma noção muito
# mais clara do que me falta dizer" (Correio da Manhã, on the author's site,
# https://www.joseluispeixoto.net/52928.html). He names no cycle, gives it no
# beginning, and two answers later says of his village and the Alentejo
# "ainda só comecei a escrever sobre o tema". A closing with nothing named
# that closes.
#
# The clearest candidate is proposed by Diário de Notícias on A Montanha
# (2025): a cycle on the father's death running from Morreste-me (2000) to
# that novel. Peixoto declines it in the same interview: "houve uma altura em
# que pensei que com este livro dizia tudo o que havia sobre esse tema, mas
# não sei se será assim", adding that of the books he has written "nenhum
# esgotou o seu tema" (https://www.dn.pt/cultura/o-romance-sobre-a-pior-doena).
# The periodisation is the interviewer's and the author refuses it.
#
# The Alentejo books (Nenhum Olhar 2000, Cal 2007, Galveias 2014) are a
# recurring setting, not a period: fifteen years apart, with every other kind
# of book he writes in between, and no source names them a cycle or trilogy.
# The travel books (Dentro do Segredo 2012, O Caminho Imperfeito 2017, Onde
# 2022) are recorded only as his "primeira incursão na literatura de viagens"
# and its successors, a strand running alongside the fiction rather than a
# phase replacing it.
[]
