# Recurring figures that thread the Cosmere's separate worlds together - the
# connective tissue behind the connections map. Kept to a tight roster of genuine
# worldhoppers, not a character wiki. Appearances whose very existence is a reveal
# carry spoilerAfter (the work whose experience the detail would damage).

- id: brandon-sanderson/hoid
  name: Hoid
  aka: ["Wit", "the King's Wit", "the storyteller"]
  description: >
    A mysterious, ageless traveller who turns up - often in disguise, as a beggar,
    an informant, a court jester or a wandering storyteller - across nearly every
    Cosmere world. Spotting him is the reader's first clue that these separate
    series share one universe.
  appearsIn:
    - workId: brandon-sanderson/elantris
      note: A messenger who delivers a pivotal warning.
    - workId: brandon-sanderson/the-final-empire
      note: A beggar on the street corners of Luthadel.
    - workId: brandon-sanderson/warbreaker
      note: A street-corner storyteller.
    - workId: brandon-sanderson/the-way-of-kings
      note: Appears openly as Wit, the king's acid-tongued jester.
    - workId: brandon-sanderson/words-of-radiance
    - workId: brandon-sanderson/oathbringer
    - workId: brandon-sanderson/rhythm-of-war
    - workId: brandon-sanderson/wind-and-truth
    - workId: brandon-sanderson/the-emperors-soul
    - workId: brandon-sanderson/the-alloy-of-law
    - workId: brandon-sanderson/tress-of-the-emerald-sea
      note: The novel's narrator.
    - workId: brandon-sanderson/the-sunlit-man
  sources:
    - https://en.wikipedia.org/wiki/Cosmere
    - https://coppermind.net/wiki/Hoid

- id: brandon-sanderson/khriss
  name: Khriss
  aka: ["Khrissalla"]
  description: >
    A scholar from the world of Taldain who studies the Cosmere's magic systems
    and travels between worlds to do it. Her in-universe essays are the reader's
    guided tour of how the shared universe actually works.
  appearsIn:
    - workId: brandon-sanderson/white-sand
      note: A central figure in the Taldain story.
    - workId: brandon-sanderson/arcanum-unbounded
      note: The unnamed scholar whose essays annotate each world in the collection.
  sources:
    - https://coppermind.net/wiki/Khriss

- id: brandon-sanderson/nazh
  name: Nazh
  description: >
    An agent who collects maps, documents and artifacts from across the worlds for
    Khriss. His clipped annotations turn up in the margins of in-world maps and
    papers, a quiet signature of the wider universe watching.
  appearsIn:
    - workId: brandon-sanderson/mistborn-secret-history
    - workId: brandon-sanderson/arcanum-unbounded
      note: Credited on several of the collection's world maps.
  sources:
    - https://coppermind.net/wiki/Nazh

- id: brandon-sanderson/kelsier
  name: Kelsier
  aka: ["the Survivor"]
  description: >
    The charismatic, scarred crewleader at the heart of the Mistborn saga's first
    era - a thief and revolutionary whose legend outgrows him.
  appearsIn:
    - workId: brandon-sanderson/the-final-empire
      note: Leader of the crew plotting to bring down the Final Empire.
    - workId: brandon-sanderson/mistborn-secret-history
      note: The novella's hidden vantage point.
      spoilerAfter: brandon-sanderson/the-hero-of-ages
    - workId: brandon-sanderson/the-lost-metal
      note: His reach extends into Scadrial's second era.
      spoilerAfter: brandon-sanderson/the-hero-of-ages
  sources:
    - https://coppermind.net/wiki/Kelsier

- id: brandon-sanderson/sigzil
  name: Sigzil
  description: >
    A worldwise member of Bridge Four in the Stormlight Archive - once apprenticed
    to a worldhopper, and more travelled than he lets on.
  appearsIn:
    - workId: brandon-sanderson/the-way-of-kings
      note: A bridgeman with a scholar's bent.
    - workId: brandon-sanderson/words-of-radiance
    - workId: brandon-sanderson/oathbringer
    - workId: brandon-sanderson/rhythm-of-war
    - workId: brandon-sanderson/the-sunlit-man
      note: The identity of this novel's hunted protagonist.
      spoilerAfter: brandon-sanderson/the-sunlit-man
  sources:
    - https://coppermind.net/wiki/Sigzil
