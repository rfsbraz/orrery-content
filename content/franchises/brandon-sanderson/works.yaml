# Bibliography (Works) - the abstract books; editions/covers are separate metadata.
# IDs are STABLE and permanent (user data references them). Dates are year-precision
# unless a source states a full date. The default reading order (all works in
# publication order) is DERIVED from this file - so completeness is the goal.
#
# Coverage: Brandon Sanderson's complete published bibliography. The Cosmere
# section: all Cosmere novels (Elantris, Mistborn Era 1 + Era 2, the Stormlight
# Archive, Warbreaker, the 2023 Secret Projects, Wind and Truth, Isles of the
# Emberdark), the significant novellas, the Arcanum Unbounded collection, the
# White Sand graphic novels (extended), and minor short fiction (apocrypha).
# The non-Cosmere sections: the Skyward and Reckoners series, the Alcatraz
# books, the Legion novellas, The Rithmatist, The Frugal Wizard's Handbook,
# the standalone novellas and audio originals, the licensed tie-ins, the
# Tailored Realities collection, and the short-fiction and anthology tail.
#
# Deliberately NOT here: Sanderson's three Wheel of Time completion volumes
# (The Gathering Storm 2009, Towers of Midnight 2010, A Memory of Light 2013).
# A work lives in exactly one franchise, and a continued universe belongs to
# its originating author, so they are catalogued in the wheel-of-time
# franchise as works with withAuthorIds: [brandon-sanderson]. His author bio
# carries the cross-reference.

