    series began. The publisher markets it as the sixth and final Alcatraz
    book. Its jacket copy opens by narrating how [[work:brandon-sanderson/the-dark-talent|The
    Dark Talent]] ends, in detail, including a death; the synopsis here is
    written around that, because The Dark Talent's own copy stops short of its
    outcome. Do not lift the Bastille blurb wholesale.
  sources:
    - "https://en.wikipedia.org/wiki/Brandon_Sanderson_bibliography"
    - "https://www.isfdb.org/cgi-bin/ea.cgi?32726"

