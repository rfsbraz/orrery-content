- id: brandon-sanderson/way-of-kings-prime-rewrite-2009
  date: 2009
  dateRange: "2002-2010"
  title: The Way of Kings is thrown out and rewritten from scratch
  scope: industry
  reach: franchise
  impact: high
  description: >
    Sanderson finishes a complete draft of The Way of Kings in 2002, meaning
    it as his calling card to the fantasy genre. Tor is interested in it
    alongside [[work:brandon-sanderson/elantris|Elantris]] in 2003, but Sanderson pulls
    it back himself, judging that "something wasn't quite right." He shelves
    it through the first Mistborn trilogy, and only in the late 2000s does he
    return to it, discarding the manuscript and starting on page one again
    with a reworked lead character. The abandoned 2002 draft, later titled
    The Way of Kings Prime, is eventually given away free to readers; the
    rebuilt novel publishes in 2010.
  spoilerAfter: null
  sources:
    - https://www.theguardian.com/books/2020/jul/23/brandon-sanderson-after-a-dozen-rejected-novels-you-think-maybe-this-isnt-for-you
    - https://www.brandonsanderson.com/the-way-of-kings-prime/

- id: brandon-sanderson/arcanum-unbounded-2016
  date: 2016-11-22
  title: The Cosmere becomes explicit
  scope: culture
  reach: franchise
  impact: high
  description: >
    [[work:brandon-sanderson/arcanum-unbounded|Arcanum Unbounded]] gathers short fiction from
    across the worlds and, crucially, adds an in-universe scholar's essays that
    map the shared universe for the first time. What had been a game of hidden
    cameos becomes a stated framework readers can follow deliberately.
  spoilerAfter: null
  sources: [https://en.wikipedia.org/wiki/Arcanum_Unbounded]

- id: brandon-sanderson/apocalypse-guard-pulled-skyward-2017
  date: 2017-11
  title: The Apocalypse Guard is pulled, and Skyward takes its place
  scope: industry
  reach: franchise
  impact: med
  description: >
    With a young-readers novel called The Apocalypse Guard slated for the
    following spring, Sanderson pulls it back weeks before its announcement
    tour, judging that "it needs more work." In its place he turns, in a
    "furious bout of writing," to an idea he had been circling since 2012: a
    girl-and-her-starfighter story that becomes
    [[work:brandon-sanderson/skyward|Skyward]]. The Apocalypse Guard itself stays
    unpublished.
  spoilerAfter: null
  sources:
    - https://www.brandonsanderson.com/blogs/blog/officially-announcing-skyward

- id: brandon-sanderson/year-of-sanderson-2023
  date: 2023
  title: The Year of Sanderson
  scope: industry
  reach: franchise
  impact: med
  description: >
    The novels funded by the 2022 Kickstarter ship across a single year at an
    unheard-of cadence, three of them Cosmere standalones -
    [[work:brandon-sanderson/tress-of-the-emerald-sea|Tress of the Emerald Sea]],
    [[work:brandon-sanderson/yumi-and-the-nightmare-painter|Yumi and the Nightmare Painter]]
    and [[work:brandon-sanderson/the-sunlit-man|The Sunlit Man]] - each opening a new corner
    of the universe.
  spoilerAfter: null
  sources: [https://www.brandonsanderson.com/]

- id: brandon-sanderson/stormlight-arc-one-closes-2024
  date: 2024-12-06
  title: The first Stormlight arc closes
  scope: industry
  reach: franchise
  impact: high
  description: >
    [[work:brandon-sanderson/wind-and-truth|Wind and Truth]] ends the first five-book arc of
    the Stormlight Archive, the Cosmere's central pillar, bringing a decade and a
    half of build-up to its first great resolution before a planned pause in the
    series.
  spoilerAfter: brandon-sanderson/rhythm-of-war
  sources: [https://en.wikipedia.org/wiki/Wind_and_Truth]

- id: brandon-sanderson/apple-tv-adaptation-deal-2026
  date: 2026-01-28
  title: Apple TV acquires the Cosmere's film and television rights
  scope: industry
  reach: franchise
  impact: high
  description: >
    Apple TV signs what trade press calls an unprecedented deal for the
    Cosmere's screen rights, with Mistborn eyed for feature films and The
    Stormlight Archive for television. Sanderson keeps rare authority over
    the adaptations: he will write, produce, consult and hold approvals, a
    level of creative control reporters compare favourably to what J.K.
    Rowling or George R.R. Martin have retained over their own adaptations.
  spoilerAfter: null
  sources:
    - https://www.hollywoodreporter.com/movies/movie-news/brandon-sandersons-mistborn-stormlight-archive-movie-tv-1236487271/
    - https://www.engadget.com/entertainment/streaming/apple-tv-signs-tv-and-movie-deal-for-brandon-sandersons-fantasy-books-130000797.html
