# Branding for the Cosmere wing (see Orrery CONCEPT §6 - the design law).
# Personality through a restrained system, NOT genre costume: an Investiture-
# inspired metallic palette, one modern display face, and a single signature.
# No dragons, no glowing runes, no fantasy kitsch - readability first.
preset: cosmere-metallic
palette:
  bg: "#0c0f16"       # deep cosmic near-black with a cool blue cast, not pure black
  surface: "#161b26"  # a hair lifted, for cards
  ink: "#e9ecf4"      # cool silver-white - high contrast, very readable
  muted: "#8b93a7"    # pewter grey, for metadata
  accent: "#c8a24a"   # restrained Investiture gold / brass, used sparingly
displayFace: spectral # a modern literary serif with a scholarly, cosmic calm; headings only
signature: filament   # a single thin luminous line threading the works, like a
                      # strand of Investiture or an orbit binding separate worlds
# The Cosmere shares its gold accent (#c8a24a), spectral display face and a
# fantasy-epic shelf position with robert-jordan - the two wings are linked in
# fact (Sanderson finished Jordan's series) as well as in genre, so they are
# the hardest pair in the catalogue to keep apart. Differentiated by material
# rather than mood: Sanderson's magic systems are famously rule-bound
# (Allomancy's fixed metal table, Investiture as a measurable force), so this
# wing is drawn as though documenting a mechanism - mineral, structural,
# engineered, the draughtsman's instrument - while Jordan (below) is drawn as
# thread. Motifs are pulled from the actual bibliography read in works.yaml:
# Mistborn's ash-choked Final Empire and Allomantic metals, the Wax and Wayne
# era's frontier industrial city, and Stormlight's highstorms and
# stormlight-charged gemstones on Roshar. No Shardblades, Shardplate or other
# in-world heraldry - those are props from the books' own covers, not the
# author's territory.
art:
  motifs:
    - ash falling like snow over a smoke-stained industrial skyline
    - a highstorm's leading edge crossing a stone plain, growth shut tight against it
    - crystalline growth in cross-section, gemstone veins cut through banded rock
    - an exploded mechanism diagram: gears, rails, a revolver's cylinder laid open
    - rows of small metal vials, filings and coins arranged for study, not spent
    - geological strata in a quarry or mineshaft wall, banded and exact
  atmosphere: >
    Cold, exact and instrumented - the calm of someone documenting a mechanism,
    not marvelling at magic. Ash-fall, storm-light and metal are held as
    measurable material fact rather than spectacle, in keeping with magic
    systems built on fixed, learnable law. Interiors are workshops, foundries,
    mineshafts and drafting rooms; exteriors are quarries, storm-scoured
    plains and industrial skylines under falling ash.
  lineCharacter: >
    Fine, ruled or near-ruled linework with diagrammatic clarity, drawn as if
    by a draughtsman's instrument rather than a hand. Hard, confident edges
    and orthographic, cross-section framing are permitted here alone among
    the wings - the opposite instinct from a tremulous dip pen.
  backgroundTexture: >
    Pale drafting vellum or blueprint-grade paper with a faint printed grid,
    the tone and grain of a technical plate rather than laid paper fibre -
    cool and smooth, not warm and woven.
  accentUse: >
    Brass-gold on exactly one element per image, never a fill or a wash: a
    single rivet, a calibration mark, or the graduated edge of a measuring
    instrument.
  avoid:
    - Shardblades, Shardplate or any weapon/armour prop reproduced from the books
    - glowing runes, magic-glow effects, molten or radiant light as spectacle
    - crowns, thrones and generic epic-fantasy poster trims
    - woven, braided or textile textures, and curved decorative border logic
    - Aes Sedai rings, banners or any Wheel of Time heraldry bleeding into this wing
    - gold used as a wash, fill or glow rather than one exact instrument mark
notes: >
  The Cosmere is many worlds under one quiet cosmology, so the design is one
  restrained system, not a costume per planet. Cool cosmic near-black paper,
  silver type, a single brass Investiture accent for links and markers only. The
  filament is the one bold move - a thin luminous strand the separate series are
  strung along - echoing the shared universe. Everything else stays calm and
  readable; a curator tunes the exact hues.
