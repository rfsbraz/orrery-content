# Creative periods - the narrative spine of the aura. These track Sanderson's
# arc as a writer, not the Cosmere's internal timeline. Inline references use
# [[type:id|text]] and must resolve.
- id: brandon-sanderson/the-long-apprenticeship
  title: The Unpublished Years
  period: "1997-2004"
  themes: [trunk novels, hard magic, worldbuilding, the Cosmere conceived]
  provenance: author
  description: >
    Years of unpublished novels written around night-shift jobs and study at
    Brigham Young University. The rejections built a craft and, alongside it, the
    private cosmology the Cosmere books would later inhabit. The period ends when
    [[work:brandon-sanderson/elantris|Elantris]], the sixth of those drafts, sells to Tor
    and reaches print in 2005. Sanderson's own account of the stretch: "I
    basically spent my twenties writing, slavishly trying to figure out how to
    craft stories."
  note: >
    Retitled from "The Long Apprenticeship", which was our coinage and a verdict
    on the unpublished years. "Unpublished works" is Sanderson's own heading for
    these books on his FAQ, and the trunk-novel framing is his. The 1997 start
    is ours and probably a year or two late: his 2015 State of the Sanderson
    puts the first finished book at roughly 1996. The end was moved from 2005 to
    2004 to clear a pre-existing overlap: Elantris was published 21 April 2005,
    so 2005 belongs to the era that follows, not to the unpublished years.
  sources:
    - https://faq.brandonsanderson.com/knowledge-base/unpublished-works/
    - https://www.brandonsanderson.com/blogs/blog/state-of-the-sanderson-2015

- id: brandon-sanderson/debut-and-the-wheel-of-time
  title: Debut and the Wheel of Time Years
  period: "2005-2013"
  themes: [breakout, rule-bound magic systems, the shared universe seeded, dual workload]
  provenance: author
  description: >
    The foundations are laid fast: [[work:brandon-sanderson/elantris|Elantris]], the Mistborn
    trilogy ([[work:brandon-sanderson/the-final-empire|The Final Empire]] onward) and
    [[work:brandon-sanderson/warbreaker|Warbreaker]] establish Sanderson's signature of tight,
    consequential magic. Mid-decade, chosen to finish Robert Jordan's Wheel of
    Time, he writes at a punishing double pace - opening his own epic with
    [[work:brandon-sanderson/the-way-of-kings|The Way of Kings]] in 2010 while carrying
    Jordan's series through to its end in January 2013. The second career runs the
    whole way alongside it: the middle-grade
    [[work:brandon-sanderson/alcatraz-versus-the-evil-librarians|Alcatraz vs. the Evil
    Librarians]] from 2007, the [[work:brandon-sanderson/legion|Legion]] novellas from 2012,
    and in 2013 alone both [[work:brandon-sanderson/the-rithmatist|The Rithmatist]] and
    [[work:brandon-sanderson/steelheart|Steelheart]].
  note: >
    The shape is Sanderson's own framing: he dates his career from the
    publication of Elantris ("it's been twenty years since this all began with
    the publication of Elantris") and describes the first stretch as dominated
    by Wheel of Time work. The label is ours but purely descriptive. The end
    date was corrected from 2010 to 2013: the Wheel of Time work factually runs
    from Tor's announcement (7 December 2007) to A Memory of Light (January
    2013), and cutting at 2010 stranded half of it. The following era was
    re-cut to 2014 to remove the resulting overlap. The span holds the
    non-Cosmere debuts as well (Alcatraz 2007, Legion 2012, The Rithmatist and
    Steelheart 2013), so the label names the two dominant strands of the period
    and not the whole of what was published in it.
  sources:
    - https://www.brandonsanderson.com/blogs/blog/state-of-the-sanderson-2025
    - https://en.wikipedia.org/wiki/Brandon_Sanderson_bibliography

- id: brandon-sanderson/building-the-cosmere
  title: Building the Cosmere
  period: "2014-2020"
  themes: [the universe made explicit, novellas, deepening connections, peak Stormlight]
  provenance: none
  description: >
    Along one strand of these years the shared universe stops being a private
    game and becomes text: the Stormlight Archive grows into the tentpole
    ([[work:brandon-sanderson/words-of-radiance|Words of Radiance]],
    [[work:brandon-sanderson/oathbringer|Oathbringer]],
    [[work:brandon-sanderson/rhythm-of-war|Rhythm of War]]), the second Mistborn era runs on
    through [[work:brandon-sanderson/shadows-of-self|Shadows of Self]], a run of novellas
    fills the corners, and [[work:brandon-sanderson/arcanum-unbounded|Arcanum Unbounded]]
    maps the whole thing for readers. It is one strand of several: the same span
    carries the Reckoners to its end in
    [[work:brandon-sanderson/calamity|Calamity]] and opens the Skyward sequence with
    [[work:brandon-sanderson/skyward|Skyward]] and [[work:brandon-sanderson/starsight|Starsight]].
  note: >
    UNSOURCED as a period - recommended for removal. No source outside this repo
    periodises a "Building the Cosmere" phase: searched in English across
    Sanderson's own site and State of the Sanderson posts, his FAQ, the
    Wikipedia bibliography, the Coppermind and general press, and the only
    phase-language found is one blogger's Marvel-style "Phase 1 / Phase 2"
    analogy, which is one reader's scheme rather than settled usage. The
    periodisation is ours. It is also now the narrowest era in a wing that
    covers a whole career rather than one universe: 2014-2020 contains Firefight,
    Calamity, Skyward, Starsight, Snapshot and The Original, none of which the
    title describes. The description was rescoped to say plainly that the
    Cosmere thread is one strand of the period; the title was left alone because
    every career-wide alternative would be a fresh coinage, and removing an era
    changes what a reader meets on a full-bleed plate. Both boundaries were ours
    too, and the original 2011 start was demonstrably arbitrary (it placed The
    Way of Kings, the era's obvious anchor, outside it, and A Memory of Light
    inside it); re-cut to 2014-2020 so it begins after the Wheel of Time work
    ends and stops overlapping the era before it. Dropping it leaves 2014-2020
    with no era plate, which is a legitimate outcome: gaps between sourced eras
    are honest.
  sources:
    - https://en.wikipedia.org/wiki/Brandon_Sanderson_bibliography

- id: brandon-sanderson/the-dragonsteel-era
  title: The Dragonsteel Era
  period: "2021-present"
  themes: [self-publishing, record crowdfunding, standalones, closing arcs]
  provenance: publishing
  description: >
    Sanderson builds his career around his own company, announcing in 2021 that
    "we have rebranded and are now Dragonsteel Books". The 2022 record-breaking
    Kickstarter yields the 2023 "Year of Sanderson" standalones -
    [[work:brandon-sanderson/tress-of-the-emerald-sea|Tress of the Emerald Sea]],
    [[work:brandon-sanderson/yumi-and-the-nightmare-painter|Yumi and the Nightmare Painter]],
    [[work:brandon-sanderson/the-sunlit-man|The Sunlit Man]] - while
    [[work:brandon-sanderson/the-lost-metal|The Lost Metal]] ends the second Mistborn era and
    [[work:brandon-sanderson/wind-and-truth|Wind and Truth]] closes the first arc of the
    Stormlight Archive. The other threads close in the same stretch:
    [[work:brandon-sanderson/cytonic|Cytonic]] and [[work:brandon-sanderson/defiant|Defiant]] finish
    Skyward, and [[work:brandon-sanderson/bastille-vs-the-evil-librarians|Bastille vs. the
    Evil Librarians]] returns to Alcatraz after six years.
  note: >
    The strongest-sourced era in this wing: a publishing-historical fact taken
    from Sanderson's own announcement of the Dragonsteel Books rebrand in his
    2021 State of the Sanderson. Worth knowing that the weight of evidence for
    the transition is really 2022, the year of the Kickstarter (185,341 backers,
    $41.7m) and of his own line "it's been an era of transitions for me"; 2021
    was kept because the rebrand is the named event. A commonly repeated 2016
    founding date for Dragonsteel Entertainment could not be verified and is not
    asserted here.
  sources:
    - https://www.brandonsanderson.com/blogs/blog/state-of-the-sanderson-2021
    - https://www.brandonsanderson.com/blogs/blog/state-of-the-sanderson-2022
