# FRANCHISE-SPECIFIC events only. Author-LIFE events (birth, marriages, the 1926
# disappearance, the dispensary war-work, the DBE, death) live on the author
# entity (content/authors/agatha-christie.yaml). Shared world events (the two
# World Wars) live in content/events/global.yaml. Inline [[type:id|text]] refs
# must resolve.

- id: golden-age-detective-fiction
  date: 1920
  dateRange: "1920-1939"
  title: The Golden Age of detective fiction
  scope: industry
  reach: franchise
  impact: high
  description: >
    The interwar boom in the fair-play puzzle mystery - the clued, solvable
    whodunit with a closed circle of suspects - which Christie both epitomised and
    outsold. The genre's conventions (the country house, the gathered suspects,
    the final drawing-room reveal) are the water her books swim in, and the bar
    every plot is measured against.
  spoilerAfter: null
  sources: [https://en.wikipedia.org/wiki/Golden_Age_of_Detective_Fiction]

- id: roger-ackroyd-breaks-the-rules
  date: 1926
  title: The Roger Ackroyd argument
  scope: culture
  reach: franchise
  impact: high
  description: >
    [[work:agatha-christie/the-murder-of-roger-ackroyd|The Murder of Roger
    Ackroyd]] makes Christie's name and starts the loudest quarrel of the
    Golden Age: critics and fellow novelists argue in print over what a
    fair-play mystery is allowed to do. The argument outlasts the book and
    carries into the codes the genre soon writes for itself, the Detection
    Club's oath among them. It is the point at which detective fiction begins
    examining its own rules in public.
  spoilerAfter: null
  sources: [https://en.wikipedia.org/wiki/The_Murder_of_Roger_Ackroyd]

- id: detection-club-founded-1930
  date: 1930
  title: The Detection Club is founded
  scope: industry
  reach: franchise
  impact: med
  description: >
    Christie is a founding member of the dining society of British mystery
    writers (with Sayers, Chesterton and others) whose half-serious oath bound
    members to fair-play plotting - no undisclosed clues, no divine intervention.
    She later served as its president. The club's rules are the code her best
    puzzles keep.
  spoilerAfter: null
  sources: [https://en.wikipedia.org/wiki/Detection_Club]

- id: vault-novels-sealed-1940s
  date: 1940
  dateRange: "1940-1945"
  title: Curtain and Sleeping Murder sealed in the vault
  scope: author-life
  reach: franchise
  impact: high
  description: >
    Expecting the Blitz might kill her, Christie writes two final cases -
    [[work:agatha-christie/curtain-poirots-last-case|Curtain]] for Poirot and
    [[work:agatha-christie/sleeping-murder|Sleeping Murder]] for Miss Marple - and
    deposits them in a bank vault by deed of gift, as an inheritance for her
    daughter and husband. They stay sealed for over thirty years and are released
    only at the very end of her life.
  spoilerAfter: null
  sources: [https://en.wikipedia.org/wiki/Curtain:_Poirot%27s_Last_Case]

- id: three-blind-mice-radio-1947
  date: 1947-05-30
  title: Three Blind Mice is broadcast for Queen Mary's 80th birthday
  scope: author-life
  reach: franchise
  impact: med
  description: >
    The BBC asks Christie, one of Queen Mary's favourite writers, for a
    half-hour radio play as part of an evening of programmes marking the
    Queen's 80th birthday. Three Blind Mice airs on the Light Programme on 30
    May 1947; its plot is drawn from a real 1945 case of a boy's death in an
    abusive foster home, and Christie donates her fee to a children's charity.
    She expands it into a stage play five years later, renamed at her
    son-in-law's suggestion - The Mousetrap.
  spoilerAfter: null
  sources:
    - https://en.wikipedia.org/wiki/Three_Blind_Mice_(radio_play_and_short_story)
    - https://en.wikipedia.org/wiki/The_Mousetrap

- id: fiftieth-book-jubilee-1950
  date: 1950
  title: A Murder Is Announced marketed as her fiftieth book
  scope: culture
  reach: franchise
  impact: med
  description: >
    [[work:agatha-christie/a-murder-is-announced|A Murder Is Announced]] is
    published in June 1950 and promoted as Christie's fiftieth book - a count
    that only works if UK and US short-story collections are added in.
    Contemporary reviewers run with the "jubilee" framing anyway: the
    Observer's critic writes that the Prime Minister, a fervent admirer, "might
    fittingly celebrate this jubilee by making her a Dame" - twenty-one years
    before she actually receives the DBE.
  spoilerAfter: null
  sources: [https://en.wikipedia.org/wiki/A_Murder_Is_Announced]

- id: mousetrap-opens-1952
  date: 1952-11-25
  title: The Mousetrap opens in the West End
  scope: culture
  reach: franchise
  impact: med
  description: >
    Christie's play, grown from a short story written for Queen Mary, opens in
    London and simply never closes - becoming the longest continuously running
    stage production in the world and a cultural institution in its own right,
    famous for the audience's vow never to reveal its ending.
  spoilerAfter: null
  sources: [https://en.wikipedia.org/wiki/The_Mousetrap]

- id: witness-for-the-prosecution-1953
  date: 1953-10-28
  dateRange: "1953-1955"
  title: Witness for the Prosecution opens on the West End
  scope: culture
  reach: franchise
  impact: med
  description: >
    Christie's stage adaptation of her short story "Traitor's Hands" opens at
    the Winter Garden Theatre, London, on 28 October 1953 and runs for two and
    a half years; a Broadway production follows in December 1954. In 1955 it
    wins the Mystery Writers of America's Edgar Award for best play, alongside
    her novels the clearest sign of how far her standing had travelled in
    thirty years.
  spoilerAfter: null
  sources: [https://en.wikipedia.org/wiki/Witness_for_the_Prosecution_(play)]
