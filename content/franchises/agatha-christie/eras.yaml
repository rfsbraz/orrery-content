# Creative periods - the narrative spine of the aura. Inline references use
# [[type:id|text]] and must resolve.

- id: the-styles-years
  title: The Styles Years
  period: "1920-1929"
  themes: [inventing Poirot, country-house murder, postwar adventure, the making of a name]
  provenance: none
  description: >
    From an unknown ex-dispensary nurse to a household name. Poirot arrives in
    [[work:agatha-christie/the-mysterious-affair-at-styles|The Mysterious Affair
    at Styles]], the Beresfords in [[work:agatha-christie/the-secret-adversary|The
    Secret Adversary]], and [[work:agatha-christie/the-murder-of-roger-ackroyd|The
    Murder of Roger Ackroyd]] detonates a twist that makes her famous and
    infamous at once. The decade closes with the collapse of her first marriage
    and the eleven-day disappearance of 1926.
  note: >
    UNSOURCED label. "The Styles Years" is our coinage - no source periodises
    Christie this way - though it is descriptive rather than evaluative, naming
    her debut novel. Beware a collision: Christie and Archie named their
    Sunningdale house "Styles" after the book, so the phrase can also read as
    the first-marriage years. The decade boundary is ours; the sourced facts
    near it are the 1926 disappearance, the 1928 divorce, and her 1926 contract
    with Collins. Note also that the received Golden Age of detective fiction
    covers these years too - see the next era's note.
  sources:
    - https://en.wikipedia.org/wiki/Agatha_Christie
    - https://en.wikipedia.org/wiki/Collins_Crime_Club

- id: the-golden-age
  title: The Golden Age
  period: "1930-1939"
  themes: [the perfect puzzle, exotic and archaeological settings, Marple arrives, fair-play plotting]
  provenance: critical
  description: >
    The decade critics place at the centre of what they call the Golden Age of
    detective fiction. Newly married to Max Mallowan and wintering on Middle
    East digs, she produces the run most often named when the term is used -
    [[work:agatha-christie/murder-on-the-orient-express|Murder on the Orient
    Express]], [[work:agatha-christie/the-abc-murders|The A.B.C. Murders]],
    [[work:agatha-christie/death-on-the-nile|Death on the Nile]] and
    [[work:agatha-christie/and-then-there-were-none|And Then There Were None]] -
    while [[work:agatha-christie/the-murder-at-the-vicarage|The Murder at the
    Vicarage]] introduces Miss Marple, opens her long run under the Collins
    Crime Club imprint, and the Detection Club (founded 1930) codifies the rules
    she loved to break.
  note: >
    RECEIVED LABEL, INVENTED BOUNDARY. "The Golden Age of detective fiction" is
    a genuinely received critical term, and the description now attributes it
    rather than asserting it. But every source found dates the Golden Age to the
    interwar years as a whole, roughly 1920-1939, not to the 1930s alone.
    Confining it to 1930-1939 implicitly tells a reader that
    [[work:agatha-christie/the-murder-of-roger-ackroyd|The Murder of Roger
    Ackroyd]] (1926) was not Golden Age, which contradicts the sources - the
    Open University course built on the term uses Ackroyd as its central
    example. The boundary was left unchanged because widening it would swallow
    the preceding era; a curator should decide whether to merge the two or keep
    the split and live with the mismatch.
  sources:
    - https://en.wikipedia.org/wiki/Golden_Age_of_Detective_Fiction
    - https://www.open.edu/openlearn/history-the-arts/agatha-christie-and-the-golden-age-detective-fiction/content-section-2.4
    - https://en.wikipedia.org/wiki/Collins_Crime_Club

- id: the-war-vault-years
  title: The War and the Vault
  period: "1940-1949"
  themes: [wartime England, poison and the dispensary, formal experiment, books written for the future]
  provenance: author
  description: >
    Back at a hospital dispensary through the Blitz, Christie writes prolifically
    and darkly: [[work:agatha-christie/five-little-pigs|Five Little Pigs]], the
    Ancient-Egyptian [[work:agatha-christie/death-comes-as-the-end|Death Comes as
    the End]], the spy-caper [[work:agatha-christie/n-or-m|N or M?]]. Fearing the
    bombs might kill her, she writes the two farewell novels -
    [[work:agatha-christie/curtain-poirots-last-case|Curtain]] and
    [[work:agatha-christie/sleeping-murder|Sleeping Murder]] - and locks them in a
    bank vault for her daughter and husband. In her own account she "had written
    an extra two books during the first years of the war".
  note: >
    The vault is Christie's own framing and is documented on her official site;
    the phrase "The War and the Vault" is ours, but descriptive rather than
    evaluative. Two caveats. John Curran, in "Agatha Christie's Secret
    Notebooks", argues Sleeping Murder was composed considerably later than the
    early 1940s, so the era's defining fact rests on a date the leading
    notebooks scholar contests. And the vault story's real terminus is 1975-76,
    when the two novels were finally published, not 1949. The decade boundary is
    ours.
  sources:
    - https://www.agathachristie.com/stories/sleeping-murder
    - https://en.wikipedia.org/wiki/Agatha_Christie

- id: the-postwar-plateau
  title: The Mousetrap Years
  period: "1950-1959"
  themes: [the jubilee book, village England, the stage, an institution at work]
  provenance: publishing
  description: >
    The decade opens with [[work:agatha-christie/a-murder-is-announced|A Murder
    Is Announced]], published in June 1950 and sold by Collins as her fiftieth
    book ("for the fiftieth time the Queen of detection defies her readers"),
    and turns on 25 November 1952, when The Mousetrap opens at the Ambassadors
    Theatre for what becomes the longest continuous run in theatre history.
    [[work:agatha-christie/crooked-house|Crooked House]] and
    [[work:agatha-christie/ordeal-by-innocence|Ordeal by Innocence]] were among
    her own favourites. She is now an institution who publishes a "Christie for
    Christmas" like clockwork.
  note: >
    Retitled from "The Postwar Plateau", which was our coinage AND a critical
    verdict the evidence contradicts. No settled critical framing of the 1950s
    as a plateau or a decline was found; what was found points the other way -
    the decade opens with her jubilee fiftieth book, reviewed strongly in the
    TLS ("the plot is as ingenious as ever, the writing more careful"), and
    contains the biggest commercial event of her life. The new title rests on a
    publishing and theatrical fact rather than a judgement. The decade boundary
    itself is still ours.
  sources:
    - https://en.wikipedia.org/wiki/The_Mousetrap
    - https://en.wikipedia.org/wiki/A_Murder_Is_Announced

- id: the-late-period
  title: The Late Period
  period: "1960-1976"
  themes: [the sixties intrude, ageing detectives, honours, the vault opens]
  provenance: none
  description: >
    The modern world unsettles the later books, and critics have been hard on
    the last of them - Robert Barnard called Postern of Fate "best (and easily)
    forgotten", and the Cambridge Guide to Women's Writing in English speaks of
    the "execrable last novels" - yet
    [[work:agatha-christie/endless-night|Endless Night]] proves the old command
    intact. Made a Dame in 1971, she finally releases the vaulted
    [[work:agatha-christie/curtain-poirots-last-case|Curtain]] in 1975, letting
    Poirot die in print months before she does; [[work:agatha-christie/sleeping-murder|Sleeping
    Murder]] follows just after her death in January 1976.
  note: >
    UNSOURCED as a period. "The Late Period" is a generic art-historical
    descriptor rather than a claimed Christie term, which makes it the least
    harmful of our coinages here. But no critic periodises a Christie late
    period beginning in 1960: the received framing is about "the last novels", a
    small terminal cluster with Postern of Fate (1973) as the collapse point,
    and a 2009 textual study locating a marked vocabulary decline in 1971-1974.
    Folding 1960 into the same era imports that verdict onto books nobody
    applies it to, so the description now attributes the criticism to its
    authors and scopes it to the last novels. A curator may prefer to cut this
    era at 1971.
  sources:
    - https://en.wikipedia.org/wiki/Postern_of_Fate
    - https://www.theguardian.com/books/2009/apr/03/agatha-christie-alzheimers-research
