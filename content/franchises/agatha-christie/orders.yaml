# ADDITIONAL canon orders only. The DEFAULT order - ALL published works in
# publication-chronological order - is derived automatically from works.yaml and
# is NOT listed here. These two are the series-filtered reading paths every
# Christie guide documents: the Poirot books and the Marple books each on their
# own, in publication order. Each references stable Work IDs only.

- id: agatha-christie/poirot-novels
  name: The Hercule Poirot novels, in order
  type: curated
  source: canon
  rationale: >
    All thirty-three Poirot novels in publication order - the standard way to
    read the series. Poirot cases stand alone, so strict order is optional, but
    reading forward lets the recurring cast (Hastings, Japp, Miss Lemon, Ariadne
    Oliver) and Poirot's own ageing land as intended. One rule is not optional:
    [[work:agatha-christie/curtain-poirots-last-case|Curtain]] is his farewell
    and must be read last - which publication order happens to honour, since
    Christie held it back to the very end.
  orderedWorkIds:
    - agatha-christie/the-mysterious-affair-at-styles
    - agatha-christie/the-murder-on-the-links
    - agatha-christie/the-murder-of-roger-ackroyd
    - agatha-christie/the-big-four
    - agatha-christie/the-mystery-of-the-blue-train
    - agatha-christie/peril-at-end-house
    - agatha-christie/lord-edgware-dies
    - agatha-christie/murder-on-the-orient-express
    - agatha-christie/three-act-tragedy
    - agatha-christie/death-in-the-clouds
    - agatha-christie/the-abc-murders
    - agatha-christie/murder-in-mesopotamia
    - agatha-christie/cards-on-the-table
    - agatha-christie/dumb-witness
    - agatha-christie/death-on-the-nile
    - agatha-christie/appointment-with-death
    - agatha-christie/hercule-poirots-christmas
    - agatha-christie/sad-cypress
    - agatha-christie/one-two-buckle-my-shoe
    - agatha-christie/evil-under-the-sun
    - agatha-christie/five-little-pigs
    - agatha-christie/the-hollow
    - agatha-christie/taken-at-the-flood
    - agatha-christie/mrs-mcgintys-dead
    - agatha-christie/after-the-funeral
    - agatha-christie/hickory-dickory-dock
    - agatha-christie/dead-mans-folly
    - agatha-christie/cat-among-the-pigeons
    - agatha-christie/the-clocks
    - agatha-christie/third-girl
    - agatha-christie/halloween-party
    - agatha-christie/elephants-can-remember
    - agatha-christie/curtain-poirots-last-case
  debated:
    - "Curtain was written in the early 1940s but published in 1975; publication order places it last (correct for reading), even though by internal chronology Poirot's decline is out of step with the 1960s-70s novels around it."
    - "This path lists novels only. The Poirot short-story collections (Poirot Investigates, Murder in the Mews, The Labours of Hercules, Poirot's Early Cases) can be slotted in at their publication years or read separately; guides disagree."
    - "A minority 'in-universe chronological' Poirot order exists in fan guides, but Christie kept his timeline deliberately vague, so no authoritative internal chronology exists - publication order is the documented standard."
  sources:
    - https://en.wikipedia.org/wiki/Hercule_Poirot
    - https://nextbookintheseries.com/articles/agatha-christie-reading-order/

- id: agatha-christie/marple-novels
  name: The Miss Marple novels, in order
  type: curated
  source: canon
  rationale: >
    All twelve Marple novels in publication order. Like Poirot, each case is
    self-contained, but reading forward follows St Mary Mead and Miss Marple
    herself across four decades, from brisk village spinster to the frail
    "Nemesis" of the late books. [[work:agatha-christie/sleeping-murder|Sleeping
    Murder]], billed as her last case, sits last by publication - as Christie
    intended.
  orderedWorkIds:
    - agatha-christie/the-murder-at-the-vicarage
    - agatha-christie/the-body-in-the-library
    - agatha-christie/the-moving-finger
    - agatha-christie/a-murder-is-announced
    - agatha-christie/they-do-it-with-mirrors
    - agatha-christie/a-pocket-full-of-rye
    - agatha-christie/4-50-from-paddington
    - agatha-christie/the-mirror-crackd-from-side-to-side
    - agatha-christie/a-caribbean-mystery
    - agatha-christie/at-bertrams-hotel
    - agatha-christie/nemesis
    - agatha-christie/sleeping-murder
  debated:
    - "Sleeping Murder was written in the 1940s and vaulted, then published posthumously in 1976; publication order (used here) puts it last, matching its 'Miss Marple's last case' billing, though it was composed decades earlier."
    - "Nemesis is a direct sequel to A Caribbean Mystery and should follow it - publication order preserves that."
    - "The Marple short stories (The Thirteen Problems, Miss Marple's Final Cases) are omitted from this novels-only path."
  sources:
    - https://en.wikipedia.org/wiki/Miss_Marple
    - https://nextbookintheseries.com/articles/agatha-christie-reading-order/
