# Portuguese (pt-PT) editions of Agatha Christie.
#
# Sourced from wook.pt and bertrand.pt (Porto Editora group retailers), which
# publish the full bibliographic record per product: ISBN, publisher, release
# date, language and binding. Every entry below was opened individually and its
# ISBN, publisher and language read off the product page; every title was
# matched to its work through the retailer synopsis and series numbering rather
# than by translating the English title, because Asa's Portuguese titles are
# frequently NOT literal (see the curator notes at the bottom of this comment).
#
# Scope rules applied:
#   - pt-PT only. Brazilian editions (Globo, Nova Fronteira, HarperCollins
#     Brasil) are excluded; so are the Spanish (Espasa, Booket), Catalan and
#     French listings that surface in Portuguese retailer search.
#   - Every ISBN here carries a Portuguese registrant prefix (978-972-4 or
#     978-989-2). Nothing was inferred, completed or reconstructed.
#   - Where a work has been reissued several times, the most recent in-print
#     Portuguese edition is used.
#   - Omnibus volumes (two works in one Circulo de Leitores binding), graphic
#     novel adaptations, the stage plays, and modern anthologies written by
#     other authors are excluded: they are not editions of a single work.
#
# Titles that are NOT literal translations, verified via synopsis:
#   Jogo Macabro          = Dead Man's Folly      (Ariadne Oliver's murder hunt)
#   As Aparencias Iludem  = Sad Cypress           (Elinor Carlisle on trial)
#   Os Cinco Suspeitos    = Five Little Pigs      (Carla Lemarchant, 16 years on)
#   A Suspeita            = Third Girl            (three women sharing a flat)
#   A Premonicao          = By the Pricking of My Thumbs (Tommy and Tuppence)
#   Mare de Sorte         = Taken at the Flood    (the Cloade inheritance)
#   Um Brinde a Morte     = Sparkling Cyanide     (Rosemary Barton)
#   Os Cinco Relogios     = The Clocks            (Sheila Webb, Wilbraham Crescent)
#   O Enigma do Sapato    = One, Two, Buckle My Shoe (the dentist Dr Morley)
#   O Caso do Funeral Fatal = After the Funeral   (Richard Abernethie)
#   Morte na Praia        = Evil Under the Sun    (Arlena Stuart)
#   O Enigma das Cartas Anonimas = The Moving Finger (Lymstock)

