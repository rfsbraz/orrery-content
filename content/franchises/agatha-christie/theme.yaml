# Branding for the Agatha Christie wing (see Orrery CONCEPT §6 - the design law).
# Personality through a modern editorial system, NOT deco pastiche or period
# costume. A restrained interwar feel earned honestly: ivory paper, ink type,
# one quiet poison-green accent, and a single signature rule. Readability first.
preset: interwar-editorial
palette:
  bg: "#f3ecdf"       # warm ivory - printed paper, not white
  surface: "#faf5ea"  # a shade lifted, for cards
  ink: "#1b1a16"      # near-black ink - crisp, very high contrast on ivory
  muted: "#726a57"    # faded-pencil grey, for metadata
  accent: "#2f6146"   # a deep, restrained poison-green - links and markers only
displayFace: ivar     # a modern high-contrast editorial serif with quiet period
                      # sympathy; headings only, never body
signature: double-rule # a thin double horizontal rule between sections, echoing
                       # the ruling of a railway timetable or a printed programme
notes: >
  An interwar editorial edition, not an Art Deco poster. The restraint is the
  point: warm ivory paper, sharp ink serifs, and exactly one accent - a poison
  green that nods to Christie's dispensary knowledge without ever shouting it.
  The one signature move is the double rule, a whisper of the railway timetables
  and printed programmes her plots run on; everything else stays quiet, legible,
  and out of the way of the words. No gold foil, no fans, no fake-vintage grain.
