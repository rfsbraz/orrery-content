# Branding for the Agatha Christie wing (see Orrery CONCEPT §6 - the design law).
# Personality through a modern editorial system, NOT deco pastiche or period
# costume. A restrained interwar feel earned honestly: ivory paper, ink type,
# one quiet poison-green accent, and a single signature rule. Readability first.
preset: interwar-editorial
palette:
  bg: "#f3ecdf"       # warm ivory - printed paper, not white
  surface: "#faf5ea"  # a shade lifted, for cards
  ink: "#1b1a16"      # near-black ink - crisp, very high contrast on ivory
  muted: "#726a57"    # faded-pencil grey, for metadata
  accent: "#2f6146"   # a deep, restrained poison-green - links and markers only
displayFace: ivar     # a modern high-contrast editorial serif with quiet period
                      # sympathy; headings only, never body
signature: double-rule # a thin double horizontal rule between sections, echoing
                       # the ruling of a railway timetable or a printed programme
art:
  motifs:
    - railway timetables and boat-train luggage labels
    - a chemist's dispensary shelf, bottles in careful rows
    - a country house floor plan, seen as if drawn for a puzzle
    - a village high street, post office and vicarage in view
    - archaeological dig equipment laid on a sun-bleached tarpaulin
    - a hotel register or a steamer trunk chalked with a cabin number
  atmosphere: >
    Precise and puzzle-bright, never gaslit. The light is interwar English
    daylight or a well-lit drawing room, not shadow. Everything sits exactly
    where a plan would put it - the dispensary shelf alphabetised, the
    timetable ruled, the floor plan squared off - because the pleasure here
    is order, not menace. Warm and civil on the surface; the puzzle is the
    only tension allowed to show.
  lineCharacter: >
    Thin, exact linework, as if engraved for a printing plate rather than
    drawn - closer to a technical diagram or a timetable's ruled columns
    than to expressive ink. Even width throughout, no tremor and no
    cross-hatching for its own sake; precision is the whole point.
  backgroundTexture: >
    Warm cream paper with the flat, crisp resolution of letterpress or a
    printed timetable page - minimal grain, no wash, the tone of a
    well-kept period programme rather than aged parchment.
  accentUse: >
    Deep poison-green on exactly one element per image, never as a fill: a
    chemist's bottle label, a single ink stamp on a ticket, one ruled line
    on a timetable page.
  avoid:
    - gore, the murder itself, or a weapon shown in use
    - deerstalker hats, magnifying glasses or any Sherlock Holmes iconography
    - cosy-mystery kitsch - cats, teacups, knitting as shorthand for the genre
    - anything that pictures or gives away a solution
    - shadow, gaslight or noir lighting - this wing stays daylit
notes: >
  An interwar editorial edition, not an Art Deco poster. The restraint is the
  point: warm ivory paper, sharp ink serifs, and exactly one accent - a poison
  green that nods to Christie's dispensary knowledge without ever shouting it.
  The one signature move is the double rule, a whisper of the railway timetables
  and printed programmes her plots run on; everything else stays quiet, legible,
  and out of the way of the words. No gold foil, no fans, no fake-vintage grain.
