# Recurring figures that thread the works together (docs/SCHEMA.md). A tight
# roster of genuine connective tissue, not a character wiki: the two headline
# sleuths, the self-insert novelist who crosses between them, the amateur pair,
# and the two supporting detectives whose paths converge in Cards on the Table.
# Landmark appearances only - not every one of Poirot's 33 novels. Appearances
# whose existence is itself a reveal carry spoilerAfter.

- id: agatha-christie/hercule-poirot
  name: Hercule Poirot
  aka: ["Poirot"]
  description: >
    The retired Belgian police detective, refugee of the First World War, whose
    waxed moustache, "little grey cells" and love of order made him the most
    famous fictional detective after Sherlock Holmes. He solves by psychology and
    method, not footprints.
  appearsIn:
    - workId: agatha-christie/the-mysterious-affair-at-styles
      note: His debut, narrated by Captain Hastings.
    - workId: agatha-christie/the-murder-of-roger-ackroyd
      note: The case that made both detective and author famous.
    - workId: agatha-christie/murder-on-the-orient-express
    - workId: agatha-christie/the-abc-murders
    - workId: agatha-christie/cards-on-the-table
      note: One of four sleuths at the table.
    - workId: agatha-christie/death-on-the-nile
    - workId: agatha-christie/five-little-pigs
    - workId: agatha-christie/curtain-poirots-last-case
      note: His last case, written decades earlier and released only at the end. What happens here is the franchise's most guarded secret.
      spoilerAfter: agatha-christie/curtain-poirots-last-case
  sources:
    - https://en.wikipedia.org/wiki/Hercule_Poirot

- id: agatha-christie/miss-marple
  name: Miss Jane Marple
  aka: ["Miss Marple", "Jane Marple"]
  description: >
    The elderly, unmarried gossip of St Mary Mead, whose fluffy exterior hides a
    merciless understanding of human nature. She solves murders by analogy to the
    small wickednesses of village life - and is almost always underestimated.
  appearsIn:
    - workId: agatha-christie/the-murder-at-the-vicarage
      note: Her first novel.
    - workId: agatha-christie/the-body-in-the-library
    - workId: agatha-christie/a-murder-is-announced
      note: Widely considered her finest case.
    - workId: agatha-christie/4-50-from-paddington
    - workId: agatha-christie/a-caribbean-mystery
    - workId: agatha-christie/nemesis
      note: A direct sequel to A Caribbean Mystery.
    - workId: agatha-christie/sleeping-murder
      note: Billed as her last case; written in the 1940s and vaulted, published posthumously.
  sources:
    - https://en.wikipedia.org/wiki/Miss_Marple

- id: agatha-christie/ariadne-oliver
  name: Ariadne Oliver
  description: >
    A successful, apple-loving detective novelist who despairs of her own Finnish
    sleuth - Christie's affectionate self-portrait. She drifts into Poirot's
    cases as friend and catalyst, and is the clearest thread linking otherwise
    standalone books.
  appearsIn:
    - workId: agatha-christie/cards-on-the-table
      note: Her first full appearance, as one of the four sleuths.
    - workId: agatha-christie/mrs-mcgintys-dead
    - workId: agatha-christie/dead-mans-folly
    - workId: agatha-christie/the-pale-horse
      note: A rare appearance in a novel without Poirot.
    - workId: agatha-christie/third-girl
    - workId: agatha-christie/halloween-party
    - workId: agatha-christie/elephants-can-remember
  sources:
    - https://en.wikipedia.org/wiki/Ariadne_Oliver

- id: agatha-christie/tommy-and-tuppence
  name: Tommy and Tuppence Beresford
  aka: ["Thomas Beresford", "Prudence Cowley", "the Beresfords"]
  description: >
    Christie's amateur husband-and-wife adventurers, introduced as broke young
    things after the First World War. Uniquely among her detectives they age in
    real time across five books, ending as an elderly couple still stumbling into
    conspiracies.
  appearsIn:
    - workId: agatha-christie/the-secret-adversary
      note: Their debut, young and jobless.
    - workId: agatha-christie/partners-in-crime
    - workId: agatha-christie/n-or-m
      note: Middle-aged, hunting Nazi spies in wartime.
    - workId: agatha-christie/by-the-pricking-of-my-thumbs
    - workId: agatha-christie/postern-of-fate
      note: Elderly; the last novel Christie ever wrote.
  sources:
    - https://en.wikipedia.org/wiki/Tommy_and_Tuppence

- id: agatha-christie/colonel-race
  name: Colonel Johnny Race
  aka: ["Colonel Race"]
  description: >
    A tall, tanned secret-service man of Empire, more spy-catcher than detective.
    He turns up where Christie wants international menace, and shares two cases
    with Poirot.
  appearsIn:
    - workId: agatha-christie/the-man-in-the-brown-suit
      note: His debut.
    - workId: agatha-christie/cards-on-the-table
      note: One of the four sleuths.
    - workId: agatha-christie/death-on-the-nile
      note: Working the case alongside Poirot.
    - workId: agatha-christie/sparkling-cyanide
      note: His final appearance.
  sources:
    - https://en.wikipedia.org/wiki/Colonel_Race

- id: agatha-christie/superintendent-battle
  name: Superintendent Battle
  description: >
    A stolid, wooden-faced Scotland Yard man, the professional counterweight to
    Christie's gifted amateurs. Reliable rather than brilliant, he anchors the
    lighter thrillers and joins the four-sleuth summit of Cards on the Table.
  appearsIn:
    - workId: agatha-christie/the-secret-of-chimneys
      note: His debut.
    - workId: agatha-christie/the-seven-dials-mystery
    - workId: agatha-christie/cards-on-the-table
      note: One of the four sleuths.
    - workId: agatha-christie/murder-is-easy
    - workId: agatha-christie/towards-zero
      note: His last and best case.
  sources:
    - https://en.wikipedia.org/wiki/Superintendent_Battle
