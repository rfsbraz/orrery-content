- id: agatha-christie/three-act-tragedy
  title: "Three Act Tragedy"
  authorIds: [agatha-christie]
  published: 1934
  subseries: "Hercule Poirot"
  canonTier: core
  synopsis: "A clergyman dies at a cocktail party with no apparent motive and no apparent means; Poirot works the case as if it were staged theatre. (US: Murder in Three Acts.)"
  note: >
    Dated 1934, not the commonly catalogued 1935. This is a US-first title: Dodd,
    Mead published it in America as "Murder in Three Acts" in October 1934, three
    months before the Collins Crime Club edition of January 1935. The Saturday
    Evening Post serialisation (six parts, 9 June to 14 July 1934) lands on 1934
    as well, so the year holds whether or not serialisation is counted. Note that
    the American text alters the killer's motive, so the 1934 first publication
    and the 1935 UK text differ in substance.
  sources:
    - https://en.wikipedia.org/wiki/Three_Act_Tragedy

