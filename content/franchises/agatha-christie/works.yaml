  title: "By the Pricking of My Thumbs"
  authorIds: [agatha-christie]
  published: 1968
  subseries: "Tommy & Tuppence"
  canonTier: core
  synopsis: "An old woman's murmured question at a nursing home, and a disturbing painting, send an elderly Tuppence alone into a village hiding decades of child murder."

