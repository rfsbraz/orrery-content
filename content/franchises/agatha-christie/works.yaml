  note: >
    Dated 1942, not the commonly catalogued 1943. A US-first title: Dodd, Mead
    published it in July 1942, eleven months before the Collins Crime Club
    edition of June 1943. The Collier's Weekly serialisation (eight parts,
    28 March to 16 May 1942) also lands on 1942. One wrinkle the curator should
    know: American editions of this novel are abridged by roughly 9000 words,
    so the 1942 first publication is a shorter text than the 1943 UK one. The
    date records first publication, which is what the reading order needs; the
    fullest text is the later British edition.
  sources:
    - https://en.wikipedia.org/wiki/The_Moving_Finger

