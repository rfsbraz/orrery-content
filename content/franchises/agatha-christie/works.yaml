  title: "Endless Night"
  authorIds: [agatha-christie]
  published: 1967
  subseries: null
  canonTier: core
  synopsis: "A working-class chauffeur and a rich young heiress build their dream house on cursed ground. A late, dark, first-person standalone Christie rated among her very best."

