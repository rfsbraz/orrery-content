  authorIds: [agatha-christie]
  published: 1965
  subseries: "Miss Marple"
  canonTier: core
  synopsis: "A perfectly preserved Edwardian London hotel is too good to be true; Miss Marple, revisiting it after fifty years, senses the rot under the nostalgia."

