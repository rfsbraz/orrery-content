# Bibliography (Works) - the abstract books; editions/covers are separate metadata.
# IDs are STABLE and permanent (user data references them). Dates are year-precision.
# UK titles are canonical (task rule); notable US retitlings live in the synopsis.
# Completeness is the deliverable: all 66 detective novels, the 6 Mary Westmacott
# romances, 12 major story collections, and 2 memoirs. externalIds left for the
# enrichment bot. Order below is roughly publication-chronological for reading.

# --- 1920s ---

- id: agatha-christie/the-mysterious-affair-at-styles
  title: "The Mysterious Affair at Styles"
  authorIds: [agatha-christie]
  published: 1920
  subseries: "Hercule Poirot"
  canonTier: core
  synopsis: "Poirot's debut: a Belgian refugee detective solves the poisoning of a wealthy heiress at an English country house, narrated by Captain Hastings. (First UK edition 1921.)"

- id: agatha-christie/the-secret-adversary
  title: "The Secret Adversary"
  authorIds: [agatha-christie]
  published: 1921
  subseries: "Tommy & Tuppence"
  canonTier: core
  synopsis: "Two broke young adventurers advertise themselves for hire and stumble into a postwar conspiracy over a missing secret treaty."
  note: >
    Dated 1921, not the usually cited 1922. The complete novel ran in The Times
    weekly edition in seventeen instalments from 12 August to 2 December 1921,
    described by the source as "a complete and unabridged text", finishing
    before the Bodley Head book of January 1922. This is the only Christie
    serialisation the 2026 date audit found with an explicit unabridged
    statement crossing a year boundary; several others (Roger Ackroyd 1925,
    Orient Express 1933, Dumb Witness 1936) have serials that finished in an
    earlier year but no source stating they carried the full text, so those
    keep their book dates. Revisit them together if a serialisation
    bibliography settles the completeness question.
  sources:
    - https://en.wikipedia.org/wiki/The_Secret_Adversary

