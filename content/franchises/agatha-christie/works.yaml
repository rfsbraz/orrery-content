  title: "Ordeal by Innocence"
  authorIds: [agatha-christie]
  published: 1958
  subseries: null
  canonTier: core
  synopsis: "A man returns to clear the name of a son already dead in prison, only to prove the real killer is still inside the family. A standalone Christie counted among her favourites."

