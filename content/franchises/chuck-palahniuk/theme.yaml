# Branding for the Chuck Palahniuk wing (see Orrery CONCEPT §6 - the design
# law). Personality through palette plus one display face plus one signature.
# No genre costume: no blood, no bruises, no bar-basement texture, no soap.
preset: clinical-minimal
palette:
  bg: "#0f1214"       # cold near-black with a blue-grey cast, not King's warm brown
  surface: "#171b1e"  # a hair lifted, for cards
  ink: "#e6eaec"      # cold white, high contrast
  muted: "#868f94"    # institutional grey, for metadata
  accent: "#74a89a"   # antiseptic green, used only for links and markers
displayFace: sourceSerif  # the plainest of the curated serifs, for the plainest prose
signature: rule           # a firm architectural line; clinical, not decorative
art:
  motifs:
    - a laminated safety card, its diagrams intact but the folds gone soft and grey
    - a choking-rescue poster tacked behind a restaurant register, pictogram figures mid-procedure
    - a circle of folding chairs in a windowless church-basement room, seen from the doorway
    - a product's tri-fold instruction insert, numbered steps and warning icons, any brand stripped away
    - a clinic or hotel registration card, its boxes half filled in an unsteady hand
    - a stack of photocopied handbills, the type breaking down a little more with each generation
    - an exploded diagram of an ordinary object, its parts numbered like assembly instructions
  atmosphere: >
    Deadpan and overlit, the way a room reads under fluorescent tubes rather
    than lamplight. Catastrophe is filed, numbered and laminated here, never
    dramatized: the joke and the horror both live in how calmly the page
    explains what to do when something goes wrong. American consumer and
    support-group culture, stripped of any brand or logo that would date or
    place it.
  lineCharacter: >
    Flat, even-weight ruling-pen line with no variation for emphasis and no
    visible hand, closer to a technical diagram than a drawing. Where the
    house style elsewhere prizes an imperfect line, this wing inverts it on
    purpose: the imperfection lives only in reproduction, as toner thinning
    and photocopy grain, never in the stroke itself.
  backgroundTexture: >
    Cold white or pale institutional grey stock, not warm paper: the surface
    of a photocopied form or a laminated card, with a faint halftone dot
    pattern where the toner has thinned from being copied one generation too
    many.
  accentUse: >
    Pale antiseptic teal on exactly one element per image, never as a fill: a
    stamped date or serial number, a single pictogram's outline, one ruled
    line in a numbered list, or an exit-sign glyph.
  avoid:
    - soap, soap-making or bar-of-soap iconography
    - bare-knuckle fighting, boxing rings or any fight-club imagery
    - blood, bruising or any wound made graphic
    - the 1999 film's visual identity: its title cards, its colour grade, its poster
    - edginess as decoration - grime, distressed type or punk collage for its own sake
    - any depiction of self-harm or violence to a body, implied or shown
notes: >
  Palahniuk's prose is stripped, cold and repetitive on purpose, so the wing is
  built to look like an instruction manual rather than a horror paperback. Cold
  dark ground, cold white type, one antiseptic green accent, and a single hard
  rule as the only structural gesture. Deliberately the opposite of the Stephen
  King wing next door: where that one is warm paper and an oxblood spine, this
  is a room with the lights on. The temptation with this author is costume
  (bruise colours, grime, distressed type) and every bit of it is refused here.
