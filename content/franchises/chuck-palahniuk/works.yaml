- id: chuck-palahniuk/fight-club-2
  title: "Fight Club 2"
  authorIds: [chuck-palahniuk]
  published: 2016
  subseries: "Fight Club"
  canonTier: core
  synopsis: >
    A decade on, the narrator is medicated, married and dull, and something he
    thought was finished is being run again without him. A comic, drawn by
    Cameron Stewart and David Mack.
  note: >
    DATE. Commonly listed as 2015 (when serialisation began) or 2016 (the
    collected hardcover). Both point at 2016 for FIRST publication of the
    complete work: the ten-issue Dark Horse series ran from 27 May 2015 to
    30 March 2016, and the collection followed on 18 May 2016. Serialisation
    counts as first publication only once the complete work has appeared, which
    is March 2016 either way.
    TIER. Kept core rather than extended: this is a graphic novel, but it is
    Palahniuk's own sole-written direct sequel to the title work, not a
    licensed spin-off. Flagged for the curator, since a reader walking the core
    spine will meet a comic between two prose novels.
  sources:
    - https://en.wikipedia.org/wiki/Fight_Club_2

