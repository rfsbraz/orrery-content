- id: chuck-palahniuk/adjustment-day
  title: "Adjustment Day"
  authorIds: [chuck-palahniuk]
  published: 2018
  subseries: null
  canonTier: core
  synopsis: >
    Politicians drift toward a war that would thin a generation of young men, a
    blue-black book of directives circulates, and a crowdsourced list decides
    who is to be removed.
  note: >
    SPOILER AUDIT 2026-07. The synopsis previously ended "and the United States
    is partitioned into three states organised by identity". That is the book's
    turn, not its premise, and the publisher's own copy deliberately withholds
    it: Norton stops at "when Adjustment Day arrives, it fearlessly makes real
    the logical conclusion of every separatist fantasy", having just asked "are
    the directives in the Talbott book the secrets to surviving, or are they
    something else entirely?". A synopsis that answers the question the jacket
    leaves open is spoiling even when it states no death. The current wording is
    drawn from the same jacket copy and stops where the jacket stops. Do not
    restore the partition clause from a plot summary or a Wikipedia lead.
  sources:
    - https://en.wikipedia.org/wiki/Adjustment_Day
    - https://openlibrary.org/works/OL19739254W

