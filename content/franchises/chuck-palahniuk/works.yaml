- id: chuck-palahniuk/burnt-tongues
  title: "Burnt Tongues"
  authorIds: [chuck-palahniuk]
  published: 2014
  subseries: null
  canonTier: apocrypha
  authorRole: editor
  contributionTitle: "The Power of Persisting: An Introduction"
  synopsis: >
    An anthology of twenty transgressive stories by other writers, drawn from
    submissions to a Palahniuk fan workshop and selected by its editors.
  note: >
    Palahniuk is one of three editors (with Richard Thomas and Dennis Widmyer)
    and wrote the introduction. He contributed no story of his own, so this is
    completionist data, not a book he wrote. Co-editors are named here rather
    than in withAuthorIds because neither has an author entity in this repo yet.
  sources:
    - https://en.wikipedia.org/wiki/Burnt_Tongues

