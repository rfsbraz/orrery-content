- id: chuck-palahniuk/haunted
  title: "Haunted"
  authorIds: [chuck-palahniuk]
  published: 2005
  subseries: null
  canonTier: core
  synopsis: >
    Writers answer an advertisement for a three-month retreat, are sealed in a
    derelict theatre, and begin competing over whose story is worst. Twenty-three
    stories inside a frame narrative.
  note: >
    Structurally a story cycle rather than a straight novel: each story is
    followed by a chapter of the frame and, usually, a poem. Contains "Guts",
    the story behind the fainting readings of 2003 to 2005.
  sources:
    - https://en.wikipedia.org/wiki/Haunted_(Palahniuk_novel)

