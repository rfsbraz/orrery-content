# Bibliography (Works) - the abstract books; editions and covers are separate
# metadata. IDs are STABLE and permanent (user data references them). Dates are
# FIRST publication of the complete work.
#
# TIERING. canonTier records the KIND of publication, never confidence:
#   core       the novels, plus the two Fight Club sequels Palahniuk wrote
#              himself (see the note on fight-club-2)
#   extended   nonfiction, the story collection, the two illustrated
#              colouring books, and the restructured Invisible Monsters Remix
#   apocrypha  the anthology he co-edited rather than wrote
#
# DELIBERATELY EXCLUDED, each for a stated reason:
#   - "You Do Not Talk About Fight Club: I Am Jack's Completely Unauthorized
#     Essay Collection" (2008). The English Wikipedia article lists this under
#     Palahniuk's own non-fiction. It is not his book: it is an essay collection
#     ABOUT him, edited by Read Mercer Schuchardt, and Wikipedia itself lists it
#     a second time further down among the scholarly works written about him.
#     Including it would put another editor's book in this author's derived
#     reading order.
#   - "Pursuit of Happiness" (1995), the compilation carrying the original
#     seven-page Fight Club story. Recorded as a life event
#     (palahniuk-fight-club-origin-1995) rather than as a work, because it is
#     one short story in someone else's anthology and canonTier does not yet
#     filter the derived order.
#   - Individual stories inside a listed collection ("Guts" lives in Haunted).
#
# AUDITED 2026-07 by completeness-auditor. No works added, none removed, no
# dates changed. Every Palahniuk-authored BOOK in the reachable record is
# present: the sweep of his OpenLibrary author record (OL24312A, 75 works) and
# the English Wikipedia works list turned up no missing novel, collection,
# nonfiction title, colouring book or graphic novel, and nothing published
# after Shock Induction (2024).
#
# WHAT THE AUDIT SETTLED:
#   - "Greener Pastures" returns zero hits anywhere reachable, including a
#     direct OpenLibrary query. Treated as not existing under that title.
#   - The Kindle-single-era short works resolve into
#     [[work:chuck-palahniuk/make-something-up|Make Something Up]] ("Phoenix"
#     has no standalone OpenLibrary record), so they fall under the existing
#     exclusion of individual stories inside a listed collection.
#   - Bait and Legacy are no longer single-sourced.
#   - The two comics dates hold; see the notes on each.
#
# STILL OPEN, and deliberately NOT filled here because scope on multi-author
# anthologies is the curator's call and an apocrypha entry still takes a
# numbered slot in the derived order: a tail of books carrying a Palahniuk
# contribution rather than a Palahniuk book. "Unquiet Guests" (2025, Dead Ink,
# ed. Dan Coxon), "Stories" (2010), "Chiral Mad 3" (2016), "It's Alive" (2018),
# "Expedition" (2015), "Zombies", "Nightmare Magazine" October 2015, his
# introduction to Lidia Yuknavitch's The Chronology of Water, and an unlabelled
# "People, Places, Things" (2021, Scribd) stub. See
# .orrery/chuck-palahniuk/completeness-auditor.yaml.

- id: chuck-palahniuk/fight-club
  title: "Fight Club"
  authorIds: [chuck-palahniuk]
  published: 1996
  subseries: "Fight Club"
  canonTier: core
  synopsis: >
    An insomniac office worker and a soap salesman start a bare-knuckle club in
    a bar basement, and it does not stay a club for long.
  note: >
    SPOILER AUDIT 2026-07, and this is the landmine of the whole wing. This
    novel's reveal about the narrator and Tyler Durden appears in NO field here
    and must never be added to one. Synopses are ungated prose that ships to
    every visitor signed in or not, so there is no boundary that could contain
    it: the only protection is the absence of the sentence. Two specific traps.
    (1) Norton's own jacket copy presents Tyler as a separate person - "comes
    under the thrall of Tyler Durden, an enigmatic young man who holds secret
    after-hours boxing matches in the basement of bars" - so the publisher test
    passes and this synopsis is deliberately even more restrained than the
    jacket, naming neither man. (2) Dark Horse's copy for
    [[work:chuck-palahniuk/fight-club-2|Fight Club 2]] opens "Some imaginary
    friends never go away", which states the reveal outright. That is the
    SEQUEL's jacket spoiling THIS book, which the publisher test explicitly does
    not license - publishers trade book one's ending to sell book two. Do not
    pull it forward, and do not reason from the film.
  sources:
    - https://en.wikipedia.org/wiki/Fight_Club_(novel)

