  authorIds: [chuck-palahniuk]
  published: 2012
  subseries: null
  canonTier: extended
  connections:
    - chuck-palahniuk/invisible-monsters
  synopsis: >
    The 1999 novel republished in the shape Palahniuk says he first intended:
    chapters out of sequence, each ending with an instruction on which chapter
    to read next, plus new chapters of memoir and further scenes with the same
    characters.
  note: >
    Tiered extended because it is a restructured re-issue of an existing novel
    rather than a new one. It is NOT a subseries: the connection to
    [[work:chuck-palahniuk/invisible-monsters|Invisible Monsters]] is recorded
    as a work connection instead, since the two are one book in two forms.
    SPOILER AUDIT 2026-07. The synopsis previously ended "plus new material and
    a different ending". That clause was cut: it told a reader of the 1999 novel
    that the book has an ending the author wanted changed, which is a nudge at
    the one thing that novel spends itself buying, and no publisher copy
    supports it. The replacement wording follows Palahniuk's own site and the
    Norton copy ("new chapters of memoir and further scenes with the book's
    characters"), which is both safer and better sourced. Do not restore it.
  sources:
    - https://en.wikipedia.org/wiki/Invisible_Monsters_Remix

