- id: chuck-palahniuk/fight-club-2
  title: "Fight Club 2"
  authorIds: [chuck-palahniuk]
  published: 2016
  subseries: "Fight Club"
  canonTier: core
  synopsis: >
    A decade on, the narrator is medicated, married and dull, and something he
    thought was finished is being run again without him. A comic, drawn by
    Cameron Stewart and David Mack.
  note: >
    DATE. Commonly listed as 2015 (when serialisation began) or 2016 (the
    collected hardcover). Both point at 2016 for FIRST publication of the
    complete work: the ten-issue Dark Horse series ran from 27 May 2015 to
    30 March 2016, and the collection followed on 18 May 2016. Serialisation
    counts as first publication only once the complete work has appeared, which
    is March 2016 either way. Confirmed by the completeness audit: unlike an
    abridged prose serial, a limited comics series carries the complete work
    verbatim across its issues, so the run finishing IS first publication and
    the collection is a reprint.
    ARTISTS. Cameron Stewart drew it, David Mack did the covers, and neither is
    recorded in withAuthorIds: the schema has no illustrator role, and the
    field resolves against author entities this repo does not have. Same
    reasoning as the Burnt Tongues co-editors. Curator's call to revisit.
    SPOILER AUDIT 2026-07. This synopsis is vague ON PURPOSE and must stay that
    way. Dark Horse's solicitation copy for this book begins "Some imaginary
    friends never go away" and ends on "the return of Tyler Durden", which
    states [[work:chuck-palahniuk/fight-club|Fight Club]]'s reveal in the
    clear. It is this book's jacket spoiling the previous one, so it fails the
    publisher test and must not be pulled in wholesale by a later enrichment
    pass. "Something he thought was finished is being run again without him" is
    the deliberate substitute. What is kept - the decade gap, the medication,
    the wife and child - is Dark Horse's own framing of THIS book's present
    ("ten years after starting Project Mayhem, he lives a mundane life, a kid,
    a wife, pills to keep his destiny at bay") and states nothing about how the
    novel ends. That a sequel exists at all does disclose that the narrator
    lives, which no field in this schema can hide: titles, subseries and the
    derived order all carry it. Recorded as an engine limit, not a fixable leak.
    TIER. Kept core rather than extended: this is a graphic novel, but it is
    Palahniuk's own sole-written direct sequel to the title work, not a
    licensed spin-off. Flagged for the curator, since a reader walking the core
    spine will meet a comic between two prose novels.
  sources:
    - https://en.wikipedia.org/wiki/Fight_Club_2

