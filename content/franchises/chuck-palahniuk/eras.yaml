# Creative periods. Inline references use [[type:id|text]] and must resolve.
#
# PROVENANCE WARNING (see .claude/skills/eras, and the same warning at the top
# of stephen-king/eras.yaml). NO published periodisation of Palahniuk's career
# was found. The academic literature on him (Kuhn and Rubin 2009, Sartain 2009,
# Collado-Rodriguez 2013, Keesey 2016, McCracken 2016) is organised by novel and
# by theme, not by period, and none of it proposes named phases.
#
# So this file is deliberately THIN: three spans rather than a decade grid, flat
# titles that assert nothing, and one hard dated boundary that is a fact rather
# than a verdict (the film, 15 October 1999). Eras 2 and 3 are our own cut and
# are marked provenance: none for the curator to remove or merge. Fewer eras,
# honestly labelled, beats a tidy periodisation nobody but us believes.

- id: before-the-film
  title: The Norton Novels
  period: "1996-1999"
  themes: [insomnia and dissociation, performed masculinity, invented identity, minimalism]
  provenance: publishing
  description: >
    The three novels W. W. Norton published before
    [[work:chuck-palahniuk/fight-club|Fight Club]] reached cinemas: Fight Club
    itself, [[work:chuck-palahniuk/survivor|Survivor]], and
    [[work:chuck-palahniuk/invisible-monsters|Invisible Monsters]], which was
    written first and rejected before either. Small print runs, a cult
    readership, and a voice already fully formed by the Spanbauer workshop
    years. Everything here was written by someone nobody was watching.
  note: >
    The boundary is a publishing fact rather than a coinage: these are the
    pre-film Norton books, and the film's release on 15 October 1999 is a hard
    date. The title names the publisher, not a verdict on the work.
  sources:
    - https://en.wikipedia.org/wiki/Fight_Club_(novel)
    - https://en.wikipedia.org/wiki/Fight_Club

- id: after-the-film
  title: After the Film
  period: "2000-2014"
  themes: [addiction and compulsion, cults and crowds, grief, satire of appetite]
  provenance: none
  description: >
    Palahniuk publishes roughly a book a year to an audience the film built:
    [[work:chuck-palahniuk/choke|Choke]],
    [[work:chuck-palahniuk/lullaby|Lullaby]] (written in the wake of his
    father's murder), [[work:chuck-palahniuk/diary|Diary]],
    [[work:chuck-palahniuk/haunted|Haunted]] and the readings that made people
    faint, then the formal experiments - an oral biography, a novel in broken
    English, a novel in gossip column. The two nonfiction books and the first
    story collection also fall here.
  note: >
    UNSOURCED - our own cut, recommended for curator review. Both boundaries are
    real dated facts (the film's DVD release in June 2000 that built the
    readership; the move into comics from May 2015) but no published
    periodisation of Palahniuk breaks at either point, or anywhere else. The
    title is flat by design and asserts nothing about the books' quality.
  sources:
    - https://en.wikipedia.org/wiki/Fight_Club

- id: from-2015
  title: 2015 Onward
  period: "2015-present"
  themes: [returning to Fight Club, illustrated formats, political satire, craft]
  provenance: none
  description: >
    Palahniuk goes back to his first book and continues it in comics
    ([[work:chuck-palahniuk/fight-club-2|Fight Club 2]],
    [[work:chuck-palahniuk/fight-club-3|Fight Club 3]]), publishes two
    illustrated colouring volumes, turns the craft of the workshop years into a
    manual ([[work:chuck-palahniuk/consider-this|Consider This]]), and keeps
    writing novels ([[work:chuck-palahniuk/adjustment-day|Adjustment Day]],
    [[work:chuck-palahniuk/shock-induction|Shock Induction]]).
  note: >
    UNSOURCED - our own cut, recommended for curator review or for merging with
    the era above. The 2015 boundary is one real publishing fact (the first
    Fight Club comic, 27 May 2015) doing a lot of work: he did not stop writing
    prose novels, so this is a period defined by an addition rather than a turn.
    "2015 Onward" is deliberately not a name.
  sources:
    - https://en.wikipedia.org/wiki/Fight_Club_2
