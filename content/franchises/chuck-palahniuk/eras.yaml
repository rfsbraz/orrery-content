# Creative periods. Inline references use [[type:id|text]] and must resolve.
#
# PROVENANCE. What the record holds:
#
#  - NO full periodisation of Palahniuk's career exists anywhere reachable.
#    The academic literature (Kuhn and Rubin 2009, Sartain 2009,
#    Collado-Rodriguez 2013, McCracken 2016) organises by novel and by theme,
#    not by period, and career-retrospective press and the Fight Club
#    anniversary coverage narrate chronologically without naming phases. The
#    Wikipedia article's five "career phase" section headings are that
#    article's internal structure, not a published periodisation; its own
#    prose names no phases. Do not launder them into a citation.
#
#  - ONE received period does exist: Palahniuk himself, at a 2005 Miami
#    appearance on the Haunted tour, described Lullaby, Diary and Haunted as
#    a "horror trilogy", and the term was taken up in print. Douglas Keesey's
#    Understanding Chuck Palahniuk (U of South Carolina Press, 2016) titles
#    its third chapter "The Horror Trilogy: Lullaby, Diary, Haunted", and a
#    peer-reviewed 2024 article (Humanities 13(5):115) carries "Chuck
#    Palahniuk's Horror Trilogy" in its title and calls the trilogy
#    "self-described" in its abstract. Author-received, corroborated in
#    criticism. It is era 3 below.
#
#  - The 2015 boundary rests on an author source: asked in May 2015 whether he
#    would keep working in comics, Palahniuk said "Comics will also become a
#    lasting aspect of my output" (Bleeding Cool interview, 25 May 2015). That
#    sources the boundary and the claim of a lasting addition; he named no
#    period, so the era's title stays flat.
#
# STRUCTURE. The pre-film era is a publishing fact with hard edges: an
# achievement (chuck-palahniuk/before-the-film) counts its three works and
# franchise.yaml's startHere references its grouping. Honouring the trilogy
# inside the wider 2000-2014 stretch leaves two residues (2000-2001 and
# 2006-2014), kept as honestly flagged provenance: none spans: every boundary
# they sit between is sourced, but the spans themselves are received by
# nobody. The ids after-the-film and from-2015 are permanent: the pt-PT
# overlay resolves against them.

- id: before-the-film
  title: The Norton Novels
  period: "1996-1999"
  themes: [insomnia and dissociation, performed masculinity, invented identity, minimalism]
  provenance: publishing
  description: >
    The three novels W. W. Norton published before
    [[work:chuck-palahniuk/fight-club|Fight Club]] reached cinemas: Fight Club
    itself, [[work:chuck-palahniuk/survivor|Survivor]], and
    [[work:chuck-palahniuk/invisible-monsters|Invisible Monsters]], which was
    written first and rejected before either. Small print runs, a cult
    readership, and a voice already fully formed by the Spanbauer workshop
    years. Everything here was written by someone nobody was watching.
  note: >
    The boundary is a publishing fact rather than a coinage: these are the
    pre-film Norton books, and the film's release on 15 October 1999 is a hard
    date. The title names the publisher, not a verdict on the work.
  sources:
    - https://en.wikipedia.org/wiki/Fight_Club_(novel)
    - https://en.wikipedia.org/wiki/Fight_Club

- id: after-the-film
  title: After the Film
  period: "2000-2001"
  themes: [addiction and compulsion, con games, the audience the film built]
  provenance: none
  description: >
    The short stretch between the film and the horror books, holding one
    novel: [[work:chuck-palahniuk/choke|Choke]], written for the readership
    the film built and his first New York Times bestseller. Criticism reads it
    with the pre-film books rather than as a new direction: Keesey's study
    groups it with Fight Club, Invisible Monsters and Survivor as the novels
    of the struggle for identity.
  note: >
    UNSOURCED AS A PERIOD, kept as a bridge. Both of its edges are sourced
    facts (the film on one side, the start of the self-described horror
    trilogy on the other), but nobody periodises a 2000-2001 span; it is the
    residue left when two received boundaries are honoured. Keesey's chapter
    "The Struggle for Identity" runs its grouping through Choke (2001), which
    is the critical warrant for treating these years as the tail of the
    beginning rather than the start of something new. Recut in the second pass
    from the placeholder 2000-2014 span.
  sources:
    - https://muse.jhu.edu/book/47493
    - https://en.wikipedia.org/wiki/Chuck_Palahniuk

- id: the-horror-trilogy
  title: The Horror Trilogy
  period: "2002-2005"
  themes: [cursed texts, hauntings, grief, bodily horror]
  provenance: author
  description: >
    The one period in this career received from the author himself: on the
    2005 Haunted tour Palahniuk described
    [[work:chuck-palahniuk/lullaby|Lullaby]],
    [[work:chuck-palahniuk/diary|Diary]] and
    [[work:chuck-palahniuk/haunted|Haunted]] as a horror trilogy, written in
    the years after his father's murder and ending in the readings of "Guts"
    that made audiences faint. Scholarship kept the term. The two nonfiction
    books, [[work:chuck-palahniuk/fugitives-and-refugees|Fugitives and
    Refugees]] and
    [[work:chuck-palahniuk/stranger-than-fiction|Stranger than Fiction]],
    also fall inside these years.
  note: >
    Provenance is the author's own framing (rung 1), corroborated in print at
    rung 2: Keesey titles his third chapter "The Horror Trilogy: Lullaby,
    Diary, Haunted" (Understanding Chuck Palahniuk, 2016), and Humanities
    13(5):115 (2024) names "Chuck Palahniuk's Horror Trilogy" in its title and
    calls it "self-described" in its abstract. The span is the trilogy's own
    publication run, 2002 to 2005. Known fit cost, stated rather than hidden:
    era membership is computed by year, so the two nonfiction books of
    2003-2004 sit inside a plate named for a trilogy they are not part of; the
    description says so. The MDPI article page refuses automated fetches
    (HTTP 403); its abstract was verified through search results.
  sources:
    - https://muse.jhu.edu/book/47493
    - https://www.mdpi.com/2076-0787/13/5/115
    - https://en.wikipedia.org/wiki/Chuck_Palahniuk

- id: after-the-trilogy
  title: After the Trilogy
  period: "2006-2014"
  themes: [formal experiments, satire of appetite, celebrity, the afterlife]
  provenance: none
  description: >
    The yearly run continues in standalone experiments: an oral biography
    ([[work:chuck-palahniuk/rant|Rant]]), a novel narrated from a waiting room
    ([[work:chuck-palahniuk/snuff|Snuff]]), a novel in broken English
    ([[work:chuck-palahniuk/pygmy|Pygmy]]), a novel in gossip column
    ([[work:chuck-palahniuk/tell-all|Tell-All]]), the Hell pair of
    [[work:chuck-palahniuk/damned|Damned]] and
    [[work:chuck-palahniuk/doomed|Doomed]], and
    [[work:chuck-palahniuk/beautiful-you|Beautiful You]]. The restructured
    [[work:chuck-palahniuk/invisible-monsters-remix|Invisible Monsters
    Remix]] and the anthology he co-edited,
    [[work:chuck-palahniuk/burnt-tongues|Burnt Tongues]], also fall here.
  note: >
    UNSOURCED - our own cut, recommended for curator review. Like the span
    before the trilogy, this is a residue: it opens where the self-described
    horror trilogy closes and ends where the comics turn begins, and both of
    those edges are sourced, but no published periodisation treats 2006-2014
    as a period. Criticism covers these books thematically and in
    chronologically overlapping pairs (Keesey's later chapters interleave the
    2007-2014 titles), which is itself evidence that no critic periodises this
    stretch. The title is flat by design and asserts nothing.
  sources:
    - https://muse.jhu.edu/book/47493

- id: from-2015
  title: 2015 Onward
  period: "2015-present"
  themes: [returning to Fight Club, illustrated formats, political satire, craft]
  provenance: author
  description: >
    Palahniuk goes back to his first book and continues it in comics
    ([[work:chuck-palahniuk/fight-club-2|Fight Club 2]],
    [[work:chuck-palahniuk/fight-club-3|Fight Club 3]]), publishes two
    illustrated colouring volumes, turns the craft of the workshop years into
    a manual ([[work:chuck-palahniuk/consider-this|Consider This]]), and keeps
    writing novels ([[work:chuck-palahniuk/adjustment-day|Adjustment Day]],
    [[work:chuck-palahniuk/shock-induction|Shock Induction]]). As the first
    comic appeared in May 2015, he framed the move as permanent: "Comics will
    also become a lasting aspect of my output."
  note: >
    Boundary upgraded by the second pass: the 2015 start now rests on the
    author's own words (interview with Hannah Means-Shannon, Bleeding Cool,
    25 May 2015, as the first Fight Club 2 issue appeared), which assert
    exactly what this era claims - an addition to the output rather than a
    turn away from novels, since he kept writing prose throughout. He named no
    period and no critic periodises the career at 2015, so the provenance
    covers the boundary and the claim of a lasting addition only, and the
    title stays deliberately not a name.
  sources:
    - https://bleedingcool.com/2015/05/25/comics-will-become-a-lasting-aspect-of-my-output-chuck-palahniuk-talks-fight-club-2
    - https://en.wikipedia.org/wiki/Fight_Club_2
