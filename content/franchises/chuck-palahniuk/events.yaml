# FRANCHISE-SPECIFIC events only. Author-LIFE events live on the author entity
# (content/authors/chuck-palahniuk.yaml). Shared world/culture events live in
# content/events/global.yaml.
#
# Four entries, deliberately. Each one passes the admission test: knowing it
# changes how the books read. Candidates rejected and why, so a later stage does
# not re-litigate them:
#   - the 2022 Chinese streaming release with a changed ending: a fact about the
#     film's distribution, not about the book, and it leaves no mark on the page
#   - awards, sales milestones, bestseller placements: trivia tier (this
#     includes the 1997 Oregon Book Award and Pacific Northwest Booksellers
#     Award for Fight Club - the press-archaeology pass looked and rejected)
#   - the film's individual production facts (casting, budget, Fincher): the
#     film matters here only for what it did to the book's readership, which is
#     one event, not five
#   - Haunted's savage 2005 reviews: the reception story that matters is the
#     fainting readings, which already carry it; a clippings file is noise

- id: fight-club-film-1999
  date: 1999-10-15
  title: The film flops, then the DVD finds everyone
  scope: culture
  reach: franchise
  impact: high
  description: >
    David Fincher's adaptation of [[work:chuck-palahniuk/fight-club|Fight Club]]
    opens on 15 October 1999 and underperforms: roughly 100.9 million dollars
    worldwide against a budget of 63 to 65 million, with critics split down the
    middle. Then the DVD arrives on 6 June 2000 and sells over six million
    copies inside a decade. This is the single most important fact about how
    Palahniuk is read: nearly every reader of the novel arrived after the film,
    carrying its cast, its ending and its politics into a book that is drier,
    stranger and ends differently. It also turned a modest 1996 hardcover into a
    collector's item and made a mid-list writer a global name overnight.
  spoilerAfter: null
  sources:
    - https://en.wikipedia.org/wiki/Fight_Club
    - https://en.wikipedia.org/wiki/Fight_Club_(novel)

- id: guts-fainting-readings-2003
  date: 2003
  dateRange: "2003-2005"
  title: The readings people fainted at
  scope: culture
  reach: franchise
  impact: high
  description: >
    On the 2003 tour for [[work:chuck-palahniuk/diary|Diary]], Palahniuk began
    reading "Guts", a story later collected in
    [[work:chuck-palahniuk/haunted|Haunted]]. He opens by telling the audience
    to take a deep breath and that the story should last about as long as they
    can hold it. Listeners started passing out. The Guardian reported forty
    fainters by March 2004 and the count kept climbing across later tours. It is
    the story Palahniuk is most often described by, and it is worth knowing
    before opening Haunted: the book is built to do this to you on purpose, and
    the audience's breath is part of the design.
  spoilerAfter: null
  sources:
    - https://www.theguardian.com/books/2004/mar/13/fiction.chuckpalahniuk
    - https://en.wikipedia.org/wiki/Chuck_Palahniuk

- id: fight-club-continues-in-comics-2015
  date: 2015-05-27
  title: Fight Club continues, in comics
  scope: industry
  reach: franchise
  impact: med
  description: >
    Nineteen years after the novel, Palahniuk writes a direct sequel and
    publishes it as a Dark Horse comic rather than a book: ten issues from May
    2015, collected as [[work:chuck-palahniuk/fight-club-2|Fight Club 2]], then
    twelve more in 2019 as [[work:chuck-palahniuk/fight-club-3|Fight Club 3]].
    It explains the shape of the shelf after 2015 and it is why a completionist
    walking these books hits two graphic novels between the prose.
  spoilerAfter: null
  sources:
    - https://en.wikipedia.org/wiki/Fight_Club_2
    - https://en.wikipedia.org/wiki/Fight_Club_3

- id: greener-pastures-substack-2021
  date: 2021-09-20
  title: A novel serialised on Substack
  scope: industry
  reach: franchise
  impact: med
  description: >
    In September 2021 Palahniuk signs with Substack and begins serialising a
    new novel, Greener Pastures, to paying subscribers over 52 weekly
    instalments. He had sold the book to Hachette, who returned it to him in
    exchange for the promise of another. The serial was then cut down and
    rewritten, and published in 2024 as
    [[work:chuck-palahniuk/shock-induction|Shock Induction]]; Palahniuk has
    said the Substack version was a longer, looser draft and the printed book
    does what print can do. This is why no book called Greener Pastures exists
    on any shelf, and why the walk seems to go quiet between
    [[work:chuck-palahniuk/the-invention-of-sound|The Invention of Sound]] and
    [[work:chuck-palahniuk/not-forever-but-for-now|Not Forever, But For Now]]:
    the novel of those years was being published weekly, behind a
    subscription.
  spoilerAfter: null
  sources:
    - https://www.publishersweekly.com/pw/by-topic/industry-news/publisher-news/article/87409-chuck-palahniuk-to-serialize-a-novel-on-substack.html
    - https://www.thisishorror.co.uk/tih-590-chuck-palahniuk-on-shock-induction-psychedelics-and-avocado/
