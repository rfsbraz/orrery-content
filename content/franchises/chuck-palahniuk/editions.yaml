# Editions of Chuck Palahniuk: 28 English (en) and 6 Portuguese (pt-PT).
#
# COVERAGE
#   en     28 of 28 works. Every work in works.yaml has one English edition.
#   pt-PT   6 editions over 5 of 28 works, and that is the market, not a gap in
#           the research. See "THE PORTUGUESE RUN" below.
#
# NOTE FOR THE CURATOR: this is the FIRST franchise in the catalogue to carry
# English editions - the other six wings are pt-PT only (193 entries, all
# pt-PT). The brief for this wing asked for English originals because they are
# what drive the exact-edition store links. No `title` is set on any English
# entry: the work title IS the published title, and repeating it would
# manufacture a translation event that never happened.
#
# SOURCES, and how each ISBN was verified. Every entry below was confirmed by
# TWO independent records that agree, except where its note says otherwise.
#   1. The publishers' own catalogues. wwnorton.com/books/<isbn> and
#      darkhorse.com resolve per-ISBN and are cited per entry. Both were
#      negative-controlled: a fabricated ISBN 404s at Norton, and Dark Horse's
#      pages carry an explicit ISBN-13 field.
#   2. The Library of Congress, through its SRU gateway at lx2.loc.gov:210/lcdb
#      (the www.loc.gov and catalog.loc.gov front ends are Cloudflare-blocked to
#      automated fetches, and lccn.loc.gov rate-limits after ~12 requests).
#      CAUTION FOR THE NEXT AGENT: an SRU `bath.isbn=` query is NOT strict - a
#      fabricated ISBN returned two unrelated records. A hit count proves
#      nothing. Every check here re-read the returned MODS record and required
#      the exact ISBN string AND a Palahniuk name part inside it.
#   3. The Biblioteca Nacional de Portugal ipac catalogue, for all six
#      Portuguese editions. It is reachable despite earlier runs recording it as
#      blocked: the block is user-agent based, and it serves plain HTML to a
#      browser user-agent. Author-words search is `index=.AW&term=palahniuk`.
#   4. presenca.pt, the publisher's own store, for the one Portuguese edition
#      still in print.
#
# THE PORTUGUESE RUN, and why it stops at five books.
# Palahniuk was published in Portugal by Editorial Notícias between 1999 and
# 2004, continuing under Casa das Letras (the same house, renamed) to 2007, all
# five translated by Maria Dulce Guimarães da Costa. That run ends at Diário
# (2007) and was never resumed: the remaining 23 works have NO Portuguese
# edition, so the app will show their English titles, which is correct. In 2016
# Marcador published a NEW translation of Fight Club by Hugo Gonçalves - a
# fresh commission, not a reprint of the 1999 text - and it is the only
# Palahniuk in print in Portugal today. A search of the Presença/Marcador store
# returns Clube de Combate and nothing else by him.
#
# BOTH Fight Club translations are recorded, most-recent first. They are
# genuinely different objects: different translators, different publishers,
# seventeen years apart.
#
# NON-LITERAL PORTUGUESE TITLES, matched by the BNP record's own "Tít. orig."
# field rather than by translating anything:
#   Asfixia              <- Choke              ("suffocation")
#   Monstros invisíveis  <- Invisible Monsters
#   Diário               <- Diary
#   Clube de combate     <- Fight Club         ("combat club")
# Note that the Brazilian title for Fight Club is "Clube da Luta" and for
# Survivor is "Sobrevivente". Both appear on OpenLibrary attached to the same
# work records and are pt-BR, NOT pt-PT. They are deliberately excluded.
#
# NO BRAZILIAN EDITION IS RECORDED HERE. Every Portuguese ISBN below carries a
# 978-972-46 or 978-989-754 registrant prefix (Portugal). None starts 978-85 or
# 978-65 (Brazil).
#
# ISBN-10 CONVERSIONS. Four of the Portuguese editions predate 2007 and BNP
# holds them as ISBN-10s. Each was converted by dropping the old check digit,
# prefixing 978 and recomputing, and each converted number is flagged in its
# own note as SINGLE-SOURCED: BNP is the only catalogue that holds these books,
# they are long out of print, and OpenLibrary has no Portuguese Palahniuk record
# at all. The printed ISBN-10 was round-tripped through BNP's ISBN index and
# returned the expected title in every case, which rules out a misreading on my
# side but not an error in BNP's own record. See the PR for what a human with a
# browser should confirm.

