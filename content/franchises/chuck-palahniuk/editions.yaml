    "A Hora do Vampiro - 'Salem's Lot" elsewhere in this catalogue. It is
    recorded exactly as BNP transcribes it, with no punctuation between the two
    halves; the jacket may well set them on separate lines or with a dash, and
    nobody has seen the jacket. Do not "tidy" it without one.
    BNP: Cruz Quebrada, Notícias, 2004, 237 p., "Tít. orig.: Lullaby : a novel".
    Second translator credited alongside the usual one, plus a reviser
    (Frederico Sequeira) who is not recorded here as the schema has no field
    for one.
    ISBN SINGLE-SOURCED AND CONVERTED from BNP's ISBN-10 972-46-1534-0.
  sources:
    - "https://catalogo.bnportugal.gov.pt/ipac20/ipac.jsp?index=ISBN&term=972-46-1534-0&profile=bn"

