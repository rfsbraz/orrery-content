  workId: discworld/the-wee-free-men
  isbn13: "9789896372472"
  language: pt-PT
  title: "Os Homenzinhos Livres"
  translator: "Renato Correia"
  publisher: Saída de Emergência
  year: 2010
  note: >
    Published in the "Teen" collection (no. 12), illustrated, five years after
