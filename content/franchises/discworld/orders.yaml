# ADDITIONAL canon orders only. The DEFAULT order - all published works in
# publication-chronological order - is derived automatically from works.yaml and
# is NOT listed here. It now walks the whole career (75 works, opening on The
# Carpet People in 1971), not the Discworld series.
#
# The six orders below are DISCWORLD threads and nothing else. Discworld's
# signature move is the "pick a thread" reading, so these are the six subseries
# orders from the community reading-order guide (each is that thread's books in
# publication order). The famous L-Space flowchart is exactly this: threads read
# internally in publication order, with dotted cross-links. Each order
# references stable Work IDs only.
#
# WHY THE OTHER SUBSERIES HAVE NO ORDER. The shelf also carries five named
# groupings that are deliberately left to the subseries label and the derived
# default:
#   The Bromeliad (3), Johnny Maxwell (3), The Long Earth (5) - each is a
#     self-contained, publisher-numbered sequence that was published in story
#     order. An order for one would be the derived default filtered to a label
#     that already threads it: no thread to disentangle from a shared world, no
#     contested placement, and no community guide that navigates them the way
#     the L-Space flowchart navigates the Disc. The six Discworld orders exist
#     because 41 novels interleave six casts across 32 years; a numbered
#     trilogy has no such problem to solve.
#   Maps and Companions (3), Science of Discworld (4) - reference and companion
#     volumes rather than a reading route.
# The one thing a Bromeliad order would have added is a tie-break: Diggers and
# Wings are both 1990, and the derived order's within-year sequence is
# arbitrary. That fact belongs to the works, and the note on discworld/wings
# carries it.

- id: discworld/rincewind
  name: The Rincewind thread
  type: curated
  source: canon
  rationale: >
    The wizard who cannot do magic and cannot stop running. This is where the
    series starts and where the broad early parody lives; it lightens and widens
    as it goes. A complete run for readers who want the comic, adventuring Disc.
    The cost is the steepest of the six: it opens on the two books most readers
    rate weakest, and it is the thread that stays closest to parody while the
    rest of the series grows into satire, so it shows you the least of what the
    Disc became.
  orderedWorkIds:
    - discworld/the-colour-of-magic
    - discworld/the-light-fantastic
    - discworld/sourcery
    - discworld/eric
    - discworld/interesting-times
    - discworld/the-last-continent
    - discworld/the-last-hero
  debated:
    - "The Colour of Magic and The Light Fantastic are a two-part story and the weakest starting point; many readers begin a Rincewind run at Sourcery or skip to a different thread entirely."
    - "The Last Hero is a short illustrated novella that ranges beyond Rincewind; some charts place it as a standalone rather than in this thread."
    - "Unseen Academicals is often drawn on the Rincewind/Wizards line because of the Unseen University cast, but Rincewind is a bit-part; this bundle files it as a standalone."
  sources:
    - https://www.lspace.org/books/reading-order-guides/
    - https://www.terrypratchettbooks.com/discworld-reading-order/

- id: discworld/witches
  name: The Witches thread
  type: curated
  source: canon
  rationale: >
    Granny Weatherwax and the Lancre coven - headology over hats, and stories
    about the danger of stories. Reads as a strong, self-contained arc and is a
    common entry point in its own right. What it costs: Granny Weatherwax's last
    and in many readers' view best appearances are in the Tiffany Aching books,
    which this run stops short of, so the thread ends before its own character
    does.
  orderedWorkIds:
    - discworld/equal-rites
    - discworld/wyrd-sisters
    - discworld/witches-abroad
    - discworld/lords-and-ladies
    - discworld/maskerade
    - discworld/carpe-jugulum
  debated:
    - "Equal Rites introduces Granny Weatherwax but not the full coven (Nanny Ogg and Magrat arrive in Wyrd Sisters); some readers treat Wyrd Sisters as the true start of the thread."
    - "The Tiffany Aching books continue the Witches lineage and Granny Weatherwax crosses into them; whether to read them as part of this thread or as their own is a matter of taste."
  sources:
    - https://www.lspace.org/books/reading-order-guides/
    - https://www.terrypratchettbooks.com/discworld-reading-order/

- id: discworld/death
  name: The Death thread
  type: curated
  source: canon
  rationale: >
    The Disc's Death - fond of cats, curry and humanity, and forever trying to
    understand the job. Some of Pratchett's warmest and most philosophical books,
    plus his granddaughter Susan. The cost is real and easy to miss: Death
    cameos in nearly every other novel, so a thread reading gives you five books
    of a character you would otherwise meet everywhere, and you lose the Disc's
    chronological development and meet its running jokes mid-flight.
  orderedWorkIds:
    - discworld/mort
    - discworld/reaper-man
    - discworld/soul-music
    - discworld/hogfather
    - discworld/thief-of-time
  debated:
    - "Susan Sto Helit's arc runs Soul Music -> Hogfather -> Thief of Time; readers who care most about her sometimes start at Soul Music."
  sources:
    - https://www.lspace.org/books/reading-order-guides/
    - https://www.terrypratchettbooks.com/discworld-reading-order/

- id: discworld/city-watch
  name: The City Watch thread
  type: curated
  source: canon
  rationale: >
    The most beloved thread: Sam Vimes and the Ankh-Morpork City Watch, from a
    single drunk copper to the moral centre of the whole series. Reads as one
    continuous arc about law, class, policing and what a city owes its people.
    What you give up: Ankh-Morpork changes enormously across books that are not
    on this list, so the city the Watch polices keeps growing offstage between
    volumes.
  orderedWorkIds:
    - discworld/guards-guards
    - discworld/men-at-arms
    - discworld/feet-of-clay
    - discworld/jingo
    - discworld/the-fifth-elephant
    - discworld/night-watch
    - discworld/thud
    - discworld/snuff
  debated:
    - "Night Watch rewards having read the earlier Watch books (it depends on knowing Vimes), so despite its time-travel setup it is best read in sequence, not first."
  sources:
    - https://www.lspace.org/books/reading-order-guides/
    - https://www.terrypratchettbooks.com/discworld-reading-order/

- id: discworld/industrial-revolution
  name: The Moist von Lipwig / Industrial Revolution thread
  type: curated
  source: canon
  rationale: >
    Ankh-Morpork drags itself into modernity - the postal service, paper money,
    the railway - with reformed con man Moist von Lipwig conscripted to make each
    one work. The Disc's late, systems-and-progress satire. The shortest thread
    and the most dependent: these are late books that assume an Ankh-Morpork the
    reader has watched change for twenty years, and three volumes is a thin
    sample of the series to judge it by.
  orderedWorkIds:
    - discworld/going-postal
    - discworld/making-money
    - discworld/raising-steam
  debated:
    - "The wider 'Industrial Revolution' theme also covers standalones like Moving Pictures, The Truth and Monstrous Regiment; this thread is kept to the three Moist von Lipwig books, which share a protagonist and read as an arc."
  sources:
    - https://www.lspace.org/books/reading-order-guides/
    - https://www.terrypratchettbooks.com/discworld-reading-order/

- id: discworld/tiffany-aching
  name: The Tiffany Aching thread
  type: curated
  source: canon
  rationale: >
    Five books following a young chalk-country witch from age nine into adulthood,
    with the tiny, brawling Nac Mac Feegle at her side. Written for younger readers
    but unsparing; a complete, finished arc and an ideal entry point. The cost
    is mostly paid later, not now: Granny Weatherwax arrives already carrying
    everything the Witches thread built, so reading these first means meeting
    her at the end of a story you have not had yet.
  orderedWorkIds:
    - discworld/the-wee-free-men
    - discworld/a-hat-full-of-sky
    - discworld/wintersmith
    - discworld/i-shall-wear-midnight
    - discworld/the-shepherds-crown
  debated:
    - "These are usually read on their own, but they sit downstream of the Witches thread (Granny Weatherwax appears throughout), so some readers come to them after the witches."
  sources:
    - https://www.lspace.org/books/reading-order-guides/
    - https://www.terrypratchettbooks.com/discworld-reading-order/
