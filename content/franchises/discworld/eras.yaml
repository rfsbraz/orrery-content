# Creative periods - the narrative spine of the aura. Three widely-recognised
# phases: the early fantasy parody, the mature satirical middle, and the darker
# late "embuggerance" era written in the shadow of Alzheimer's. Inline references
# use [[type:id|text]] and must resolve.

- id: the-parody-years
  title: The Parody Years
  period: "1983-1991"
  themes: [fantasy send-up, Rincewind and the wizards, broad comedy, world-building]
  description: >
    The Disc as a machine for parodying sword-and-sorcery.
    [[work:discworld/the-colour-of-magic|The Colour of Magic]] and
    [[work:discworld/the-light-fantastic|The Light Fantastic]] send up the genre
    wholesale, but the world quickly starts to matter more than the jokes:
    [[work:discworld/mort|Mort]], [[work:discworld/wyrd-sisters|Wyrd Sisters]] and
    [[work:discworld/guards-guards|Guards! Guards!]] found the threads - Death,
    the Witches, the Watch - that carry the rest of the series.

- id: the-golden-middle
  title: The Golden Middle
  period: "1992-2006"
  themes: [social and moral satire, institutions and power, belief, character depth]
  description: >
    Widely held as Pratchett's peak. [[work:discworld/small-gods|Small Gods]] turns
    the comic engine on faith and cruelty, and the thread novels deepen into serious
    satire in comic dress - the Watch under Vimes
    ([[work:discworld/men-at-arms|Men at Arms]] to
    [[work:discworld/night-watch|Night Watch]] and [[work:discworld/thud|Thud!]]),
    the Witches, Death, the new Moist von Lipwig and Tiffany Aching threads. The
    parody has become a way of writing about how societies actually work.

- id: the-embuggerance
  title: The Embuggerance
  period: "2007-2015"
  themes: [mortality, tolerance and personhood, dictated late style, closing the world]
  description: >
    Written after the 2007 Alzheimer's diagnosis, latterly by dictation. The late
    novels - [[work:discworld/unseen-academicals|Unseen Academicals]],
    [[work:discworld/snuff|Snuff]], [[work:discworld/raising-steam|Raising Steam]]
    and the posthumous [[work:discworld/the-shepherds-crown|The Shepherd's Crown]] -
    are more urgent and more openly moral, pressing hard on who counts as a person
    (goblins, golems, the excluded) and on endings. Some readers find the prose
    looser than the golden middle; most find the heart undimmed.
