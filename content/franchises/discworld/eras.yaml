# Creative periods - the narrative spine of the aura.
#
# PROVENANCE WARNING: calling these "widely-recognised phases" would have no
# citable basis. No source found periodises Pratchett into named phases, and
# the search was widened from Discworld to the whole career without changing
# that result: not Wikipedia, not the L-Space wiki, not the L-Space
# reading-order guides, not the Science Fiction Encyclopedia entry, not the
# obituaries (the Guardian's and the Scotsman's are both strictly
# chronological and name no phase), not the estate's own "About Sir Terry"
# page (it groups the shelf by series, never by period), and not the
# book-length criticism (Butler/James/Mendlesohn, "Terry Pratchett: Guilty of
# Literature", is organised by character cycle, not by career phase). What IS
# sourced is the parody-to-satire evolution (unnamed and undated by its
# sources), the bibliographic fact that three novels precede the series, and
# the 2007-2015 illness period, which rests on Pratchett's own word. The two
# middle eras are therefore our shape, flagged rather than silently deleted.
#
# REJECTED PERIODISATIONS, so the next reader does not re-derive them:
#   - "The Colin Smythe years". A true publishing fact (Smythe published the
#     first five Pratchett novels, 1971-1986) and a bad era: it would run
#     across the start of Discworld and cut the series at book 2, which is
#     accurate and useless. The widening of this wing from the series to the
#     career does not rescue it; the cut still lands mid-series.
#   - A Gollancz/Doubleday split. Real (hardcover rights moved to Doubleday in
#     1998) but a worse fit than what is here: a 1998-2015 span would lump the
#     satire peak together with the illness period and overlap an era that is
#     actually received.
#
# The eight works outside every span below are deliberate, not a gap to close.
# See the trailing note.

- id: before-the-discworld
  title: Before the Discworld
  period: "1971-1981"
  themes: [flat worlds, science-fiction pastiche, apprenticeship in public]
  provenance: publishing
  description: >
    The three novels published before the series began, written around a
    journalist's day job: [[work:discworld/the-carpet-people|The Carpet
    People]], begun when Pratchett was 17 and published by Colin Smythe in
    1971, and the two science fiction novels
    [[work:discworld/the-dark-side-of-the-sun|The Dark Side of the Sun]] and
    [[work:discworld/strata|Strata]]. Two of the three already turn on a flat
    world, and Strata is generally read as the Disc's prototype.
  note: >
    The BOUNDARY is the sourced half. 1971 is the first novel; the period ends
    where the series starts, and the Scotsman's obituary puts that transition
    plainly: "the publication of The Colour of Magic in 1983 was the beginning
    of his life as a successful fantasy author". 1982 is empty of works, so
    nothing falls in the join. The LABEL is ours and deliberately flat: no
    source names this period anything, and the two obvious names both
    misdescribe it ("the early science fiction novels" would be wrong about
    The Carpet People, a children's fantasy; "the Colin Smythe years" runs on
    past 1983 into the Disc). A neutral bibliographic description was
    preferred to a coinage. The grouping itself is not ours: every career
    account read treats the pre-1983 novels as a run that precedes the series.
  sources:
    - https://www.scotsman.com/news/obituaries/obituary-sir-terry-pratchett-author-1510381
    - https://sf-encyclopedia.com/entry/pratchett_terry
    - https://en.wikipedia.org/wiki/Terry_Pratchett_bibliography

- id: the-parody-years
  title: The Parody Years
  period: "1983-1991"
  themes: [fantasy send-up, Rincewind and the wizards, broad comedy, world-building]
  provenance: none
  description: >
    The Disc as a machine for parodying sword-and-sorcery.
    [[work:discworld/the-colour-of-magic|The Colour of Magic]] and
    [[work:discworld/the-light-fantastic|The Light Fantastic]] send up the genre
    wholesale, but the world quickly starts to matter more than the jokes:
    [[work:discworld/mort|Mort]], [[work:discworld/wyrd-sisters|Wyrd Sisters]] and
    [[work:discworld/guards-guards|Guards! Guards!]] found the threads - Death,
    the Witches, the Watch - that carry the rest of the series. The Disc does
    not have the decade to itself: the same years bring
    [[work:discworld/the-unadulterated-cat|The Unadulterated Cat]], the
    Bromeliad trilogy for children beginning with
    [[work:discworld/truckers|Truckers]], and
    [[work:discworld/good-omens|Good Omens]] with
    [[author:neil-gaiman|Neil Gaiman]].
  note: >
    The SHAPE is sourced - the early novels "were written largely to parody
    classic sword-and-sorcery fiction" and the series later "dispensed with
    parody almost entirely" - but nobody dates that shift, and the label is
    ours. The 1991 end is a round number we chose: no source places the end of
    the parody phase anywhere, and the usual fan candidates (Mort 1987, Guards!
    Guards! 1989, Wyrd Sisters 1988) are an unsettled argument rather than a
    consensus. Do not read the boundary as received.
  sources:
    - https://en.wikipedia.org/wiki/Terry_Pratchett
    - https://en.wikipedia.org/wiki/Discworld

- id: the-golden-middle
  title: The Satire Years
  period: "1992-2006"
  themes: [social and moral satire, institutions and power, belief, character depth]
  provenance: none
  description: >
    The stretch in which the parody has been dispensed with almost entirely and
    the Disc has become a machine for satire. [[work:discworld/small-gods|Small Gods]] turns
    the comic engine on faith and cruelty, and the thread novels deepen into serious
    satire in comic dress - the Watch under Vimes
    ([[work:discworld/men-at-arms|Men at Arms]] to
    [[work:discworld/night-watch|Night Watch]] and [[work:discworld/thud|Thud!]]),
    the Witches, Death, the new Moist von Lipwig and Tiffany Aching threads. The
    comedy has become a way of writing about how societies actually work.
    Off the Disc, the Johnny Maxwell books
    ([[work:discworld/only-you-can-save-mankind|Only You Can Save Mankind]] to
    [[work:discworld/johnny-and-the-bomb|Johnny and the Bomb]]) do the same
    work for younger readers.
  note: >
    UNSOURCED - recommended for removal or merging. Retitled from "The Golden
    Middle", which was our coinage and a quality verdict. No source periodises a
    Discworld middle period and none uses this span; the era existed largely
    because it was the gap between the other two, which is precisely the tiling
    the eras skill forbids. The replacement title at least rests on the sourced
    parody-to-satire framing rather than on a judgement, but the period is still
    ours. The one clean publishing boundary available nearby is 1998, when the
    hardcover rights moved from Gollancz to Doubleday.
  sources:
    - https://en.wikipedia.org/wiki/Terry_Pratchett
    - https://wiki.lspace.org/Gollancz

- id: the-embuggerance
  title: The Embuggerance
  period: "2007-2015"
  themes: [mortality, tolerance and personhood, dictated late style, closing the world]
  provenance: author
  description: >
    Written after the Alzheimer's diagnosis Pratchett announced on 11 December
    2007 and named himself: "now The Embuggerance is finally catching up with
    me, along with other age-related ailments". Latterly by dictation. The late
    novels - [[work:discworld/unseen-academicals|Unseen Academicals]],
    [[work:discworld/snuff|Snuff]], [[work:discworld/raising-steam|Raising Steam]]
    and the posthumous [[work:discworld/the-shepherds-crown|The Shepherd's Crown]] -
    are more urgent and more openly moral, pressing hard on who counts as a person
    (goblins, golems, the excluded) and on endings. Some readers find the prose
    looser than the books before them; most find the heart undimmed. The span
    is not Discworld-only and not slow: [[work:discworld/nation|Nation]]
    (2008), of which he said "I believe that Nation is the best book I have
    ever written or will write", [[work:discworld/dodger|Dodger]] (2012),
    and the Long Earth sequence
    written with [[author:stephen-baxter|Stephen Baxter]] all belong to it.
  note: >
    RECEIVED, with one caveat worth stating. "Embuggerance" is Pratchett's own
    word for his diagnosis, and he capitalised it as a proper noun - the
    strongest rung of provenance there is. But he named his ILLNESS, not a body
    of work; using it as the title of a creative period is a small editorial
    move on top of a received term, and no source uses it to name the late
    novels. The boundaries, by contrast, are exact and sourced: the 11 December
    2007 announcement, his death on 12 March 2015, and The Shepherd's Crown
    published posthumously that August.
  sources:
    - https://discworld.com/the-embuggerance/
    - https://en.wikipedia.org/wiki/Terry_Pratchett
    - https://en.wikipedia.org/wiki/The_Shepherd%27s_Crown
    - https://www.hbook.com/story/terry-pratchetts-2009-boston-globe-horn-book-fiction-award-speech-for-nation

# THE FIVE WORKS AFTER 2015 SIT OUTSIDE EVERY ERA ON PURPOSE. They are
# posthumous publications, not a late creative period, and the validator's
# "falls outside every era" warning is answered here rather than closed by
# stretching a span:
#   the-long-cosmos (2016)             - finished by Stephen Baxter and
#                                        published after Pratchett's death.
#   the-witchs-vacuum-cleaner (2016)   - collections of children's stories
#   father-christmass-fake-beard (2017)  written for the Bucks Free Press,
#   the-time-travelling-caveman (2020)   gathered and issued posthumously.
#   a-stroke-of-the-pen (2023)         - twenty newspaper stories from the
#                                        1970s and 80s, mostly published under
#                                        the pseudonym Patrick Kearns, only
#                                        attributed to Pratchett in 2023.
# Note the trap in the last four: era membership is computed from the
# PUBLICATION year, but the writing is juvenilia and early journalism. Dating
# them by composition would scatter them across 1966-1984 and would contradict
# the published record the rest of this wing is built on, so they stay
# posthumous and stay outside. Dragons at Crumbling Castle (2014) is the same
# kind of book and DOES fall inside an era, for the same mechanical reason;
# that inconsistency is in the data, not in the eras.
# The only interior gap is 1982, which contains no works.
