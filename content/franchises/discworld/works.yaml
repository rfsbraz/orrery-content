  sources:
    - "https://colinsmythe.co.uk/the-unadulterated-cat/"
    - "https://en.wikipedia.org/wiki/Terry_Pratchett"

- id: discworld/good-omens
  title: "Good Omens"
  authorIds: [terry-pratchett]
  withAuthorIds: [neil-gaiman]
  authorRole: co-author
  published: 1990
  subseries: null
  canonTier: core
  synopsis: "An angel and a demon, gone comfortably native after millennia on Earth, try to derail the apocalypse when the infant Antichrist is mislaid in an English village. Co-written with Neil Gaiman, both hands on the whole book."
  # A work lives in exactly one franchise: this is the canonical entry, so a
  # future Neil Gaiman wing must cross-reference it, never duplicate it.
  note: >
