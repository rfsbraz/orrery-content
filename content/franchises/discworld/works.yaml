  title: "Hogfather"
  authorIds: [terry-pratchett]
  published: 1996
  subseries: "Death"
  canonTier: core
  synopsis: "When the Disc's Father Christmas is targeted for assassination, Death takes over the sleigh and Susan must work out why belief itself is under attack."
