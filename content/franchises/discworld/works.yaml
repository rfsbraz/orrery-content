# --- City Watch ---
- id: discworld/guards-guards
  title: "Guards! Guards!"
  authorIds: [terry-pratchett]
  published: 1989
  subseries: "City Watch"
  canonTier: core
  synopsis: "A drunk captain, a dwarf-raised recruit and a summoned dragon drag the ruined Night Watch back into meaning - the birth of the Watch as we know it."
  sources: [https://en.wikipedia.org/wiki/Guards!_Guards!]

- id: discworld/men-at-arms
  title: "Men at Arms"
  authorIds: [terry-pratchett]
  published: 1993
  subseries: "City Watch"
  canonTier: core
  synopsis: "The Watch diversifies - troll, dwarf, and werewolf - as a stolen firearm and a plot to restore the monarchy test Captain Vimes on the eve of his retirement."
  sources: [https://en.wikipedia.org/wiki/Men_at_Arms]

- id: discworld/feet-of-clay
  title: "Feet of Clay"
  authorIds: [terry-pratchett]
  published: 1996
  subseries: "City Watch"
  canonTier: core
  synopsis: "A poisoning the Watch cannot explain and a series of golem deaths force questions about who owns a life that was made, not born."
  sources: [https://en.wikipedia.org/wiki/Feet_of_Clay_(novel)]

- id: discworld/jingo
  title: "Jingo"
  authorIds: [terry-pratchett]
  published: 1997
  subseries: "City Watch"
  canonTier: core
  synopsis: "A disputed island surfaces between Ankh-Morpork and Klatch and the drums of war start beating; Vimes tries to arrest two armies for breach of the peace."
  sources: [https://en.wikipedia.org/wiki/Jingo_(novel)]

- id: discworld/the-fifth-elephant
  title: "The Fifth Elephant"
  authorIds: [terry-pratchett]
  published: 1999
  subseries: "City Watch"
  canonTier: core
  synopsis: "Vimes is sent as a diplomat to dwarf country over a stolen coronation stone, tangling Ankh-Morpork in dwarf, werewolf and vampire politics."
  sources: [https://en.wikipedia.org/wiki/The_Fifth_Elephant]

- id: discworld/night-watch
  title: "Night Watch"
  authorIds: [terry-pratchett]
  published: 2002
  subseries: "City Watch"
  canonTier: core
  synopsis: "Thrown back in time chasing a killer, Commander Vimes must become the mentor his own younger self needs, through a doomed revolution he already knows the end of."
  sources: [https://en.wikipedia.org/wiki/Night_Watch_(Discworld)]

- id: discworld/thud
  title: "Thud!"
  authorIds: [terry-pratchett]
  published: 2005
  subseries: "City Watch"
  canonTier: core
  synopsis: "An old dwarf-troll battle threatens to reignite in the city, and Vimes must solve a murder and get home, no matter what, to read his son a bedtime story."
  sources: [https://en.wikipedia.org/wiki/Thud!]

- id: discworld/snuff
  title: "Snuff"
  authorIds: [terry-pratchett]
  published: 2011
  subseries: "City Watch"
  canonTier: core
  synopsis: "On a country holiday, Vimes uncovers the systematic murder and enslavement of goblins, and decides the law extends even to those no one counts as people."
  sources: [https://en.wikipedia.org/wiki/Snuff_(Pratchett_novel)]

# --- Industrial Revolution (Moist von Lipwig) ---
- id: discworld/going-postal
  title: "Going Postal"
  authorIds: [terry-pratchett]
  published: 2004
  subseries: "Industrial Revolution"
  canonTier: core
  synopsis: "A condemned con man is given a choice: run Ankh-Morpork's derelict Post Office, or die. He resurrects the mail to take on the corrupt clacks monopoly."
  sources: [https://en.wikipedia.org/wiki/Going_Postal]

- id: discworld/making-money
  title: "Making Money"
  authorIds: [terry-pratchett]
  published: 2007
  subseries: "Industrial Revolution"
  canonTier: core
  synopsis: "Moist von Lipwig is press-ganged into running the Royal Bank and Mint, and invents paper money for a city that trusts no one - least of all him."
  sources: [https://en.wikipedia.org/wiki/Making_Money]

- id: discworld/raising-steam
  title: "Raising Steam"
  authorIds: [terry-pratchett]
  published: 2013
  subseries: "Industrial Revolution"
  canonTier: core
  synopsis: "The railway comes to the Disc, and Moist must drive it through while dwarf extremists try to derail modernity itself."
  connections:
    - discworld/thud
  sources: [https://en.wikipedia.org/wiki/Raising_Steam]

# --- Tiffany Aching ---
- id: discworld/the-wee-free-men
  title: "The Wee Free Men"
  authorIds: [terry-pratchett]
  published: 2003
  subseries: "Tiffany Aching"
  canonTier: core
  synopsis: "A nine-year-old chalk-country girl, armed with a frying pan and the tiny blue Nac Mac Feegle, crosses into Fairyland to get her brother back."
  sources: [https://en.wikipedia.org/wiki/The_Wee_Free_Men]

- id: discworld/a-hat-full-of-sky
  title: "A Hat Full of Sky"
  authorIds: [terry-pratchett]
  published: 2004
  subseries: "Tiffany Aching"
  canonTier: core
  synopsis: "Sent away to train as a witch, Tiffany is stalked by a bodiless hiver that wants her mind, and Granny Weatherwax watches to see what she is made of."
  sources: [https://en.wikipedia.org/wiki/A_Hat_Full_of_Sky]

- id: discworld/wintersmith
  title: "Wintersmith"
  authorIds: [terry-pratchett]
  published: 2006
  subseries: "Tiffany Aching"
  canonTier: core
  synopsis: "Tiffany steps into a dance she should have left alone and catches the eye of the Wintersmith, the elemental of winter, who decides she should be his."
  sources: [https://en.wikipedia.org/wiki/Wintersmith]

- id: discworld/i-shall-wear-midnight
  title: "I Shall Wear Midnight"
  authorIds: [terry-pratchett]
  published: 2010
  subseries: "Tiffany Aching"
  canonTier: core
  synopsis: "Now the chalk's working witch, Tiffany faces an ancient spirit of witch-hatred rising in ordinary people's fear and suspicion."
  sources: [https://en.wikipedia.org/wiki/I_Shall_Wear_Midnight]

- id: discworld/the-shepherds-crown
  title: "The Shepherd's Crown"
  authorIds: [terry-pratchett]
  published: 2015
  subseries: "Tiffany Aching"
  canonTier: core
  synopsis: "A passing leaves the border between worlds thin, and the Elves press to return; Tiffany must hold the chalk and decide what kind of witch she will be. Pratchett's final novel, published posthumously."
  sources: [https://en.wikipedia.org/wiki/The_Shepherd%27s_Crown]

# --- Standalones ---
- id: discworld/pyramids
  title: "Pyramids"
  authorIds: [terry-pratchett]
  published: 1989
  subseries: null
  canonTier: core
  synopsis: "A trained assassin inherits the throne of a tiny, ancient river-kingdom trapped by its own traditions, where building the biggest pyramid yet folds up time."
  sources: [https://en.wikipedia.org/wiki/Pyramids_(novel)]

- id: discworld/moving-pictures
  title: "Moving Pictures"
  authorIds: [terry-pratchett]
  published: 1990
  subseries: null
  canonTier: core
  synopsis: "Alchemists discover moving pictures and a Hollywood springs up at Holy Wood, as something behind the silver screen tries to get out. Introduces Archchancellor Ridcully."
  sources: [https://en.wikipedia.org/wiki/Moving_Pictures_(novel)]

- id: discworld/small-gods
  title: "Small Gods"
  authorIds: [terry-pratchett]
  published: 1992
  subseries: null
  canonTier: core
  synopsis: "The Great God Om finds himself incarnated as a one-eyed tortoise with a single true believer - a slow novice named Brutha - in a theocracy that has forgotten him. Often named the best entry point."
  sources: [https://en.wikipedia.org/wiki/Small_Gods]

- id: discworld/the-truth
  title: "The Truth"
  authorIds: [terry-pratchett]
  published: 2000
  subseries: null
  canonTier: core
  synopsis: "The movable-type press reaches Ankh-Morpork and William de Worde stumbles into running the Disc's first newspaper, and into a plot against the Patrician."
  sources: [https://en.wikipedia.org/wiki/The_Truth_(novel)]

- id: discworld/the-amazing-maurice-and-his-educated-rodents
  title: "The Amazing Maurice and His Educated Rodents"
  authorIds: [terry-pratchett]
  published: 2001
  subseries: null
  canonTier: core
  synopsis: "A streetwise talking cat runs a Pied Piper scam with a tribe of self-aware rats, until a town where the story turns real. The first Discworld novel written for younger readers; won the Carnegie Medal."
  sources: [https://en.wikipedia.org/wiki/The_Amazing_Maurice_and_His_Educated_Rodents]

- id: discworld/monstrous-regiment
  title: "Monstrous Regiment"
  authorIds: [terry-pratchett]
  published: 2003
  subseries: null
  canonTier: core
  synopsis: "A girl disguises herself as a boy to find her brother and joins a last-ditch regiment for a dwindling, god-ridden nation at war - and she is not the only one hiding."
  sources: [https://en.wikipedia.org/wiki/Monstrous_Regiment_(novel)]

- id: discworld/unseen-academicals
  title: "Unseen Academicals"
  authorIds: [terry-pratchett]
  published: 2009
  subseries: null
  canonTier: core
  synopsis: "The wizards of Unseen University must field a football team, and below stairs a candle-dribbler, a night-cook and a mysterious pale figure find their moment. A wizards ensemble more than a Rincewind book."
  sources: [https://en.wikipedia.org/wiki/Unseen_Academicals]

# --- Extended: the Science of Discworld (with Ian Stewart and Jack Cohen) ---
- id: discworld/the-science-of-discworld
  title: "The Science of Discworld"
  authorIds: [terry-pratchett]
  withAuthorIds: [ian-stewart, jack-cohen]
  published: 1999
  subseries: "Science of Discworld"
  canonTier: extended
  synopsis: "The wizards accidentally create a universe with no narrative causality - ours - in a book that alternates a Discworld story with real popular-science essays."
  sources: [https://en.wikipedia.org/wiki/The_Science_of_Discworld]

- id: discworld/the-science-of-discworld-ii-the-globe
  title: "The Science of Discworld II: The Globe"
  authorIds: [terry-pratchett]
  withAuthorIds: [ian-stewart, jack-cohen]
  published: 2002
  subseries: "Science of Discworld"
  canonTier: extended
  synopsis: "The wizards intervene in the history of Roundworld's humans, framing essays on storytelling, evolution and what makes us human."
  sources: [https://en.wikipedia.org/wiki/The_Science_of_Discworld_II:_The_Globe]

- id: discworld/the-science-of-discworld-iii-darwins-watch
  title: "The Science of Discworld III: Darwin's Watch"
  authorIds: [terry-pratchett]
  withAuthorIds: [ian-stewart, jack-cohen]
  published: 2005
  subseries: "Science of Discworld"
  canonTier: extended
  synopsis: "The wizards must fix a history in which Darwin wrote the wrong book, wrapped around essays on evolution, contingency and science."
  sources: [https://en.wikipedia.org/wiki/The_Science_of_Discworld_III:_Darwin%27s_Watch]

- id: discworld/the-science-of-discworld-iv-judgement-day
  title: "The Science of Discworld IV: Judgement Day"
  authorIds: [terry-pratchett]
  withAuthorIds: [ian-stewart, jack-cohen]
  published: 2013
  subseries: "Science of Discworld"
  canonTier: extended
  synopsis: "A court case over who owns Roundworld frames essays on belief, science and cosmology - the last of the four collaborations."
  sources: [https://en.wikipedia.org/wiki/The_Science_of_Discworld_IV:_Judgement_Day]

# --- Apocrypha: major companion / map works (with Stephen Briggs) ---
- id: discworld/the-streets-of-ankh-morpork
  title: "The Streets of Ankh-Morpork"
  authorIds: [terry-pratchett]
  withAuthorIds: [stephen-briggs]
  published: 1993
  subseries: "Maps and Companions"
  canonTier: apocrypha
  synopsis: "The first Discworld 'Mapp' - a full street map of the great city, the point at which Ankh-Morpork's geography became fixed canon."
  sources: [https://wiki.lspace.org/The_Streets_of_Ankh-Morpork]

- id: discworld/the-discworld-companion
  title: "The Discworld Companion"
  authorIds: [terry-pratchett]
  withAuthorIds: [stephen-briggs]
  published: 1994
  subseries: "Maps and Companions"
  canonTier: apocrypha
  synopsis: "An A-to-Z reference to the Disc's people, places and lore; expanded in later editions as the series grew."
  sources: [https://wiki.lspace.org/The_Discworld_Companion]

- id: discworld/the-discworld-mapp
  title: "The Discworld Mapp"
  authorIds: [terry-pratchett]
  withAuthorIds: [stephen-briggs]
  published: 1995
  subseries: "Maps and Companions"
  canonTier: apocrypha
  synopsis: "A map of the whole Disc - as authoritative as a map of a world that is mostly made of narrative can be."
  sources: [https://wiki.lspace.org/The_Discworld_Mapp]
