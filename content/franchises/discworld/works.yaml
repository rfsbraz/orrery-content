# --- Early novels (pre-Discworld) ---
- id: discworld/the-carpet-people
  title: "The Carpet People"
  authorIds: [terry-pratchett]
  published: 1971
  subseries: null
  canonTier: core
  synopsis: "An epic in miniature: the Munrung tribe treks across the world of the Carpet, where a force called Fray levels whole cities between the hairs. Pratchett's first novel, begun in his teens."
  note: >
    Dated by first publication: Colin Smythe, 16 November 1971. Pratchett
    substantially rewrote the book and Doubleday published the second version
    on 30 June 1992; catalogues often carry the 1992 date, which is the
    revision, not the first publication.
  sources:
    - "https://colinsmythe.co.uk/the-carpet-people/"
    - "https://en.wikipedia.org/wiki/Terry_Pratchett"

- id: discworld/the-dark-side-of-the-sun
  title: "The Dark Side of the Sun"
  authorIds: [terry-pratchett]
  published: 1976
  subseries: null
  canonTier: core
  synopsis: "A young heir sets out to find the world of the Jokers, a vanished race that littered the galaxy with inexplicable artefacts, guided by a probability mathematics that has already predicted his death. Pratchett's first science fiction novel."
  sources:
    - "https://en.wikipedia.org/wiki/Terry_Pratchett"

- id: discworld/strata
  title: "Strata"
  authorIds: [terry-pratchett]
  published: 1981
  subseries: null
  canonTier: core
  synopsis: "A builder of planets discovers a flat, disc-shaped world that should not exist and joins an expedition onto it. The disc idea Pratchett would rebuild two years later as the Discworld."
  sources:
    - "https://en.wikipedia.org/wiki/Terry_Pratchett"

# --- The Bromeliad (the Nome trilogy) ---
- id: discworld/truckers
  title: "Truckers"
  authorIds: [terry-pratchett]
  published: 1989
  subseries: "The Bromeliad"
  canonTier: core
  synopsis: "Thousands of four-inch nomes live under the floorboards of a department store, certain the Store is the whole universe - until nomes from Outside arrive with news that it is closing down."
  note: >
    First published by Doubleday on 25 September 1989 per the publisher's own
    bibliography (Colin Smythe). Wikipedia's main Terry Pratchett article says
    1988; the publisher record and the Nome Trilogy article both say 1989, so
    1989 is kept.
  sources:
    - "https://colinsmythe.co.uk/terry-pratchett/truckers-bromeliad/"
    - "https://en.wikipedia.org/wiki/The_Nome_Trilogy"

- id: discworld/diggers
  title: "Diggers"
  authorIds: [terry-pratchett]
  published: 1990
  subseries: "The Bromeliad"
  canonTier: core
  synopsis: "Resettled in an abandoned quarry, the nomes face the humans' return - and split between digging in to fight and looking for another way out."
  sources:
    - "https://colinsmythe.co.uk/terry-pratchett/truckers-bromeliad/"
    - "https://en.wikipedia.org/wiki/The_Nome_Trilogy"

- id: discworld/wings
  title: "Wings"
  authorIds: [terry-pratchett]
  published: 1990
  subseries: "The Bromeliad"
  canonTier: core
  synopsis: "Masklin's party stows away on Concorde and chases a satellite launch to call down the Ship that first brought the nomes to Earth."
  note: >
    Diggers and Wings are both 1990: Diggers on 5 April, Wings on 21
    September (publisher's bibliography), so Diggers precedes Wings within
    the year.
  sources:
    - "https://colinsmythe.co.uk/terry-pratchett/truckers-bromeliad/"
    - "https://en.wikipedia.org/wiki/The_Nome_Trilogy"

# --- Collaborations and standalones (1989-1990) ---
- id: discworld/the-unadulterated-cat
  title: "The Unadulterated Cat"
  authorIds: [terry-pratchett]
  published: 1989
  subseries: null
  canonTier: extended
  synopsis: "A short comic manifesto for Real cats - scarred, opinionated and unimpressed - against the fluffy advertised kind."
  note: >
    Illustrated by the cartoonist Gray Jolliffe, credited on the cover. He is
    named here rather than in withAuthorIds because the schema has no
