# Bibliography (Works) - the abstract books; editions/covers are separate metadata.
# IDs are STABLE and permanent (user data references them). Dates are year-precision.
# The 41 Discworld novels (core), the four Science of Discworld books (extended),
# and a few major companion/map works (apocrypha). Titles keep British spellings
# (Colour) and are quoted where they contain punctuation. externalIds left for the
# enrichment bot. Subseries follow the community reading-order threads; standalones
# carry subseries: null (see the PR notes for the contested boundaries).

# --- Rincewind ---
- id: discworld/the-colour-of-magic
  title: "The Colour of Magic"
  authorIds: [terry-pratchett]
  published: 1983
  subseries: "Rincewind"
  canonTier: core
  synopsis: "The inept wizard Rincewind guides the Disc's first tourist through a world that parodies every fantasy cliche going."
  sources: [https://en.wikipedia.org/wiki/The_Colour_of_Magic]

- id: discworld/the-light-fantastic
  title: "The Light Fantastic"
  authorIds: [terry-pratchett]
  published: 1986
  subseries: "Rincewind"
  canonTier: core
  synopsis: "A red star bears down on the Disc, and its survival hinges on a spell lodged in Rincewind's head."
  connections:
    - discworld/the-colour-of-magic
  sources: [https://en.wikipedia.org/wiki/The_Light_Fantastic]

- id: discworld/sourcery
  title: "Sourcery"
  authorIds: [terry-pratchett]
  published: 1988
  subseries: "Rincewind"
  canonTier: core
  synopsis: "The eighth son of an eighth son of a wizard threatens to bring back raw, world-ending magic; Rincewind runs toward the trouble for once."
  sources: [https://en.wikipedia.org/wiki/Sourcery]

- id: discworld/eric
  title: "Eric"
  authorIds: [terry-pratchett]
  published: 1990
  subseries: "Rincewind"
  canonTier: core
  synopsis: "A teenage demonologist summons Rincewind instead of a demon and gets three wishes that all go horribly right. Originally an illustrated novella."
  sources: [https://en.wikipedia.org/wiki/Eric_(novel)]

- id: discworld/interesting-times
  title: "Interesting Times"
  authorIds: [terry-pratchett]
  published: 1994
  subseries: "Rincewind"
  canonTier: core
  synopsis: "Rincewind is flung to the Counterweight Continent, where a revolution and the ageing Cohen the Barbarian collide over an empire."
  sources: [https://en.wikipedia.org/wiki/Interesting_Times]

- id: discworld/the-last-continent
  title: "The Last Continent"
  authorIds: [terry-pratchett]
  published: 1998
  subseries: "Rincewind"
  canonTier: core
  synopsis: "Rincewind is stranded on a sunburnt continent that is very much not Australia, while the wizards of Unseen University get lost in time."
  sources: [https://en.wikipedia.org/wiki/The_Last_Continent]

- id: discworld/the-last-hero
  title: "The Last Hero"
  authorIds: [terry-pratchett]
  published: 2001
  subseries: "Rincewind"
  canonTier: core
  synopsis: "Cohen the Barbarian sets out to return fire to the gods with interest; a lavishly illustrated novella spanning the Watch, the wizards and the gods."
  sources: [https://en.wikipedia.org/wiki/The_Last_Hero]

# --- Witches ---
- id: discworld/equal-rites
  title: "Equal Rites"
  authorIds: [terry-pratchett]
  published: 1987
  subseries: "Witches"
  canonTier: core
