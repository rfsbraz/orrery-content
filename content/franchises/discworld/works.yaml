- id: discworld/thief-of-time
  title: "Thief of Time"
  authorIds: [terry-pratchett]
  published: 2001
  subseries: "Death"
  canonTier: core
  synopsis: "A perfect clock threatens to stop time forever; Susan, a History Monk and Death's search for the fifth horseman race to prevent it."
