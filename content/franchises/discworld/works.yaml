- id: discworld/maskerade
  title: "Maskerade"
  authorIds: [terry-pratchett]
  published: 1995
  subseries: "Witches"
  canonTier: core
  synopsis: "Granny and Nanny follow a young witch to the Ankh-Morpork Opera House, where a masked killer haunts the wings."
  sources: [https://en.wikipedia.org/wiki/Maskerade]

- id: discworld/carpe-jugulum
  title: "Carpe Jugulum"
  authorIds: [terry-pratchett]
  published: 1998
  subseries: "Witches"
  canonTier: core
  synopsis: "Modern, rational vampires invite themselves into Lancre, and a crisis of faith pushes Granny Weatherwax to her limits."
  sources: [https://en.wikipedia.org/wiki/Carpe_Jugulum]

# --- Death ---
- id: discworld/mort
  title: "Mort"
  authorIds: [terry-pratchett]
  published: 1987
  subseries: "Death"
  canonTier: core
  synopsis: "Death takes an apprentice - an awkward boy named Mort - who lets his heart interfere with the duty of the scythe."
  sources: [https://en.wikipedia.org/wiki/Mort]

- id: discworld/reaper-man
  title: "Reaper Man"
  authorIds: [terry-pratchett]
  published: 1991
  subseries: "Death"
  canonTier: core
  synopsis: "Made mortal and given a lifespan, Death learns to live as a farmhand while surplus life-force runs wild in the world he left."
