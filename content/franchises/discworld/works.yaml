- id: discworld/wyrd-sisters
  title: "Wyrd Sisters"
  authorIds: [terry-pratchett]
  published: 1988
  subseries: "Witches"
  canonTier: core
  synopsis: "Three witches meddle in the fate of a murdered king's kingdom, in a comedy that runs on Macbeth and Hamlet."
