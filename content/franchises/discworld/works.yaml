# Bibliography (Works) - the abstract books; editions/covers are separate metadata.
# IDs are STABLE and permanent (user data references them). Dates are year-precision.
# The wing spans Terry Pratchett's complete published bibliography: the 41
# Discworld novels (core) plus the non-Discworld novels and trilogies (core),
# the Science of Discworld books, collections and non-fiction (extended), and
# companion works (apocrypha). Titles keep British spellings (Colour) and are
# quoted where they contain punctuation. externalIds are deliberately left
# unset. Subseries follow the community reading-order threads; standalones
# carry subseries: null (some thread boundaries are contested).

# --- Rincewind ---
- id: discworld/the-colour-of-magic
  title: "The Colour of Magic"
  authorIds: [terry-pratchett]
  published: 1983
  subseries: "Rincewind"
  canonTier: core
  synopsis: "The inept wizard Rincewind guides the Disc's first tourist through a world that parodies every fantasy cliche going."
  # The disc-world idea was first tried in Strata (1981), whose plot turns on a
  # flat, built world; the connection is standard record (see the Strata entry).
  connections:
    - discworld/strata
  sources: [https://en.wikipedia.org/wiki/The_Colour_of_Magic]

- id: discworld/the-light-fantastic
  title: "The Light Fantastic"
  authorIds: [terry-pratchett]
  published: 1986
  subseries: "Rincewind"
  canonTier: core
  synopsis: "A red star bears down on the Disc, and its survival hinges on a spell lodged in Rincewind's head."
  connections:
    - discworld/the-colour-of-magic
  sources: [https://en.wikipedia.org/wiki/The_Light_Fantastic]

- id: discworld/sourcery
  title: "Sourcery"
  authorIds: [terry-pratchett]
  published: 1988
  subseries: "Rincewind"
  canonTier: core
  synopsis: "The eighth son of an eighth son of a wizard threatens to bring back raw, world-ending magic; Rincewind runs toward the trouble for once."
  sources: [https://en.wikipedia.org/wiki/Sourcery]

- id: discworld/eric
  title: "Eric"
  authorIds: [terry-pratchett]
