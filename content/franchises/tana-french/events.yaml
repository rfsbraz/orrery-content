# FRANCHISE-SPECIFIC events only. Author-LIFE events live on the author entity
# (content/authors/tana-french.yaml). Shared world/culture events live in
# content/events/global.yaml.
#
# Six entries, placed to cover the two stretches of the working career that
# had no context at all: 2012-2019 (the choice of narrator that grew
# directly out of Ireland's ghost estates in 2012, the research encounter
# that gave The Trespasser its premise in 2016, the structural break that
# produced the standalone Witch Elm in 2018, and the screen adaptation that
# carried the first two novels to television in 2019) and 2021-2026 (the
# decision that turned a planned standalone into the Cal Hooper trilogy in
# 2023, and the real-world policing debate and pandemic-era Ireland the
# trilogy answers, closed out with The Keeper in 2026).
#
# Candidates tested and left out:
#   - awards coverage (Edgar/Anthony/Macavity/Barry, the LA Times Book Prize,
#     Bord Gais/Irish Book Award wins for Broken Harbour, The Secret Place and
#     The Trespasser): industry recognition, already noted where it matters
#     in works.yaml (Broken Harbour's own note carries its Book Prize), and
#     does not by itself change how any page reads
#   - the archaeological dig that seeded In the Woods (a site she worked on
#     as a young woman, the thought "what if three children went in and only
#     one came out"): a real, well-sourced origin story, but it predates the
#     debut and this wing's dark run sits after 2012; adding it here would
#     crowd the one year (2007) that already has an anchor rather than
#     lighting the years that have none
#   - Ethiopia and adoption: searched specifically on a lead from the
#     scaffold's family material and found nothing about her own daughters;
#     the Ethiopia connection in the record belongs to a grandmother two
#     generations back, not to French herself
#   - her father's death: no obituary, date, or any other record of it
#     surfaced in the sources checked
#   - Cal Hooper's origin (French reading Westerns and mapping their tropes
#     onto the west of Ireland before writing The Searcher): a real and
#     well-sourced origin story, but it belongs to 2019-2020, the year
#     already carrying the covid-19-pandemic-2020 global event; adding a
#     second anchor there would crowd a year that already has one instead of
#     lighting 2021-2026, which had none

- id: french-broken-harbor-ghost-estates-2012
  date: 2012
  title: Choosing the ghost estate over the story she'd planned
  scope: author-life
  reach: franchise
  impact: med
  description: >
    French means for young detective Stephen Moran to narrate the fourth
    Dublin Murder Squad novel, then changes course as she works through
    Ireland's post-crash "ghost estates," the developments abandoned
    mid-build when the Celtic Tiger economy collapsed. "The people who are
    stuck on these ghost estates are the people who followed the rules, and
    the rules let them down," she tells the Barnes & Noble Review, and that
    logic points instead to Mick "Scorcher" Kennedy, the detective
    introduced as a supporting character in
    [[work:tana-french/faithful-place|Faithful Place]]. The ghost estate in
    [[work:tana-french/broken-harbor|Broken Harbour]] is not invented
    scenery; it is the same collapse she is watching her own generation
    live through.
  spoilerAfter: null
  sources:
    - https://www.barnesandnoble.com/blog/ghost-estates-tana-french-on-ireland-after-the-bubble/

- id: french-trespasser-interrogation-power-2016
  date: 2016
  title: What a real interrogation felt like from the other chair
  scope: author-life
  reach: franchise
  impact: med
  description: >
    Preparing to write [[work:tana-french/the-trespasser|The Trespasser]],
    French asks the retired detective who has fact-checked her police
    procedure since her debut to demonstrate an interrogation, using her as
    the suspect. In her own account for the Irish Times, the change in him
    "was like flicking a switch": from an easy-going friend into "this
    concentrated, full-on, unstoppable force, locked on to me like a pit
    bull," leaving her "leaning back in my chair under the sheer momentum of
    that drive." Realizing that a detective's real currency is the power to
    make people act against their own interests gives her the premise she
    carries into the book: a Murder Squad where that same pressure turns
    inward, on one of its own.
  spoilerAfter: null
  sources:
    - https://www.irishtimes.com/culture/books/tana-french-on-the-trespasser-what-if-detectives-turned-on-a-colleague-1.2820650

- id: french-witch-elm-steps-outside-squad-2018
  date: 2018
  title: Turning the police procedural inside out
  scope: author-life
  reach: franchise
  impact: med
  description: >
    After six Dublin Murder Squad novels each narrated by a detective,
    French writes [[work:tana-french/the-witch-elm|The Witch Elm]], her
    first standalone, from the other side of an investigation instead. "I
    never want to get caught in the trap of writing the same book over and
    over," she tells CrimeReads. "I'd looked at the process of a criminal
    investigation from a detective's viewpoint six times, and I kept
    thinking about all the other people involved - witnesses, suspects,
    perpetrators, victims - and how different that process would look from
    their perspectives." Her editor calls the result "a murder mystery
    turned inside out": a narrator for whom the investigation brings
    confusion and threat rather than the control it gives her detectives.
  spoilerAfter: null
  sources:
    - https://crimereads.com/tana-french-were-all-unreliable-narrators/

- id: french-dublin-murders-tv-2019
  date: 2019
  dateRange: "2018-2019"
  title: The Murder Squad reaches the screen
  scope: industry
  reach: franchise
  impact: med
  description: >
    Starz acquires the US rights to a television adaptation of the first
    two Dublin Murder Squad novels, [[work:tana-french/in-the-woods|In the
    Woods]] and [[work:tana-french/the-likeness|The Likeness]], in December
    2018. Written by Sarah Phelps for the BBC, RTE and Starz, the
    eight-episode Dublin Murders drops the novels' rotating first-person
    narration for a close perspective shared by detectives Rob Reilly and
    Cassie Maddox (renamed from Ryan for the screen), and premieres on BBC
    One on 14 October 2019, RTE One on 16 October, and Starz on 10 November.
    Phelps, who says she had adapted only dead authors before this,
    describes the difference: working with a living one, "it's like
    watching your children go off to school."
  spoilerAfter: null
  sources:
    - https://deadline.com/2018/12/dublin-murders-starz-fremantle-tana-french-killian-scott-sarah-greene-sarah-phelps-tana-french-1202512580/
    - https://www.irishtimes.com/culture/tv-radio-web/on-the-set-of-dublin-murders-tana-french-s-crime-novels-come-to-tv-1.4036378
    - https://en.wikipedia.org/wiki/Dublin_Murders

- id: french-hunter-trilogy-decision-2023
  date: 2023
  title: The standalone that would not stay standalone
  scope: author-life
  reach: franchise
  impact: med
  description: >
    French means [[work:tana-french/the-searcher|The Searcher]] to stand
    alone, then changes her mind about Cal Hooper and Trey Reddy. Asked why
    she returned to them for [[work:tana-french/the-hunter|The Hunter]], she
    tells TODAY.com: "I wasn't planning to - I thought 'Searcher' was a
    standalone - but it felt like there was more to their story... there
    were still plenty of loose ends and shaky places." The trilogy grows
    out of that unfinished business rather than a plan made in advance.
  # The quote is elided where French describes the state she leaves her
  # characters in at the close of The Searcher. What the event carries -
  # that a standalone became a trilogy because she judged the story
  # unfinished - survives the cut intact, and the entry needs no reader
  # gate as a result.
  spoilerAfter: null
  sources:
    - https://www.today.com/popculture/books/tana-french-the-hunter-searcher-sequel-cover-interview-rcna99872

- id: french-keeper-trilogy-context-2026
  date: 2026
  dateRange: "2020-2026"
  title: A trilogy that opens on American policing and closes in Irish lockdown
  scope: author-life
  reach: franchise
  impact: med
  description: >
    The Cal Hooper trilogy runs from [[work:tana-french/the-searcher|The
    Searcher]], which opens on Cal's disenchantment with American policing,
    to [[work:tana-french/the-keeper|The Keeper]], set in an Ardnakelty
    still marked by Covid lockdown. Discussing the finished arc with
    Cultured, French draws the line between the two countries' policing
    conversations she wrote across: "In Ireland, our uniformed police don't
    carry guns... it's not the same thing as what was going on in the U.S.
    at the same time, with the huge upheaval in the way the police were seen
    and the awareness that they're not always a force for order and for
    justice." She describes The Keeper as the point where that American
    conversation recedes and the Western genre's rough-hewn, "handmade"
    idea of justice takes over: Cal's transition "from him being a detective
    in detective terms to him being this guy in Western terms."
  spoilerAfter: null
  sources:
    - https://www.culturedmag.com/article/2026/04/01/literature-tana-french-the-keeper-interview/
