# Recurring characters - the connective tissue of Dublin Murder Squad, whose
# defining structure is that each book's lead detective is drawn from the
# previous book's supporting cast rather than a returning protagonist. Which
# book each name is a detective in is publisher-stated series information,
# not a plot reveal, and none of these appearances turned on a twist in the
# sources checked, so spoilerAfter is left null throughout. No crossover with
# the standalone Witch Elm or the Cal Hooper trilogy surfaced in research;
# this roster is Dublin Murder Squad only.

- id: tana-french/rob-ryan
  name: Rob Ryan
  aka: ["Adam Ryan"]
  description: >
    A Dublin Murder Squad detective who grew up under his middle name after
    a childhood incident in [[work:tana-french/in-the-woods|In the Woods]].
  appearsIn:
    - workId: tana-french/in-the-woods
      note: Lead detective and narrator.
    - workId: tana-french/the-likeness
      note: Cassie Maddox's former partner; mentioned only briefly.
  sources:
    - https://en.wikipedia.org/wiki/In_the_Woods
    - https://en.wikipedia.org/wiki/The_Likeness

- id: tana-french/cassie-maddox
  name: Cassie Maddox
  description: >
    A Dublin Murder Squad detective who spent a stint undercover before
    joining the squad, a history the job draws her back into in
    [[work:tana-french/the-likeness|The Likeness]].
  appearsIn:
    - workId: tana-french/in-the-woods
      note: Co-lead detective, Rob Ryan's partner.
    - workId: tana-french/the-likeness
      note: Lead detective, going undercover as a murder victim who could
        pass for her double.
  sources:
    - https://en.wikipedia.org/wiki/In_the_Woods
    - https://en.wikipedia.org/wiki/The_Likeness

- id: tana-french/frank-mackey
  name: Frank Mackey
  description: >
    An undercover Dublin detective whose own family and first love, left
    behind in the Liberties in the 1980s, become the case in
    [[work:tana-french/faithful-place|Faithful Place]].
  appearsIn:
    - workId: tana-french/the-likeness
      note: Cassie Maddox's undercover handler, who talks her into the
        impersonation at the center of the book.
    - workId: tana-french/faithful-place
      note: Lead detective, investigating the disappearance of his own
        teenage girlfriend two decades on.
    - workId: tana-french/the-secret-place
      note: Now a Murder Squad detective himself; the father of Holly
        Mackey, whose discovery drives the book's case.
  sources:
    - https://en.wikipedia.org/wiki/The_Likeness
    - https://en.wikipedia.org/wiki/Faithful_Place
    - https://en.wikipedia.org/wiki/The_Secret_Place_(book)

- id: tana-french/holly-mackey
  name: Holly Mackey
  description: >
    Frank Mackey's daughter, a young child in
    [[work:tana-french/faithful-place|Faithful Place]] and a sixteen-year-old
    pupil at St. Kilda's boarding school by
    [[work:tana-french/the-secret-place|The Secret Place]].
  appearsIn:
    - workId: tana-french/faithful-place
      note: Frank's nine-year-old daughter, caught between him and her
        mother.
    - workId: tana-french/the-secret-place
      note: Brings Detective Stephen Moran the card that reopens the case.
  sources:
    - https://en.wikipedia.org/wiki/Faithful_Place
    - https://en.wikipedia.org/wiki/The_Secret_Place_(book)

- id: tana-french/stephen-moran
  name: Stephen Moran
  description: >
    A Dublin detective who works his way from a rookie favor in
    [[work:tana-french/faithful-place|Faithful Place]] to the Murder Squad
    case that makes his name in
    [[work:tana-french/the-secret-place|The Secret Place]].
  appearsIn:
    - workId: tana-french/faithful-place
      note: A rookie detective on the case, persuaded by Frank Mackey to
        pass him information.
    - workId: tana-french/the-secret-place
      note: Co-lead detective, partnered with Antoinette Conway.
    - workId: tana-french/the-trespasser
      note: Lead detective, still partnered with Conway.
  sources:
    - https://en.wikipedia.org/wiki/Faithful_Place
    - https://en.wikipedia.org/wiki/The_Secret_Place_(book)
    - http://www.bookreporter.com/authors/au-french-tana.asp

- id: tana-french/antoinette-conway
  name: Antoinette Conway
  description: >
    A Dublin Murder Squad detective who feels like an outsider on the squad
    from her first case in
    [[work:tana-french/the-secret-place|The Secret Place]] onward.
  appearsIn:
    - workId: tana-french/the-secret-place
      note: Senior detective, partnered with Stephen Moran.
    - workId: tana-french/the-trespasser
      note: Lead detective, still partnered with Moran, and increasingly
        certain the squad wants her gone.
  sources:
    - https://en.wikipedia.org/wiki/The_Secret_Place_(book)
    - http://www.bookreporter.com/authors/au-french-tana.asp
