# Additional reading orders. There are none on record.
#
# The derived default (publication-chronological over all ten works) needs no
# tie-break: every work publishes in a distinct year (2007, 2008, 2010, 2012,
# 2014, 2016, 2018, 2020, 2024, 2026), unlike agatha-christie/poirot-novels,
# which exists to settle five same-year clashes the default cannot.
#
# A "DUBLIN MURDER SQUAD IN ORDER" (6 works) OR "CAL HOOPER TRILOGY IN ORDER"
# (3 works) SUBSERIES ORDER WAS CONSIDERED AND FAILS THE DIVERGENCE TEST.
# Each would be exactly the derived default filtered to works.yaml's own
# subseries field and sorted by year - the same duplication the discworld
# thread orders avoid only because the L-Space guide backs them as a
# canonical community grouping. No equivalent community or publisher guide
# splits this author's shelf that way; the subseries field itself already
# carries the grouping for any reader or app view that wants it, so a
# hand-copied order of the same six or three ids would add nothing and would
# silently desync the moment a work's subseries changed.
#
# THE PREQUEL/SPOILER VECTOR (SCHEMA.md) DOES NOT APPLY. No work here is
# set, or published, earlier than a book
# whose reveals it would front-load: the Dublin Murder Squad's six novels and
# the Cal Hooper trilogy's three both publish in strict chronological and
# in-universe order (The Hunter opens explicitly "two years into" The
# Searcher's Ardnakelty; The Keeper closes the trilogy The Hunter continues).
# There is no New-Spring-shaped case to answer.
#
# A "START ANYWHERE" ENTRY PATH WAS TESTED AGAINST THE SOURCING BAR AND
# REJECTED - see franchise.yaml's wizard comment for the full reasoning. The
# rotating-narrator structure (each book's lead is the previous book's
# supporting character) makes "any book stands alone" a plausible-sounding
# claim, and it is the claim every SEO reading-order farm makes, but neither
# French nor her publisher is on record making it, no canonical community
# guide exists for this shelf, and the one real-outlet piece that makes the
# claim (Electric Literature) undercuts it in its own next sentence. Reader
# opinion on the question (a long-running Goodreads thread) splits rather
# than converges. Publication order remains the only order this wing ships,
# via orderId: default.
#
# A CAL HOOPER-FIRST ENTRY PATH (skip the Squad, start with The Searcher) was
# also considered on the strength of the trilogy's clean break from Dublin
# Murder Squad - no shared cast surfaced in the sources checked (see
# characters.yaml). That absence is a real bibliographic fact, not reader
# advice; no source recommends entering the author's work there, and
# shipping the recommendation anyway would be curatorial invention rather
# than documented practice.
[]
