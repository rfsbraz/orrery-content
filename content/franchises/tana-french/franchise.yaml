id: tana-french
name: Tana French
kind: author
description: >
  Six Dublin Murder Squad novels that rotate their lead detective from book
  to book while last book's supporting cast steps up to take the next case,
  the standalone [[work:tana-french/the-witch-elm|The Witch Elm]], and the
  Cal Hooper trilogy that follows a retired Chicago detective into a rural
  Irish townland's own buried grudges.
authorIds: [tana-french]
themePreset: bog-noir

# CAPABILITIES - left mostly at auto, one deliberate override.
# connections: forced ON. Auto would already activate it correctly (this
# wing ships characters.yaml), but it is called out because it is this
# wing's headline structural feature rather than incidental crossover
# dressing: Dublin Murder Squad's own conceit is that each book's
# supporting detective becomes the next book's lead, so Ryan and Maddox
# (In the Woods) hand off to Maddox alone (The Likeness), Frank Mackey
# recurs across three books as handler, protagonist and then a suspect's
# father, and Stephen Moran and Antoinette Conway rotate the same way
# across Faithful Place, The Secret Place and The Trespasser. See
# characters.yaml.
# river / companion: auto, on the strength of the three author lifeEvents
# recorded so far - thin but real.
# wizard: auto, currently off. No sourced "where to start" claim exists yet:
# her own site sells a "Dublin Murder Squad Mysteries Volumes 1-6" boxed
# set, which is a bundling decision, not a stated reading-order
# recommendation.
# editions: auto, currently off. No editions.yaml yet. pt-PT editions
# genuinely exist under Clube do Autor (The Secret Place as "O Sítio
# Secreto", 2015; The Witch Elm as "Intruso", 2020) and the earlier
# Livraria Civilização Editora (In the Woods as "Desaparecidos", 2008; The
# Likeness as "A Semelhança", 2009; Faithful Place as "Sombras do
# Passado", ISBN 9789722632843, 2011) - checked directly on WOOK product
# pages, not just the search index.
features: {}

# Which shared global events actually reach this author (docs/SCHEMA.md). All
# ten fall inside her lifetime (born 1973) except carnation-revolution-1974,
# which she was already born for; nothing else in global.yaml overlaps her
# life at all. Two of these are real, sourced connections rather than mere
# lifetime overlap - the 2008 crash behind Broken Harbour's ghost estates and
# the lockdown Ardnakelty of The Keeper - but both are already told, in her
# own words, by this wing's own events.yaml and the Dublin Murder Squad era's
# "celtic tiger and the crash" theme, so the generic global entry would only
# repeat a story already better told. Nothing is kept by default.
globalEvents:
  exclude:
    - sept-11-2001                      # working actor in Dublin at 28; no novel or interview in the record reaches for it
    - financial-crisis-2008             # its Irish resonance is already told by french-broken-harbor-ghost-estates-2012 and the Dublin Murder Squad era's own theme
    - covid-19-pandemic-2020            # The Keeper's lockdown-marked Ardnakelty is already told by french-keeper-trilogy-context-2026
    - carnation-revolution-1974         # a Portuguese event; nothing in her Vermont/Ireland/Italy/Malawi childhood or her ten Irish novels touches Portugal
    - chain-bookshop-1982               # generic bookselling backdrop of her childhood; no sourced link to her work
    - online-bookselling-1995           # Amazon's founding, over a decade before her 2007 debut; no sourced connection
    - ebook-and-self-publishing-2007    # traditionally published throughout (Viking, Hodder & Stoughton); no ebook or self-publishing story
    - prestige-fantasy-adaptation-2011  # a fantasy-genre event; she writes crime fiction
    - booktok-2020                      # no sourced link between short-form-video discovery and her sales or career
    - portugal-bailout-2011             # Portugal's crisis, not Ireland's; her own recession material is the Celtic Tiger collapse, already covered above

