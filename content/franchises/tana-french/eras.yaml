# Creative periods. Two spans, drawn on the two groupings that exist outside
# this catalogue: the six-novel Dublin Murder Squad run and the Cal Hooper
# trilogy the author names and closes herself.
#
# The Witch Elm (2018) sits outside both, deliberately. Every source that
# describes it defines it by what it is not: Wikipedia's article opens "The
# novel is a standalone, not related to her Dublin Murder Squad novels", and
# Kirkus's 2020 profile places it as the book written "after six intense books
# focusing on the Dublin Murder Squad" and before another that "feels quite
# different" again. Nothing names 2018 as a period of its own.
#
# The one framing that would cover it groups it with The Searcher: Wikipedia's
# biography reads "After publishing The Trespasser in 2016, French published two
# standalone novels, The Witch Elm and The Searcher". That grouping no longer
# holds, because The Searcher became the first book of the Cal Hooper trilogy;
# French confirms the reversal in her own words, "No trilogy, although I said
# that with The Searcher". A 2018-2020 standalone span would therefore have to
# cut the trilogy in half to exist. The single uncovered year is the honest
# record of a book that belongs to neither neighbour.
#
# Sources for leaving 2018 uncovered:
#   https://en.wikipedia.org/wiki/The_Witch_Elm
#   https://en.wikipedia.org/wiki/Tana_French
#   https://www.kirkusreviews.com/news-and-features/articles/tana-french-the-searcher-interview/
#   https://www.culturedmag.com/article/2026/04/01/literature-tana-french-the-keeper-interview/

- id: dublin-murder-squad
  title: The Dublin Murder Squad
  period: "2007-2016"
  themes: [dublin, the celtic tiger and the crash, class and belonging, a different narrator each time]
  provenance: publishing
  description: >
    The first six novels, published as a series under this name and reviewed as
    a single run: [[work:tana-french/in-the-woods|In the Woods]] through
    [[work:tana-french/the-trespasser|The Trespasser]]. No one detective carries
    them. Each book hands the narration to a different member of the squad, and
    the cases sit against the boom years and the crash that followed them.
  # Rests on the publishing record rather than on criticism. The six-novel
  # series is stated by Wikipedia ("French's first six novels form the 'Dublin
  # Murder Squad' series"), carried as a series by the publisher, and used by
  # reviewers as a career phase: Kirkus's 2020 profile opens "After six intense
  # books focusing on the Dublin Murder Squad". No source found calls the span a
  # named period of her career, so the era takes the series' own name and adds
  # nothing to it.
  #
  # Boundaries are bibliographic: 2007 is the debut, 2016 the last Squad novel.
  # Neither is a rounded date.
  sources:
    - "https://en.wikipedia.org/wiki/Tana_French"
    - "https://www.penguinrandomhouse.com/series/MSQ/dublin-murder-squad/"
    - "https://www.kirkusreviews.com/news-and-features/articles/tana-french-the-searcher-interview/"

- id: cal-hooper-trilogy
  title: The Cal Hooper Trilogy
  period: "2020-2026"
  themes: [the west of ireland, western tropes, a community making its own law, rural decline]
  provenance: author
  description: >
    A Chicago detective retires to a village in the west of Ireland, in three
    books French wrote against the Western rather than the detective novel: "an
    awful lot of the tropes of Western fiction map really nicely onto the West
    of Ireland". She describes the sequence as closed at
    [[work:tana-french/the-keeper|The Keeper]], and the length of the stay as
    new to her: "I've never stuck to one world for this long before."
  # The author's own framing. Her site bills The Keeper as "the third and final
  # book in the million-copy-bestselling Cal Hooper trilogy", and she calls it
  # "my first completed trilogy" in the Cultured interview, where she also states
  # the next book is a standalone.
  #
  # The span is closed at 2026 rather than open-ended on that evidence: the arc
  # is finished and the work after it is stated to sit outside the trilogy.
  #
  # The Searcher was written and published as a standalone and became the first
  # book of the trilogy afterwards ("No trilogy, although I said that with The
  # Searcher"). The era starts at 2020 because the trilogy as it now stands
  # contains it, not because it was conceived that way.
  #
  # The Cultured interview dates The Searcher to 2021; it published in October
  # 2020.
  sources:
    - "https://www.tanafrench.com/"
    - "https://www.culturedmag.com/article/2026/04/01/literature-tana-french-the-keeper-interview/"
    - "https://en.wikipedia.org/wiki/Tana_French"
