# Editions of Tana French: 5 pt-PT editions over 5 of 10 works, plus 19 English
# (US/Ireland/UK) editions over all 10 works bar one partial gap noted below.
#
# PORTUGUESE COVERAGE (5 of 10). Established from WOOK's own author-page
# bibliography (archived copy below; the live page 403s automated fetches, a
# known WOOK behaviour - see docs/CURATION.md), which lists exactly five
# Portuguese titles under two imprints and no others ("Ver mais" was not a
# truncation; filtering the author page to idioma=PT surfaces only these
# five). Livraria Civilização Editora ran the first three Dublin Murder Squad
# novels in strict sequence (2008, 2009, 2011) and then stopped; Clube do
# Autor picked up two later, non-consecutive titles (2015, 2020) and has
# added nothing since. Broken Harbour (DMS #4), The Witch Elm and the entire
# Cal Hooper trilogy have never been published in Portuguese as far as this
# catalogue can establish - a market fact, not a research gap, and no
# edition is recorded for them here.
#
# A TITLE-MATCHING TRAP. "Intruso" (2020) pairs with The Trespasser (2016),
# not The Witch Elm (2018), even though title and year alone point the other
# way (Clube do Autor's two releases are her two most recent books at each
# release, and "Intruso"/"Intruder" reads closer to "Witch Elm" than to
# "Trespasser" in translation). Intruso's own WOOK synopsis ("Uma jovem é
# morta em casa... a mesa está posta para um jantar romântico que nunca
# aconteceu... um dos detetives reconhece aquela rapariga") is unmistakably
# The Trespasser's plot: a dead woman, a table laid for a dinner that never
# happened, a detective who recognises her. The Witch Elm has no pt-PT
# edition recorded here as a result. Every pairing below (title-literal or
# not) is confirmed the same way, by reading the WOOK synopsis against the
# work's own synopsis in works.yaml, not by matching titles or years:
#   - Desaparecidos (Civilização, 2008): 1984, three children vanish into a
#     Dublin-suburb wood, one found catatonic - In the Woods.
#   - A Semelhança (Civilização, 2009): Cassie Maddox, "da autora de
#     Desaparecidos", finds her own double dead under her old undercover
#     alias Lexie Madison - The Likeness.
#   - Sombras do Passado (Civilização, 2011): the Biblioteca Nacional de
#     Portugal's own catalogue record states the original title directly
#     ("Tít. orig.: Faithful place"), translator Isabel Baptista credited.
#   - O Sítio Secreto (Clube do Autor, 2015): a boy found dead in a girls'
#     boarding-school garden, a note reading "Sei quem o matou" ("I know who
#     killed him") pinned to the school's secret noticeboard, Detective
#     Stephen - The Secret Place, and a fully literal title besides.
# No `title` is needed on the English editions below in the region where a
# work's English title is unchanged; it is set only on the one edition whose
# title genuinely differs by market (see BROKEN HARBOUR/HARBOR below). No
# translator is recorded except on Sombras do Passado, the only one whose
# source names one.
#
# ENGLISH COVERAGE. Ireland/UK first editions run under Hodder & Stoughton
# in Britain and, in Ireland specifically, an imprint that renamed partway
# through her run - Hodder Headline Ireland becoming Hachette Books Ireland -
# which is why OpenLibrary's own cataloguing of the same 2012 Broken Harbour
# printing under the older name is not a second, competing edition. US
# editions run under Viking throughout, moving from Viking Adult/Viking
# Press branding in the early books to plain Viking later, all one publisher.
# The Cal Hooper trilogy is recorded thinner: no Ireland/UK print edition
# surfaced independently of the US one for The Searcher's US ISBN, and only a
# UK ebook (not a UK print edition) could be verified for The Hunter and The
# Keeper - recorded as ebook because that is genuinely what the sourced ISBN
# resolves to, not a stand-in for an unfound print edition. A UK edition of
# The Witch Elm under the title "The Wych Elm" (see the work's own note) is
# real - Wikipedia and OpenLibrary both attest the retitling - but no single
# record gave a firm publication year for a specific ISBN under that title
# without contradicting itself (OpenLibrary splits it across "Viking" and
# "Penguin Books, Limited" catalogue entries with no reliable year on the
# cleanest one), so no entry is recorded for it.
#
# BROKEN HARBOUR / BROKEN HARBOR is a genuine title difference between
# markets, not a variant field for the same fact (see works.yaml's own TITLE
# NOTE and canonical spelling "Broken Harbour"). The Ireland/UK edition below
# needs no `title` override since it matches the work's own title exactly;
# the Viking US edition carries `language: en-US` and `title: "Broken
# Harbor"` because that spelling is what is actually printed on that book,
# confirmed independently by OpenLibrary's own `full_title` field for that
# ISBN and by the Kirkus/Washington Post reviews already cited in works.yaml.
#
# THE KEEPER (2026) is too recent for OpenLibrary to have catalogued by
# either ISBN checked here (both return empty records); both ISBNs are
# instead sourced to Wikipedia's own detailed infobox (day-precise pub
# dates, page count, audiobook narrator), and both pass their check digit.
#
# SOURCING. pt-PT facts: WOOK product pages (via web.archive.org, since the
# live site blocks automated fetches) cross-checked against the Biblioteca
# Nacional de Portugal's catalogue (catalogo.bnportugal.gov.pt) for Sombras
# do Passado. English facts: OpenLibrary's per-ISBN records (isbn13,
# publisher, format, page count), cross-checked against Wikipedia's own
# infoboxes for the seven titles that have one and against the Kirkus/
# Guardian/Washington Post reviews already in works.yaml for Broken Harbour.
# No ISBN below was taken from a single source without an independent check
# except The Keeper's two, noted above, where OpenLibrary itself carries
# nothing to check against yet.

