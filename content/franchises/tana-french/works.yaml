# Bibliography (Works) - the abstract works; editions and covers are separate
# metadata not recorded here. IDs are STABLE and permanent. Dates are FIRST
# publication year of the complete work.
#
# SHAPE OF THIS WING: ten novels across three groupings, all of them French's
# own prose fiction and all tiered core - there is no apocrypha or off-spine
# extended work to record, unlike wings with screen credits or introductions
# to other people's books.
#
#   Dublin Murder Squad (6) - In the Woods through The Trespasser. The
#     series' own defining structure: each book has a new lead detective, and
#     that lead is drawn from the previous book's supporting cast rather than
#     a returning protagonist. See characters.yaml for the handoffs (Ryan and
#     Maddox -> Maddox -> Frank Mackey -> Moran and Conway -> Moran and
#     Conway again), which is why this wing's connections capability is
#     forced on rather than left to auto-detection.
#   Cal Hooper (3) - The Searcher, The Hunter, The Keeper. A self-contained
#     trilogy about a retired Chicago detective settled in rural Ireland;
#     French has described it as shaped by American Western fiction. No
#     character overlap with Dublin Murder Squad has surfaced in the sources
#     checked.
#   Standalone (1) - The Witch Elm, explicitly not part of either series
#     (confirmed on its own Wikipedia page) and sharing no cast with either.
#
# TITLE NOTE. The fourth Dublin Murder Squad novel is a spelling variant
# between markets, not a retitling: Broken Harbour in Ireland and the UK
# (Hachette Books Ireland / Hodder & Stoughton), Broken Harbor in the US
# (Viking). The Irish/UK edition came first, on 2 July 2012 (the Guardian's
# review ran 15 July 2012); the Viking US edition followed three weeks later,
# on 24 July 2012 (Kirkus's listed pub date, corroborated by the Washington
# Post's 22 July 2012 review referencing French's forthcoming 28 July US
# tour date). Broken Harbour, the first-published spelling, is used here as
# the title; Broken Harbor, the later US spelling, is recorded in the work's
# note - it is the spelling on French's own author site and the book's Los
# Angeles Times Book Prize and Irish Book Award listings, both checked
# directly.
#
# COMPLETE against the reachable record: French's own Wikipedia bibliography
# table (which splits her output into exactly these three groupings), her
# own author site's ten-book list, Penguin Random House's author page and
# Goodreads' full 24-entry works list (foreign editions, boxed sets and the
# ten novels; nothing else) all agree on the same ten titles; ISFDB has no
# author entry for her at all (checked directly), consistent with a career
# in crime rather than SF/fantasy short fiction. No anthology contribution
# surfaced: she does not appear in Dublin Noir, Belfast Noir, Trouble Is Our
# Business or In Sunlight or in Shadow, the four Irish-crime or crime-noir
# anthologies her contemporaries and peers appear in, all checked by table
# of contents. Two Goodreads-listed items are not works of her own writing
# and are excluded on that basis rather than overlooked: "What the World Is
# Reading" (2010) is a Penguin promotional sampler of excerpts from already
# published novels, not new prose; Strand Magazine Issue 53 (2017) credits
# her for an interview, not a story. No introduction, foreword or
# screen-writing credit under her name surfaced either, unlike the Gillian
# Flynn wing's mixed-medium bibliography.
# externalIds are left empty throughout for the enrichment bot to fill.

- id: tana-french/in-the-woods
  title: "In the Woods"
  authorIds: [tana-french]
  published: 2007
  subseries: "Dublin Murder Squad"
  canonTier: core
  synopsis: >
    In 1984, three children vanish into the woods outside the Dublin estate
    of Knocknaree; only one is found, alive but with no memory of what
    happened. Twenty years later, Detective Rob Ryan, who has told no one at
    work that he was that child, is assigned with his partner Cassie Maddox
    to investigate the murder of a twelve-year-old girl at the same site.
  note: >
    French's debut, written in her early 30s in the gaps between acting
    work; won the 2008 Edgar, Anthony, Macavity and Barry awards for best
    first novel. SPOILER CARE. The novel is famous, and was divisive on
    release, for what it does and does not resolve about the 1984
    disappearance; this synopsis stops at the premise, and nothing about
    what Ryan remembers or how the two cases connect belongs here.
  sources:
    - https://en.wikipedia.org/wiki/In_the_Woods
    - https://en.wikipedia.org/wiki/Tana_French
  images:
    cover: "https://covers.openlibrary.org/b/id/8372258-L.jpg"
    coverCredit: "Open Library"
    coverSource: "https://openlibrary.org/works/OL7989979W"

- id: tana-french/the-likeness
  title: "The Likeness"
  authorIds: [tana-french]
  published: 2008
  subseries: "Dublin Murder Squad"
  canonTier: core
  synopsis: >
    Detective Cassie Maddox is called to a murder scene in a country
    cottage and finds a dead woman who could pass for her double, living
    under an alias Cassie once used undercover. Her old handler, Frank
    Mackey, talks her into impersonating the victim among the four
    housemates who are also the case's only suspects.
  note: >
    Adam "Rob" Ryan, Cassie's partner in In the Woods, is mentioned briefly.
    Frank Mackey, her handler here, becomes the protagonist of Faithful
    Place and reappears in The Secret Place (see characters.yaml). SPOILER
    CARE. Nothing about the housemates, or about who the dead woman really
    was, belongs in this synopsis.
  sources:
    - https://en.wikipedia.org/wiki/The_Likeness
    - https://en.wikipedia.org/wiki/Tana_French
  images:
    cover: "https://covers.openlibrary.org/b/id/10599405-L.jpg"
    coverCredit: "Open Library"
    coverSource: "https://openlibrary.org/works/OL7989981W"

- id: tana-french/faithful-place
  title: "Faithful Place"
  authorIds: [tana-french]
  published: 2010
  subseries: "Dublin Murder Squad"
  canonTier: core
  synopsis: >
    In 1985, nineteen-year-old Frank Mackey plans to run away to London with
    his girlfriend Rosie Daly, escaping both of their families and Ireland's
    recession, and never sees her again. Twenty-two years later, an
    undercover detective long estranged from his family, he is pulled back
    to the Dublin cul-de-sac he fled when Rosie's suitcase turns up hidden
    in the derelict house where they were meant to meet.
  note: >
    Dublin Murder Squad #3 per the publisher's own series numbering. Frank
    Mackey returns from his supporting role in The Likeness; his young
    daughter Holly and the rookie detective Stephen Moran he strong-arms
    into feeding him information both recur as the leads of The Secret
    Place (see characters.yaml). SPOILER CARE. What actually happened to
    Rosie is the entire engine of the book and stays out of this synopsis.
  sources:
    - https://en.wikipedia.org/wiki/Faithful_Place
    - https://en.wikipedia.org/wiki/Tana_French
  images:
    cover: "https://covers.openlibrary.org/b/id/8372232-L.jpg"
    coverCredit: "Open Library"
    coverSource: "https://openlibrary.org/works/OL15191187W"
    # This work's own Viking US hardcover ISBN (see editions.yaml) resolves to
    # an Open Library cover scan carrying a visible library barcode and a
    # pink "one week checkout" charge sticker. This Penguin US paperback
    # (ISBN 9780143119494) is a clean scan of the same work with no such
    # marks.

- id: tana-french/broken-harbor
  title: "Broken Harbour"
  authorIds: [tana-french]
  published: 2012
  subseries: "Dublin Murder Squad"
  canonTier: core
  synopsis: >
    In a half-built, half-abandoned "ghost estate" outside Dublin, a
    husband and his two young children are dead and his wife is fighting
    for her life. Detective Mick "Scorcher" Kennedy, the squad's best
    closer, takes the case with a rookie partner, and it keeps pointing in
    two directions at once even as it drags up a private history of
    Scorcher's own from a childhood summer at the real Broken Harbor.
  note: >
    Dublin Murder Squad #4. TITLE: first published as Broken Harbour by
    Hachette Books Ireland on 2 July 2012 (the Guardian reviewed it 15 July
    2012); the Viking US edition followed on 24 July 2012 under the spelling
    Broken Harbor (Kirkus's listed pub date; the Washington Post reviewed it
    22 July 2012) - a spelling variant between markets, not a retitling.
    Broken Harbor, the later US spelling, is the one on French's own author
    site and the book's Los Angeles Times Book Prize for Mystery/Thriller
    and Irish Book Award listings; Wikipedia's own article on the book sits
    at "Broken Harbour". SPOILER CARE. The family's cause of death and what
    happened to Scorcher at the original Broken Harbor are the book's twin
    reveals; neither belongs here.
  sources:
    - https://en.wikipedia.org/wiki/Broken_Harbour
    - https://www.theguardian.com/books/2012/jul/15/broken-harbour-tana-french-review
    - https://www.washingtonpost.com/entertainment/books/book-review-broken-harbor-by-tana-french/2012/07/22/gJQAdZL62W_story.html
    - https://www.kirkusreviews.com/book-reviews/tana-french/broken-harbor/
    - https://www.tanafrench.com/
    - https://en.wikipedia.org/wiki/Los_Angeles_Times_Book_Prize
  images:
    # The Irish/UK first edition's cover (Hachette Books Ireland, 2 July
    # 2012), not the later Viking US "Broken Harbor" jacket: it is the one
    # that matches this work's own title, "Broken Harbour", exactly (see the
    # TITLE NOTE above and editions.yaml's own entry for this ISBN).
    cover: "https://covers.openlibrary.org/b/id/7621877-L.jpg"
    coverCredit: "Open Library"
    coverSource: "https://openlibrary.org/works/OL17438859W"

- id: tana-french/the-secret-place
  title: "The Secret Place"
  authorIds: [tana-french]
  published: 2014
  subseries: "Dublin Murder Squad"
  canonTier: core
  synopsis: >
    A year after a teenage boy was murdered on the grounds of St. Kilda's,
    an exclusive Dublin girls' boarding school, one of its pupils brings
    Detective Stephen Moran a card from the school's anonymous gossip
    board reading "I know who killed him." Moran, angling for his shot at
    the Murder Squad, partners with senior detective Antoinette Conway to
    reopen the case from inside the school's rival cliques.
  note: >
    Dublin Murder Squad #5. Moran, introduced as a rookie in Faithful
    Place, gets his own case here; he and Conway both return as the leads
    of The Trespasser. Frank Mackey (The Likeness, Faithful Place)
    reappears as the father of Holly, the pupil who brings the case
    forward (see characters.yaml). SPOILER CARE. Which clique, and which
    girl, hold the answer stays out of this synopsis. So does the outcome
    of Moran's bid for the Murder Squad: the publisher's own copy for this
    book stops at "has been waiting for his chance to join", and the bid
    is what the book is built around, so it is left unresolved here. Later
    books in the series settle it in their jacket copy - do not carry that
    back into this entry.
  sources:
    - https://en.wikipedia.org/wiki/The_Secret_Place_(book)
    - http://www.bookreporter.com/authors/au-french-tana.asp
  images:
    cover: "https://covers.openlibrary.org/b/id/8576317-L.jpg"
    coverCredit: "Open Library"
    coverSource: "https://openlibrary.org/works/OL17371637W"

- id: tana-french/the-trespasser
  title: "The Trespasser"
  authorIds: [tana-french]
  published: 2016
  subseries: "Dublin Murder Squad"
  canonTier: core
  synopsis: >
    Detective Antoinette Conway, still feeling like an outsider on the
    Murder Squad, and her partner Stephen Moran catch what looks like a
    routine case: a young woman dead in her flat, beside a table set for a
    romantic dinner that never happened. Other detectives keep steering
    them toward the obvious answer, and Conway starts to wonder whether the
    pressure is about the case or about pushing her off the squad.
  note: >
    Dublin Murder Squad #6, closing out the run of Moran and Conway begun
    in The Secret Place. Basic facts (title, year, the Conway/Moran
    partnership) are corroborated by the publisher's own synopsis via
    Bookreporter.com; French's Wikipedia article for this title itself
    carries an editorial notice about possible unverified additions, so
    plot detail here is kept to what the publisher copy states rather than
    drawn from that page. SPOILER CARE. The source of the pressure on the
    case, and what is actually being covered up, stay out.
  sources:
    - http://www.bookreporter.com/authors/au-french-tana.asp
    - https://en.wikipedia.org/wiki/The_Trespasser_(book)
  images:
    cover: "https://covers.openlibrary.org/b/id/8479577-L.jpg"
    coverCredit: "Open Library"
    coverSource: "https://openlibrary.org/works/OL17371638W"

- id: tana-french/the-witch-elm
  title: "The Witch Elm"
  authorIds: [tana-french]
  published: 2018
  subseries: null
  canonTier: core
  synopsis: >
    Toby Hennessy, an art-gallery publicist who has always considered
    himself lucky, is beaten and left for dead by burglars in his own flat.
    Recovering with a brain injury he cannot fully account for, he moves
    into his family's crumbling childhood home to care for his dying
    uncle - until his young cousins find a human skull inside the garden's
    old wych elm.
  note: >
    Standalone: explicitly not part of Dublin Murder Squad or the Cal
    Hooper trilogy, and shares no cast with either. French has cited the
    unsolved 1943 case of "Bella in the Wych Elm," an unidentified woman
    found inside a wych elm tree in Hagley, England, as the seed of the
    title and premise; the novel invents its own family and crime rather
    than fictionalizing that case. Also published as The Wych Elm (its UK
    title). SPOILER CARE. Whose remains are found, and what Toby's own
    memory is hiding from him, are the entire book; neither belongs here.
  sources:
    - https://en.wikipedia.org/wiki/The_Witch_Elm
    - http://www.bookreporter.com/authors/au-french-tana.asp
  images:
    # The Viking US paperback (ISBN 9781984877604), not the work's OL-assigned
    # representative cover_i: that one resolves to the German "Der dunkle
    # Garten" edition, whose jacket carries the German title. This edition's
    # jacket carries the work's own English title.
    cover: "https://covers.openlibrary.org/b/id/13237138-L.jpg"
    coverCredit: "Open Library"
    coverSource: "https://openlibrary.org/works/OL19665179W"

- id: tana-french/the-searcher
  title: "The Searcher"
  authorIds: [tana-french]
  published: 2020
  subseries: "Cal Hooper"
  canonTier: core
  synopsis: >
    Cal Hooper, freshly retired from the Chicago police and freshly
    divorced, buys a fixer-upper in a quiet Irish village hoping for
    nothing harder to solve than the house itself. A local kid talks him
    into looking into an older brother's disappearance, and Cal starts
    finding the kind of trouble small towns are supposed to be too small
    for.
  note: >
    Opens the Cal Hooper trilogy, continued in The Hunter and closed in
    The Keeper. French has said the novel was shaped by American Western
    fiction, down to a title that nods at John Ford's film The Searchers.
    SPOILER CARE. What actually happened to the missing brother, and what
    it costs Cal to find out, stay out of this synopsis. The child who
    recruits Cal is "a local kid" here, the publisher's own wording, and
    is deliberately left unnamed and ungendered: the novel introduces the
    character one way and corrects it later, and The Hunter's jacket copy
    names them freely. Do not backfill that name into this entry.
  sources:
    - https://en.wikipedia.org/wiki/The_Searcher_(novel)
    - http://www.bookreporter.com/authors/au-french-tana.asp
  images:
    cover: "https://covers.openlibrary.org/b/id/10220063-L.jpg"
    coverCredit: "Open Library"
    coverSource: "https://openlibrary.org/works/OL20886082W"

- id: tana-french/the-hunter
  title: "The Hunter"
  authorIds: [tana-french]
  published: 2024
  subseries: "Cal Hooper"
  canonTier: core
  synopsis: >
    Two years into his life in Ardnakelty, Cal Hooper has built something
    like peace: a relationship with a local widow, Lena, and a hand in
    raising Trey Reddy, the once-feral teenager he took under his wing in
    The Searcher. Then Trey's long-vanished father reappears with an
    English backer and a scheme to find gold on the townland, and Trey
    wants something from Cal that he isn't sure he can give her.
  note: >
    Continues directly from The Searcher; The Keeper closes the trilogy.
    SPOILER CARE. How the gold scheme and the father's return actually
    resolve, and what Trey does about it, stay out of this synopsis.
  sources:
    - http://www.bookreporter.com/authors/au-french-tana.asp
    - https://en.wikipedia.org/wiki/Tana_French
  images:
    cover: "https://covers.openlibrary.org/b/id/14562108-L.jpg"
    coverCredit: "Open Library"
    coverSource: "https://openlibrary.org/works/OL37505375W"

- id: tana-french/the-keeper
  title: "The Keeper"
  authorIds: [tana-french]
  published: 2026
  subseries: "Cal Hooper"
  canonTier: core
  synopsis: >
    In Ardnakelty, a young woman engaged to the son of the townland's
    wealthiest family is found dead in the river on a cold night, and the
    convenient explanation does not hold. Cal Hooper and his fiancee Lena
    each start pulling on their own thread of the village's grudges and
    land disputes, pulling in different directions just as the case turns
    dangerous.
  note: >
    Closes the Cal Hooper trilogy begun in The Searcher and continued in
    The Hunter; published March-April 2026 in the US and UK. SPOILER CARE.
    What the land dispute has to do with the death, and how things resolve
    between Cal and Lena, stay out of this synopsis.
  sources:
    - https://en.wikipedia.org/wiki/The_Keeper_(novel)
    - http://www.bookreporter.com/authors/au-french-tana.asp
  images:
    # No US cover recorded: this work's Viking US ISBN (see editions.yaml) is
    # too recent for Open Library to have catalogued by either ISBN checked.
    # This UK edition (Viking Penguin, ISBN 9781405991414) is the only one
    # Open Library holds a cover for.
    cover: "https://covers.openlibrary.org/b/id/15205400-L.jpg"
    coverCredit: "Open Library"
    coverSource: "https://openlibrary.org/works/OL45093452W"
