# Branding for the Tana French wing (see docs/SCHEMA.md#themeyaml). Checked
# against every existing wing before choosing: the catalogue's other two
# cold-register wings are Chuck Palahniuk (blue-grey near-black, antiseptic
# green, sourceSerif, "rule") and Joao Tordo (deep Atlantic blue-grey
# near-black, azulejo blue, canela, "tideline"). This wing needed a third
# cold register that reads as neither institutional (Palahniuk) nor coastal
# (Tordo): a wet, peaty, inland green-grey rather than a blue one - Irish
# bog and limestone rather than ocean. Gillian Flynn already holds the
# catalogue's one pale/overcast ground, so this stays dark. The accent is a
# cold heather-violet, unclaimed by any other wing's hue (gold/amber/brass
# is used three times already - Sanderson, Jordan, Peixoto, Pratchett - and
# red/terracotta twice - King, Valter Hugo Mae - so both were ruled out on
# sight); heather moorland is as specifically Irish a color as the peat
# ground it sits on.
preset: bog-noir
palette:
  bg: "#141712"       # near-black with a cool, peaty green-grey cast - wet
                       # turf and limestone at dusk, not Tordo's blue Atlantic
  surface: "#1c2119"  # a hair lifted, for cards
  ink: "#e3e7de"      # pale limestone-grey, high contrast, very readable
  muted: "#8a9482"    # mossy grey-green, for metadata (AA-checked against surface)
  accent: "#79608f"   # a single cold heather-violet, for links and markers only
displayFace: fraunces  # from the app's implemented set (fraunces | spectral |
                       # sourceSerif); the most characterful of the three,
                       # fitting prose reviewers repeatedly call "hypnotic"
                       # and "atmospheric" rather than plain (sourceSerif,
                       # already used three times) or coolly scholarly
                       # (spectral, already used three times) - this wing
                       # brings fraunces to a second use after Stephen King.
signature: thread      # a quiet hairline the works are strung along - the
                       # literal shape of this wing's own headline feature:
                       # each Dublin Murder Squad book pulls the same thread
                       # of recurring detectives into the next case (see
                       # characters.yaml), and Cal Hooper pulls his own
                       # single thread through three books of the same
                       # townland's grudges.
art:
  emblem:
    object: >
      A single straight-backed wooden chair, standing alone on a bare floor
      under one hard, unshaded bulb hung directly overhead; the rest of the
      room held in shadow.
    why: >
      French trained and worked as a professional stage, film and voiceover
      actor through her twenties before writing her debut between castings,
      and the chair reads first as an audition chair. But researching The
      Trespasser she sat in that same kind of chair as the subject of a real
      police interrogation, demonstrated by her own procedure source: the
      change in him "was like flicking a switch," she has said, from an
      easy-going friend into "this concentrated, full-on, unstoppable force,
      locked on to me like a pit bull." One piece of furniture serves both
      scenes because her own career pivot was from performing other
      people's words to writing detectives whose defining skill is
      performance - working a suspect, working each other, working the
      reader who trusts whichever one is narrating. No detective is drawn
      sitting in it; the chair is the instrument, not an illustration of a
      scene.
  motifs:
    - a ghost estate of half-built houses on a Celtic Tiger development,
      scaffolding still standing, weeds through unfinished concrete
    - a Garda incident room's case board, chairs pushed back, ring binders
      stacked, rain running down the window behind it
    - a construction crane over Dublin Georgian brick, boom and bust
      standing in the same frame
    - an empty straight-backed chair pulled back from a bare table, half the
      room in shadow
    - bogland running out to a drystone wall, no neighbour or road in sight
    - a lone whitewashed farmhouse swallowed by moorland, smoke at the
      chimney the only sign of anyone home
    - a townland crossroads shop or pub counter, a dispute being settled
      there rather than reported anywhere
  atmosphere: >
    Two registers, kept distinct rather than blended into one house mood,
    because the wing itself runs on that contrast. The Dublin Murder Squad
    books: institutional and overcast, a boom economy still going up in
    glass and cranes over a city of Georgian brick, incident-room
    fluorescence and rain on a window, a different detective's version of
    events each time. The Cal Hooper trilogy: open, harsh, sparsely peopled
    country, weather and distance doing what a building did in the Dublin
    books, a townland settling its own accounts and calling in outside law
    only as a last resort. The Witch Elm gets neither register: an ordinary
    Dublin house turned suddenly unsafe, drawn plainer than either era, the
    hinge between them rather than a member of one.
  lineCharacter: >
    A hard, scratched line, incised rather than inked - closer to a
    dry-point cut into a soft ground than a drawn stroke - laid down once
    and then retraced a second time slightly off true, so a contour reads
    as two overlapping passes rather than one confident line. The doubling
    is the point: this is a wing where the same case gets told again by a
    different detective, and where French has said outright that everyone
    narrating her books is unreliable.
  backgroundTexture: >
    Damp, dark peat-toned paper, its grain scored in shallow parallel
    grooves the way a spade scores a turf bank, with a pale limestone dust
    pooling in the low corners rather than any wash or fibre-bloom.
  accentUse: >
    Heather-violet on exactly one element per image, never as a fill: a
    length of string or twine tying a stack of case notes, a single marker
    flag pinned to a map, one sprig of moor heather, or a stray thread of
    wool caught on barbed wire.
  avoid:
    - shamrocks, pints of stout, tin-whistle sessions, leprechauns or any
      tourist-board Ireland iconography
    - thatched roofs and whitewashed postcard villages
    - Celtic knotwork or interlace used as decoration
    - literal Western costume - Stetsons, six-shooters, saloon doors - the
      Cal Hooper trilogy borrows the genre's shape, not its wardrobe
    - crime-scene tape, chalk outlines or a magnifying glass, procedural
      shorthand that belongs to no author in particular
    - gaslit Victorian fog or a deerstalker silhouette, Sherlock-adjacent
      and not this wing
    - the 2019 Dublin Murders television adaptation's visual identity - its
      casting, its title cards, its colour grade
notes: >
  A dark, damp register rather than a gothic one: near-black with a cool
  green-grey cast (wet turf, limestone, an Irish sky before rain), pale
  limestone ink for contrast, and one cold heather-violet accent used only
  for links and markers. Deliberately not blue (Joao Tordo's Atlantic
  already owns that register in this catalogue) and not warm (no bog-oak
  brown, no gorse yellow, nothing that would read as tourist-board Ireland).
  The single hairline signature is the wing's own recurring-detective
  structure made visual, not decoration borrowed from elsewhere.
