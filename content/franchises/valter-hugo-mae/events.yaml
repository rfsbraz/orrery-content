# FRANCHISE-SPECIFIC events. Author-LIFE events (birth, the prizes, the
# publishing background) live on the author entity
# (content/authors/valter-hugo-mae.yaml). This file holds the franchise's
# cultural weather.
#
# Note on scope: José Saramago's death is kept HERE, reach: franchise, exactly
# as the joao-tordo wing keeps its own copy, and for the same load-bearing
# reason - Saramago is the namesake of the prize that made this author's
# career, awarded to him personally, three years before Saramago's death.
# Kept franchise-scoped rather than global because what a writer's death means
# to a given body of work is a per-author judgement, and Saramago's weight here
# is specific: he is the namesake of the prize awarded to Mãe in 2007.

- id: vhm-minusculas-style-2004
  images:
    sketchCredit: Generated for Orrery (gpt-image-1)
    sketch: assets/valter-hugo-mae/vhm-minusculas-style-2004.webp
  date: 2004
  title: Explains the choice to write without capital letters
  scope: author-life
  reach: franchise
  impact: med
  description: >
    [[work:valter-hugo-mae/o-nosso-reino|o nosso reino]] opens the run of
    four novels written entirely in lowercase (see the works.yaml
    title-style note). Mãe traces the choice to Al Berto's own lowercase
    poems and to a line of Ruy Belo's, "num poema, nenhuma palavra deve
    levantar a cabeça" (in a poem, no word should raise its head above the
    others), which he takes literally, as a kind of democracy among words.
    He calls it a way of simplifying syntax and graphics until writing sits
    closer to speech, and confesses an abhorrence of the ellipsis, "o
    excremento da pontuação" (the excrement of punctuation).
  spoilerAfter: null
  sources: [https://visao.pt/jornaldeletras/jornalletrasforum/origami/2010-01-24-as-grandes-minusculas-de-valter-hugo-maef545016/]

- id: vhm-saramago-death-2010
