- id: vhm-japan-research-2016
  images:
    sketchCredit: Generated for Orrery (gpt-image-1)
    sketch: assets/valter-hugo-mae/vhm-japan-research-2016.webp
  date: 2016
  title: Travels to Japan twice to research Homens Imprudentemente Poéticos
  scope: author-life
  reach: franchise
  impact: med
  description: >
    Researching [[work:valter-hugo-mae/homens-imprudentemente-poeticos|Homens
    Imprudentemente Poéticos]], Mãe travels to Japan twice: the first trip to
    observe temples, gardens and everyday gestures, the second to visit
    Aokigahara, the forest near Mount Fuji known for its high rate of
    suicides that gives the novel its setting, and the last elderly
    craftsman in Japan still making traditional folding fans by hand, near
    the same mountain. "Eu precisava das evidências, de ver" (I needed the
    evidence, to see), he says of the trips.
  spoilerAfter: null
  sources:
    - https://www.nit.pt/cultura/09-30-2016-valter-hugo-mae-o-primeiro-texto-que-escrevi-tinha-seis-anos-e-foi-tao-traumatico-que-ainda-me-lembro
    - https://www.correio24horas.com.br/literatura/quero-ser-um-agente-do-sonho-diz-escritor-portugues-valter-hugo-mae-1216
