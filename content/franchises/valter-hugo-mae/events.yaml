  date: 2015-11-11
  title: Shortlisted for the Prémio Oceanos with A Desumanização
  scope: culture
  reach: franchise
  impact: med
  description: >
    [[work:valter-hugo-mae/a-desumanizacao|A Desumanização]] (2013) is named
