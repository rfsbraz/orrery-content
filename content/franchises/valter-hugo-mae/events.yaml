    sketch: assets/valter-hugo-mae/vhm-saramago-death-2010.webp
  date: 2010-06-18
  title: Death of José Saramago
  scope: culture
  reach: franchise
  impact: med
  description: >
    Portugal's only Nobel laureate in literature dies on Lanzarote, three
    years after personally praising
    [[work:valter-hugo-mae/o-remorso-de-baltazar-serapiao|o remorso de
    baltazar serapião]] and putting his own name's prize behind it. The
    passing of the writer whose endorsement launched this author's career.
  spoilerAfter: null
  sources: [https://en.wikipedia.org/wiki/Jos%C3%A9_Saramago]

