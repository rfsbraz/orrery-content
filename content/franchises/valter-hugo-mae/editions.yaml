# Portuguese editions - the actual books a Portuguese reader buys.
#
# Mãe writes in Portuguese, so there is nothing to translate: every work's
# `title` in works.yaml IS the published Portuguese title. Per SCHEMA.md, the
# `title` field is therefore OMITTED throughout - repeating it would duplicate
# the work title rather than record a genuinely different published title.
#
# COVERAGE: 34 of 37 works have at least one verified edition (see below). The
# three without one: "O Sol Pôs-se Calmo Sem Me Acordar" (1997) and "Entorno
# a Casa Sobre a Cabeça" (1999), both from tiny, apparently defunct presses
# (A Mar Arte, Coimbra; Silêncio da Gaveta Edições, Vila do Conde) with no
# record found in either the Biblioteca Nacional de Portugal (BNP) catalogue
# or any live retailer; and "Bruno" (2007, Littera Libros, Badajoz, Spain),
# whose only reported ISBN is not corroborated by any source that could be
# opened here - not in BNP (a Spanish press falls outside Portuguese legal
# deposit), not in OpenLibrary, no retailer or library listing found - so it
# is left out rather than shipped on a single unverified number.
#
# SOURCES, two tiers:
# - The ten core novels, both autobiographical-prose works, the short-story
#   collection, all eight children's books, and the one apocryphal anthology
#   piece are sourced to portoeditora.pt product pages (Grupo Porto Editora,
#   which now holds Mãe's backlist, including the Alfaguara and Assírio &
#   Alvim imprints). portoeditora.pt returns HTTP 403 to a plain fetch but
#   serves normally to a browser User-Agent (the workaround CURATION.md §4
#   records for infopedia.pt/observador.pt applies here too). Each ISBN and
#   its "Editor"/"Encadernação"/"Edição" fields were read directly off that
#   book's own product-page spec table.
# - The four novels reissued from earlier imprints (o nosso reino, o remorso
#   de baltazar serapião, o apocalipse dos trabalhadores, o filho de mil
#   homens) and all first-recorded editions of the pre-2011 poetry carry a
#   second entry sourced to the Biblioteca Nacional de Portugal's ipac20
#   catalogue (catalogo.bnportugal.gov.pt), which - per CURATION.md §4 -
#   answers to a browser User-Agent though it 30x-redirects a bare fetch.
#   Each is cited by its id.bnportugal.gov.pt/bib/catbnp/<id> permalink, the
#   specific record opened, not the catalogue's search front door. Pre-2007
#   ISBN-10s recorded there were converted to ISBN-13 by dropping the ISBN-10
#   check digit, prefixing 978, and recomputing the check digit from scratch,
#   per the editions skill's own worked method; every converted number is
#   re-verified by its ISBN-13 check digit here as well as by validate.py.
#
# Two of the small-press poetry first editions carry a publisher or date that
# disagrees with works.yaml's own note; this file does not edit works.yaml, so
# both stand as an open discrepancy between the two files. "Estou Escondido na
# Cor Amarga do Fim da Tarde" is catalogued at BNP under "Casa das Letras",
# Porto, 2000, not "Campo das Letras" as works.yaml states - two real,
# unrelated Portuguese publishers. "A Cobrição das Filhas" is catalogued at
# BNP as a first edition dated 2002, one year later than works.yaml's 2001.
#
# One poetry title, "Silencioso Corpo de Fuga" (1996, A Mar Arte, Coimbra),
# has no ISBN in the BNP record at all (only a legal-deposit number,
# PT-103760/96) - a real pre-ISBN-era small-press edition, not a gap, so it is
# recorded here with isbn13 omitted rather than left out entirely.
#
# Both "Folclore Íntimo" (2008) and "Contabilidade" (2010) carry publisher
# subtitles confirming they are themselves retrospective collections -
# "poesia reunida" and "poesia 1996-2010" respectively - read directly off
# their BNP catalogue records. This corroborates, without resolving, the open
# question already logged in works.yaml about how "Publicação da Mortalidade"
# (2018) relates to the individually dated collections that precede it: Mãe
# has now published at least three such retrospective volumes across his
# poetry career, not one.
#
# "A Cobrição das Filhas" and "Útero" are also both collected in a 2021
# Officium Lectionis triptych, "Díptico da prédica ; a cobrição das filhas ;
# seguido de Útero" - the only edition found anywhere for Útero on its own,
# and, being current, the recommended edition for both works; each is
# recorded as its own entry pointing at the same ISBN, since the schema does
# not have a multi-work edition record.
#
# "A máquina de fazer espanhóis" has a conflicting first-edition record at
# BNP - two different ISBNs, both catalogued as "1a ed.", one dated 2009 and
# one dated 2010, both from Objectiva (works.yaml's own note says Alfaguara,
# 2010) - genuinely unresolved; no first edition is recorded for that work
# here, only its two current Porto Editora printings.
#
# "Contra Mim" is a 2020 first edition (Porto Editora, 8 October 2020,
# corroborated by observador.pt's 3 September 2020 announcement of the
# "rentrée" and ntradio.pt's 15 October 2020 release notice). The Associação
# Portuguesa de Escritores prize it won is styled "2020" and was announced in
# June 2021, which is consistent with an October 2020 release, not a 2021
# one. works.yaml carries the same 2020 date.

