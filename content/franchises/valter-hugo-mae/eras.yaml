# Creative periods.
#
# Only ONE received periodisation was found for this author: the four novels
# published without capital letters between 2004 and 2010, called the
# "tetralogia das minúsculas" in Brazilian academic criticism and the
# Portuguese press (not the author's own coinage, as far as could be
# established - hence provenance: critical, not author). No further
# periodisation of the 2011-2026 span (nine more novels, six children's
# books, a short-story collection, two works of autobiographical prose) was
# found: it is a long, thematically varied stretch (Japan, Iceland, Madeira,
# colonial Brazil, his own childhood) with no critic-named shape on record,
# so it carries no era.

- id: tetralogia-das-minusculas
  title: A Tetralogia das Minúsculas
  period: "2004-2010"
  themes: [rural and small-town Portugal, moral fable, the erasure of capital letters, cruelty and tenderness together]
  provenance: critical
  description: >
    Four novels published entirely without capital letters -
    [[work:valter-hugo-mae/o-nosso-reino|O Nosso Reino]] (2004),
    [[work:valter-hugo-mae/o-remorso-de-baltazar-serapiao|o remorso de
    baltazar serapião]] (2006), [[work:valter-hugo-mae/o-apocalipse-dos-trabalhadores|o
    apocalipse dos trabalhadores]] (2008) and [[work:valter-hugo-mae/a-maquina-de-fazer-espanhois|a
    máquina de fazer espanhóis]] (2010) - a deliberate typographic affectation
    read as levelling every word to the same weight, oral rather than
    literary. The run opens with a child's-eye view of a fishing village
    under the Estado Novo and closes with the old and forgotten inside a
    nursing home; in between, the second volume wins Mãe the Prémio José
    Saramago and the fourth wins the Grande Prémio Portugal Telecom, so a
    small-press poet becomes a name in Portuguese letters entirely inside
    this one stretch.
  note: >
    RECEIVED as a critical label, not the author's own: the exact phrase
    "tetralogia das minúsculas" appears as the title of an academic paper
    (Federal University of Ceará) and, independently, in press coverage of
    O Filho de Mil Homens describing what it is NOT part of - both describe
    it as something critics/reviewers call the run, not something Mãe named
    himself. A third, unrelated retail synopsis for O Nosso Reino
    corroborates the same four-book membership and order. Kept in Portuguese
    because that is the received term; an English translation would be a
    coinage.
  sources:
    - https://repositorio.ufc.br/handle/riufc/79197
    - https://maisumaopiniao.com.br/2019/10/25/valter-hugo-mae-entre-maquinas-de-fazer-espanhois-e-filhos-de-mil-homens/
    - https://www.estantevirtual.com.br/livro/o-nosso-reino-0PK-8868-000-BK
