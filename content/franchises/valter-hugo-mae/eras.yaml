# Creative periods.
#
# Mãe organises his own novels into tetralogies and names them himself: "os
# meus livros têm-se organizado em tetralogias. Houve a primeira, A Idade
# Inteira, e esta agora chama-se Irmãos, Ilhas e Ausências" (Observador, 14
# January 2024). A third cycle, Crimes e Vindouros, he names at its opening
# in 2026. Those three named cycles are the eras below that carry provenance:
# author, though only the first two are complete: Crimes e Vindouros is one
# book old, and a tetralogy he intends rather than one he has finished. The
# remaining era, before the novels, rests on a bibliographic fact rather than
# on a name anybody uses.
#
# 2011-2012 and 2025 carry no era. His own scheme puts O Filho de Mil Homens
# (2011) outside every tetralogy, on a separate, non-chronological axis it
# shares with Contra Mim (2020), and Educação da Tristeza (2025) falls
# between the close of one cycle and the start of the next. Portuguese and
# Brazilian criticism, the Portuguese press, the author's own site and Porto
# Editora's reference work Infopédia periodise these years no further.

- id: antes-dos-romances
  title: Antes dos Romances
  images:
    sketch: assets/valter-hugo-mae/antes-dos-romances.webp
    sketchCredit: Generated for Orrery (gpt-image-1)
    sketchSource: docs/VISUAL.md#4b-the-era-plate
  period: "1996-2003"
  themes: [poetry, small presses, the Porto literary scene, publishing as a trade]
  provenance: publishing
  description: >
    Eight years in which everything Mãe publishes is verse, beginning with
    [[work:valter-hugo-mae/silencioso-corpo-de-fuga|Silencioso Corpo de
    Fuga]] (1996), written at twenty-four, and running to nine books in
    print by the time the first novel appears. The 1999 collection
    [[work:valter-hugo-mae/egon-schiele-auto-retrato-de-dupla-encarnacao|Egon
    Schiele Auto-Retrato de Dupla Encarnação]] takes the Prémio Almeida
    Garrett, and the same years put him inside the trade rather than only on
    its shelves: he co-founds Quasi Edições in 1999 and co-directs the
    magazine Apeadeiro from 2001. The verse does not stop in 2004; the
    exclusivity does.
  note: >
    The boundary is bibliographic, not critical: no critic or reference work
    names this stretch as a period. What is sourced is the fact that closes
    it, in Observador's words: he "dedicou os seus primeiros anos de escrita
    em exclusivo à poesia. Só publicaria o primeiro romance (o nosso reino)
    em 2004, quando contava já com nove livros publicados em verso." The
    title is descriptive for that reason. Mãe rejects a phase reading of the
    poetry itself in the same interview: asked whether his relationship with
    poetry ever had periods of disenchantment, he answers that "nunca houve
    uma altura da minha vida em que eu achasse que a poesia me interessava
    menos" and that it "nunca teve uma inflexão." Fourteen books in verse
    exist by 2018, so the poetry runs alongside the novels rather than
    ending here.
  sources:
    - "https://observador.pt/especiais/valter-hugo-mae-fui-mais-esperto-na-vida-quando-optei-por-um-verso-mais-do-que-por-uma-pessoa/"
    - "https://valterhugomae.com/biblio.html"

- id: tetralogia-das-minusculas
  title: A Idade Inteira
  period: "2004-2010"
  themes: [rural and small-town Portugal, moral fable, the erasure of capital letters, cruelty and tenderness together]
  provenance: author
  description: >
    The first of the tetralogies Mãe names, four novels published entirely
    without capital letters:
    [[work:valter-hugo-mae/o-nosso-reino|o nosso reino]] (2004),
    [[work:valter-hugo-mae/o-remorso-de-baltazar-serapiao|o remorso de
    baltazar serapião]] (2006),
    [[work:valter-hugo-mae/o-apocalipse-dos-trabalhadores|o apocalipse dos
    trabalhadores]] (2008) and
    [[work:valter-hugo-mae/a-maquina-de-fazer-espanhois|a máquina de fazer
    espanhóis]] (2010). Criticism and reference works call the same run "a
    tetralogia das minúsculas" after that typographic affectation, read as
    levelling every word to the same weight, oral rather than literary. The
    author's own title points instead at what the four books cover between
    them: the run opens on an eight-year-old in a fishing village under the
    Estado Novo and closes on the old and forgotten inside a nursing home, a
    whole human age. In between, the second volume wins the Prémio José
    Saramago and the fourth the Grande Prémio Portugal Telecom, so a
    small-press poet becomes a name in Portuguese letters entirely inside
    this one stretch.
  note: >
    Two received names for one period. "A Idade Inteira" is the author's, in
    his own words to Observador (14 January 2024): "os meus livros têm-se
    organizado em tetralogias. Houve a primeira, A Idade Inteira." Revista
    Pernambuco gives the same series name with the four titles and adds that
    it is written with lowercase initials, "a idade inteira", like the novels
    themselves; the capitalised form here follows the direct-quote interview,
    and the two sources disagree only on casing. "A tetralogia das
    minúsculas" is the critical and reference-work name for the identical
    four books: Porto Editora's Infopédia uses it without introducing it, and
    it titles an academic paper at the Federal University of Ceará. Both
    names are current; the author's is the one on the plate.
  sources:
    - "https://observador.pt/especiais/valter-hugo-mae-se-nao-puder-fazer-mais-nada-fiz-o-que-me-competia/"
    - "https://pernambucorevista.com.br/secoes/capa/a-relacao-sem-limites-de-dois-irmaos-no-novo-livro-de-valter-hugo-mae"
    - "https://www.infopedia.pt/artigos/$valter-hugo-mae"
    - "https://repositorio.ufc.br/handle/riufc/79197"

- id: irmaos-ilhas-e-ausencias
  title: Irmãos, Ilhas e Ausências
  period: "2013-2024"
  themes: [islands, brothers, absence, solitude that company does not cure, displacement]
  provenance: author
  description: >
    The second tetralogy, named by Mãe in the author's note closing its final
    volume: "Nos romances recentes, decidi perseguir uma segunda tetralogia,
    a que chamaria de Irmãos, ilhas e ausências, em que a companhia nem por
    isso conduz à superação da solidão." Four novels, each set far from
    Portugal until the last:
    [[work:valter-hugo-mae/a-desumanizacao|A Desumanização]] (2013) in
    Iceland, [[work:valter-hugo-mae/homens-imprudentemente-poeticos|Homens
    Imprudentemente Poéticos]] (2016) in Japan,
    [[work:valter-hugo-mae/as-doencas-do-brasil|As Doenças do Brasil]] (2021)
    among an indigenous people under Portuguese settlement, and
    [[work:valter-hugo-mae/deus-na-escuridao|Deus na Escuridão]] (2024) in a
    remote parish of Madeira, the national plot he did not want to close the
    cycle without. He describes them as "quatro romances passados em ilhas
    distintas", and says of the last: "Este livro encerra uma tetralogia
    sobre ilhas, de tramas passadas em ilhas."
  note: >
    The tetralogy is four novels; the span is the years those novels occupy,
    so poetry, short fiction, children's books and the autobiographical
    Contra Mim also fall inside it without belonging to the cycle. Mãe
    assembled it in retrospect rather than by plan: "eu não falei disso
    inicialmente. A primeira vez que falei que estava a completar um ciclo
    foi quando publiquei a terceira ilha." Both boundaries are his: Visão and
    Revista Pernambuco name A Desumanização as the opening volume, and he
    states in two separate January 2024 interviews that Deus na Escuridão
    closes it. Homens Imprudentemente Poéticos is dated 2016 against Revista
    Pernambuco and Observador, which give 2015: Porto Editora's catalogue and
    a contemporary review of the first edition both put it in 2016.
  sources:
    - "https://observador.pt/especiais/valter-hugo-mae-se-nao-puder-fazer-mais-nada-fiz-o-que-me-competia/"
    - "https://pernambucorevista.com.br/secoes/capa/a-relacao-sem-limites-de-dois-irmaos-no-novo-livro-de-valter-hugo-mae"
    - "https://rr.pt/noticia/vida/2024/01/12/valter-hugo-mae-o-amor-de-uma-mae-podera-ser-apenas-comparavel-ao-tamanho-do-amor-de-deus/362455/"
    - "https://visao.pt/visaose7e/livros-e-discos/2024-01-30-valter-hugo-mae-nos-meus-livros-tento-sempre-mostrar-que-a-familia-e-uma-coisa-bastante-escangalhada-e-complexa/"

- id: crimes-e-vindouros
  title: Crimes e Vindouros
  period: "2026-present"
  themes: [inherited guilt, the crimes left to the future, faith and justice, greed in a small community]
  provenance: author
  description: >
    A cycle Mãe opens rather than one he has closed. Asked what he has in
    hand, he answers: "Este livro começa um ciclo chamado Crimes e
    Vindouros, por isso já estou com a cabeça no próximo romance. À partida
    será uma tetralogia também; gosto de funcionar por ciclos de quatro
    livros." The subject he names for it is inheritance of harm: "do que
    podem ser os grandes crimes de hoje, herdados pelas pessoas do futuro;
    que crimes estamos nós a deixar para que as pessoas do futuro herdem."
    It begins with [[work:valter-hugo-mae/o-seculo-dos-imbecis|O Século dos
    Imbecis]] (2026), a mountain village of greed, gossip and fragile faith,
    published thirty years after his first book.
  note: >
    An intention, not a finished shape. One volume exists; a second is being
    written; the four-book form is what Mãe expects rather than what the
    record shows, in his own words "à partida". The other two cycles here
    were named in retrospect, once their books were on the shelf, and this
    one is named at its opening, so its extent may yet move. The span is left
    open for that reason. Rests on a single outlet, Notícias ao Minuto (17
    June 2026), but on a direct first-person statement in an interview
    answer; RTP's launch coverage of the same novel names no cycle.
  sources:
    - "https://www.noticiasaominuto.com/cultura/3005253/enquanto-totalidade-estamos-num-movimento-em-direcao-a-um-fim-do-mundo"
