id: valter-hugo-mae
name: Valter Hugo Mãe
kind: author
description: >
  A poet who became one of Portugal's most acclaimed living novelists: four
  early books written entirely without capital letters, a José Saramago Prize
  at the second of them, and two decades of fable-like fiction that has since
  travelled from medieval Portugal to Japan, Iceland, Madeira and colonial
  Brazil.
authorIds: [valter-hugo-mae]
themePreset: village-ink

# Wide banner for the wing. Vila do Conde (Caxinas), the fishing town on the
# Rio Ave where Mãe has lived since 1980 and the setting his debut novel,
# o nosso reino, draws on directly ("a poor Portuguese fishing village"). A
# portrait-oriented Unsplash-sourced beach photo from the same parish was
# considered and rejected: technically CC0, but a stock photo of a person's
# legs on rocks, with no boats, harbour or village visible, does not read as
# the place. Wikimedia Commons, CC BY-SA 4.0.
images:
  header: "https://upload.wikimedia.org/wikipedia/commons/thumb/7/7a/Vila_do_Conde_2021_%282%29.jpg/1920px-Vila_do_Conde_2021_%282%29.jpg"
  headerCredit: "Joseolgon, CC BY-SA 4.0"
  headerSource: "https://commons.wikimedia.org/wiki/File:Vila_do_Conde_2021_(2).jpg"

# Capabilities are auto-detected from the data (docs/SCHEMA.md). This is a
# deliberately SPARSE bundle at the thin end of the framework: works + a
# well-sourced aura (5 franchise events, 7 author lifeEvents) + four sourced
# eras. No characters.yaml (no recurring figures across works were found - his
# novels are standalone, each in a different setting) and no work
# `connections` (no crossovers found), so the connections map stays dark by
# design. orders.yaml holds two curated orders, one for each of the two
# tetralogies Mãe names and has completed; the third cycle he names, Crimes e
# Vindouros, is one book old and has no sequence to order yet. No
# publisher-numbered or author-endorsed order was found for anything beyond
# those groupings. startHere below rests on a named,
# dated Portuguese bookshop reading guide, the only entry-path source found
# in either language. Everything else left at auto; nothing forced.
features: {}

# "Where to start" - powers the guided wizard. Two of the four paths (start
# here) rest on a named Portuguese-language source that answers the exact
# question, published by Wook, the country's largest bookshop and part of
# the same publishing group (Porto Editora) as most of Mãe's own catalogue:
# "Por onde começar, se nunca leu Valter Hugo Mãe" (wookacontece, 11 October
# 2021, bylined Álvaro Curia/Ludgero Cardoso). No author statement recommending
# a starting point was found in either language. That source picks two novels
# published after the prize-winning "minúsculas" tetralogy and names neither
# tetralogy volume as a door in.
startHere:
  paths:
    - id: the-unlikely-door
      title: The unlikely door in
      description: >
        O Filho de Mil Homens, published right after the four-book run that
        made his name, skips past it entirely: a lone fisherman past forty
        inventing the family he never had, gentler and more approachable
        than the typographic experiment around it. Wook's own reading guide
        names it the way its own writers actually started. The cost: you
        miss the lowercase tetralogy and the Prémio José Saramago that made
        him a name in Portuguese letters, which most criticism reaches for
        first.
      workIds:
        - valter-hugo-mae/o-filho-de-mil-homens
      orderId: null
      fit:
        experience: [new]
        commitment: [taste]
    - id: gentler-initiation
      title: A gentler initiation
      description: >
        Eleven short stories, each illustrated by a different artist and
        prefaced by Mia Couto - dogs and wolves standing in for love, loss
        and the slow work of learning to care, in doses smaller than a
        novel. The same reading guide that recommends O Filho de Mil Homens
        calls this collection an excellent way to discover his prose for the
        first time. The cost: it is a taste of theme and voice, not the
        plotted, book-length reading experience the prizes were won for.
      workIds:
        - valter-hugo-mae/contos-de-caes-e-maus-lobos
      orderId: null
      fit:
        experience: [new]
        commitment: [taste]
    - id: the-tetralogy-that-made-him
      title: The tetralogy that made his name
      description: >
        Four novels published without a single capital letter, 2004-2010: a
        fishing village under the Estado Novo, a medieval marriage curdling
        into witchcraft, two mourners in Bragança, a nursing home at the end
        of a life. Mãe calls the run "A Idade Inteira" himself, and its
        second volume won him the Prémio José Saramago. Read in order,
        because the order is simply how it was written.
      workIds: null
      orderId: valter-hugo-mae/tetralogia-das-minusculas
      fit:
        experience: [new, returning]
        commitment: [arc]
      note: >
        None of the four is a gentle read; a reader wary of that demand
        should try one of the two entries above first.
    - id: everything
      title: Everything, in order
      description: >
        Every novel, poetry collection, children's book and the two works of
        autobiographical prose, in strict publication order from 1996
        onward: a poet with nine books in verse becomes, in 2004, the
        novelist criticism knows him as, and every later book takes its
        place in that same timeline.
      workIds: null
      orderId: default
      fit:
        experience: [completionist]
        commitment: [complete]

# Which shared global events actually reach this author (docs/SCHEMA.md). Most
# of the pool is Anglophone trade or genre-industry history that never touches
# a Portuguese literary novelist; excluded below. carnation-revolution-1974 is
# not listed in either block: it falls inside his lifetime (born 1971) and
# renders by default. o nosso reino (2004), his debut, is set "in the last
# years of the Estado Novo" and is read by critics as staging the regime's
# "censura do pensamento" and "quase meio século de ditadura" (Há Sempre um
# Livro à Nossa Espera, cited below) - the world the Revolution closed.
globalEvents:
  exclude:
    - chain-bookshop-1982                # a British and American shop format; his trade is small Portuguese presses and Porto Editora
    - online-bookselling-1995            # domestic, bookshop-led readership; no title or career fact answers this
    - sept-11-2001                       # no novel reaches for it
    - ebook-and-self-publishing-2007     # traditionally published throughout (Quasi Edições, Objectiva, Alfaguara, Porto Editora); no self-publishing story
    - financial-crisis-2008              # no work answers it; the novels of that decade are set in Iceland, Japan and colonial Brazil, not contemporary Portugal
    - prestige-fantasy-adaptation-2011   # he does not write fantasy
    - portugal-bailout-2011              # no novel of the decade engages the bailout or austerity; contrast joao-tordo/franchise.yaml, whose Anatomia dos Mártires (2011) is built on it directly
    - covid-19-pandemic-2020             # no work found addressing the pandemic; Deus na Escuridão (2024) is set 1981-2001, not the present
    - booktok-2020                       # Lusophone literary fiction is not what short-form video moves, and no work here answers book-discovery culture

# Every work below is checked against at least one Portuguese primary or
# near-primary source (publisher pages, national press, the official José
# Saramago prize site). works.yaml records which titles he edited rather than
# wrote, and are therefore not carried here.
