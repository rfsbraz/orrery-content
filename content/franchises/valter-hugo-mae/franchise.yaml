  - https://hasempreumlivro.blogspot.com/2012/12/o-nosso-reino-de-valter-hugo-mae.html
  - "https://www.wook.pt/wookacontece/novidades/noticia/ver/por-onde-comecar-se-nunca-leu-valter-hugo-mae/?id=196585"
