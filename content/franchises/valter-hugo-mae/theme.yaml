# Branding for the Valter Hugo Mãe wing (see Orrery CONCEPT §6 - the design
# law). Restrained and inked, not costume: earth and ember tones evoking his
# own ink drawings and the rural/village settings that recur across the
# fiction (a fishing village, a mountain village, Bragança, a nursing home),
# deliberately avoiding blue/coastal tones already used by the other
# Portuguese wing in the catalogue (joao-tordo) so the two stay visually
# distinct.
preset: village-ink
palette:
  bg: "#1c1712"       # near-black warm umber, like ink-wash paper in shadow
  surface: "#241d17"  # a hair lifted, for cards
  ink: "#ece2d0"      # warm parchment white, high contrast, very readable
  muted: "#9c8a72"    # faded ochre-grey, for metadata
  accent: "#a8461f"   # one burnt-terracotta accent, for links and markers only
displayFace: spectral  # from the app's implemented set (fraunces | spectral | sourceSerif)
signature: rule         # one firm architectural line - a deliberate nod to the
                         # "minúsculas" novels' own typographic rule-breaking
art:
  motifs:
    - a fishing village of low whitewashed houses
    - inland granite and rain on slate
    - domestic interiors seen from just inside the door
    - hands, at work or at rest
    - islands as separate small worlds
  atmosphere: >
    Quiet, close and unsentimental. Weather rather than drama, and tenderness
    kept in the same frame as cruelty. People are small in the composition but
    never incidental. Rural and coastal Portugal of the late Estado Novo and
    after, not of a tourist poster.
  lineCharacter: >
    Fine, slightly tremulous ink, as if drawn with a dip pen; deliberate
    imperfection, no ruled edges. The four lowercase novels are the key: the
    drawing should feel like it refuses capital letters too.
  backgroundTexture: >
    Warm laid paper with a faint umber wash and visible fibre, the tone of the
    wing's own near-black umber lifted into daylight.
  accentUse: >
    Burnt terracotta on exactly one element per image, never as a fill: a roof,
    a shawl, a single lit window.
  avoid:
    - maritime kitsch and decorative azulejo tiling
    - fado and saudade cliche, shawled widows as shorthand
    - sunlit postcard blue, the Algarve palette
    - anything that reads as folk costume rather than working clothes
notes: >
  A quiet, inked edition: near-black umber paper, warm parchment type, one
  burnt-terracotta accent used only for links and markers. The single
  flourish is a firm rule rather than a soft line, echoing the deliberate
  typographic constraint of the tetralogia das minúsculas. No folk-costume
  patterns, no literal book-cover pastiche - readability first, restraint
  everywhere. displayFace and signature are both chosen from the app's
  actually-implemented sets (docs/SCHEMA.md).
