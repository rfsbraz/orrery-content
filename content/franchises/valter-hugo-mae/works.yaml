- id: valter-hugo-mae/publicacao-da-mortalidade
  title: "Publicação da Mortalidade"
  authorIds: [valter-hugo-mae]
  published: 2018
  subseries: null
  canonTier: extended
  synopsis: >
    A collected-poems volume gathering his poetry into one edition.
  note: >
    Described elsewhere as collecting "nine books of poetry", fewer than the
    14-15 individually dated collections listed above - an unreconciled
    discrepancy. The publisher's own listing (Porto Editora) describes the
    edition as actively curated rather than a mechanical union of the earlier
    books: "para esta edição eliminou poemas, trabalhou os que ficaram e
    acrescentou um importante número de inéditos" (poems were cut, the
    remaining ones reworked, and a significant number of unpublished poems
    added). That supports "nine" being an editorial regrouping rather than a
    simple count of prior titles, but does not by itself explain the exact
    number; some early items may be chapbooks the collected edition does not
    count as one of the nine, or "nine" may be loose marketing copy. Left
    open rather than guessed at. See also the note on Folclore Íntimo (2008),
    a possibly-related earlier "poesia reunida" volume.
  sources:
    - https://pt.wikipedia.org/wiki/Valter_Hugo_M%C3%A3e
    - https://www.portoeditora.pt/produtos/ficha/publicacao-da-mortalidade/21406656
