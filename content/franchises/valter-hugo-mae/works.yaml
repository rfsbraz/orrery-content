# Bibliography (Works) - the abstract books; editions/covers are separate.
# IDs are STABLE and permanent (user data references them). Titles are the
# ORIGINAL PORTUGUESE (canonical); prose/synopses are in English. Slugs strip
# accents but keep leading articles, consistently across the franchise.
#
# TITLE STYLE NOTE, do not "fix": the four novels of the "tetralogia das
# minúsculas" (2004-2010) are published with lowercase titles and even a
# lowercase author name on the cover - a deliberate typographic choice
# (verified: multiple press and academic sources describe the affectation and
# it is visible on the publisher's own product listings). That lowercase form
# is kept here as the canonical `title`. Every other work reverts to normal
# Portuguese capitalisation.
#
# Dates are first-edition years, cross-checked against at least one Portuguese
# publisher/press source per entry (Porto Editora / Companhia das
# Letras-successor catalogue pages, Público, DN, RTP, the official José
# Saramago prize site) plus, for most entries, a second independent hit
# (Wook/Bertrand catalogue listing, an academic paper, or a second news
# outlet).
#
# canonTier convention for this franchise, applied consistently:
#   core      - the 10 novels (the "minúsculas" tetralogy + the 6 that follow)
#   extended  - poetry (15 books, 1996-2018), children's literature (8 books),
#               the one short-story collection, and the two works of
#               autobiographical/essayistic prose (Contra Mim, Educação da
#               Tristeza) - genuinely his, off the novel-reading spine that
#               the prizes and the press attention are built on.
#   apocrypha - contributions to multi-author volumes he did not write alone
#               or organize (Contos Policiais).
# Tier records the KIND of publication, never how confident the research was.
#
# NOT INCLUDED, editorial work rather than his own writing: the author's own
# bibliography page (valterhugomae.com/biblio.html) and other sources confirm
# he organized (authorRole: editor) a run of poetry anthologies collecting
# OTHER poets' work, none by him: "Série Poeta, Homenagem a Júlio - Saúl Dias" (2000),
# "O Encantador de Palavras" (Manoel de Barros, 2000), "Quem Quer Casar com a
# Poetisa" (Adília Lopes, 2001), "O Futuro em Anos-Luz" (2001), "A Alma não é
# Pequena" (2003), "Desfocados pelo Vento" (2003), plus "Afectos e Outros
# Afectos" (2004, new poems credited jointly to him, Jorge Reis-Sá and
# painter Isabel Lhano) and two more weakly sourced (indirect only): "Os
# Poetas de Amália" (2002) and "Cântico Negro" (poetry of José Régio, with
# Luís Adriano Carlos, year not found). These are books he edited, not books
# he wrote, so they sit outside a bibliography of his own work. Also outside
# it: the magazine Apeadeiro (2001-2004, co-directed) - a periodical, with no
# single dated issue for an entry to anchor to.
#
# IMAGES: 6 of the 37 works below carry a cover verified both against
# OpenLibrary's own edition record for a genuine Portuguese-market printing
# and against the image itself (an eyeballed check matters here: OpenLibrary's
# own cover-to-edition linking is not always reliable, see the note on Homens
# Imprudentemente Poéticos). Mãe's identity is split across four OpenLibrary
# author records by an encoding fault in "Mãe" (OL6613914A, OL12565913A,
# OL12702974A, OL12702976A); a full sweep of all four surfaces 31 distinct
# works. Of those, five carry only a cover that resolves on inspection to a
# Brazilian Biblioteca Azul edition rather than the Portuguese one this
# bibliography follows (each entry's own note names the title). Folclore
# Íntimo's correct 2008 Cosmorama record has no cover at all, and two further
# OpenLibrary records under the same title belong to a 2011 Spanish-market
# edition instead. As Doenças do Brasil, O Rosto, Útero, Pornografia Erudita
# and Contabilidade are catalogued on OpenLibrary with no cover recorded. The
# remaining 20 titles have no OpenLibrary record under any of the four author
# identities: Deus na Escuridão, O Século dos Imbecis, Contra Mim, Educação da
# Tristeza, A Verdadeira História dos Pássaros, A História do Homem Calado,
# Quatro Tesouros, A Minha Mãe é a Minha Filha, Contos Policiais, Silencioso
# Corpo de Fuga, O Sol Pôs-se Calmo Sem Me Acordar, Entorno a Casa Sobre a
# Cabeça, Egon Schiele Auto-Retrato de Dupla Encarnação, Estou Escondido na
# Cor Amarga do Fim da Tarde, Três Minutos Antes de a Maré Encher, A Cobrição
# das Filhas, O Resto da Minha Alegria, Livro de Maldições, Publicação da
# Mortalidade and Bruno.

# --- The Tetralogia das Minúsculas (2004-2010) ---

- id: valter-hugo-mae/o-nosso-reino
  title: "o nosso reino"
  authorIds: [valter-hugo-mae]
  published: 2004
  subseries: "Tetralogia das Minúsculas"
  canonTier: core
  synopsis: >
    Mãe's debut novel: an eight-year-old boy, Benjamim, growing up in a poor
    Portuguese fishing village in the last years of the Estado Novo, reaching
    for some form of transcendence by trying to live what he imagines is the
    life of a saint, under the weight of the church and a repressive world. A
    minor character is drawn from the musician Antony (Antony and the
    Johnsons).
  note: >
    First of the four lowercase-titled novels later received as the
    "tetralogia das minúsculas" (see the subseries note above and
    eras.yaml). One retailer synopsis (Estante Virtual) states this
    explicitly: the book precedes o remorso de baltazar serapião (2006), o
    apocalipse dos trabalhadores (2008) and a máquina de fazer espanhóis
    (2010) "in the series." The synopsis follows the Cosac Naify copy, which
    has Benjamim "tentando levar o que imagina ser a vida de um santo". The
    saint-and-demon duality that circulates widely for this book is not in
    publisher copy in either market and traces to encyclopedia summaries, so
    it is not carried here.
  images:
    cover: "https://covers.openlibrary.org/b/id/7389949-L.jpg"
    coverCredit: "Open Library"
    coverSource: "https://openlibrary.org/works/OL17310972W"
  sources:
    - https://www.blogletras.com/2013/04/o-nosso-reino-de-valter-hugo-mae.html
    - https://www.estantevirtual.com.br/livro/o-nosso-reino-0PK-8868-000-BK
    - https://www.valterhugomae.com/

- id: valter-hugo-mae/o-remorso-de-baltazar-serapiao
  title: "o remorso de baltazar serapião"
  authorIds: [valter-hugo-mae]
  published: 2006
  subseries: "Tetralogia das Minúsculas"
  canonTier: core
  synopsis: >
    In a brutal, superstition-choked medieval Portugal, Baltazar marries the
    most beautiful woman of his land and, following his own father's example,
    sets about "civilising" her exactly as his father once broke in a cow
    named Sarga. A local lord's designs on the young wife push Baltazar
    toward witchcraft, possession and remorse. Carries a preface by José
    Saramago.
  note: >
    The book that won the 2007 Prémio José Saramago and made Mãe's name;
    Saramago called it a "tsunami literário" (see the life event on the
    author entity). Second of the four "minúsculas" novels. On the synopsis:
    the Sarga parallel, the feudal lord's designs and the run toward
    witchcraft, possession and remorse all read as jacket copy for the 2007
    first edition, though that blurb was only found reproduced on a
    literature portal rather than on a publisher's own page, so its
    attribution rests one step short of primary. The current Porto Editora
    copy is far more abstract and carries none of it. The family's mocking
    nickname, "the Sargas", was dropped from the synopsis: it appears in no
    publisher copy in either market and lands inside the book.
  images:
    cover: "https://covers.openlibrary.org/b/id/11120868-L.jpg"
    coverCredit: "Open Library"
    coverSource: "https://openlibrary.org/works/OL13772506W"
  sources:
    - http://marcadordelivros.blogspot.com/2015/06/o-remorso-de-baltazar-serapiao-valter.html
    - https://www.publico.pt/2007/10/26/culturaipsilon/noticia/valter-hugo-mae-venceu-premio-literario-jose-saramago-2007-1308823
    - https://www.premiojosesaramago.pt/vencedores/2007/valter-hugo-mae

- id: valter-hugo-mae/o-apocalipse-dos-trabalhadores
  title: "o apocalipse dos trabalhadores"
  authorIds: [valter-hugo-mae]
  published: 2008
  subseries: "Tetralogia das Minúsculas"
  canonTier: core
  synopsis: >
    In Bragança, two cleaning women and part-time professional mourners,
    Maria da Graça and Quitéria, weary of men and disappointment, both fall
    unexpectedly in love - Maria da Graça with her employer, Quitéria with a
    young Ukrainian immigrant - while their night work watching over
    strangers' dead gives the book its argument: an unlikely, undignified,
    persistent capacity for happiness among people working at the edge of
    dignity. Described by reviewers as Mãe's funniest novel.
  note: Third of the four "minúsculas" novels.
  # Cover is Alfaguara's 2011 Portuguese printing (isbn 9789896720810), an
  # edition between the 2008 QuidNovi first edition and the 2015 Porto
  # Editora reissue that editions.yaml records; no cover is held for either of
  # those two.
  images:
    cover: "https://covers.openlibrary.org/b/id/12583878-L.jpg"
    coverCredit: "Open Library"
    coverSource: "https://openlibrary.org/works/OL13772505W"
  sources:
    - https://www.blogletras.com/2013/09/o-apocalipse-dos-trabalhadores-de.html
    - https://noteonline.pt/products/o-apocalipse-dos-trabalhadores-de-valter-hugo-mae-5685433

- id: valter-hugo-mae/a-maquina-de-fazer-espanhois
  title: "a máquina de fazer espanhóis"
  authorIds: [valter-hugo-mae]
  published: 2010
  subseries: "Tetralogia das Minúsculas"
  canonTier: core
  synopsis: >
    António Silva, an elderly man, enters a nursing home after his wife's
    death and finds a small, fractious community of the old and the
    forgotten inside it. First published in Portugal by Alfaguara in 2010,
    in Brazil by Cosac Naify in 2011.
  note: >
    Fourth and closing novel of the "minúsculas" tetralogy. Several aggregator
    summaries describe this book as a "Prémio Oceanos" winner. That is an
    anachronism the search engines keep repeating - the Oceanos prize did not
    exist under that name until 2013.
    Two independent contemporary news reports (Público, Correio do Minho)
    instead confirm it won the 10th Grande Prémio Portugal Telecom de
    Literatura, Best Book and Best Novel, announced 27 November 2012 (see the
    author entity's lifeEvents). Do not "correct" this back to Oceanos.
  images:
    cover: "https://covers.openlibrary.org/b/id/14827201-L.jpg"
    coverCredit: "Open Library"
    coverSource: "https://openlibrary.org/works/OL15591924W"
  sources:
    - https://www.publico.pt/2012/11/27/culturaipsilon/noticia/valter-hugo-mae-e-o-grande-vencedor-do-premio-portugal-telecom-2012-1575085
    - https://correiodominho.pt/noticias/valter-hugo-mae-vence-10-premio-portugal-telecom-de-literatura-em-lingua-portuguesa/65812
    - https://pt.wikipedia.org/wiki/A_m%C3%A1quina_de_fazer_espanh%C3%B3is

# --- Later novels (2011-2026) ---

- id: valter-hugo-mae/o-filho-de-mil-homens
  title: "O Filho de Mil Homens"
  authorIds: [valter-hugo-mae]
  published: 2011
  subseries: null
  canonTier: core
  synopsis: >
    Crisóstomo, a solitary fisherman turning forty, sets out to build the
    family he never had - inventing one, as if love were above all the
    desire to love, and gathering a small cast of the equally unmoored around
    him.
  note: >
    Explicitly NOT part of the "minúsculas" tetralogy despite following it
    immediately and sharing some stylistic DNA (one review notes this
    directly, contrasting it with a máquina de fazer espanhóis) - it returns
    to standard capitalisation.
  # No cover: OpenLibrary's only covers for this title (Cosac Naify 2012,
  # Biblioteca Azul 2016 and 2024) are all Brazilian editions; the Portuguese
  # first edition (Objectiva/Alfaguara, 2011) has no cover recorded there.
  sources:
    - https://maisumaopiniao.com.br/2019/10/25/valter-hugo-mae-entre-maquinas-de-fazer-espanhois-e-filhos-de-mil-homens/
    - https://www.wook.pt/en/livro/o-filho-de-mil-homens-valter-hugo-mae/16248440

- id: valter-hugo-mae/a-desumanizacao
  title: "A Desumanização"
  authorIds: [valter-hugo-mae]
  published: 2013
  subseries: null
  canonTier: core
  synopsis: >
    Set in the remote Icelandic fjords: Halla, a girl telling what remains
    after the loss of her twin sister, Sigridur. A book of deep delicacy in
    which the discipline of sadness does not preclude a certain redemption,
    nor the permanent astonishment of beauty.
  note: >
    A 2015 Prémio Oceanos finalist. The
    synopsis is held to the altitude of the publisher's own copy (Porto
    Editora: "este romance é a voz de uma menina diferente que nos conta o
    que sobra depois de perder a irmã gémea"), which frames the twin's death
    as the book's opening condition and says nothing further. Three details
    that circulate in secondary summaries are deliberately absent here: the
    sister's age at death, the mother's motive for her coldness, and what
    part death itself plays in the telling. None of the three appears in any
    publisher copy in either market, and the first is unsettled anyway - the
    Brazilian edition's copy (Biblioteca Azul) puts Halla at eleven, which no
    source reconciles with a twin who died at twelve.
  images:
    cover: "https://covers.openlibrary.org/b/id/12694849-L.jpg"
    coverCredit: "Open Library"
    coverSource: "https://openlibrary.org/works/OL23292173W"
  sources:
    - https://acropolerevisitada.wordpress.com/2019/07/10/a-desumanizacao-valter-hugo-mae/
    - https://www.wook.pt/livro/a-desumanizacao-valter-hugo-mae/15081037

- id: valter-hugo-mae/homens-imprudentemente-poeticos
  title: "Homens Imprudentemente Poéticos"
  authorIds: [valter-hugo-mae]
  published: 2016
  subseries: null
  canonTier: core
  synopsis: >
    In an old Japan, at the foot of Mount Fuji, the fan-maker Itaro and the
    potter Saburo live as warring neighbours: an enmity that advances and
    retreats, changing what each man values and what it costs him to stay
    good. Against common misery and fate the feud is a small thing, and what
    the book weighs instead is good sense, and the unconditional ways two
    very different men love their wives.
  note: >
    Held to the publisher's own copy (Porto Editora), which places the book
    only "num Japão antigo" and frames it as the neighbours' feud and the
    two marriages. Two things secondary summaries add are deliberately absent
    here: what Itaro intends for himself, and the state of Saburo's marriage.
    Neither appears in publisher copy in any market, both are developments
    inside the book, and the publisher's own line about "os modos
    incondicionais de amarem suas distintas mulheres" cuts against the second.
    Aokigahara, the forest that drew Mãe to the setting, is carried as an
    author-life event in events.yaml (vhm-japan-research-2016) rather than
    here, where next to a character's intentions it would read as foreshadowing.
  # No cover: OpenLibrary lists a Portuguese Porto Editora edition of this
  # title, but the cover id attached to that record (checked by eye, not just
  # by metadata) is the Brazilian Biblioteca Azul jacket art, so no usable
  # Portuguese cover exists there.
  sources:
    - https://interesses-sutis.blogspot.com/2019/03/resenha-homens-imprudentemente-poeticos.html
    - https://www.portoeditora.pt/produtos/ficha/homens-imprudentemente-poeticos/18541969

- id: valter-hugo-mae/as-doencas-do-brasil
  title: "As Doenças do Brasil"
  authorIds: [valter-hugo-mae]
  published: 2021
  subseries: null
  canonTier: core
  synopsis: >
    Set among the Abaeté, a fictional indigenous people, during the colonial
    period, as Portuguese settlers press to take their land and subjugate
    their bodies. Published with artwork by Denilson Baniwa and a preface by
    Conceição Evaristo.
  note: >
    Described by the publisher as his eighth novel (published by Porto
    Editora, 23 September 2021) - a count that excludes
    [[work:valter-hugo-mae/contra-mim|Contra Mim]], published the same year,
    consistent with tiering that book as autobiographical prose rather than
    a novel (see its own entry).
  # No cover: catalogued on OpenLibrary but with no cover recorded.
  sources:
    - https://www.portoeditora.pt/noticias/as-doencas-do-brasil-de-valter-hugo-mae/195185
    - https://www.wook.pt/livro/as-doencas-do-brasil-valter-hugo-mae/25379457

- id: valter-hugo-mae/deus-na-escuridao
  title: "Deus na Escuridão"
  authorIds: [valter-hugo-mae]
  published: 2024
  subseries: null
  canonTier: core
  synopsis: >
    Set on the island of Madeira between 1981 and 2001, seen through the eyes
    of a ten-year-old: two brothers, Felicíssimo and Pouquinho, who grow up in
    peculiar circumstances and whose lives twine into an equally peculiar,
    very close bond, and the small, code-bound community that closes around
    them. A novel about love as something always exercised in the dark, and
    about the need to care for someone.
  note: >
    Held to the publisher's own copy, which is markedly reticent: the Porto
    Editora product page gives only Madeira, "dois irmãos" and "a necessidade
    de cuidar de alguém", and the publisher's launch release (15 January 2024)
    goes no further than naming the brothers and saying they "crescem em
    circunstâncias peculiares". That euphemism is deliberate, so the specific
    circumstance of the brothers' birth, the stigma attached to it and the
    shape of the family that takes them in are all left unstated here rather
    than resolved ahead of the book.
  sources:
    - https://www.publico.pt/2024/02/05/culturaipsilon/critica/imitacao-milagre-deus-escuridao-valter-hugo-mae-2079291
    - https://deusmelivro.com/mil-folhas/deus-na-escuridao-valter-hugo-mae-1-4-2024/

- id: valter-hugo-mae/o-seculo-dos-imbecis
  title: "O Século dos Imbecis"
  authorIds: [valter-hugo-mae]
  published: 2026
  subseries: null
  canonTier: core
  synopsis: >
    An invented mountain village, a house called Malandrinha, and Agilulfo,
    the eccentric Marquis of Malandrinha, whose wits track the altitude: the
    closer to sea level, the more foolish he becomes, the higher he climbs
    the more lucid, and the village's temptation to bring him down runs
    stronger than its wish to see him climb. A fable about a century of
    information that resists knowledge, and about ignorance losing its shame.
  note: >
    Published June 2026, marking 30 years since his first book (1996). As of
    July 2026 it is his most recent title; no later work is announced.
    ATTRIBUTION, corrected: the synopsis previously described the village as
    something "Mãe has described as a stand-in for social media". Nothing
    opened supports attributing that reading to the author. The publisher's
    copy contains no mention of social media, the internet or anything
    digital, reaching only for "o século da informação, mas parecemos
    resistir ao conhecimento"; the altitude conceit and the village's
    preference for bringing the marquis down are both in that same copy
    verbatim. The social-media reading may well be defensible, but it needs
    an author statement actually read before it goes back in as his.
  sources:
    - https://www.publico.pt/2026/05/06/culturaipsilon/noticia/novo-romance-valter-hugo-mae-proximas-novidades-grupo-porto-editora-2173700
    - https://cnnportugal.iol.pt/entrevista/valter-hugo-mae/nao-teremos-mais-imbecis-do-que-outros-seculos-tiveram-mas-a-ignorancia-perdeu-o-pudor/20260614/6a2ca4a3d34edcee7c653899

# --- Autobiographical / essayistic prose ---

- id: valter-hugo-mae/contra-mim
  title: "Contra Mim"
  authorIds: [valter-hugo-mae]
  published: 2020
  subseries: null
  canonTier: extended
  synopsis: >
    A self-portrait built from roughly fifteen years of fragmentary notes on
    his own childhood and adolescence - brief, open-hearted accounts of the
    places and people that shaped him.
  note: >
    Tiered extended (autobiographical prose, not a novel) even though it won
    the Associação Portuguesa de Escritores' Grande Prémio de Romance e
    Novela 2020 (see the author entity's lifeEvents) - a "novel and novella"
    prize, which is a genuine tension: the prize committee judged it
    alongside fiction, but the publisher's own "eighth novel" count for
    [[work:valter-hugo-mae/as-doencas-do-brasil|As Doenças do Brasil]] (2021)
    excludes it. Kept extended because the press consistently
    frames the book itself, independent of the prize, as autoficção or
    autobiography rather than a novel - "o livro mais pessoal" built from
    fifteen years of notes, RTP describing it as him "reunindo memórias" -
    and the publisher's own novel count treats it as outside the fiction
    line. A prize category spanning "romance e novela" is evidence about
    the prize's scope, not the book's own genre. Separately, on the
    synopsis: the Portuguese publisher's copy (Porto Editora) stays general -
    childhood, adolescence, a boy becoming a writer - while the copy
    circulating in the Brazilian market itemises the book's specific
    disclosures, among them the early death of an elder brother the author
    never met. The synopsis here follows the Portuguese copy's altitude on
    purpose. That brother is the one thing in this book that functions as a
    revelation to a first reader, so it does not belong in a synopsis, and
    the fuller Brazilian blurb should not be pulled in wholesale.
  sources:
    - https://deusmelivro.com/mil-folhas/contra-mim-valter-hugo-mae-23-8-2021/
    - https://www.publico.pt/2021/06/18/culturaipsilon/noticia/valter-hugo-mae-vence-premio-romance-novela-ape-1967097
    - https://www.rtp.pt/noticias/cultura/valter-hugo-mae-reune-memorias-de-um-tempo-feliz-no-seu-novo-livro-contra-mim_n1271172

- id: valter-hugo-mae/educacao-da-tristeza
  title: "Educação da Tristeza"
  authorIds: [valter-hugo-mae]
  published: 2025
  subseries: null
  canonTier: extended
  synopsis: >
    Twenty-seven short, illustrated texts written after two losses - a young
    nephew, the same child who inspired
    [[work:valter-hugo-mae/o-filho-de-mil-homens|O Filho de Mil Homens]], and
    a friend of thirty years, a visual artist. Treats grief not as an illness
    to cure but as a grammar to learn: an "educated sadness" that does not
    vanish but makes room for the joy of remembering.
  note: >
    Same autobiographical-prose genre as Contra Mim; tiered extended. The two
    people mourned are named in the book's dedication and by Mãe himself in
    interviews, but are described here only by their relation to him, as Porto
    Editora's own copy does: both deaths are recent and the family is living.
  sources:
    - https://www.resenhando.com/2025/07/valter-hugo-mae-lanca-educacao-da.html
    - https://quatrocincoum.com.br/trechos/trechos/o-diario-do-luto-de-valter-hugo-mae/

