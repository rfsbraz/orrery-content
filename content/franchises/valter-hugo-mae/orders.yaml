# ADDITIONAL canon orders only. The DEFAULT order - all 37 works, publication-
# chronological - is derived from works.yaml and is NOT listed here.
#
# Mãe periodises his own ten novels into two four-book tetralogies and names
# both himself, directly quoted from Observador (14 January 2024): "os meus
# livros têm-se organizado em tetralogias. Houve a primeira, A Idade
# Inteira, e esta agora chama-se Irmãos, Ilhas e Ausências." That is a real,
# sourced grouping - the two orders below exist to name and bound each one.
# Neither reshuffles anything: both restate the four books' own publication
# order, because nothing else is sourced. No publisher numbering and no
# author statement telling a reader to
# read either tetralogy in a particular sequence was found - the sequence
# used here is the obvious one, publication order, which is exactly what
# `type: curated` is for when the grouping itself is what needed a source.
#
# No order was built for anything else on this shelf. The fifteen poetry
# collections (1996-2018) run alongside the novels rather than in a sequence
# anyone periodises; a "poetry in order" order would have no same-year ties
# to resolve and no grouping to cite, so it would only restate the derived
# default under a different name. O Filho de Mil Homens (2011) and Contra Mim
# (2020) sit on their own axis, nine years apart, named as a pairing by
# criticism (Revista Pernambuco) but never as a sequence to read - two books
# is a startHere pick's shape, not an order's, and no source recommends
# reading them together at all. A single order spanning both tetralogies
# back to back was considered and rejected: Mãe names two cycles, not one,
# and O Filho de Mil Homens sits chronologically between them on its own
# axis, so joining them would either silently skip a book the derived order
# does not skip or misrepresent the author's own two-cycle scheme.

- id: valter-hugo-mae/tetralogia-das-minusculas
  name: A Idade Inteira
  type: curated
  source: canon
  rationale: >
    The four novels that made Mãe's name, published entirely without capital
    letters: [[work:valter-hugo-mae/o-nosso-reino|o nosso reino]] (2004),
    [[work:valter-hugo-mae/o-remorso-de-baltazar-serapiao|o remorso de
    baltazar serapião]] (2006, Prémio José Saramago),
    [[work:valter-hugo-mae/o-apocalipse-dos-trabalhadores|o apocalipse dos
    trabalhadores]] (2008) and
    [[work:valter-hugo-mae/a-maquina-de-fazer-espanhois|a máquina de fazer
    espanhóis]] (2010, Grande Prémio Portugal Telecom). Mãe calls the run "A
    Idade Inteira" himself; criticism and reference works call the identical
    four books "a tetralogia das minúsculas" for the lowercase typography.
    For a reader who wants this run as its own closed arc - a fishing
    village under the Estado Novo, a medieval marriage curdling into
    witchcraft, two mourners in Bragança, a nursing home at the end of a
    life - without the nine poetry collections and the small-press years
    that interleave with it when the shelf is read strictly by year. The
    sequence matches publication order exactly; what this order adds is the
    boundary and the name, both the author's own, not a reshuffle. The cost
    is what it leaves out: by 2004 Mãe already has nine books of verse in
    print, and this order drops every one of them, so the "poet turned
    novelist" story it tells is true only for the four books inside it.
  orderedWorkIds:
    - valter-hugo-mae/o-nosso-reino
    - valter-hugo-mae/o-remorso-de-baltazar-serapiao
    - valter-hugo-mae/o-apocalipse-dos-trabalhadores
    - valter-hugo-mae/a-maquina-de-fazer-espanhois
  debated:
    - "Two received names for one grouping: \"A Idade Inteira\" is the author's own (Observador, 14 January 2024, direct quote); \"a tetralogia das minúsculas\" is the older and more widely used critical and reference-work name for the identical four books (Porto Editora's Infopédia, an academic paper at the Federal University of Ceará). Both are current; the name used here is the author's."
  sources:
    - "https://observador.pt/especiais/valter-hugo-mae-se-nao-puder-fazer-mais-nada-fiz-o-que-me-competia/"
    - "https://pernambucorevista.com.br/secoes/capa/a-relacao-sem-limites-de-dois-irmaos-no-novo-livro-de-valter-hugo-mae"
    - "https://www.infopedia.pt/artigos/$valter-hugo-mae"

- id: valter-hugo-mae/irmaos-ilhas-e-ausencias
  name: Irmãos, Ilhas e Ausências
  type: curated
  source: canon
  rationale: >
    The second tetralogy, named by Mãe in the author's note closing its own
    final volume and again in interview: "os meus livros têm-se organizado
    em tetralogias... esta agora chama-se Irmãos, Ilhas e Ausências... quatro
    romances passados em ilhas distintas."
    [[work:valter-hugo-mae/a-desumanizacao|A Desumanização]] (2013, Iceland),
    [[work:valter-hugo-mae/homens-imprudentemente-poeticos|Homens
    Imprudentemente Poéticos]] (Japan),
    [[work:valter-hugo-mae/as-doencas-do-brasil|As Doenças do Brasil]] (2021,
    among the Abaeté under Portuguese colonial settlement) and
    [[work:valter-hugo-mae/deus-na-escuridao|Deus na Escuridão]] (2024,
    Madeira) - four islands, four kinds of solitude that company does not
    cure. For a reader who has already met Mãe and wants his most recent
    decade of fiction read as one closed run rather than scattered across
    eleven years of poetry, children's books and the autobiographical Contra
    Mim. Like its predecessor, this order restates the four books' own
    publication order; its contribution is the boundary Mãe drew himself,
    stated in his own words the week the closing volume published. The cost
    is the same shape again: eleven other works fall inside these same
    eleven years and none of them is here, including
    [[work:valter-hugo-mae/o-filho-de-mil-homens|O Filho de Mil Homens]]
    (2011), which precedes the cycle and which Mãe places on a separate axis
    of his own rather than folding into either tetralogy.
  orderedWorkIds:
    - valter-hugo-mae/a-desumanizacao
    - valter-hugo-mae/homens-imprudentemente-poeticos
    - valter-hugo-mae/as-doencas-do-brasil
    - valter-hugo-mae/deus-na-escuridao
  debated:
    - "Mãe assembled this cycle in retrospect, not by plan: \"eu não falei disso inicialmente. A primeira vez que falei que estava a completar um ciclo foi quando publiquei a terceira ilha\" - so the first two volumes were not written or read as parts of a named tetralogy at the time."
    - "Homens Imprudentemente Poéticos carries no year in its own eras.yaml entry because sources disagree (2016 in the bibliography used here, 2015 in Revista Pernambuco and Observador); either date leaves it second in this order, between A Desumanização (2013) and As Doenças do Brasil (2021), so the disagreement does not affect the sequence."
  sources:
    - "https://observador.pt/especiais/valter-hugo-mae-se-nao-puder-fazer-mais-nada-fiz-o-que-me-competia/"
    - "https://pernambucorevista.com.br/secoes/capa/a-relacao-sem-limites-de-dois-irmaos-no-novo-livro-de-valter-hugo-mae"
    - "https://rr.pt/noticia/vida/2024/01/12/valter-hugo-mae-o-amor-de-uma-mae-podera-ser-apenas-comparavel-ao-tamanho-do-amor-de-deus/362455/"
