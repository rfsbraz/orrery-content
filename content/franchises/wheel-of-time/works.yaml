# Bibliography (Works) - the abstract books; editions/covers are separate metadata.
# IDs are STABLE and permanent (user data references them). Dates are year-precision.
# One continuous main sequence (14 novels) + the prequel New Spring + two reference
# companions (extended). The three concluding volumes are credited to Robert Jordan
# (primary, from his notes) with Brandon Sanderson as collaborator via withAuthorIds.
# subseries is null throughout: this is a single sequence, so no sub-thread grouping.

- id: wheel-of-time/the-eye-of-the-world
  title: "The Eye of the World"
  authorIds: [robert-jordan]
  published: 1990
  subseries: null
  canonTier: core
  synopsis: "Three young villagers flee their home the night it is attacked, and are drawn onto the board of a prophesied war between the Light and the Dark."
  sources: [https://en.wikipedia.org/wiki/The_Eye_of_the_World]

