  sources: [https://en.wikipedia.org/wiki/The_World_of_Robert_Jordan%27s_The_Wheel_of_Time]

- id: wheel-of-time/the-wheel-of-time-companion
  title: "The Wheel of Time Companion"
  authorIds: [robert-jordan]
