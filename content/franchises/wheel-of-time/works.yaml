# Bibliography (Works) - the abstract books; editions/covers are separate metadata.
# IDs are STABLE and permanent (user data references them). Dates are year-precision.
# Robert Jordan's complete published bibliography: the early career under other pen
# names (the Fallon historicals as Reagan O'Neal, the western Cheyenne Raiders as
# Jackson O'Reilly), the seven-novel Conan run, the posthumously published debut
# Warrior of the Altaii, and The Wheel of Time - fourteen main volumes, the prequel
# New Spring, two reference companions (extended) and one web-published in-world
# piece (apocrypha). The three concluding volumes are credited to Robert Jordan
# (primary, from his notes) with Brandon Sanderson as collaborator via withAuthorIds.
# Wheel of Time entries keep subseries: null - one continuous sequence, the wing's
# main spine - while the early-career threads carry subseries Conan and The Fallon
# Saga. All years verified against ISFDB, the Wikipedia bibliography, and the
# archived Encyclopaedia WoT non-WoT bibliography, which agree on every one.

# --- Early career (1980-1984): pen-name historicals, a western, and the Conan run ---

- id: wheel-of-time/the-fallon-blood
  title: "The Fallon Blood"
  authorIds: [robert-jordan]
  published: 1980
  subseries: "The Fallon Saga"
  canonTier: core
  publishedAs: "Reagan O'Neal"
  synopsis: "Fleeing Ireland after killing an English officer, Michael Fallon lands in colonial Charleston as an indentured servant and rises through the American Revolution to found a dynasty."
  note: >
    The record styles the series several ways: "Fallon" (ISFDB), "the Fallon
    saga" (Wikipedia), "the Fallon Series" (Encyclopaedia WoT), "Michael Fallon
    trilogy" (the novel's own infobox). The subseries label here follows the
    Wikipedia usage; no source styles it "The Fallon Chronicles". Wikipedia's
    bibliography page says all three Fallon novels were first published by
    Popham Press, Harriet McDougal's personal imprint, while the novel's own
    article records Ace Books, 1 February 1980 - a first-edition publisher
    discrepancy the sources do not settle. The year 1980 is uncontested.
  sources:
    - "https://en.wikipedia.org/wiki/The_Fallon_Blood"
    - "https://en.wikipedia.org/wiki/Robert_Jordan_bibliography"

- id: wheel-of-time/the-fallon-pride
  title: "The Fallon Pride"
  authorIds: [robert-jordan]
  published: 1981
  subseries: "The Fallon Saga"
  canonTier: core
  publishedAs: "Reagan O'Neal"
  synopsis: "The saga's second generation: Robert Fallon survives Barbary pirates and the siege of Tripoli at sea, then builds a shipping life in Charleston as the young republic drifts toward its second war with Britain."
  sources:
    - "https://en.wikipedia.org/wiki/The_Fallon_Blood"
    - "https://en.wikipedia.org/wiki/Robert_Jordan_bibliography"

- id: wheel-of-time/the-fallon-legacy
  title: "The Fallon Legacy"
  authorIds: [robert-jordan]
  published: 1982
  subseries: "The Fallon Saga"
  canonTier: core
  publishedAs: "Reagan O'Neal"
  synopsis: "The last scion of the Fallon line strikes south and west through New Orleans and Missouri into Mexican Texas, where enemies made by two generations of Fallons converge on him."
  note: >
    The end of the sequence as published: Jordan planned the saga to run on
    toward the Civil War and Vietnam but abandoned it after three books
    despite fair sales (per the Wikipedia bibliography, citing his interview
    record).
  sources:
    - "https://en.wikipedia.org/wiki/The_Fallon_Blood"
    - "https://en.wikipedia.org/wiki/Robert_Jordan_bibliography"

- id: wheel-of-time/cheyenne-raiders
  title: "Cheyenne Raiders"
  authorIds: [robert-jordan]
  published: 1982
  subseries: null
  canonTier: core
  publishedAs: "Jackson O'Reilly"
  synopsis: "In 1837 the Bureau of Indian Affairs sends a young easterner to live among the Cheyenne; adopted into the tribe after saving a warrior's life, he must earn his place there, and the woman he loves, the Cheyenne way."
  note: >
    First published May 1982 in paperback; Forge reissued it in hardcover in
    2000 as "Robert Jordan writing as Jackson O'Reilly". Per Jordan's
    interview record (via the Wikipedia bibliography) it is the only book of
    his not edited by Harriet McDougal.
  sources:
    - "https://en.wikipedia.org/wiki/Robert_Jordan_bibliography"
    - "https://www.publishersweekly.com/978-0-312-86486-6"

- id: wheel-of-time/conan-the-invincible
  title: "Conan the Invincible"
  authorIds: [robert-jordan]
  published: 1982
  subseries: "Conan"
  canonTier: core
  synopsis: "Jordan's first Conan pastiche: hired to steal pendants from the King of Zamora, the young thief is drawn into a pursuit that ends at a necromancer's lair in the Kezankian Mountains."
  note: >
    The first of seven licensed Conan novels Jordan wrote for Tor in
    1982-1984, continuing Robert E. Howard's character. They are full novels
    authored solely by him, tiered core like the rest of his fiction; the
    licensed-universe context lives in this note, not in the tier.
  sources:
    - "https://en.wikipedia.org/wiki/Conan_the_Invincible"
    - "https://web.archive.org/web/20090110090245/http://encyclopaedia-wot.org:8008/main/biblio/nonwotbib.html"

- id: wheel-of-time/conan-the-defender
  title: "Conan the Defender"
  authorIds: [robert-jordan]
  published: 1982
  subseries: "Conan"
  canonTier: core
  synopsis: "A sorcerer and a cabal of nobles plot to usurp Nemedia's Dragon Throne; Conan, newly arrived in the capital with his sword for hire, ends up standing between them and the king."
  sources:
    - "https://en.wikipedia.org/wiki/Conan_the_Defender"
    - "https://web.archive.org/web/20090110090245/http://encyclopaedia-wot.org:8008/main/biblio/nonwotbib.html"

- id: wheel-of-time/conan-the-unconquered
  title: "Conan the Unconquered"
  authorIds: [robert-jordan]
  published: 1983
  subseries: "Conan"
  canonTier: core
  synopsis: "The sorcerer Jhandar and his death-cult are raising an army of undead slaves, and Conan must face killers who slay with a touch to reach the source of his power."
  sources:
    - "https://en.wikipedia.org/wiki/Conan_the_Unconquered"
    - "https://web.archive.org/web/20090110090245/http://encyclopaedia-wot.org:8008/main/biblio/nonwotbib.html"

- id: wheel-of-time/conan-the-triumphant
  title: "Conan the Triumphant"
  authorIds: [robert-jordan]
  published: 1983
  subseries: "Conan"
  canonTier: core
  synopsis: "Leading his mercenaries into Ophir after the king's death, Conan lands amid a succession struggle steered by a countess who is secretly high priestess of an imprisoned demon god."
  sources:
    - "https://en.wikipedia.org/wiki/Conan_the_Triumphant"
    - "https://web.archive.org/web/20090110090245/http://encyclopaedia-wot.org:8008/main/biblio/nonwotbib.html"

- id: wheel-of-time/conan-the-magnificent
  title: "Conan the Magnificent"
  authorIds: [robert-jordan]
  published: 1984
  subseries: "Conan"
  canonTier: core
  synopsis: "A grudge-chase after a rival thief carries Conan out of Shadizar and into the Kezankian Mountains, where a fanatic priest hunts the gems that command a dragon."
  sources:
    - "https://en.wikipedia.org/wiki/Conan_the_Magnificent"
    - "https://web.archive.org/web/20090110090245/http://encyclopaedia-wot.org:8008/main/biblio/nonwotbib.html"

- id: wheel-of-time/conan-the-destroyer
  title: "Conan the Destroyer"
  authorIds: [robert-jordan]
  published: 1984
  subseries: "Conan"
  canonTier: core
  synopsis: "Promised his lost love restored to life, Conan escorts a princess on a quest for a gem and a horn that can wake a sleeping god. A novelization of the 1984 film."
  note: >
    The only adaptation in Jordan's catalogue: a novelization of the second
    Conan film, written from the screenplay. Some bibliographies also list a
    phantom "Conan: King of Thieves" - that was the film's working title, and
    Tor filed an ISBN before the retitle, so the ISBN exists but the book
    never did (per the archived Encyclopaedia WoT bibliography). Do not add
    it.
  sources:
    - "https://en.wikipedia.org/wiki/Conan_the_Destroyer_(novel)"
    - "https://web.archive.org/web/20090110090245/http://encyclopaedia-wot.org:8008/main/biblio/nonwotbib.html"

- id: wheel-of-time/conan-the-victorious
  title: "Conan the Victorious"
  authorIds: [robert-jordan]
  published: 1984
  subseries: "Conan"
  canonTier: core
  synopsis: "Framed for an assassination in Turan, Conan follows a smugglers' road into Vendhya, where a court wizard is bargaining with demons for a throne. The last Conan novel Jordan wrote."
  note: >
    First published in trade paperback in November 1984; the mass-market
    edition followed in 1985, which is why some catalogues carry the later
    year. Dated by the 1984 first edition (ISFDB, Wikipedia, and the archived
    Encyclopaedia WoT bibliography agree).
  sources:
    - "https://en.wikipedia.org/wiki/Conan_the_Victorious"
    - "https://web.archive.org/web/20090110090245/http://encyclopaedia-wot.org:8008/main/biblio/nonwotbib.html"

