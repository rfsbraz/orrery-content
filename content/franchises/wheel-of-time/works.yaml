  synopsis: "The exhaustive A-to-Z encyclopaedia of the completed series, compiled by Harriet McDougal, Alan Romanczuk, and Maria Simons from Jordan's files. Reference, not narrative."
  sources: [https://en.wikipedia.org/wiki/The_Wheel_of_Time_Companion]

- id: wheel-of-time/the-strike-at-shayol-ghul
  title: "The Strike at Shayol Ghul"
  authorIds: [robert-jordan]
  published: 1996
  subseries: null
  canonTier: apocrypha
  synopsis: "A short in-world historical document on the sealing of the Dark One's prison at the end of the Age of Legends, three thousand years before the series begins. Jordan's only standalone short piece under his own byline."
  note: >
    Dated 1996, when Jordan published it on the internet (originally hosted
    on Tor's site, now mirrored at Dragonmount with permission); a version
    was folded into
    [[work:wheel-of-time/the-world-of-robert-jordans-the-wheel-of-time|The World of Robert Jordan's The Wheel of Time]]
    in 1997. The 1998 New Spring novella, his other short fiction, has no
    entry of its own because the 2004 novel supersedes it (see the New Spring
    note).
  sources:
    - "https://en.wikipedia.org/wiki/Robert_Jordan_bibliography"
    - "https://dragonmount.com/Books/Strike_at_Shayol_Ghul/index/"

# --- Posthumous (the trunk debut) ---

- id: wheel-of-time/warrior-of-the-altaii
  title: "Warrior of the Altaii"
  authorIds: [robert-jordan]
  published: 2019
  subseries: null
  canonTier: core
  synopsis: "The watering holes of the Plain are drying up and omens abound: Wulfgar, a leader of the nomadic Altaii, must contend with twin queens, warlords, prophets, and magic to secure his people's future - helped by a visitor from another world."
  note: >
    Dated 2019, its first publication anywhere (Tor, 8 October 2019). Written
    in the late 1970s before The Eye of the World: DAW offered a contract,
    withdrew it when Jordan asked for changes, and the manuscript stayed
    unpublished for the rest of his life until his estate released it. His
    first-written novel and the last published.
  sources:
    - "https://en.wikipedia.org/wiki/Robert_Jordan_bibliography"
    - "https://dragonmount.com/news/book-news/warrior-of-the-altaii/"
