- id: wheel-of-time/new-spring
  title: "New Spring"
  authorIds: [robert-jordan]
  published: 2004
  subseries: null
  canonTier: core
  synopsis: "A prequel set some twenty years before the main sequence: two young women earn the shawl amid a war's end and a birth that will remake the world. Expanded from a 1998 novella in the anthology Legends."
  note: >
    Verified 2004 and deliberately kept there. This entry is the novel (Tor,
    6 January 2004), not the 78-page novella of the same name that appeared in
    Robert Silverberg's anthology Legends on 25 August 1998. The novel roughly
    quadruples the novella, adding thirteen chapters and an epilogue, so the two
    are different works rather than two editions of one, and the reading order
    should place the full novel. Do not "correct" this to 1998; if the novella
    is ever wanted as a distinct entry it needs its own id.
  sources: [https://en.wikipedia.org/wiki/New_Spring]

