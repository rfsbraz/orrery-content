# ADDITIONAL canon orders only. The DEFAULT order - all published works in
# publication-chronological order - is derived automatically from works.yaml and
# is NOT listed here. The Wheel of Time's one genuine ordering debate is WHERE the
# prequel New Spring goes, so both orders below are answers to that question. They
# cover the reading sequence (14 main novels + New Spring); the two reference
# companions are not part of a narrative reading order.

- id: wheel-of-time/chronological
  name: Chronological (in-world) order
  type: chronological-inuniverse
  source: canon
  rationale: >
    Read strictly by in-world timeline: [[work:wheel-of-time/new-spring|New Spring]],
    set roughly twenty years earlier, comes first, then the fourteen main volumes
    in sequence. Chosen by completionists and re-readers who want a linear
    timeline and do not mind losing a few first-read surprises.
  orderedWorkIds:
    - wheel-of-time/new-spring
    - wheel-of-time/the-eye-of-the-world
    - wheel-of-time/the-great-hunt
    - wheel-of-time/the-dragon-reborn
    - wheel-of-time/the-shadow-rising
    - wheel-of-time/the-fires-of-heaven
    - wheel-of-time/lord-of-chaos
    - wheel-of-time/a-crown-of-swords
    - wheel-of-time/the-path-of-daggers
    - wheel-of-time/winters-heart
    - wheel-of-time/crossroads-of-twilight
    - wheel-of-time/knife-of-dreams
    - wheel-of-time/the-gathering-storm
    - wheel-of-time/towers-of-midnight
    - wheel-of-time/a-memory-of-light
  debated:
    - "Reading New Spring first is widely discouraged for newcomers: it spoils character reveals in the first two main books. Most guides reserve chronological order for re-reads."
  sources:
    - https://theshiningwalls.com/when-to-read-new-spring/
    - https://dragonmount.com/forums/topic/63511-when-to-read-new-spring-prequel/

- id: wheel-of-time/recommended-integrated
  name: Publication order with New Spring integrated
  type: curated
  source: canon
  rationale: >
    The common newcomer recommendation: read the main sequence in publication
    order but slot [[work:wheel-of-time/new-spring|New Spring]] in partway
    through, most often after [[work:wheel-of-time/the-fires-of-heaven|The Fires of Heaven]]
    (book five), by which point you know the characters the prequel reframes and
    are past the reveals it would spoil.
  orderedWorkIds:
    - wheel-of-time/the-eye-of-the-world
    - wheel-of-time/the-great-hunt
    - wheel-of-time/the-dragon-reborn
    - wheel-of-time/the-shadow-rising
    - wheel-of-time/the-fires-of-heaven
    - wheel-of-time/new-spring
    - wheel-of-time/lord-of-chaos
    - wheel-of-time/a-crown-of-swords
    - wheel-of-time/the-path-of-daggers
    - wheel-of-time/winters-heart
    - wheel-of-time/crossroads-of-twilight
    - wheel-of-time/knife-of-dreams
    - wheel-of-time/the-gathering-storm
    - wheel-of-time/towers-of-midnight
    - wheel-of-time/a-memory-of-light
  debated:
    - "The exact insertion point is contested. Common placements are after book 5 (The Fires of Heaven) or after book 10 (Crossroads of Twilight, near its 2004 publication slot); some guides suggest as early as after book 2."
    - "Purists read New Spring at its publication position (the derived default order places it after Crossroads of Twilight); this integrated order exists because many readers find that slot too late to matter."
  sources:
    - https://theshiningwalls.com/when-to-read-new-spring/
    - https://www.tlbranson.com/wheel-of-time-reading-order/
