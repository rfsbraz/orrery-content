# Portuguese (pt-PT) editions - Bertrand Editora, collection "A Roda do Tempo".
#
# COVERAGE IS PARTIAL BY FACT, NOT BY OMISSION. Bertrand acquired the rights to
# the first six volumes only. The current run ran from March 2019 (vol. 1) to
# March 2023 (vol. 6) and has not continued: volumes 7-14, the prequel New
# Spring, and both companion volumes have never been published in Portugal.
# Those works therefore have no pt-PT edition and must keep their English title.
#
# An earlier Bertrand run (2007-2008) covered volumes 1-4 under the same titles
# and is out of print; the modern run is listed here instead.
#
# Not to be confused with the Brazilian (pt-BR) translation by Intrínseca, which
# runs further but uses different titles, translators and ISBNs.
#
# No translator is credited on either the retailer or the publisher listings, so
# the translator field is omitted rather than guessed.

