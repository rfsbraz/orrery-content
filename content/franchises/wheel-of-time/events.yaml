# FRANCHISE-SPECIFIC events only. Author-LIFE events (the amyloidosis diagnosis,
# Jordan's death) live on the author entity (content/authors/robert-jordan.yaml),
# since they follow the person. This file holds the franchise-SIDE of the
# transition - the decisions made about the series itself - plus the adaptation.
# Inline references use [[type:id|text]] and must resolve.

- id: wot-sanderson-chosen-2007
  date: 2007-12
  title: Harriet McDougal chooses Brandon Sanderson to finish the series
  scope: industry
  reach: franchise
  impact: high
  description: >
    Months after Jordan's death, his widow and editor Harriet McDougal selects
    [[author:brandon-sanderson|Brandon Sanderson]] - then a relatively new
    novelist - to complete the sequence from Jordan's notes. She reportedly read
    the ending of his Mistborn trilogy and knew. The choice defines everything
    that follows and is the franchise's central act of stewardship.
  spoilerAfter: null
  sources:
    - https://en.wikipedia.org/wiki/A_Memory_of_Light
    - https://dragonmount.com/

- id: wot-split-into-three-2009
  date: 2009
  title: The final volume is split into three
  scope: industry
  reach: franchise
  impact: med
  description: >
    Jordan had promised one concluding book, "A Memory of Light". The material
    proved far too large, and publisher Tor and Sanderson split it into three
    volumes released 2009-2013 - the title kept for the last. A practical
    decision that reshaped how the ending was read and paced.
  spoilerAfter: null
  sources: [https://en.wikipedia.org/wiki/A_Memory_of_Light]

- id: wot-amazon-adaptation-2021
  date: 2021-11-19
  title: Amazon's The Wheel of Time premieres
  scope: culture
  reach: franchise
  impact: med
  description: >
    Amazon Prime Video launches a high-budget television adaptation, bringing the
    series to a mass audience decades after the first book and driving a wave of
    new readers to the novels.
  spoilerAfter: null
  sources: [https://en.wikipedia.org/wiki/The_Wheel_of_Time_(TV_series)]
