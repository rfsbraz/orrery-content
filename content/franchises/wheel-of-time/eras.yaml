# Creative periods - the narrative spine of the aura. For a single sequence the
# eras track the writing of the series and, above all, the author transition that
# defines it. Inline references use [[type:id|text]] and must resolve.

- id: the-turning-of-the-wheel
  title: The Turning of the Wheel
  period: "1990-1994"
  themes: [prophecy and rebirth, the world at full scale, gender and the One Power, coming of age]
  provenance: none
  description: >
    The foundational surge. [[work:wheel-of-time/the-eye-of-the-world|The Eye of the World]]
    through [[work:wheel-of-time/lord-of-chaos|Lord of Chaos]] arrive almost yearly,
    building the deepest secondary world in modern fantasy and its central engine:
    a saviour who must save the world and go mad doing it. The series is a
    phenomenon and the pace is relentless.
  note: >
    UNSOURCED as a period. "The Turning of the Wheel" is our coinage, a pun on
    the series title; no source periodises the early books this way, though the
    label is descriptive rather than evaluative. The 1990 start is exact (The
    Eye of the World). The 1994 end is ours and is contested: Black Gate's
    Jordan retrospective locates the first signs of bloat earlier, in The Fires
    of Heaven (1993), and says they "bloomed to full flower" in Lord of Chaos,
    which this era currently contains.
  sources:
    - https://www.blackgate.com/the-death-and-legacy-of-robert-jordan-james-oliver-rigney-jr-1948-2007/

- id: the-long-middle
  title: The Slog
  period: "1996-2003"
  themes: [sprawl and patience, the widening cast, the prequel, mortality]
  provenance: fandom
  description: >
    The stretch readers came to call the slog: books grow denser and slower from
    [[work:wheel-of-time/a-crown-of-swords|A Crown of Swords]] through
    [[work:wheel-of-time/crossroads-of-twilight|Crossroads of Twilight]], with
    the prequel [[work:wheel-of-time/new-spring|New Spring]] arriving in the
    middle of it. It is the name fans give the run they most often stop at, and
    the one they credit [[work:wheel-of-time/knife-of-dreams|Knife of Dreams]]
    (2005) with pulling the series out of.
  note: >
    RECEIVED, and retitled to the received term. "The Long Middle" was our
    coinage; "the slog" is settled fandom consensus, used by independent sources
    as common knowledge rather than introduced as a proposal. It has no origin
    document, so three separate uses are cited rather than one. The term is
    evaluative, which is permitted here only because it is genuinely received -
    hence the description attributes it to readers rather than asserting it.
    The end date was corrected from 2005 to 2003: consensus puts the slog at
    books 7-10, ending at Crossroads of Twilight, with Knife of Dreams as the
    recovery from it, so the old span swallowed the escape book. The start is
    the fuzzy end - sources note some readers include Lord of Chaos (book 6) and
    others hold that the slowdown only really lands mid-Path of Daggers. That
    leaves 2004-2005 uncovered, which is a legitimate gap rather than a defect.
  sources:
    - https://www.thegreatblight.com/post/let-s-talk-about-the-slog-is-it-real
    - https://winteriscoming.net/the-wheel-of-time-the-slog-is-real-but-don-t-let-it-stop-you
    - https://booknookcook.com/wheel-of-time-slog/

- id: the-succession
  title: The Succession
  period: "2006-2008"
  themes: [loss, stewardship, the notes, choosing an heir]
  provenance: publishing
  description: >
    The pivot the whole franchise turns on. Robert Jordan dies in 2007 with the
    ending planned but unwritten. His widow and editor Harriet McDougal, holding
    his notes and dictated scenes, chooses a younger writer to finish the series -
    a decision with no real precedent at this scale in the genre. Tor announced
    the choice on 7 December 2007.
  note: >
    The label is ours, but it is descriptive and every fact under it is hard and
    dated: Jordan announced his cardiac amyloidosis on 23 March 2006, died on 16
    September 2007, and Tor named Sanderson on 7 December 2007. The 2008 end is
    ours; the natural hard boundary would be The Gathering Storm in October
    2009, which is where the next era begins.
  sources:
    - https://en.wikipedia.org/wiki/Robert_Jordan
    - https://www.blackgate.com/the-death-and-legacy-of-robert-jordan-james-oliver-rigney-jr-1948-2007/

- id: the-completion
  title: The Completion
  period: "2009-2013"
  themes: [another hand, fidelity to the notes, the Last Battle, ending]
  provenance: publishing
  description: >
    [[author:brandon-sanderson|Brandon Sanderson]] finishes the sequence from
    Jordan's material, the planned final volume split into three -
    [[work:wheel-of-time/the-gathering-storm|The Gathering Storm]],
    [[work:wheel-of-time/towers-of-midnight|Towers of Midnight]], and
    [[work:wheel-of-time/a-memory-of-light|A Memory of Light]]. Readers spend
    three books feeling two authors at once: the plan is Jordan's, the sentences
    are Sanderson's.
  note: >
    The label is ours but states a fact about the record rather than judging the
    books, and both boundaries are exact publication dates (The Gathering Storm,
    October 2009; A Memory of Light, January 2013) rather than rounded years -
    the only era in this wing of which that is true.
  sources:
    - https://en.wikipedia.org/wiki/Brandon_Sanderson_bibliography
