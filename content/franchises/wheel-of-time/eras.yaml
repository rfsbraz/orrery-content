# Creative periods - the narrative spine of the aura. For a single sequence the
# eras track the writing of the series and, above all, the author transition that
# defines it. Inline references use [[type:id|text]] and must resolve.

- id: the-turning-of-the-wheel
  title: The Turning of the Wheel
  period: "1990-1994"
  themes: [prophecy and rebirth, the world at full scale, gender and the One Power, coming of age]
  description: >
    The foundational surge. [[work:wheel-of-time/the-eye-of-the-world|The Eye of the World]]
    through [[work:wheel-of-time/lord-of-chaos|Lord of Chaos]] arrive almost yearly,
    building the deepest secondary world in modern fantasy and its central engine:
    a saviour who must save the world and go mad doing it. The series is a
    phenomenon and the pace is relentless.

- id: the-long-middle
  title: The Long Middle
  period: "1996-2005"
  themes: [sprawl and patience, the widening cast, the prequel, mortality]
  description: >
    The books grow denser and slower - [[work:wheel-of-time/a-crown-of-swords|A Crown of Swords]]
    through [[work:wheel-of-time/crossroads-of-twilight|Crossroads of Twilight]],
    plus the prequel [[work:wheel-of-time/new-spring|New Spring]] - in the stretch
    fans came to call the slog. It ends under a shadow: Jordan's 2006 amyloidosis
    announcement, and [[work:wheel-of-time/knife-of-dreams|Knife of Dreams]] (2005)
    snapping the story back to momentum as he raced the clock.

- id: the-succession
  title: The Succession
  period: "2006-2008"
  themes: [loss, stewardship, the notes, choosing an heir]
  description: >
    The pivot the whole franchise turns on. Robert Jordan dies in 2007 with the
    ending planned but unwritten. His widow and editor Harriet McDougal, holding
    his notes and dictated scenes, chooses a younger writer to finish the series -
    a decision with no real precedent at this scale in the genre.

- id: the-completion
  title: The Completion
  period: "2009-2013"
  themes: [another hand, fidelity to the notes, the Last Battle, ending]
  description: >
    [[author:brandon-sanderson|Brandon Sanderson]] finishes the sequence from
    Jordan's material, the planned final volume split into three -
    [[work:wheel-of-time/the-gathering-storm|The Gathering Storm]],
    [[work:wheel-of-time/towers-of-midnight|Towers of Midnight]], and
    [[work:wheel-of-time/a-memory-of-light|A Memory of Light]]. Readers spend
    three books feeling two authors at once: the plan is Jordan's, the sentences
    are Sanderson's.
