id: wheel-of-time
name: The Wheel of Time
kind: series
description: >
  A fourteen-volume epic fantasy of prophecy, rebirth, and a war against the
  Dark - begun by Robert Jordan and, after his death, completed by
  [[author:brandon-sanderson|Brandon Sanderson]] from the notes he left.
authorIds: [robert-jordan, brandon-sanderson]
themePreset: age-of-legends

# Capabilities (docs/SCHEMA.md). This franchise deliberately runs FEWER layers
# than a multiverse like Stephen King or the Cosmere. It is one continuous
# sequence with a single cast and no crossover tissue, so the connections layer
# earns nothing here - it is forced off rather than left to auto-detect, as a
# signal to curators that the omission is a judgment, not an oversight. The aura
# (the author transition) and the where-to-start wizard (the New Spring debate)
# are where this bundle's value sits.
features:
  connections: off

# "Where to start" - powers the guided onboarding wizard. The Wheel of Time's
# real onboarding question is not "which book" but "where does the prequel go",
# so the paths encode the documented answers to that debate.
startHere:
  paths:
    - id: just-start
      title: Just start at The Eye of the World
      description: >
        The near-universal advice: begin with book one in publication order and
        do not touch the prequel until much later. New Spring spoils reveals in
        the first books, so meeting the characters cold is the intended way in.
      workIds:
        - wheel-of-time/the-eye-of-the-world
      orderId: null
      fit:
        experience: [new]
        commitment: [arc, complete]
      note: >
        This is what the fandom tells every newcomer. If book one lands, the
        whole turning of the Wheel is open to you.
    - id: recommended-integrated
      title: Publication order, New Spring slotted in
      description: >
        Read the main sequence in publication order but drop the prequel in
        partway - the common community recommendation places New Spring after
        The Fires of Heaven (book five), once you know the characters it
        reframes.
      workIds: null
      orderId: wheel-of-time/recommended-integrated
      fit:
        experience: [new, returning]
        commitment: [complete]
    - id: chronological
      title: Chronological, New Spring first
      description: >
        For completionists who insist on in-world order: the prequel first, then
        the fourteen main volumes. You trade several first-read surprises for a
        strictly linear timeline.
      workIds: null
      orderId: wheel-of-time/chronological
      fit:
        experience: [completionist]
        commitment: [complete]
    - id: publication-complete
      title: The whole turning, publication order
      description: >
        Every volume in the order it was published, prequel and companions
        included - you feel the series widen, stall, and then be finished by
        another hand. The aura layer is built for exactly this walk.
      workIds: null
      orderId: default
      fit:
        experience: [returning, completionist]
        commitment: [complete]

sources:
  - https://en.wikipedia.org/wiki/The_Wheel_of_Time
  - https://dragonmount.com/
  - https://theshiningwalls.com/when-to-read-new-spring/
