# Editions of Jo Nesbø across three markets: Norwegian (nb, the original),
# English (en) and Portuguese (pt-PT). This wing needed all three more than any
# other in the catalogue, because Norwegian is neither the language most
# readers buy in (English) nor the language most of this catalogue's readers
# read in (Portuguese) - so unlike Christie or Pratchett, where editions.yaml
# only ever needed to add pt-PT on top of the base-language title, here the
# base language itself (works.yaml's own `title`) is unfamiliar to nearly
# every reader, and BOTH the English and Portuguese layers below are load-
# bearing, not optional polish.
#
# THE WING'S HEADLINE FACT, why an edition's `year` is never the work's own
# `published` year for this author. Aschehoug published the first two Harry
# Hole novels in 1997 and 1998; English publishing did not translate either
# until 2012 (Flaggermusmannen -> The Bat) and 2013 (Kakerlakkene ->
# Cockroaches) - twelve and fifteen years after Rødstrupe (2000) reached
# English as The Redbreast in 2006/2007. English readers met the series at
# book three, not book one, purely by licensing accident (see works.yaml's
# own ORIGINAL TITLES note - no reading order is built on this gap, but the
# edition years below are exactly what make it checkable rather than
# folkloric).
#
# NORWEGIAN (nb) - 34 of 34 works, all Aschehoug. Sourced primarily from
# Aschehoug's own product pages (aschehoug.no), cross-checked against the
# National Library of Norway's legal-deposit catalogue (api.nb.no), which is
# mandatory and therefore strong negative evidence when silent for a print
# edition. That inference does not extend to ebook/audiobook-only SKUs: Politi,
# Hodejegerne, Karusellmusikk, Doktor Proktors prompepulver, Doktor Proktors
# tidsbadekar and Kan Doktor Proktor redde jula are all live, current Aschehoug
# digital SKUs (ISBN, price and format read directly off aschehoug.no) with
# zero nb.no results for their ISBN - deposit silence there is a gap in nb.no's
# digital intake, not evidence against the book. Every other ISBN below was
# independently found in one or both. Aschehoug relaunched the
# first NINE Harry Hole novels
# (Flaggermusmannen through Gjenferd, i.e. every book that had not already had
# its own standalone pocket reissue) in new Pocket editions in a tight window,
# 4-20 March 2026 - timed with the Marekors-based Netflix adaptation (Jo
# Nesbøs Harry Hole, 2026, see works.yaml). Those nine 2026 ISBNs are recorded
# here as the current Norwegian edition; all nine were independently
# cross-confirmed in nb.no's catalogue within days of their Aschehoug listing.
# Three works (Det hvite hotellet, Stemmer fra Balkan, Doktor Proktors
# sensasjonelle samling av dyr du skulle ønske ikke fantes) have no current
# Aschehoug storefront page at all - all three are recorded from nb.no's
# legal-deposit record alone, which is this catalogue's accepted floor for an
# out-of-print book (see docs/CURATION.md "when there is no ISBN" precedent,
# extended here to "when there is no live storefront"). Stemmer fra Balkan's
# ISBN-13 is converted from nb.no's recorded ISBN-10 (8203182127); the
# conversion is shown as a comment on that entry. Karusellmusikk's only
# findable edition is a 2007 downloadable audiobook (read by Mads Ousdal)
# whose own Aschehoug record confusingly carries "Utgitt 2001" (the book's
# original year) alongside "Salgsdato 15.11.2007" (this SKU's actual release);
# the audiobook's own year is recorded as 2007, since that is what the ISBN
# in hand actually is, and the discrepancy is noted on the entry.
#
# ENGLISH (en) - 28 of 34 works. Sourced from OpenLibrary's per-ISBN records
# (isbn13, publisher, format, pagination), cross-checked against English
# Wikipedia's own bibliography table (which gives translation years
# independent of OpenLibrary) and, for two 2024-2025 titles too recent for
# OpenLibrary's search index, WOOK's own English-language stock (WOOK sells
# English imports as a distinct product line from its Portuguese
# translations; both are cited, and neither is confused with the other
# below). Publisher history genuinely shifts partway through the backlist:
# Vintage (Random House UK) carries the paperback line for the earlier Harry
# Hole novels; Harvill Secker is the hardcover imprint of record from Phantom
# (2012) on; Knopf/Vintage Crime is used for two recent US-only titles
# (Blood on Snow, Killing Moon) where a UK ISBN did not independently
# resolve as cleanly. No English edition is recorded for six works, checked
# rather than assumed:
#   - Nådeskudd - not yet released anywhere (2026-08-19 street date).
#   - Det hvite hotellet - the 2007 Redd Barna charity title. English
#     Wikipedia's bibliography parenthetically offers "(English: The White
#     Hotel)" with no year; OpenLibrary returns zero records for that title
#     under this author, and no English-language retailer listing surfaced
#     anywhere searched. Recorded here as unverified and NOT shipped -
#     Wikipedia's aside is not a book until an edition proves it.
#   - Karusellmusikk (2001 story collection) - no translation found.
#   - Stemmer fra Balkan (1999, war reportage with Espen Søbye) - no
#     translation found.
#   - Doktor Proktors sensasjonelle samling av dyr du skulle ønske ikke
#     fantes (2010 bestiary) - absent from English Wikipedia's own
#     bibliography, which otherwise lists every other Doktor Proktor title in
#     translation; no edition found.
#   - Rotteøya og andre fortellinger (2021) - the interesting negative.
#     English Wikipedia's bibliography claims "(English: Rat island and
#     Other Stories, 2021)", but OpenLevel search returns nothing by this
#     author under any "Rat Island" title, and a genuine French translation
#     (Nesbø/Romand-Monnier, Gallimard) turned up instead. Its sibling
#     collection, Sjalusimannen, WAS translated into English the same year
#     (The Jealousy Man). Rotteøya was not, despite what the reference page
#     says - a real, checked gap, not a search failure (see the note on that
#     work's absence below).
# The five numbered Doktor Proktor novels use Simon & Schuster's UK line
# where isolated, Aladdin (Simon & Schuster's US children's imprint)
# otherwise; the American titling diverges book to book (Who Cut the
# Cheese?, The Magical Fruit) from the more literal UK/Norwegian ones, per
# English Wikipedia's bibliography, which is followed here since it is the
# printed cover title, not this file's invention.
#
# PORTUGUESE (pt-PT) - 24 of 34 works: fuller coverage than any prior pass on
# this wing assumed. Dom Quixote (Grupo LeYa) is the constant Portuguese
# publisher for the crime fiction and has been since 2009 (O Pássaro de Peito
# Vermelho, matching the arrival date already established for this
# catalogue's Norwegian-vs-Portuguese chronology); BIS, a
# sister LeYa pocket imprint, carries newer budget reissues of several
# backlist titles. ONE title breaks the Dom Quixote pattern entirely: Macbeth
# was published in Portugal by Bertrand Editora (April 2018) - a different
# LeYa-group publisher, matching how the Hogarth Shakespeare commission was
# licensed market by market rather than following Nesbø's usual house. All
# ISBNs are sourced to WOOK product pages (wook.pt) or, where WOOK's live
# fetch was blocked (a documented WOOK behaviour, see docs/CURATION.md §4),
# its Bertrand.pt mirror carrying the identical ISBN and product id. Every
# ISBN below was read directly off a fetched product page, not taken from a
# search-engine summary - one such summary, for A Casa da Noite, surfaced a
# Brazilian Record-house ISBN (978-85 prefix) alongside the real Dom Quixote
# one; the direct fetch below carries only the verified 978-972 Portuguese
# edition, and the Brazilian number is not repeated here even as a rejected
# note, per the rule against reproducing a pt-BR identifier in a pt-PT file.
# No Portuguese edition exists for Nådeskudd (unpublished), the Doktor
# Proktor series (six for six, no Portuguese translation found anywhere -
# unlike English, where five of six exist; Nesbø's Portuguese-language
# readership appears to be crime-fiction-only), Det hvite hotellet,
# Karusellmusikk, or Stemmer fra Balkan.
#
# A note on formats: `format` is recorded only where a fetched product page
# explicitly stated a binding (Aschehoug's "Format" field, OpenLibrary's
# physical_format, WOOK's "Encadernação"). Left blank on entries where the
# source itself didn't state one. Most WOOK Dom Quixote/BIS editions
# read "Capa mole" (paperback) and are marked so; a few (O Morcego, Baratas,
# O Leopardo) simply didn't carry the field on the page fetched, so format is
# omitted on those three rather than assumed from the pattern.

# --- Harry Hole (14) ---

