# Branding for the Jo Nesbø wing (see Orrery CONCEPT §6 - the design law, and
# docs/SCHEMA.md#themeyaml). Norway has no other wing in this catalogue, so
# there is no local collision to avoid, but the two existing crime wings set
# the register this one has to read as neither: Tana French (bog-noir - a
# dark, peaty green-grey ground, a cold heather-violet accent, fraunces,
# thread) and Gillian Flynn (heartland-noir - a pale overcast newsprint-grey
# ground, a bruise-plum accent, sourceSerif, rule). This wing goes light like
# Flynn but colder and bluer rather than warm-grey, and its accent sits in
# true cobalt blue, a hue neither crime wing nor any other wing in the
# catalogue has used (gold/brass appears four times, red/terracotta twice,
# violet/plum twice, green/teal twice - blue, once, is Joao Tordo's muted
# coastal azulejo teal at hue ~199; this wing's accent is pushed to a deeper,
# more saturated cobalt at hue ~225, cold ice rather than warm coast).
preset: vinterlys
palette:
  bg: "#e6ebee"       # pale, cold blue-white - overcast Nordic winter light on
                      # snow, not Flynn's warm-grey newsprint and not Christie's
                      # warm ivory - the only two other light-ground wings
  surface: "#eef2f4"  # a shade lifted, for cards
  ink: "#12161a"      # near-black cold charcoal - high contrast, very readable
  muted: "#5a636a"    # steel-grey, for metadata (AA-checked against bg/surface)
  accent: "#2a3e8f"   # one deep cobalt ice-blue, for links and markers only
displayFace: sourceSerif  # from the app's implemented set (fraunces | spectral |
                          # sourceSerif); the plainest of the three, matching
                          # Nesbø's own terse, procedural prose (an economist
                          # and financial analyst before he was a novelist) and
                          # a design register built on Scandinavian
                          # functionalism rather than Gothic atmosphere -
                          # already used twice (Palahniuk, Flynn, Peixoto), but
                          # for a different, load-bearing reason each time
signature: rule            # a firm, undecorated line - Scandinavian design's
                            # own preference for the unornamented straight edge
                            # over flourish, standing here for the flat line of
                            # a frozen fjord or a cut in fresh snow; already
                            # used by Palahniuk (a clinical instruction-manual
                            # rule) and Valter Hugo Mãe (a typographic rule),
                            # neither of which this wing's reasoning echoes
notes: >
  A cold daylight edition rather than a noir basement: pale blue-white paper
  the color of overcast Nordic winter light, near-black cold type, and one
  deep cobalt accent used only for links and markers. Deliberately not dark
  like every other cold-register wing in the catalogue (Palahniuk, the
  Cosmere, Tana French) and deliberately bluer and colder than Gillian Flynn's
  warm-grey newsprint, the catalogue's other pale crime wing. No fjord
  postcard, no Nordic-noir sweater or knitwear cliche, no literal snow or
  blood shown as content - the palette carries the cold, the prose carries
  the rest.
