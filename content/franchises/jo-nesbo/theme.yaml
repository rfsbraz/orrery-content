# Branding for the Jo Nesbø wing (see Orrery CONCEPT §6 - the design law, and
# docs/SCHEMA.md#themeyaml). Norway has no other wing in this catalogue, so
# there is no local collision to avoid, but the two existing crime wings set
# the register this one has to read as neither: Tana French (bog-noir - a
# dark, peaty green-grey ground, a cold heather-violet accent, fraunces,
# thread) and Gillian Flynn (heartland-noir - a pale overcast newsprint-grey
# ground, a bruise-plum accent, sourceSerif, rule). This wing goes light like
# Flynn but colder and bluer rather than warm-grey, and its accent sits in
# true cobalt blue, a hue neither crime wing nor any other wing in the
# catalogue has used (gold/brass appears four times, red/terracotta twice,
# violet/plum twice, green/teal twice - blue, once, is Joao Tordo's muted
# coastal azulejo teal at hue ~199; this wing's accent is pushed to a deeper,
# more saturated cobalt at hue ~225, cold ice rather than warm coast).
preset: vinterlys
palette:
  bg: "#e6ebee"       # pale, cold blue-white - overcast Nordic winter light on
                      # snow, not Flynn's warm-grey newsprint and not Christie's
                      # warm ivory - the only two other light-ground wings
  surface: "#eef2f4"  # a shade lifted, for cards
  ink: "#12161a"      # near-black cold charcoal - high contrast, very readable
  muted: "#5a636a"    # steel-grey, for metadata (AA-checked against bg/surface)
  accent: "#2a3e8f"   # one deep cobalt ice-blue, for links and markers only
displayFace: sourceSerif  # from the app's implemented set (fraunces | spectral |
                          # sourceSerif); the plainest of the three, matching
                          # Nesbø's own terse, procedural prose (an economist
                          # and financial analyst before he was a novelist) and
                          # a design register built on Scandinavian
                          # functionalism rather than Gothic atmosphere -
                          # already used three times (Palahniuk, Flynn,
                          # Peixoto), but for a different, load-bearing reason
                          # each time
signature: rule            # a firm, undecorated line - Scandinavian design's
                            # own preference for the unornamented straight edge
                            # over flourish, standing here for the flat line of
                            # a frozen fjord or a cut in fresh snow; already
                            # used by Palahniuk (a clinical instruction-manual
                            # rule) and Valter Hugo Mãe (a typographic rule),
                            # neither of which this wing's reasoning echoes
# ART. The palette already keeps this wing apart from the catalogue's other
# two crime wings; the art below keeps the drawings apart too. Tana French's
# instrument is a chair under a bulb (an interrogation, doubled for an
# unreliable narrator); Gillian Flynn's is a copy-desk rule (a single edit
# mark, from her journalism years). This wing's instrument is a ruled ledger
# page out of Nesbø's own pre-fiction decade as a financial analyst and
# stockbroker, and its line alternates a genuinely ruled hand for structure
# with a genuinely freehand one for people and living things, rather than
# committing wholly to one texture the way the other two do. There is also no
# era to hang a mood on (see eras.yaml: the strands run concurrently and no
# span was ever written) - the flat, deadpan daylight below is asked to hold
# unchanged from 1997 to 2026, and to cover an eccentric children's inventor
# and an alcoholic Oslo detective with the same calm rather than switching
# costume between them.
art:
  emblem:
    object: >
      A single ruled ledger page, its columns and rows drawn straightedge-true,
      the entries themselves rendered as loose, unreadable pen-strokes rather
      than legible writing, with one row struck through in a single
      unhesitating line and nothing written above it to correct it.
    why: >
      For close to a decade before Flaggermusmannen, Nesbø worked as a
      financial analyst and stockbroker (a degree in economics from the
      Norwegian School of Economics, 1986) in parallel with fronting the band
      Di Derre - a day job putting numbers into tidy columns, then a flight to
      that night's gig, a few hours' sleep, and a flight back for the market
      open, until the Oslo-Sydney flight that produced Harry Hole instead. The
      ledger is that decade made visual: a page built for exact, tidy
      structure, holding an entry that does not actually resolve - the same
      appetite for imposed order that produces both a serial killer's
      exacting method and an eccentric inventor's precisely calibrated,
      entirely deranged calculations. One page serves both registers because
      the same mind built them.
  motifs:
    - a ruled ledger or case-file page, its rows and columns straightedge-true,
      one line struck through - reappearing as an evidence log, a financial
      record or an inventor's formula sheet depending on the scene
    - an unfamiliar hotel room glimpsed through a half-open door, a ceiling
      fan turning, a suitcase still packed, foreign daylight held out by thin
      curtains (Sydney, Bangkok, Hong Kong, Los Angeles - the cases that begin
      away from Oslo before the series comes home)
    - an Oslo apartment block's lit windows seen from the street after dark,
      the city read as height and grid rather than any single landmark
    - a child's workbench crowded with tins, coiled tubing, a half-soldered
      gadget and a diagram corrected twice over, given the same procedural
      attention as anything on the crime side of the shelf
    - a stack of old case files boxed and string-tied for storage, one box
      lid left askew - a cold case being reopened, not a working incident room
    - a small-town filling station or farm outbuilding at the edge of a
      spruce forest, one road running past it toward somewhere else
    - a shipping trunk or parcel addressed to a name that has been crossed
      out and written over
  atmosphere: >
    Flat, cold, overlit daylight rather than shadow or lamplight - the same
    deadpan register whether the page is solving a murder or arming a
    schoolchild with fart powder. Incident is stated plainly and the reader
    is left to supply the horror or the joke; nothing is played for dread and
    nothing is played for cute. This flatness holds constant across the whole
    shelf rather than deepening or lifting with the decades - there is no
    early Nesbø or late Nesbø to draw differently, only one unbroken run of
    exact, matter-of-fact daylight from 1997 to 2026.
  lineCharacter: >
    A fine technical pen line, disciplined rather than mechanical:
    straightedge-true for horizons, windows, shelving, ledger columns and
    anything built, but let loose into a lighter, faintly uneven freehand line
    wherever a person, an animal or a growing thing enters the frame. The two
    registers share a page without blending into one another, the way a tidy
    column of figures can hold one entry that does not actually add up. The
    ruled passages are allowed to be genuinely ruled; the freehand passages
    keep a small, controlled unsteadiness the ruled passages never show.
  backgroundTexture: >
    Cold, smooth drafting paper with a faint blue-white cast, not warm laid
    paper or parchment - the ghost of a ruled grid or a technical guideline
    showing through in places, as if the sheet had carried another drawing
    before this one.
  accentUse: >
    Cobalt on exactly one element per image, never as a fill: the single
    struck-through line on a ledger page, one lit window in an otherwise dark
    facade, a single tool set down beside a half-built contraption, or one
    length of address label crossed out on a trunk or parcel.
  avoid:
    - literal snow or blood shown as content - the cold lives in the palette
      and the daylight, not in weather or wounds on the page
    - a lone figure under a streetlamp, a body found in the snow, or any
      other Nordic-noir paperback-cover cliche
    - bunad, stave churches, the midnight sun, the aurora or ski jumps - any
      Norway-as-tourist-brochure imagery
    - Scandinavian sweaters, knitwear or hygge coziness used as shorthand for
      the setting
    - WWII military uniform, insignia or a soldier's face - Rødstrupe's
      frontkjemper history is drawn only as its documents or its aftermath,
      never as a reenactment
    - twee or cartoon-cute styling for the Doktor Proktor scenes - the
      inventor's gadgets get the same flat, exact treatment as anything else
      on the shelf, not a children's-book palette shift
    - graphic gore or "screaming blood" - Nesbø's own words for what he
      regretted overdoing in Panserhjerte, and this wing does not repeat it
    - the 2017 Snowman film's visual identity - its casting, its colour grade,
      its poster
notes: >
  A cold daylight edition rather than a noir basement: pale blue-white paper
  the color of overcast Nordic winter light, near-black cold type, and one
  deep cobalt accent used only for links and markers. Deliberately not dark
  like every other cold-register wing in the catalogue (Palahniuk, the
  Cosmere, Tana French) and deliberately bluer and colder than Gillian Flynn's
  warm-grey newsprint, the catalogue's other pale crime wing. No fjord
  postcard, no Nordic-noir sweater or knitwear cliche, no literal snow or
  blood shown as content - the palette carries the cold, the prose carries
  the rest.
