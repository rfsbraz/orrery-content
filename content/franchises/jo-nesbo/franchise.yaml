id: jo-nesbo
name: Jo Nesbø
kind: author                       # author is the norm: this wing spans Nesbø's
                                    # complete published work, not just Harry Hole
description: >
  Fourteen Harry Hole novels track an alcoholic Oslo detective across three
  decades, from [[work:jo-nesbo/flaggermusmannen|Flaggermusmannen]] (1997) to
  [[work:jo-nesbo/nadeskudd|Nådeskudd]] (2026), alongside the Kongeriket
  duology, the Olav Johansen novels, a 2018 Macbeth for the Hogarth
  Shakespeare series, five further standalone crime novels, two short-story
  collections, and the five-novel Doktor Proktor children's series (plus a
  companion bestiary) that runs in parallel to all of it.
authorIds: [jo-nesbo]
themePreset: vinterlys

# TITLE RULING FOR THIS WING (applied throughout works.yaml, not re-derived
# per entry): `title` is the Norwegian original; `published` is the Norwegian
# first-publication year. English and Portuguese titles are edition data, not
# recorded here. This matters more here than in most wings in the catalogue,
# because English publishing translated the first two Harry Hole novels
# (Flaggermusmannen, 1997; Kakerlakkene, 1998) only in 2012 and 2013, well
# after books three through eleven - so English-language readers met the
# series at book three (Rødstrupe / The Redbreast). Recording Norwegian years
# makes the derived publication-chronological default order the correct
# Norwegian order automatically; an English or pt-PT reading order is
# additional data, not written here.

# CAPABILITIES - left entirely at auto; no override earned yet.
# river / companion: auto, on the strength of the three author lifeEvents
# recorded in content/authors/jo-nesbo.yaml - thin but real.
# connections / characters: auto, currently off, because no characters.yaml
# exists and no work carries a `connections` entry. Harry Hole's recurring
# supporting cast (his wife Rakel Fauke, her son Oleg, his friend Øystein
# Eikeland, colleagues Bjørn Holm, Beate Lønn and Katrine Bratt) is real and
# documented in general sources, but which specific novels each of them
# appears in is not established here, and no crossover is established
# connecting Harry Hole to the Kongeriket, Olav Johansen or standalone
# novels. A characters.yaml built only from "Harry Hole appears in the
# fourteen Harry Hole novels" would only restate what `subseries` already
# conveys.
# wizard: auto, currently off - no startHere block exists.
# editions: auto, currently off - no editions.yaml exists.
features: {}

# GLOBAL EVENTS - none pass the resonance test. Nesbø (b. 1960-03-29, living)
# overlaps every entry in content/events/global.yaml dated 1960 or later;
# each was weighed against his own record and the wing's sourced bibliography
# and found to shape only "the era he wrote in," never a specific book.
globalEvents:
  exclude:
    - sept-11-2001                     # lived through it in Oslo; no book answers it
    - financial-crisis-2008            # left finance for writing a decade earlier; no book is plotted around the 2008 crash itself
    - covid-19-pandemic-2020           # no work in this wing's 2020-2026 window shows it
    - lady-chatterley-trial-1960       # inside his life by months; no case in his own record ties the era's permissiveness to his violence
    - fantasy-paperback-boom-1965      # wrong genre; the category it created is epic fantasy, not crime
    - carnation-revolution-1974        # Portuguese censorship history; no bearing on a Norwegian author
    - chain-bookshop-1982              # generic bookselling backdrop; no book-specific answer
    - online-bookselling-1995          # no documented backlist-discovery story tied to online bookselling for this wing
    - ebook-and-self-publishing-2007   # Aschehoug has published him traditionally throughout; no self-pub/ebook story
    - prestige-fantasy-adaptation-2011 # fantasy-specific; his own screen adaptation (Snømannen, 2017) is already a franchise event
    - booktok-2020                     # no documented BookTok-driven surge for any title here
    - portugal-bailout-2011            # Portugal-specific; no bearing on a Norwegian author

