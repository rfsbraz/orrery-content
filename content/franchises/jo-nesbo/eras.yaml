# Creative periods. There are none on record.
#
# The record divides this career by category, never by period. Store norske
# leksikon's article (Fredrik Wandrup and Hans H. Skei, both literary
# scholars) is the fullest Norwegian treatment of the forfattarskap and its
# headings are "Harry Hole", "Andre spenningsbøker", "Hodejegerne", "Doktor
# Proktor", "Andre sjangrar": strands of work, not phases of a life, and
# within each strand the prose runs book by book from 1997 to the present
# without naming a beginning or an end to anything
# (https://snl.no/Jo_Nesb%C3%B8). Forfatterweb's portrait, written in 2011 and
# updated in 2019, 2021 and 2025, does the same at greater length: its
# sections are individual titles, from "Flagermusmanden og Kakelakkerne"
# through to "Rotteøen og andre fortællinger", followed by "Genrer og
# tematikker" for what runs across all of them
# (https://forfatterweb.dk/oversigt/znesboe00). Lille norske leksikon's short
# version splits adults from children and stops there
# (https://lille.snl.no/Jo_Nesb%C3%B8).
#
# That categorical shape is not an accident of how reference works are
# written. The strands genuinely run at the same time. 2007 carries a Harry
# Hole novel (Snømannen), the first Doktor Proktor book and a travel volume;
# 2015 carries two Olav Johansen novellas; 2010 carries two children's books
# while the Harry Hole sequence is mid-run. Any span drawn across this shelf
# covers three kinds of book at once, so a period named for one of them would
# be false for most of what it contains.
#
# The publishing-historical facts that do exist are strand openings rather
# than career phases, and each one fails the same way. 2007 is a real,
# well-sourced boundary: Doktor Proktors prompepulver is his first children's
# book (Lille norske leksikon, above). An era beginning there would also
# cover Snømannen, Panserhjerte, Gjenferd, Politi and every Harry Hole novel
# since. 2008 is equally real: Hodejegerne is the first crime novel without
# Harry Hole and won Bokklubbens pris for årets roman
# (https://www.salomonssonagency.se/books/hodejegerne/). An era beginning
# there would be named for the standalones and would swallow the six Harry
# Hole novels that followed. Aschehoug has published him throughout, so the
# publisher axis offers no boundary at all.
#
# Three further framings come close enough to record, and each falls short.
#
# Rødstrupe (2000) is universally described as the breakthrough and is the
# most-decorated book in the catalogue: Bokhandlerprisen in 2000, and voted
# the best Norwegian crime novel in history in three separate public polls
# (Bokklubben Krim og Spenning 2004, NRK Nitimen's listener vote, Dagbladet's
# 2009 poll), per Store norske leksikon. What the sources make of it is a peak
# and a point of arrival, not the start of a named period, and none of them
# draws a line before or after it.
#
# The move home to Oslo after two books set abroad is described plainly by
# Store norske leksikon (Flaggermusmannen in Sydney, Kakerlakkene again "lagd
# til eksotiske strøk", then "Tredje bok, Rødstrupe, finn stad i Noreg") but
# it is a fact about the settings of the first two Harry Hole novels, not
# about the career: the same 1997-1999 window also holds Stemmer fra Balkan,
# which the framing does not describe. The "Oslo Trilogy" grouping of
# Rødstrupe, Sorgenfri and Marekors is an English-language publisher's boxset
# and is in any case a run inside one series.
#
# The four years without a Harry Hole novel between Politi (2013) and Tørst
# (2017) are visible in the shelf and were not empty years (Sønnen 2014, Blod
# på snø and Mere blod 2015, Kan Doktor Proktor redde jula? 2016). No source
# found names that interval or treats it as a phase, in Norwegian or in
# English.
#
# Searched in Norwegian first (Store norske leksikon and Norsk biografisk
# leksikon, Norwegian press coverage, Norwegian academic and school writing on
# krim), then Danish (Forfatterweb) and English. The strongest document type
# for a periodisation, the researched career retrospective, is not available
# for a living writer still publishing; the reference-work portraits above are
# its nearest equivalent and both are chronological.
#
# All 34 works therefore sit outside any era by design, from
# Flaggermusmannen (1997) to Nådeskudd (2026).
[]
