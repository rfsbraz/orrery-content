- id: jo-nesbo/mere-blod
  title: "Mere blod"
  authorIds: [jo-nesbo]
  published: 2015
  subseries: "Olav Johansen"
  canonTier: core
  synopsis: >
    A drug courier's flight from Oslo to Norway's far north, published as
    Olav Johansen's own sequel although Olav is not this book's narrator.
  note: >
    Norwegian Wikipedia's general Jo Nesbø bibliography describes this
    book's protagonist as "pusheren Jon Hansen" [the pusher Jon Hansen], a
    different character from Olav Johansen; English Wikipedia nonetheless
    groups both books under "The Olav Johansen novels" and its own marketing
    citation names this one "Midnight Sun: Blood on Snow 2." The exact
    thread connecting the two narrators was not established in the sources
    checked, so the subseries grouping here follows the publisher's own
    packaging rather than a confirmed shared narrator.
  sources:
    - https://no.wikipedia.org/wiki/Jo_Nesb%C3%B8
    - https://nbl.snl.no/Jo_Nesb%C3%B8
    - https://en.wikipedia.org/wiki/Jo_Nesb%C3%B8

