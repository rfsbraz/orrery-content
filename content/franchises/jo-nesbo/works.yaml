# --- Kongeriket (2) ---

- id: jo-nesbo/kongeriket
  title: "Kongeriket"
  authorIds: [jo-nesbo]
  published: 2020
  subseries: "Kongeriket"
  canonTier: core
  synopsis: >
    A first-person narrator responsible for a string of monstrous acts
    keeps getting away with them, tangled together with his younger
    brother, on a farm above a village where the past does not stay buried
    once the local sheriff starts digging.
  note: >
    The third best-selling book in Norway in 2020, per the Norwegian
    Booksellers' Association's own bestseller list.
  sources:
    - https://nbl.snl.no/Jo_Nesb%C3%B8
    - https://no.wikipedia.org/wiki/Jo_Nesb%C3%B8

- id: jo-nesbo/kongen-av-os
  title: "Kongen av Os"
  authorIds: [jo-nesbo]
  published: 2024
  subseries: "Kongeriket"
  canonTier: core
  synopsis: >
    Brothers Carl and Roy Opgard have made their peace above the small town
    of Os, one running its spa hotel and the other its petrol station and a
    planned amusement park, until a new highway forces them back into the
    kind of dirty work they thought they had left behind, just as the
    sheriff gets hold of technology that could finally prove their past
    crimes.
  note: >
    Numbered "Kongeriket 2: Kongen av Os" in Norwegian Wikipedia's own
    bibliography table - the publisher's own sequel numbering, recorded
    here as the basis for treating Kongeriket as a two-book subseries rather
    than a single standalone. The third best-selling book in Norway in 2024.
  sources:
    - https://no.wikipedia.org/wiki/Jo_Nesb%C3%B8
    - https://www.salomonssonagency.se/books/kongen-av-os/

# --- Olav Johansen (2) ---

- id: jo-nesbo/blod-pa-sno
  title: "Blod på snø"
  authorIds: [jo-nesbo]
  published: 2015
  subseries: "Olav Johansen"
  canonTier: core
  synopsis: >
    Olav Johansen, a fixer for an Oslo crime boss, is ordered to kill his
    employer's unfaithful wife, and falls for her instead of carrying it
    out.
  note: >
    See the file header's YEAR CORRECTION note on why 2015, not 2014, is
    recorded here. Attached at various points to adaptations involving
    Martin Scorsese (producing), Leonardo DiCaprio and Tobey Maguire; a film
    is in production as of the most recent source checked.
  sources:
    - https://no.wikipedia.org/wiki/Blod_p%C3%A5_sn%C3%B8
    - https://nbl.snl.no/Jo_Nesb%C3%B8
    - https://en.wikipedia.org/wiki/Jo_Nesb%C3%B8

- id: jo-nesbo/mere-blod
  title: "Mere blod"
  authorIds: [jo-nesbo]
  published: 2015
  subseries: "Olav Johansen"
  canonTier: core
  synopsis: >
    A drug courier's flight from Oslo to Norway's far north, published as
    Olav Johansen's own sequel although Olav is not this book's narrator.
  note: >
    Norwegian Wikipedia's general Jo Nesbø bibliography describes this
    book's protagonist as "pusheren Jon Hansen" [the pusher Jon Hansen], a
    different character from Olav Johansen; English Wikipedia nonetheless
    groups both books under "The Olav Johansen novels" and its own marketing
    citation names this one "Midnight Sun: Blood on Snow 2." The two books do
    share a thread beyond packaging: both protagonists work as a fixer for
    the same Oslo drug baron, referred to in both as "Fiskeren" [the
    Fisherman] (Norwegian reader coverage of Mere blod names him directly),
    and Norwegian press covering this book's release described it as the
    second entry in the same "machouniverset" [macho-universe] opened by
    Blod på snø. The subseries grouping here rests on that shared antagonist
    and setting rather than on a shared narrator.
  sources:
    - https://no.wikipedia.org/wiki/Jo_Nesb%C3%B8
    - https://nbl.snl.no/Jo_Nesb%C3%B8
    - https://en.wikipedia.org/wiki/Jo_Nesb%C3%B8
    - https://www.dagbladet.no/kultur/mer-hardkokt-roff-og-machokrim-fra-jo-nesbo/60641094
    - https://beathesbibliotek.no/2015/08/26/kort-om-mere-blod-av-jo-nesbo/

# --- Standalone crime (6) ---

- id: jo-nesbo/det-hvite-hotellet
  title: "Det hvite hotellet"
  authorIds: [jo-nesbo]
  published: 2007
  subseries: null
  canonTier: extended
  synopsis: >
    A Norwegian insurance investigator, Thomas Alvern, flies to Bombay to
    identify a man tied to a suspected fraud claim, expecting a routine job
    that the city refuses to let stay routine.
  note: >
    Tiered extended rather than core: a charity-driven minor entry outside
    the fourteen-book Harry Hole spine and the other standalone novels. It
    is the first title in Redd Barna's "ABC redder barna" series, in which
    Aschehoug invited Norway's best-selling authors to write a short book
    each in support of Redd Barna's campaign for children's schooling in
    conflict zones; proceeds went to that campaign rather than to Nesbø.
  sources:
    - https://no.wikipedia.org/wiki/Jo_Nesb%C3%B8
    - https://www.bokklubben.no/boeker/det-hvite-hotellet-jo-nesboe/produkt.do?produktId=2898759

- id: jo-nesbo/hodejegerne
  title: "Hodejegerne"
  authorIds: [jo-nesbo]
  published: 2008
  subseries: null
  canonTier: core
  synopsis: >
    Roger Brown, an elite corporate headhunter who moonlights as an art
    thief, targets the wrong mark and has to survive the fallout.
  note: >
    Its film rights and proceeds were donated to the Harry Hole Foundation,
    which works on literacy for children in developing countries - despite
    Harry Hole not appearing in the book itself. The 2011 film adaptation,
    starring Aksel Hennie, was the first film based on a Nesbø novel.
  sources:
    - https://no.wikipedia.org/wiki/Jo_Nesb%C3%B8
    - https://en.wikipedia.org/wiki/Jo_Nesb%C3%B8

- id: jo-nesbo/sonnen
  title: "Sønnen"
  authorIds: [jo-nesbo]
  published: 2014
  subseries: null
  canonTier: core
  synopsis: >
    A prison inmate, framed for crimes he did not commit and fed a
    fabricated confession, breaks out to find out who actually killed his
    father and his closest friend.
  note: >
    Investigator Simon Kefas, not Harry Hole, leads the case - one of
    Norwegian Wikipedia's own named exceptions to the Harry Hole-led run of
    Nesbø's crime novels.
  sources:
    - https://no.wikipedia.org/wiki/Jo_Nesb%C3%B8
    - https://en.wikipedia.org/wiki/Jo_Nesb%C3%B8

- id: jo-nesbo/macbeth
  title: "Macbeth"
  authorIds: [jo-nesbo]
  published: 2018
  subseries: null
  canonTier: core
  synopsis: >
    A hard-boiled retelling of Shakespeare's tragedy: Inspector Macbeth of
    a paramilitary police unit turns on drug dealers, bikers and his own
    colleagues in a corrupt industrial town combining Scandinavian and
    Scottish texture, set in 1970.
  note: >
    Commissioned for the Hogarth Shakespeare series, marking four hundred
    years since Shakespeare's death; Nesbø has described his brief as a
    "crime noir" retelling.
  sources:
    - https://en.wikipedia.org/wiki/Jo_Nesb%C3%B8

- id: jo-nesbo/natthuset
  title: "Natthuset"
  authorIds: [jo-nesbo]
  published: 2023
  subseries: null
  canonTier: core
  synopsis: >
    Fourteen-year-old Richard Elauved, sent to live with an aunt and uncle
    after his parents die in a house fire, becomes the chief suspect when a
    classmate vanishes into an abandoned telephone booth at the edge of
    town, and has to find the truth before it claims someone else.
  note: >
    Norsk biografisk leksikon describes it as reading initially like a
    fantasy/horror blend aimed at younger readers before the story twists
    twice into something else, and names it as falling outside the main
    genres of Nesbø's authorship.
  sources:
    - https://en.wikipedia.org/wiki/Jo_Nesb%C3%B8
    - https://nbl.snl.no/Jo_Nesb%C3%B8
    - https://www.salomonssonagency.se/books/natthuset/

- id: jo-nesbo/minnesota
  title: "Minnesota"
  authorIds: [jo-nesbo]
  published: 2025
  subseries: null
  canonTier: core
  synopsis: >
    Bob Oz, a Minneapolis police detective with neither looks, money nor
    charm to spare, refuses to let a suspension stop him investigating an
    assassination attempt on an arms dealer, a case that keeps circling back
    to one he would rather forget.
  note: >
    A standalone set in the American Midwest in 2016, published in English
    as Wolf Hour. A VG review (4 January 2025) calls it grotesque. Won
    Nesbø the 2026 Riverton Prize.
  sources:
    - https://no.wikipedia.org/wiki/Jo_Nesb%C3%B8
    - https://en.wikipedia.org/wiki/Jo_Nesb%C3%B8
    - https://www.salomonssonagency.se/books/minnesota/

