# --- Olav Johansen (2) ---

- id: jo-nesbo/blod-pa-sno
  title: "Blod på snø"
  authorIds: [jo-nesbo]
  published: 2015
  subseries: "Olav Johansen"
  canonTier: core
  synopsis: >
    Olav Johansen, a fixer for an Oslo crime boss, is ordered to kill his
    employer's unfaithful wife, and falls for her instead of carrying it
    out.
  note: >
    See the file header's YEAR CORRECTION note on why 2015, not 2014, is
    recorded here. Attached at various points to adaptations involving
    Martin Scorsese (producing), Leonardo DiCaprio and Tobey Maguire; a film
    is in production as of the most recent source checked.
  sources:
    - https://no.wikipedia.org/wiki/Blod_p%C3%A5_sn%C3%B8
