- id: jo-nesbo/mere-blod
  title: "Mere blod"
  authorIds: [jo-nesbo]
  published: 2015
  subseries: "Olav Johansen"
  canonTier: core
  synopsis: >
    In August 1977 a man gets off a bus in a remote village on the
    Finnmark plateau, calling himself Ulf, carrying no luggage and saying he
    has come to hunt. He is not the hunter.
  note: >
    Aschehoug's jacket withholds this narrator's identity on purpose - "en
    mann," "han kaller seg Ulf," "hevder at han er kommet for å gå på jakt" -
    names no connection to Blod på snø beyond the word "oppfølgeren"
    [the sequel], and the newest edition drops even that. Resolving who he
    is, or that he is not Olav Johansen, would answer a question Blod på snø
    itself is still holding, so the synopsis above keeps the jacket's own
    reticence. The subseries reasoning is recorded below instead.
    Norwegian Wikipedia's general Jo Nesbø bibliography describes this
    book's protagonist as "pusheren Jon Hansen" [the pusher Jon Hansen], a
    different character from Olav Johansen; English Wikipedia nonetheless
    groups both books under "The Olav Johansen novels" and its own marketing
    citation names this one "Midnight Sun: Blood on Snow 2." The two books do
    share a thread beyond packaging: both protagonists work as a fixer for
    the same Oslo drug baron, referred to in both as "Fiskeren" [the
    Fisherman] (Norwegian reader coverage of Mere blod names him directly),
    and Norwegian press covering this book's release described it as the
    second entry in the same "machouniverset" [macho-universe] opened by
    Blod på snø. The subseries grouping here rests on that shared antagonist
    and setting rather than on a shared narrator.
  # No cover: no Norwegian-language edition of this title is catalogued on
  # Open Library at all (checked by direct search and by sweeping the
  # author's full 496-work listing) - every record found is the English
  # "Midnight Sun" translation.
  sources:
    - https://no.wikipedia.org/wiki/Jo_Nesb%C3%B8
    - https://nbl.snl.no/Jo_Nesb%C3%B8
    - https://en.wikipedia.org/wiki/Jo_Nesb%C3%B8
    - https://www.dagbladet.no/kultur/mer-hardkokt-roff-og-machokrim-fra-jo-nesbo/60641094
    - https://beathesbibliotek.no/2015/08/26/kort-om-mere-blod-av-jo-nesbo/
    - https://aschehoug.no/mere-blod

