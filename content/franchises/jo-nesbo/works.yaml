# Bibliography (Works) - the abstract works; editions and covers are separate
# metadata not recorded here. IDs are STABLE and permanent. Dates are the
# NORWEGIAN first-publication year, per this wing's own ruling (see
# franchise.yaml): titles are original-language Norwegian, and the derived
# default reading order runs over these years, not over any translation's.
#
# SHAPE OF THIS WING: thirty-four works across six groupings.
#
#   Harry Hole (14) - Flaggermusmannen (1997) through Nådeskudd (2026). The
#     spine of the catalogue: a Norwegian detective across three decades,
#     drawn from Norwegian Wikipedia's dedicated Harry Hole article, which
#     lists all fourteen with years and matches Aschehoug's own count ("since
#     1997... thirteen books," cited there as of a 2024 access date, one book
#     before Nådeskudd). English titles (checked on English Wikipedia's
#     Bibliography section, cross-referenced work by work) are recorded only
#     in sources/notes, never in `title` - see the ORIGINAL TITLES note below.
#   Kongeriket (2) - Kongeriket (2020) and its 2024 sequel, which Norwegian
#     Wikipedia's own bibliography table numbers "Kongeriket 2: Kongen av
#     Os" - the publisher's own sequel numbering, not an inference.
#   Olav Johansen (2) - Blod på snø and Mere blod, both 2015 (see the YEAR
#     CORRECTION note below). English Wikipedia's own structure groups them
#     as "The Olav Johansen novels," though only the first book's narrator is
#     Olav Johansen himself - see the note on Mere blod.
#   Standalone crime (6) - Det hvite hotellet, Hodejegerne, Sønnen, Macbeth,
#     Natthuset, Minnesota: six further crime novels sharing no subseries,
#     each with a different narrator or premise from Harry Hole.
#   Short fiction (3) - Karusellmusikk (2001) and the two 2021 collections,
#     Sjalusimannen og andre fortellinger and Rotteøya og andre fortellinger.
#     Tiered extended, matching this catalogue's own convention for an
#     author's own short-story collections (see agatha-christie/works.yaml).
#   Doktor Proktor (6) - the children's series, 2007-2016, plus a companion
#     volume (see D.D.S.Ø.I.F below). Genuinely his own and a real second
#     career ("hugely successful" per English Wikipedia), but tiered extended
#     rather than core: it is a distinct children's strand off the
#     crime-fiction spine the rest of this wing walks, the same call this
#     catalogue already makes for Pratchett's and Valter Hugo Mãe's own
#     children's titles. A sixth, unnumbered title sits alongside the five
#     novels: Doktor Proktors sensasjonelle samling av dyr du skulle ønske
#     ikke fantes (2010), a bestiary companion piece created alongside book
#     three. It carries no number in either Nesbø's own literary agency's
#     listing or the library record, and neither Norwegian Wikipedia's
#     bibliography table nor Norsk biografisk leksikon's lists it at all - it
#     surfaces only in library catalogue records (Deichman, tibi.no) and the
#     Salomonsson Agency's own bibliography, all three crediting Nesbø as
#     sole author.
#   Nonfiction (1) - Stemmer fra Balkan / Atten dager i mai (1999), written
#     with journalist Espen Søbye; recorded with authorRole: co-author on
#     Nesbø's own entry rather than by adding a second global author id for
#     a one-off collaborator outside this catalogue's scope.
#
# ORIGINAL TITLES. This wing's founding decision (see franchise.yaml): title
# is the Norwegian original, published is the Norwegian first-publication
# year. English titles are edition data, recorded here only in sources/notes
# so the fact is not lost, never in `title`. This
# matters more here than in any other wing in the catalogue: the first two
# Harry Hole novels were translated into English only in 2012 and 2013,
# years after books three through eleven, so an English-language reading
# order built on translation dates would open with book three (Rødstrupe /
# The Redbreast) rather than book one - publication order over Norwegian
# years, which is what `published` being Norwegian gives for free, is the
# only order that is actually chronological.
#
# YEAR CORRECTION: Blod på snø and Mere blod. English Wikipedia's dedicated
# "Blood on Snow (novel)" article infobox states an original Norwegian
# publication date of 14 October 2014 - contradicted by every Norwegian
# source checked. Norwegian Wikipedia's own dedicated article states "gitt ut
# i 2015" ["published in 2015"], categorizes the book under "Bøker fra 2015,"
# and cites two Norwegian reviews (VG and NRK) both dated 3 March 2015 - a
# publication date and matching review dates line up. Norsk biografisk
# leksikon (Store norske leksikon, authored by Fredrik Wandrup and Hans H.
# Skei) independently states both Blod på snø and Mere blod are "begge frå
# 2015" ["both from 2015"]. The National Library of Norway's own legal-deposit
# catalogue (api.nb.no) corroborates this a fourth way: every edition,
# translation and audiobook it holds for either title is dated 2015 or later,
# with no 2014 printing of either book on record anywhere. Three independent,
# native-language, dated sources plus a national library catalogue against one
# English infobox: 2015 is used here for both books. The English article's
# 2014 date most likely preserves the original October 2013
# announcement of an "autumn 2014" release under the pen name "Tom
# Johansen" (see content/authors/jo-nesbo.yaml), a schedule that slipped by
# several months and changed authorial name before publication.
#
# NÅDESKUDD (2026), the fourteenth Harry Hole novel, is announced but not yet
# released. Beyond the 27 March 2026 title reveal (BOK365/NTB, citing
# interviews Nesbø gave TV 2 and VG), the retailers Ark and Norli opened
# pre-orders on 19 June 2026 for a 19 August 2026 street date (VG's own retail
# coverage), which is the year and the specific publication date used here.
# The book has not reached shops as of the most recent sources checked.
#
# KAN DOKTOR PROKTOR REDDE JULA?, 2016. Norwegian Wikipedia's bibliography
# table gives 2016, citing an archived Aschehoug (the publisher's own) page;
# English Wikipedia's Doctor Proctor bibliography section gives 2017 for the
# same Norwegian original (and 2018 for the English translation). 2016 is
# corroborated two further ways: the National Library of Norway's
# legal-deposit catalogue holds Norwegian first-printing copies dated
# November-December 2016, and Nesbø's own literary agency (Salomonsson
# Agency) lists the Norwegian edition as "Published 2016." Three independent
# sources against the one English Wikipedia figure: 2016 is settled.
#
# NOT RECORDED AS WORKS: two screen properties. "Twelve" was written directly
# for Magnus Martens's 2011 film Jackpot - the director's own account is that
# Nesbø handed him the story to adapt, not that it was ever published as
# prose. "I Am Victor" was a synopsis Nesbø wrote for what became a 2013 NBC
# pilot (never picked up) and a later, still-unmade Baltasar Kormakur film;
# Nesbø's own literary agency lists it among screen properties, not books.
# Neither surfaces in a bibliography, a library catalogue, or Norsk biografisk
# leksikon's account of the short fiction under any title, in Norwegian or
# English. Screen stories and treatments are out of scope for this
# bibliography regardless of print status; these two are recorded here only
# because both are widely described as "short stories" in press coverage, and
# the absence is a checked finding rather than an unexamined gap.
#
# OKKUPERT, the TV series (Occupied, TV 2/Yellow Bird), is credited to "a
# concept by Jo Nesbø" rather than to a Nesbø book or story and is likewise
# out of scope: a screen credit, not a work.
#
# A NAME COLLISION, not a work: "Tre Jo Nesbø og et båtsportkart" (2014) is a
# short-story collection by Ellen Mari Thelle, whose chapter titles are
# deliberately unrelated to their contents and borrow other authors' names;
# it surfaces in an author-name search but has no connection to Jo Nesbø
# beyond the borrowed title.
#
# externalIds are empty throughout: no external identifier is recorded for
# any of the thirty-four works.
#
# COVERS. Sourced only from Open Library editions verified, one at a time, as
# genuine Norwegian-language Aschehoug printings - matching this wing's own
# Norwegian `title`, never a translated edition's jacket. Open Library's own
# "representative" cover for a work record is frequently the wrong edition: on
# this wing it belonged to a 2015 Catalan jacket for both flaggermusmannen and
# kakerlakkene, a German jacket for rodstrupe, an English "Blood on Snow" jacket
# for blod-pa-sno, and, for kongeriket, an entire work record titled in
# Norwegian that holds nothing but English "Kingdom" editions - each caught by
# checking the specific edition behind the cover id, not by trusting the
# record's display title or aggregate language list. gjenferd's only
# Norwegian-tagged "cover" turned out to be a scan of the title page, not the
# jacket, and is rejected on the same evidentiary basis. Two covers
# (doktor-proktors-tidsbadekar, doktor-proktor-og-verdens-undergang-kanskje)
# are Norwegian audiobook jackets (Lydbokforlaget) rather than print jackets,
# noted per work below - the only Aschehoug-credited cover art Open Library
# holds for either title. Where the only Norwegian edition Open Library holds
# has no cover image at all, or no Norwegian edition is catalogued there under
# any title, the slot is left empty rather than filled from a non-Norwegian
# edition further down the source ranking.

# --- Harry Hole (14) ---

