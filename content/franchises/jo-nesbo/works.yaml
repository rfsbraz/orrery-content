  title: "Kniv"
  authorIds: [jo-nesbo]
  published: 2019
  subseries: "Harry Hole"
  canonTier: core
  synopsis: >
    Harry wakes with no memory of the previous night beside a murdered
    woman he knew, and has to investigate a crime he cannot rule himself
    out of.
  note: >
    Won Nesbø a second Riverton Prize, twenty-two years after his first for
    Flaggermusmannen.
  sources:
    - https://no.wikipedia.org/wiki/Harry_Hole

- id: jo-nesbo/blodmane
  title: "Blodmåne"
  authorIds: [jo-nesbo]
  published: 2022
  subseries: "Harry Hole"
  canonTier: core
  synopsis: >
    Living in Los Angeles and drinking himself toward the end, Harry takes
    a paid job hunting a serial killer back in Oslo, purely to buy a
    friend's freedom from a debt to a drug cartel.
  sources:
    - https://no.wikipedia.org/wiki/Harry_Hole
    - https://nbl.snl.no/Jo_Nesb%C3%B8

- id: jo-nesbo/nadeskudd
  title: "Nådeskudd"
  authorIds: [jo-nesbo]
  published: 2026
  forthcoming: 2026-08-19
  subseries: "Harry Hole"
  canonTier: core
  synopsis: >
    Harry, no longer a police officer, is on a job interview at an insurance
    company when a winter murder in Oslo draws lines back to a killing that
    resembles a scene from a well-known film, against the backdrop of a
    film production Harry himself gets pulled into.
  note: >
    Announced but not yet released (see the file header's NÅDESKUDD note): a
    19 August 2026 street date, with pre-orders open at Ark and Norli since
