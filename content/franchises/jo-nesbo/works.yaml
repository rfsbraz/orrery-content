# --- Kongeriket (2) ---

- id: jo-nesbo/kongeriket
  title: "Kongeriket"
  authorIds: [jo-nesbo]
  published: 2020
  subseries: "Kongeriket"
  canonTier: core
  synopsis: >
    Roy, a car mechanic in a small Norwegian village, has his quiet life
    reopened when his younger brother Carl comes home from years abroad with
    a wife and a plan for a mountain hotel - and the village sheriff starts
    asking again about how the brothers' parents died.
  note: >
    The third best-selling book in Norway in 2020, per the Norwegian
    Booksellers' Association's own bestseller list.
    Aschehoug's jacket assigns no guilt and settles nothing: the parents'
    death is "det tragiske dødsfallet," the sheriff only "begynner å stille
    spørsmål," and Roy "må ta stilling til hvor langt han er villig til å gå
    for å beskytte broren." Whether he did it and whether he answers for it
    are both left open there, and are left open here.
  # No cover: Open Library's own work record titled "Kongeriket" holds only
  # English "Kingdom" editions (Penguin Random House/Knopf), checked at the
  # edition level; no Norwegian-language edition is catalogued under this
  # title or elsewhere for this author.
  sources:
    - https://nbl.snl.no/Jo_Nesb%C3%B8
    - https://no.wikipedia.org/wiki/Jo_Nesb%C3%B8
    - https://aschehoug.no/kongeriket-3

- id: jo-nesbo/kongen-av-os
  title: "Kongen av Os"
  authorIds: [jo-nesbo]
  published: 2024
  subseries: "Kongeriket"
  canonTier: core
  synopsis: >
    Carl and Roy Opgard have built about as much success as the small town
    of Os allows, one running its spa hotel and the other its petrol station
    and a planned amusement park, until a new trunk road routed around the
    village threatens all of it and the methods required turn dirty.
  note: >
    Numbered "Kongeriket 2: Kongen av Os" in Norwegian Wikipedia's own
    bibliography table - the publisher's own sequel numbering, recorded
    here as the basis for treating Kongeriket as a two-book subseries rather
    than a single standalone. The third best-selling book in Norway in 2024.
    Aschehoug's jacket for this book states outright what Kongeriket's own
    jacket withholds - that the sheriff has technology he believes proves
    "brødrene står bak en rekke drap som ligger tilbake i tid," and that the
    brothers have "litt erfaring med den slags." That is the sequel's
    publisher answering what the first book's own jacket declines to answer,
    so it is not carried into the synopsis above.
  # No cover: no Open Library record at all for this title (checked directly
  # and by sweeping the author's full 496-work Open Library listing) - too
  # recent for wide cataloguing as of the sources checked.
  sources:
    - https://no.wikipedia.org/wiki/Jo_Nesb%C3%B8
    - https://www.salomonssonagency.se/books/kongen-av-os/

