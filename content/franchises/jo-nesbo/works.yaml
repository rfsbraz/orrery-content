- id: jo-nesbo/gjenferd
  title: "Gjenferd"
  authorIds: [jo-nesbo]
  published: 2011
  subseries: "Harry Hole"
  canonTier: core
  synopsis: >
    Harry returns to Oslo to investigate the shooting of Oleg, the son of
    the woman he loves, and finds the city's drug trade rebuilt around a
