# FRANCHISE-SPECIFIC events only. Author-LIFE events (the father's Eastern
# Front confession, the 1997 debut, the 2007 start of Doktor Proktor) live on
# the author entity (content/authors/jo-nesbo.yaml). Shared world events live
# in content/events/global.yaml. Inline [[type:id|text]] refs must resolve.
#
# Each entry below is either Nesbø's own retrospective account of a specific
# book, or a documented reception/production rupture with named sources on
# both sides (a critic, a director, a national broadcaster) - not an award
# listing recorded for its own sake.

- id: jo-nesbo/di-derre-memoir-declined-1997
  date: 1997
  title: Turns down a Di Derre memoir, writes Flaggermusmannen instead
  scope: author-life
  reach: franchise
  impact: high
  description: >
    Burned out from a year of playing bass runs and bond trades in the same
    24 hours (a day job as a stockbroker, then a flight to that night's Di
    Derre gig, a few hours' sleep, and a flight back for the market open),
    Nesbø takes leave from both and books a trip to Sydney with a friend.
    Before he leaves, Janne Gro Rygg, an Aschehoug non-fiction editor he
    knew from his student days in Bergen, asks him to write a book about
    life on the road with the band. He turns her down - "what happens on
    the road stays on the road" - but tells her he might come back from
    Australia with something else entirely. On the Oslo-Sydney flight,
    carrying a laptop, he comes up with the character Harry Hole and the
    plot of what becomes [[work:jo-nesbo/flaggermusmannen|Flaggermusmannen]].
    Landing in Sydney in the middle of the night, jetlagged, he stays up
    while his friend sleeps and writes the book's opening chapter that same
    night: Harry Hole landing in Sydney and checking into the same hotel
    they are staying in.
  spoilerAfter: null
  sources:
    - https://bok365.no/artikkel/nesbo-loy-i-intervjuer/
    - https://www.nrk.no/kultur/_-suksessen-er-uhandgripelig-1.8222253

- id: jo-nesbo/kakerlakkene-reprise-1998
  date: 1998-09-18
  title: Reviewed on release as a slack rehash of the debut
  scope: culture
  reach: franchise
  impact: med
  description: >
    [[work:jo-nesbo/kakerlakkene|Kakerlakkene]] does not land as a repeat
    success. Reviewing it for Dagbladet the day of release, Terje Thorsen (the
    same critic who had praised the debut the year before) calls it "a heavy,
    slack and directionless reprise of Nesbø's more than promising debut
    novel," accusing it of drowning a thin plot in exoticism for exoticism's
    sake and singling out its use of child prostitution as a plot device as
    smacking of "period-appropriate political correctness" rather than earned
    material, with the Thailand setting itself dismissed as "pointless
    effect-chasing." The now-settled reputation of the fourteen-book Harry
    Hole run smooths over what a contemporary reader actually met: a second
    book judged, at the time, as the weaker one.
  spoilerAfter: null
  sources:
    - https://www.dagbladet.no/kultur/les-alle-anmeldelsene-og-stem-pa-jo-nesbos-boker/62809892

- id: jo-nesbo/stemmer-fra-balkan-nato-1999
  date: 1999-05
  title: A crime novelist sent to cover NATO's bombing of Yugoslavia
  scope: author-life
  reach: franchise
  impact: med
  description: >
    In May 1999, with NATO still bombing Yugoslavia over Kosovo, Nesbø's
    publisher Aschehoug sends him and journalist Espen Søbye to the region as,
    in Dagbladet's words at the time, "independent witnesses to the truth"
    with full latitude and no particular qualification for the job - by
    Nesbø's own account, complete amateurs at it. His half of the resulting
    book, [[work:jo-nesbo/stemmer-fra-balkan|Stemmer fra Balkan]], keeps to a
    restrained, close-up register: a Yugoslav ambassador in Oslo, seeking a
    visa, not yet aware his own ministry back home has been bombed that same
    day, "smiling the saddest of smiles"; young men in Sarajevo insisting the
    war had been "an excellent experience," because at least it left no time
    to grieve. Reviewing the book on release, Christopher Hals Gylseth calls
    Nesbø's contribution sympathetic, searching, "at times almost poetic," and
    judges it more restrained, if narrower in scope, than Søbye's own
    diary-form essay published alongside it. A crime novelist's only work of
    war reportage, written two years into the career that would define him.
  spoilerAfter: null
  sources:
    - https://www.dagbladet.no/kultur/1999/12/15/186247.html
    - https://en.wikipedia.org/wiki/Stemmer_fra_Balkan

- id: jo-nesbo/rodstrupe-fathers-history-2000
  date: 2000-10
  title: Turns his own father's history into Rødstrupe's plot
  scope: author-life
  reach: franchise
  impact: high
  description: >
    Reviewing [[work:jo-nesbo/rodstrupe|Rødstrupe]] on release, NRK's Leif
    Ekle describes its foundation as laid "in snowdrifts and trenches on the
    Eastern Front," in 1942, where a group of Norwegian frontkjempere -
    volunteers who fought under German command - "separate the wheat from the
    chaff," one of them building a nearly sixty-year identity scheme worthy of
    Houdini. The parallel to Nesbø's own family is not incidental: a scholarly
    account of his work (nordics.info, Aarhus University) states plainly that
    the novel's historical throughline "goes back to the Norwegian volunteers
    who, like Nesbø's own father, fought on the side of Nazi Germany." Nesbø
    confirms the connection directly himself in a later BBC World Book Club
    interview, saying he could picture his own father "in the German Nazi
    helmet" - the same father whose wartime service, and the prison sentence
    that followed it, he had learned of at fifteen. A private reckoning with
    his father's history becomes, in Rødstrupe, the historical machinery of a
    genre novel: the closest his fiction comes to writing his father directly.
  spoilerAfter: null
  sources:
    - https://www.nrk.no/kultur/rodstrupe-1.536778
    - https://nordics.info/show/artikel/jo-nesboe-b-1960
    - https://www.dagbladet.no/nyheter/jo-nesbos-far-kjempet-for-hitler/63657995

- id: jo-nesbo/rodstrupe-nitimen-poll-2004
  date: 2004
  title: Named the best Norwegian crime novel ever, in a national radio poll
  scope: culture
  reach: franchise
  impact: med
  description: >
    NRK's Nitimen runs a listener poll asking Norwegians to name the best
    Norwegian crime novel ever written, and [[work:jo-nesbo/rodstrupe|Rødstrupe]]
    wins it - one of several Norwegian publikumskåringar (Norsk biografisk
    leksikon also names a Bokklubben Krim og Spenning poll the same year and a
    Dagbladet ranking in 2009) that have kept the book at the top of Norwegian
    readers' own list of the genre's high-water mark. That domestic standing
    sits oddly alongside its more modest place in English-language reception,
    where it arrived translated as book three rather than the standalone
    landmark Norwegian readers already knew.
  spoilerAfter: null
  sources:
    - https://no.wikipedia.org/wiki/Jo_Nesb%C3%B8
    - https://nbl.snl.no/Jo_Nesb%C3%B8

- id: jo-nesbo/leopard-violence-regret-2012
  date: 2012-03-11
  title: Says, in his own words, he "went too far" with The Leopard's violence
  scope: author-life
  reach: franchise
  impact: high
  description: >
    Promoting [[work:jo-nesbo/gjenferd|Gjenferd]] (Phantom) in a Guardian
    interview, Nesbø volunteers an unprompted correction to his own record:
    "in [[work:jo-nesbo/panserhjerte|The Leopard]], in hindsight, I feel I
    went a little bit too far with screaming blood. There are a couple of
    scenes that I regret and wish I had the chance to rewrite." In the same
    conversation he describes rock climbing, taken up a few years earlier, as
    a deliberate cultivation of the same fear his fiction runs on ("the fear
    that I felt as a child... is still the fuel for my novels. I guess
    climbing also"), and gives an ambivalent, joking verdict on seeing his own
    novel [[work:jo-nesbo/hodejegerne|Hodejegerne]] on screen for the first
    time the year before: "that's like asking a gynaecologist, after he's
    examined a woman, whether he thinks she is sexy." Phantom's own turn away
    from graphic violence toward Harry as a father, which Nesbø names in the
    same interview, reads differently for the admission sitting next to it.
  spoilerAfter: null
  sources:
    - https://www.theguardian.com/theobserver/2012/mar/11/jo-nesbo-harry-hole-interview

- id: jo-nesbo/tom-johansen-scheme-2013
  date: 2013-10
  title: A fictional author's fictional cult novel becomes a real one
  scope: author-life
  reach: franchise
  impact: high
  description: >
    [[work:jo-nesbo/blod-pa-sno|Blod på snø]] begins, by Nesbø's own later
    account, as a mock-documentary he was writing about the kidnapping of an
    invented Norwegian-Danish author, "Tom Johansen" - a book that kept
    referring back to Johansen's own celebrated novel, "Blood on Snow", and a
    "slightly more desperate" sequel. Curious what those referenced books
    would actually read like, Nesbø wrote them himself and planned to publish
    both under Johansen's name as a real 1970s-set cult novel by a writer who
    had never existed: a Wikipedia page was built for Johansen and photographs
    sourced to stand in for him. In October 2013, with neither book yet
    published, Warner Bros bought the film rights with Leonardo DiCaprio
    attached to produce and possibly star. The scheme did not survive contact
    with Nesbø's foreign publisher's lawyers, who judged that marketing an
    invented author's book as an already-existing cult classic would be false
    advertising. Both novels appeared under Nesbø's own name instead - Blod på
    snø in 2015, [[work:jo-nesbo/mere-blod|Mere blod]] the same year - with
    proceeds going to the Harry Hole Foundation. "The point was the whole
    story around it," Nesbø told Dagbladet the day before Blod på snø's
    launch. "It wasn't just a regular pseudonym."
  spoilerAfter: null
  sources:
    - https://www.dagbladet.no/kultur/leonardo-di-caprio-tilknyttet-nesbo-filmatisering/62277830
    - https://variety.com/2013/film/news/leonardo-dicaprio-books-jo-nesbos-blood-in-the-snow-1200748353/
    - https://www.dagbladet.no/kultur/nesbos-nye-bok-ble-stoppet-av-advokater/60702650

- id: jo-nesbo/snowman-film-disowned-2017
  date: 2017-10
  title: The Snowman film is disowned by its own director
  scope: culture
  reach: franchise
  impact: med
  description: >
    The English-language film of [[work:jo-nesbo/snomannen|Snømannen]], with
    Tomas Alfredson directing a cast led by Michael Fassbender (Martin
    Scorsese, once attached to direct, stayed on as executive producer),
    opens in October 2017 to a 7% Rotten Tomatoes score internationally and
    mostly terningkast 2 (out of 6) from Norwegian critics, several of whom
    flag a Norwegian-geography error (Harry driving the Atlantic Ocean Road
    between Oslo and Rjukan) that no international reviewer could have
    caught. Alfredson tells NRK, Norway's public broadcaster, that the Norway
    shoot ran so short that 10 to 15 percent of the screenplay was never
    filmed, with the missing scenes patched in during a hastily arranged
    London shoot once further funding came through: "vi fekk ikkje med oss
    heile historia, og då vi kom til klippebordet, oppdaga vi at det var mykje
    som mangla" ("we didn't get the whole story with us, and when we got to
    the editing table we discovered a lot was missing"); on the Norwegian
    critics' factual nitpicks specifically, he says he doesn't care, since he
    was making a fiction film, not a documentary about Norwegian geography.
    Nesbø himself, asked by NRK weeks later, declines to comment on the
    reviews - "that's for the director to answer" - and says he still hasn't
    seen the film and has found that rather convenient, since it spares him
    the question of what he thinks of it; he says he expects to watch it
    eventually.
  spoilerAfter: null
  sources:
    - https://en.wikipedia.org/wiki/The_Snowman_(2017_film)
    - https://www.nrk.no/kultur/_snomannen_-regissor_-_-vi-hadde-for-darleg-tid-1.13728377
    - https://www.nrk.no/kultur/jo-nesbo-om-_snomannen_-filmen_-_-egentlig-vaert-greit-at-jeg-ikke-har-sett-den-1.13809877

- id: jo-nesbo/kniv-riverton-loop-2020
  date: 2020-05-06
  title: Wins the Riverton Prize a second time, 22 years after the first
  scope: culture
  reach: franchise
  impact: med
  description: >
    Twenty-two years after [[work:jo-nesbo/flaggermusmannen|Flaggermusmannen]]
    won him the Rivertonprisen (Den gylne revolver) as a debut novelist in
    1997, [[work:jo-nesbo/kniv|Kniv]] wins him the same prize a second time,
    presented in Oslo's Slottsparken by the same jury chair, literature
    professor Hans H. Skei, who had handed it to him the first time. "When I
    got the prize for my debut novel 22 years ago, I thought: 'wow, is it
    that easy to be the best'," Nesbø tells the crowd. "Now, some books
    later - which didn't win the prize - I know it isn't easy. That makes me
    appreciate this prize even more." Asked by NRK why this book, the
    twelfth in the series, should be the one to repeat the feat, his own
    answer is unadorned: "I think it's because it's pretty good."
  spoilerAfter: null
  sources:
    - https://www.nrk.no/kultur/rivertonprisen-til-jo-nesbo-1.15006363
    - https://www.aftenposten.no/kultur/i/MRGawo/rivertonprisen-til-jo-nesboe
