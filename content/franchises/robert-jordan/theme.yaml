# Branding for the Wheel of Time wing (see Orrery CONCEPT §6 - the design law).
# Personality through a restrained editorial system, NOT fantasy costume: no
# dragons, no scrollwork, no faux-rune type. A quiet age-of-legends palette, one
# modern display serif, and a single thin circular motif. Readability first.
preset: age-of-legends
palette:
  bg: "#0f1320"       # deep indigo near-black - a night sky, the Pattern
  surface: "#171c2e"  # a hair lifted, for cards
  ink: "#e8e2d0"      # warm parchment - high contrast, very readable
  muted: "#8f8ba0"    # slate-violet, for metadata
  accent: "#c8a24a"   # a single restrained gold - the ring, the Light; used sparingly
displayFace: spectral # a modern literary serif; headings only
signature: wheel-and-serpent
                      # one thin circular line - the Great Serpent ring, the
                      # snake eating its tail: time turning, an age ending and
                      # beginning. A single stroke, never a crest.
# The Wheel of Time shares its gold accent (#c8a24a), spectral display face
# and a fantasy-epic shelf position with brandon-sanderson - the two wings
# are linked in fact (Sanderson finished this series) as well as in genre,
# so they are the hardest pair in the catalogue to keep apart. Differentiated
# by material rather than mood: the series' own central metaphor is literally
# weaving ("the Wheel weaves as the Wheel wills," the Pattern of Ages), so
# this wing is drawn as though made of thread rather than of stone - textile,
# woven, organic - while Sanderson (above) is drawn as instrument. Motifs are
# pulled from the actual bibliography read in works.yaml and eras.yaml: the
# recurring braid-tugging habit of the series' women, the desert company's
# camouflage-weave cloth, spinning and looming as a literal echo of the
# Pattern, and the standing ruins of older Ages half-reclaimed by grass. No
# Aes Sedai rings, Flame of Tar Valon, Dragon banner or other in-world
# heraldry - those are props from the books' own covers, not the author's
# territory.
art:
  motifs:
    - warp and weft on a loom mid-weave, threads held under visible tension
    - a single long braid worked with an inlaid cord, pulled taut in the hand
    - a spinning wheel or distaff with wool caught mid-spin
    - a knotted or embroidered border pattern framing a scene, not the subject
    - sand-scoured, camouflage-weave cloth folded or laid flat across a chest or saddle
    - a standing stone circle or waystone, half-buried and moss-grown, from an older Age
  atmosphere: >
    Warm-worn and hand-made, generational rather than grand - the calm of
    craft passed hand to hand rather than wonder at magic. Pattern repeats
    across scale, the way the Wheel turns and an Age returns changed. Interiors
    are inns, weaving rooms and desert tents; exteriors are village greens,
    desert waste and the grass-grown ruins of ages that came before.
  lineCharacter: >
    Flowing, curved linework with no ruled edges at all, built from
    interlacing strokes the way a border is built from thread -
    illuminated-manuscript border logic, decorative repetition, curves where
    the sibling Sanderson wing draws straights.
  backgroundTexture: >
    Warm homespun linen or loosely woven canvas, visible weft and slubs in
    the paper itself - the grain of undyed cloth rather than vellum or laid
    paper fibre.
  accentUse: >
    Gold on exactly one element per image, never a fill or a wash: one pulled
    thread crossing the weave, a single knot in a cord, or one line of
    stitching along a border.
  avoid:
    - Aes Sedai rings, the Flame of Tar Valon, the Dragon banner or any in-world heraldry reproduced
    - glowing runes, magic-glow effects, molten or radiant light as spectacle
    - crowns, thrones and generic epic-fantasy poster trims
    - straight-ruled edges, crystalline or mineral textures, orthographic diagram framing
    - generic medieval-European heraldic beasts unrelated to the actual text
    - gold used as a wash, fill or glow rather than one exact thread or stitch
notes: >
  A restrained secondary-world edition, not a genre poster. Indigo night paper,
  warm parchment type, one thin gold circle for markers and links only. The
  wheel-and-serpent ring is the sole bold move - it echoes the series' own
  emblem of eternal return, and it doubles as the aura's timeline being literally
  circular. Everything else stays quiet and legible.
