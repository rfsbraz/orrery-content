# FRANCHISE-SPECIFIC events only. Author-LIFE events (the amyloidosis diagnosis,
# Jordan's death) live on the author entity (content/authors/robert-jordan.yaml),
# since they follow the person. This file holds the franchise-SIDE of the
# transition - the decisions made about the series itself - plus the adaptation.
# Inline references use [[type:id|text]] and must resolve.

- id: wot-pitched-1984
  date: 1984
  title: Tom Doherty asks for another series, and Jordan pitches a trilogy
  scope: industry
  reach: franchise
  impact: high
  description: >
    On the strength of the Conan novels, Tor's Tom Doherty asks Jordan if he has
    other book ideas. Jordan pitches an epic fantasy in "three books, tops";
    Doherty, dubious it will stay that short given how long Jordan's manuscripts
    run, signs him for six instead. Work on
    [[work:robert-jordan/the-eye-of-the-world|The Eye of the World]] begins in
    1984. Jordan later put his own early estimate differently: "I thought 'The
    Wheel of Time' was going to be five or six books. I didn't think they'd be
    this long." Whatever the number at any given stage, the plan and the
    outcome, fourteen volumes over twenty-nine years, are not the same thing.
  spoilerAfter: null
  sources:
    - https://en.wikipedia.org/wiki/Robert_Jordan
    - https://www.locusmag.com/2000/Issues/03/Jordan.html
    - https://thewertzone.blogspot.com/2018/01/the-genesis-of-wheel-of-time.html
    - "https://www.denofgeek.com/books/warrior-of-the-altaii-s-long-journey-to-publication/"

- id: wot-eotw-written-1988
  date: 1988
  dateRange: "1984-1988"
  title: Four years and an abandoned "chosen one" turn the story young
  scope: industry
  reach: franchise
  impact: high
  description: >
    Jordan spends four years drafting
    [[work:robert-jordan/the-eye-of-the-world|The Eye of the World]], not
    finishing it until late 1988 or into 1989. "The first book took four
    years," he says later; "the next five books took, on average, 14 months."
    Little of his original outline survives contact with the page: the
    earliest version centres on an older man who discovers late in life that
    he is the "chosen one" who must save the world. Partway through, Jordan
    deliberately moves the story closer to the tone of Tolkien's Fellowship of
    the Ring, making his protagonists younger and far less prepared for what
    is coming. Once he commits to that choice the writing goes easier, and he
    finishes the second volume, [[work:robert-jordan/the-great-hunt|The Great
    Hunt]], at roughly the same time Tor publishes the first. The Two Rivers
    farmboys who open the published book are the result of a mid-draft
    rewrite, not the original plan.
  spoilerAfter: null
  sources:
    - https://en.wikipedia.org/wiki/The_Wheel_of_Time
    - https://thewertzone.blogspot.com/2018/01/the-genesis-of-wheel-of-time.html
    - https://www.locusmag.com/2000/Issues/03/Jordan.html

- id: wot-dannil-cut-1989
  date: "1989-08"
  title: A cut character still rides the cover art
  scope: industry
  reach: franchise
  impact: med
  description: >
    Reading a draft of the manuscript, Harriet McDougal asks her husband what
    the point of Dannil, a fourth Two Rivers boy who trails Rand, Mat and
    Perrin without ever doing much, is meant to be. "He will become important
    somewhere around Book 5," Jordan tells her; she talks him into cutting
    Dannil rather than carrying a passenger for five books, and his few
    functions are folded into the other three. The cut comes late enough that
    Darrell K. Sweet's cover painting is never redone to match: an early
    preview edition Tor mails to bookshops in August 1989 to build advance
    interest still carries the extra rider, and McDougal is still fielding
    questions decades later about the "ghost" figure visible in the published
    art of a character no longer in the book.
  spoilerAfter: null
  sources:
    - "https://reactormag.com/talking-with-tom-a-conversation-between-tom-doherty-and-harriet-mcdougal/"
    - https://thewertzone.blogspot.com/2018/01/the-genesis-of-wheel-of-time.html

- id: wot-eotw-published-1990
  date: 1990-01-15
  title: The Eye of the World launches the series
  scope: industry
  reach: franchise
  impact: med
  description: >
    Tor publishes [[work:robert-jordan/the-eye-of-the-world|The Eye of the
    World]], Jordan's first work of original epic fantasy under his own
    signature name after three Fallon historicals, a western, and seven Conan
    novels written pseudonymously or as work for hire. The next five books
    follow at a punishing pace, on average one every fourteen months.
  spoilerAfter: null
  sources: [https://en.wikipedia.org/wiki/The_Eye_of_the_World]

- id: wot-slows-pace-1994
  date: 1994-10
  title: Jordan halts the yearly pace after Lord of Chaos
  scope: industry
  reach: franchise
  impact: high
  description: >
    Jordan finishes [[work:robert-jordan/lord-of-chaos|Lord of Chaos]] in August
    1994 and is on tour for it two months later, on the same fourteen-month
    schedule that produced the previous five books. He tells Tor there is not
    time to write the next one that fast: "I cannot write a book for you in time
    for you to publish it next fall." Tor accepts it. In his own account the
    admission is what makes room for
    [[work:robert-jordan/a-crown-of-swords|A Crown of Swords]] and
    [[work:robert-jordan/the-path-of-daggers|The Path of Daggers]], the two
    volumes that take nearly two years apiece and that readers come to call the
    slog: not a loss of ideas, by his telling, but a pace he stopped being able
    to sustain.
  spoilerAfter: null
  sources: [https://www.locusmag.com/2000/Issues/03/Jordan.html]

- id: wot-sanderson-chosen-2007
  date: 2007-12
  title: Harriet McDougal chooses Brandon Sanderson to finish the series
  scope: industry
  reach: franchise
  impact: high
  description: >
    Months after Jordan's death, his widow and editor Harriet McDougal selects
    [[author:brandon-sanderson|Brandon Sanderson]] - then a relatively new
    novelist - to complete the sequence from Jordan's notes. She reportedly read
    the ending of his Mistborn trilogy and knew. The choice defines everything
    that follows and is the franchise's central act of stewardship.
  spoilerAfter: null
  sources:
    - https://en.wikipedia.org/wiki/A_Memory_of_Light
    - https://dragonmount.com/

- id: wot-split-into-three-2009
  date: 2009
  title: The final volume is split into three
  scope: industry
  reach: franchise
  impact: med
  description: >
    Jordan had promised one concluding book, "A Memory of Light". The material
    proved far too large, and publisher Tor and Sanderson split it into three
    volumes released 2009-2013 - the title kept for the last. A practical
    decision that reshaped how the ending was read and paced.
  spoilerAfter: null
  sources: [https://en.wikipedia.org/wiki/A_Memory_of_Light]

- id: wot-amazon-adaptation-2021
  date: 2021-11-19
  title: Amazon's The Wheel of Time premieres
  scope: culture
  reach: franchise
  impact: med
  description: >
    Amazon Prime Video launches a high-budget television adaptation, bringing the
    series to a mass audience decades after the first book and driving a wave of
    new readers to the novels.
  spoilerAfter: null
  sources: [https://en.wikipedia.org/wiki/The_Wheel_of_Time_(TV_series)]
