# Creative periods - the narrative spine of the aura. The eras track the writing
# of The Wheel of Time and, above all, the author transition that defines it.
# Inline references use [[type:id|text]] and must resolve.
#
# The career before 1990 carries no era, deliberately. Eleven works were
# published between 1980 and 1984 (three Fallon historicals as Reagan O'Neal,
# Cheyenne Raiders as Jackson O'Reilly, seven Conan novels as Robert Jordan) and
# no source outside this repo periodises them. Checked: obituaries and death
# notices (Deseret News 2007-09-17, CBC, Black Gate's retrospective), the South
# Carolina Encyclopedia entry, and the EBSCO reference biography. All four
# narrate the years chronologically and name no phase; Black Gate periodises
# only inside the sequence (locating the "creeping bloat" at The Fires of
# Heaven). Searched in English only, which is the author's language.
#
# Publishing-historical fact is available and does not fit. The two candidate
# facts each cover part of the span and neither covers it whole: the Reagan
# O'Neal historicals run 1980-1982, and the Tor Conan licence (commissioned by
# Tom Doherty, seven novels) runs 1982-1984. Era membership is computed from the
# publication year, so any span drawn around either fact swallows works it does
# not describe: 1982 alone holds The Fallon Legacy, Cheyenne Raiders,
# Conan the Invincible and Conan the Defender, three bylines and three genres in
# one year. A plate reading "ENTERING <anything>" over that year would be false
# for most of what it covers. The gap is the honest record of a career that
# nobody has periodised, not a coverage defect to close.
#
# Sources for the negative result:
#   https://www.scencyclopedia.org/sce/entries/jordan-robert/
#   https://www.deseret.com/2007/9/17/20041708/novelist-robert-jordan-author-of-hugely-popular-wheel-of-time-fantasy-series-dies-at-58/
#   https://www.ebsco.com/research-starters/biography/robert-jordan
#   https://www.blackgate.com/the-death-and-legacy-of-robert-jordan-james-oliver-rigney-jr-1948-2007/
#
# Works outside every era span, and why each is left there:
#   the-fallon-blood (1980), the-fallon-pride (1981), the-fallon-legacy (1982),
#   cheyenne-raiders (1982), conan-the-invincible (1982), conan-the-defender
#   (1982), conan-the-unconquered (1983), conan-the-triumphant (1983),
#   conan-the-magnificent (1984), conan-the-destroyer (1984),
#   conan-the-victorious (1984): the unperiodised early career, above.
#   new-spring (2004) and knife-of-dreams (2005): the slog ends at Crossroads of
#   Twilight (2003) by the consensus the era borrows its name from, and Knife of
#   Dreams is the book that consensus credits with the recovery, so it cannot sit
#   inside the period it escapes. The 2004-2005 gap is that boundary's cost.
#   the-wheel-of-time-companion (2015): a reference volume compiled by Harriet
#   McDougal, Alan Romanczuk and Maria Simons and published two years after the
#   sequence ended. It sits outside the creative eras because it is not part of
#   the writing they periodise.
#   warrior-of-the-altaii (2019): genuinely outside, and the clearest case in the
#   wing. Jordan wrote it around 1977, before The Fallon Blood; it was sold twice
#   (Donald Wollheim at DAW, then Jim Baen at Ace) and published by neither, and
#   Tor issued it on 9 October 2019, twelve years after his death. Its
#   publication year records when the estate released a trunk novel, not when he
#   was working, so no era of his career can honestly contain it.
#   Source: https://reactormag.com/robert-jordan-warrior-of-the-altaii-coming-from-tor-books-in-2019/

- id: the-turning-of-the-wheel
  title: The Turning of the Wheel
  period: "1990-1994"
  themes: [prophecy and rebirth, the world at full scale, gender and the One Power, coming of age]
  provenance: none
  description: >
    The foundational surge. [[work:robert-jordan/the-eye-of-the-world|The Eye of the World]]
    through [[work:robert-jordan/lord-of-chaos|Lord of Chaos]] arrive almost yearly,
    building the deepest secondary world in modern fantasy and its central engine:
    a saviour who must save the world and go mad doing it. The series is a
    phenomenon and the pace is relentless.
  note: >
    UNSOURCED as a period. "The Turning of the Wheel" is our coinage, a pun on
    the series title; no source periodises the early books this way, though the
    label is descriptive rather than evaluative. The 1990 start is exact (The
    Eye of the World). The 1994 end is ours and is contested: Black Gate's
    Jordan retrospective locates the first signs of bloat earlier, in The Fires
    of Heaven (1993), and says they "bloomed to full flower" in Lord of Chaos,
    which this era currently contains.
  sources:
    - https://www.blackgate.com/the-death-and-legacy-of-robert-jordan-james-oliver-rigney-jr-1948-2007/

- id: the-long-middle
  title: The Slog
  period: "1996-2003"
  themes: [sprawl and patience, the widening cast, the prequel, mortality]
  provenance: fandom
  description: >
    The stretch readers came to call the slog: books grow denser and slower from
    [[work:robert-jordan/a-crown-of-swords|A Crown of Swords]] through
    [[work:robert-jordan/crossroads-of-twilight|Crossroads of Twilight]], with
    the prequel [[work:robert-jordan/new-spring|New Spring]] arriving in the
    middle of it. It is the name fans give the run they most often stop at, and
    the one they credit [[work:robert-jordan/knife-of-dreams|Knife of Dreams]]
    (2005) with pulling the series out of.
  note: >
    RECEIVED, and retitled to the received term. "The Long Middle" was our
    coinage; "the slog" is settled fandom consensus, used by independent sources
    as common knowledge rather than introduced as a proposal. It has no origin
    document, so three separate uses are cited rather than one. The term is
    evaluative, which is permitted here only because it is genuinely received -
    hence the description attributes it to readers rather than asserting it.
    The end date was corrected from 2005 to 2003: consensus puts the slog at
    books 7-10, ending at Crossroads of Twilight, with Knife of Dreams as the
    recovery from it, so the old span swallowed the escape book. The start is
    the fuzzy end - sources note some readers include Lord of Chaos (book 6) and
    others hold that the slowdown only really lands mid-Path of Daggers. That
    leaves 2004-2005 uncovered, which is a legitimate gap rather than a defect.
  sources:
    - https://www.thegreatblight.com/post/let-s-talk-about-the-slog-is-it-real
    - https://winteriscoming.net/the-wheel-of-time-the-slog-is-real-but-don-t-let-it-stop-you
    - https://booknookcook.com/wheel-of-time-slog/

- id: the-succession
  title: The Succession
  period: "2006-2008"
  themes: [loss, stewardship, the notes, choosing an heir]
  provenance: publishing
  description: >
    The pivot the whole franchise turns on. Robert Jordan dies in 2007 with the
    ending planned but unwritten. His widow and editor Harriet McDougal, holding
    his notes and dictated scenes, chooses a younger writer to finish the series -
    a decision with no real precedent at this scale in the genre. Tor announced
    the choice on 7 December 2007.
  note: >
    The label is ours, but it is descriptive and every fact under it is hard and
    dated: Jordan announced his cardiac amyloidosis on 23 March 2006, died on 16
    September 2007, and Tor named Sanderson on 7 December 2007. The 2008 end is
    ours; the natural hard boundary would be The Gathering Storm in October
    2009, which is where the next era begins.
  sources:
    - https://en.wikipedia.org/wiki/Robert_Jordan
    - https://www.blackgate.com/the-death-and-legacy-of-robert-jordan-james-oliver-rigney-jr-1948-2007/

- id: the-completion
  title: The Completion
  period: "2009-2013"
  themes: [another hand, fidelity to the notes, the Last Battle, ending]
  provenance: publishing
  description: >
    [[author:brandon-sanderson|Brandon Sanderson]] finishes the sequence from
    Jordan's material, the planned final volume split into three -
    [[work:robert-jordan/the-gathering-storm|The Gathering Storm]],
    [[work:robert-jordan/towers-of-midnight|Towers of Midnight]], and
    [[work:robert-jordan/a-memory-of-light|A Memory of Light]]. Readers spend
    three books feeling two authors at once: the plan is Jordan's, the sentences
    are Sanderson's.
  note: >
    The label is ours but states a fact about the record rather than judging the
    books, and both boundaries are exact publication dates (The Gathering Storm,
    October 2009; A Memory of Light, January 2013) rather than rounded years -
    the only era in this wing of which that is true.
  sources:
    - https://en.wikipedia.org/wiki/Brandon_Sanderson_bibliography
