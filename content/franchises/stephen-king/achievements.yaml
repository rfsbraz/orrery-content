# Stephen King badges. IDs are prefixed with the franchise slug so they never
# collide across wings; criteria reference this franchise's own eras/orders,
# which the validator resolves.

- id: stephen-king/devotee
  name: Devotee
  description: Read 10 Stephen King works.
  icon: "🔟"
  tier: silver
  category: completion
  criteria:
    kind: read_count
    count: 10
    franchiseId: stephen-king

- id: stephen-king/golden-decade
