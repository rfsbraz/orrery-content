# Recurring figures that thread works together (docs/SCHEMA.md). Kept to a
# tight roster of genuine connective tissue, not a character wiki. Appearances
# whose existence is itself a reveal carry spoilerAfter.

- id: stephen-king/roland-deschain
  name: Roland Deschain
  aka: ["The Gunslinger", "The Last Gunslinger"]
  description: >
    The last gunslinger of a world that has moved on, pursuing the Dark Tower
    across the eight books of the cycle - the axis the wider multiverse turns on.
  appearsIn:
    - workId: stephen-king/the-gunslinger
      note: The pursuit begins.
    - workId: stephen-king/the-drawing-of-the-three
    - workId: stephen-king/the-waste-lands
    - workId: stephen-king/wizard-and-glass
      note: His youth in Mejis, the heart of his backstory.
    - workId: stephen-king/the-wind-through-the-keyhole
    - workId: stephen-king/wolves-of-the-calla
    - workId: stephen-king/song-of-susannah
    - workId: stephen-king/the-dark-tower
  sources:
    - https://en.wikipedia.org/wiki/Roland_Deschain

- id: stephen-king/randall-flagg
  name: Randall Flagg
  aka: ["The Walkin Dude", "The Man in Black", "Walter o'Dim"]
  description: >
    King's wandering agent of chaos - the demagogue of the ruined world, the
    court magician, the man in black fleeing across the desert. The clearest
    proof the books share one multiverse.
  appearsIn:
    - workId: stephen-king/the-stand
      note: The dark man of the post-plague American West.
    - workId: stephen-king/the-eyes-of-the-dragon
      note: The court magician of Delain.
    - workId: stephen-king/the-gunslinger
      note: The man in black, revealed across the cycle to be the same figure.
      spoilerAfter: stephen-king/wizard-and-glass
    - workId: stephen-king/wizard-and-glass
      spoilerAfter: stephen-king/wizard-and-glass
    - workId: stephen-king/the-dark-tower
      spoilerAfter: stephen-king/song-of-susannah
  sources:
    - https://en.wikipedia.org/wiki/Randall_Flagg

- id: stephen-king/father-callahan
  name: Father Donald Callahan
  description: >
    The priest of Jerusalem's Lot whose broken faith becomes one of King's
    longest redemption arcs.
  appearsIn:
    - workId: stephen-king/salems-lot
      note: The parish priest who faces Barlow.
    - workId: stephen-king/wolves-of-the-calla
      note: His reappearance here, decades later, is one of the great surprises
        of the Dark Tower cycle.
      spoilerAfter: stephen-king/wolves-of-the-calla
    - workId: stephen-king/song-of-susannah
      spoilerAfter: stephen-king/wolves-of-the-calla
    - workId: stephen-king/the-dark-tower
      spoilerAfter: stephen-king/wolves-of-the-calla
  sources:
    - https://en.wikipedia.org/wiki/Father_Callahan
