# ADDITIONAL canon orders only. The DEFAULT order - all published works in
# publication-chronological order - is derived automatically from works.yaml and
# is NOT listed here (see Orrery CONCEPT §4b). Community/user orders live in the
# app database (§4a). Each order below references stable Work IDs only.
#
# NOTE: works.yaml is currently a first pass (core novels + Dark Tower + Bachman +
# key collections), so the derived default order is not yet the COMPLETE
# bibliography. Completing works.yaml to all published works is a curation TODO.

- id: stephen-king/dark-tower-connected
  name: The Dark Tower - connected reading order
  type: curated
  source: canon
  rationale: >
    The Dark Tower reads fine on its own, but several other novels deepen it -
    they introduce characters and cosmology that pay off inside the cycle. This
    weaves the eight Tower books with the key connected novels at the points
    where they enrich the quest. Connections are rewarding, not required.
  orderedWorkIds:
    - stephen-king/the-gunslinger
    - stephen-king/the-drawing-of-the-three
    - stephen-king/the-stand
    - stephen-king/the-eyes-of-the-dragon
    - stephen-king/the-waste-lands
    - stephen-king/wizard-and-glass
    - stephen-king/the-wind-through-the-keyhole
    - stephen-king/hearts-in-atlantis
    - stephen-king/salems-lot
    - stephen-king/wolves-of-the-calla
    - stephen-king/song-of-susannah
    - stephen-king/insomnia
    - stephen-king/black-house
    - stephen-king/the-dark-tower
  debated:
    - "Exact insertion points for the connected novels vary between guides; many readers instead read all connections in publication order."
    - "The Wind Through the Keyhole (written later, set between IV and V) can be read at its story position, as here, or in publication order."
    - "'Salem's Lot is placed before Wolves of the Calla for Father Callahan, whom the Calla jacket copy introduces outright; Insomnia is placed before The Dark Tower because it feeds the ending, though readers who prefer to meet that cold can leave it in publication order."
  sources:
    - https://www.slashfilm.com/905247/the-proper-reading-order-for-stephen-kings-the-dark-tower/
    - https://chartingthetower.wordpress.com/2020/06/17/extended-dark-tower-reading-order/
