id: stephen-king
name: Stephen King
kind: author
description: >
  Five decades of American horror and dark fiction, from small-town Maine
  hauntings to a genre-spanning multiverse held together by the Dark Tower.
authorIds: [stephen-king]
themePreset: pulp-horror

# Wide banner for the wing. King's own house on West Broadway in Bangor - the
# red Italianate with the bat-and-cobweb gate - reads as the franchise rather
# than as any one adaptation, and the source is a 5712x4284 Commons original so
# a wide crop still holds detail. Wikimedia Commons, CC BY-SA 2.0.
images:
  header: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Stephen_King_House%2C_Broadway%2C_Whitney_Park%2C_Bangor%2C_ME_%2854367308863%29.jpg/1920px-Stephen_King_House%2C_Broadway%2C_Whitney_Park%2C_Bangor%2C_ME_%2854367308863%29.jpg"
  headerCredit: "Warren LeMay, CC BY-SA 2.0"
  headerSource: "https://commons.wikimedia.org/wiki/File:Stephen_King_House,_Broadway,_Whitney_Park,_Bangor,_ME_(54367308863).jpg"

# Capabilities (docs/SCHEMA.md). Everything is auto-detected from the data;
# listed explicitly here only as the reference example for other franchises.
features:
  river: auto
  wizard: auto
  connections: auto
  companion: auto
  hall: auto
  editions: auto

# Which shared global events actually reach this author (docs/SCHEMA.md). The
# app already filters global.yaml to the authors' lifetimes; this is the
# judgement on top. King has
# exactly one franchise event of his own across 95 works, so borrowed world
# history is very easy to over-serve here. Kept by default and deliberately:
# lady-chatterley-trial-1960, fantasy-paperback-boom-1965, chain-bookshop-1982,
# sept-11-2001, ebook-and-self-publishing-2007, covid-19-pandemic-2020.
globalEvents:
  include:
    - sept-11-2001                    # inherited from the lifetime default, not yet ruled on
    - covid-19-pandemic-2020          # inherited from the lifetime default, not yet ruled on
    - lady-chatterley-trial-1960      # inherited from the lifetime default, not yet ruled on
    - fantasy-paperback-boom-1965     # inherited from the lifetime default, not yet ruled on
    - chain-bookshop-1982             # inherited from the lifetime default, not yet ruled on
    - ebook-and-self-publishing-2007  # inherited from the lifetime default, not yet ruled on
  # Considered and refused. Nothing renders unless it is in `include`
  # above, so these change nothing; they are kept as the record of a
  # judgement already made, so it is not re-litigated from scratch.
  exclude:
    - carnation-revolution-1974          # Portuguese censorship; no Maine novel answers it
    - online-bookselling-1995            # he never went out of print, so backlist rediscovery is not his story
    - financial-crisis-2008              # one recession job-queue scene opening Mr. Mercedes, and nothing else
    - prestige-fantasy-adaptation-2011   # the most-adapted author alive, but through horror film since 1976
    - booktok-2020                       # already the best-selling novelist alive; reader video moved nothing
    - portugal-bailout-2011              # a Portuguese national crisis; Maine is the whole geography and no novel answers it
# entry recommendations tagged with who they fit; the app matches a reader's
# two answers (experience, commitment) against the fit tags.
startHere:
  paths:
    # FLAGGED, most seriously in this file: this specific five-book set has the
    # shape of our own curation rather than a received recommendation, and no
    # guide converging on exactly these five was found. Verified negative:
    # https://stephenking.com/faq/ carries no "where should I start" answer and
    # no reading-order guidance at all, so the strongest class of source (the
    # author's own advice) does not exist for King. Either source the five
    # against a well-known guide or reframe the path as an explicitly curated
    # sampler - a curator ruling, since it changes what a reader is told. Kept,
    # because the underlying advice (spread the sample across decades rather
    # than starting in the seventies) is sound.
    - id: essentials
      title: The essentials
      description: >
        Five landmark books that show the full range - the haunted hotel, the
        coming-of-age nightmare, the apocalypse, the locked room, and the time
        machine. If these land, everything else is open.
      workIds:
        - stephen-king/the-shining
        - stephen-king/it
        - stephen-king/the-stand
        - stephen-king/misery
        - stephen-king/11-22-63
      orderId: null
      fit:
        experience: [new]
        commitment: [taste]
      note: >
        Deliberately spread across decades so you feel the range, not just the
        seventies horror King is filed under.
    - id: dark-tower-first
      title: Straight into the Dark Tower
      description: >
        The spine of the multiverse. The connected order weaves the eight Tower
        books with the novels that feed them, at the points where they pay off.
      workIds: null
      orderId: stephen-king/dark-tower-connected
      fit:
        experience: [new, returning]
        commitment: [arc]
    - id: short-first
      title: Start short
      description: >
        King is one of the great short-story writers; the collections are a
        low-commitment way in, and several stories seeded the famous novels.
      workIds:
        - stephen-king/night-shift
        - stephen-king/skeleton-crew
        - stephen-king/different-seasons
      orderId: null
      fit:
        experience: [new]
        commitment: [taste]
    - id: the-long-walk
      title: The whole road, from Carrie on
      description: >
        Publication order, all of it. You watch the writer grow up, break,
        recover, and keep going - the aura layer is built for exactly this walk.
      workIds: null
      orderId: default
      fit:
        experience: [returning, completionist]
        commitment: [complete]

# Core novels, the Dark Tower cycle, the Richard Bachman books, and key
# collections are covered; the long tail of short-story collections and
# nonfiction is marked extended and can be appended.
sources:
  - https://en.wikipedia.org/wiki/Stephen_King_bibliography
  - https://stephenking.com/works/
