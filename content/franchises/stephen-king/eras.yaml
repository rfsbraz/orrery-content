# Creative periods - the narrative spine of the aura. Inline references use
# [[type:id|text]] and must resolve (see CONCEPT §4c).
#
# PROVENANCE WARNING: King has no received career periodisation. The only
# phrase-level periodisation found in published sources is the Twayne pair
# (Reino 1988, Magistrale 1992), which covers 1974-1989 only. Eras 3-6 below
# are our own shape on decade boundaries, flagged rather than silently deleted.
- id: birth-of-the-master
  title: The Doubleday Years
  period: "1974-1978"
  themes: [small-town horror, telekinesis and psychic powers, gothic Maine, blue-collar characters]
  provenance: publishing
  description: >
    The five novels King wrote under his first publisher, from a high-school
    teacher selling [[work:stephen-king/carrie|Carrie]] for a $2,500 advance to
    a household name. [[work:stephen-king/salems-lot|'Salem's Lot]],
    [[work:stephen-king/the-shining|The Shining]] and
    [[work:stephen-king/the-stand|The Stand]] establish literary horror with a
    working-class heart, set in a mythic small-town Maine. King left Doubleday
    over the paperback split; [[work:stephen-king/the-dead-zone|The Dead Zone]]
    (1979) was the first book of the Viking and New American Library deal that
    followed.
  note: >
    Retitled from "Birth of the Master", which was our coinage and a verdict.
    The boundary is now a publishing fact (the Doubleday run) rather than a
    rounded decade. Joseph Reino's Twayne study "Stephen King: The First Decade,
    Carrie to Pet Sematary" (1988) periodises this stretch as running to 1983,
    not 1978 - a curator may prefer that span, at the cost of overlapping the
    next era.
  sources:
    - https://en.wikipedia.org/wiki/Stephen_King_bibliography
    - http://archive.nytimes.com/www.nytimes.com/books/97/03/09/lifetimes/kin-v-behind.html
    - https://openlibrary.org/works/OL4972321W

- id: the-golden-decade
  title: The Second Decade
  period: "1981-1989"
  themes: [childhood trauma, addiction metaphors, epic scope, the Bachman experiment]
  provenance: critical
  description: >
    The span Tony Magistrale's Twayne study fixes as King's second decade,
    running from [[work:stephen-king/danse-macabre|Danse Macabre]] to
    [[work:stephen-king/the-dark-half|The Dark Half]]. Peak output and
    commercial dominance - [[work:stephen-king/it|IT]],
    [[work:stephen-king/misery|Misery]], [[work:stephen-king/pet-sematary|Pet Sematary]],
    [[work:stephen-king/christine|Christine]], the first Dark Tower volumes -
    written through the depths of addiction, and the years in which the Richard
    Bachman pen name runs and is unmasked (1985).
  note: >
    Retitled from "The Golden Decade", which was our coinage. No source was
    found using "golden decade" or "golden age" of 1980s King; the nearest press
    framing is productivity, not a quality verdict. The title and both
    boundaries now follow Magistrale's subtitle, which names its own boundary
    works.
  sources:
    - https://openlibrary.org/works/OL2007123W
    - https://www.encyclopedia.com/arts/culture-magazines/king-stephen-1947
    - https://en.wikipedia.org/wiki/Richard_Bachman

- id: psychological-maturity
  title: The Nineties
  period: "1990-1999"
  themes: [sobriety, gender and domestic violence, writers and writing, redemption]
  provenance: none
  description: >
    Newly sober, King turns inward: [[work:stephen-king/geralds-game|Gerald's Game]],
    [[work:stephen-king/dolores-claiborne|Dolores Claiborne]], the serialized
    [[work:stephen-king/the-green-mile|Green Mile]], [[work:stephen-king/bag-of-bones|Bag of Bones]].
    The decade ends with the near-fatal roadside accident of 19 June 1999 that
    reshapes the work that follows.
  note: >
    UNSOURCED - recommended for removal or merging. Retitled from "Psychological
    Maturity", which was our coinage and a critical verdict the site is not
    entitled to make (it implies the earlier books were immature). No published
    periodisation of King breaks at either 1990 or 1999; the real periodisations
    found break at 1983, 1987, 1989/1991, 1999, 2004 and 2006. The flat
    replacement title asserts nothing while the curator decides. The 1999
    accident is the one hard boundary here and is sourced.
  sources:
    - https://en.wikipedia.org/wiki/On_Writing:_A_Memoir_of_the_Craft

- id: the-tower-and-after
  title: The Tower and After
  period: "2000-2009"
  themes: [mortality and recovery, completing the Dark Tower, formal experiments]
  provenance: none
  description: >
    Writing through chronic pain, King races to finish the Dark Tower
    ([[work:stephen-king/wolves-of-the-calla|V]]-[[work:stephen-king/the-dark-tower|VII]],
    2003-2004), publishes [[work:stephen-king/on-writing|On Writing]], and
    experiments with form (serial, Hard Case Crime, collaborations). A period
    shadowed by the accident.
  note: >
    UNSOURCED - recommended for removal or re-cutting. The label is ours, though
    descriptive rather than evaluative, and it names a real dated fact: the
    seventh Dark Tower volume was published 21 September 2004. The 2009 end is
    pure decade-rounding. If kept, the honest span is 2000-2004, which would
    leave 2005-2009 uncovered - a legitimate gap under the eras skill.
  sources:
    - https://en.wikipedia.org/wiki/The_Dark_Tower_VII:_The_Dark_Tower

- id: the-elder-statesman
  title: The 2010s
  period: "2010-2019"
  themes: [crime and detective fiction, Americana, legacy and sequels]
  provenance: none
  description: >
    A prolific late run: [[work:stephen-king/11-22-63|11/22/63]], the
    Bill Hodges crime trilogy, [[work:stephen-king/doctor-sleep|Doctor Sleep]]
    (a Shining sequel), [[work:stephen-king/revival|Revival]],
    [[work:stephen-king/the-outsider|The Outsider]],
    [[work:stephen-king/the-institute|The Institute]]. A warm, propulsive,
    less-supernatural mode.
  note: >
    UNSOURCED - recommended for removal or merging into a single late period.
    Retitled from "The Elder Statesman", which was our coinage and an honorific
    verdict; the phrase was not found applied to King anywhere, and King has
    said the opposite of himself ("I don't want to be the grand ol' man",
    People, 1999). No periodisation found breaks at 2010 or 2019. The
    replacement title is flat by design and asserts nothing.
  sources:
    - https://www.pressherald.com/2024/04/05/stephen-kings-50-year-career-has-inspired-a-generation-of-writers-and-teachers/

- id: late-king
  title: Late King
  period: "2020-present"
  themes: [pandemic-era reflection, fairy tale and myth, the Holly Gibney novels]
  provenance: none
  description: >
    Undimmed output into his seventies: [[work:stephen-king/billy-summers|Billy Summers]],
    the myth-steeped [[work:stephen-king/fairy-tale|Fairy Tale]], and Holly Gibney
    graduating to lead her own books ([[work:stephen-king/holly|Holly]],
    [[work:stephen-king/never-flinch|Never Flinch]]). Elegiac and craft-forward,
    still restless.
  note: >
    UNSOURCED - recommended for merging with the two eras above into one late
    period. "Late King" is our label, though it is a generic art-historical
    descriptor rather than a verdict, so it is the least harmful of the four
    unsourced eras. The last boundary any published periodisation draws is
    2005/2006, not 2020.
  sources:
    - https://en.wikipedia.org/wiki/Stephen_King
