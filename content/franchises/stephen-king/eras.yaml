# Creative periods - the narrative spine of the aura. Characterizations draw on
# the prior King prototype and are curator-editable.
- id: birth-of-the-master
  title: Birth of the Master
  period: "1974-1979"
  themes: [small-town horror, telekinesis and psychic powers, gothic Maine, blue-collar characters]
  description: >
    From high-school teacher to household name. Carrie, 'Salem's Lot, The
    Shining and The Stand establish the "Stephen King brand": literary horror
    with working-class heart, set in a mythic small-town Maine.

- id: the-golden-decade
  title: The Golden Decade
  period: "1980-1989"
  themes: [childhood trauma, addiction metaphors, epic scope, the Bachman experiment]
  description: >
    Peak creativity and commercial dominance - IT, Misery, Pet Sematary,
    Christine, the first Dark Tower volumes - written through the depths of
    addiction. The Richard Bachman pen name runs and is unmasked (1985).

- id: psychological-maturity
  title: Psychological Maturity
  period: "1990-1999"
  themes: [sobriety, gender and domestic violence, writers and writing, redemption]
  description: >
    Newly sober, King turns inward: Gerald's Game, Dolores Claiborne, the
    serialized Green Mile, Bag of Bones. The decade ends with the near-fatal
    1999 roadside accident that reshapes the work that follows.

- id: the-tower-and-after
  title: The Tower and After
  period: "2000-2009"
  themes: [mortality and recovery, completing the Dark Tower, formal experiments]
  description: >
    Writing through chronic pain, King races to finish the Dark Tower
    (Books V-VII, 2003-2004), publishes On Writing, and experiments with form
    (serial, Hard Case Crime, collaborations). A period shadowed by the accident.

- id: the-elder-statesman
  title: The Elder Statesman
  period: "2010-2019"
  themes: [crime and detective fiction, Americana, legacy and sequels]
  description: >
    A prolific late renaissance: 11/22/63, the Bill Hodges crime trilogy,
    Doctor Sleep (a Shining sequel), Revival, The Outsider, The Institute.
    Widely honored as a living master; a warm, propulsive, less-supernatural mode.

- id: late-king
  title: Late King
  period: "2020-present"
  themes: [pandemic-era reflection, fairy tale and myth, the Holly Gibney novels]
  description: >
    Undimmed output into his seventies: Billy Summers, the myth-steeped Fairy
    Tale, and Holly Gibney graduating to lead her own books (Holly, Never
    Flinch). Elegiac and craft-forward, still restless.
