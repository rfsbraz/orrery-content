- id: stephen-king
  name: Stephen King
  born: 1947-09-21
  bio: >
    American author of horror, supernatural, suspense, crime, and fantasy
    fiction. Born in Portland, Maine; worked as a high-school English teacher
    before Carrie (1974) launched his career. One of the best-selling authors
    of all time, with a body of work loosely unified by a shared multiverse
    centred on the Dark Tower.
  pseudonyms:
    - name: Richard Bachman
      note: >
        A pen name King used from 1977 to publish darker, more experimental
        work and to test whether his success was talent or luck. Publicly
        unmasked in 1985 by a bookstore clerk; King wrote "The Dark Half" (1989)
        partly in response. Bachman titles are included here as core works.
  sources:
    - https://en.wikipedia.org/wiki/Stephen_King
    - https://en.wikipedia.org/wiki/Richard_Bachman
