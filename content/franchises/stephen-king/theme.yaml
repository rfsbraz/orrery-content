# Branding for the Stephen King wing (see Orrery CONCEPT §6 - the design law).
# Personality through a modern editorial system, NOT genre costume: a considered
# palette, one characterful-but-modern display face, and one signature. No word
# art, no literal horror textures, readability first.
preset: literary-noir
palette:
  bg: "#15110d"       # warm near-black (paper in low light), not pure black
  surface: "#1f1913"  # a hair lifted, for cards
  ink: "#ece3d4"      # warm bone - high contrast, very readable
  muted: "#9a8f7e"    # aged-paper grey, for metadata
  accent: "#b04a34"   # restrained oxblood - a worn paperback spine, used sparingly
displayFace: fraunces # characterful literary serif, modern; headings only
signature: beam       # a continuous vertical line the works are strung along,
                      # echoing the Dark Tower connecting the whole multiverse
art:
  motifs:
    - a clapboard house on a small Maine street, a storm coming
    - a storm drain or culvert at the edge of a road
    - a gas station or diner sign lit at dusk, no cars in the lot
    - utility poles and sagging power lines against a heavy sky
    - an overgrown quarry, gravel pit or back lot behind the houses
    - an ordinary object held a half-second too long - a bicycle on its
      side, a dog's chain, a child's toy left in the yard
  atmosphere: >
    Dread inside the ordinary, not inside a monster. Small-town Maine
    weather does the work a jump-scare would do elsewhere - a storm
    building, humidity before rain, the particular quiet of a street where
    something is wrong and no one has said so yet. Blue-collar and
    unglamorous; nothing here is gothic architecture, it is a street you
    could actually live on.
  lineCharacter: >
    Heavy, grainy scratchboard or coarse woodcut, cut rather than drawn -
    black doing most of the work, white scratched out of it. High contrast,
    rough edges, no smooth tonal wash and no delicate line.
  backgroundTexture: >
    Dark, coarse-grained paper with the tooth of scratchboard, ink pooling
    heavy in the low corners and thinning where the cut runs shallow - no
    laid-paper fibre, no clean wash.
  accentUse: >
    Oxblood rust-red on exactly one element per image, never as a fill: a
    rusted fire hydrant, a single porch light left burning, a length of
    twine tied to a fence post.
  avoid:
    - horror-movie iconography - fog machines, jump-scare staging, monster
      close-ups
    - blood, gore or slasher texture
    - clowns or any direct Pennywise reference
    - anything that reads as a mass-market paperback cover
    - the supernatural made literal on the page - the dread stays implied
notes: >
  A serious literary edition, not a horror poster. Warm dark paper, bone type,
  a single oxblood accent for links and markers only. The Beam is the one bold
  move; everything else stays quiet and readable.
