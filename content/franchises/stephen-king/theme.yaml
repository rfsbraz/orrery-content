# Branding preset for the Stephen King wing (see Orrery CONCEPT §6).
# A curator can tweak the tokens; the preset name maps to a shared mood in the app.
preset: pulp-horror
palette:
  bg: "#0e0b0b"       # near-black, aged
  surface: "#1a1414"
  accent: "#8b0000"   # dried blood red
  ink: "#e8e2d6"      # bone / old paper
typePairing:
  display: "serif, condensed, high-contrast (paperback-title feel)"
  body: "typewriter-adjacent monospace or a warm slab serif"
motif: 80s-paperback-grain   # subtle film grain + embossed-cover vignette
notes: >
  Evokes 70s-80s mass-market horror paperbacks: blood-red on black, worn
  edges, typewriter echoes of his blue-collar prose. Final art direction TBD.
