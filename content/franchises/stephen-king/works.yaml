# Bibliography (Works) - the abstract books; editions/covers are separate metadata.
# IDs are STABLE and permanent (user data references them). Dates are year-precision
# pending curation, and record FIRST publication (see the note on The Eyes of the
# Dragon, where the limited edition predates the trade edition by three years).
#
# Scope: novels (King and Bachman), the full Dark Tower cycle, collections,
# nonfiction, and novellas that had their own standalone publication event.
# Deliberately excluded: individual stories inside a listed collection, omnibus
# reissues of already-listed works (The Bachman Books, The Stand: Complete and
# Uncut), film-only screenplays, and books King contributed to but did not author.

