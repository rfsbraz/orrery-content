# Author-life and franchise-specific events - the aura. Impact-weighted so the
# timeline has anchors (high) and texture (low). Shared world/culture events live
# in content/events/global.yaml, not here. spoilerAfter: null unless a note could
# spoil a specific book (see Orrery CONCEPT §9).
- id: king-born-1947
  date: 1947-09-21
  title: Stephen King born in Portland, Maine
  scope: author-life
  reach: franchise
  impact: low
  description: >
    Born in Portland; raised largely in Durham, Maine. Maine becomes the
    setting and soul of most of his fiction.
  spoilerAfter: null
  sources: [https://en.wikipedia.org/wiki/Stephen_King]

- id: king-marries-tabitha-1971
  date: 1971-01-02
  title: Marries Tabitha Spruce
  scope: author-life
  reach: franchise
  impact: med
  description: >
    Marries fellow writer Tabitha, his lifelong first reader and editor - and,
    two years on, the reason Carrie exists.
  spoilerAfter: null
  sources: [https://en.wikipedia.org/wiki/Tabitha_King]

- id: carrie-rescued-from-trash-1973
  date: 1973
  title: Tabitha rescues the Carrie manuscript from the trash
  scope: author-life
  reach: franchise
  impact: high
  description: >
    Discouraged, King threw away the opening pages of Carrie; Tabitha fished
    them out and told him to keep going. The sale that followed let him quit
    teaching and write full time - the hinge of his whole career.
  spoilerAfter: null
  sources: [https://en.wikipedia.org/wiki/Carrie_(novel)]

- id: king-addiction-1980s
  date: 1979
  dateRange: "1979-1987"
  title: Deepening alcohol and cocaine addiction
  scope: author-life
  reach: franchise
  impact: high
  description: >
    Through his most prolific and successful years King wrote in the grip of
    addiction - he has said he barely remembers writing Cujo. The addiction and
    its metaphors soak into the work of the decade.
  spoilerAfter: null
  sources: [https://en.wikipedia.org/wiki/Stephen_King]

- id: bachman-unmasked-1985
  date: 1985
  title: Richard Bachman unmasked
  scope: author-life
  reach: franchise
  impact: med
  description: >
    A bookstore clerk links King to his pen name. King "kills off" Bachman and
    later channels the episode into The Dark Half (1989).
  spoilerAfter: null
  sources: [https://en.wikipedia.org/wiki/Richard_Bachman]

- id: king-intervention-sobriety-1987
  date: 1987
  dateRange: "1987-1989"
  title: Family intervention and the road to sobriety
  scope: author-life
  reach: franchise
  impact: high
  description: >
    Tabitha and family stage an intervention; King gets sober by the late 1980s.
    The 1990s work turns markedly more introspective and psychological.
  spoilerAfter: null
  sources: [https://en.wikipedia.org/wiki/Stephen_King]

- id: king-van-accident-1999
  date: 1999-06-19
  title: Near-fatal roadside accident
  scope: author-life
  reach: franchise
  impact: high
  description: >
    A van strikes King as he walks near his home, shattering his leg and hip.
    Chronic pain and mortality reshape the later work - and push him to finally
    finish the Dark Tower, into which the accident is written.
  spoilerAfter: stephen-king/song-of-susannah
  sources: [https://en.wikipedia.org/wiki/Stephen_King]

- id: dark-tower-completed-2004
  date: 2004
  title: The Dark Tower cycle completed
  scope: author-life
  reach: franchise
  impact: high
  description: >
    Books V-VII arrive in quick succession (2003-2004), closing the 22-year
    magnum opus that quietly connects much of his fiction.
  spoilerAfter: stephen-king/wolves-of-the-calla
  sources: [https://en.wikipedia.org/wiki/The_Dark_Tower_(series)]

- id: king-national-book-medal-2003
  date: 2003
  title: National Book Foundation Medal for Distinguished Contribution
  scope: industry
  reach: franchise
  impact: med
  description: >
    A once-controversial honor for a "popular" writer that helped cement his
    reappraisal as a serious American author. (National Medal of Arts follows in 2015.)
  spoilerAfter: null
  sources: [https://en.wikipedia.org/wiki/Stephen_King]
