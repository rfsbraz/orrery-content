# FRANCHISE-SPECIFIC events only. Author-LIFE events live on the author entity
# (content/authors/stephen-king.yaml), since they follow the person across any
# franchise. Shared world/culture events live in content/events/global.yaml.
# Inline references use [[type:id|text]] and must resolve (see CONCEPT §4c).
- id: man-in-black-suit-prize-1995
  date: 1995
  title: A horror story takes the O. Henry Award
  scope: culture
  reach: franchise
  impact: med
  description: >
    "The Man in the Black Suit" (The New Yorker, 1994) wins both the World
    Fantasy Award and the O. Henry Award for best short fiction - mainstream
    literary recognition rare for King at the time. It anchors the small,
    limited-edition [[work:stephen-king/six-stories|Six Stories]] (1997)
    before reaching wider readers in
    [[work:stephen-king/everythings-eventual|Everything's Eventual]] (2002).
  spoilerAfter: null
  sources: [https://en.wikipedia.org/wiki/The_Man_in_the_Black_Suit]
- id: bachman-regulators-desperation-1996
  date: 1996
  title: Bachman returns for a mirror novel
  scope: industry
  reach: franchise
  impact: med
  description: >
    Eleven years after being publicly unmasked, King revives Richard Bachman
    for [[work:stephen-king/the-regulators|The Regulators]], published the
    same day as its "mirror" novel
    [[work:stephen-king/desperation|Desperation]]. The two share a cast
    reimagined across different small-town settings, and the jacket art
    forms one image when the books stand side by side.
  spoilerAfter: null
  sources:
    - https://en.wikipedia.org/wiki/The_Regulators_(novel)
    - https://en.wikipedia.org/wiki/Desperation_(novel)
- id: green-mile-serial-1996
  date: 1996
  title: Ships The Green Mile as a six-part serial
  scope: industry
  reach: franchise
  impact: med
  description: >
    [[work:stephen-king/the-green-mile|The Green Mile]] arrives in six thin
    monthly paperbacks (March-August 1996) rather than as one book, a format
    King borrows from Dickens's serialized novels. All six volumes hit the
    bestseller list at once before being collected into a single edition the
    following year.
  spoilerAfter: null
  sources:
    - https://en.wikipedia.org/wiki/The_Green_Mile_(novel)
    - https://www.spokesman.com/stories/1996/mar/26/serial-thriller-first-installment-of-stephen/
- id: dark-tower-completed-2004
  date: 2004
  title: The Dark Tower cycle completed
  scope: industry
  reach: franchise
  impact: high
  description: >
    Books V-VII arrive in quick succession (2003-2004) -
    [[work:stephen-king/wolves-of-the-calla|Wolves of the Calla]],
    [[work:stephen-king/song-of-susannah|Song of Susannah]], and
    [[work:stephen-king/the-dark-tower|The Dark Tower]] - closing the 22-year
    magnum opus that quietly connects much of his fiction.
  # Ungated deliberately. Nothing here is a plot fact - it is publication
  # history off the dust jackets - and a gate behind Wolves of the Calla would
  # hide a high-impact River entry from every reader who had not reached book V.
  spoilerAfter: null
  sources: [https://en.wikipedia.org/wiki/The_Dark_Tower_(series)]
- id: mr-mercedes-hardboiled-turn-2014
  date: 2014
  title: Turns hard-boiled with the Bill Hodges trilogy
  scope: industry
  reach: franchise
  impact: med
  description: >
    [[work:stephen-king/mr-mercedes|Mr. Mercedes]] is King's own declared
    first hard-boiled detective novel: a retired cop, Bill Hodges, chasing a
    killer the law can't touch. It wins the 2015 Edgar Award for Best Novel,
    King's first Edgar, and runs to a trilogy with
    [[work:stephen-king/finders-keepers|Finders Keepers]] (2015) and
    [[work:stephen-king/end-of-watch|End of Watch]] (2016), with Hodges's
    junior partner Holly Gibney growing into a recurring investigator across
    King's later books.
  spoilerAfter: null
  sources:
    - https://en.wikipedia.org/wiki/Mr._Mercedes
    - https://mysterywriters.org/2015-edgar-award-winners/
    - https://stephenking.com/news/mr-mercedes-wins-best-novel-495.html
- id: it-2017-film-backlist-2017
  date: 2017
  title: The It adaptation sends the backlist back to the charts
  scope: industry
  reach: franchise
  impact: med
  description: >
    Andy Muschietti's [[work:stephen-king/it|It]] opens September 8, 2017 to
    the biggest single-day debut of any King film adaptation and becomes,
    unadjusted for inflation, the highest-grossing horror film ever made.
    Publishers Weekly's year-end bestseller review counts It itself among the
    backlist titles a film sent back onto the charts that year, a forty-year-
    old novel read anew because of the screen.
  spoilerAfter: null
  sources:
    - https://en.wikipedia.org/wiki/It_(2017_film)
    - https://www.publishersweekly.com/pw/by-topic/industry-news/bookselling/article/75817-the-bestsellers-of-2017.html
- id: sleeping-beauties-owen-king-2017
  date: 2017
  title: Co-writes Sleeping Beauties with son Owen King
  scope: industry
  reach: franchise
  impact: med
  description: >
    [[work:stephen-king/sleeping-beauties|Sleeping Beauties]], published
    September 26, 2017, is written with his son
    [[author:owen-king|Owen King]] rather than alone. Announced in June 2016,
    King described it only as "this dynamite idea" Owen brought him,
    declining ahead of publication to say what it was because "it's too
    good."
  spoilerAfter: null
  sources:
    - https://en.wikipedia.org/wiki/Sleeping_Beauties_(novel)
- id: outsider-holly-gibney-crossover-2018
  date: 2018
  title: Holly Gibney crosses from detective fiction into horror
  scope: industry
  reach: franchise
  impact: med
  description: >
    [[work:stephen-king/the-outsider|The Outsider]], published May 22, 2018,
    carries Holly Gibney out of the Bill Hodges trilogy and into King's
    supernatural fiction, hired as a private investigator on a case that
    starts as a police procedural and turns into something the evidence
    can't explain. It formally merges the two strands King had kept separate
    since [[work:stephen-king/mr-mercedes|Mr. Mercedes]] (2014).
  spoilerAfter: null
  sources:
    - https://en.wikipedia.org/wiki/The_Outsider_(King_novel)
    - https://en.wikipedia.org/wiki/Holly_Gibney
- id: holly-gibney-eponymous-novel-2023
  date: 2023
  title: Holly Gibney gets her own book
  scope: industry
  reach: franchise
  impact: med
  description: >
    Introduced as Bill Hodges's junior partner in
    [[work:stephen-king/mr-mercedes|Mr. Mercedes]] (2014), Holly Gibney
    becomes a recurring investigator through
    [[work:stephen-king/the-outsider|The Outsider]] (2018) and
    [[work:stephen-king/if-it-bleeds|If It Bleeds]] (2020) before
    [[work:stephen-king/holly|Holly]] (2023) puts her name on the cover and
    makes her the lead of a King novel in her own right, a decade-long
    migration from sidekick to protagonist.
  spoilerAfter: null
  sources:
    - https://en.wikipedia.org/wiki/Holly_(novel)
    - https://en.wikipedia.org/wiki/Holly_Gibney
