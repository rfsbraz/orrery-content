# FRANCHISE-SPECIFIC events only. Author-LIFE events live on the author entity
# (content/authors/stephen-king.yaml), since they follow the person across any
# franchise. Shared world/culture events live in content/events/global.yaml.
# Inline references use [[type:id|text]] and must resolve (see CONCEPT §4c).
- id: man-in-black-suit-prize-1995
  date: 1995
  title: A horror story takes the O. Henry Award
  scope: culture
  reach: franchise
  impact: med
  description: >
    "The Man in the Black Suit" (The New Yorker, 1994) wins both the World
    Fantasy Award and the O. Henry Award for best short fiction - mainstream
    literary recognition rare for King at the time. It anchors the small,
    limited-edition [[work:stephen-king/six-stories|Six Stories]] (1997)
    before reaching wider readers in
    [[work:stephen-king/everythings-eventual|Everything's Eventual]] (2002).
  spoilerAfter: null
  sources: [https://en.wikipedia.org/wiki/The_Man_in_the_Black_Suit]
- id: bachman-regulators-desperation-1996
  date: 1996
  title: Bachman returns for a mirror novel
  scope: industry
  reach: franchise
  impact: med
  description: >
    Eleven years after being publicly unmasked, King revives Richard Bachman
    for [[work:stephen-king/the-regulators|The Regulators]], published the
    same day as its "mirror" novel
    [[work:stephen-king/desperation|Desperation]]. The two share a cast
    reimagined across different small-town settings, and the jacket art
    forms one image when the books stand side by side.
  spoilerAfter: null
  sources:
    - https://en.wikipedia.org/wiki/The_Regulators_(novel)
    - https://en.wikipedia.org/wiki/Desperation_(novel)
- id: green-mile-serial-1996
  date: 1996
  title: Ships The Green Mile as a six-part serial
  scope: industry
  reach: franchise
  impact: med
  description: >
    [[work:stephen-king/the-green-mile|The Green Mile]] arrives in six thin
    monthly paperbacks (March-August 1996) rather than as one book, a format
    King borrows from Dickens's serialized novels. All six volumes hit the
    bestseller list at once before being collected into a single edition the
    following year.
  spoilerAfter: null
  sources:
    - https://en.wikipedia.org/wiki/The_Green_Mile_(novel)
    - https://www.spokesman.com/stories/1996/mar/26/serial-thriller-first-installment-of-stephen/
- id: dark-tower-completed-2004
  date: 2004
  title: The Dark Tower cycle completed
  scope: industry
  reach: franchise
  impact: high
  description: >
    Books V-VII arrive in quick succession (2003-2004) -
    [[work:stephen-king/wolves-of-the-calla|Wolves of the Calla]],
    [[work:stephen-king/song-of-susannah|Song of Susannah]], and
    [[work:stephen-king/the-dark-tower|The Dark Tower]] - closing the 22-year
    magnum opus that quietly connects much of his fiction.
  # Ungated deliberately. Nothing here is a plot fact - it is publication
  # history off the dust jackets - and a gate behind Wolves of the Calla would
  # hide a high-impact River entry from every reader who had not reached book V.
  spoilerAfter: null
  sources: [https://en.wikipedia.org/wiki/The_Dark_Tower_(series)]
