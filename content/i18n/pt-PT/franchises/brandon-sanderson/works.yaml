# European Portuguese (pt-PT) overlay: synopses only.
# Work titles are NEVER translated here - a Portuguese title is edition data and
# lives in editions.yaml.
#
# Terminology: "Alomancia" is the term used by the Portuguese Mistborn
# translation (Jorge Candeias, Saída de Emergência) and is used here. Terms with
# no verified Portuguese edition behind them are described plainly rather than
# coined.

- id: brandon-sanderson/elantris
  synopsis: "Numa cidade de reis-deuses caídos, um príncipe amaldiçoado e uma princesa estrangeira desvendam por que falhou a magia que tornava Elantris divina."

- id: brandon-sanderson/the-hope-of-elantris
  synopsis: "Um breve epílogo a Elantris, contado do ponto de vista de uma professora durante a noite decisiva do romance."

- id: brandon-sanderson/the-emperors-soul
  synopsis: "Condenada à morte, uma mestra falsificadora recebe uma tarefa impossível: reconstruir a alma de um imperador assassinado a partir de magia gravada em selos, antes que se lhe esgote o tempo."

- id: brandon-sanderson/the-final-empire
  synopsis: "Uma ladra de rua junta-se a um bando de rebeldes que usam magia e planeiam roubar e derrubar o imperador-deus imortal que governa há mil anos um mundo sufocado pela cinza."

- id: brandon-sanderson/the-well-of-ascension
  synopsis: "Com o tirano derrubado, os rebeldes têm de defender uma cidade sitiada e uma ordem nova e frágil, enquanto uma ameaça mais funda e mais antiga se agita sob a religião do mundo."

- id: brandon-sanderson/the-hero-of-ages
  synopsis: "À medida que a cinza cai mais espessa e o mundo começa a morrer, o bando corre para decifrar uma profecia e a verdadeira natureza dos poderes por detrás do seu planeta."

- id: brandon-sanderson/the-eleventh-metal
  synopsis: "Uma curta prequela que mostra o jovem rebelde Kelsier a ser treinado no uso dos metais da Alomancia."

- id: brandon-sanderson/mistborn-secret-history
  synopsis: "Uma novela complementar que reconta a primeira era de Mistborn a partir de um ponto de observação escondido, reenquadrando acontecimentos que os leitores julgavam compreender."

- id: brandon-sanderson/the-alloy-of-law
  synopsis: "Três séculos depois, a velha magia encontra os caminhos de ferro e os revólveres, quando um homem da lei da fronteira tornado nobre é puxado de volta para a caça a um criminoso mascarado, na capital industrial."

- id: brandon-sanderson/shadows-of-self
  synopsis: "Uma série de homicídios com assinatura sobrenatural arrasta o homem da lei e o seu grupo para uma conspiração que chega aos deuses da cidade e ao seu próprio passado."

- id: brandon-sanderson/the-bands-of-mourning
  synopsis: "Uma expedição atrás de uma lendária relíquia perdida transforma-se numa corrida contra um poder rival capaz de alterar o equilíbrio do mundo."

- id: brandon-sanderson/the-lost-metal
  synopsis: "A saga de Wax e Wayne encerra-se quando uma conspiração que ameaça toda a cidade obriga os seus heróis a enfrentar inimigos vindos de fora do seu mundo."

- id: brandon-sanderson/warbreaker
  synopsis: "Duas irmãs de sangue real, um deus que não acredita na sua própria divindade e um mercenário com uma espada consciente colidem numa cidade onde a magia se compra em respirações e em cor."

- id: brandon-sanderson/the-way-of-kings
  synopsis: "Num mundo varrido por tempestades titânicas, um escravo caído em desgraça, um alto-príncipe atormentado e uma estudiosa relutante são atraídos para o regresso de uma guerra e de uma magia há muito tida por morta."

- id: brandon-sanderson/words-of-radiance
  synopsis: "Enquanto um inimigo antigo se agita, os sobreviventes das planícies fraturadas têm de se tornar algo que o mundo não vê há milénios - antes que as tempestades destruam tudo."

- id: brandon-sanderson/edgedancer
  synopsis: "Uma rapariga fugitiva com queda para o impossível e apetite por panquecas persegue um assassino por uma cidade de comércio, numa novela situada entre os dois primeiros romances de O Arquivo das Tempestades."

- id: brandon-sanderson/oathbringer
  synopsis: "Com a tempestade do inimigo solta sobre o mundo, uma nova ordem de cavaleiros tem de manter unida uma coligação, enquanto os seus líderes ajustam contas com os crimes das suas próprias histórias."

- id: brandon-sanderson/dawnshard
  synopsis: "A tripulação de um navio ruma a uma ilha proibida levando um segredo capaz de reconfigurar a guerra, numa novela que faz a ponte entre o terceiro e o quarto romances de O Arquivo das Tempestades."

- id: brandon-sanderson/rhythm-of-war
  synopsis: "Um ano de guerra de desgaste decide-se num cerco, numa torre capturada e no estudo perigoso que uma estudiosa faz da magia do inimigo e da natureza dos próprios poderes."

- id: brandon-sanderson/wind-and-truth
  synopsis: "Uma contagem decrescente de dez dias até um confronto que decidirá o mundo encerra o primeiro arco de O Arquivo das Tempestades, levando cada juramento e cada aliança ao ponto de rutura."

- id: brandon-sanderson/tress-of-the-emerald-sea
  synopsis: "Uma limpadora de janelas deixa a segurança da sua ilha para atravessar mares de esporos mortíferos e resgatar o homem que ama, num volume autónomo com sabor a conto de fadas, narrado por um contador de histórias errante bem conhecido."

- id: brandon-sanderson/yumi-and-the-nightmare-painter
  synopsis: "Uma sacerdotisa de santuário presa a uma rotina rígida e um pintor que afugenta pesadelos veem os seus dois mundos, muito diferentes, trocarem de corpos e de vidas, num volume autónomo inspirado em influências japonesas e coreanas."

- id: brandon-sanderson/the-sunlit-man
  synopsis: "Um refugiado perseguido despenha-se num mundo calcinado onde a madrugada mata, e tem de libertar o seu povo enquanto se mantém um passo à frente dos poderes que o caçam pelas estrelas."

- id: brandon-sanderson/isles-of-the-emberdark
  synopsis: "Um caçador de aves sobrenaturais corre para modernizar o povo da sua ilha antes que invasores vindos das estrelas o consigam conquistar, num romance que expande o mundo da novela Sixth of the Dusk."

- id: brandon-sanderson/shadows-for-silence
  synopsis: "Uma estalajadeira e caçadora de recompensas num bosque assombrado quebra as regras que mantêm os mortos à distância, para proteger a família, numa novela autossuficiente."

- id: brandon-sanderson/sixth-of-the-dusk
  synopsis: "Numa ilha letal, um caçador solitário que se liga a aves capazes de alterar a mente descobre que o seu povo não está tão só no universo como acredita."

- id: brandon-sanderson/arcanum-unbounded
  synopsis: "A primeira coletânea reunida do Cosmere - ficção curta de todos os mundos, com os ensaios de uma erudita de dentro do próprio universo, que mapeiam pela primeira vez o universo partilhado."

- id: brandon-sanderson/white-sand
  synopsis: "Num mundo de rotação síncrona, de dia e de escuridão sem fim, um fraco mago da areia sobrevive a um massacre e tem de dominar uma magia em decadência, adaptado como trilogia de banda desenhada a partir de um romance inicial e nunca publicado de Sanderson."

# The works outside the Cosmere have no Portuguese edition, so their titles
# stand in English throughout. "Highbrary", "Skyward Flight", "Epic" and
# "Reckoners" are kept in the original for the same reason: they are names in
# books with no Portuguese translation to borrow from.

- id: brandon-sanderson/firstborn
  synopsis: "Uma novela curta de ópera espacial sobre o irmão mais novo e sem talento do maior almirante vivo do império, criado para uma guerra que não para de perder."

- id: brandon-sanderson/alcatraz-versus-the-evil-librarians
  synopsis: "Um miúdo em famílias de acolhimento que parte tudo aquilo em que toca descobre que a sua falta de jeito é um superpoder hereditário e que a informação do mundo é controlada por uma seita de bibliotecários malvados."

- id: brandon-sanderson/defending-elysium
  synopsis: "Um agente da companhia telefónica que detém o monopólio das comunicações mais rápidas do que a luz é enviado para uma plataforma espacial distante, onde um cientista desaparecido e um embaixador alienígena assassinado põem em risco tudo o que os seus patrões escondem."

- id: brandon-sanderson/alcatraz-versus-the-scriveners-bones
  synopsis: "A procura do pai desaparecido leva Alcatraz à Biblioteca de Alexandria, cheia de armadilhas, cujos curadores colecionam almas com a mesma facilidade com que colecionam livros."

- id: brandon-sanderson/alcatraz-versus-the-knights-of-crystallia
  synopsis: "Alcatraz chega finalmente à capital dos Reinos Livres, onde o seu nome famoso é um fardo, a política é mortal e os bibliotecários negoceiam um tratado que ninguém devia assinar."

- id: brandon-sanderson/alcatraz-versus-the-shattered-lens
  synopsis: "Os bibliotecários cercam o reino de Mokia, e a tentativa de ajuda de Alcatraz transforma-se numa história de guerra contada com granadas em forma de ursinho de peluche e a sua habitual honestidade acerca dos próprios defeitos."

- id: brandon-sanderson/infinity-blade-awakening
  synopsis: "Uma novela de acompanhamento que faz a ponte entre os videojogos Infinity Blade: o cavaleiro que finalmente matou o imortal Rei-Deus acorda para descobrir o que a sua vitória lhe comprou de facto."

- id: brandon-sanderson/legion
  synopsis: "Um recluso brilhante, cujos conhecimentos vivem nos especialistas alucinados que o acompanham, aceita um caso que envolve uma máquina fotográfica que fotografa o passado."

- id: brandon-sanderson/armored
  synopsis: "Uma antologia de vários autores de ficção científica militar com armaduras motorizadas, organizada por John Joseph Adams; a entrada de Sanderson é uma novela curta coescrita com Ethan Skarstedt."

- id: brandon-sanderson/steelheart
  synopsis: "Num mundo em que pessoas comuns ganharam superpoderes e logo se tornaram tiranos, um jovem que viu o invencível senhor de Chicago matar-lhe o pai junta-se à única equipa que se atreve a assassinar os supostamente imatáveis."

- id: brandon-sanderson/mitosis
  synopsis: "Uma história curta situada entre [[work:brandon-sanderson/steelheart|Steelheart]] e [[work:brandon-sanderson/firefight|Firefight]]: os Epics continuam a assolar Newcago, e um deles, capaz de se duplicar, põe os Reckoners à prova."

- id: brandon-sanderson/the-rithmatist
  synopsis: "Numa academia gearpunk onde desenhos a giz lutam e matam, o único aluno que consegue ver os padrões mas não lhes dar vida investiga uma série de desaparecimentos."

- id: brandon-sanderson/infinity-blade-redemption
  synopsis: "A segunda novela de Infinity Blade: inimigos jurados acordam presos juntos e têm de desvendar a tecnologia sem morte que governa o seu mundo."

- id: brandon-sanderson/legion-skin-deep
  synopsis: "Stephen Leeds e os seus aspetos imaginários perseguem um cadáver cujas células transportam dados por que vale a pena matar."

- id: brandon-sanderson/games-creatures-play
  synopsis: "Uma antologia de vários autores de histórias desportivas sobrenaturais, organizada por Charlaine Harris e Toni L. P. Kelner; a entrada de Sanderson é um conto sobre espíritos que saltam de corpo em corpo num jogo de apanhada mortal."

- id: brandon-sanderson/altered-perceptions
  synopsis: "Uma antologia solidária de cenas alternativas e ensaios sobre doença mental, com cerca de trinta autores, reunida para ajudar o escritor Robison Wells."

- id: brandon-sanderson/firefight
  synopsis: "A caça muda-se para uma Manhattan inundada e coberta de néon, governada por uma Epic que deixa a equipa a questionar tudo o que julgava perceber sobre os Epics."

- id: brandon-sanderson/perfect-state
  synopsis: "Um deus-imperador que conquistou o mundo inteiro, dominou a sua magia e derrotou todos os inimigos descobre de quão pouco isso vale no dia em que é obrigado a ir a um encontro."

- id: brandon-sanderson/calamity
  synopsis: "A trilogia encerra com a equipa a levar a luta até uma cidade de sal vivo e a enfrentar aquilo que fez dos Epics o que eles são."

- id: brandon-sanderson/the-dark-talent
  synopsis: "Alcatraz infiltra-se no santuário interior dos bibliotecários, a Highbrary, no volume para que toda a narração autodepreciativa vinha a apontar."

- id: brandon-sanderson/snapshot
  synopsis: "Dois detetives patrulham uma recriação perfeita de um único dia da sua cidade, onde todos os crimes que resolvem já aconteceram e aquele com que tropeçam nunca devia ter sido encontrado."

- id: brandon-sanderson/skyward
  synopsis: "Num mundo cercado onde a humanidade sobrevive debaixo de terra, uma rapariga descartada por ser filha de um cobarde luta para entrar na escola de pilotagem e encontra uma nave meio destruída com vontade própria."

- id: brandon-sanderson/legion-lies-of-the-beholder
  synopsis: "A novela final: um pedido de ajuda da mulher que ensinou Leeds a viver com os seus aspetos obriga-o a confrontar de onde eles vêm e o que significaria perdê-los."

- id: brandon-sanderson/children-of-the-nameless
  synopsis: "Uma novela do universo Magic: The Gathering - no plano gótico de Innistrad, uma rapariga cuja aldeia inteira desapareceu numa noite procura ajuda junto de um planeswalker recluso e dos seus geists de uma delicadeza impecável."

- id: brandon-sanderson/starsight
  synopsis: "Com uma identidade roubada, a jovem piloto infiltra-se na civilização alienígena que mantém a humanidade enjaulada e descobre que a guerra tem outro aspeto vista do outro lado."

- id: brandon-sanderson/the-original
  synopsis: "Numa utopia sob vigilância, a cópia temporária de uma mulher recebe quatro dias para caçar a sua original, procurada por homicídio."

- id: brandon-sanderson/lux
  synopsis: "Um derivado situado no mundo dos Reckoners: nos céus de um Texas em ruínas, os habitantes de uma cidade voadora resistem aos Epics que a querem tomar."

- id: brandon-sanderson/cytonic
  synopsis: "O terceiro romance de Skyward envia a sua heroína para o nenhures, uma dimensão de memória e monstros, para descobrir o que são de facto os seus poderes e o que temem os carcereiros da galáxia."

- id: brandon-sanderson/sunreach
  synopsis: "A primeira novela de Skyward Flight: com a sua líder desaparecida, uma piloto do esquadrão e um tratador de lesmas apaixonado têm de aguentar a linha contra um inimigo esmagador."

- id: brandon-sanderson/redawn
  synopsis: "Uma desertora alienígena tem de decidir se os humanos que outrora combateu são aliados dignos de confiança, enquanto o seu próprio povo desliza para a rendição aos senhores da galáxia."

- id: brandon-sanderson/evershore
  synopsis: "A terceira novela de Skyward Flight: com Detritus em desordem e a sua melhor piloto ausente, outro tem de responder a uma transmissão estranha vinda dos kitsen e dominar os seus próprios poderes indisciplinados antes que uma aliança se perca."

- id: brandon-sanderson/dark-one
  synopsis: "Um romance gráfico em que um jovem assombrado por visões descobre que um mundo de fantasia lhe destinou o papel de destruidor profetizado, e não o de salvador."

- id: brandon-sanderson/bastille-vs-the-evil-librarians
  synopsis: "O final da série, narrado por Bastille e não por Alcatraz: a cavaleira que jurou proteger o clã Smedry toma conta da narração e vai ela própria atrás do fundador dos bibliotecários malvados."

- id: brandon-sanderson/defiant
  synopsis: "O arco de Skyward conclui-se: os últimos caças da humanidade levam a guerra à própria Superioridade, e a sua campeã tem de decidir no que está disposta a tornar-se para lhe pôr fim."

- id: brandon-sanderson/hyperthief
  synopsis: "Um pequeno assalto no Cytoverse, coescrito com Janci Patterson e publicado primeiro como um fino caderno da Dragonsteel."

- id: brandon-sanderson/the-frugal-wizards-handbook
  synopsis: "Um homem acorda numa Inglaterra medieval que não é bem a da história, sem memória e com um manual de empresa chamuscado destinado a turistas que saltam entre dimensões, no único romance dos Projetos Secretos situado fora do Cosmere."

- id: brandon-sanderson/dark-one-forgotten
  synopsis: "Uma série de acompanhamento original em áudio: uma autora de podcasts de crime real investiga um assassino de que o mundo parece não conseguir lembrar-se."

- id: brandon-sanderson/long-chills-and-case-dough
  synopsis: "Uma novela curta de policial negro, publicada como um fino volume de capa dura de colecionador na linha Sanderson Curiosities da Dragonsteel."

- id: brandon-sanderson/the-most-boring-book-ever
  synopsis: "Um livro ilustrado cujo texto impassível insiste que nada está a acontecer, enquanto as imagens discordam de forma espetacular."

- id: brandon-sanderson/tailored-realities
  synopsis: "A primeira coletânea reunida da ficção curta de Sanderson fora do Cosmere, abrangendo cerca de vinte e cinco anos de histórias, cada uma com um posfácio do autor."
