# European Portuguese (pt-PT) overlay for the franchise-specific events.
# Sanderson's life events live on the author entity and are translated in
# content/i18n/pt-PT/authors/brandon-sanderson.yaml.

- id: brandon-sanderson/arcanum-unbounded-2016
  title: O Cosmere torna-se explícito
  description: >
    [[work:brandon-sanderson/arcanum-unbounded|Arcanum Unbounded]] reúne ficção curta de
    todos os mundos e, sobretudo, acrescenta os ensaios de uma erudita de dentro
    do próprio universo, que mapeiam pela primeira vez o universo partilhado. O
    que fora um jogo de aparições escondidas passa a ser um enquadramento
    declarado, que os leitores podem seguir deliberadamente.

- id: brandon-sanderson/year-of-sanderson-2023
  title: O Ano de Sanderson
  description: >
    Os romances financiados pelo Kickstarter de 2022 saem ao longo de um único
    ano, a uma cadência inaudita, três deles volumes autónomos do Cosmere -
    [[work:brandon-sanderson/tress-of-the-emerald-sea|Tress do Mar Esmeralda]],
    [[work:brandon-sanderson/yumi-and-the-nightmare-painter|Yumi and the Nightmare Painter]]
    e [[work:brandon-sanderson/the-sunlit-man|The Sunlit Man]] - cada um a abrir um novo
    canto do universo.

- id: brandon-sanderson/stormlight-arc-one-closes-2024
  title: Fecha-se o primeiro arco de O Arquivo das Tempestades
  description: >
    [[work:brandon-sanderson/wind-and-truth|Wind and Truth]] termina o primeiro arco de
    cinco livros de O Arquivo das Tempestades, o pilar central do Cosmere,
    levando uma década e meia de acumulação à sua primeira grande resolução,
    antes de uma pausa planeada na série.
