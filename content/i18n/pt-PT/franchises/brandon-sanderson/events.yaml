# European Portuguese (pt-PT) overlay for the franchise-specific events.
# Sanderson's life events live on the author entity and are translated in
# content/i18n/pt-PT/authors/brandon-sanderson.yaml.

- id: brandon-sanderson/way-of-kings-prime-rewrite-2009
  title: O Caminho dos Reis é deitado fora e reescrito do zero
  description: >
    Sanderson termina um rascunho completo de O Caminho dos Reis em 2002,
    pensado como o seu cartão de visita ao género da fantasia. A Tor
    mostra interesse nele a par de
    [[work:brandon-sanderson/elantris|Elantris]] em 2003, mas o próprio
    Sanderson trava o processo, considerando que "something wasn't quite
    right." Guarda-o na gaveta ao longo da primeira trilogia de Mistborn,
    e só no final dessa década regressa a ele, deitando fora o
    manuscrito e recomeçando do zero, com uma personagem principal
    reformulada. O rascunho abandonado de 2002, mais tarde intitulado The
    Way of Kings Prime, acaba por ser oferecido de graça aos leitores; o
    romance reconstruído é publicado em 2010.

- id: brandon-sanderson/arcanum-unbounded-2016
  title: O Cosmere torna-se explícito
  description: >
    [[work:brandon-sanderson/arcanum-unbounded|Arcanum Unbounded]] reúne ficção curta de
    todos os mundos e, sobretudo, acrescenta os ensaios de uma erudita de dentro
    do próprio universo, que mapeiam pela primeira vez o universo partilhado. O
    que fora um jogo de aparições escondidas passa a ser um enquadramento
    declarado, que os leitores podem seguir deliberadamente.

- id: brandon-sanderson/apocalypse-guard-pulled-skyward-2017
  title: The Apocalypse Guard é retirado, e Skyward toma o seu lugar
  description: >
    Com um romance juvenil chamado The Apocalypse Guard agendado para a
    primavera seguinte, Sanderson trava-o semanas antes da digressão de
    divulgação prevista, considerando que "it needs more work." Em seu
    lugar, avança, num "furious bout of writing," para uma ideia que
    andava a amadurecer desde 2012: uma história de uma rapariga e do
    seu caça estelar que se torna
    [[work:brandon-sanderson/skyward|Skyward]]. The Apocalypse Guard
    fica, ele próprio, por publicar.

- id: brandon-sanderson/year-of-sanderson-2023
  title: O Ano de Sanderson
  description: >
    Os romances financiados pelo Kickstarter de 2022 saem ao longo de um único
    ano, a uma cadência inaudita, três deles volumes autónomos do Cosmere -
    [[work:brandon-sanderson/tress-of-the-emerald-sea|Tress do Mar Esmeralda]],
    [[work:brandon-sanderson/yumi-and-the-nightmare-painter|Yumi and the Nightmare Painter]]
    e [[work:brandon-sanderson/the-sunlit-man|The Sunlit Man]] - cada um a abrir um novo
    canto do universo.

- id: brandon-sanderson/stormlight-arc-one-closes-2024
  title: Fecha-se o primeiro arco de O Arquivo das Tempestades
  description: >
    [[work:brandon-sanderson/wind-and-truth|Wind and Truth]] termina o primeiro arco de
    cinco livros de O Arquivo das Tempestades, o pilar central do Cosmere,
    levando uma década e meia de acumulação à sua primeira grande resolução,
    antes de uma pausa planeada na série.

- id: brandon-sanderson/apple-tv-adaptation-deal-2026
  title: A Apple TV adquire os direitos de cinema e televisão do Cosmere
  description: >
    A Apple TV assina aquilo a que a imprensa do setor chama um acordo
    sem precedentes pelos direitos para ecrã do Cosmere, com Mistborn
    perspetivado para longas-metragens e O Arquivo das Tempestades para
    televisão. Sanderson mantém uma autoridade rara sobre as adaptações:
    vai escrever, produzir, ser consultado e deter poder de aprovação, um
    nível de controlo criativo que os jornalistas comparam
    favoravelmente ao que J.K. Rowling ou George R.R. Martin conservaram
    sobre as suas próprias adaptações.
