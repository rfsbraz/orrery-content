# European Portuguese (pt-PT) overlay: synopses only.
# Work titles are NEVER translated here - a Portuguese title is edition data and
# lives in editions.yaml (Bertrand published volumes 1-6 only).
#
# Terminology note: the pt-PT edition's rendering of "channeling" / "the One
# Power" could not be verified against the published Bertrand text, so those
# synopses describe the magic plainly rather than coining a Portuguese term.

- id: wheel-of-time/the-eye-of-the-world
  synopsis: "Três jovens aldeões fogem da sua terra na noite em que ela é atacada e veem-se lançados no tabuleiro de uma guerra profetizada entre a Luz e as Trevas."

- id: wheel-of-time/the-great-hunt
  synopsis: "A caça a uma relíquia roubada arrasta os companheiros através de várias nações, enquanto inimigos antigos e velhas profecias se fecham sobre eles."

- id: wheel-of-time/the-dragon-reborn
  synopsis: "Quando um deles é apontado como o campeão renascido de uma era, os outros correm em direção a uma fortaleza e a uma espada que só ele pode reclamar."

- id: wheel-of-time/the-shadow-rising
  synopsis: "O grupo divide-se, rumo a um povo do deserto, a uma cidade sitiada e a uma história que reescreve quem julgavam ser."

- id: wheel-of-time/the-fires-of-heaven
  synopsis: "A guerra alastra pela terra à medida que um exército do deserto marcha e poderes rivais se movem abertamente contra o campeão renascido."

- id: wheel-of-time/lord-of-chaos
  synopsis: "Facções de utilizadores da magia cortejam e enfrentam o jovem líder, enquanto um cisma se aprofunda e uma armadilha é montada num lugar chamado Dumai's Wells."

- id: wheel-of-time/a-crown-of-swords
  synopsis: "Cercos, a caça a um artefacto capaz de dominar o clima e alianças em mudança apertam o nó enquanto as peças do desfecho são colocadas."

- id: wheel-of-time/the-path-of-daggers
  synopsis: "Uma relíquia perigosa é virada contra os invasores, enquanto revoltas e cortes rivais fraturam os aliados por dentro."

- id: wheel-of-time/winters-heart
  synopsis: "Um casamento secreto, uma caçada humana e uma tentativa audaciosa de desfazer a mácula que há três mil anos amaldiçoa os homens capazes de usar a magia."

- id: wheel-of-time/crossroads-of-twilight
  synopsis: "As personagens fazem o balanço na esteira de um ato que mudou o mundo, cada uma diante de uma decisão que não pode ser adiada por muito mais tempo."

- id: wheel-of-time/knife-of-dreams
  synopsis: "Os fios esticam-se: dívidas vencem-se, cercos quebram-se, e noivados e batalhas empurram a história com força para o seu final. O último volume que Robert Jordan completou sozinho."

- id: wheel-of-time/the-gathering-storm
  synopsis: "O primeiro volume da conclusão em três partes construída a partir das notas de Jordan: um campeão que endurece e uma líder quebrada enfrentam, cada um, o limite da sua resistência."

- id: wheel-of-time/towers-of-midnight
  synopsis: "Linhas narrativas dispersas convergem, à medida que reencontros e ajustes de contas há muito adiados desimpedem o terreno para a Última Batalha."

- id: wheel-of-time/a-memory-of-light
  synopsis: "A Última Batalha. A sequência de catorze volumes termina no final que Robert Jordan planeara antes de morrer."

- id: wheel-of-time/new-spring
  synopsis: "Uma prequela situada cerca de vinte anos antes da sequência principal: duas jovens conquistam o xaile no meio do fim de uma guerra e de um nascimento que há de refazer o mundo. Expandida a partir de uma novela de 1998 incluída na antologia Legends."

- id: wheel-of-time/the-world-of-robert-jordans-the-wheel-of-time
  synopsis: "Um guia ilustrado, escrito de dentro do próprio mundo, sobre a história, as nações e os povos da série, redigido a meio do seu percurso. Obra de referência, não narrativa."

- id: wheel-of-time/the-wheel-of-time-companion
  synopsis: "A exaustiva enciclopédia de A a Z da série já concluída, compilada por Harriet McDougal, Alan Romanczuk e Maria Simons a partir dos arquivos de Jordan. Obra de referência, não narrativa."
