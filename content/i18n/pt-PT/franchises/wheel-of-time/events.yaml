# European Portuguese (pt-PT) overlay for the franchise-side events.
# Robert Jordan's life events (the diagnosis, his death) live on the author
# entity and are translated in content/i18n/pt-PT/authors/robert-jordan.yaml.

- id: wot-pitched-1984
  title: Tom Doherty pede-lhe outra série, e Jordan propõe uma trilogia
  description: >
    Com base no sucesso dos romances de Conan, Tom Doherty, da Tor, pergunta
    a Jordan se tem outras ideias para livros. Jordan descreve uma fantasia
    épica de até três volumes; Doherty, que já sabe como os manuscritos de
    Jordan costumam ser longos, contrata-o na mesma. O trabalho em
    [[work:wheel-of-time/the-eye-of-the-world|O Olho do Mundo]] começa em
    1984. Mais tarde, Jordan descreveria de outra forma a sua estimativa
    inicial: "I thought 'The Wheel of Time' was going to be five or six
    books. I didn't think they'd be this long." De um modo ou de outro, o
    plano e o resultado - catorze volumes ao longo de vinte e nove anos - não
    são a mesma coisa.

- id: wot-eotw-published-1990
  title: O Olho do Mundo lança a série
  description: >
    A Tor publica [[work:wheel-of-time/the-eye-of-the-world|O Olho do
    Mundo]], a primeira obra de fantasia épica original de Jordan sob o seu
    próprio nome de autor, depois de três romances históricos da série
    Fallon, um western e sete romances de Conan escritos sob pseudónimo ou
    por encomenda. Os cinco livros seguintes sucedem-se a um ritmo esgotante,
    em média um a cada catorze meses.

- id: wot-slows-pace-1994
  title: Jordan trava o ritmo anual depois de O Senhor do Caos
  description: >
    Jordan termina [[work:wheel-of-time/lord-of-chaos|O Senhor do Caos]] em
    agosto de 1994 e está em digressão promocional dois meses depois, ainda
    no mesmo calendário de catorze meses que produzira os cinco livros
    anteriores. Diz à Tor que não há tempo para escrever o seguinte a esse
    ritmo: "I cannot write a book for you in time for you to publish it next
    fall." A Tor aceita. Segundo o seu próprio relato, é essa admissão que
    abre espaço para
    [[work:wheel-of-time/a-crown-of-swords|A Crown of Swords]] e
    [[work:wheel-of-time/the-path-of-daggers|The Path of Daggers]], os dois
    volumes que levam quase dois anos cada um a escrever e que os leitores
    passam a chamar "the slog": não uma perda de ideias, no seu relato, mas
    um ritmo que deixou de conseguir sustentar.

- id: wot-sanderson-chosen-2007
  title: Harriet McDougal escolhe Brandon Sanderson para terminar a série
  description: >
    Meses após a morte de Jordan, a sua viúva e editora Harriet McDougal escolhe
    [[author:brandon-sanderson|Brandon Sanderson]] - então um romancista
    relativamente recente - para concluir a sequência a partir das notas de
    Jordan. Terá lido o final da sua trilogia Mistborn e percebido que era ele.
    A escolha define tudo o que se segue e é o ato central de zelo pelo legado
    desta série.

- id: wot-split-into-three-2009
  title: O volume final é dividido em três
  description: >
    Jordan prometera um único livro de encerramento, "A Memory of Light". O
    material revelou-se demasiado extenso, e a editora Tor e Sanderson
    dividiram-no em três volumes, publicados entre 2009 e 2013, ficando o título
    reservado para o último. Uma decisão prática que mudou a forma como o final
    foi lido e o seu ritmo.

- id: wot-amazon-adaptation-2021
  title: Estreia a série The Wheel of Time da Amazon
  description: >
    A Amazon Prime Video lança uma adaptação televisiva de grande orçamento, que
    leva a história a um público de massas décadas depois do primeiro livro e
    atrai uma vaga de novos leitores aos romances.
