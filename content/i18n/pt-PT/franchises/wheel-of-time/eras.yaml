- id: the-turning-of-the-wheel
  title: O Girar da Roda
  description: 'A vaga fundadora. De [[work:wheel-of-time/the-eye-of-the-world|O Olho do Mundo]] a [[work:wheel-of-time/lord-of-chaos|O
    Senhor do Caos]], os livros chegam quase de ano a ano, a construir o mundo secundário mais profundo
    da fantasia moderna e o seu motor central: um salvador que tem de salvar o mundo e enlouquecer ao
    fazê-lo. A série é um fenómeno e o ritmo é implacável.

    '
  themes:
  - profecia e renascimento
  - o mundo em escala plena
  - género e o Poder Único
  - amadurecimento
- id: the-long-middle
  title: O Arrastar
  description: 'O trecho a que os leitores vieram a chamar "the slog", o arrastar: os livros tornam-se
    mais densos e mais lentos, de [[work:wheel-of-time/a-crown-of-swords|A Crown of Swords]] a [[work:wheel-of-time/crossroads-of-twilight|Crossroads
    of Twilight]], com a prequela [[work:wheel-of-time/new-spring|New Spring]] a chegar a meio. É o nome
    que os leitores dão à sequência em que mais vezes desistem, e aquela de que creditam [[work:wheel-of-time/knife-of-dreams|Knife
    of Dreams]] (2005) de ter resgatado a série.

    '
  themes:
  - dispersão e paciência
  - o elenco a alargar-se
  - a prequela
  - mortalidade
- id: the-succession
  title: A Sucessão
  description: 'O eixo em que toda a série gira. Robert Jordan morre em 2007 com o final planeado mas
    por escrever. A sua viúva e editora, Harriet McDougal, na posse das notas e das cenas que ele ditara,
    escolhe um escritor mais novo para concluir a série - uma decisão sem verdadeiro precedente a esta
    escala no género. A Tor anunciou a escolha a 7 de dezembro de 2007.

    '
  themes:
  - perda
  - salvaguarda da obra
  - as notas
  - a escolha de um herdeiro
- id: the-completion
  title: A Conclusão
  description: '[[author:brandon-sanderson|Brandon Sanderson]] termina a sequência a partir do material
    de Jordan, com o volume final planeado dividido em três - [[work:wheel-of-time/the-gathering-storm|The
    Gathering Storm]], [[work:wheel-of-time/towers-of-midnight|Towers of Midnight]] e [[work:wheel-of-time/a-memory-of-light|A
    Memory of Light]]. Os leitores passam três livros a sentir dois autores ao mesmo tempo: o plano é
    de Jordan, as frases são de Sanderson.

    '
  themes:
  - outra mão
  - fidelidade às notas
  - a Última Batalha
  - o fim
