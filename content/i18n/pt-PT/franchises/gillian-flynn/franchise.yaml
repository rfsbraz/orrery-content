# Português europeu (pt-PT) - descrição da ala.
# Os títulos de obras citados na prosa ficam em inglês: nenhuma das quatro
# obras em prosa tem edição portuguesa registada em editions.yaml, pelo que
# não há título publicado a usar aqui (ver SCHEMA.md, "Never translate a
# published title"). Onde o texto de base fica deliberadamente alusivo em
# vez de descritivo - o retrato de Camille Preaker em Sharp Objects, por
# exemplo - essa reserva é preservada aqui e não desfeita.
- id: gillian-flynn
  description: >
    Três romances negros passados no Midwest, construídos sobre narradores
    pouco fiáveis e falsas aparências domésticas, e o trabalho que Flynn tem
    escrito para cinema e televisão a partir deles desde 2014 - de uma
    repórter enviada de volta à terra natal que a assombra em
    [[work:gillian-flynn/sharp-objects|Sharp Objects]] ao casamento desfeito
    em [[work:gillian-flynn/gone-girl|Gone Girl]].
