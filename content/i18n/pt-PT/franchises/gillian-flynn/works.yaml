# Português europeu (pt-PT) - sinopses.
# Os títulos de obras NÃO são traduzidos: nenhuma das quatro obras em prosa
# tem edição portuguesa registada em editions.yaml (apesar de existirem
# edições portuguesas publicadas de alguns destes livros no mercado real,
# nenhuma foi registada nesta ala), pelo que ficam no original inglês.
# As notas de curadoria (`note:`) ficam na língua de base, por serem
# anotações editoriais e não prosa para o leitor - a mesma convenção de
# joao-tordo e jose-luis-peixoto.
# CUIDADO COM SPOILERS: onde o texto de base fica deliberadamente vago ou
# alusivo - o final em aberto de The Grownup - essa reserva é preservada
# aqui e não desfeita.

- id: gillian-flynn/sharp-objects
  synopsis: >
    Camille Preaker, repórter de crime em St. Louis, recém-saída de um
    hospital psiquiátrico, é enviada de volta à sua terra natal, Wind Gap,
    no Missouri, para cobrir o homicídio de uma rapariga e o desaparecimento
    de outra. Instalada em casa da mãe controladora, com a meia-irmã que mal
    conhece, descobre que não consegue contar a história sem revisitar o seu
    próprio passado.

- id: gillian-flynn/dark-places
  synopsis: >
    Libby Day tinha sete anos quando escapou por uma janela enquanto a mãe e
    as duas irmãs eram assassinadas na quinta da família, no Kansas, e
    depois testemunhou que fora o irmão adolescente, Ben, o autor do crime.
    Vinte e quatro anos volvidos, sem dinheiro e a viver de donativos de
    obcecados por crimes reais, aceita encontrar-se com um clube convencido
    da inocência de Ben, e voltar a uma noite que passou metade da vida a
    tentar esquecer.

- id: gillian-flynn/gone-girl
  synopsis: >
    Na manhã do quinto aniversário de casamento, Nick Dunne chega a casa e
    encontra a mulher, Amy, desaparecida, a casa em desordem, e as pequenas
    mentiras do seu casamento a tornarem-se muito maiores sob o olhar da
    polícia e da imprensa.

- id: gillian-flynn/the-grownup
  synopsis: >
    Uma jovem que ganha a vida como vidente de meia-tigela é contratada por
    uma cliente convencida de que uma presença malévola habita a casa
    vitoriana da família dela. Não acredita no sobrenatural - até lá entrar.

- id: gillian-flynn/masks
  synopsis: >
    Um conto contado em banda desenhada, escrito por Flynn e desenhado por
    Dave Gibbons.

- id: gillian-flynn/gone-girl-film
  synopsis: >
    Adaptação para cinema, com argumento da própria Flynn, do
    [[work:gillian-flynn/gone-girl|seu romance de 2012]], realizada por
    David Fincher e protagonizada por Ben Affleck e Rosamund Pike como Nick
    e Amy Dunne.

- id: gillian-flynn/ill-be-gone-in-the-dark
  synopsis: >
    Relato de true crime de Michelle McNamara sobre a sua própria caça, ao
    longo de anos, ao violador e assassino em série não identificado a quem
    deu o nome de Golden State Killer, publicado postumamente com uma
    introdução de Flynn.

- id: gillian-flynn/sharp-objects-tv
  synopsis: >
    Uma adaptação em oito episódios para a HBO do
    [[work:gillian-flynn/sharp-objects|seu romance de 2006]], criada por
    Marti Noxon e realizada por Jean-Marc Vallée, com Amy Adams no papel de
    Camille Preaker.

- id: gillian-flynn/widows
  synopsis: >
    Um thriller de assalto que Flynn coescreveu com o realizador Steve
    McQueen, adaptando a série britânica de 1983 de Lynda La Plante: quatro
    mulheres, deixadas com as dívidas dos maridos mortos, planeiam terminar
    o trabalho que os matou.

- id: gillian-flynn/utopia
  synopsis: >
    Uma série da Amazon em oito episódios, criada e escrita na íntegra por
    Flynn, adaptando a série britânica de 2013 de Dennis Kelly: um grupo de
    fãs de banda desenhada descobre que o romance gráfico de culto pelo qual
    são obcecados parece prever surtos reais de doença, e torna-se alvo de
    uma organização que quer destruí-lo.

- id: gillian-flynn/chicagos-fine-arts-building
  synopsis: >
    História ilustrada de Keir Graff sobre o Fine Arts Building de Chicago,
    o edifício da Michigan Avenue construído para a Exposição Universal de
    1893 e há muito casa de artistas em atividade na cidade, elaborada a
    partir de entrevistas com os atuais inquilinos e dos arquivos do próprio
    edifício, com prefácio de Flynn.
