# Português europeu (pt-PT) - acontecimentos específicos da ala.
# Os acontecimentos de vida da autora estão em content/i18n/pt-PT/authors/.
# As citações diretas de Flynn ficam no inglês em que foram efetivamente
# ditas: traduzir as suas próprias palavras seria substituí-las por outras
# que ela nunca disse. Só a prosa à volta da citação é traduzida.

- id: gone-girl-bestseller-run-2013
  title: De expectativas modestas a presença fixa na lista
  description: >
    [[work:gillian-flynn/gone-girl|Gone Girl]] foi o terceiro romance de
    Flynn, e, por relato da própria, todos os envolvidos esperavam que
    crescesse de forma modesta a partir dos dois primeiros, como Sharp
    Objects e Dark Places tinham feito; a sua editora gostou do manuscrito,
    mas achava, em privado, que o final era um risco. Em vez disso, o
    romance entrou na lista de mais vendidos do New York Times na semana em
    que foi publicado, subiu ao nº 1 na semana seguinte, vendeu cerca de
    dois milhões de exemplares no primeiro ano, e chegou a estar 91 semanas
    no total nessa lista, oito delas no nº 1. A distância entre o que se
    esperava de um romance de Gillian Flynn e aquilo em que este se tornou é
    a razão por que existem um argumento e tudo o que se seguiu na
    televisão.

- id: gone-girl-misogynist-question-2014
  title: A responder pelas suas próprias mulheres, em letra de forma
  description: >
    Antes da estreia do filme, a TIME pôs Flynn na capa e perguntou-lhe
    diretamente sobre uma acusação que acompanhava
    [[work:gillian-flynn/gone-girl|Gone Girl]] desde a publicação: a de que
    escrever mulheres da forma como ela escreve era, em si, uma forma de
    misoginia. "I've certainly been called a misogynist," disse ela à
    revista, "and that to me is strange. It feels so old-fashioned to think
    because you write about awful women that you don't like women. To me
    it's worse to only write about good women. I'm tired of women as the
    supporting character, women as the helpmate, women as the adorably
    flawed heroine." A pergunta sobreviveu ao livro: é a mesma defesa que,
    desde então, tem feito de Camille Preaker, de Libby Day, e de todas as
    mulheres que escreveu e a quem permitiu ser outra coisa além de
    simpáticas.

- id: utopia-hbo-collapse-2015
  title: Um acordo de televisão morre, e depois não morre
  description: >
    Em 2013, no set do filme Gone Girl, David Fincher disse a Flynn que
    sabia o que fazer com a vida dela nos anos seguintes: adaptar a série
    britânica Utopia para a HBO, com ele na realização. Ela passou dois anos
    a escrever dez episódios. Em 2015, Fincher e o responsável de produção
    da HBO chegaram a um impasse quanto ao orçamento, com uma diferença,
    segundo ela, de cerca de nove milhões de dólares, e o canal arquivou o
    projeto. "We were playing a little bit of a game of chicken," disse ela
    mais tarde. Os argumentos ficaram por produzir durante três anos, até a
    Amazon encomendar [[work:gillian-flynn/utopia|Utopia]] como série, a 19
    de abril de 2018, desta vez com Flynn sozinha como showrunner.
