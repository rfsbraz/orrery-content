# Overlay pt-PT dos eventos da franquia: `title` + `description` (os títulos
# dos eventos são prosa, não títulos publicados).
# Datas, impact, scope, reach, spoilerAfter e sources nunca se traduzem.
- id: fight-club-film-1999
  title: O filme fracassa, depois o DVD chega a toda a gente
  description: >
    A adaptação de [[work:chuck-palahniuk/fight-club|Clube de Combate]] por
    David Fincher estreia a 15 de outubro de 1999 e fica aquém: cerca de 100,9
    milhões de dólares em todo o mundo contra um orçamento de 63 a 65 milhões,
    com a crítica dividida ao meio. Depois o DVD sai a 6 de junho de 2000 e
    vende mais de seis milhões de cópias em menos de uma década. É o facto mais
    importante sobre a forma como Palahniuk é lido: quase todos os leitores do
    romance chegaram depois do filme, e levaram para dentro do livro o elenco,
    o final e a política dele, quando o livro é mais seco, mais estranho e
    acaba de outra maneira. Transformou também uma edição modesta de 1996 em
    peça de coleção e fez de um escritor de vendas medianas um nome global de
    um dia para o outro.

- id: guts-fainting-readings-2003
  title: As leituras em que as pessoas desmaiavam
  description: >
    Na digressão de 2003 para [[work:chuck-palahniuk/diary|Diário]], Palahniuk
    começou a ler "Guts", um conto mais tarde recolhido em
    [[work:chuck-palahniuk/haunted|Haunted]]. Abre a dizer ao público para
    respirar fundo e que a história deve durar mais ou menos o tempo que
    conseguirem suster a respiração. Os ouvintes começaram a desmaiar. O
    Guardian dava conta de quarenta desmaios em março de 2004 e a conta
    continuou a subir nas digressões seguintes. É o conto por que Palahniuk é
    mais vezes descrito, e vale a pena sabê-lo antes de abrir Haunted: o livro
    está construído para lhe fazer isto de propósito, e a respiração do público
    faz parte do desenho.

- id: fight-club-continues-in-comics-2015
  title: Clube de Combate continua, em banda desenhada
  description: >
    Dezanove anos depois do romance, Palahniuk escreve uma sequela direta e
    publica-a como banda desenhada da Dark Horse em vez de livro: dez números a
    partir de maio de 2015, reunidos em
    [[work:chuck-palahniuk/fight-club-2|Fight Club 2]], e depois mais doze em
    2019 como [[work:chuck-palahniuk/fight-club-3|Fight Club 3]]. Explica a
    forma da estante depois de 2015 e é a razão por que quem percorre estes
    livros até ao fim encontra duas novelas gráficas no meio da prosa.
