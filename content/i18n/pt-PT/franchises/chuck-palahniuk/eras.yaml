# Overlay pt-PT das eras: `title`, `themes` (etiquetas de exibição) e
# `description` (os títulos das eras são prosa, não títulos publicados).
# Os títulos de obras citados na prosa usam a edição portuguesa publicada
# (content/franchises/chuck-palahniuk/editions.yaml) ou ficam em inglês quando
# não existe edição portuguesa: Survivor, Haunted, Fugitives and Refugees,
# Stranger than Fiction, Rant, Snuff, Pygmy, Tell-All, Damned, Doomed,
# Beautiful You, Invisible Monsters Remix, Burnt Tongues, Fight Club 2,
# Fight Club 3, Consider This, Adjustment Day e Shock Induction não têm
# edição portuguesa.
- id: before-the-film
  title: Os Romances da Norton
  themes: [insónia e dissociação, masculinidade representada, identidade inventada, minimalismo]
  description: >
    Os três romances que a W. W. Norton publicou antes de
    [[work:chuck-palahniuk/fight-club|Clube de Combate]] chegar aos cinemas: o
    próprio Clube de Combate, [[work:chuck-palahniuk/survivor|Survivor]] e
    [[work:chuck-palahniuk/invisible-monsters|Monstros invisíveis]], que foi
    escrito primeiro e recusado antes dos outros dois. Tiragens pequenas, um
    público de culto e uma voz já inteiramente formada pelos anos da oficina de
    Spanbauer. Tudo aqui foi escrito por alguém a quem ninguém prestava
    atenção.

- id: after-the-film
  title: Depois do Filme
  themes: [dependência e compulsão, vigarices, o público que o filme construiu]
  description: >
    O curto intervalo entre o filme e os livros de terror, com um único
    romance: [[work:chuck-palahniuk/choke|Asfixia]], escrito para o público que
    o filme construiu e o seu primeiro best-seller do New York Times. A crítica
    lê-o com os livros anteriores ao filme e não como uma direção nova: o
    estudo de Keesey agrupa-o com Clube de Combate, Monstros invisíveis e
    Survivor como os romances da luta pela identidade.

- id: the-horror-trilogy
  title: A Trilogia do Terror
  themes: [textos malditos, assombrações, luto, horror corporal]
  description: >
    O único período desta carreira recebido do próprio autor: na digressão de
    2005 de [[work:chuck-palahniuk/haunted|Haunted]], Palahniuk descreveu
    [[work:chuck-palahniuk/lullaby|Lullaby canção de embalar]],
    [[work:chuck-palahniuk/diary|Diário]] e Haunted como uma trilogia de
    terror, escrita nos anos a seguir ao homicídio do pai e terminada nas
    leituras de "Guts" que faziam as plateias desmaiar. A academia ficou com o
    termo. Os dois livros de não-ficção,
    [[work:chuck-palahniuk/fugitives-and-refugees|Fugitives and Refugees]] e
    [[work:chuck-palahniuk/stranger-than-fiction|Stranger than Fiction]],
    também caem dentro destes anos.

- id: after-the-trilogy
  title: Depois da Trilogia
  themes: [experiências formais, sátira do apetite, celebridade, o além]
  description: >
    A cadência de um livro por ano continua em experiências independentes: uma
    biografia oral ([[work:chuck-palahniuk/rant|Rant]]), um romance narrado de
    uma sala de espera ([[work:chuck-palahniuk/snuff|Snuff]]), um romance em
    inglês estropiado ([[work:chuck-palahniuk/pygmy|Pygmy]]), um romance em
    coluna de mexericos ([[work:chuck-palahniuk/tell-all|Tell-All]]), o par do
    Inferno de [[work:chuck-palahniuk/damned|Damned]] e
    [[work:chuck-palahniuk/doomed|Doomed]], e
    [[work:chuck-palahniuk/beautiful-you|Beautiful You]]. O reestruturado
    [[work:chuck-palahniuk/invisible-monsters-remix|Invisible Monsters Remix]]
    e a antologia que coeditou,
    [[work:chuck-palahniuk/burnt-tongues|Burnt Tongues]], também caem aqui.

- id: from-2015
  title: De 2015 em Diante
  themes: [o regresso a Clube de Combate, formatos ilustrados, sátira política, ofício]
  description: >
    Palahniuk volta ao seu primeiro livro e continua-o em banda desenhada
    ([[work:chuck-palahniuk/fight-club-2|Fight Club 2]],
    [[work:chuck-palahniuk/fight-club-3|Fight Club 3]]), publica dois volumes
    ilustrados para colorir, transforma o ofício dos anos da oficina num manual
    ([[work:chuck-palahniuk/consider-this|Consider This]]) e continua a
    escrever romances ([[work:chuck-palahniuk/adjustment-day|Adjustment Day]],
    [[work:chuck-palahniuk/shock-induction|Shock Induction]]). Quando a
    primeira banda desenhada saiu, em maio de 2015, apresentou o passo como
    permanente: "A banda desenhada vai tornar-se também um aspeto duradouro da
    minha produção."
