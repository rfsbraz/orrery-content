# Overlay pt-PT das ordens de leitura: `name`, `rationale` e `debated`.
# orderedWorkIds, type, source e sources não se traduzem.
- id: chuck-palahniuk/fight-club-sequence
  name: A sequência de Clube de Combate
  rationale: >
    A única história contínua desta bibliografia. Tudo o resto que Palahniuk
    escreveu é independente, mas
    [[work:chuck-palahniuk/fight-club|Clube de Combate]] teve duas sequelas
    escritas só por ele, publicadas como banda desenhada da Dark Horse e
    numeradas pela editora como 2 e 3. Leia-se como fio se quiser a história em
    vez da carreira.
  debated:
    - "Esta ordem é igual à ordem de publicação para estas três obras. Existe para isolar o fio de duas dezenas de livros independentes, não para reordenar seja o que for, e quem só quiser a ordem predefinida não perde nada em ignorá-la."
    - "Se a banda desenhada pertence sequer à mesma sequência do romance é uma questão real: é um suporte diferente, com um colaborador diferente (Cameron Stewart em ambas). A numeração da editora resolve o assunto para este repositório, mas um curador que classifique a banda desenhada como material alargado quereria provavelmente remover esta ordem com ela."

- id: chuck-palahniuk/horror-trilogy
  name: A trilogia do terror
  rationale: >
    O único agrupamento desta bibliografia a que o próprio autor deu nome. Na
    digressão de 2005 de [[work:chuck-palahniuk/haunted|Haunted]], Palahniuk
    chamou-lhe o fecho de uma "trilogia de terror" com
    [[work:chuck-palahniuk/lullaby|Lullaby canção de embalar]] e
    [[work:chuck-palahniuk/diary|Diário]], os três romances que contratou com
    a Doubleday como uma sequência de terror depois do homicídio do pai. Três
    livros apenas, na sua ordem de publicação: leiam-se para ter o Palahniuk
    romancista de terror sem o compromisso da carreira inteira. São histórias
    independentes num registo partilhado, não um enredo continuado, e o custo
    é onde o caminho o deixa: a meio da carreira, já depois dos primeiros
    romances que construíram a voz que esta sequência verga para o pavor.
  debated:
    - >
      Tal como a sequência de Clube de Combate, esta ordem é igual à ordem de
      publicação para as suas três obras. Todo o seu contributo é o filtro: na
      estante predefinida a trilogia está entremeada com os dois livros de
      não-ficção ([[work:chuck-palahniuk/fugitives-and-refugees|Fugitives and
      Refugees]], [[work:chuck-palahniuk/stranger-than-fiction|Stranger than
      Fiction]]), e quem siga a ordem predefinida perde apenas o rótulo.
    - >
      "Trilogia" assenta em declarações, não em embalagem: a palavra do autor
      numa aparição em digressão, a forma de um contrato com a Doubleday e a
      adoção posterior do termo pela academia. Nenhuma capa numera estes
      livros de 1 a 3, e os romances não partilham personagens nem história.
      Um curador que exija numeração da editora nos próprios livros, como a
      tem a sequência de Clube de Combate, chamaria a isto um agrupamento
      temático e não uma sequência, e podia razoavelmente passar o facto para
      a prosa da era.
