# Overlay pt-PT das sinopses. NUNCA inclui `title`: o título traduzido é dado
# da edição (ver editions.yaml), não tradução de prosa.
# Títulos citados dentro das sinopses usam a edição portuguesa publicada quando
# existe (Clube de Combate, Asfixia, Lullaby canção de embalar, Monstros
# invisíveis, Diário); os restantes ficam em inglês por não haver edição
# portuguesa.
# A voz de Palahniuk é deliberadamente seca, fria e repetitiva: as sinopses
# ficam curtas e planas, sem literatura acrescentada.
- id: chuck-palahniuk/fight-club
  synopsis: >
    Um empregado de escritório insone e um vendedor de sabonetes começam um
    clube de luta à mão nua na cave de um bar, e aquilo não fica um clube
    durante muito tempo.

- id: chuck-palahniuk/survivor
  synopsis: >
    O último membro sobrevivente de uma seita da morte dita a história da sua
    vida para o gravador de voo de um avião desviado. Os capítulos e as páginas
    fazem a contagem decrescente.

- id: chuck-palahniuk/invisible-monsters
  synopsis: >
    Uma modelo perde o maxilar a tiro numa autoestrada e junta-se a uma mulher
    que se inventou a si própria e que a refaz a partir da identidade.

- id: chuck-palahniuk/choke
  synopsis: >
    Um desistente do curso de Medicina financia os cuidados da mãe fingindo
    engasgar-se em restaurantes para que estranhos o salvem e continuem a pagar.

- id: chuck-palahniuk/lullaby
  synopsis: >
    Um jornalista que investiga mortes súbitas de bebés encontra o mesmo poema
    na mesma página em todas as casas, e descobre o que ele faz quando lido em
    voz alta.

- id: chuck-palahniuk/diary
  synopsis: >
    Uma pintora escreve um diário de coma para o marido numa ilha turística
    onde os veraneantes começaram a perder divisões dentro das próprias casas.

- id: chuck-palahniuk/fugitives-and-refugees
  synopsis: >
    Um guia da Portland dos fugidos de casa, dos obcecados e dos que vivem para
    as partidas, meio percurso a pé, meio memórias. O relato mais claro do meio
    da Cacophony Society que alimentou o Project Mayhem.

- id: chuck-palahniuk/stranger-than-fiction
  synopsis: >
    Reportagens e ensaios reunidos: lutadores amadores, demolição com
    ceifeiras-debulhadoras, a Cacophony Society, e textos sobre como chegou à
    escrita.

- id: chuck-palahniuk/haunted
  synopsis: >
    Escritores respondem a um anúncio de um retiro de três meses, são fechados
    num teatro abandonado e começam a competir para ver quem tem a pior
    história. Vinte e três histórias dentro de uma narrativa-moldura.

- id: chuck-palahniuk/rant
  synopsis: >
    Uma biografia oral, montada a partir de testemunhos contraditórios, de um
    rapaz de província que se tornou um superpropagador de raiva e uma lenda
    das corridas de destruição.

- id: chuck-palahniuk/snuff
  synopsis: >
    Seiscentos homens esperam a sua vez no set de um filme para adultos feito
    para bater um recorde mundial, narrado a partir da sala de espera.

- id: chuck-palahniuk/pygmy
  synopsis: >
    Um agente adolescente de um Estado totalitário sem nome é colocado numa
    família de acolhimento americana como estudante de intercâmbio, e faz os
    seus relatórios num inglês estropiado.

- id: chuck-palahniuk/tell-all
  synopsis: >
    Uma estrela da velha Hollywood e a sua assistente ferozmente protetora,
    contado na voz de uma coluna de mexericos, com todos os nomes famosos a
    negrito.

- id: chuck-palahniuk/damned
  synopsis: >
    Uma filha de celebridades, de treze anos, acorda morta, no Inferno, e trata
    de organizar aquilo.

- id: chuck-palahniuk/invisible-monsters-remix
  synopsis: >
    O romance de 1999 reeditado na forma que Palahniuk diz ter pretendido desde
    o início: capítulos fora de sequência, cada um a terminar com uma instrução
    sobre qual ler a seguir, mais novos capítulos de memórias e outras cenas
    com as mesmas personagens.

- id: chuck-palahniuk/doomed
  synopsis: >
    A sequela de [[work:chuck-palahniuk/damned|Damned]]: a mesma narradora,
    agora presa entre mundos e a escrever um blogue a partir do purgatório.

- id: chuck-palahniuk/burnt-tongues
  synopsis: >
    Uma antologia de vinte histórias transgressivas de outros escritores, saída
    das submissões a uma oficina de fãs de Palahniuk e escolhida pelos seus
    organizadores.

- id: chuck-palahniuk/beautiful-you
  synopsis: >
    Um multimilionário lança uma linha de produtos íntimos tão eficazes que as
    mulheres deixam de sair de casa. Uma sátira ao apetite consumista.

- id: chuck-palahniuk/make-something-up
  synopsis: >
    A sua primeira coletânea de ficção curta, que reúne contos escritos ao
    longo de duas décadas e uma novela.

- id: chuck-palahniuk/fight-club-2
  synopsis: >
    Uma década depois, o narrador está medicado, casado e apagado, e algo que
    julgava terminado está a ser posto a andar outra vez sem ele. Banda
    desenhada, com desenho de Cameron Stewart e David Mack.

- id: chuck-palahniuk/bait
  synopsis: >
    Oito contos impressos com ilustrações de página inteira deixadas por
    colorir, publicados como livro de colorir para adultos.

- id: chuck-palahniuk/legacy
  synopsis: >
    Uma novela sobre uma herança e uma dívida de vida muito longa, impressa no
    mesmo formato ilustrado e por colorir de
    [[work:chuck-palahniuk/bait|Bait]].

- id: chuck-palahniuk/adjustment-day
  synopsis: >
    Os políticos deixam-se levar para uma guerra que dizimaria uma geração de
    jovens, circula um livro azul-negro de diretivas, e uma lista colaborativa
    decide quem há de ser removido.

- id: chuck-palahniuk/fight-club-3
  synopsis: >
    A terceira parte da sequência em banda desenhada, de novo com desenho de
    Cameron Stewart.

- id: chuck-palahniuk/the-invention-of-sound
  synopsis: >
    Uma engenheira de som de Hollywood produz os gritos mais convincentes da
    indústria, e um pai continua à procura de uma filha que desapareceu.

- id: chuck-palahniuk/consider-this
  synopsis: >
    Meio manual de ofício, meio memórias: as regras que trouxe dos anos da
    oficina de Portland, ilustradas com o que correu bem e mal nos seus
    próprios livros.

- id: chuck-palahniuk/not-forever-but-for-now
  synopsis: >
    Dois irmãos numa casa de campo galesa, criados para o ofício da família,
    narram a sua criação.

- id: chuck-palahniuk/shock-induction
  synopsis: >
    Alunos de excelência começam a desaparecer, e o rasto passa por aquilo que
    lhes está a ser vendido como saída.
