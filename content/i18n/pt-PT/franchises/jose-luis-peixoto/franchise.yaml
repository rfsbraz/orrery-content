- id: jose-luis-peixoto
  description: >
    Uma voz saída do Alto Alentejo que se tornou, aos 27 anos, o mais jovem
    vencedor de sempre do Prémio José Saramago: duas décadas de romances
    enraizados no Portugal rural e na sua história, a par de poesia,
    literatura de viagens, teatro, livros infantis, crónicas de jornal e uma
    novela escrita ao lado da banda Moonspell, como gémea literária do seu
    álbum.
