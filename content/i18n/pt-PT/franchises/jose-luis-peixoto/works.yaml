# Português europeu (pt-PT) - sinopses.
# Os títulos NÃO são traduzidos: já são os originais portugueses. As notas
# de curadoria (`note:`) ficam na língua de base, por serem anotações
# editoriais e não prosa para o leitor. Onde o texto de base retém um turno
# que o editor não revela (A Montanha) ou um nome que o próprio romance
# omite (Almoço de Domingo), essa reserva é preservada aqui e não desfeita.

# --- Romances ---

- id: jose-luis-peixoto/morreste-me
  synopsis: >
    A estreia de Peixoto: uma coletânea de ficções interligadas que
    confronta a morte de um pai, a perda que, segundo o próprio, tornou
    possíveis os livros que se seguiram. Assinalado como "magnum opus" na
    ficha da Wikipedia, apesar de ser o livro mais antigo da sua obra.

- id: jose-luis-peixoto/nenhum-olhar
  synopsis: >
    Um romance passado numa aldeia alentejana sem nome, que acompanha
    gerações presas à mesma terra ao longo de um tempo elástico e não
    datado. Venceu o Prémio José Saramago em 2001, o mais jovem vencedor da
    história do prémio, aos 27 anos; publicado em inglês como Blank Gaze
    (Reino Unido, Bloomsbury) e The Implacable Order of Things (Estados
    Unidos, Doubleday).

- id: jose-luis-peixoto/uma-casa-na-escuridao
  synopsis: >
    Um romance alegórico construído à volta de uma casa consumida por uma
    escuridão que avança, parte da vertente mais fabular da ficção de
    Peixoto e não da vertente diretamente rural. Publicado no mesmo ano que
    a coletânea de poesia
    [[work:jose-luis-peixoto/a-casa-a-escuridao|A Casa, a Escuridão]], o
    seu par poético de título semelhante.

- id: jose-luis-peixoto/antidoto
  synopsis: >
    Uma novela de histórias interligadas sobre o amor e a morte, escrita
    como par literário do álbum The Antidote, dos Moonspell: cada canção
    corresponde a um capítulo, e Peixoto acompanhou a própria composição do
    disco junto da banda. O livro e o álbum foram lançados em conjunto.

- id: jose-luis-peixoto/cemiterio-de-pianos
  synopsis: >
    Um romance que se move entre uma oficina de pianos em Lisboa, no início
    do século XX, e um maratonista décadas mais tarde, cruzando as perdas
    de uma família com a própria história de Portugal. Publicado em inglês
    como The Piano Cemetery (Bloomsbury); venceu o Premio Cálamo Otra
    Mirada, em Espanha, em 2007, para o melhor romance estrangeiro
    publicado nesse país no ano.

- id: jose-luis-peixoto/livro
  synopsis: >
    Um romance sobre a emigração portuguesa para França em duas partes: uma
    aldeia rural e os seus habitantes, entre eles a história de amor de
    Ilídio e Adelaide, e uma segunda geração criada em Paris que leva a
    aldeia consigo para um mundo pós-Salazar. Venceu o Premio Salerno Libro
    d'Europa, em Itália, para o melhor romance europeu.

- id: jose-luis-peixoto/galveias
  synopsis: >
    Passado na terra natal de Peixoto, em janeiro e setembro de 1984, abre
    quando um corpo celeste caído abre uma cratera no chão à saída da
    aldeia e deixa um cheiro a enxofre no ar, na comida e nos próprios
    habitantes. Venceu o Prémio Oceanos em 2016; o primeiro romance de
    língua portuguesa traduzido e publicado na Geórgia (2017), e vencedor
    do Best Translation Award do Japão em 2019.

- id: jose-luis-peixoto/em-teu-ventre
  synopsis: >
    Um romance construído à volta das aparições marianas de Fátima em
    1917, narrado pela mãe de Lúcia, a mais velha dos três pastorinhos que
    as relataram, entrelaçando essa história religiosa com um estudo da
    maternidade.

- id: jose-luis-peixoto/autobiografia
  synopsis: >
    Um romance metaficcional em que um jovem escritor na Lisboa dos anos 90
    cruza repetidamente o caminho de José Saramago, misturando episódios
    reais da vida de Saramago com outros inventados. A própria carreira de
    Peixoto foi lançada pelo prémio que leva o nome de Saramago.

- id: jose-luis-peixoto/almoco-de-domingo
  synopsis: >
    Um romance biográfico que vai de 1931 a 2021, construído à volta da
    vida de Rui Nabeiro, fundador da Delta Cafés, ao revisitar as suas
    próprias memórias.

- id: jose-luis-peixoto/a-montanha
  synopsis: >
    Um romance que reúne seis estranhos - Jorge, Fátima, Alice, João,
    Daniel e Filipe, vindos de tão longe como Moçambique e a Venezuela -
    que se encontram na sala de espera do Instituto Português de Oncologia
    do Porto, ligados apenas pela doença.

# --- Crónicas ---

- id: jose-luis-peixoto/abraco
  synopsis: >
    As crónicas de Peixoto: 162 textos breves de jornal escritos entre
    2001 e 2011, reunidos num único volume de 655 páginas que percorre a
    infância, o Alentejo, a paternidade, os primeiros amores e a própria
    escrita.

# --- Coletânea mista ---

- id: jose-luis-peixoto/cal
  synopsis: >
    Uma coletânea mista construída à volta da velhice e da memória rural:
    três poemas, dezassete contos e uma peça curta, reunidos sob um único
    tema, e não uma única forma.

# --- Contos ---

- id: jose-luis-peixoto/hoje-nao
  synopsis: >
    Seis contos - dois inéditos, quatro desenvolvidos a partir de textos
    publicados pela primeira vez no Jornal de Letras - lançados numa
    edição limitada "Inéditos Sábado" pelas Edições Quasi e distribuídos
    com a revista Sábado.

# --- Poesia ---

- id: jose-luis-peixoto/a-crianca-em-ruinas
  synopsis: >
    A estreia de Peixoto na poesia, reeditada várias vezes desde a
    primeira publicação. Venceu o Prémio da Sociedade Portuguesa de
    Autores em 2013, para o melhor livro de poesia publicado em Portugal
    no ano anterior.

- id: jose-luis-peixoto/a-casa-a-escuridao
  synopsis: >
    O segundo livro de poesia de Peixoto, publicado no mesmo ano que o
    romance de título semelhante
    [[work:jose-luis-peixoto/uma-casa-na-escuridao|Uma Casa na Escuridão]]
    e lido como o seu par poético: capítulos que acompanham uma relação
    desde os primeiros sinais até ao fim.

- id: jose-luis-peixoto/gaveta-de-papeis
  synopsis: >
    Um livro de poesia. Venceu o Prémio de Poesia Daniel Faria em 2008,
    atribuído ao melhor livro de poesia publicado em Portugal por um poeta
    com menos de 35 anos.

- id: jose-luis-peixoto/regresso-a-casa
  synopsis: >
    Um livro de poesia escrito em confinamento, que mapeia as quatro
    paredes de uma casa e as memórias que ali ficam: a solidão, as portas
    fechadas, uma mãe, um pai, a infância, e uma saudade de casa que corre
    a par de uma vontade inquieta de percorrer o mundo inteiro e voltar
    sempre. Venceu o Prémio Livro do Ano Bertrand 2020, na categoria de
    poesia; o seu regresso ao género ao fim de doze anos.

# --- Literatura de viagens ---

- id: jose-luis-peixoto/dentro-do-segredo
  synopsis: >
    Um relato de viagem de abril de 2012, quando Peixoto esteve entre os
    observadores estrangeiros admitidos na Coreia do Norte para o
    centenário do nascimento de Kim Il-sung, levado numa das viagens mais
    longas que o regime autorizara em décadas, por lugares fechados a
    estrangeiros havia sessenta anos.

- id: jose-luis-peixoto/o-caminho-imperfeito
  synopsis: >
    Um relato de viagem que começa como uma travessia pela Tailândia, para
    lá do circuito turístico, e se transforma em algo próximo de uma
    investigação depois da descoberta de restos humanos desmembrados numa
    estação dos correios de Banguecoque. Ilustrado do início ao fim por
    Hugo Makarov.

- id: jose-luis-peixoto/onde
  synopsis: >
    Fragmentos de prosa poética que mapeiam os concelhos de Abrantes,
    Constância e Sardoal - um itinerário literário pelo território dos
    poetas António Botto, Camões e Gil Vicente, e não uma narrativa com
    enredo.

# --- Literatura infantil ---

- id: jose-luis-peixoto/a-mae-que-chovia
  synopsis: >
    O primeiro livro infantil de Peixoto: um menino que acredita que a
    própria chuva é a sua mãe aprende a partilhar esse amor com o resto do
    mundo. Ilustrado por Daniel Silvestre da Silva; o primeiro livro de
    língua portuguesa traduzido e publicado na Mongólia (2016).

- id: jose-luis-peixoto/todos-os-escritores-do-mundo-tem-a-cabeca-cheia-de-piolhos
  synopsis: >
    Uma comichão permanente na cabeça de todos os escritores do mundo, que
    nenhum champô antipiolhos consegue acalmar: a aflição chega às
    primeiras páginas dos jornais e intriga os leitores deste livro e de
    todos os outros, numa parábola sobre o texto, a leitura, os livros e
    quem os escreve. Ilustrado por Rita Correia.

# --- Teatro ---

- id: jose-luis-peixoto/anatema
  synopsis: >
    Uma peça, traduzida para francês por Carlos Batista, que estreou em
    Paris, no Théâtre de la Bastille, no âmbito do Festival d'Automne;
    noticiada pela imprensa portuguesa como inspirada na crise dos reféns
    do teatro de Moscovo, em 2002.

- id: jose-luis-peixoto/a-manha
  synopsis: >
    Uma peça encenada pelo Teatro Meridional no Teatro São Luiz, em
    Lisboa, de 19 de janeiro a 5 de fevereiro, dentro da temporada
    2005-2006 da sala.

- id: jose-luis-peixoto/quando-o-inverno-chegar
  synopsis: >
    Uma peça encenada no Teatro São Luiz, em Lisboa, de 7 a 30 de junho,
    dentro da temporada 2006-2007 da sala.

- id: jose-luis-peixoto/estrangeiras
  synopsis: >
    Uma portuguesa, uma brasileira e uma cabo-verdiana, a tentar entrar
    nos Estados Unidos, são retidas juntas durante horas numa sala da
    polícia de fronteiras de um aeroporto, e vão revelando, aos poucos, o
    que cada uma pensa das outras e do seu próprio país: uma peça sobre os
    espaços partilhados e divididos de uma língua espalhada pelo mundo.
    Uma coprodução do Teatro Municipal do Porto encenada por João Branco,
    estreada a 8-9 de julho de 2016 na sala pequena do Rivoli, depois
    levada a palco no Brasil e em Cabo Verde; publicada em livro pela Rosa
    de Porcelana.
