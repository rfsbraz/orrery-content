# Português europeu (pt-PT) - acontecimentos específicos da coleção.
# Os acontecimentos de vida do autor estão em content/i18n/pt-PT/authors/.
# As notas de curadoria (`note:`) ficam na língua de base, por serem
# anotações editoriais e não prosa para o leitor.

- id: peixoto-saramago-death-2010
  title: Morte de José Saramago
  description: >
    O único Nobel da Literatura português morre em Lanzarote, nove anos
    depois de o prémio com o seu nome ter feito de Peixoto o seu mais jovem
    vencedor de sempre, aos 27 anos. Os nove anos entre um e outro não
    foram apenas um prémio com o seu nome: Peixoto já disse que os dois
    viajaram juntos, que foi hóspede em casa de Saramago várias vezes, e
    que levou consigo conselhos e reflexões de Saramago que lhe ficaram -
    "não concordo com tudo o que Saramago defendia, mas concordo com a
    convicção dele". A vida e a obra do próprio Saramago tornam-se depois o
    tema direto de
    [[work:jose-luis-peixoto/autobiografia|Autobiografia]] (2019), que
    ficciona episódios da sua vida a par dos de um jovem escritor; Peixoto
    já disse que teria achado intimidante publicar esse livro com Saramago
    ainda vivo.

- id: peixoto-cemiterio-francisco-lazaro
  title: A morte de um maratonista dá a Cemitério de Pianos o seu segundo Francisco
  description: >
    No lançamento do livro, Peixoto disse à Lusa que a personagem que
    partilha o nome do Francisco central do romance, e parte do seu
    destino, se inspira em Francisco Lázaro, o maratonista português que
    colapsou e morreu de insolação depois de 30 km da maratona dos Jogos
    Olímpicos de Estocolmo de 1912, uma morte que abalou o país na altura.
    Peixoto disse que a personagem se baseia apenas circunstancialmente no
    atleta, que "sempre me fascinou"; construiu também, de forma
    deliberada, um eco do Lázaro bíblico, ressuscitado dos mortos e, tal
    como o Francisco do romance, com duas irmãs chamadas Maria e Marta.

- id: peixoto-coreia-do-norte-2012
  title: Um telefonema para casa, e um susto que acaba num casaco esquecido
  description: >
    Em viagem pela Coreia do Norte em abril de 2012, para
    [[work:jose-luis-peixoto/dentro-do-segredo|Dentro do Segredo]] - entre
    os sorrisos fixos dos guias, um telemóvel confiscado e só devolvido no
    fim da viagem, e fotografias que lhe disseram para não tirar mas tirou
    na mesma - Peixoto descreveu a única vez em que o medo a sério o
    apanhou: depois de telefonar aos filhos em Portugal, que não sabiam que
    o pai estava na Coreia do Norte, e de enviar um postal, o pessoal do
    hotel chamou-o à receção por causa do ponto de envio do postal.
    Preparou-se para problemas. Só queriam saber se um casaco esquecido era
    seu.
