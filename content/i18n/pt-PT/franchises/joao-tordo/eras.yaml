# Português europeu (pt-PT) - períodos criativos.
# Traduzem-se o título do período, os temas (etiquetas de exibição) e a
# descrição. Os ids das referências inline ficam intocados; o texto visível
# dessas referências já é o título português.

- id: the-metaphysician
  title: Os Primeiros Romances
  themes: [memória, exílio e cidades estrangeiras, filosofia, fundo noir]
  description: >
    O licenciado em Filosofia a escrever uma ficção ensaística e voltada para
    fora: [[work:joao-tordo/o-livro-dos-homens-sem-luz|O Livro dos Homens Sem
    Luz]], [[work:joao-tordo/hotel-memoria|Hotel Memória]], o vencedor do
    Saramago [[work:joao-tordo/as-tres-vidas|As Três Vidas]],
    [[work:joao-tordo/o-bom-inverno|O Bom Inverno]], com hotéis, narradores
    expatriados e uma veia metafísica sob uma superfície de mistério. As Três
    Vidas valeu-lhe o Prémio José Saramago em 2009, e a série fecha com
    [[work:joao-tordo/biografia-involuntaria-dos-amantes|Biografia Involuntária
    dos Amantes]] (2014), o último livro antes da passagem para a Companhia das
    Letras.

- id: lugares-sem-nome
  title: A Trilogia dos Lugares Sem Nome
  themes: [ilhas, luto, metaficção, amor e desolação]
  description: >
    A trilogia assim baptizada pelo próprio Tordo: "no final desta 'trilogia dos
    lugares sem nome', iniciada com O luto de Elias Gro". O Tordo mais
    atmosférico e mais interior:
    [[work:joao-tordo/o-luto-de-elias-gro|O Luto de Elias Gro]],
    [[work:joao-tordo/o-paraiso-segundo-lars-d|O Paraíso Segundo Lars D.]] e
    [[work:joao-tordo/o-deslumbre-de-cecilia-fluss|O Deslumbre de Cecilia
    Fluss]], a instalar o luto em ilhas sem nome e batidas pelo mar, deixando
    cada livro dobrar-se no seguinte. Ao anunciar o primeiro, Tordo disse que
    seria diferente: um registo mais atmosférico e intimista, virado para a alma
    humana, "no que ela tem de mais obscuro e luminoso".

- id: the-crime-turn
  title: Os Romances Recentes
  themes: [ficção policial, culpa, Pilar Benamor, a mecânica do passado]
  description: >
    Os anos em que Tordo abre uma veia policial a par da literária. De
    [[work:joao-tordo/a-noite-em-que-o-verao-acabou|A Noite em que o Verão
    Acabou]] às investigações de Pilar Benamor
    ([[work:joao-tordo/aguas-passadas|Águas Passadas]],
    [[work:joao-tordo/os-dias-contados|Os Dias Contados]]), a par de romances
    autónomos e do vencedor do Fernando Namora
    [[work:joao-tordo/felicidade|Felicidade]]. Nas suas palavras, "a minha veia
    de escritor de policiais é muito diferente da do escritor literário, o que
    escreve os meus romances": uma segunda veia, e não uma mudança de rumo.
