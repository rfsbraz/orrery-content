# Português europeu (pt-PT) - sinopses.
# Os títulos NÃO são traduzidos: já são os originais portugueses. As notas de
# curadoria (`note:`) ficam na língua de base, por serem anotações editoriais e
# não prosa para o leitor. Onde a fonte inglesa assume incerteza, a incerteza é
# mantida em vez de ser suavizada.

# --- Primeira fase: os romances metafísicos e internacionais (2004-2013) ---

- id: joao-tordo/o-livro-dos-homens-sem-luz
  synopsis: >
    O romance de estreia de Tordo e o início da veia ensaística e metafísica que
    atravessa toda a sua primeira obra.

- id: joao-tordo/hotel-memoria
  synopsis: >
    Um romance da primeira fase, sobre a memória e o desenraizamento. Muito
    reeditado.

- id: joao-tordo/as-tres-vidas
  synopsis: >
    Um jovem entra na órbita de um escritor envelhecido, numa casa de campo, e
    da família que o rodeia, e uma história de amor e de saga familiar endurece
    até se tornar mistério. O livro que venceu o Prémio José Saramago de 2009 e
    continua a ser a porta de entrada mais recomendada na obra de Tordo.
    Traduzido em várias línguas (em inglês, "The Three Lives").

- id: joao-tordo/o-bom-inverno
  synopsis: >
    Um narrador frustrado e hipocondríaco viaja para um encontro literário em
    Budapeste e deixa-se convencer por um jovem escritor italiano a ir para uma
    casa perdida numa floresta italiana, chamada "O Bom Inverno". Finalista do
    prémio de ficção narrativa da APE e do Prémio Fernando Namora.

- id: joao-tordo/anatomia-dos-martires
  synopsis: >
    Um romance de culpa e de ajuste de contas, vindo do centro da primeira fase
    de Tordo.

- id: joao-tordo/o-ano-sabatico
  synopsis: >
    Um romance que fecha o primeiro ciclo, antes da trilogia insular.

# --- O período dos Lugares Sem Nome e a Biografia (2014-2017) ---

- id: joao-tordo/biografia-involuntaria-dos-amantes
  synopsis: >
    Uma história de amor reconstruída contra a vontade do narrador: a charneira
    entre os primeiros romances e a atmosférica trilogia insular que se lhe
    segue.

- id: joao-tordo/o-luto-de-elias-gro
  synopsis: >
    Numa ilha pequena, perdida no Atlântico, um homem dilacerado pelo passado
    fecha-se num farol abandonado, entre figuras singulares: o padre sonhador
    Elias Gro, uma rapariga hábil em anatomia, um velho louco que vagueia pelas
    noites. O livro mais atmosférico e mais íntimo de Tordo, primeiro volume da
    Trilogia dos Lugares Sem Nome.

- id: joao-tordo/o-paraiso-segundo-lars-d
  synopsis: >
    Numa manhã de inverno, um escritor de sessenta anos, Lars, encontra uma
    jovem adormecida no seu carro e afasta-se de um casamento de uma vida
    inteira, deixando para trás um romance inédito seu intitulado "O Luto de
    Elias Gro". O segundo volume dobra o primeiro dentro de si.

- id: joao-tordo/o-deslumbre-de-cecilia-fluss
  synopsis: >
    Matias, um discreto professor universitário, é puxado de volta para o
    desaparecimento da irmã, Cecilia, vista pela última vez a saltar de uma
    ponte, quando uma carta do passado lhe reabre a ferida. O terceiro volume
    fecha a trilogia sobre a memória, o amor e a desolação.

# --- Final da década de 2010: a ponte para o policial ---

- id: joao-tordo/ensina-me-a-voar-sobre-os-telhados
  synopsis: >
    Um romance terno, embebido em memória; finalista do Prémio Oceanos de 2019.

- id: joao-tordo/a-mulher-que-correu-atras-do-vento
  synopsis: >
    Um romance de 2019.

- id: joao-tordo/a-noite-em-que-o-verao-acabou
  synopsis: >
    A estreia de Tordo no género policial: um thriller em torno de Pedro Taborda
    e de Laura Walsh que abre o registo detetivesco que viria a desenvolver.
    Antecede os romances de Pilar Benamor, embora ela não seja a sua
    protagonista.

- id: joao-tordo/felicidade
  synopsis: >
    O romance que venceu o Prémio Fernando Namora (2021).

# --- A série policial de Pilar Benamor e os romances tardios (2021-2025) ---

- id: joao-tordo/aguas-passadas
  synopsis: >
    A subcomissária da PSP Pilar Benamor, corajosa, tenaz e com os seus próprios
    segredos dolorosos, é a primeira a chegar ao local do homicídio de uma
    criança, onde conhece Cícero, um antigo informador da polícia que vive
    isolado. Um romance policial de ritmo implacável.

- id: joao-tordo/naufragio
  synopsis: >
    A bordo do pequeno barco Narcisse, com uma guitarra velha e um cão chamado
    Sozinho, um homem tenta voltar a dar sentido à sua vida, até que uma figura
    do passado lhe muda o rumo. Um romance literário autónomo, não um caso de
    Benamor.

- id: joao-tordo/cem-anos-de-perdao
  synopsis: >
    Um romance policial de Pilar Benamor, situado na série entre
    [[work:joao-tordo/aguas-passadas|Águas Passadas]] e
    [[work:joao-tordo/os-dias-contados|Os Dias Contados]].

- id: joao-tordo/o-nome-que-a-cidade-esqueceu
  synopsis: >
    Um romance de 2023.

- id: joao-tordo/os-dias-contados
  synopsis: >
    Uma viagem às origens de Pilar Benamor: os seus primeiros dias fora da
    academia e o caso que lhe acordou todos os fantasmas. Segue-se a
    [[work:joao-tordo/aguas-passadas|Águas Passadas]] e a Cem Anos de Perdão.

- id: joao-tordo/inventario-da-solidao
  synopsis: >
    Um romance de 2025.

# --- Não ficção ---

- id: joao-tordo/manual-de-sobrevivencia-de-um-escritor
  synopsis: >
    Um livro de não ficção sobre o ofício de escrever, nascido das oficinas de
    escrita criativa de Tordo. O único título que não é romance neste conjunto.
