# Português europeu (pt-PT) - ordens de leitura curadas.
# O nome da ordem (Trilogia dos Lugares Sem Nome) já é português e não é
# traduzido; a lista orderedWorkIds é dado funcional e não se repete aqui.

- id: joao-tordo/lugares-sem-nome
  rationale: >
    Os três romances dos lugares sem nome estão numerados de 1 a 3 pela editora
    e leem-se como um só arco sobre o luto em ilhas batidas pelo mar. Leia-os
    por ordem, porque
    [[work:joao-tordo/o-paraiso-segundo-lars-d|O Paraíso Segundo Lars D.]]
    contém discretamente
    [[work:joao-tordo/o-luto-de-elias-gro|O Luto de Elias Gro]] como um romance
    escrito pelo seu próprio protagonista: uma dobra que só resulta se o
    primeiro livro tiver vindo primeiro. Esta ordem coincide com a de
    publicação; existe para nomear e enquadrar a trilogia, não para a baralhar.
  debated:
    - "A cronologia interna da trilogia é frouxa e os seus lugares são deliberadamente inominados; a numeração 1-2-3 da editora é a âncora aqui usada."
