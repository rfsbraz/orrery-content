# Português europeu (pt-PT) - acontecimentos específicos da coleção.
# Os acontecimentos de vida do autor estão em content/i18n/pt-PT/authors/.

- id: saramago-death-2010
  title: Morte de José Saramago
  description: >
    O único Nobel da Literatura português morre em Lanzarote, um ano depois de o
    prémio com o seu nome ter ido para
    [[work:joao-tordo/as-tres-vidas|As Três Vidas]]. A partida da figura maior
    das letras portuguesas contemporâneas: o clima sobre o meio em que Tordo
    então entrava.

- id: lugares-sem-nome-completed-2017
  title: A Trilogia dos Lugares Sem Nome fica completa
  description: >
    [[work:joao-tordo/o-deslumbre-de-cecilia-fluss|O Deslumbre de Cecilia
    Fluss]] fecha a trilogia insular iniciada em 2015: o ponto mais alto do
    Tordo atmosférico e interior, antes do desvio para a ficção policial.
