# European Portuguese (pt-PT) overlay. Only translated prose; the id, name,
# authorIds and sources stay in the base file. The startHere paths carry only
# their id and prose - never workIds, orderId or fit (docs/SCHEMA.md, "Nested
# lists merge by id").
- id: cosmere
  description: >
    A obra publicada completa de Brandon Sanderson - o Cosmere no seu centro
    interligado (Mistborn, O Arquivo das Tempestades, Elantris, Warbreaker e os
    volumes autónomos que os unem num só universo), a par da ficção científica
    de Skyward e dos Reckoners, dos livros juvenis Alcatraz, das novelas Legion
    e de uma longa cauda de histórias, colaborações e curiosidades.
  startHere:
    paths:
      - id: mistborn-first
        title: Começar por Mistborn
        description: >
          A entrada habitual. Uma trilogia de assalto e revolução, compacta e
          autossuficiente, com um sistema mágico limpo e regido por regras -
          curta o suficiente para se terminar, e ligada o suficiente para
          mostrar como o Cosmere funciona.
        note: >
          Um dos dois livros para que o próprio Sanderson aponta quem já lê
          fantasia, e o livro que lhe valeu A Roda do Tempo. O custo é
          comprometer-se com três volumes antes de ler uma linha das duas
          grandes epopeias do Cosmere.
      - id: stormlight-first
        title: Direto para O Arquivo das Tempestades
        description: >
          Para quem quer primeiro a epopeia. A série principal da casa - mundo
          vasto, personagens profundas, volumes de grande dimensão. O maior
          compromisso e, para muitos, a maior recompensa.
        note: >
          Um dos cinco pontos de entrada que Sanderson considera igualmente
          válidos. Só comece por aqui se livros longos não o assustarem, e
          sabendo que a série está por terminar: entra numa história que ainda
          não tem fim.
      - id: standalones-first
        title: Experimentar a água com um volume autónomo do Cosmere
        description: >
          A forma de entrar no universo partilhado com menor compromisso - um
          único livro belo pelo qual pode julgar o autor antes de se
          comprometer com uma série.
          Experimente o vencedor do Hugo The Emperor's Soul, o Warbreaker com o
          seu travo a romance, ou Elantris, o livro que Sanderson dá a quem não
          costuma ler fantasia.
        note: >
          São três dos cinco livros que Sanderson aponta como bons pontos de
          partida. O custo é que um volume autónomo lhe mostra o escritor mas
          não o universo: as ligações que fazem do Cosmere o Cosmere só se
          acendem de série para série.
      - id: outside-the-cosmere
        title: Começar fora do Cosmere
        description: >
          Metade desta estante não é fantasia épica. Steelheart abre um
          thriller de super-heróis, The Rithmatist um mistério escolar de
          duelos a giz, e Alcatraz vs. the Evil Librarians uma aventura muito
          disparatada para leitores mais novos. Livros curtos, entradas
          rápidas, e os três que o próprio Sanderson dá a quem não costuma ler
          fantasia ou a quem é ainda muito jovem.
        note: >
          O custo é que nada disto se liga: estes livros não partilham universo
          uns com os outros nem com o Cosmere, pelo que nada do que aqui
          aprende passa para a parte da estante que é uma só história
          encadeada.
      - id: everything-in-order
        title: Tudo, por ordem de publicação
        description: >
          A estante completa, Cosmere e não Cosmere, pela ordem em que foi
          escrita - vê-se o universo a montar-se e as ligações a acenderem-se
          tal como aconteceu para os leitores em tempo real, com os livros de
          super-heróis, a ópera espacial e as comédias infantis a caírem pelo
          meio tal como caíram para toda a gente. A camada de aura foi
          construída exatamente para este percurso. O custo é real: lê os
          primeiros Elantris e Mistborn antes de Sanderson ser o escritor de que
          os últimos são, e recebe no mesmo ano uma farsa juvenil e uma epopeia
          de mil páginas sem qualquer aviso.
