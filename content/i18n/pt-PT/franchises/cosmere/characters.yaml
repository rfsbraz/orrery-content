# Portuguese (pt-PT) overlay for the Cosmere worldhopper characters.
# Only `description` is translated: `name` and `aka` are proper nouns and the
# per-appearance notes stay in the base language. Terminology follows the rest
# of the overlay (O Arquivo das Tempestades; Mistborn fica em inglês, por não
# haver edição portuguesa).

- id: cosmere/hoid
  description: >
    Um viajante misterioso e sem idade que aparece, muitas vezes disfarçado de
    mendigo, informador, bobo da corte ou contador de histórias errante, em
    quase todos os mundos do Cosmere. Dar por ele é a primeira pista que o
    leitor tem de que estas séries separadas partilham um só universo.

- id: cosmere/khriss
  description: >
    Uma erudita do mundo de Taldain que estuda os sistemas de magia do Cosmere
    e viaja entre mundos para o fazer. Os seus ensaios, escritos de dentro do
    próprio universo, são a visita guiada do leitor ao funcionamento real do
    universo partilhado.

- id: cosmere/nazh
  description: >
    Um agente que recolhe mapas, documentos e artefactos de todos os mundos
    para Khriss. As suas anotações secas surgem nas margens de mapas e papéis
    da própria ficção, assinatura discreta do universo mais vasto a observar.

- id: cosmere/kelsier
  description: >
    O chefe de bando carismático e marcado por cicatrizes que está no centro da
    primeira era da saga Mistborn, ladrão e revolucionário cuja lenda acaba por
    ultrapassá-lo.

- id: cosmere/sigzil
  description: >
    Um membro da Ponte Quatro, em O Arquivo das Tempestades, que conhece mundo:
    foi aprendiz de um saltador de mundos e é mais viajado do que deixa
    transparecer.
