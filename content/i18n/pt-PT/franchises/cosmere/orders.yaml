# European Portuguese (pt-PT) overlay for the additional canon orders.
# An order's `name` IS translated: it is a curated label a reader picks from,
# not a proper noun, and validate.py allows it here (NAME_ALLOWED_IN). Names are
# kept short so they do not wrap in the order selector. Work titles inside the
# prose keep their English form unless a Portuguese edition exists.

- id: cosmere/recommended-reading-order
  name: A ordem de leitura recomendada
  rationale: >
    A ordem em que a maioria dos guias do Cosmere converge para quem chega de
    novo: começar pela trilogia autossuficiente de Mistborn, passar pelos
    volumes autónomos, depois ler O Arquivo das Tempestades e a segunda era de
    Mistborn mais ou menos intercalados, com as novelas encaixadas onde calham,
    e terminar nos volumes autónomos recentes e em
    [[work:cosmere/wind-and-truth|Wind and Truth]]. Troca a cronologia estrita
    pela melhor experiência de leitura, mantendo na sua sequência de publicação
    os livros mais tardios que estragariam os anteriores.
  debated:
    - "Colocação de Elantris: alguns guias abrem com ele, por ser o primeiro livro do Cosmere publicado; outros (e o próprio Sanderson) colocam-no depois de Mistborn, por Mistborn ser a entrada mais suave."
    - "Mistborn: Secret History fica aqui depois de The Bands of Mourning porque revela o final da primeira era de Mistborn e assenta melhor com a segunda era já em curso; há quem o leia logo a seguir a The Hero of Ages."
    - "As novelas reunidas em Arcanum Unbounded (Shadows for Silence, Sixth of the Dusk, The Hope of Elantris, The Eleventh Metal) podem ser lidas em conjunto através da coletânea, em vez de nestes pontos individuais."
    - "The Sunlit Man é deliberadamente colocado no fim; traz ligeiras revelações de ligação e lê-se melhor com o contexto de O Arquivo das Tempestades e da segunda era, embora funcione por si só."

- id: cosmere/chronological-inuniverse
  name: Ordem cronológica interna
  rationale: >
    A ordem pela qual os acontecimentos ocorrem na cronologia interna do
    Cosmere, e não a ordem pela qual os livros foram escritos. Sanderson afirmou
    que a datação entre séries é intencionalmente imprecisa e ainda está a
    mudar, pelo que esta é uma reconstrução da comunidade, feita o melhor
    possível: o grupo "moderno" (Sel, a primeira era de Scadrial, Nalthis,
    Roshar) fica muito próximo, a segunda era de Mistborn passa-se séculos
    depois, e as histórias do futuro distante fecham a linha. Não é recomendada
    para uma primeira leitura - vários livros situados mais cedo foram
    publicados mais tarde e estragam livros que se passam depois deles.
  debated:
    - "A intercalação de Elantris/Sel, da primeira era de Mistborn, de Warbreaker e de O Arquivo das Tempestades é genuinamente incerta; estes mundos são mais ou menos contemporâneos e as suas datas relativas exatas não estão fixadas, nem sequer pelo autor."
    - "A posição de White Sand (Taldain) é uma das mais indefinidas; é colocada cedo por convenção, mas pode mudar."
    - "O primeiro arco de O Arquivo das Tempestades e a segunda era de Mistborn estão próximos no tempo e a sua ordem relativa é debatida; aqui Wind and Truth fica antes da segunda era, mas há argumentos fortes a favor de uma sobreposição."
    - "Sixth of the Dusk e Isles of the Emberdark (First of the Sun) situam-se no fim, mas antes ou à volta de The Sunlit Man, que é a história publicada do Cosmere mais distante no futuro."

- id: cosmere/author-recommended
  name: A orientação do próprio Sanderson
  rationale: >
    Sanderson recusa-se a impor uma ordem única. As suas FAQ dizem que qualquer
    série do Cosmere é um bom ponto de partida, que se deve ler cada série pela
    sua ordem interna (não saltar logo para o segundo livro) e que os volumes
    autónomos podem ir quase para qualquer lado. Os cinco "bons primeiros
    livros" que enumera são
    [[work:cosmere/the-final-empire|O Império Final]],
    [[work:cosmere/the-emperors-soul|The Emperor's Soul]],
    [[work:cosmere/the-way-of-kings|O Caminho dos Reis]],
    [[work:cosmere/elantris|Elantris]] e
    [[work:cosmere/warbreaker|Warbreaker]]. Esta sequência segue as regras dele
    - cada série intacta, volumes autónomos intercalados - em vez de impor uma
    ordem que ele deixa explicitamente em aberto.
  debated:
    - "Sanderson sublinha que esta é uma disposição válida, e não a ordem; considera a escolha da série intermutável."
    - "Avisa especificamente contra começar por The Alloy of Law, uma vez que estraga a trilogia original de Mistborn - daí a segunda era vir aqui depois da primeira."
