# European Portuguese (pt-PT) overlay for the creative periods.
# Inline reference display text uses the published Portuguese title where one
# exists (Saída de Emergência for Mistborn, Kathartika for Stormlight and the
# standalones); everything else keeps its English title. The non-Cosmere works
# named here have no Portuguese edition, so those titles stand in English.

- id: cosmere/the-long-apprenticeship
  title: Os Anos Por Publicar
  themes: [romances na gaveta, magia dura, construção de mundos, o Cosmere concebido]
  description: >
    Anos de romances por publicar, escritos à volta de turnos da noite e dos
    estudos na Brigham Young University. As recusas construíram um ofício e,
    a par dele, a cosmologia privada que os livros do Cosmere viriam a habitar.
    O período termina quando [[work:cosmere/elantris|Elantris]], o sexto desses
    rascunhos, é vendido à Tor e chega às livrarias em 2005. Nas palavras do
    próprio Sanderson, passou os seus vinte anos "a escrever, a tentar
    servilmente perceber como se constrói uma história".

- id: cosmere/debut-and-the-wheel-of-time
  title: A Estreia e os Anos de A Roda do Tempo
  themes: [rutura para o grande público, sistemas mágicos regidos por regras, o universo partilhado semeado, dupla carga de trabalho]
  description: >
    As fundações são lançadas depressa: [[work:cosmere/elantris|Elantris]], a
    trilogia Mistborn (a partir de
    [[work:cosmere/the-final-empire|O Império Final]]) e
    [[work:cosmere/warbreaker|Warbreaker]] estabelecem a assinatura de
    Sanderson, uma magia rigorosa e cheia de consequências. A meio da década,
    escolhido para terminar A Roda do Tempo de Robert Jordan, escreve a um ritmo
    duplo e brutal - a abrir a sua própria epopeia com
    [[work:cosmere/the-way-of-kings|O Caminho dos Reis]], em 2010, enquanto leva
    a série de Jordan até ao fim, em janeiro de 2013. A segunda carreira corre
    ao lado desta o tempo todo: o infantojuvenil
    [[work:cosmere/alcatraz-versus-the-evil-librarians|Alcatraz vs. the Evil
    Librarians]] a partir de 2007, as novelas
    [[work:cosmere/legion|Legion]] a partir de 2012 e, só em 2013,
    [[work:cosmere/the-rithmatist|The Rithmatist]] e
    [[work:cosmere/steelheart|Steelheart]].

- id: cosmere/building-the-cosmere
  title: A Construção do Cosmere
  themes: [o universo tornado explícito, novelas, ligações mais profundas, o auge de O Arquivo das Tempestades]
  description: >
    Ao longo de um dos fios destes anos, o universo partilhado deixa de ser um
    jogo privado e passa a texto: O Arquivo das Tempestades cresce até se tornar
    o pilar da casa ([[work:cosmere/words-of-radiance|Palavras de Radiância]],
    [[work:cosmere/oathbringer|Juramentada]],
    [[work:cosmere/rhythm-of-war|Rhythm of War]]), a segunda era de Mistborn
    prossegue com [[work:cosmere/shadows-of-self|Shadows of Self]], uma série de
    novelas preenche os cantos e
    [[work:cosmere/arcanum-unbounded|Arcanum Unbounded]] mapeia o conjunto para
    os leitores. É um fio entre vários: o mesmo período leva os Reckoners até ao
    fim em [[work:cosmere/calamity|Calamity]] e abre a sequência Skyward com
    [[work:cosmere/skyward|Skyward]] e [[work:cosmere/starsight|Starsight]].

- id: cosmere/the-dragonsteel-era
  title: A Era Dragonsteel
  themes: [autopublicação, financiamento coletivo recorde, volumes autónomos, arcos que fecham]
  description: >
    Sanderson constrói a carreira em torno da sua própria empresa, anunciando em
    2021 que "mudámos de marca e somos agora a Dragonsteel Books". O Kickstarter
    recordista de 2022 dá origem aos volumes autónomos do "Ano de Sanderson", em
    2023 - [[work:cosmere/tress-of-the-emerald-sea|Tress do Mar Esmeralda]],
    [[work:cosmere/yumi-and-the-nightmare-painter|Yumi and the Nightmare Painter]],
    [[work:cosmere/the-sunlit-man|The Sunlit Man]] - enquanto
    [[work:cosmere/the-lost-metal|The Lost Metal]] encerra a segunda era de
    Mistborn e [[work:cosmere/wind-and-truth|Wind and Truth]] fecha o primeiro
    arco de O Arquivo das Tempestades. Os outros fios fecham no mesmo trecho:
    [[work:cosmere/cytonic|Cytonic]] e [[work:cosmere/defiant|Defiant]] terminam
    Skyward, e
    [[work:cosmere/bastille-vs-the-evil-librarians|Bastille vs. the Evil
    Librarians]] regressa a Alcatraz seis anos depois.
