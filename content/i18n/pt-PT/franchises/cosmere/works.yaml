# European Portuguese (pt-PT) overlay: synopses only.
# Work titles are NEVER translated here - a Portuguese title is edition data and
# lives in editions.yaml.
#
# Terminology: "Alomancia" is the term used by the Portuguese Mistborn
# translation (Jorge Candeias, Saída de Emergência) and is used here. Terms with
# no verified Portuguese edition behind them are described plainly rather than
# coined.

- id: cosmere/elantris
  synopsis: "Numa cidade de reis-deuses caídos, um príncipe amaldiçoado e uma princesa estrangeira desvendam por que falhou a magia que tornava Elantris divina."

- id: cosmere/the-hope-of-elantris
  synopsis: "Um breve epílogo a Elantris, contado do ponto de vista de uma professora durante a noite decisiva do romance."

- id: cosmere/the-emperors-soul
  synopsis: "Condenada à morte, uma mestra falsificadora recebe uma tarefa impossível: reconstruir a alma de um imperador assassinado a partir de magia gravada em selos, antes que se lhe esgote o tempo."

- id: cosmere/the-final-empire
  synopsis: "Uma ladra de rua junta-se a um bando de rebeldes que usam magia e planeiam roubar e derrubar o imperador-deus imortal que governa há mil anos um mundo sufocado pela cinza."

- id: cosmere/the-well-of-ascension
  synopsis: "Com o tirano derrubado, os rebeldes têm de defender uma cidade sitiada e uma ordem nova e frágil, enquanto uma ameaça mais funda e mais antiga se agita sob a religião do mundo."

- id: cosmere/the-hero-of-ages
  synopsis: "À medida que a cinza cai mais espessa e o mundo começa a morrer, o bando corre para decifrar uma profecia e a verdadeira natureza dos poderes por detrás do seu planeta."

- id: cosmere/the-eleventh-metal
  synopsis: "Uma curta prequela que mostra o jovem rebelde Kelsier a ser treinado no uso dos metais da Alomancia."

- id: cosmere/mistborn-secret-history
  synopsis: "Uma novela complementar que reconta a primeira era de Mistborn a partir de um ponto de observação escondido, reenquadrando acontecimentos que os leitores julgavam compreender."

- id: cosmere/the-alloy-of-law
  synopsis: "Três séculos depois, a velha magia encontra os caminhos de ferro e os revólveres, quando um homem da lei da fronteira tornado nobre é puxado de volta para a caça a um criminoso mascarado, na capital industrial."

- id: cosmere/shadows-of-self
  synopsis: "Uma série de homicídios com assinatura sobrenatural arrasta o homem da lei e o seu grupo para uma conspiração que chega aos deuses da cidade e ao seu próprio passado."

- id: cosmere/the-bands-of-mourning
  synopsis: "Uma expedição atrás de uma lendária relíquia perdida transforma-se numa corrida contra um poder rival capaz de alterar o equilíbrio do mundo."

- id: cosmere/the-lost-metal
  synopsis: "A saga de Wax e Wayne encerra-se quando uma conspiração que ameaça toda a cidade obriga os seus heróis a enfrentar inimigos vindos de fora do seu mundo."

- id: cosmere/warbreaker
  synopsis: "Duas irmãs de sangue real, um deus que não acredita na sua própria divindade e um mercenário com uma espada consciente colidem numa cidade onde a magia se compra em respirações e em cor."

- id: cosmere/the-way-of-kings
  synopsis: "Num mundo varrido por tempestades titânicas, um escravo caído em desgraça, um alto-príncipe atormentado e uma estudiosa relutante são atraídos para o regresso de uma guerra e de uma magia há muito tida por morta."

- id: cosmere/words-of-radiance
  synopsis: "Enquanto um inimigo antigo se agita, os sobreviventes das planícies fraturadas têm de se tornar algo que o mundo não vê há milénios - antes que as tempestades destruam tudo."

- id: cosmere/edgedancer
  synopsis: "Uma rapariga fugitiva com queda para o impossível e apetite por panquecas persegue um assassino por uma cidade de comércio, numa novela situada entre os dois primeiros romances de O Arquivo das Tempestades."

- id: cosmere/oathbringer
  synopsis: "Com a tempestade do inimigo solta sobre o mundo, uma nova ordem de cavaleiros tem de manter unida uma coligação, enquanto os seus líderes ajustam contas com os crimes das suas próprias histórias."

- id: cosmere/dawnshard
  synopsis: "A tripulação de um navio ruma a uma ilha proibida levando um segredo capaz de reconfigurar a guerra, numa novela que faz a ponte entre o terceiro e o quarto romances de O Arquivo das Tempestades."

- id: cosmere/rhythm-of-war
  synopsis: "Um ano de guerra de desgaste decide-se num cerco, numa torre capturada e no estudo perigoso que uma estudiosa faz da magia do inimigo e da natureza dos próprios poderes."

- id: cosmere/wind-and-truth
  synopsis: "Uma contagem decrescente de dez dias até um confronto que decidirá o mundo encerra o primeiro arco de O Arquivo das Tempestades, levando cada juramento e cada aliança ao ponto de rutura."

- id: cosmere/tress-of-the-emerald-sea
  synopsis: "Uma limpadora de janelas deixa a segurança da sua ilha para atravessar mares de esporos mortíferos e resgatar o homem que ama, num volume autónomo com sabor a conto de fadas, narrado por um contador de histórias errante bem conhecido."

- id: cosmere/yumi-and-the-nightmare-painter
  synopsis: "Uma sacerdotisa de santuário presa a uma rotina rígida e um pintor que afugenta pesadelos veem os seus dois mundos, muito diferentes, trocarem de corpos e de vidas, num volume autónomo inspirado em influências japonesas e coreanas."

- id: cosmere/the-sunlit-man
  synopsis: "Um refugiado perseguido despenha-se num mundo calcinado onde a madrugada mata, e tem de libertar o seu povo enquanto se mantém um passo à frente dos poderes que o caçam pelas estrelas."

- id: cosmere/isles-of-the-emberdark
  synopsis: "Um caçador de aves sobrenaturais corre para modernizar o povo da sua ilha antes que invasores vindos das estrelas o consigam conquistar, num romance que expande o mundo da novela Sixth of the Dusk."

- id: cosmere/shadows-for-silence
  synopsis: "Uma estalajadeira e caçadora de recompensas num bosque assombrado quebra as regras que mantêm os mortos à distância, para proteger a família, numa novela autossuficiente."

- id: cosmere/sixth-of-the-dusk
  synopsis: "Numa ilha letal, um caçador solitário que se liga a aves capazes de alterar a mente descobre que o seu povo não está tão só no universo como acredita."

- id: cosmere/arcanum-unbounded
  synopsis: "A primeira coletânea reunida do Cosmere - ficção curta de todos os mundos, com os ensaios de uma erudita de dentro do próprio universo, que mapeiam pela primeira vez o universo partilhado."

- id: cosmere/white-sand
  synopsis: "Num mundo de rotação síncrona, de dia e de escuridão sem fim, um fraco mago da areia sobrevive a um massacre e tem de dominar uma magia em decadência, adaptado como trilogia de banda desenhada a partir de um romance inicial e nunca publicado de Sanderson."
