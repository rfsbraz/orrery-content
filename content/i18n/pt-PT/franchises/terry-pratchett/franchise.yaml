# Portuguese (pt-PT) overlay for the Terry Pratchett franchise.
# Only translatable prose - id, slugs and sources stay in the base file, and the
# startHere paths carry no structure (no workIds, orderId or fit).
# Book titles use the published Portuguese edition where one exists (see
# editions.yaml); the rest stay in English, as no Portuguese edition exists.

- id: terry-pratchett
  description: >
    A estante completa de Terry Pratchett, desde um primeiro romance escrito na
    adolescência, passando pela ficção científica, pelas trilogias infantis e
    pelas colaborações, até às colectâneas de contos publicadas depois da sua
    morte. No centro estão os 41 romances do Mundo Disco: o mundo plano assente
    no dorso de quatro elefantes sobre uma tartaruga gigante, onde a paródia de
    fantasia cresce até dar uma das sátiras cómicas mais afiadas escritas em
    inglês.
  startHere:
    paths:
      - id: three-ways-in
        title: Os três primeiros livros do costume do Mundo Disco
        description: >
          Os romances do Mundo Disco que mais vezes se põem nas mãos de um leitor
          novo: Mort (a Morte arranja um aprendiz), Guards! Guards! (o nascimento
          da Guarda) e Small Gods (a obra autónoma que muitos consideram a melhor
          de todas). Qualquer um deles é um bom teste para perceber se o Disco é
          para si. Fica a custar-lhe o resto da estante, para já: isto é uma
          entrada na série, não em Pratchett, e deixa de fora por completo os
          livros para crianças e as colaborações.
        note: >
          Deliberadamente, não A Cor da Magia. Os dois primeiros livros de
          Rincewind são paródia larga e o pior sítio para começar; tanto o mundo
          como a sátira só ganham gume alguns livros mais à frente.

      - id: straight-into-the-watch
        title: Diretamente para a Guarda da Cidade
        description: >
          O fio mais estimado do Mundo Disco: Sam Vimes e a Guarda de
          Ankh-Morpork, de um bêbado caído na sarjeta à consciência de uma
          cidade. Oito livros que se leem como um único arco sobre a lei, o poder
          e a decência, retirados de uma série de 41 romances com que, de resto,
          só se cruza de passagem.

      - id: the-witches
        title: As Bruxas
        description: >
          A Granny Weatherwax, a Nanny Ogg e a Magrat: cabeçologia, Shakespeare
          emprestado e a tirania das histórias. Um percurso autónomo do Mundo
          Disco que alimenta também os livros de Tiffany Aching, e é isso mesmo
          que custa: os seis livros são um arco completo, mas não a história
          inteira a que pertencem.

      - id: start-young
        title: Começar novo, com Tiffany Aching
        description: >
          Os cinco livros de Tiffany Aching são escritos para leitores mais
          novos, mas atingem os adultos com a mesma força: uma rapariga das
          terras de giz a tornar-se bruxa. Uma entrada limpa e moderna no Mundo
          Disco, que não exige nenhuma leitura anterior, ao preço de se começar
          pelo lado tardio da série e de se conhecer as bruxas mais velhas com
          uma história que ainda não se leu.
        note: >
          A melhor rampa de acesso para leitores mais novos, e para adultos que
          queiram um arco completo e terminado, contado por uma única voz forte.

      - id: the-whole-disc
        title: Tudo, pela ordem
        description: >
          A estante completa por ordem de publicação, desde o romance que
          Pratchett começou ainda adolescente até aos contos reunidos depois da
          sua morte. Vê-se um escritor de ficção científica a tornar-se
          romancista cómico e depois satirista, com os 41 romances do Mundo Disco
          a atravessar tudo pelo meio. A camada de aura foi feita exatamente para
          este percurso.
        note: >
          Este percurso não abre sequer no Mundo Disco: começa com três romances
          dos anos 70 e de 1981 que não se parecem nada com os livros que deram
          fama a Pratchett, e o próprio Disco começa pelos dois volumes que mais
          dividem opiniões. Os completistas que entram avisados são recompensados
          à medida que a escrita ganha gume à frente dos seus olhos.
