# Portuguese (pt-PT) overlay for the Discworld reading orders.
# Order names are descriptive labels ("The Rincewind thread"), not published
# series branding, so they are translated as descriptions: "O fio de Rincewind".
# The character, place and subseries names inside them are left alone. Book
# titles use the published Portuguese edition where one exists; the rest stay
# in English.

- id: terry-pratchett/rincewind
  name: O fio de Rincewind
  rationale: >
    O feiticeiro que não sabe fazer magia e não consegue parar de fugir. É aqui
    que a série começa e é aqui que vive a paródia mais larga dos primeiros
    livros; o fio ganha leveza e amplitude à medida que avança. Um
    percurso completo para quem quer o Disco cómico e aventureiro. É o mais
    exigente dos seis: abre com os dois livros que a maioria dos leitores
    considera mais fracos e é o fio que fica mais perto da paródia enquanto o
    resto da série cresce para a sátira, pelo que é também o que menos mostra
    daquilo em que o Disco se tornou.
  debated:
    - "A Cor da Magia e A Luz Fantástica são uma história em duas partes e o pior ponto de partida; muitos leitores começam o percurso de Rincewind em Fontiçaria ou passam diretamente para outro fio."
    - "The Last Hero é uma novela ilustrada curta que vai muito além de Rincewind; há esquemas que o colocam como obra autónoma em vez de o incluírem neste fio."
    - "Unseen Academicals aparece muitas vezes traçado na linha de Rincewind e dos feiticeiros por causa do elenco da Universidade Invisível, mas Rincewind tem aí um papel secundário; este acervo classifica-o como obra autónoma."

- id: terry-pratchett/witches
  name: O fio das Bruxas
  rationale: >
    A Granny Weatherwax e o coven de Lancre: mais cabeçologia do que chapéus, e
    histórias sobre o perigo das histórias. Lê-se como um arco forte e autónomo e
    é, por si só, um ponto de entrada frequente. O que custa: os livros de
    Tiffany Aching levam as preocupações deste fio, e várias das suas
    personagens, bem para além do ponto onde este percurso para, pelo que os
    seis livros são um arco completo, mas não a história inteira a que
    pertencem.
  debated:
    - "Ritos Iguais apresenta a Granny Weatherwax mas não o coven completo (a Nanny Ogg e a Magrat só chegam em As Três Bruxas); há leitores que consideram As Três Bruxas o verdadeiro início do fio."
    - "Os livros de Tiffany Aching prolongam a linhagem das bruxas e a Granny Weatherwax passa para dentro deles; lê-los como parte deste fio ou como um fio próprio é questão de gosto."

- id: terry-pratchett/death
  name: O fio da Morte
  rationale: >
    A Morte do Disco: gosta de gatos, de caril e da humanidade, e anda sempre a
    tentar perceber o ofício. Alguns dos livros mais calorosos e mais filosóficos
    de Pratchett, mais a sua neta, a Susan. O custo é real e passa facilmente
    despercebido: a Morte aparece, de passagem, em quase todos os outros
    romances, pelo que uma leitura por fios dá cinco livros de uma personagem
    que, de outro modo, se encontraria por toda a parte, e perde-se o
    desenvolvimento cronológico do Disco e apanham-se as piadas recorrentes a
    meio do voo.
  debated:
    - "O arco da Susan Sto Helit vai de Soul Music a Hogfather e a Thief of Time; quem se interessa sobretudo por ela começa por vezes em Soul Music."

- id: terry-pratchett/city-watch
  name: O fio da Guarda da Cidade
  rationale: >
    O fio mais estimado: Sam Vimes e a Guarda da Cidade de Ankh-Morpork, de um
    único polícia bêbado ao centro moral de toda a série. Lê-se como um arco
    contínuo sobre a lei, a classe social, o policiamento e o que uma cidade deve
    a quem nela vive. O que se abdica: Ankh-Morpork muda enormemente ao longo de
    livros que não constam desta lista, pelo que a cidade que a Guarda policia
    continua a crescer fora de cena, entre volumes.
  debated:
    - "Night Watch ganha muito com a leitura prévia dos livros anteriores da Guarda (depende de se conhecer Vimes), pelo que, apesar do enredo de viagem no tempo, deve ser lido pela ordem e não em primeiro lugar."

- id: terry-pratchett/industrial-revolution
  name: O fio de Moist von Lipwig / Revolução Industrial
  rationale: >
    Ankh-Morpork arrasta-se para a modernidade (os correios, o papel-moeda, o
    caminho de ferro) com o vigarista regenerado Moist von Lipwig recrutado à
    força para pôr cada uma dessas coisas a funcionar. A sátira tardia do Disco
    sobre sistemas e progresso. É o fio mais curto e o mais dependente: são
    livros tardios que pressupõem uma Ankh-Morpork que o leitor viu mudar ao
    longo de vinte anos, e três volumes são uma amostra fina da série para a
    julgar.
  debated:
    - "O tema mais lato da 'revolução industrial' abrange também obras autónomas como Moving Pictures, The Truth e Monstrous Regiment; este fio limita-se aos três livros de Moist von Lipwig, que partilham protagonista e se leem como um arco."

- id: terry-pratchett/tiffany-aching
  name: O fio de Tiffany Aching
  rationale: >
    Cinco livros que acompanham uma jovem bruxa das terras de giz, dos nove anos
    até à idade adulta, com os minúsculos e brigões Nac Mac Feegle a seu lado.
    Escritos para leitores mais novos, mas sem panos quentes; um arco completo e
    terminado, e um ponto de entrada ideal. O custo paga-se sobretudo mais
    tarde, e não agora: as bruxas mais velhas chegam já a carregar tudo o que o
    fio das Bruxas construiu, pelo que ler estes primeiro é conhecê-las com uma
    história que ainda não se leu.
  debated:
    - "Costumam ler-se isoladamente, mas situam-se a jusante do fio das bruxas (a Granny Weatherwax aparece ao longo de todos eles), pelo que há quem chegue a eles só depois das bruxas."
