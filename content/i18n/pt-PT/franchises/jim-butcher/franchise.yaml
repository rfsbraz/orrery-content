- id: jim-butcher
  description: >
    A obra publicada completa de Jim Butcher: a fantasia contemporânea em
    curso [[work:jim-butcher/storm-front|The Dresden Files]] (Harry Dresden,
    o único feiticeiro profissional de Chicago, 2000-atualidade), a fantasia
    épica completa de inspiração romana Codex Alera (2004-2009, seis
    romances), e a saga steampunk Cinder Spires (2015-atualidade), a par de
    algumas coletâneas de contos e um romance de ligação licenciado do
    Homem-Aranha. As três séries são marcas separadas, sem universo nem
    personagens partilhados.
