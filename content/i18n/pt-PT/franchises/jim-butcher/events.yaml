# Overlay pt-PT dos eventos da franquia: `title` + `description` (os títulos
# dos eventos são prosa, não títulos publicados).
- id: turn-coat-number-one-2009
  title: Turn Coat estreia em primeiro lugar
  description: >
    [[work:jim-butcher/turn-coat|Turn Coat]], o décimo primeiro romance de
    The Dresden Files, estreia em primeiro lugar na lista de bestsellers de
    ficção em capa dura do The New York Times, nove anos e dez livros depois
    do início da série. É o primeiro de uma sequência que se torna
    ininterrupta: todos os romances de Dresden publicados na década
    seguinte, até [[work:jim-butcher/skin-game|Skin Game]] em 2014, estreiam
    sucessivamente em primeiro lugar. Uma série que passou a sua primeira
    década a construir um público, livro a livro, torna-se, a partir daqui,
    um bestseller garantido logo no dia de lançamento.

- id: cinder-spires-deal-2013
  title: Uma segunda série, vendida como uma aposta de sete dígitos no steampunk
  description: >
    Butcher lança pela primeira vez a ideia numa atualização aos leitores em
    agosto de 2012, prometendo uma série steampunk assim que
    [[work:jim-butcher/cold-days|Cold Days]] estiver revisto. A Publishers
    Weekly noticia a concretização no ano seguinte: um contrato de sete
    dígitos para três livros com a sua editora habitual, a Roc, para
    [[work:jim-butcher/the-aeronauts-windlass|The Aeronaut's Windlass]] e
    duas sequelas - a primeira série nova e contínua de Butcher desde que
    [[franchise:jim-butcher|Codex Alera]] terminou em 2009, e prova de que a
    editora estava disposta a apostar num género por comprovar apenas com
    base no seu nome. Numa AMA no Reddit, por essa altura, Butcher descreve o
    conceito nas suas próprias palavras: "uma espécie de Liga de Cavalheiros
    Extraordinários encontra Sherlock encontra Hornblower." O livro só
    chegaria às livrarias dois anos depois, e Butcher continuou a alterná-lo
    com romances de Dresden em vez de pôr a série mais antiga em pausa para
    o escrever.

- id: peace-talks-battle-ground-split-2020
  title: Um único manuscrito divide-se em dois romances
  description: >
    [[work:jim-butcher/peace-talks|Peace Talks]] e
    [[work:jim-butcher/battle-ground|Battle Ground]] foram escritos como um
    único manuscrito que cresceu até se tornar, nas palavras do próprio
    Butcher, "uma coisa frankensteiniana." Ele aceitou dividi-lo em dois
    livros com a condição de ambos chegarem às livrarias no mesmo ano, razão
    pela qual o décimo sexto e o décimo sétimo livros de The Dresden Files
    são publicados com apenas dez semanas de intervalo, em julho e setembro
    de 2020, após um hiato de seis anos desde Skin Game - o silêncio mais
    longo da história da série, quebrado por dois livros de uma só vez, em
    vez de um.
