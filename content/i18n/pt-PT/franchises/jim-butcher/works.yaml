# Overlay pt-PT das sinopses. NUNCA inclui `title`: o título traduzido é dado
# da edição (ver editions.yaml), não tradução de prosa.
#
# Jim Butcher não tem qualquer edição em português europeu. A única tradução
# portuguesa encontrada em qualquer mercado é "Frente de Tempestade" (Storm
# Front), publicada no Brasil pela Editora Underworld em 2011 (entretanto
# extinta) - uma edição pt-BR, não pt-PT, e por isso não é usada aqui. Todos
# os títulos desta obra permanecem em inglês, sem exceção.
#
# Termos inventados do universo sem terminologia portuguesa oficial para
# verificar são traduzidos pelo sentido, como nas outras franquias sem edição
# portuguesa (ver brandon-sanderson/works.yaml, terry-pratchett/works.yaml):
# Fúria/Fúrias, Conselho Branco, Corte Vermelha/Corte Branca, Guardião,
# Torre <nome>, Nascidos-Guerreiros, eterealista. Nomes próprios (Harry,
# Thomas, Mab, Tavi, Grimm, Marat, Canim, Vord, Albion, Olympia, Aurora,
# nomes de naves) e os dois títulos de série sem tradução (Working for
# Bigfoot, The Law, Out Law, Aftermath) ficam em inglês.
#
# As sinopses de White Night e Backup preservam deliberadamente a mesma
# omissão que a versão base: nenhuma delas nomeia Thomas como meio-irmão de
# Harry, o que só é revelado em Blood Rites (ver o `note` de cada uma na
# versão base).

- id: jim-butcher/storm-front
  synopsis: >
    Harry Dresden é o único feiticeiro profissional de Chicago, encarregado
    de casos que a polícia não consegue explicar. Quando um duplo homicídio
    se revela magia negra, o dinheiro é tentador - até Harry perceber que o
    assassino já sabe o seu nome.

- id: jim-butcher/fool-moon
  synopsis: >
    Os negócios estão parados até um cadáver mutilado e uma lua cheia
    trazerem a Harry um caso que precisa de um feiticeiro - e que, afinal,
    precisa de um que saiba exatamente quantos tipos diferentes de lobisomem
    andam à solta em Chicago.

- id: jim-butcher/grave-peril
  synopsis: >
    Os fantasmas de Chicago tornaram-se violentos, todos ao mesmo tempo, e
    demasiadas vítimas têm ligações a Harry para ser coincidência. Alguém
    está a agitar o mundo espiritual de propósito.

- id: jim-butcher/summer-knight
  synopsis: >
    Sem dinheiro, a afastar os amigos e mal se aguentando inteiro, Harry
    recebe uma saída da Rainha do Inverno das Fadas - se conseguir resolver o
    assassinato do seu homólogo da Corte de Verão antes que a política
    feérica resvale para uma guerra que ultrapassa por completo o mundo das
    fadas.

- id: jim-butcher/death-masks
  synopsis: >
    Os negócios vão finalmente bem, o que significa que Harry tem mais
    problemas do que nunca: um duelo até à morte com o campeão da Corte
    Vermelha, o desaparecido Sudário de Turim, um cadáver por identificar que
    a polícia precisa de nomear, e a ex-namorada de volta à cidade.

- id: jim-butcher/blood-rites
  synopsis: >
    Um favor para o seu conhecido vampiro, Thomas - guarda-costas no set de
    um filme para adultos amaldiçoado - transforma-se numa revelação
    familiar que vai mudar a vida de Harry.

- id: jim-butcher/dead-beat
  synopsis: >
    Uma nigromante quer um lendário livro dos mortos, e Harry tem de o
    encontrar, identificá-lo e impedir que ela levante um exército com ele -
    tudo num único dia muito longo.

- id: jim-butcher/proven-guilty
  synopsis: >
    Recém-nomeado Guardião do Conselho Branco, Harry é encarregado de
    investigar monstros de filmes de terror que ganham vida por toda a
    Chicago - uma investigação que não pode falhar, seja quem for que
    implique.

- id: jim-butcher/white-night
  synopsis: >
    Alguém anda a assassinar os praticantes de magia mais fracos da cidade,
    deixando uma mensagem para Harry em cada cena. As provas apontam para o
    único suspeito que ele não consegue acreditar culpado: alguém que ama.

- id: jim-butcher/small-favor
  synopsis: >
    A vida finalmente acalmou, o que significa que uma velha dívida está
    prestes a vencer: Mab, Rainha do Ar e das Trevas, vem cobrar o seu favor,
    e este prende Harry entre um pesadelo e um aliado em quem também não
    pode confiar.

- id: jim-butcher/turn-coat
  synopsis: >
    O Guardião Morgan, antagonista de longa data de Harry no Conselho
    Branco, é acusado de traição e foge. Ilibá-lo significa encontrar o
    verdadeiro traidor antes que as suspeitas recaiam sobre o próprio Harry.

- id: jim-butcher/changes
  synopsis: >
    Um segredo do passado de Harry dá à duquesa da Corte Vermelha uma arma
    contra ele, e desta vez a luta não é para salvar o mundo - é para salvar
    a sua criança.

- id: jim-butcher/side-jobs
  synopsis: >
    Onze contos escritos ao longo da primeira década da série, reunidos numa
    só coletânea e colocados, por indicação do próprio autor, na sua posição
    cronológica de leitura entre os romances.

- id: jim-butcher/ghost-story
  synopsis: >
    Harry acorda e descobre-se mudado pelo desfecho do seu último caso, com
    uma única oportunidade de corrigir o que não conseguiu terminar enquanto
    ainda podia.

- id: jim-butcher/cold-days
  synopsis: >
    Agora ligado ao serviço de Mab, Rainha do Ar e das Trevas, Harry recebe
    uma missão que parece impossível até para os seus padrões - enquanto,
    por trás dela, cresce uma ameaça a uma fonte de magia inteira e
    insondável.

- id: jim-butcher/skin-game
  synopsis: >
    Devendo a Mab uma dívida que não pode recusar, Harry é forçado a um
    assalto ao lado de alguns dos seus inimigos mais antigos, invadindo um
    cofre que guarda algo de que até os ladrões que o roubam têm medo.

- id: jim-butcher/working-for-bigfoot
  synopsis: >
    Três novelas que acompanham o trabalho de Harry para um cliente que cria
    em segredo, entre humanos, o seu filho meio-Pé Grande, desde a infância
    do rapaz até à universidade.

- id: jim-butcher/brief-cases
  synopsis: >
    Mais doze contos, incluindo as três novelas de Working for Bigfoot,
    reunidos na segunda coletânea da série.

- id: jim-butcher/peace-talks
  synopsis: >
    Dividido entre os deveres para com o Conselho Branco, para com Mab e
    para com a própria filha, Harry é destacado para manter a paz numa
    cimeira entre os poderes sobrenaturais de Chicago em guerra - uma missão
    que começa a desfazer-se ainda antes de a cimeira abrir.

- id: jim-butcher/battle-ground
  synopsis: >
    Um ser mais perigoso do que tudo o que Chicago enfrentou num milénio
    declarou guerra à cidade e trouxe um exército. A missão de Harry é
    simples e impossível: salvar Chicago matando um Titã.

- id: jim-butcher/the-law
  synopsis: >
    Nem todos os perigos vêm em forma de monstro. Quando uma das crianças
    mais vulneráveis de Chicago precisa de proteção, Harry Dresden acaba
    envolvido em duas lutas ao mesmo tempo - uma legal, e outra do tipo com
    explosões.

- id: jim-butcher/twelve-months
  synopsis: >
    No ano a seguir à batalha de Chicago contra o Último Titã, Harry
    trabalha para reconstruir a sua cidade, a sua casa e a si próprio,
    enquanto novos perigos se juntam à volta do que ainda resta de pé.

- id: jim-butcher/out-law
  synopsis: >
    "Gentleman" John Marcone pede a Harry que ajude um pequeno vigarista a
    tornar-se um homem melhor - trabalho que arrasta Harry para um conflito
    com uma nova organização criminosa apoiada por um poder sobrenatural
    ligado ao seu próprio passado.

- id: jim-butcher/furies-of-calderon
  synopsis: >
    No Império Aleriano de inspiração romana, todos podem vincular a si uma
    fúria elemental que os sirva - exceto Tavi, um rapaz sem fúria na
    fronteira, cujo vale natal se encontra no caminho de uma invasão para a
    qual o Império não está preparado.

- id: jim-butcher/academs-fury
  synopsis: >
    Dois anos depois, Tavi estuda na Academia na capital de Alera, enquanto
    conspirações da corte e uma ameaça renovada vinda das planícies dos
    Marat o arrastam de novo para o perigo.

- id: jim-butcher/cursors-fury
  synopsis: >
    Ao serviço como assistente de um Cursor, Tavi é lançado numa guerra em
    duas frentes, quando uma força hostil canim e uma rebelião dentro das
    próprias legiões de Alera convergem ao mesmo tempo.

- id: jim-butcher/captains-fury
  synopsis: >
    Ao comando de uma legião de recrutas em pleno território hostil, Tavi
    tem de forjar uma aliança incómoda com um velho inimigo só para trazer a
    sua gente para casa.

- id: jim-butcher/princeps-fury
  synopsis: >
    Tavi lidera uma expedição desesperada até ao próprio solo canim para
    acabar com uma guerra antes que custe tudo a Alera - enquanto, em casa,
    uma ameaça muito mais antiga se reúne sem ser notada.

- id: jim-butcher/first-lords-fury
  synopsis: >
    Ao regressar de Canea e encontrar o Império Aleriano em ruínas, Tavi tem
    de unir as facções em guerra do reino para enfrentar os Vord invasores
    antes que já não reste nada para salvar.

- id: jim-butcher/the-aeronauts-windlass
  synopsis: >
    A humanidade vive em torres com mais de um quilómetro de altura, acima
    de uma superfície hostil e assombrada por monstros, navegando entre elas
    em dirigíveis movidos a cristal. Quando a Torre Albion é atacada, um
    capitão corsário caído em desgraça, uma jovem nobre e o seu primo, e um
    gato de opiniões muito vincadas são arrastados para uma guerra oculta
    entre torres.

- id: jim-butcher/warriorborn
  synopsis: >
    Enviado para recuperar algo "extraviado" numa torre colonial que cortou
    todo o contacto, o Tenente Benedict Sorellin-Lancaster e um pelotão de
    Nascidos-Guerreiros encontram uma arma capaz de inverter o equilíbrio de
    poder entre as torres.

- id: jim-butcher/the-olympian-affair
  synopsis: >
    Uma missão diplomática a uma conferência comercial na Torre Olympia
    arrasta o Capitão Grimm e a tripulação do Predator para tensões
    crescentes com a Torre Aurora, enquanto a magia dos eterealistas e o
    combate entre dirigíveis ameaçam quebrar uma paz precária.

- id: jim-butcher/backup
  synopsis: >
    Narrado não por Harry Dresden, mas por Thomas, o vampiro da Corte
    Branca que se move pelo mundo de Harry com lealdades próprias, quando
    uma ameaça mais próxima de casa do que qualquer um deles esperava obriga
    Thomas a agir sozinho.

- id: jim-butcher/the-darkest-hours
  synopsis: >
    Um romance licenciado do Homem-Aranha: o período de calma de Peter
    Parker termina quando uma antiga paixão o avisa de que um supervilão
    descontrolado não passa de uma distração para um inimigo muito mais
    antigo que o persegue por vingança.
