# Overlay pt-PT das ordens de leitura: `name`, `rationale` e `debated`.
# orderedWorkIds e sources não se traduzem.
- id: jim-butcher/dresden-files-novels
  name: Os romances de The Dresden Files, por ordem
  rationale: >
    Os dezoito romances de The Dresden Files sozinhos, por ordem de
    publicação, com as duas séries não relacionadas de Butcher filtradas.
    Ele já disse que um crossover entre Dresden e Codex Alera "precisaria de
    um livro inteiro" só para responder (ver franchise.yaml), pelo que um
    leitor que veio por Harry Dresden não perde nada ao passar diretamente
    de um romance de Dresden para o seguinte, em vez de ver a ordem por
    defeito de toda a estante intercalar uma fantasia épica de inspiração
    romana e uma série de dirigíveis steampunk entre eles - é, exatamente
    por isso, a versão mais publicada de uma ordem de leitura de Jim
    Butcher. Traz ainda uma garantia que a ordem por defeito não pode dar:
    [[work:jim-butcher/peace-talks|Peace Talks]] e
    [[work:jim-butcher/battle-ground|Battle Ground]] foram um único
    manuscrito dividido em dois livros com dez semanas de intervalo (ver
    events.yaml), e ambos são publicados em 2020, pelo que uma ordenação
    apenas por ano não consegue garantir que Peace Talks fica em primeiro
    lugar. Esta lista garante-o. O custo: fica de fora as duas coletâneas de
    contos e as quatro novelas independentes, várias das quais preenchem
    lacunas reais de continuidade (Aftermath faz a ponte entre
    [[work:jim-butcher/changes|Changes]] e
    [[work:jim-butcher/ghost-story|Ghost Story]]; Backup é a única novela
    narrada por Thomas, o vampiro da Corte Branca, e não por Harry) - um
    leitor que queira encaixar essas obras tem de o fazer à parte.
  debated:
    - "Codex Alera e The Cinder Spires ficam de fora por completo, e não apenas sem posição definida dentro desta lista - a observação do próprio Butcher sobre o crossover (acima) significa que nada aqui pode colocá-los antes, depois ou ao lado de um dado romance de Dresden."
    - "As duas coletâneas (Side Jobs, Brief Cases) e as quatro novelas independentes (Backup, Working for Bigfoot, The Law, Out Law) ficam de fora desta lista, que abrange apenas os romances. Alguns guias intercalam-nas em pontos específicos da cronologia interna (o próprio site de jim-butcher.com indica onde cada história se encaixa); esta lista limita-se aos romances numerados, para que esse debate sobre a cronologia interna não precise de ser resolvido aqui."
