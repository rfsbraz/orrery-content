# Português europeu (pt-PT) - detetives recorrentes.
# Só `description` é traduzido: `name` e `aka` são nomes próprios e as notas
# de appearsIn ficam na língua de base (mesma convenção de
# stephen-king/characters.yaml).
# CUIDADO COM SPOILERS: a descrição de Stephen Moran para exatamente onde a
# capa do seu próprio livro para ("ainda à espera da sua oportunidade na
# Brigada de Homicídios") e não avança para o que The Trespasser revela; essa
# reserva do texto de base é preservada aqui e não desfeita.

- id: tana-french/rob-ryan
  description: >
    Um detetive da Brigada de Homicídios de Dublin que cresceu a usar o
    nome do meio depois de um incidente de infância contado em
    [[work:tana-french/in-the-woods|Desaparecidos]].

- id: tana-french/cassie-maddox
  description: >
    Uma detetive da Brigada de Homicídios de Dublin que passou uma
    temporada infiltrada antes de entrar para a brigada, um passado que o
    trabalho a obriga a reviver em
    [[work:tana-french/the-likeness|A Semelhança]].

- id: tana-french/frank-mackey
  description: >
    Um detetive infiltrado de Dublin cuja própria família e primeiro amor,
    deixados para trás no bairro de Liberties nos anos 1980, se tornam o
    caso em [[work:tana-french/faithful-place|Sombras do Passado]].

- id: tana-french/holly-mackey
  description: >
    Filha de Frank Mackey, uma criança pequena em
    [[work:tana-french/faithful-place|Sombras do Passado]] e, já com
    dezasseis anos, aluna do colégio interno de St. Kilda's em
    [[work:tana-french/the-secret-place|O Sítio Secreto]].

- id: tana-french/stephen-moran
  description: >
    Um detetive de Dublin, apresentado como novato a fazer um favor a um
    colega sénior em [[work:tana-french/faithful-place|Sombras do Passado]]
    e ainda à espera da sua oportunidade na Brigada de Homicídios em
    [[work:tana-french/the-secret-place|O Sítio Secreto]].

- id: tana-french/antoinette-conway
  description: >
    Uma detetive da Brigada de Homicídios de Dublin que se sente uma
    intrusa na brigada desde o seu primeiro caso, em
    [[work:tana-french/the-secret-place|O Sítio Secreto]], em diante.
