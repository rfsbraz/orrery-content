- id: tana-french
  description: >
    Seis romances da Brigada de Homicídios de Dublin, com um detetive
    principal diferente em cada um, sempre tirado do elenco secundário do
    livro anterior, o romance autónomo
    [[work:tana-french/the-witch-elm|The Witch Elm]], e a trilogia de Cal
    Hooper, que segue um detetive reformado de Chicago até às rixas antigas
    de um lugarejo rural irlandês.
