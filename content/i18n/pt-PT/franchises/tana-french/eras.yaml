# Português europeu (pt-PT) - eras.
# title, description e themes traduzidos (themes é prosa lida sob a placa da
# era, não decoração - ver docs/CURATION.md e o histórico deste script).
# Referências a obras usam o título publicado em Portugal onde existe
# edição em editions.yaml (Desaparecidos, Intruso); The Keeper e The Witch
# Elm não têm edição portuguesa e ficam com o título inglês.

- id: dublin-murder-squad
  title: A Brigada de Homicídios de Dublin
  description: >
    Os primeiros seis romances, publicados como série sob este nome e
    recebidos pela crítica como um conjunto único: de
    [[work:tana-french/in-the-woods|Desaparecidos]] a
    [[work:tana-french/the-trespasser|Intruso]]. Nenhum detetive os carrega
    sozinho: cada livro entrega a narração a um membro diferente da
    brigada, e os casos decorrem sobre o pano de fundo dos anos de boom e
    do colapso que se seguiu.
  themes:
    - dublin
    - o tigre celta e o colapso
    - classe social e pertença
    - um narrador diferente em cada livro

- id: cal-hooper-trilogy
  title: A Trilogia de Cal Hooper
  description: >
    Um detetive de Chicago reforma-se para uma aldeia no oeste da Irlanda,
    em três livros que French escreveu a pensar mais no western do que no
    romance policial: "an awful lot of the tropes of Western fiction map
    really nicely onto the West of Ireland". Descreve a sequência como
    fechada em [[work:tana-french/the-keeper|The Keeper]], e a permanência
    prolongada num único mundo como algo novo para si: "I've never stuck to
    one world for this long before."
  themes:
    - o oeste da irlanda
    - convenções do western
    - uma comunidade que faz a sua própria lei
    - declínio rural
