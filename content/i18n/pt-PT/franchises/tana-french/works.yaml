# Português europeu (pt-PT) - sinopses.
# Os títulos de obras NÃO são traduzidos aqui (ver docs/SCHEMA.md, "Never
# translate a published title"): um título traduzido só existe como edição,
# em editions.yaml. Cinco das dez obras desta ala têm edição pt-PT real e
# verificada: In the Woods = Desaparecidos (Civilização, 2008), The Likeness
# = A Semelhança (Civilização, 2009), Faithful Place = Sombras do Passado
# (Civilização, 2011), The Secret Place = O Sítio Secreto (Clube do Autor,
# 2015), The Trespasser = Intruso (Clube do Autor, 2020). As outras cinco -
# Broken Harbour, The Witch Elm, The Searcher, The Hunter e The Keeper -
# nunca foram publicadas em Portugal, pelo que ficam com o título inglês.
# As notas de curadoria (`note:`) ficam na língua de base: são anotações
# editoriais, nunca lidas pelo leitor.
# CUIDADO COM SPOILERS: a sinopse de The Searcher mantém a criança que
# recruta Cal por nomear e sem género definido - "criança da zona" em vez de
# "rapaz"/"rapariga" - porque o romance introduz a personagem assim e só a
# corrige mais tarde; essa reserva do texto de base é preservada aqui e não
# desfeita. O mesmo vale para o final em aberto de The Secret Place quanto ao
# resultado da candidatura de Stephen Moran à Brigada de Homicídios: a
# sinopse portuguesa também para exatamente onde a inglesa para.

- id: tana-french/in-the-woods
  synopsis: >
    Em 1984, três crianças desaparecem no bosque junto ao bairro de
    Knocknaree, em Dublin; só uma é encontrada, viva mas sem memória do que
    aconteceu. Vinte anos depois, o detetive Rob Ryan, que nunca disse a
    ninguém no trabalho que foi essa criança, é destacado, com a parceira
    Cassie Maddox, para investigar o homicídio de uma rapariga de doze anos
    no mesmo local.

- id: tana-french/the-likeness
  synopsis: >
    A detetive Cassie Maddox é chamada à cena de um homicídio numa casa de
    campo e encontra uma mulher morta que poderia passar pelo seu duplo, a
    viver sob um nome falso que a própria Cassie usara em ação infiltrada. O
    seu antigo controlador, Frank Mackey, convence-a a fazer-se passar pela
    vítima entre os quatro colegas de casa que são também os únicos
    suspeitos do caso.

- id: tana-french/faithful-place
  synopsis: >
    Em 1985, Frank Mackey, com dezanove anos, planeia fugir para Londres com
    a namorada, Rosie Daly, para escapar às duas famílias e à recessão
    irlandesa, e nunca mais volta a vê-la. Vinte e dois anos depois, já
    detetive infiltrado e há muito afastado da família, é obrigado a voltar
    ao beco sem saída de Dublin de onde fugiu, quando a mala de Rosie
    aparece escondida na casa abandonada onde deviam encontrar-se.

- id: tana-french/broken-harbor
  synopsis: >
    Numa "urbanização fantasma" meio construída e meio abandonada nos
    arredores de Dublin, um marido e os dois filhos pequenos estão mortos e
    a mulher luta pela vida. O detetive Mick "Scorcher" Kennedy, o mais
    eficaz da brigada a fechar casos, assume a investigação com uma parceira
    novata, e o caso aponta em duas direções ao mesmo tempo, chegando a
    desenterrar uma história pessoal do próprio Scorcher, de um verão de
    infância na verdadeira Broken Harbor.

- id: tana-french/the-secret-place
  synopsis: >
    Um ano depois de um rapaz adolescente ser assassinado nos terrenos de
    St. Kilda's, um colégio interno feminino de elite em Dublin, uma das
    alunas leva ao detetive Stephen Moran um cartão retirado do quadro de
    mexericos anónimo da escola, com os dizeres "Sei quem o matou". Moran,
    de olho na sua oportunidade na Brigada de Homicídios, associa-se à
    detetive sénior Antoinette Conway para reabrir o caso a partir das
    panelinhas rivais da escola.

- id: tana-french/the-trespasser
  synopsis: >
    A detetive Antoinette Conway, que continua a sentir-se uma intrusa na
    Brigada de Homicídios, e o parceiro, Stephen Moran, apanham um caso que
    parece rotineiro: uma jovem morta no seu apartamento, ao lado de uma
    mesa posta para um jantar romântico que nunca aconteceu. Os outros
    detetives insistem em empurrá-los para a resposta óbvia, e Conway
    começa a perguntar-se se a pressão tem a ver com o caso ou com
    afastá-la da brigada.

- id: tana-french/the-witch-elm
  synopsis: >
    Toby Hennessy, assessor de imprensa de uma galeria de arte que sempre se
    considerou um homem de sorte, é espancado e dado como morto por
    assaltantes no seu próprio apartamento. Já a recuperar de uma lesão
    cerebral que não consegue explicar por completo, muda-se para a casa de
    infância da família, em ruínas, para cuidar do tio moribundo - até que
    os primos mais novos encontram um crânio humano dentro do velho
    ulmeiro do jardim.

- id: tana-french/the-searcher
  synopsis: >
    Cal Hooper, recém-reformado da polícia de Chicago e recém-divorciado,
    compra uma casa para recuperar numa aldeia tranquila da Irlanda, na
    esperança de que nada lhe dê mais trabalho do que a própria casa. Uma
    criança da zona convence-o a investigar o desaparecimento de um irmão
    mais velho, e Cal começa a descobrir o tipo de problemas que uma terra
    pequena, ao que parece, nunca é pequena de mais para esconder.

- id: tana-french/the-hunter
  synopsis: >
    Passados dois anos de vida em Ardnakelty, Cal Hooper construiu algo
    parecido com paz: uma relação com Lena, uma viúva da zona, e um papel na
    criação de Trey Reddy, a adolescente outrora arisca que acolheu sob a
    sua proteção em The Searcher. Depois, o pai de Trey, há muito
    desaparecido, reaparece com um financiador inglês e um plano para
    encontrar ouro no lugarejo, e Trey quer de Cal algo que ele não tem a
    certeza se consegue dar.

- id: tana-french/the-keeper
  synopsis: >
    Em Ardnakelty, uma jovem prestes a casar com o filho da família mais
    rica do lugarejo é encontrada morta no rio, numa noite fria, e a
    explicação mais conveniente não se sustenta. Cal Hooper e a noiva,
    Lena, começam cada um a puxar o seu próprio fio das rixas e disputas de
    terras da aldeia, em direções opostas, precisamente quando o caso se
    torna perigoso.
