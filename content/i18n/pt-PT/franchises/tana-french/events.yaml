# Português europeu (pt-PT) - acontecimentos específicos da ala.
# As citações diretas de French e de terceiros ficam no inglês em que foram
# efetivamente ditas: traduzi-las seria substituí-las por palavras que
# ninguém disse. Só a prosa à volta da citação é traduzida (mesma convenção
# de gillian-flynn/events.yaml). A citação em
# french-hunter-trilogy-decision-2023 é truncada na própria entrada em
# inglês, a meio da frase em que French descreve o estado em que deixa as
# personagens no fim de The Searcher; a reticência é mantida aqui tal como
# está na base, e nada do que falta é reposto na tradução.

- id: french-broken-harbor-ghost-estates-2012
  title: Escolher a urbanização fantasma em vez da história que tinha planeado
  description: >
    French tenciona que o jovem detetive Stephen Moran narre o quarto
    romance da Brigada de Homicídios de Dublin, mas muda de rumo ao
    debruçar-se sobre as "urbanizações fantasma" da Irlanda pós-colapso, os
    empreendimentos abandonados a meio da construção quando a economia do
    Tigre Celta ruiu. "The people who are stuck on these ghost estates are
    the people who followed the rules, and the rules let them down," diz à
    Barnes & Noble Review, e essa lógica aponta antes para Mick "Scorcher"
    Kennedy, o detetive introduzido como personagem secundária em
    [[work:tana-french/faithful-place|Sombras do Passado]]. A urbanização
    fantasma em [[work:tana-french/broken-harbor|Broken Harbour]] não é um
    cenário inventado: é o mesmo colapso que vê a sua própria geração
    viver.

- id: french-trespasser-interrogation-power-2016
  title: O que sentiu, do outro lado da cadeira, num interrogatório a sério
  description: >
    A preparar-se para escrever [[work:tana-french/the-trespasser|Intruso]],
    French pede ao detetive reformado que lhe revê o rigor policial desde a
    estreia que faça a demonstração de um interrogatório, usando-a a ela
    como suspeita. No seu próprio relato para o Irish Times, a mudança nele
    "was like flicking a switch": de amigo descontraído a "this
    concentrated, full-on, unstoppable force, locked on to me like a pit
    bull," deixando-a "leaning back in my chair under the sheer momentum of
    that drive." Perceber que a verdadeira moeda de um detetive é o poder
    de levar as pessoas a agir contra os seus próprios interesses dá-lhe a
    premissa que leva para o livro: uma Brigada de Homicídios em que essa
    mesma pressão se volta para dentro, contra um dos seus próprios
    membros.

- id: french-witch-elm-steps-outside-squad-2018
  title: Virar o procedimental policial do avesso
  description: >
    Depois de seis romances da Brigada de Homicídios de Dublin, cada um
    narrado por um detetive, French escreve
    [[work:tana-french/the-witch-elm|The Witch Elm]], o seu primeiro
    romance autónomo, desta vez do outro lado de uma investigação. "I
    never want to get caught in the trap of writing the same book over and
    over," diz à CrimeReads. "I'd looked at the process of a criminal
    investigation from a detective's viewpoint six times, and I kept
    thinking about all the other people involved - witnesses, suspects,
    perpetrators, victims - and how different that process would look from
    their perspectives." O seu editor descreve o resultado como "a murder
    mystery turned inside out": um narrador para quem a investigação traz
    confusão e ameaça, em vez do controlo que dá aos seus detetives.

- id: french-dublin-murders-tv-2019
  title: A Brigada de Homicídios chega ao ecrã
  description: >
    A Starz adquire, em dezembro de 2018, os direitos norte-americanos para
    uma adaptação televisiva dos dois primeiros romances da Brigada de
    Homicídios de Dublin, [[work:tana-french/in-the-woods|Desaparecidos]] e
    [[work:tana-french/the-likeness|A Semelhança]]. Escrita por Sarah
    Phelps para a BBC, a RTE e a Starz, a série Dublin Murders, de oito
    episódios, abandona a narração rotativa na primeira pessoa dos romances
    a favor de uma perspetiva próxima partilhada pelos detetives Rob Reilly
    e Cassie Maddox (Reilly substitui Ryan no ecrã), e estreia-se na BBC
    One a 14 de outubro de 2019, na RTE One a 16 de outubro, e na Starz a
    10 de novembro. Phelps, que diz só ter adaptado autores já falecidos
    antes desta série, descreve a diferença: trabalhar com uma autora viva
    "it's like watching your children go off to school."

- id: french-hunter-trilogy-decision-2023
  title: O romance autónomo que não ficou autónomo
  description: >
    French tenciona que [[work:tana-french/the-searcher|The Searcher]] seja
    um romance autónomo, mas muda de ideias quanto a Cal Hooper e Trey
    Reddy. Questionada sobre o motivo de ter voltado a eles em
    [[work:tana-french/the-hunter|The Hunter]], diz à TODAY.com: "I wasn't
    planning to - I thought 'Searcher' was a standalone - but it felt like
    there was more to their story... there were still plenty of loose ends
    and shaky places." A trilogia nasce desse assunto por resolver, e não
    de um plano feito de antemão.

- id: french-keeper-trilogy-context-2026
  title: Uma trilogia que começa no policiamento americano e fecha num confinamento irlandês
  description: >
    A trilogia de Cal Hooper vai de
    [[work:tana-french/the-searcher|The Searcher]], que começa com o
    desencanto de Cal em relação ao policiamento americano, a
    [[work:tana-french/the-keeper|The Keeper]], ambientado numa Ardnakelty
    ainda marcada pelo confinamento da Covid. Ao falar do arco já concluído
    com a Cultured, French traça a linha entre as duas conversas nacionais
    sobre policiamento que atravessou ao escrever: "In Ireland, our
    uniformed police don't carry guns... it's not the same thing as what
    was going on in the U.S. at the same time, with the huge upheaval in
    the way the police were seen and the awareness that they're not always
    a force for order and for justice." Descreve The Keeper como o ponto em
    que essa conversa americana recua e entra a ideia mais rudimentar,
    "handmade", de justiça do género western: a transição de Cal "from him
    being a detective in detective terms to him being this guy in Western
    terms."
