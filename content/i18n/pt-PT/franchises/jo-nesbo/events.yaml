# Português europeu (pt-PT) - acontecimentos específicos da ala.
# Os acontecimentos de vida do autor estão em content/i18n/pt-PT/authors/.
# Citações diretas (de Nesbø ou de outros - críticos, o realizador Tomas
# Alfredson) ficam na língua em que foram efetivamente ditas ou escritas:
# traduzi-las seria substituí-las por palavras que ninguém disse. Isto
# inclui a citação norueguesa de Alfredson e a sua glosa inglesa entre
# parênteses, ambas preservadas tal como no texto de base. Só a prosa à
# volta das citações é traduzida (mesma convenção de gillian-flynn/events.yaml).

- id: jo-nesbo/di-derre-memoir-declined-1997
  title: Recusa umas memórias sobre os Di Derre e escreve Flaggermusmannen
  description: >
    Esgotado por um ano a tocar linhas de baixo e a negociar obrigações nas
    mesmas 24 horas (o trabalho diário de corretor, depois um voo para o
    concerto dos Di Derre nessa noite, poucas horas de sono, e um voo de
    regresso para a abertura do mercado), Nesbø tira licença de ambos e
    marca uma viagem a Sydney com um amigo. Antes de partir, Janne Gro Rygg,
    editora de não-ficção da Aschehoug que conhecera dos tempos de
    estudante em Bergen, pede-lhe que escreva um livro sobre a vida na
    estrada com a banda. Ele recusa - "what happens on the road stays on
    the road" - mas diz-lhe que talvez regresse da Austrália com outra
    coisa qualquer. No voo Oslo-Sydney, com o portátil consigo, cria a
    personagem Harry Hole e o enredo do que viria a ser
    [[work:jo-nesbo/flaggermusmannen|O Morcego]]. Ao aterrar em Sydney a
    meio da noite, com jet lag, fica acordado enquanto o amigo dorme e
    escreve, ainda nessa noite, o primeiro capítulo do livro: Harry Hole a
    aterrar em Sydney e a instalar-se no mesmo hotel onde estão hospedados.

- id: jo-nesbo/kakerlakkene-reprise-1998
  title: Recebido, na altura, como uma reprise desleixada da estreia
  description: >
    [[work:jo-nesbo/kakerlakkene|Baratas]] não repete o sucesso da estreia.
    Numa crítica para o Dagbladet no dia de lançamento, Terje Thorsen (o
    mesmo crítico que elogiara a estreia no ano anterior) chama-lhe "a
    heavy, slack and directionless reprise of Nesbø's more than promising
    debut novel", acusando-o de afogar um enredo ténue em exotismo pelo
    exotismo, e apontando o recurso à prostituição infantil como
    dispositivo narrativo como algo que cheira a "period-appropriate
    political correctness" em vez de material merecido, dispensando o
    próprio cenário tailandês como "pointless effect-chasing". A reputação
    hoje consolidada da saga de catorze livros de Harry Hole esconde o que
    um leitor da época realmente encontrou: um segundo livro considerado, à
    data, o mais fraco.

- id: jo-nesbo/stemmer-fra-balkan-nato-1999
  title: Um autor de romance policial enviado a cobrir os bombardeamentos da NATO à Jugoslávia
  description: >
    Em maio de 1999, com a NATO ainda a bombardear a Jugoslávia por causa do
    Kosovo, a editora de Nesbø, a Aschehoug, envia-o à região com o
    jornalista Espen Søbye como, nas palavras do Dagbladet na altura,
    "independent witnesses to the truth", com total liberdade e nenhuma
    qualificação particular para a tarefa - por conta própria de Nesbø,
    autênticos amadores nisso. A sua parte do livro resultante,
    [[work:jo-nesbo/stemmer-fra-balkan|Stemmer fra Balkan]], mantém-se num
    registo contido e próximo: um embaixador jugoslavo em Oslo, à espera de
    um visto, ainda sem saber que o seu próprio ministério, na pátria,
    tinha sido bombardeado nesse mesmo dia, "smiling the saddest of
    smiles"; jovens em Sarajevo a insistirem que a guerra tinha sido "an
    excellent experience", já que pelo menos não deixara tempo para o luto.
    Numa crítica ao livro no lançamento, Christopher Hals Gylseth chama à
    contribuição de Nesbø algo simpático, indagador, "at times almost
    poetic", e considera-a mais contida, ainda que de âmbito mais estreito,
    do que o ensaio em forma de diário do próprio Søbye, publicado a par
    dele. O único trabalho de reportagem de guerra de um autor de romance
    policial, escrito dois anos depois de iniciada a carreira que o viria a
    definir.

- id: jo-nesbo/rodstrupe-fathers-history-2000
  title: Transforma a história do próprio pai no enredo de Rødstrupe
  description: >
    Numa crítica a [[work:jo-nesbo/rodstrupe|O Pássaro de Peito
    Vermelho]] no lançamento, Leif Ekle, da NRK, descreve os seus alicerces
    como assentes "in snowdrifts and trenches on the Eastern Front", em
    1942, onde um grupo de frontkjempere noruegueses - voluntários que
    combateram sob comando alemão - "separate the wheat from the chaff". O
    paralelo com a própria família de Nesbø não é incidental: um estudo
    académico sobre a sua obra (nordics.info, Universidade de Aarhus)
    afirma claramente que o fio histórico do romance "goes back to the
    Norwegian volunteers who, like Nesbø's own father, fought on the side
    of Nazi Germany". O próprio Nesbø confirma a ligação diretamente numa
    entrevista posterior ao BBC World Book Club, dizendo conseguir imaginar
    o próprio pai "in the German Nazi helmet" - o mesmo pai cujo serviço em
    tempo de guerra, e a pena de prisão que se seguiu, ele soubera aos
    quinze anos. Um acerto de contas privado com a história do pai
    transforma-se, em Rødstrupe, na maquinaria histórica de um romance de
    género: o momento em que a sua ficção mais se aproxima de escrever
    diretamente sobre o pai.

- id: jo-nesbo/rodstrupe-nitimen-poll-2004
  title: Eleito o melhor romance policial norueguês de sempre, numa sondagem nacional de rádio
  description: >
    O programa Nitimen, da NRK, realiza uma sondagem entre ouvintes para
    eleger o melhor romance policial norueguês de sempre, e
    [[work:jo-nesbo/rodstrupe|O Pássaro de Peito Vermelho]] vence-a - uma
    de várias publikumskåringar norueguesas (a Norsk biografisk leksikon
    refere ainda uma sondagem da Bokklubben Krim og Spenning no mesmo ano e
    uma classificação do Dagbladet em 2009) que mantiveram o livro no topo
    da lista dos próprios leitores noruegueses como o ponto mais alto do
    género. Esse estatuto doméstico contrasta, de forma estranha, com o
    lugar mais modesto que ocupa na receção de língua inglesa, onde chegou
    traduzido como o terceiro livro, e não como o marco autónomo que os
    leitores noruegueses já conheciam.

- id: jo-nesbo/leopard-violence-regret-2012
  title: "Admite, nas suas próprias palavras, ter \"ido longe demais\" com a violência de O Leopardo"
  description: >
    Ao promover [[work:jo-nesbo/gjenferd|O Fantasma]] numa entrevista ao
    Guardian, Nesbø introduz, sem que lhe perguntem, uma correção ao seu
    próprio historial: "in [[work:jo-nesbo/panserhjerte|The Leopard]], in
    hindsight, I feel I went a little bit too far with screaming blood.
    There are a couple of scenes that I regret and wish I had the chance to
    rewrite." Na mesma conversa, descreve a escalada, que começara a
    praticar uns anos antes, como um cultivo deliberado do mesmo medo de
    que a sua ficção se alimenta ("the fear that I felt as a child... is
    still the fuel for my novels. I guess climbing also"), e dá um
    veredicto ambivalente e trocista sobre ver, pela primeira vez, no ano
    anterior, o seu romance [[work:jo-nesbo/hodejegerne|Caçadores de
    Cabeças]] no ecrã: "that's like asking a gynaecologist, after he's
    examined a woman, whether he thinks she is sexy." A própria mudança de
    O Fantasma, que se afasta da violência gráfica em direção a um Harry
    pai, referida por Nesbø na mesma entrevista, lê-se de outra forma ao
    lado desta confissão.

- id: jo-nesbo/tom-johansen-scheme-2013
  title: O romance de culto fictício de um autor fictício torna-se real
  description: >
    [[work:jo-nesbo/blod-pa-sno|Sangue na Neve]] começa, segundo o próprio
    Nesbø contaria mais tarde, como um falso documentário que estava a
    escrever sobre o rapto de um autor norueguês-dinamarquês inventado,
    "Tom Johansen" - um livro que voltava sempre a referir-se ao célebre
    romance do próprio Johansen, "Blood on Snow", e a uma sequela
    "ligeiramente mais desesperada". Curioso quanto ao que esses livros
    referidos seriam na realidade, Nesbø escreveu-os ele próprio e planeou
    publicar ambos com o nome de Johansen, como um autêntico romance de
    culto ambientado nos anos 1970, da autoria de um escritor que nunca
    existira: chegou a construir-se uma página da Wikipédia para Johansen,
    com fotografias arranjadas para o representar. Em outubro de 2013, com
    nenhum dos dois livros ainda publicado, a Warner Bros comprou os
    direitos de cinema, com Leonardo DiCaprio ligado ao projeto para
    produzir e possivelmente protagonizar. O esquema não sobreviveu ao
    contacto com os advogados do editor estrangeiro de Nesbø, que
    consideraram que vender o livro de um autor inventado como um clássico
    de culto já existente seria publicidade enganosa. Ambos os romances
    acabaram por sair com o nome do próprio Nesbø - Sangue na Neve em 2015,
    e [[work:jo-nesbo/mere-blod|O Sol da Meia-Noite]] no mesmo ano - com as
    receitas a reverter para a Harry Hole Foundation. "The point was the
    whole story around it," disse Nesbø ao Dagbladet no dia anterior ao
    lançamento de Sangue na Neve. "It wasn't just a regular pseudonym."

- id: jo-nesbo/snowman-film-disowned-2017
  title: O filme O Boneco de Neve é renegado pelo próprio realizador
  description: >
    O filme em língua inglesa de [[work:jo-nesbo/snomannen|O Boneco de
    Neve]], realizado por Tomas Alfredson com um elenco liderado por
    Michael Fassbender (Martin Scorsese, que estivera ligado à realização,
    manteve-se como produtor executivo), estreia em outubro de 2017 com 7%
    no Rotten Tomatoes a nível internacional e, na maioria, terningkast 2
    (em 6) por parte da crítica norueguesa, da qual vários assinalam um
    erro de geografia norueguesa (Harry a conduzir pela Atlantic Ocean Road
    entre Oslo e Rjukan) que nenhum crítico estrangeiro poderia ter
    apanhado. Alfredson diz à NRK, a rádio e televisão pública norueguesa,
    que a rodagem na Noruega foi tão curta que entre 10 e 15 por cento do
    guião nunca chegou a ser filmado, tendo as cenas em falta sido
    remendadas numa rodagem apressada em Londres, assim que surgiu
    financiamento adicional: "vi fekk ikkje med oss heile historia, og då
    vi kom til klippebordet, oppdaga vi at det var mykje som mangla" ("we
    didn't get the whole story with us, and when we got to the editing
    table we discovered a lot was missing"); quanto às críticas factuais
    dos noruegueses em particular, diz que não se importa, já que estava a
    fazer um filme de ficção, não um documentário sobre geografia
    norueguesa. O próprio Nesbø, questionado pela NRK semanas depois,
    recusa-se a comentar as críticas - "that's for the director to answer"
    - e diz que ainda não viu o filme, e que tem achado isso bastante
    conveniente, já que o poupa à pergunta sobre o que acha dele; diz
    esperar vê-lo eventualmente.

- id: jo-nesbo/kniv-riverton-loop-2020
  title: Vence o Prémio Riverton uma segunda vez, 22 anos depois da primeira
  description: >
    Vinte e dois anos depois de [[work:jo-nesbo/flaggermusmannen|O
    Morcego]] lhe ter valido o Rivertonprisen (Den gylne revolver) como
    autor estreante, em 1997, [[work:jo-nesbo/kniv|A Faca]] vale-lhe o
    mesmo prémio uma segunda vez, entregue no Slottsparken de Oslo pelo
    mesmo presidente do júri, o professor de literatura Hans H. Skei, que
    também lhe entregara o prémio da primeira vez. "When I got the prize
    for my debut novel 22 years ago, I thought: 'wow, is it that easy to be
    the best'," diz Nesbø à plateia. "Now, some books later - which didn't
    win the prize - I know it isn't easy. That makes me appreciate this
    prize even more." Questionado pela NRK sobre porque deveria este livro,
    o décimo segundo da série, ser aquele que repetia o feito, a sua
    resposta é simples: "I think it's because it's pretty good."
