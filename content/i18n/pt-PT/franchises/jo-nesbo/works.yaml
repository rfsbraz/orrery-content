# Português europeu (pt-PT) - sinopses.
# Os títulos de obras NÃO são traduzidos aqui (ver docs/SCHEMA.md, "Never
# translate a published title"): um título traduzido só existe como edição,
# em editions.yaml. Vinte e quatro das trinta e quatro obras desta ala têm
# uma edição pt-PT real e verificada (Dom Quixote, com Macbeth na Bertrand
# Editora); as outras dez - Nådeskudd (ainda não publicado), Det hvite
# hotellet, Karusellmusikk, Stemmer fra Balkan e as seis obras de Doktor
# Proktor - não têm edição portuguesa, pelo que ficam com o título norueguês
# original em qualquer referência.
# `note:` não é traduzido: o campo não é lido pela aplicação em Work (só
# `synopsis` chega ao leitor), verificado em lib/content/types.ts do
# repositório da aplicação.
# CUIDADO COM SPOILERS: seis sinopses desta ala foram reescritas para não
# revelar o que a capa da Aschehoug retém em cada edição - Politi (o estado
# de Harry), Mere blod (quem não é o narrador), Kongen av Os e Kongeriket
# (a culpa e as consequências), Tørst (o emprego de Harry) e Gjenferd
# (Oleg é o acusado, não uma vítima). A tradução segue exatamente o texto de
# base já reescrito, sem repor detalhe de uma sinopse de capa em inglês.

- id: jo-nesbo/flaggermusmannen
  synopsis: >
    O primeiro caso de Harry Hole leva-o a Sydney para acompanhar a
    investigação local ao homicídio de uma jovem norueguesa, numa cidade que
    não conhece nem controla.

- id: jo-nesbo/kakerlakkene
  synopsis: >
    O homicídio de um embaixador norueguês em Banguecoque arrasta Harry
    para um caso que não se deixa conter numa só cidade nem num só motivo.

- id: jo-nesbo/rodstrupe
  synopsis: >
    De volta a Oslo, Harry segue um fio com décadas, ligado aos voluntários
    noruegueses na Frente Oriental da Segunda Guerra Mundial, até uma
    conspiração dos dias de hoje, enquanto a bebida e o seu lugar na polícia
    ficam cada vez mais em risco.

- id: jo-nesbo/sorgenfri
  synopsis: >
    Uma fuga da prisão e um caso antigo regressam a Harry ao mesmo tempo.

- id: jo-nesbo/marekors
  synopsis: >
    Um assassino que deixa uma pequena estrela vermelha em cada cena obriga
    Harry a uma parceria incómoda com o colega em quem menos confia.

- id: jo-nesbo/frelseren
  synopsis: >
    Um oficial do Exército de Salvação é morto a tiro numa praça de Oslo, à
    vista de testemunhas, e o assassino não se comporta como nenhum dos que
    Harry já perseguiu.

- id: jo-nesbo/snomannen
  synopsis: >
    Um assassino em série que deixa um boneco de neve em cada desaparecimento
    arrasta Harry para a procura de um padrão entre esposas e mães
    desaparecidas.

- id: jo-nesbo/panserhjerte
  synopsis: >
    Um assassino que atua com uma arma tão improvável quanto brutal obriga
    Harry a regressar do exílio que se impusera em Hong Kong.

- id: jo-nesbo/gjenferd
  synopsis: >
    Harry regressa a Oslo após três anos fora para investigar um homicídio
    sem prioridade no mundo da droga, e descobre que o acusado é Oleg, o
    filho da mulher que ainda ama - e que o rasto sobe mais alto.

- id: jo-nesbo/politi
  synopsis: >
    Agentes da polícia estão a ser mortos nos locais dos seus próprios casos
    por resolver, e a polícia de Oslo persegue alguém que conhece o sistema
    por dentro.

- id: jo-nesbo/torst
  synopsis: >
    Uma mulher é encontrada morta depois de um encontro marcado online,
    vítima de alguém que queria o seu sangue, e o único detetive capaz de
    ler o padrão é trazido de volta por uma ligação ao único caso que lhe
    escapou.

- id: jo-nesbo/kniv
  synopsis: >
    Harry acorda sem memória da noite anterior ao lado de uma mulher
    assassinada que conhecia, e tem de investigar um crime do qual não
    consegue excluir-se como suspeito.

- id: jo-nesbo/blodmane
  synopsis: >
    A viver em Los Angeles e a beber-se para o fim, Harry aceita um
    trabalho pago para caçar um assassino em série de volta a Oslo, só para
    comprar a liberdade de um amigo perante a dívida a um cartel de droga.

- id: jo-nesbo/nadeskudd
  synopsis: >
    Harry, já sem ser polícia, está numa entrevista de emprego numa
    seguradora quando um homicídio de inverno em Oslo traça linhas até um
    crime que recorda uma cena de um filme conhecido, tudo isto com o pano
    de fundo de uma produção cinematográfica para a qual o próprio Harry
    acaba arrastado.

- id: jo-nesbo/kongeriket
  synopsis: >
    Roy, mecânico de automóveis numa pequena vila norueguesa, vê a sua vida
    tranquila reaberta quando o irmão mais novo, Carl, regressa a casa após
    anos no estrangeiro, com uma mulher e um plano para um hotel de
    montanha - e o xerife da vila volta a perguntar como morreram os pais
    dos irmãos.

- id: jo-nesbo/kongen-av-os
  synopsis: >
    Carl e Roy Opgard construíram tanto sucesso quanto a pequena vila de Os
    permite, um a gerir o hotel termal e o outro a bomba de gasolina e um
    parque de diversões planeado, até que uma nova estrada, desviada da
    vila, ameaça tudo isso - e os métodos necessários para o impedir se
    tornam sujos.

- id: jo-nesbo/blod-pa-sno
  synopsis: >
    Olav Johansen, homem de confiança de um chefe do crime de Oslo, recebe
    ordens para matar a mulher infiel do patrão - e apaixona-se por ela em
    vez de cumprir a missão.

- id: jo-nesbo/mere-blod
  synopsis: >
    Em agosto de 1977, um homem desce de um autocarro numa aldeia remota do
    planalto de Finnmark, dizendo chamar-se Ulf, sem bagagem, afirmando que
    veio para caçar. Não é ele o caçador.

- id: jo-nesbo/det-hvite-hotellet
  synopsis: >
    Thomas Alvern, investigador de seguros norueguês, viaja de avião até
    Bombaim para identificar um homem ligado a uma suspeita de fraude, à
    espera de um trabalho de rotina que a cidade se recusa a deixar
    rotineiro.

- id: jo-nesbo/hodejegerne
  synopsis: >
    Roger Brown, um caçador de talentos de elite que, nas horas vagas, rouba
    obras de arte, escolhe o alvo errado e tem de sobreviver às
    consequências.

- id: jo-nesbo/sonnen
  synopsis: >
    Um recluso, incriminado por crimes que não cometeu e induzido a assinar
    uma confissão fabricada, foge da prisão para descobrir quem matou
    realmente o seu pai e o seu melhor amigo.

- id: jo-nesbo/macbeth
  synopsis: >
    Uma versão hard-boiled da tragédia de Shakespeare: o Inspetor Macbeth,
    de uma unidade policial paramilitar, volta-se contra traficantes de
    droga, motards e os seus próprios colegas numa cidade industrial
    corrupta que mistura texturas escandinavas e escocesas, situada em 1970.

- id: jo-nesbo/natthuset
  synopsis: >
    Richard Elauved, de catorze anos, enviado para viver com os tios depois
    de os pais morrerem num incêndio, torna-se o principal suspeito quando
    uma colega desaparece dentro de uma cabina telefónica abandonada, na
    periferia da cidade, e tem de descobrir a verdade antes que esta
    reclame mais alguém.

- id: jo-nesbo/minnesota
  synopsis: >
    Bob Oz, detetive da polícia de Minneapolis sem beleza, dinheiro ou
    charme de sobra, recusa-se a deixar uma suspensão impedi-lo de
    investigar uma tentativa de assassinato contra um traficante de armas,
    um caso que continua a voltar a outro que preferia esquecer.

- id: jo-nesbo/karusellmusikk
  synopsis: >
    Uma coletânea de contos; não foi encontrado mais nenhum detalhe sobre o
    seu conteúdo nas fontes consultadas.

- id: jo-nesbo/sjalusimannen-og-andre-fortellinger
  synopsis: >
    Uma coletânea de contos, publicada em inglês nesse mesmo ano com o
    título The Jealousy Man and Other Stories.

- id: jo-nesbo/rotteoya-og-andre-fortellinger
  synopsis: >
    Uma segunda coletânea de contos de 2021, publicada em inglês nesse
    mesmo ano com o título Rat Island and Other Stories.

- id: jo-nesbo/doktor-proktors-prompepulver
  synopsis: >
    Um inventor excêntrico em Oslo torna-se amigo de Nilly, um vizinho novo
    e destemido, e de Lisa, e os três juntam-se em torno do pó de peidos
    inodoro de Doktor Proktor e dos seus usos cada vez mais explosivos.

- id: jo-nesbo/doktor-proktors-tidsbadekar
  synopsis: >
    Doktor Proktor, Nilly e Lisa constroem uma banheira que viaja no tempo;
    não foi encontrado mais nenhum detalhe do enredo nas fontes consultadas.

- id: jo-nesbo/doktor-proktor-og-verdens-undergang-kanskje
  synopsis: >
    Uma invasão alienígena ameaça o bairro de Doktor Proktor, e a Poção do
    Poder do professor, juntamente com uma nova leva de invenções cada vez
    mais improváveis, é chamada a travá-la.

- id: jo-nesbo/doktor-proktors-sensasjonelle-samling-av-dyr-du-skulle-onske-ikke-fantes
  synopsis: >
    Um bestiário complementar aos romances de Doktor Proktor: um catálogo de
    animais estranhos e perigosos de todo o mundo que as autoridades
    preferiam que ninguém conhecesse.

- id: jo-nesbo/doktor-proktor-og-det-store-gullroveriet
  synopsis: >
    Doktor Proktor, Nilly e Lisa viajam até Londres para recuperar toda a
    reserva de ouro da Noruega (reduzida, comicamente, a uma única barra)
    depois de esta ser roubada, infiltrando-se num gang liderado por um
    vilão que nem a Scotland Yard ousa tocar, e pelo caminho têm ainda de
    ganhar um jogo de futebol para o conseguir.

- id: jo-nesbo/kan-doktor-proktor-redde-jula
  synopsis: >
    O Sr. Thrane compra os direitos do próprio Natal, e Doktor Proktor,
    Lisa e Nilly têm de se aliar a um Pai Natal que em nada se parece com a
    figura de avô simpático que esperavam, para o salvar em nome das
    crianças do mundo inteiro.

- id: jo-nesbo/stemmer-fra-balkan
  synopsis: >
    Um relato de não-ficção escrito em conjunto com o jornalista Espen
    Søbye; não foi encontrado mais nenhum detalhe nas fontes consultadas.
