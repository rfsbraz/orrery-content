# Tradução pt-PT das sinopses. Os títulos das obras NUNCA se traduzem aqui:
# um título traduzido é dado de edição (editions.yaml). Dentro da prosa usa-se
# o título português publicado quando existe; quando não existe edição
# portuguesa verificada, mantém-se o título original.

# --- anos 20 ---

- id: agatha-christie/the-mysterious-affair-at-styles
  synopsis: "A estreia de Poirot: um detetive belga refugiado resolve o envenenamento de uma herdeira rica numa casa de campo inglesa, com narração do Capitão Hastings. (Primeira edição britânica em 1921.)"

- id: agatha-christie/the-secret-adversary
  synopsis: "Dois jovens aventureiros sem dinheiro põem um anúncio a oferecer-se para qualquer serviço e tropeçam numa conspiração do pós-guerra em torno de um tratado secreto desaparecido."

- id: agatha-christie/the-murder-on-the-links
  synopsis: "Chamado a França por um milionário assustado, Poirot chega para encontrar o cliente já morto num campo de golfe."

- id: agatha-christie/the-man-in-the-brown-suit
  synopsis: "Uma jovem segue uma pista enigmática e o rasto de um morto até um navio a caminho da África do Sul; a primeira aparição do Coronel Race."

- id: agatha-christie/poirot-investigates
  synopsis: "A primeira coletânea de contos de Poirot, onze casos iniciais narrados por Hastings ao jeito de Sherlock e Watson."

- id: agatha-christie/the-secret-of-chimneys
  synopsis: "Um thriller ligeiro de joias roubadas, intriga balcânica e um crime em casa de campo; a estreia do Superintendente Battle."

- id: agatha-christie/the-murder-of-roger-ackroyd
  synopsis: "Na aldeia de King's Abbot, Poirot investiga o esfaqueamento de um industrial reformado. O romance que tornou Christie famosa e reescreveu as regras do género."

- id: agatha-christie/the-big-four
  synopsis: "Um thriller episódico, cosido a partir de contos encadeados, que opõe Poirot a um sindicato criminoso internacional decidido a dominar o mundo."

- id: agatha-christie/the-mystery-of-the-blue-train
  synopsis: "Uma herdeira é assassinada e um rubi célebre desaparece a bordo do luxuoso Comboio Azul para a Riviera. Escrito no rescaldo sombrio de 1926, e um livro de que Christie nunca gostou."

- id: agatha-christie/the-seven-dials-mystery
  synopsis: "Uma partida numa festa de casa de campo acaba em morte e arrasta Battle para dentro de uma sociedade secreta. Uma sequela solta de O Segredo de Chimneys."

- id: agatha-christie/partners-in-crime
  synopsis: "Tommy e Tuppence gerem uma agência de detetives e resolvem cada caso ao estilo de um investigador diferente da ficção da época - uma coletânea que é também uma paródia afetuosa do género."

# --- anos 30 ---

- id: agatha-christie/the-murder-at-the-vicarage
  synopsis: "O primeiro romance de Marple: quando o homem mais detestado da aldeia é morto a tiro no escritório do pároco, uma solteirona idosa com um génio especial para a maldade humana vê o que a polícia não vê."

- id: agatha-christie/the-mysterious-mr-quin
  synopsis: "A criação preferida da própria Christie: contos encadeados em que o enigmático Mr Harley Quin leva o discreto Mr Satterthwaite a ver a verdade em matérias de amor e de morte."

- id: agatha-christie/giants-bread
  synopsis: "O primeiro romance de Westmacott: a vida de um compositor movido pela obsessão e as pessoas que sacrifica à sua música. Não é um policial."

- id: agatha-christie/the-sittaford-mystery
  synopsis: "Uma sessão espírita em Dartmoor, isolada pela neve, soletra um crime que depois se cumpre, a quilómetros dali. Um romance autónomo, sem detetive. (EUA: Murder at Hazelmoor.)"

- id: agatha-christie/peril-at-end-house
  synopsis: "De férias, Poirot faz amizade com uma jovem que sobreviveu a três acidentes quase fatais e corre para impedir o quarto."

- id: agatha-christie/the-thirteen-problems
  synopsis: "Um clube de jantares entretém-se a propor mistérios por resolver; a discreta Miss Marple raciocina melhor do que todos, sempre. (EUA: The Tuesday Club Murders.)"

- id: agatha-christie/lord-edgware-dies
  synopsis: "Um par do reino é assassinado; a suspeita óbvia, a mulher, atriz, jantava comprovadamente do outro lado da cidade. (EUA: Thirteen at Dinner.)"

- id: agatha-christie/the-hound-of-death
  synopsis: "Uma coletânea publicada apenas no Reino Unido, com doze contos de pendor sobrenatural e inquietante, incluindo o muito antologiado 'The Witness for the Prosecution'."

- id: agatha-christie/murder-on-the-orient-express
  synopsis: "Bloqueado pela neve numa carruagem imobilizada, Poirot tem de encontrar um assassino entre os passageiros da carruagem de Calais. O seu enigma mais famoso. (EUA: Murder in the Calais Coach.)"

- id: agatha-christie/why-didnt-they-ask-evans
  synopsis: "As últimas palavras de um moribundo lançam o filho de um pároco e uma jovem desembaraçada atrás de um mistério pelo País de Gales. Uma aventura autónoma. (EUA: The Boomerang Clue.)"

- id: agatha-christie/parker-pyne-investigates
  synopsis: "Mr Parker Pyne anuncia-se para curar os infelizes; uma coletânea que o apresenta e que traz, em dois contos, a romancista recorrente de Christie, Ariadne Oliver. (EUA: Mr. Parker Pyne, Detective.)"

- id: agatha-christie/the-listerdale-mystery
  synopsis: "Uma coletânea publicada apenas no Reino Unido, com doze contos de mistério leves e muitas vezes românticos."

- id: agatha-christie/unfinished-portrait
  synopsis: "Um romance de Westmacott muito lido como o seu mais autobiográfico: uma mulher à beira do suicídio conta a vida a um estranho. Não é um policial."

- id: agatha-christie/three-act-tragedy
  synopsis: "Um clérigo morre num cocktail sem motivo nem meio aparentes; Poirot trabalha o caso como se fosse teatro encenado. (EUA: Murder in Three Acts.)"

- id: agatha-christie/death-in-the-clouds
  synopsis: "Uma mulher é morta por veneno em pleno voo, numa cabina fechada e com o próprio Poirot a bordo. (EUA: Death in the Air.)"

- id: agatha-christie/the-abc-murders
  synopsis: "Um assassino trocista avança alfabeticamente por vítimas e localidades, deixando um guia ferroviário junto a cada corpo. Uma das suas grandes intrigas de assassino em série."

- id: agatha-christie/murder-in-mesopotamia
  synopsis: "Numa escavação arqueológica no Iraque, a mulher do chefe da expedição é assassinada no quarto trancado. Tirado diretamente das temporadas de Christie nas escavações de Max Mallowan."

- id: agatha-christie/cards-on-the-table
  synopsis: "Um colecionador reúne quatro investigadores e quatro assassinos para jogar bridge; quando é esfaqueado durante a partida, o culpado é um dos quatro parceiros de mesa. Junta Poirot, Battle, Race e Ariadne Oliver à mesma mesa."

- id: agatha-christie/dumb-witness
  synopsis: "A carta de uma solteirona chega a Poirot dois meses depois de posta no correio, e depois de ela ter morrido. A única testemunha da queda é o seu fox terrier de pelo duro. (EUA: Poirot Loses a Client.)"

- id: agatha-christie/death-on-the-nile
  synopsis: "Num cruzeiro pelo Nilo, uma noiva rica em lua de mel é morta a tiro enquanto dorme; Poirot e o Coronel Race peneiram um barco cheio de motivos. Muitas vezes considerado o seu melhor a seguir ao Expresso do Oriente."

- id: agatha-christie/murder-in-the-mews
  synopsis: "Quatro novelas mais longas de Poirot, com o caso que dá título a girar em torno de uma morte na noite de Guy Fawkes disfarçada de suicídio. (EUA: Dead Man's Mirror.)"

- id: agatha-christie/appointment-with-death
  synopsis: "Uma matriarca americana monstruosa morre de uma picada de agulha em Petra; Poirot dá a si próprio uma noite para nomear o assassino entre a família aterrorizada."

- id: agatha-christie/hercule-poirots-christmas
  synopsis: "Um patriarca cruel convoca a família para o Natal e é encontrado degolado num quarto trancado. Um enigma deliberadamente sangrento. (EUA: Murder for Christmas.)"

- id: agatha-christie/and-then-there-were-none
  synopsis: "Dez desconhecidos são atraídos a uma ilha e acusados, por uma voz gravada, de terem escapado impunes a um homicídio; depois, um a um e ao ritmo de uma lengalenga infantil, começam a morrer. O seu livro mais vendido e o policial mais vendido de sempre. (Publicado originalmente sob outros títulos, hoje retirados de circulação.)"

- id: agatha-christie/murder-is-easy
  synopsis: "Um polícia reformado ouve num comboio a história de um assassino em série de aldeia de quem ninguém suspeita; ela morre antes de poder denunciá-lo, e por isso ele investiga. (EUA: Easy to Kill.)"

# --- anos 40 ---

- id: agatha-christie/sad-cypress
  synopsis: "Uma jovem é julgada por ter envenenado a rival; Poirot aceita o caso convencido de que a resposta óbvia está errada. O seu Poirot mais romântico e melancólico."

- id: agatha-christie/one-two-buckle-my-shoe
  synopsis: "O próprio dentista de Poirot é encontrado morto a tiro depois de uma consulta, e o caso cresce até se tornar assunto de política nacional. (EUA: The Patriotic Murders / An Overdose of Death.)"

- id: agatha-christie/evil-under-the-sun
  synopsis: "Numa estância balnear cheia de sol, uma atriz bonita é estrangulada na praia com uma multidão de suspeitos a apanhar banhos de sol ali ao lado. Um enigma de álibis perfeitamente construído."

- id: agatha-christie/n-or-m
  synopsis: "De meia-idade e postos de lado em plena guerra, Tommy e Tuppence infiltram-se numa pensão à beira-mar para desmascarar dois agentes nazis da quinta-coluna. Escrito e ambientado durante a Blitz."

- id: agatha-christie/the-body-in-the-library
  synopsis: "Uma desconhecida de cabelo louro platinado é encontrada estrangulada na biblioteca do Coronel Bantry; Miss Marple pega no cenário clássico e vira-o do avesso."

- id: agatha-christie/five-little-pigs
  synopsis: "Poirot reabre um envenenamento arquivado há dezasseis anos, reconstruindo-o a partir das memórias separadas dos cinco suspeitos. Tido em geral como o seu romance de maior ressonância emocional. (EUA: Murder in Retrospect.)"

- id: agatha-christie/the-moving-finger
  synopsis: "Uma vaga de cartas anónimas venenosas acaba em morte numa vila tranquila; Miss Marple aparece tarde para nomear a mão por trás delas. Um dos preferidos de Christie."

- id: agatha-christie/towards-zero
  synopsis: "O último caso de Battle: um crime numa casa sobre a falésia, contado como a convergência lenta de vidas separadas no único ponto a que Christie chama a hora zero."

- id: agatha-christie/death-comes-as-the-end
  synopsis: "Um policial ambientado no Antigo Egito de 2000 a.C., na casa de um sacerdote funerário de Tebas. Uma verdadeira experiência formal: o primeiro whodunit conhecido passado na Antiguidade."

- id: agatha-christie/absent-in-the-spring
  synopsis: "Retida sozinha numa hospedaria no deserto, uma mulher satisfeita consigo mesma é forçada a olhar com honestidade para a vida inteira. O preferido da própria Christie entre os livros de Westmacott, escrito em três dias."

- id: agatha-christie/sparkling-cyanide
  synopsis: "Um ano depois de uma mulher morrer com cianeto no seu próprio jantar de aniversário, a mesma mesa volta a ser posta; a última aparição do Coronel Race. (EUA: Remembered Death.)"

- id: agatha-christie/come-tell-me-how-you-live
  synopsis: "Um livro de memórias, caloroso e cómico, sobre as temporadas arqueológicas na Síria com Max Mallowan; o seu único livro de viagens, publicado sob o nome de casada."

- id: agatha-christie/the-hollow
  synopsis: "Um homem é morto a tiro junto a uma piscina, com a mulher de pé sobre ele e a arma na mão - demasiado arrumado para ser verdade. Um Poirot movido pelas personagens, no qual mais tarde ela achou que ele estava a mais. (EUA: Murder after Hours.)"

- id: agatha-christie/the-labours-of-hercules
  synopsis: "Doze contos encadeados em que Poirot escolhe doze casos finais, espelhando os trabalhos do seu homónimo mitológico, antes de se retirar."

- id: agatha-christie/taken-at-the-flood
  synopsis: "A fortuna de uma viúva de guerra põe uma família em guerra aberta quando chega um estranho a afirmar que o falecido marido dela ainda estava vivo. Impregnado da Inglaterra do pós-guerra. (EUA: There Is a Tide...)"

- id: agatha-christie/the-rose-and-the-yew-tree
  synopsis: "Um romance de Westmacott sobre política e sacrifício no pós-guerra, assente numa ligação improvável entre um idealista moribundo e um candidato implacável de origem operária."

- id: agatha-christie/crooked-house
  synopsis: "Um patriarca rico é envenenado numa casa cheia de familiares; um romance autónomo que Christie apontava como um dos seus preferidos, por um final que teve de lutar para manter."

# --- anos 50 ---

- id: agatha-christie/a-murder-is-announced
  synopsis: "Um anúncio de jornal convida a aldeia para um crime a hora e local marcados; os vizinhos tratam aquilo como um jogo até alguém morrer de verdade. Muitas vezes apontado como o melhor romance de Marple."

- id: agatha-christie/they-came-to-baghdad
  synopsis: "Uma jovem dactilógrafa atrapalhada persegue um homem até Bagdade por amor e vai parar ao meio de uma conspiração em torno de uma cimeira da Guerra Fria. Uma aventura de espionagem autónoma, nascida dos anos de Christie no Médio Oriente."

- id: agatha-christie/mrs-mcgintys-dead
  synopsis: "Um condenado está a dias de ser enforcado pelo homicídio de uma mulher a dias, e só Poirot acredita que se prendeu o homem errado. Ariadne Oliver junta-se à caça."

- id: agatha-christie/they-do-it-with-mirrors
  synopsis: "Miss Marple visita uma velha amiga num reformatório para jovens delinquentes e encontra um crime construído sobre artifício cénico e ilusão. (EUA: Murder with Mirrors.)"

- id: agatha-christie/a-daughters-a-daughter
  synopsis: "Um romance de Westmacott sobre uma mãe viúva e uma filha adulta que sabotam uma à outra as hipóteses de amar. Começou por ser uma peça de teatro de Christie."

- id: agatha-christie/after-the-funeral
  synopsis: "Na leitura de um testamento, uma irmã avoada deixa escapar que o irmão foi assassinado; no dia seguinte está morta. Poirot investiga uma família de herdeiros. (EUA: Funerals Are Fatal.)"

- id: agatha-christie/a-pocket-full-of-rye
  synopsis: "Um financeiro morre com centeio no bolso e os homicídios que se seguem acompanham uma lengalenga infantil; Miss Marple aparece por causa de uma criada morta que em tempos formou."

- id: agatha-christie/destination-unknown
  synopsis: "Uma mulher com intenções suicidas toma o lugar de um mensageiro morto numa missão sem regresso, dentro de um esquema que atrai cientistas desertores para um complexo escondido no deserto. Um thriller autónomo. (EUA: So Many Steps to Death.)"

- id: agatha-christie/hickory-dickory-dock
  synopsis: "Pequenos furtos numa residência de estudantes azedam até ao homicídio; Poirot investiga por sugestão da sua secretária impecável, cuja irmã dirige a casa. (EUA: Hickory Dickory Death.)"

- id: agatha-christie/dead-mans-folly
  synopsis: "Ariadne Oliver monta uma caça ao crime a fingir numa festa de aldeia e pressente que aí vem uma morte a sério; chama Poirot, e uma escuteira acaba mesmo estrangulada."

- id: agatha-christie/the-burden
  synopsis: "O último romance de Westmacott: o amor de uma vida inteira, absorvente, de uma irmã mais velha por uma mais nova, e o que custa às duas."

- id: agatha-christie/4-50-from-paddington
  synopsis: "Uma velha amiga vê uma mulher a ser estrangulada pela janela de um comboio que passa; ninguém acredita nela, e por isso Miss Marple coloca uma agente dentro da única casa onde o corpo poderia ter ido parar. (EUA: What Mrs. McGillicuddy Saw!)"

- id: agatha-christie/ordeal-by-innocence
  synopsis: "Um homem regressa para limpar o nome de um filho já morto na prisão, e acaba por provar que o verdadeiro assassino continua dentro da família. Um romance autónomo que Christie contava entre os seus preferidos."

- id: agatha-christie/cat-among-the-pigeons
  synopsis: "Uma revolução longe dali e joias contrabandeadas para casa trazem o homicídio a um colégio de raparigas de elite; Poirot chega surpreendentemente tarde, chamado por uma aluna assustada."

# --- anos 60 ---

- id: agatha-christie/the-adventure-of-the-christmas-pudding
  synopsis: "Seis casos natalícios, cinco para Poirot e um para Miss Marple, com um prefácio afetuoso de Christie sobre os Natais da sua infância. (Coletânea norte-americana: Double Sin.)"

- id: agatha-christie/the-pale-horse
  synopsis: "A lista de nomes deixada por um padre morto leva a um trio de 'bruxas' de aldeia que parecem matar à distância, até emergir o verdadeiro método, químico. Com Ariadne Oliver; à intriga do tálio creditaram-se diagnósticos na vida real."

- id: agatha-christie/the-mirror-crackd-from-side-to-side
  synopsis: "Uma estrela de cinema compra a casa senhorial, e uma vizinha deslumbrada é envenenada na festa dela; por trás do glamour, Miss Marple encontra um luto antigo e insuportável. (EUA: The Mirror Crack'd.)"

- id: agatha-christie/the-clocks
  synopsis: "A casa de uma mulher cega guarda um desconhecido morto e quatro relógios parados à mesma hora errada; Poirot resolve o caso quase inteiramente do seu cadeirão."

- id: agatha-christie/a-caribbean-mystery
  synopsis: "Em convalescença numa estância das Caraíbas, Miss Marple ouve com meia atenção a história que um maçador lhe conta sobre um assassino, mesmo antes de ele morrer por a ter contado."

- id: agatha-christie/at-bertrams-hotel
  synopsis: "Um hotel londrino eduardiano perfeitamente conservado é bom demais para ser verdade; Miss Marple, que lá volta cinquenta anos depois, pressente a podridão sob a nostalgia."

- id: agatha-christie/third-girl
  synopsis: "Uma jovem diz a Poirot que talvez tenha cometido um homicídio, e depois foge dizendo que ele é velho demais para ajudar. Um Poirot envelhecido a trabalhar nos Swinging Sixties, com Ariadne Oliver."

- id: agatha-christie/endless-night
  synopsis: "Um motorista de origem operária e uma jovem herdeira rica constroem a casa de sonho em terreno amaldiçoado. Um romance autónomo tardio, sombrio, na primeira pessoa, colocado entre os seus melhores."

- id: agatha-christie/by-the-pricking-of-my-thumbs
  synopsis: "A pergunta murmurada por uma velha num lar e um quadro perturbante levam uma Tuppence já idosa, sozinha, a uma aldeia que esconde décadas de assassínios de crianças."

- id: agatha-christie/halloween-party
  synopsis: "Uma rapariga fanfarrona diz que viu um homicídio, e nessa mesma noite é afogada numa tina de pescar maçãs à boca; Ariadne Oliver chama Poirot a uma aldeia envenenada."

# --- anos 70 ---

- id: agatha-christie/passenger-to-frankfurt
  synopsis: "Um diplomata entediado empresta o passaporte a um desconhecido e vê-se arrastado para uma conspiração global de movimentos juvenis. O seu thriller tardio mais estranho e mais controverso, escrito aos oitenta anos. (Subtítulo: An Extravaganza.)"

- id: agatha-christie/nemesis
  synopsis: "O testamento de um milionário morto propõe a Miss Marple um mistério que ele se recusa a nomear, mandando-a numa excursão de autocarro por jardins ingleses para reparar uma injustiça antiga. Um companheiro tardio de O Mistério das Caraíbas."

- id: agatha-christie/elephants-can-remember
  synopsis: "Ariadne Oliver e Poirot reabrem um caso antigo de um casal encontrado morto a tiro numa falésia - homicídio seguido de suicídio, mas por que mão? O último romance de Poirot a ser escrito."

- id: agatha-christie/postern-of-fate
  synopsis: "Os Beresford, já idosos, mudam de casa e encontram, escondida nos livros das crianças, uma mensagem cifrada sobre uma morte antiga. O último romance que Christie escreveu."

- id: agatha-christie/poirots-early-cases
  synopsis: "Dezoito casos curtos do início da carreira, quase todos narrados por Hastings, reunidos tardiamente a partir do trabalho de Christie para revistas."

- id: agatha-christie/curtain-poirots-last-case
  synopsis: "Poirot, velho e frágil, regressa a Styles, onde tudo começou, certo de que ali age um assassino que nenhum tribunal poderia tocar. Escrito nos anos 40, selado no cofre de um banco e publicado apenas no fim. Leia-o em último lugar."

- id: agatha-christie/sleeping-murder
  synopsis: "Uma jovem recém-casada é assombrada por uma casa que tem a certeza de nunca ter visto e por um crime de que ninguém se lembra; o último caso de Miss Marple. Também escrito nos anos 40 e guardado no cofre, publicado logo após a morte de Christie."

- id: agatha-christie/an-autobiography
  synopsis: "As memórias que Christie escreveu ao longo de quinze anos e terminou em 1965, publicadas postumamente; franca sobre tudo menos sobre os onze dias de 1926, que omite por completo."

- id: agatha-christie/miss-marples-final-cases
  synopsis: "Uma reunião póstuma, publicada no Reino Unido, dos últimos contos de Marple ainda dispersos, com duas histórias sobrenaturais. Publicada três anos depois da sua morte."
