# Tradução pt-PT das ordens de leitura curadas: nome, justificação e os
# pontos em debate. Os `orderedWorkIds` são identificadores e não se traduzem.

- id: agatha-christie/poirot-novels
  name: Os romances de Hercule Poirot, por ordem
  rationale: >
    Os trinta e três romances de Poirot por ordem de publicação, a forma
    habitual de ler a série. Os casos de Poirot funcionam isoladamente, pelo
    que a ordem estrita é opcional, mas ler pela frente faz com que o elenco
    recorrente (Hastings, Japp, Miss Lemon, Ariadne Oliver) e o próprio
    envelhecimento de Poirot resultem como foram pensados. Uma regra não é
    opcional: [[work:agatha-christie/curtain-poirots-last-case|Cai o Pano]] é
    a sua despedida e tem de ser lido em último lugar, coisa que a ordem de
    publicação acaba por respeitar, já que Christie o guardou até ao fim.
  debated:
    - "Cai o Pano foi escrito no início da década de 1940 mas publicado em 1975; a ordem de publicação coloca-o no fim (o correto para a leitura), ainda que, pela cronologia interna, o declínio de Poirot fique desencontrado dos romances dos anos 60 e 70 que o rodeiam."
    - "Este percurso lista apenas romances. As coletâneas de contos de Poirot (As Investigações de Poirot, Murder in the Mews, Os Trabalhos de Hércules, Os Primeiros Casos de Poirot) podem ser encaixadas no respetivo ano de publicação ou lidas à parte; os guias não são unânimes."
    - "Existe nos guias de fãs uma ordem minoritária 'cronológica interna' de Poirot, mas Christie manteve deliberadamente vaga a linha temporal da personagem, pelo que não há cronologia interna com autoridade: a ordem de publicação é o padrão documentado."

- id: agatha-christie/marple-novels
  name: Os romances de Miss Marple, por ordem
  rationale: >
    Os doze romances de Marple por ordem de publicação. Tal como em Poirot,
    cada caso é autónomo, mas ler pela frente permite acompanhar St Mary Mead
    e a própria Miss Marple ao longo de quatro décadas, da solteirona
    expedita da aldeia à frágil "Némesis" dos livros tardios.
    [[work:agatha-christie/sleeping-murder|Crime Adormecido]], anunciado como
    o seu último caso, fica em último por publicação, tal como Christie
    pretendia.
  debated:
    - "Crime Adormecido foi escrito nos anos 40 e guardado no cofre, sendo publicado postumamente em 1976; a ordem de publicação (usada aqui) coloca-o no fim, o que corresponde ao anúncio de 'o último caso de Miss Marple', embora tenha sido composto décadas antes."
    - "Némesis é uma sequela direta de O Mistério das Caraíbas e deve segui-lo: a ordem de publicação preserva isso."
    - "Os contos de Marple (Os Treze Enigmas, Miss Marple Investiga) ficam de fora deste percurso, que inclui apenas romances."
