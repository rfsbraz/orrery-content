# Portuguese (pt-PT) overlay for the Agatha Christie recurring characters.
# Only `description` is translated: `name` and `aka` are proper nouns and the
# per-appearance notes stay in the base language. Where a description names a
# novel, the published Portuguese title is used (Cartas na Mesa).

- id: agatha-christie/hercule-poirot
  description: >
    O detetive belga reformado, refugiado da Primeira Guerra Mundial, cujo
    bigode encerado, as "pequenas células cinzentas" e o gosto pela ordem
    fizeram dele o detetive de ficção mais famoso a seguir a Sherlock Holmes.
    Resolve os casos pela psicologia e pelo método, não por pegadas.

- id: agatha-christie/miss-marple
  description: >
    A velha solteirona mexeriqueira de St Mary Mead, cujo ar inofensivo esconde
    uma compreensão impiedosa da natureza humana. Resolve homicídios por
    analogia com as pequenas maldades da vida de aldeia, e é quase sempre
    subestimada.

- id: agatha-christie/ariadne-oliver
  description: >
    Romancista policial de sucesso, devota de maçãs, que se desespera com o seu
    próprio detetive finlandês: o autorretrato afetuoso de Christie. Entra nos
    casos de Poirot como amiga e catalisadora, e é o fio mais claro a ligar
    livros que de outro modo seriam avulsos.

- id: agatha-christie/tommy-and-tuppence
  description: >
    O casal de aventureiros amadores de Christie, apresentados como dois jovens
    sem dinheiro no rescaldo da Primeira Guerra Mundial. Ao contrário de todos
    os outros detetives dela, envelhecem em tempo real ao longo de cinco livros
    e acabam como um casal de idosos que continua a tropeçar em conspirações.

- id: agatha-christie/colonel-race
  description: >
    Homem alto e bronzeado dos serviços secretos do Império, mais caçador de
    espiões do que detetive. Aparece onde Christie quer ameaça internacional, e
    partilha dois casos com Poirot.

- id: agatha-christie/superintendent-battle
  description: >
    Homem impassível e de rosto impenetrável da Scotland Yard, o contrapeso
    profissional aos amadores talentosos de Christie. Fiável mais do que
    brilhante, sustenta os thrillers mais leves e junta-se à cimeira dos quatro
    detetives de Cartas na Mesa.
