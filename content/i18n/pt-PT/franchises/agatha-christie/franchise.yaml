# Tradução pt-PT (português europeu) da prosa curada da ala Agatha Christie.
# `startHere.paths` é uma lista aninhada com id: funde-se item a item pela
# chave `id` (docs/SCHEMA.md, "Nested lists merge by id"), pelo que aqui só vai
# prosa - nunca `workIds`, `orderId` ou `fit`. `name` e `sources` não se traduzem.

- id: agatha-christie
  description: >
    A Idade de Ouro da ficção policial numa só carreira: sessenta e seis
    romances-enigma, dois detetives imortais em
    [[character:agatha-christie/hercule-poirot|Poirot]] e
    [[character:agatha-christie/miss-marple|Miss Marple]], e a obra de ficção
    mais vendida alguma vez escrita.
  startHere:
    paths:
      - id: the-perfect-standalone
        title: O romance autónomo perfeito
        description: >
          A sua obra-prima e o policial mais vendido de sempre: sem série, sem
          detetive, sem leituras prévias. Dez desconhecidos numa ilha, e uma
          lengalenga infantil em contagem decrescente. Se há um livro capaz de
          o prender, é este.
        note: >
          É a recomendação quase unânime de "comece por aqui", e por bons
          motivos: compromisso zero, recompensa máxima.

      - id: meet-poirot
        title: Conhecer Poirot
        description: >
          Os dois casos mais famosos do pequeno belga da cabeça em forma de ovo
          e das célebres célulazinhas cinzentas amantes da ordem: primeiro o
          caso de aldeia que fez o nome de Christie, depois o comboio
          preso na neve que é a sua assinatura.
        note: >
          Leia-os por esta ordem. Guarde
          [[work:agatha-christie/curtain-poirots-last-case|Cai o Pano]] para o
          fim mesmo do caminho de Poirot.

      - id: meet-marple
        title: Conhecer Miss Marple
        description: >
          A velhinha enganadoramente inofensiva de St Mary Mead, que resolve
          crimes por analogia com a vida da aldeia. A sua primeira aparição, e
          depois o livro que a maioria dos leitores considera o melhor dela.

      - id: poirot-in-order
        title: Poirot, do princípio ao fim
        description: >
          Os trinta e três romances de Poirot por ordem de publicação, da
          estreia em Styles ao caso que o traz de volta a Styles para o
          resolver. Vê-se envelhecer o detetive e a escritora ao longo de
          cinquenta e cinco anos.

      - id: the-whole-shelf
        title: A estante inteira
        description: >
          Tudo, pela ordem em que foi publicado: os romances policiais, as
          coletâneas, os romances de Westmacott, as memórias. Cinco décadas de
          um género a ser inventado e aperfeiçoado em tempo real.
