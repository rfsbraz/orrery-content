# Tradução pt-PT das eras (as placas narrativas da ala): título e descrição.
# O campo `period` é data, não prosa, e por isso não aparece aqui.

- id: the-styles-years
  title: Os Anos de Styles
  description: >
    De antiga enfermeira de farmácia hospitalar, desconhecida de todos, a nome
    conhecido em todas as casas. Poirot chega em
    [[work:agatha-christie/the-mysterious-affair-at-styles|O Misterioso Caso de
    Styles]], os Beresford em
    [[work:agatha-christie/the-secret-adversary|O Inimigo Secreto]], e
    [[work:agatha-christie/the-murder-of-roger-ackroyd|O Assassinato de Roger
    Ackroyd]] detona uma reviravolta que a torna famosa e infame ao mesmo
    tempo. A década fecha com o colapso do primeiro casamento e o
    desaparecimento de onze dias, em 1926.

- id: the-golden-age
  title: A Idade de Ouro
  description: >
    A sua fase imperial, e a do género. Recém-casada com Max Mallowan e a
    passar os invernos em escavações no Médio Oriente, assina a série de
    livros que define a ficção policial -
    [[work:agatha-christie/murder-on-the-orient-express|Um Crime no Expresso do
    Oriente]], [[work:agatha-christie/the-abc-murders|Os Crimes do ABC]],
    [[work:agatha-christie/death-on-the-nile|Morte no Nilo]] e o impecável
    [[work:agatha-christie/and-then-there-were-none|As Dez Figuras Negras]] -
    enquanto [[work:agatha-christie/the-murder-at-the-vicarage|Crime no
    Vicariato]] apresenta Miss Marple e o Detection Club codifica as regras que
    ela tanto gostava de quebrar.

- id: the-war-vault-years
  title: A Guerra e o Cofre
  description: >
    De volta à farmácia de um hospital durante a Blitz, Christie escreve muito
    e escreve sombrio: [[work:agatha-christie/five-little-pigs|Os Cinco
    Suspeitos]], o egípcio antigo
    [[work:agatha-christie/death-comes-as-the-end|A Morte Não é o Fim]], a
    aventura de espionagem [[work:agatha-christie/n-or-m|N or M?]]. Receando
    que as bombas a matassem, escreve os dois romances de despedida -
    [[work:agatha-christie/curtain-poirots-last-case|Cai o Pano]] e
    [[work:agatha-christie/sleeping-murder|Crime Adormecido]] - e tranca-os no
    cofre de um banco, para a filha e o marido.

- id: the-postwar-plateau
  title: O Patamar do Pós-Guerra
  description: >
    Uma década firme e confiante.
    [[work:agatha-christie/a-murder-is-announced|Anúncio de um Crime]] é o
    melhor de Marple, [[work:agatha-christie/crooked-house|A Casa Torta]] e
    [[work:agatha-christie/ordeal-by-innocence|Ordeal by Innocence]] são
    favoritos pessoais, e em 1952 estreia a peça The Mousetrap, que se torna a
    mais longa carreira da história do teatro. É já uma instituição nacional,
    que publica um "Christie pelo Natal" com a pontualidade de um relógio.

- id: the-late-period
  title: O Período Tardio
  description: >
    A construção das intrigas afrouxa com a idade, e o mundo moderno
    desassossega os livros tardios - e no entanto
    [[work:agatha-christie/endless-night|Noite Sem Fim]] prova que o antigo
    domínio continua intacto. Feita Dame em 1971, lança por fim, em 1975, o
    há muito guardado no cofre
    [[work:agatha-christie/curtain-poirots-last-case|Cai o Pano]], deixando
    Poirot morrer em letra de forma meses antes de si;
    [[work:agatha-christie/sleeping-murder|Crime Adormecido]] segue-se logo
    após a sua morte, em janeiro de 1976.
