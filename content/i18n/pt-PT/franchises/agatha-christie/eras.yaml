- id: the-styles-years
  title: Os Anos de Styles
  description: 'De antiga enfermeira de farmácia hospitalar, desconhecida de todos, a nome conhecido em
    todas as casas. Poirot chega em [[work:agatha-christie/the-mysterious-affair-at-styles|O Misterioso
    Caso de Styles]], os Beresford em [[work:agatha-christie/the-secret-adversary|O Inimigo Secreto]],
    e [[work:agatha-christie/the-murder-of-roger-ackroyd|O Assassinato de Roger Ackroyd]] torna-a famosa
    e infame ao mesmo tempo. A década fecha com o colapso do primeiro casamento e o
    desaparecimento de onze dias, em 1926.

    '
  themes:
  - a invenção de Poirot
  - crime na casa de campo
  - aventura do pós-guerra
  - a construção de um nome
- id: the-golden-age
  title: A Idade de Ouro
  description: 'A década que a crítica coloca no centro daquilo a que chama a Idade de Ouro da ficção
    policial. Recém-casada com Max Mallowan e a passar os invernos em escavações no Médio Oriente, assina
    a série de livros mais citada sempre que o termo é usado - [[work:agatha-christie/murder-on-the-orient-express|Um
    Crime no Expresso do Oriente]], [[work:agatha-christie/the-abc-murders|Os Crimes do ABC]], [[work:agatha-christie/death-on-the-nile|Morte
    no Nilo]] e [[work:agatha-christie/and-then-there-were-none|As Dez Figuras Negras]] - enquanto [[work:agatha-christie/the-murder-at-the-vicarage|Crime
    no Vicariato]] apresenta Miss Marple, abre a sua longa carreira sob a chancela do Collins Crime Club,
    e o Detection Club (fundado em 1930) codifica as regras que ela tanto gostava de quebrar.

    '
  themes:
  - o enigma perfeito
  - cenários exóticos e arqueológicos
  - a chegada de Marple
  - enredo de jogo limpo
- id: the-war-vault-years
  title: A Guerra e o Cofre
  description: 'De volta à farmácia de um hospital durante a Blitz, Christie escreve muito e escreve sombrio:
    [[work:agatha-christie/five-little-pigs|Os Cinco Suspeitos]], o egípcio antigo [[work:agatha-christie/death-comes-as-the-end|A
    Morte Não é o Fim]], a aventura de espionagem [[work:agatha-christie/n-or-m|N or M?]]. Receando que
    as bombas a matassem, escreve os dois romances de despedida - [[work:agatha-christie/curtain-poirots-last-case|Cai
    o Pano]] e [[work:agatha-christie/sleeping-murder|Crime Adormecido]] - e tranca-os no cofre de um
    banco, para a filha e o marido.

    '
  themes:
  - a Inglaterra em guerra
  - veneno e a farmácia
  - experiência formal
  - livros escritos para o futuro
- id: the-postwar-plateau
  title: Os Anos de The Mousetrap
  description: 'A década abre com [[work:agatha-christie/a-murder-is-announced|Anúncio de um Crime]],
    publicado em junho de 1950 e vendido pela Collins como o seu quinquagésimo livro, e vira a 25 de novembro
    de 1952, quando a peça The Mousetrap estreia no Ambassadors Theatre para aquela que se torna a mais
    longa carreira ininterrupta da história do teatro. [[work:agatha-christie/crooked-house|A Casa Torta]]
    e [[work:agatha-christie/ordeal-by-innocence|Ordeal by Innocence]] estavam entre os seus favoritos.
    É já uma instituição, que publica um "Christie pelo Natal" com a pontualidade de um relógio.

    '
  themes:
  - o livro do jubileu
  - a Inglaterra das aldeias
  - o teatro
  - uma instituição em funcionamento
- id: the-late-period
  title: O Período Tardio
  description: 'O mundo moderno desassossega os livros tardios, e a crítica foi dura com os últimos deles
    - Robert Barnard disse de Postern of Fate que era "melhor (e facilmente) esquecido", e o Cambridge
    Guide to Women''s Writing in English fala dos "execráveis últimos romances" - e no entanto [[work:agatha-christie/endless-night|Noite
    Sem Fim]] prova que o antigo domínio continua intacto. Feita Dame em 1971, lança por fim, em 1975,
    o há muito guardado no cofre [[work:agatha-christie/curtain-poirots-last-case|Cai o Pano]], deixando
    Poirot morrer em letra de forma meses antes de si; [[work:agatha-christie/sleeping-murder|Crime Adormecido]]
    segue-se logo após a sua morte, em janeiro de 1976.

    '
  themes:
  - os anos sessenta irrompem
  - detetives a envelhecer
  - distinções
  - a abertura do cofre
