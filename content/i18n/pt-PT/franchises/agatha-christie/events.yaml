# Tradução pt-PT dos eventos específicos da ala: título e descrição.
# Os títulos de evento são prosa comum e traduzem-se; ids e `sources` não.

- id: golden-age-detective-fiction
  title: A Idade de Ouro da ficção policial
  description: >
    O apogeu, no período entre as duas guerras, do mistério-enigma de jogo
    limpo - o policial com pistas dadas ao leitor, resolúvel, com um círculo
    fechado de suspeitos - que Christie ao mesmo tempo personificou e superou
    em vendas. As convenções do género (a casa de campo, os suspeitos
    reunidos, a revelação final na sala de estar) são a água em que os seus
    livros nadam, e a fasquia pela qual cada intriga é medida.

- id: roger-ackroyd-breaks-the-rules
  title: A discussão em torno de Roger Ackroyd
  description: >
    [[work:agatha-christie/the-murder-of-roger-ackroyd|O Assassinato de Roger
    Ackroyd]] firma o nome de Christie e desencadeia a maior discussão da
    Idade de Ouro: críticos e outros romancistas discutem publicamente aquilo
    que um policial de jogo limpo pode permitir-se fazer. A discussão dura
    mais do que o livro e prolonga-se nos códigos que o género pouco depois
    escreve para si mesmo, entre eles o juramento do Detection Club. É o
    momento em que a ficção policial começa a examinar em público as suas
    próprias regras.

- id: detection-club-founded-1930
  title: A fundação do Detection Club
  description: >
    Christie é membro fundadora da sociedade de jantares dos autores
    britânicos de mistério (com Sayers, Chesterton e outros), cujo juramento
    meio a sério obrigava os membros ao jogo limpo na construção da intriga:
    nada de pistas escondidas ao leitor, nada de intervenções divinas. Viria
    a ser sua presidente. As regras do clube são o código que os seus melhores
    enigmas cumprem.

- id: vault-novels-sealed-1940s
  title: Cai o Pano e Crime Adormecido selados no cofre
  description: >
    Contando com a hipótese de a Blitz a matar, Christie escreve dois casos
    finais - [[work:agatha-christie/curtain-poirots-last-case|Cai o Pano]]
    para Poirot e [[work:agatha-christie/sleeping-murder|Crime Adormecido]]
    para Miss Marple - e deposita-os no cofre de um banco por escritura de
    doação, como herança para a filha e o marido. Ficam selados mais de trinta
    anos e só são publicados no termo da sua vida.

- id: mousetrap-opens-1952
  title: The Mousetrap estreia no West End
  description: >
    A peça de Christie, nascida de um conto escrito para a rainha Maria,
    estreia em Londres e simplesmente nunca fecha, tornando-se a produção
    teatral há mais tempo em cena ininterrupta no mundo e uma instituição
    cultural por direito próprio, célebre pelo juramento do público de nunca
    revelar o final.
