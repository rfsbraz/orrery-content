# Portuguese (pt-PT) overlay for the Terry Pratchett eras.
# Book titles inside the prose use the published Portuguese edition where one
# exists (see editions.yaml); the rest stay in English, as no Portuguese
# edition was ever published. None of the three pre-Discworld novels has a
# Portuguese edition, so all three keep their English titles below.

- id: before-the-discworld
  title: Antes do Mundo Disco
  description: >
    Os três romances publicados antes de a série começar, escritos em volta do
    emprego diário de jornalista: [[work:discworld/the-carpet-people|The Carpet
    People]], começado quando Pratchett tinha 17 anos e publicado por Colin
    Smythe em 1971, e os dois romances de ficção científica
    [[work:discworld/the-dark-side-of-the-sun|The Dark Side of the Sun]] e
    [[work:discworld/strata|Strata]]. Dois dos três já giram em torno de um
    mundo plano, e Strata é geralmente lido como o protótipo do Disco.

- id: the-parody-years
  title: Os Anos de Paródia
  description: >
    O Disco como máquina de parodiar a fantasia de espada e feitiçaria.
    [[work:discworld/the-colour-of-magic|A Cor da Magia]] e
    [[work:discworld/the-light-fantastic|A Luz Fantástica]] gozam com o género
    por inteiro, mas o mundo depressa começa a contar mais do que as piadas:
    [[work:discworld/mort|Mort]], [[work:discworld/wyrd-sisters|As Três Bruxas]]
    e [[work:discworld/guards-guards|Guards! Guards!]] fundam os fios narrativos
    (a Morte, as Bruxas, a Guarda) que sustentam o resto da série. O Disco não
    tem a década só para si: os mesmos anos trazem
    [[work:discworld/the-unadulterated-cat|The Unadulterated Cat]], a trilogia
    Bromeliad para crianças, que começa em
    [[work:discworld/truckers|Truckers]], e
    [[work:discworld/good-omens|Good Omens]], com
    [[author:neil-gaiman|Neil Gaiman]].

- id: the-golden-middle
  title: Os Anos de Sátira
  description: >
    O trecho em que a paródia foi quase inteiramente posta de lado e o Disco se
    tornou uma máquina de sátira.
    [[work:discworld/small-gods|Small Gods]] vira o motor cómico para a fé e a
    crueldade, e os romances de cada fio ganham profundidade, tornando-se sátira
    séria em roupagem cómica: a Guarda sob o comando de Vimes (de
    [[work:discworld/men-at-arms|Men at Arms]] a
    [[work:discworld/night-watch|Night Watch]] e
    [[work:discworld/thud|Thud!]]), as Bruxas, a Morte e os novos fios de Moist
    von Lipwig e de Tiffany Aching. A comédia passou a ser uma forma de escrever
    sobre o modo como as sociedades funcionam de facto. Fora do Disco, os livros
    de Johnny Maxwell (de
    [[work:discworld/only-you-can-save-mankind|Only You Can Save Mankind]] a
    [[work:discworld/johnny-and-the-bomb|Johnny and the Bomb]]) fazem o mesmo
    trabalho para leitores mais novos.

# "Embuggerance" is Pratchett's own coinage and the word he used for the
# diagnosis itself; there is no Portuguese equivalent that would not be an
# invention. So the coinage is kept and quoted, exactly as the author-bio
# overlay does ("an embuggerance"), and only the frame around it is Portuguese.
# The Nation quotation is kept in English for the same reason: it is his
# sentence, from the 2009 Boston Globe-Horn Book award speech.
- id: the-embuggerance
  title: A "Embuggerance"
  description: >
    Escritos depois do diagnóstico de Alzheimer que Pratchett anunciou a 11 de
    dezembro de 2007 e a que ele próprio deu nome: "now The Embuggerance is
    finally catching up with me, along with other age-related ailments". Os
    últimos, por ditado.
    Os romances tardios, [[work:discworld/unseen-academicals|Unseen Academicals]],
    [[work:discworld/snuff|Snuff]], [[work:discworld/raising-steam|Raising Steam]]
    e o póstumo [[work:discworld/the-shepherds-crown|The Shepherd's Crown]], são
    mais urgentes e mais abertamente morais, insistindo em quem conta como pessoa
    (goblins, golems, os excluídos) e nos finais. Há leitores que acham a prosa
    menos cerrada do que a dos livros anteriores; a maioria acha que o coração
    continua intacto. O período não é só Mundo Disco nem é lento:
    [[work:discworld/nation|Nation]] (2008), de que ele disse "I believe that
    Nation is the best book I have ever written or will write",
    [[work:discworld/dodger|Dodger]] (2012) e a sequência do Long Earth escrita
    com [[author:stephen-baxter|Stephen Baxter]] pertencem-lhe todos.
