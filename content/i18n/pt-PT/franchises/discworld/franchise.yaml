# Portuguese (pt-PT) overlay for the Discworld franchise.
# Only translatable prose - id, slugs and sources stay in the base file, and the
# startHere paths carry no structure (no workIds, orderId or fit).
# Book titles use the published Portuguese edition where one exists (see
# editions.yaml); the rest stay in English, as no Portuguese edition exists.

- id: discworld
  description: >
    O mundo plano de Terry Pratchett, assente no dorso de quatro elefantes sobre
    uma tartaruga gigante: 41 romances que crescem da paródia de fantasia até
    darem uma das sátiras cómicas mais afiadas escritas em inglês, entrelaçados
    em subséries soltas em que se pode entrar por quase qualquer ponto.
  startHere:
    paths:
      - id: three-ways-in
        title: Os três primeiros livros do costume
        description: >
          Os livros que mais vezes se põem nas mãos de um leitor novo: Mort (a
          Morte arranja um aprendiz), Guards! Guards! (o nascimento da Guarda) e
          Small Gods (a obra autónoma que muitos consideram a melhor de todas).
          Qualquer um deles é um bom teste para perceber se o Disco é para si.
        note: >
          Deliberadamente, não A Cor da Magia. Os dois primeiros livros de
          Rincewind são paródia larga e o pior sítio para começar; tanto o mundo
          como a sátira só ganham gume alguns livros mais à frente.

      - id: straight-into-the-watch
        title: Diretamente para a Guarda da Cidade
        description: >
          O fio mais estimado: Sam Vimes e a Guarda de Ankh-Morpork, de um
          bêbado caído na sarjeta à consciência de uma cidade. Oito livros que se
          leem como um único arco sobre a lei, o poder e a decência.

      - id: the-witches
        title: As Bruxas
        description: >
          A Granny Weatherwax, a Nanny Ogg e a Magrat: cabeçologia, Shakespeare
          emprestado e a tirania das histórias. Um percurso autónomo que alimenta
          também os livros de Tiffany Aching.

      - id: start-young
        title: Começar novo, com Tiffany Aching
        description: >
          Os cinco livros de Tiffany Aching são escritos para leitores mais
          novos, mas atingem os adultos com a mesma força: uma rapariga das
          terras de giz a tornar-se bruxa. Uma entrada limpa e moderna, que não
          exige nenhuma leitura anterior.
        note: >
          A melhor rampa de acesso para leitores mais novos, e para adultos que
          queiram um arco completo e terminado, contado por uma única voz forte.

      - id: the-whole-disc
        title: O Disco inteiro, pela ordem
        description: >
          Os 41 romances por ordem de publicação. Vê-se a paródia a crescer até
          à sátira e o mundo a coser-se a si próprio: a camada de aura foi feita
          exatamente para este percurso.
        note: >
          A ordem de publicação implica abrir com os dois livros mais fracos; os
          completistas que entram avisados são recompensados quando o Disco se
          encontra a si próprio, por alturas de As Três Bruxas e de
          Guards! Guards!.
