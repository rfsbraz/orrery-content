# Portuguese (pt-PT) overlay for the Discworld franchise events.

- id: discworld-begins-1983
  title: O Disco é lançado
  description: >
    [[work:discworld/the-colour-of-magic|A Cor da Magia]] apresenta o mundo plano
    assente em quatro elefantes sobre a tartaruga estelar Great A'Tuin. O que
    começa como paródia de fantasia torna-se um projeto de 41 romances ao longo
    de três décadas e uma das séries mais vendidas da edição britânica.

- id: discworld-dictation-shift
  title: Os últimos romances são escritos por ditado
  description: >
    À medida que o Alzheimer foi tornando impossível escrever à máquina,
    Pratchett passou a compor os últimos livros por ditado, para software de
    reconhecimento de voz e para o seu assistente Rob Wilkins, com ajuda crescente
    da filha, Rhianna. Sensivelmente a partir de
    [[work:discworld/unseen-academicals|Unseen Academicals]], a prosa é falada e
    não escrita, o que se nota no ritmo e na urgência do Discworld tardio.

- id: shepherds-crown-posthumous-2015
  title: O último romance do Discworld é publicado postumamente
  description: >
    [[work:discworld/the-shepherds-crown|The Shepherd's Crown]] saiu cinco meses
    depois da morte de Pratchett, praticamente completo mas sem o polimento
    habitual, ele que era conhecido por reescrever até ao último momento. Rhianna
    Pratchett e Rob Wilkins prepararam-no para publicação tal como ele o deixou.

- id: rhianna-pratchett-stewardship-2015
  title: "Rhianna Pratchett assume a guarda do espólio: o Disco fecha"
  description: >
    Como executora e guardiã do espólio, Rhianna Pratchett confirmou que
    [[work:discworld/the-shepherds-crown|The Shepherd's Crown]] seria o último
    romance do Discworld e que nenhum livro novo do Discworld seria escrito por
    outras mãos. A série está fechada por decisão própria; as adaptações
    continuam, os romances não.

# "GNU Terry Pratchett" is a literal HTTP header value, not prose - it is the
# same string in every language, so the title is left in the base language.
- id: gnu-terry-pratchett-2015
  description: >
    Os fãs inscreveram o nome de Pratchett na própria infraestrutura da web,
    acrescentando o cabeçalho HTTP "X-Clacks-Overhead: GNU Terry Pratchett" para
    que o nome continue a viajar no tráfego da rede. É um eco de
    [[work:discworld/going-postal|Going Postal]], onde um operador dos clacks
    mantém o nome de um morto a circular pelas torres para que, na expressão do
    Disco, um homem não esteja verdadeiramente morto enquanto o seu nome continuar
    a ser dito.
