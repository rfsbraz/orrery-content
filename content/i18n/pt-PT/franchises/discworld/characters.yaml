# Portuguese (pt-PT) overlay for the Discworld recurring characters.
# Only `description` is translated: `name` and `aka` are proper nouns and the
# per-appearance notes stay in the base language. Terminology follows the rest
# of the overlay (a Morte, o Patrício, a Guarda, cabeçologia, Universidade
# Invisível).

- id: discworld/death
  description: >
    A Morte do Disco: um esqueleto de mais de dois metros, de túnica negra, que
    fala EM VERSALETES, tem gatos e passa a eternidade a tentar, com ternura,
    compreender os humanos que recolhe. Aparece em quase todos os romances do
    Discworld e conduz um fio próprio, a figura que liga a série inteira.

- id: discworld/lord-vetinari
  description: >
    O Patrício de Ankh-Morpork: um antigo Assassino que governa a grande cidade
    por a compreender melhor do que ela se compreende a si própria. Manda no
    palco central do Disco, e por isso atravessa a Guarda, os livros de Moist
    von Lipwig e os volumes autónomos.

- id: discworld/granny-weatherwax
  description: >
    A bruxa mais temível do Disco, toda ela cabeçologia, vontade de ferro e
    recusa do caminho fácil. Sustenta o fio das Bruxas e avança até aos livros
    de Tiffany Aching como a bitola pela qual se mede a geração seguinte.

- id: discworld/sam-vimes
  description: >
    De bêbado caído na sarjeta a Comandante da Guarda e Duque contrariado, é a
    consciência mais raivosa e mais teimosa do Disco, a policiar a fronteira
    entre a ordem e a escuridão que traz dentro de si. A espinha dorsal do fio
    da Guarda da Cidade.

- id: discworld/rincewind
  description: >
    Um feiticeiro falhado que sabe exatamente um feitiço e uma estratégia de
    sobrevivência: fugir, depressa. O primeiro protagonista do Disco e o seu
    aventureiro mais relutante, a atravessar os primeiros romances de paródia.

- id: discworld/the-librarian
  description: >
    O bibliotecário da Universidade Invisível, transformado em orangotango por
    um acidente mágico e perfeitamente feliz por assim continuar; não lhe chame
    macaco. Guardião dos livros mais perigosos do Disco e uma presença
    recorrente muito acarinhada.
