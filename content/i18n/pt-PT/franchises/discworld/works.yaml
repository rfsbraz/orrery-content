# Portuguese (pt-PT) overlay for the Discworld bibliography: synopses only.
# Work titles are never translated here - a Portuguese title is edition data and
# only eight of these books were ever published in Portugal (see editions.yaml).

# --- Rincewind ---
- id: discworld/the-colour-of-magic
  synopsis: "O inepto feiticeiro Rincewind guia o primeiro turista do Disco por um mundo que parodia todos os lugares-comuns da fantasia."

- id: discworld/the-light-fantastic
  synopsis: "Uma estrela vermelha avança sobre o Disco, e a sua sobrevivência depende de um feitiço alojado na cabeça de Rincewind."

- id: discworld/sourcery
  synopsis: "O oitavo filho de um oitavo filho de um feiticeiro ameaça trazer de volta a magia em bruto, capaz de acabar com o mundo; e Rincewind, por uma vez, corre na direção dos sarilhos."

- id: discworld/eric
  synopsis: "Um demonólogo adolescente invoca Rincewind em vez de um demónio e recebe três desejos que correm todos terrivelmente bem. Originalmente uma novela ilustrada."

- id: discworld/interesting-times
  synopsis: "Rincewind é atirado para o Continente Contrapeso, onde uma revolução e o já envelhecido Cohen, o Bárbaro, se atravessam na disputa de um império."

- id: discworld/the-last-continent
  synopsis: "Rincewind fica preso num continente escaldado pelo sol que não é de todo a Austrália, enquanto os feiticeiros da Universidade Invisível se perdem no tempo."

- id: discworld/the-last-hero
  synopsis: "Cohen, o Bárbaro, decide devolver o fogo aos deuses com juros; uma novela luxuosamente ilustrada que atravessa a Guarda, os feiticeiros e os deuses."

# --- Witches ---
- id: discworld/equal-rites
  synopsis: "O cajado de um feiticeiro moribundo passa para as mãos de uma rapariga, e a Granny Weatherwax tem de a fazer entrar numa universidade que nunca admitiu uma mulher."

- id: discworld/wyrd-sisters
  synopsis: "Três bruxas metem-se no destino do reino de um rei assassinado, numa comédia movida a Macbeth e a Hamlet."

- id: discworld/witches-abroad
  synopsis: "Três bruxas de Lancre viajam até uma cidade distante para impedir uma rapariga de casar com um príncipe, apontando as baterias à tirania das histórias."

- id: discworld/lords-and-ladies
  synopsis: "As bruxas de Lancre enfrentam os Elfos, belos, deslumbrantes e absolutamente sem piedade, quando um casamento de solstício abre a porta entre os mundos."

- id: discworld/maskerade
  synopsis: "A Granny e a Nanny seguem uma jovem bruxa até à Ópera de Ankh-Morpork, onde um assassino mascarado assombra os bastidores."

- id: discworld/carpe-jugulum
  synopsis: "Vampiros modernos e racionais convidam-se a si próprios para Lancre, e uma crise de fé empurra a Granny Weatherwax até ao limite."

# --- Death ---
- id: discworld/mort
  synopsis: "A Morte arranja um aprendiz, um rapaz desajeitado chamado Mort, que deixa o coração interferir com o dever da foice."

- id: discworld/reaper-man
  synopsis: "Tornada mortal e com um tempo de vida contado, a Morte aprende a viver como trabalhador rural enquanto o excedente de força vital corre à solta no mundo que deixou."

- id: discworld/soul-music
  synopsis: "Um novo tipo de música com pedras dentro toma conta de Ankh-Morpork enquanto a Morte, vergada pelo desgosto, tenta esquecer, e a sua neta Susan herda o negócio de família."

- id: discworld/hogfather
  synopsis: "Quando o Pai Natal do Disco se torna alvo de um assassinato, a Morte assume o trenó e a Susan tem de perceber porque é que a própria crença está sob ataque."

- id: discworld/thief-of-time
  synopsis: "Um relógio perfeito ameaça parar o tempo para sempre; a Susan, um Monge da História e a busca da Morte pelo quinto cavaleiro correm para o impedir."

# --- City Watch ---
- id: discworld/guards-guards
  synopsis: "Um capitão bêbado, um recruta criado por anões e um dragão invocado devolvem sentido à arruinada Guarda Noturna: o nascimento da Guarda tal como a conhecemos."

- id: discworld/men-at-arms
  synopsis: "A Guarda diversifica-se, com um troll, um anão e um lobisomem, enquanto uma arma de fogo roubada e uma conspiração para restaurar a monarquia põem à prova o Capitão Vimes na véspera da reforma."

- id: discworld/feet-of-clay
  synopsis: "Um envenenamento que a Guarda não consegue explicar e uma série de mortes de golems levantam a questão de quem é dono de uma vida que foi feita e não nascida."

- id: discworld/jingo
  synopsis: "Uma ilha disputada emerge entre Ankh-Morpork e Klatch e começam a soar os tambores de guerra; Vimes tenta prender dois exércitos por perturbação da ordem pública."

- id: discworld/the-fifth-elephant
  synopsis: "Vimes é enviado como diplomata ao país dos anões por causa de uma pedra de coroação roubada, enredando Ankh-Morpork na política dos anões, dos lobisomens e dos vampiros."

- id: discworld/night-watch
  synopsis: "Atirado para o passado na perseguição de um assassino, o Comandante Vimes tem de se tornar o mentor de que o seu próprio eu mais novo precisa, no meio de uma revolução condenada cujo fim já conhece."

- id: discworld/thud
  synopsis: "Uma velha batalha entre anões e trolls ameaça reacender-se na cidade, e Vimes tem de resolver um homicídio e chegar a casa, custe o que custar, para ler uma história ao filho."

- id: discworld/snuff
  synopsis: "De férias no campo, Vimes descobre o assassínio e a escravização sistemáticos dos goblins, e decide que a lei se estende até a quem ninguém considera gente."

# --- Industrial Revolution (Moist von Lipwig) ---
- id: discworld/going-postal
  synopsis: "Um vigarista condenado à morte recebe uma escolha: dirigir os Correios em ruínas de Ankh-Morpork ou morrer. Ressuscita o correio para enfrentar o monopólio corrupto dos clacks."

- id: discworld/making-money
  synopsis: "Moist von Lipwig é recrutado à força para dirigir o Banco Real e a Casa da Moeda, e inventa o papel-moeda para uma cidade que não confia em ninguém, muito menos nele."

- id: discworld/raising-steam
  synopsis: "O caminho de ferro chega ao Disco, e Moist tem de o levar por diante enquanto extremistas anões tentam descarrilar a própria modernidade."

# --- Tiffany Aching ---
- id: discworld/the-wee-free-men
  synopsis: "Uma rapariga de nove anos das terras de giz, armada de uma frigideira e dos minúsculos e azuis Nac Mac Feegle, atravessa para o País das Fadas para ir buscar o irmão."

- id: discworld/a-hat-full-of-sky
  synopsis: "Enviada para longe para aprender a ser bruxa, a Tiffany é perseguida por um enxameante sem corpo que lhe quer a mente, e a Granny Weatherwax observa para ver de que massa ela é feita."

- id: discworld/wintersmith
  synopsis: "A Tiffany entra numa dança em que não devia ter tocado e dá nas vistas ao Wintersmith, o elemental do inverno, que decide que ela lhe pertence."

- id: discworld/i-shall-wear-midnight
  synopsis: "Já bruxa de serviço nas terras de giz, a Tiffany enfrenta um espírito antigo de ódio às bruxas que renasce no medo e na desconfiança das pessoas comuns."

- id: discworld/the-shepherds-crown
  synopsis: "Uma morte deixa fina a fronteira entre os mundos, e os Elfos pressionam para voltar; a Tiffany tem de segurar as terras de giz e decidir que espécie de bruxa quer ser. O último romance de Pratchett, publicado postumamente."

# --- Standalones ---
- id: discworld/pyramids
  synopsis: "Um assassino profissional herda o trono de um pequeno e antiquíssimo reino ribeirinho preso às suas próprias tradições, onde construir a maior pirâmide de sempre dobra o tempo sobre si mesmo."

- id: discworld/moving-pictures
  synopsis: "Os alquimistas descobrem as imagens em movimento e nasce uma Hollywood em Holy Wood, enquanto algo por detrás do ecrã tenta sair. Apresenta o Arquichanceler Ridcully."

- id: discworld/small-gods
  synopsis: "O Grande Deus Om vê-se encarnado numa tartaruga zarolha com um único crente verdadeiro, um noviço lento chamado Brutha, numa teocracia que se esqueceu dele. Muitas vezes apontado como o melhor ponto de entrada."

- id: discworld/the-truth
  synopsis: "A imprensa de tipos móveis chega a Ankh-Morpork e William de Worde dá por si a dirigir o primeiro jornal do Disco, e no meio de uma conspiração contra o Patrício."

- id: discworld/the-amazing-maurice-and-his-educated-rodents
  synopsis: "Um gato falante e matreiro monta um esquema à Flautista de Hamelin com uma tribo de ratos conscientes de si próprios, até chegarem a uma cidade onde a história se torna real. O primeiro romance do Discworld escrito para leitores mais novos; venceu a Carnegie Medal."

- id: discworld/monstrous-regiment
  synopsis: "Uma rapariga disfarça-se de rapaz para encontrar o irmão e alista-se num regimento de último recurso, ao serviço de uma nação minguante e dominada por deuses em guerra. E não é a única a esconder-se."

- id: discworld/unseen-academicals
  synopsis: "Os feiticeiros da Universidade Invisível são obrigados a formar uma equipa de futebol, e lá em baixo, nas cozinhas, um pingador de velas, uma cozinheira da noite e uma misteriosa figura pálida encontram o seu momento. Mais um livro do conjunto dos feiticeiros do que um livro de Rincewind."

# --- Extended: the Science of Discworld ---
- id: discworld/the-science-of-discworld
  synopsis: "Os feiticeiros criam sem querer um universo sem causalidade narrativa, o nosso, num livro que alterna uma história do Discworld com verdadeiros ensaios de divulgação científica."

- id: discworld/the-science-of-discworld-ii-the-globe
  synopsis: "Os feiticeiros intrometem-se na história dos humanos do Mundo Redondo, servindo de moldura a ensaios sobre a narrativa, a evolução e o que nos torna humanos."

- id: discworld/the-science-of-discworld-iii-darwins-watch
  synopsis: "Os feiticeiros têm de emendar uma história em que Darwin escreveu o livro errado, em torno de ensaios sobre evolução, contingência e ciência."

- id: discworld/the-science-of-discworld-iv-judgement-day
  synopsis: "Um processo em tribunal sobre quem é dono do Mundo Redondo serve de moldura a ensaios sobre crença, ciência e cosmologia; a última das quatro colaborações."

# --- Apocrypha: maps and companions ---
- id: discworld/the-streets-of-ankh-morpork
  synopsis: "O primeiro 'Mapp' do Discworld: um mapa completo das ruas da grande cidade, o momento em que a geografia de Ankh-Morpork passou a ser cânone fixo."

- id: discworld/the-discworld-companion
  synopsis: "Um guia de A a Z das gentes, dos lugares e da tradição do Disco; ampliado em edições posteriores à medida que a série foi crescendo."

- id: discworld/the-discworld-mapp
  synopsis: "Um mapa do Disco inteiro, tão fidedigno quanto pode ser o mapa de um mundo feito sobretudo de narrativa."
