- id: valter-hugo-mae/serei-sempre-o-teu-abrigo
  synopsis: >
    Avós vistos pelos olhos do neto: um avô que vê o mundo em poucas cores,
    como se vivesse sempre de noite, e uma avó com um pacemaker junto ao
    coração, que fez do amor uma prática lúcida e diária. Ilustrado pelo
    autor, dando continuidade ao projeto gráfico de As Mais Belas Coisas do
    Mundo e O Paraíso São os Outros.

- id: valter-hugo-mae/a-minha-mae-e-a-minha-filha
  synopsis: >
    Um conto de uma ternura singular para quem quer que cuide de alguém: o
    autor sobre a gratidão e a importância do afeto que partilha com a
    própria mãe, e o momento em que os filhos se tornam pais dos seus pais.
    Começou como uma crónica antes de ser adaptado a este livro ilustrado,
    com ilustrações de Evelina Oliveira.

# --- Apocrypha: contribuições para obras multiautorais ---

- id: valter-hugo-mae/contos-policiais
  synopsis: >
    Uma antologia temática com nove escritores portugueses, cada um a
    contribuir com um conto policial original, organizada por Pedro
    Sena-Lino. O contributo de Mãe, "O Criminoso Portuguesinho", é uma
    abordagem cómica ao conto policial, com quase trinta páginas, apontada
    por pelo menos um crítico como o enredo mais bem construído da
    coletânea.

