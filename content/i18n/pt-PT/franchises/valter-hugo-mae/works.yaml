# Tradução pt-PT das sinopses. Os títulos das obras NUNCA se traduzem aqui: um
# título traduzido é dado de edição (editions.yaml). Como Mãe escreve em
# português, o título original em works.yaml já é a forma publicada, pelo que
# não há, em nenhuma obra desta franquia, um título diferente a registar aqui.

# --- A Tetralogia das Minúsculas (2004-2010) ---

- id: valter-hugo-mae/o-nosso-reino
  synopsis: >
    O romance de estreia de Mãe: Benjamim, um menino de oito anos, cresce
    numa pobre aldeia piscatória portuguesa nos últimos anos do Estado Novo,
    em busca de alguma forma de transcendência ao tentar viver o que imagina
    ser a vida de um santo, sob o peso da igreja e de um mundo repressivo.
    Uma personagem secundária é inspirada no músico Antony (Antony and the
    Johnsons).

- id: valter-hugo-mae/o-remorso-de-baltazar-serapiao
  synopsis: >
    Num Portugal medieval brutal e sufocado pela superstição, Baltazar casa
    com a mulher mais bela da sua terra e, seguindo o exemplo do próprio pai,
    propõe-se "civilizá-la" exatamente como o pai um dia amansou uma vaca
    chamada Sarga. As intenções de um senhor local sobre a jovem esposa
    empurram Baltazar para a bruxaria, a possessão e o remorso. Tem prefácio
    de José Saramago.

- id: valter-hugo-mae/o-apocalipse-dos-trabalhadores
  synopsis: >
    Em Bragança, duas mulheres da limpeza e carpideiras a tempo parcial,
    Maria da Graça e Quitéria, cansadas dos homens e das desilusões,
    apaixonam-se ambas inesperadamente - Maria da Graça pelo seu patrão,
    Quitéria por um jovem imigrante ucraniano - enquanto o trabalho noturno
    de velar os mortos de estranhos dá ao livro o seu argumento: uma
    capacidade improvável, pouco digna e persistente para a felicidade, em
    gente que trabalha à beira da dignidade. Descrito pela crítica como o
    romance mais divertido de Mãe.

- id: valter-hugo-mae/a-maquina-de-fazer-espanhois
  synopsis: >
    António Silva, um homem idoso, entra num lar de idosos depois da morte
    da mulher e encontra lá dentro uma pequena comunidade turbulenta de
    velhos e esquecidos. Publicado pela primeira vez em Portugal pela
    Alfaguara em 2010, no Brasil pela Cosac Naify em 2011.

# --- Romances posteriores (2011-2026) ---

- id: valter-hugo-mae/o-filho-de-mil-homens
  synopsis: >
    Crisóstomo, um pescador solitário a chegar aos quarenta anos, propõe-se
    construir a família que nunca teve - inventando-a, como se o amor fosse,
    acima de tudo, o desejo de amar, e reunindo à sua volta um pequeno
    elenco de outros igualmente à deriva.

- id: valter-hugo-mae/a-desumanizacao
  synopsis: >
    Passa-se nos fiordes remotos da Islândia: Halla, uma menina, conta o que
    resta depois da perda da irmã gémea, Sigridur. Um livro de grande
    delicadeza em que a disciplina da tristeza não impede uma certa
    redenção, nem o assombro permanente da beleza.

- id: valter-hugo-mae/homens-imprudentemente-poeticos
  synopsis: >
    Num Japão antigo, ao pé do Monte Fuji, o fabricante de leques Itaro e o
    oleiro Saburo vivem como vizinhos em guerra: uma inimizade que avança e
    recua, mudando o que cada homem valoriza e o que lhe custa manter-se
    bom. Contra a miséria comum e o destino, a rixa é coisa pequena, e o que
    o livro pesa é antes o bom senso, e os modos incondicionais como dois
    homens tão diferentes amam as suas mulheres.

- id: valter-hugo-mae/as-doencas-do-brasil
  synopsis: >
    Passa-se entre os Abaeté, um povo indígena fictício, durante o período
    colonial, enquanto colonos portugueses avançam para lhes tomar a terra e
    subjugar os corpos. Publicado com ilustrações de Denilson Baniwa e
    prefácio de Conceição Evaristo.

- id: valter-hugo-mae/deus-na-escuridao
  synopsis: >
    Passa-se na ilha da Madeira entre 1981 e 2001, visto pelos olhos de uma
    criança de dez anos: dois irmãos, Felicíssimo e Pouquinho, que crescem
    em circunstâncias peculiares e cujas vidas se entrelaçam num laço
    igualmente peculiar e muito próximo, e a pequena comunidade, presa às
    suas próprias regras, que se fecha à volta deles. Um romance sobre o
    amor como algo sempre exercido no escuro, e sobre a necessidade de
    cuidar de alguém.

- id: valter-hugo-mae/o-seculo-dos-imbecis
  synopsis: >
    Uma aldeia de montanha inventada, uma casa chamada Malandrinha, e
    Agilulfo, o excêntrico Marquês de Malandrinha, cujo espírito acompanha a
    altitude: quanto mais perto do nível do mar, mais tolo se torna, quanto
    mais alto sobe, mais lúcido fica, e a tentação da aldeia para o trazer
    para baixo é mais forte do que a vontade de o ver subir. Uma fábula
    sobre um século de informação que resiste ao conhecimento, e sobre a
    ignorância a perder o pudor.

# --- Prosa autobiográfica / ensaística ---

- id: valter-hugo-mae/contra-mim
  synopsis: >
    Um autorretrato construído a partir de cerca de quinze anos de notas
    fragmentárias sobre a sua própria infância e adolescência - relatos
    breves e de coração aberto sobre os lugares e as pessoas que o
    formaram.

- id: valter-hugo-mae/educacao-da-tristeza
  synopsis: >
    Vinte e sete textos breves e ilustrados, escritos depois de duas perdas
    - um sobrinho ainda jovem, a mesma criança que inspirou
    [[work:valter-hugo-mae/o-filho-de-mil-homens|O Filho de Mil Homens]], e
    uma amiga de trinta anos, artista plástica. Trata o luto não como uma
    doença a curar, mas como uma gramática a aprender: uma "tristeza
    educada" que não desaparece, mas abre espaço à alegria de recordar.

# --- Contos ---

- id: valter-hugo-mae/contos-de-caes-e-maus-lobos
  synopsis: >
    Onze contos para todas as idades, cada um ilustrado por um artista
    diferente (entre eles Graça Morais e José Rodrigues), com prefácio de
    Mia Couto. Cães e lobos representam a ansiedade de estar vivo e o lento
    trabalho de aprender a amar.

