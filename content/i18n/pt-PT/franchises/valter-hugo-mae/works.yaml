- id: valter-hugo-mae/quatro-tesouros
  synopsis: >
    Uma história simples sobre a força do amor materno e o poder da
    fantasia. Ilustrado por Patrícia Furtado; publicado pela Objectiva
    (Lisboa), com as receitas doadas à ala de pediatria do Hospital de S.
