# Português europeu (pt-PT) - sobreposição de prosa curada.
# Traduz-se apenas prosa. Nunca ids, slugs, nomes de autor, títulos de obra
# (já são portugueses) nem URLs de fontes.
#
# As listas encaixadas fundem-se item a item pelo id (ver SCHEMA.md, "Nested
# lists merge by id"), pelo que os percursos de startHere trazem apenas o id
# e a prosa, nunca a estrutura (workIds, orderId, fit).

- id: valter-hugo-mae
  description: >
    Um poeta que se tornou um dos romancistas portugueses vivos mais
    aclamados: quatro livros iniciais escritos inteiramente sem
    maiúsculas, um Prémio José Saramago logo no segundo deles, e duas
    décadas de ficção fabular que entretanto viajou do Portugal medieval
    até ao Japão, à Islândia, à Madeira e ao Brasil colonial.
  startHere:
    paths:
      - id: the-unlikely-door
        title: A porta improvável
        description: >
          O Filho de Mil Homens, publicado logo a seguir ao percurso de
          quatro livros que lhe deu o nome, ultrapassa-o por completo: um
          pescador solitário, já com mais de quarenta anos, a inventar a
          família que nunca teve, mais suave e mais acessível do que a
          experiência tipográfica que o rodeia. O próprio guia de leitura da
          Wook indica-o como o livro por onde os seus autores realmente
          começaram. O custo: fica por ler a tetralogia em minúsculas e o
          Prémio José Saramago que o tornaram um nome nas letras
          portuguesas, o que a maior parte da crítica procura primeiro.
      - id: gentler-initiation
        title: Uma iniciação mais suave
        description: >
          Onze contos curtos, cada um ilustrado por um artista diferente e
          com prefácio de Mia Couto - cães e lobos como metáfora do amor, da
          perda e do lento trabalho de aprender a cuidar, em doses menores
          do que um romance. O mesmo guia de leitura que recomenda O Filho
          de Mil Homens chama a esta coletânea uma excelente forma de
          descobrir a sua prosa pela primeira vez. O custo: é uma amostra de
          tema e de voz, não a experiência de leitura enredada e em livro
          inteiro pela qual os prémios foram ganhos.
      - id: the-tetralogy-that-made-him
        title: A tetralogia que lhe deu o nome
        description: >
          Quatro romances publicados sem uma única maiúscula, entre 2004 e
          2010: uma aldeia piscatória sob o Estado Novo, um casamento
          medieval a azedar em bruxaria, duas carpideiras em Bragança, um
          lar de idosos no fim de uma vida. O próprio Mãe chama a este
          percurso "A Idade Inteira", e o seu segundo volume valeu-lhe o
          Prémio José Saramago. Leia-os por ordem, porque a ordem é
          simplesmente a forma como foram escritos.
        note: >
          Nenhum dos quatro é uma leitura suave; quem receie essa exigência
          deve experimentar primeiro uma das duas entradas acima.
      - id: everything
        title: Tudo, por ordem
        description: >
          Todos os romances, livros de poesia, livros infantis e as duas
          obras de prosa autobiográfica, por ordem estrita de publicação
          desde 1996: um poeta com nove livros em verso torna-se, em 2004,
          o romancista que a crítica conhece, e cada livro posterior ocupa
          o seu lugar nessa mesma linha do tempo.
