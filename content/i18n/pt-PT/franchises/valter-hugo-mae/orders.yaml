# Português europeu (pt-PT) - ordens de leitura curadas.
# Mãe é um autor português: os dois nomes das tetralogias já estão na sua
# forma final em português, tal como o próprio autor os cunhou, pelo que são
# repetidos aqui sem alteração em vez de ficarem por preencher. A lista
# orderedWorkIds é dado funcional e não se repete aqui.

- id: valter-hugo-mae/tetralogia-das-minusculas
  name: A Idade Inteira
  rationale: >
    Os quatro romances que consagraram Mãe, publicados inteiramente sem
    maiúsculas: [[work:valter-hugo-mae/o-nosso-reino|o nosso reino]] (2004),
    [[work:valter-hugo-mae/o-remorso-de-baltazar-serapiao|o remorso de
    baltazar serapião]] (2006, Prémio José Saramago),
    [[work:valter-hugo-mae/o-apocalipse-dos-trabalhadores|o apocalipse dos
    trabalhadores]] (2008) e
    [[work:valter-hugo-mae/a-maquina-de-fazer-espanhois|a máquina de fazer
    espanhóis]] (2010, Grande Prémio Portugal Telecom). O próprio Mãe chama
    a este percurso "A Idade Inteira"; a crítica e as obras de referência
    chamam aos mesmos quatro livros "a tetralogia das minúsculas", pela
    tipografia em minúsculas. Para quem quer este percurso como um arco
    fechado em si mesmo - uma aldeia piscatória sob o Estado Novo, um
    casamento medieval a azedar em bruxaria, duas carpideiras em Bragança,
    um lar de idosos no fim de uma vida - sem os nove livros de poesia e os
    anos de pequenas editoras que se cruzam com ele quando a estante se lê
    estritamente por ano. A ordem coincide exatamente com a de publicação;
    o que esta lista acrescenta é a fronteira e o nome, ambos do próprio
    autor, não uma reordenação. O custo é o que fica de fora: em 2004 Mãe já
    tem nove livros de poesia publicados, e esta lista deixa-os todos de
    fora, pelo que a história de "poeta que se tornou romancista" que ela
    conta só é verdadeira para os quatro livros que contém.
  debated:
    - "Dois nomes recebidos para o mesmo agrupamento: \"A Idade Inteira\" é o do próprio autor (Observador, 14 de janeiro de 2024, citação direta); \"a tetralogia das minúsculas\" é o nome crítico e de referência mais antigo e mais usado para os mesmos quatro livros (a Infopédia da Porto Editora, um artigo académico na Universidade Federal do Ceará). Ambos estão em uso; o nome aqui usado é o do autor."

- id: valter-hugo-mae/irmaos-ilhas-e-ausencias
  name: Irmãos, Ilhas e Ausências
  rationale: >
    A segunda tetralogia, nomeada por Mãe na nota de autor que fecha o seu
    volume final e de novo em entrevista: "os meus livros têm-se organizado
    em tetralogias... esta agora chama-se Irmãos, Ilhas e Ausências...
    quatro romances passados em ilhas distintas."
    [[work:valter-hugo-mae/a-desumanizacao|A Desumanização]] (2013,
    Islândia), [[work:valter-hugo-mae/homens-imprudentemente-poeticos|Homens
    Imprudentemente Poéticos]] (Japão),
    [[work:valter-hugo-mae/as-doencas-do-brasil|As Doenças do Brasil]]
    (2021, entre os abaetés sob o colonialismo português) e
    [[work:valter-hugo-mae/deus-na-escuridao|Deus na Escuridão]] (2024,
    Madeira) - quatro ilhas, quatro formas de solidão que a companhia não
    cura. Para quem já conhece Mãe e quer a sua década mais recente de
    ficção lida como um só percurso fechado, em vez de espalhada por onze
    anos de poesia, livros infantis e a prosa autobiográfica de Contra Mim.
    Tal como a anterior, esta lista repete a ordem de publicação dos quatro
    livros; o que acrescenta é a fronteira que o próprio Mãe traçou, dita
    por ele na semana em que se publicou o volume que a fecha. O custo é o
    mesmo, de novo: seis outros livros caem dentro destes mesmos onze anos e
    nenhum deles está aqui. Nem está
    [[work:valter-hugo-mae/o-filho-de-mil-homens|O Filho de Mil Homens]]
    (2011), que precede o ciclo e que Mãe coloca num eixo seu à parte, sem o
    integrar em nenhuma das tetralogias.
  debated:
    - "Mãe montou este ciclo em retrospetiva, não por plano: \"eu não falei disso inicialmente. A primeira vez que falei que estava a completar um ciclo foi quando publiquei a terceira ilha\" - pelo que os dois primeiros volumes não foram escritos nem lidos, na altura, como partes de uma tetralogia nomeada."
    - "Homens Imprudentemente Poéticos está datado de 2016, contra a Revista Pernambuco e o Observador, que indicam 2015: o catálogo da própria Porto Editora e uma recensão contemporânea da primeira edição situam-no em 2016. Em qualquer dos casos, ocupa o segundo lugar nesta lista, entre A Desumanização (2013) e As Doenças do Brasil (2021)."
