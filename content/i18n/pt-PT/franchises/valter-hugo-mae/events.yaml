# Tradução pt-PT dos eventos da franquia. As citações do autor já são
# portuguesas e são reproduzidas tal como ditas, sem glosa.

- id: vhm-minusculas-style-2004
  title: A explicação para escrever sem maiúsculas
  description: >
    [[work:valter-hugo-mae/o-nosso-reino|o nosso reino]] abre o percurso
    de quatro romances escritos inteiramente em minúsculas (ver a nota
    sobre o estilo dos títulos em works.yaml). Mãe atribui a escolha aos
    próprios poemas em minúsculas de Al Berto e a um verso de Ruy Belo,
    "num poema, nenhuma palavra deve levantar a cabeça", que leva à
    letra, como uma espécie de democracia entre as palavras. Chama-lhe
    uma forma de simplificar a sintaxe e a grafia até a escrita ficar
    mais próxima da fala, e confessa uma aversão às reticências, "o
    excremento da pontuação".

- id: vhm-saramago-death-2010
  title: Morte de José Saramago
  description: >
    O único Nobel da Literatura português morre em Lanzarote, três anos
    depois de ter elogiado pessoalmente
    [[work:valter-hugo-mae/o-remorso-de-baltazar-serapiao|o remorso de
    baltazar serapião]] e de lhe ter associado o prémio com o seu
    próprio nome. A morte do escritor cujo elogio lançou a carreira
    deste autor.

- id: vhm-tetralogia-completed-2010
  title: Fecha-se a Tetralogia das Minúsculas
  description: >
    [[work:valter-hugo-mae/a-maquina-de-fazer-espanhois|a máquina de
    fazer espanhóis]] fecha o percurso de quatro livros escritos sem
    maiúsculas, iniciado em 2004 - o trecho da carreira de Mãe em que
    passa de poeta de pequena editora a romancista duas vezes premiado a
    nível nacional.

- id: vhm-oceanos-finalist-2015
  title: Finalista do Prémio Oceanos com A Desumanização
  description: >
    [[work:valter-hugo-mae/a-desumanizacao|A Desumanização]] (2013) é
    nomeada um dos catorze finalistas (empates triplos alargam os doze
    habituais a catorze) do Prémio Oceanos 2015, ao lado de O Irmão
    Alemão, de Chico Buarque. O prémio é o sucessor, com novo nome, do
    Grande Prémio Portugal Telecom, que Mãe tinha vencido em 2012 com a
    máquina de fazer espanhóis (ver os lifeEvents da entidade de autor).

- id: vhm-japan-research-2016
  title: Viaja duas vezes ao Japão para investigar Homens Imprudentemente Poéticos
  description: >
    Para investigar
    [[work:valter-hugo-mae/homens-imprudentemente-poeticos|Homens
    Imprudentemente Poéticos]], Mãe viaja duas vezes ao Japão: a
    primeira para observar templos, jardins e gestos do quotidiano, a
    segunda para visitar Aokigahara, a floresta perto do Monte Fuji
    conhecida pela sua elevada taxa de suicídios que dá o cenário ao
    romance, e o último artesão idoso do Japão ainda a fazer leques
    tradicionais à mão, perto da mesma montanha. "Eu precisava das
    evidências, de ver", diz das viagens.
