# Tradução pt-PT. "A Idade Inteira", "Irmãos, Ilhas e Ausências" e "Crimes e
# Vindouros" são os nomes que o próprio autor dá aos seus ciclos, citados
# diretamente em entrevista; "Antes dos Romances" é também já português. Os
# quatro títulos são repetidos aqui sem alteração, nunca reformulados.

- id: antes-dos-romances
  title: Antes dos Romances
  themes: [poesia, pequenas editoras, a cena literária portuense, a edição como ofício]
  description: >
    Oito anos em que tudo o que Mãe publica é verso, a começar por
    [[work:valter-hugo-mae/silencioso-corpo-de-fuga|Silencioso Corpo de
    Fuga]] (1996), escrito aos vinte e quatro anos, até chegar a nove
    livros publicados quando surge o primeiro romance. A coletânea de 1999
    [[work:valter-hugo-mae/egon-schiele-auto-retrato-de-dupla-encarnacao|Egon
    Schiele Auto-Retrato de Dupla Encarnação]] recebe o Prémio Almeida
    Garrett, e os mesmos anos colocam-no dentro do ofício, e não só nas
    suas prateleiras: co-funda a Quasi Edições em 1999 e co-dirige a
    revista Apeadeiro a partir de 2001. O verso não pára em 2004; a
    exclusividade, essa, sim.

- id: tetralogia-das-minusculas
  title: A Idade Inteira
  themes: [Portugal rural e de pequenas terras, fábula moral, o apagamento das maiúsculas, crueldade e ternura a par]
  description: >
    A primeira das tetralogias que Mãe nomeia, quatro romances publicados
    inteiramente sem maiúsculas:
    [[work:valter-hugo-mae/o-nosso-reino|o nosso reino]] (2004),
    [[work:valter-hugo-mae/o-remorso-de-baltazar-serapiao|o remorso de
    baltazar serapião]] (2006),
    [[work:valter-hugo-mae/o-apocalipse-dos-trabalhadores|o apocalipse dos
    trabalhadores]] (2008) e
    [[work:valter-hugo-mae/a-maquina-de-fazer-espanhois|a máquina de fazer
    espanhóis]] (2010). A crítica e as obras de referência chamam ao
    mesmo percurso "a tetralogia das minúsculas", pela afetação
    tipográfica, lida como um nivelar de todas as palavras ao mesmo peso,
    mais oral do que literário. O título do próprio autor aponta antes
    para o que os quatro livros cobrem entre si: o percurso abre com um
    menino de oito anos numa aldeia piscatória sob o Estado Novo e fecha
    com os velhos e esquecidos dentro de um lar de idosos, uma idade
    inteira de vida humana. Pelo meio, o segundo volume vence o Prémio
    José Saramago e o quarto o Grande Prémio Portugal Telecom, pelo que um
    poeta de pequena editora se torna um nome das letras portuguesas
    inteiramente dentro deste único trecho.

- id: irmaos-ilhas-e-ausencias
  title: Irmãos, Ilhas e Ausências
  themes: [ilhas, irmãos, ausência, solidão que a companhia não cura, deslocamento]
  description: >
    A segunda tetralogia, nomeada por Mãe na nota de autor que fecha o seu
    volume final: "Nos romances recentes, decidi perseguir uma segunda
    tetralogia, a que chamaria de Irmãos, ilhas e ausências, em que a
    companhia nem por isso conduz à superação da solidão." Quatro
    romances, cada um passado longe de Portugal até ao último:
    [[work:valter-hugo-mae/a-desumanizacao|A Desumanização]] (2013) na
    Islândia, [[work:valter-hugo-mae/homens-imprudentemente-poeticos|Homens
    Imprudentemente Poéticos]] (2016) no Japão,
    [[work:valter-hugo-mae/as-doencas-do-brasil|As Doenças do Brasil]]
    (2021) entre um povo indígena sob o colonialismo português, e
    [[work:valter-hugo-mae/deus-na-escuridao|Deus na Escuridão]] (2024)
    numa freguesia remota da Madeira, o solo nacional sem o qual não quis
    fechar o ciclo. Descreve-os como "quatro romances passados em ilhas
    distintas", e diz do último: "Este livro encerra uma tetralogia sobre
    ilhas, de tramas passadas em ilhas."

- id: crimes-e-vindouros
  title: Crimes e Vindouros
  themes: [culpa herdada, os crimes deixados ao futuro, fé e justiça, ganância numa pequena comunidade]
  description: >
    Um ciclo que Mãe abre, não um que tenha fechado. Perguntado sobre o
    que tem em mãos, responde: "Este livro começa um ciclo chamado Crimes
    e Vindouros, por isso já estou com a cabeça no próximo romance. À
    partida será uma tetralogia também; gosto de funcionar por ciclos de
    quatro livros." O tema que lhe atribui é a herança do mal: "do que
    podem ser os grandes crimes de hoje, herdados pelas pessoas do
    futuro; que crimes estamos nós a deixar para que as pessoas do futuro
    herdem." Começa com [[work:valter-hugo-mae/o-seculo-dos-imbecis|O
    Século dos Imbecis]] (2026), uma aldeia de montanha feita de ganância,
    mexerico e fé frágil, publicada trinta anos depois do seu primeiro
    livro.
