# Overlay pt-PT dos eventos da franquia: `title` + `description` (os títulos
# dos eventos são prosa, não títulos publicados).
- id: man-in-black-suit-prize-1995
  title: Um conto de terror vence o O. Henry Award
  description: >
    O conto "The Man in the Black Suit" (The New Yorker, 1994) vence o World
    Fantasy Award e também o O. Henry Award para melhor ficção curta - um
    reconhecimento literário mainstream pouco comum para King na época.
    Ancora a pequena edição limitada
    [[work:stephen-king/six-stories|Six Stories]] (1997) antes de chegar a um
    público mais vasto em
    [[work:stephen-king/everythings-eventual|Tudo é Fatal - 1408 e Outros
    Contos]] (2002).

- id: bachman-regulators-desperation-1996
  title: Bachman regressa para um romance-espelho
  description: >
    Onze anos depois de ser publicamente desmascarado, King ressuscita
    Richard Bachman para
    [[work:stephen-king/the-regulators|Os Reguladores]], publicado no mesmo
    dia que o seu romance "espelho",
    [[work:stephen-king/desperation|Desperation]]. Os dois partilham um
    elenco reimaginado em cenários diferentes de pequenas cidades, e as capas
    formam uma única imagem quando os livros ficam lado a lado.

- id: green-mile-serial-1996
  title: Lança À Espera de um Milagre em seis fascículos mensais
  description: >
    [[work:stephen-king/the-green-mile|À Espera de um Milagre]] chega em
    seis finos volumes mensais de capa mole (março-agosto de 1996), em vez de
    um único livro, um formato que King pede emprestado aos romances em
    fascículos de Dickens. Os seis volumes entram todos ao mesmo tempo na
    lista de mais vendidos antes de serem reunidos numa única edição no ano
    seguinte.

- id: dark-tower-completed-2004
  title: O ciclo da Torre Negra fica completo
  description: >
    Os livros V a VII chegam em rápida sucessão (2003-2004),
    [[work:stephen-king/wolves-of-the-calla|Os Lobos de Calla]],
    [[work:stephen-king/song-of-susannah|A Canção de Susannah]] e
    [[work:stephen-king/the-dark-tower|A Torre Negra]], e fecham a magnum opus
    de 22 anos que discretamente liga boa parte da sua ficção.
