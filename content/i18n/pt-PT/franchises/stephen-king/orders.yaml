# Overlay pt-PT das ordens de leitura: `name`, `rationale` e `debated`.
# orderedWorkIds e sources não se traduzem.
- id: stephen-king/dark-tower-connected
  name: A Torre Negra - ordem de leitura com as ligações
  rationale: >
    A Torre Negra lê-se bem por si só, mas vários outros romances aprofundam-na:
    introduzem personagens e uma cosmologia que compensam dentro do ciclo. Esta
    ordem entrelaça os oito livros da Torre com os romances ligados mais
    importantes, nos pontos em que enriquecem a demanda. As ligações são uma
    recompensa, não um requisito.
  debated:
    - "Os pontos exatos de inserção dos romances ligados variam de guia para guia; muitos leitores optam antes por ler todas as ligações por ordem de publicação."
    - "A Lenda do Vento (escrito mais tarde, passado entre o IV e o V) pode ser lido na sua posição na história, como aqui, ou por ordem de publicação."
    - "A Hora do Vampiro é colocado antes de Os Lobos de Calla por causa do Padre Callahan, que a própria contracapa de Calla apresenta sem rodeios; Insónia é colocado antes de A Torre Negra por alimentar o desfecho, embora quem prefira chegar a ele às escuras o possa deixar na ordem de publicação."
