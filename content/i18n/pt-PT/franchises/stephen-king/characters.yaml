# Portuguese (pt-PT) overlay for the Stephen King recurring characters.
# Only `description` is translated: `name` and `aka` are proper nouns and the
# per-appearance notes stay in the base language.

- id: stephen-king/roland-deschain
  description: >
    O último pistoleiro de um mundo que seguiu em frente, em perseguição da
    Torre Negra ao longo dos oito livros do ciclo, o eixo em torno do qual gira
    todo o multiverso.

- id: stephen-king/randall-flagg
  description: >
    O agente errante do caos em King: o Caminhante do mundo em ruínas, o mago da
    corte de Delain. Onde ele aparece, os livros estão a partilhar mais do que
    um ambiente.

- id: stephen-king/father-callahan
  description: >
    O pároco de Jerusalem's Lot, cuja fé é levada muito para lá do seu ponto de
    rutura por aquilo que chega à sua terra.
