# Overlay pt-PT das eras: `title` + `description` (os títulos das eras são
# prosa, não títulos publicados).
# Os títulos de obras citados na prosa usam a edição portuguesa publicada
# (content/franchises/stephen-king/editions.yaml) ou ficam em inglês quando
# não existe edição portuguesa.
- id: birth-of-the-master
  title: O Nascimento do Mestre
  description: >
    De professor do ensino secundário a nome conhecido de todos.
    [[work:stephen-king/carrie|Carrie]], [[work:stephen-king/salems-lot|A Hora do Vampiro]],
    [[work:stephen-king/the-shining|The Shining]] e [[work:stephen-king/the-stand|A Dança da Morte]]
    fixam a "marca Stephen King": terror literário com alma operária, situado
    num Maine mítico de pequenas cidades.

- id: the-golden-decade
  title: A Década de Ouro
  description: >
    Auge de criatividade e domínio comercial, [[work:stephen-king/it|A Coisa]],
    [[work:stephen-king/misery|Misery]], [[work:stephen-king/pet-sematary|Samitério de Animais]],
    [[work:stephen-king/christine|Christine]], os primeiros volumes da Torre Negra,
    escritos no fundo do poço da dependência. O pseudónimo Richard Bachman
    corre e é desmascarado (1985).

- id: psychological-maturity
  title: Maturidade Psicológica
  description: >
    Recém-sóbrio, King volta-se para dentro: [[work:stephen-king/geralds-game|O Jogo de Gerald]],
    [[work:stephen-king/dolores-claiborne|Dolores Claiborne]], o
    [[work:stephen-king/the-green-mile|À Espera de um Milagre]] publicado em fascículos,
    [[work:stephen-king/bag-of-bones|Saco de Ossos]]. A década termina com o
    acidente quase fatal de 1999, na berma da estrada, que remodela toda a obra
    que se lhe segue.

- id: the-tower-and-after
  title: A Torre e o Depois
  description: >
    A escrever com dor crónica, King corre para terminar a Torre Negra
    ([[work:stephen-king/wolves-of-the-calla|V]]-[[work:stephen-king/the-dark-tower|VII]],
    2003-2004), publica [[work:stephen-king/on-writing|Escrever - Memórias de um Ofício]]
    e faz experiências com a forma (publicação em fascículos, Hard Case Crime,
    colaborações). Um período ensombrado pelo acidente.

- id: the-elder-statesman
  title: O Mestre Consagrado
  description: >
    Um renascimento tardio e prolífico: [[work:stephen-king/11-22-63|22/11/63]],
    a trilogia policial de Bill Hodges, [[work:stephen-king/doctor-sleep|Doutor Sono]]
    (sequela de The Shining), [[work:stephen-king/revival|Despertar]],
    [[work:stephen-king/the-outsider|O Intruso]],
    [[work:stephen-king/the-institute|O Instituto]]. Amplamente consagrado como
    um mestre vivo; um registo caloroso, propulsivo, menos sobrenatural.

- id: late-king
  title: O King Tardio
  description: >
    Produção sem quebra já na casa dos setenta: [[work:stephen-king/billy-summers|Billy Summers]],
    o [[work:stephen-king/fairy-tale|Conto de Fadas]] embebido em mito, e Holly
    Gibney promovida a protagonista dos seus próprios livros
    ([[work:stephen-king/holly|Holly]], [[work:stephen-king/never-flinch|Sem Tréguas]]).
    Elegíaco e virado para o ofício, ainda inquieto.
