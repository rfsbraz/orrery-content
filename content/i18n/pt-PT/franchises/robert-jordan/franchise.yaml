# European Portuguese (pt-PT) overlay. Only translated prose; the id, name,
# authorIds and sources stay in the base file. The startHere paths carry only
# their id and prose - never workIds, orderId or fit (docs/SCHEMA.md, "Nested
# lists merge by id").
# The series renders as "A Roda do Tempo", the name Bertrand Editora uses for
# the Portuguese collection. The pen names and the pre-1990 titles have no
# Portuguese editions and are never translated.
- id: robert-jordan
  description: >
    A obra publicada completa de Robert Jordan, pseudónimo de James Oliver
    Rigney Jr.: ficção histórica e um western sob outros nomes, uma série de
    sete romances de Conan e a obra da sua vida, A Roda do Tempo, uma epopeia
    em catorze volumes sobre profecia, renascimento e uma guerra contra as
    Trevas, concluída após a sua morte por
    [[author:brandon-sanderson|Brandon Sanderson]] a partir das notas que
    deixou.
  startHere:
    paths:
      - id: just-start
        title: Comece simplesmente por O Olho do Mundo
        description: >
          O conselho quase universal para quem chega a Robert Jordan: começar
          pelo primeiro livro de A Roda do Tempo e não tocar na prequela senão
          muito mais tarde. New Spring antecipa revelações dos primeiros livros,
          por isso conhecer as personagens sem preparação nenhuma é a forma
          prevista de entrar. Um livro é também a maneira mais barata de
          experimentar um autor cuja obra principal se estende por catorze
          volumes.
        note: >
          É isto que a comunidade de fãs diz a toda a gente que chega de novo, e
          salta por cima dos onze romances que Jordan publicou antes, sob
          pseudónimo ou por encomenda. Esses estão aqui na estante; nenhum guia
          os recomenda como porta de entrada. Se o primeiro livro resultar, fica
          aberto a todo o girar da Roda.
      - id: recommended-integrated
        title: Ordem de publicação, com New Spring encaixado
        description: >
          Só A Roda do Tempo: ler a sequência principal por ordem de publicação,
          mas deixando cair a prequela a meio do caminho, quando já se conhecem
          as personagens que ela reenquadra. O ponto exato é disputado - os
          guias colocam-na algures entre o quinto e o décimo livro - e a troca
          faz-se sempre no mesmo sentido: cedo demais e reenquadra menos, tarde
          demais e interrompe a corrida para o fim. Como é só a série, deixa de
          fora o resto da estante de Jordan.
      - id: chronological
        title: Cronológica, com New Spring primeiro
        description: >
          Para completistas que insistem na ordem interna do mundo: primeiro a
          prequela, depois os catorze volumes principais. Trocam-se várias
          surpresas de primeira leitura por uma cronologia estritamente linear.
          Só A Roda do Tempo, já que mais nada do que Jordan escreveu partilha
          este mundo.
      - id: publication-complete
        title: Toda a carreira, por ordem de publicação
        description: >
          Tudo o que Jordan publicou, pela ordem em que apareceu: onze romances
          iniciais sob três nomes diferentes, depois os catorze volumes de A
          Roda do Tempo, a prequela, os volumes de referência e o romance de
          gaveta que os herdeiros lançaram doze anos depois da sua morte. Vê-se
          um autor de romances históricos e de espada e feitiçaria por encomenda
          tornar-se o autor de uma epopeia em catorze volumes, e vê-se depois
          essa epopeia ser terminada por outra mão. O custo é paciência: quem
          veio por A Roda do Tempo espera onze livros até lá chegar, ao longo de
          obra em três géneros que nada tem a ver com ela. A camada de aura foi
          construída exatamente para este percurso.
        note: >
          É o único percurso aqui que cobre a estante inteira. Os três percursos
          de série acima são só A Roda do Tempo.
