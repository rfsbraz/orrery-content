# European Portuguese (pt-PT) overlay: synopses only.
# Work titles are NEVER translated here - a Portuguese title is edition data and
# lives in editions.yaml (Bertrand published volumes 1-6 only).
#
# Terminology note: the pt-PT edition's rendering of "channeling" / "the One
# Power" could not be verified against the published Bertrand text, so those
# synopses describe the magic plainly rather than coining a Portuguese term.

- id: robert-jordan/the-eye-of-the-world
  synopsis: "Três jovens aldeões fogem da sua terra na noite em que ela é atacada e veem-se lançados no tabuleiro de uma guerra profetizada entre a Luz e as Trevas."

- id: robert-jordan/the-great-hunt
  synopsis: "A caça a uma relíquia roubada arrasta os companheiros através de várias nações, enquanto inimigos antigos e velhas profecias se fecham sobre eles."

- id: robert-jordan/the-dragon-reborn
  synopsis: "Quando um deles é apontado como o campeão renascido de uma era, os outros correm em direção a uma fortaleza e a uma espada que só ele pode reclamar."

- id: robert-jordan/the-shadow-rising
  synopsis: "O grupo divide-se, rumo a um povo do deserto, a uma cidade sitiada e a uma história que reescreve quem julgavam ser."

- id: robert-jordan/the-fires-of-heaven
  synopsis: "A guerra alastra pela terra à medida que um exército do deserto marcha e poderes rivais se movem abertamente contra o campeão renascido."

- id: robert-jordan/lord-of-chaos
  synopsis: "Facções de utilizadores da magia cortejam e enfrentam o jovem líder, enquanto um cisma se aprofunda e uma armadilha é montada num lugar chamado Dumai's Wells."

- id: robert-jordan/a-crown-of-swords
  synopsis: "Cercos, a caça a um artefacto capaz de dominar o clima e alianças em mudança apertam o nó enquanto as peças do desfecho são colocadas."

- id: robert-jordan/the-path-of-daggers
  synopsis: "Uma relíquia perigosa é virada contra os invasores, enquanto revoltas e cortes rivais fraturam os aliados por dentro."

- id: robert-jordan/winters-heart
  synopsis: "Um casamento secreto, uma caçada humana e uma tentativa audaciosa de desfazer a mácula que há três mil anos amaldiçoa os homens capazes de usar a magia."

- id: robert-jordan/crossroads-of-twilight
  synopsis: "As personagens fazem o balanço na esteira de um ato que mudou o mundo, cada uma diante de uma decisão que não pode ser adiada por muito mais tempo."

- id: robert-jordan/knife-of-dreams
  synopsis: "Os fios esticam-se: dívidas vencem-se, cercos quebram-se, e noivados e batalhas empurram a história com força para o seu final. O último volume que Robert Jordan completou sozinho."

- id: robert-jordan/the-gathering-storm
  synopsis: "O primeiro volume da conclusão em três partes construída a partir das notas de Jordan: um campeão que endurece e uma líder quebrada enfrentam, cada um, o limite da sua resistência."

- id: robert-jordan/towers-of-midnight
  synopsis: "Linhas narrativas dispersas convergem, à medida que reencontros e ajustes de contas há muito adiados desimpedem o terreno para a Última Batalha."

- id: robert-jordan/a-memory-of-light
  synopsis: "A Última Batalha. A sequência de catorze volumes termina no final que Robert Jordan planeara antes de morrer."

- id: robert-jordan/new-spring
  synopsis: "Uma prequela situada cerca de vinte anos antes da sequência principal: duas jovens conquistam o xaile no meio do fim de uma guerra e de um nascimento que há de refazer o mundo. Expandida a partir de uma novela de 1998 incluída na antologia Legends."

- id: robert-jordan/the-world-of-robert-jordans-the-wheel-of-time
  synopsis: "Um guia ilustrado, escrito de dentro do próprio mundo, sobre a história, as nações e os povos da série, redigido a meio do seu percurso. Obra de referência, não narrativa."

- id: robert-jordan/the-wheel-of-time-companion
  synopsis: "A exaustiva enciclopédia de A a Z da série já concluída, compilada por Harriet McDougal, Alan Romanczuk e Maria Simons a partir dos arquivos de Jordan. Obra de referência, não narrativa."

# The pre-1990 works and the posthumous novel have no Portuguese edition, so
# their titles stand in English throughout. Conan's invented place names
# (Nemedia, Ophir, Turan, Vendhya, Shadizar) are left in their original form for
# the same reason: no published Portuguese Conan text exists to follow.
# "The Dark One" is likewise not rendered as a name, matching the main-sequence
# synopses above, which describe the Dark plainly rather than coining a term.

- id: robert-jordan/the-fallon-blood
  synopsis: "Em fuga da Irlanda depois de matar um oficial inglês, Michael Fallon chega à Charleston colonial como servo contratado e, ao longo da Revolução Americana, ergue-se até fundar uma dinastia."

- id: robert-jordan/the-fallon-pride
  synopsis: "A segunda geração da saga: Robert Fallon sobrevive aos piratas berberes e ao cerco de Trípoli no mar e constrói depois uma vida de armador em Charleston, enquanto a jovem república deriva para a sua segunda guerra com a Grã-Bretanha."

- id: robert-jordan/the-fallon-legacy
  synopsis: "A terceira geração da saga: James Fallon troca o mar que os seus antepassados navegaram pela colónia de Stephen Austin no Texas mexicano e pelo sonho de um império de criação de cavalos, onde velhos inimigos da família o esperam com influência política, pistoleiros pagos e aliados comanches."

- id: robert-jordan/cheyenne-raiders
  synopsis: "Em 1837, o Bureau of Indian Affairs envia um jovem do leste para viver entre os cheienes; adotado pela tribo depois de salvar a vida a um guerreiro, terá de conquistar o seu lugar, e a mulher que ama, à maneira cheiene."

- id: robert-jordan/conan-the-invincible
  synopsis: "O primeiro pastiche de Conan escrito por Jordan: contratado para roubar uns pendentes ao rei de Zamora, o jovem ladrão vê-se arrastado para uma perseguição que termina no covil de um necromante nas montanhas Kezankianas."

- id: robert-jordan/conan-the-defender
  synopsis: "Um feiticeiro e uma conspiração de nobres tramam usurpar o Trono do Dragão de Nemedia; Conan, acabado de chegar à capital com a espada para alugar, acaba entre eles e o rei."

- id: robert-jordan/conan-the-unconquered
  synopsis: "O feiticeiro Jhandar e o seu culto da morte erguem um exército de escravos mortos-vivos, e Conan tem de enfrentar assassinos que matam ao toque para chegar à fonte do seu poder."

- id: robert-jordan/conan-the-triumphant
  synopsis: "À frente dos seus mercenários em Ophir depois da morte do rei, Conan cai no meio de uma luta de sucessão conduzida por uma condessa que é, em segredo, suma sacerdotisa de um deus demoníaco aprisionado."

- id: robert-jordan/conan-the-magnificent
  synopsis: "Uma perseguição por vingança a um ladrão rival leva Conan de Shadizar às montanhas Kezankianas, onde um sacerdote fanático caça as gemas que comandam um dragão."

- id: robert-jordan/conan-the-destroyer
  synopsis: "Com a promessa de ver o seu amor perdido devolvido à vida, Conan escolta uma princesa numa demanda por uma gema e um corno capazes de despertar um deus adormecido. Novelização do filme de 1984."

- id: robert-jordan/conan-the-victorious
  synopsis: "Incriminado por um assassínio em Turan, Conan segue uma rota de contrabandistas até Vendhya, onde um mago da corte negoceia com demónios a troco de um trono. O último romance de Conan que Jordan escreveu."

- id: robert-jordan/the-strike-at-shayol-ghul
  synopsis: "Um breve documento histórico, interno ao mundo, sobre o selamento da prisão das Trevas no fim da Era das Lendas, três mil anos antes do início da série. O único texto curto autónomo que Jordan assinou com o seu próprio nome de autor."

- id: robert-jordan/warrior-of-the-altaii
  synopsis: "Os poços da Planície estão a secar e os presságios multiplicam-se: Wulfgar, chefe dos Altaii nómadas, terá de se haver com rainhas gémeas, senhores da guerra, profetas e magia para garantir o futuro do seu povo, com a ajuda de uma visitante de outro mundo."
