# Tradução pt-PT da prosa da autora: biografia e eventos de vida.
# Os `lifeEvents` são uma lista aninhada com id e por isso fundem-se item a
# item pela chave `id` (docs/SCHEMA.md, "Nested lists merge by id"): aqui só
# vai prosa, nunca `date`, `impact` ou `sources`. `name` e `aka` não se traduzem.

- id: agatha-christie
  bio: >
    Escritora inglesa, a romancista mais vendida de todos os tempos e a autora
    que define a Idade de Ouro da ficção policial. Criadora de
    [[character:agatha-christie/hercule-poirot|Hercule Poirot]] e
    [[character:agatha-christie/miss-marple|Miss Marple]], publicou 66
    romances policiais e 14 coletâneas de contos ao longo de cinco décadas,
    além de seis romances sentimentais assinados como
    [[author:agatha-christie|Mary Westmacott]]. O seu domínio dos venenos veio
    de trabalho real em farmácia hospitalar nas duas Guerras Mundiais, e o
    segundo casamento, com o arqueólogo Max Mallowan, levou-a às escavações do
    Médio Oriente que deram
    [[work:agatha-christie/murder-on-the-orient-express|Um Crime no Expresso
    do Oriente]], [[work:agatha-christie/death-on-the-nile|Morte no Nilo]] e
    [[work:agatha-christie/murder-in-mesopotamia|Crime na Mesopotâmia]].
  lifeEvents:
    - id: christie-born-1890
      title: Nascimento em Torquay, Devon
      description: >
        Nasce Agatha Miller, numa família confortável da classe média, em
        Ashfield; é educada sobretudo em casa, lê vorazmente e cresce imersa no
        mundo balnear do Devon que reaparece ao longo dos romances.

    - id: christie-marries-archie-1914
      title: Casamento com Archibald Christie
      description: >
        Casa com o aviador Archie Christie na véspera de Natal, poucos dias
        depois de começada a Primeira Guerra Mundial. O casamento dá-lhe o nome
        com que escreveu toda a vida e, uma década volvida, a crise de 1926.

    - id: christie-wwi-dispensary-1916
      title: "Enfermagem no VAD e o exame de boticário: o conhecimento dos venenos"
      description: >
        Christie serviu como enfermeira do Voluntary Aid Detachment em Torquay,
        trabalhou depois na farmácia do hospital e passou o exame da Society of
        Apothecaries em 1917. O conhecimento prático de fármacos e venenos
        sustenta toda a obra: o veneno é a sua arma de eleição e é quase sempre
        exato do ponto de vista farmacológico. Poirot foi inventado nestes
        mesmos anos.

    - id: christie-disappearance-1926
      title: O desaparecimento de onze dias
      description: >
        No pior ano da sua vida, com a mãe recém-falecida e Archie a pedir o
        divórcio para casar com Nancy Neele, Christie desapareceu de casa numa
        noite de dezembro. O carro foi encontrado abandonado junto a uma
        pedreira de giz, e seguiu-se uma busca nacional e um frenesim
        jornalístico. Onze dias depois foi descoberta num hotel termal de
        Harrogate, registada com o apelido da amante do marido, aparentemente
        em estado de fuga dissociativa e incapaz de se explicar. Nunca deu
        explicações, deixou o episódio de fora da autobiografia, e ele continua
        a ser o caso mais lendário da história da ficção policial.

    - id: christie-divorce-archie-1928
      title: Divórcio de Archie Christie
      description: >
        O casamento termina em 1928. Christie conserva o nome do marido pelo seu
        valor literário e, de novo sozinha, toma o Expresso do Oriente rumo a
        leste - a viagem que a leva a Max Mallowan e aos cenários do Médio
        Oriente.

    - id: christie-marries-mallowan-1930
      title: Casamento com Max Mallowan; começam os anos de arqueologia
      description: >
        Christie casa com o arqueólogo Max Mallowan, catorze anos mais novo, e
        passa os invernos de 1930 a 1960 nas escavações dele no Iraque e na
        Síria. As expedições alimentam
        [[work:agatha-christie/murder-in-mesopotamia|Crime na Mesopotâmia]],
        [[work:agatha-christie/death-on-the-nile|Morte no Nilo]],
        [[work:agatha-christie/they-came-to-baghdad|Intriga em Bagdade]] e a
        experiência egípcia antiga
        [[work:agatha-christie/death-comes-as-the-end|A Morte Não é o Fim]].
        Dizia, com graça, que um arqueólogo era o melhor marido que uma mulher
        podia ter: quanto mais velha ficasse, mais interessado ele estaria.

    - id: christie-wwii-dispensary-1940s
      title: Segundo período de farmácia hospitalar durante a Blitz
      description: >
        Com Max destacado no estrangeiro, Christie voltou ao trabalho de
        farmácia hospitalar na Londres da guerra, refrescando o conhecimento de
        venenos que molda
        [[work:agatha-christie/the-pale-horse|O Cavalo Amarelo]] (uma intriga
        de envenenamento por tálio a que mais tarde se creditou o salvamento de
        vidas reais). Os anos de guerra estão entre os mais produtivos da sua
        carreira, e é agora que escreve os dois romances do cofre.

    - id: christie-nimrud-writing-room-1950s
      title: Constrói o seu próprio gabinete de escrita na casa da escavação de Nimrud
      description: >
        Nas escavações do pós-guerra de Mallowan em Nimrud, que ele dirige de
        1949 até David Oates lhe suceder em 1958, Christie paga para acrescentar
        um pequeno gabinete de escrita à casa da expedição, no início dos anos
        1950. Todas as temporadas torna-se também útil a fotografar, limpar e
        restaurar achados - trabalho de conservação de que dizia gostar
        particularmente.

    - id: christie-agatha-christie-ltd-1955
      title: Funda a Agatha Christie Limited para deter os seus direitos
      description: >
        Incomodada por se tornar, nas suas próprias palavras, "an employed wage
        slave", sob o imposto sobre o rendimento do pós-guerra britânico,
        Christie cria uma empresa privada, a Agatha Christie Limited, para
        deter os direitos dos seus livros, peças e adaptações. A empresa
        continua a geri-los, presidida agora pelo seu bisneto.

    - id: christie-honours-1955-56
      title: Primeira Grande Mestra e depois CBE
      description: >
        Em 1955 Christie torna-se a primeira distinguida com o Grand Master
        Award da Mystery Writers of America; nas Honras de Ano Novo de 1956 é
        nomeada Comandante da Ordem do Império Britânico, o primeiro
        reconhecimento oficial de uma carreira que a crítica do género outrora
        tratava como pouco respeitável.

    - id: christie-booker-sale-1968
      title: Vende uma participação maioritária na Agatha Christie Limited à Booker
      description: >
        Com quase 80 anos, Christie vende 51% da Agatha Christie Limited - e
        assim uma participação de controlo nos direitos dos seus próprios
        livros - à Booker Books, a empresa comercial mais tarde conhecida pelo
        Booker Prize; por contrato, a família mantém direito de veto sobre
        quaisquer novas adaptações, atualizações ou reedições da sua obra.

    - id: christie-dbe-1971
      title: Feita Dame Commander da Ordem do Império Britânico
      description: >
        Feita Dame Commander da Ordem do Império Britânico em 1971 (depois de
        ter sido feita CBE em 1956), no abraço tardio do establishment a uma
        autora "popular" tornada instituição nacional. Max fora armado cavaleiro
        em 1968 pela sua arqueologia, o que fazia deles um raro casal com
        títulos próprios e independentes.

    - id: christie-late-novels-vocabulary-decline
      title: Continua a escrever apesar do declínio de saúde
      description: >
        Christie continua a escrever à medida que a saúde declina a partir de
        1971; [[work:agatha-christie/postern-of-fate|A Porta do Destino]]
        (1973) é o último romance que escreve (Cai o Pano e Crime Adormecido
        foram escritos décadas antes e só publicados postumamente ou quase).
        Nunca foi diagnosticada com Alzheimer nem com qualquer outra forma de
        demência em vida, mas um estudo computacional de 2009 sobre o seu
        vocabulário encontrou uma quebra "impressionante" na variedade lexical
        em [[work:agatha-christie/elephants-can-remember|Os Elefantes têm
        Memória]] (1972) face a
        [[work:agatha-christie/destination-unknown|Destino Desconhecido]],
        dezoito anos antes, a par de mais frases repetidas e escolhas de
        palavras mais vagas - um padrão que os investigadores argumentam ser
        compatível com declínio cognitivo, e não com o envelhecimento normal.

    - id: christie-death-1976
      title: Morte em Winterbrook House
      description: >
        Christie morre serenamente aos 85 anos, meses depois de publicar o há
        muito guardado
        [[work:agatha-christie/curtain-poirots-last-case|Cai o Pano]] e pouco
        antes do póstumo
        [[work:agatha-christie/sleeping-murder|Crime Adormecido]]. Poirot
        recebera no ano anterior um obituário na primeira página do New York
        Times, o único personagem de ficção alguma vez assim distinguido.
