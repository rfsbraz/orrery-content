# Português europeu (pt-PT) - biografia e prosa dos acontecimentos de vida.
# O nome do autor, as datas, os ids e as fontes ficam intocados.

- id: joao-tordo
  bio: >
    Romancista português, nascido em Lisboa. Licenciou-se em Filosofia na
    Universidade Nova de Lisboa e estudou jornalismo e escrita criativa em
    Londres e em Nova Iorque, e esses anos no estrangeiro marcam a sua primeira
    ficção: cosmopolita, passada em hotéis e cidades estrangeiras, metafísica e
    de tonalidade noir. A consagração chegou com
    [[work:joao-tordo/as-tres-vidas|As Três Vidas]], que venceu o Prémio José
    Saramago de 2009. A obra viria a reunir-se na atmosférica trilogia insular
    [[work:joao-tordo/o-luto-de-elias-gro|Trilogia dos Lugares Sem Nome]] e, a
    partir de 2019, numa viragem para a ficção policial. Escreve também para a
    televisão portuguesa e orienta oficinas de escrita criativa. Filho do cantor
    Fernando Tordo.
  lifeEvents:
    - id: tordo-born-1975
      title: Nasce em Lisboa
      description: >
        Nasce em Lisboa, filho do cantor Fernando Tordo (presença constante da
        música portuguesa, conhecido lá fora sobretudo pela Eurovisão de 1973).
        A casa musical é contexto, não a afirmação de uma carreira musical
        própria.
    - id: tordo-philosophy-nova
      title: Licencia-se em Filosofia na Universidade Nova de Lisboa
      description: >
        Uma licenciatura em Filosofia que deixa marca permanente na ficção: os
        primeiros romances são tão ensaísticos e metafísicos quanto narrativos.
        O ano é aproximado (licenciatura concluída no final da década de 1990).
    - id: tordo-creative-writing-london-ny
      title: Estuda jornalismo e escrita criativa em Londres e em Nova Iorque
      description: >
        Anos de formação no estrangeiro que alimentam os cenários voltados para
        fora da primeira obra (cidades estrangeiras, narradores expatriados).
        Datas aproximadas.
    - id: tordo-saramago-prize-2009
      title: Vence o Prémio José Saramago com As Três Vidas
      description: >
        O acontecimento que lhe fez a carreira. O Prémio José Saramago, bienal e
        atribuído a um escritor de língua portuguesa com menos de 40 anos, foi
        para [[work:joao-tordo/as-tres-vidas|As Três Vidas]]: um prémio que só se
        ganha uma vez na vida, com o nome do único Nobel da Literatura
        português, decidido no ano anterior à morte de Saramago. Passou Tordo de
        promessa a nome fixo das letras portuguesas.
    - id: tordo-crime-turn-2019
      title: Vira-se para a ficção policial
      description: >
        Com [[work:joao-tordo/a-noite-em-que-o-verao-acabou|A Noite em que o
        Verão Acabou]], Tordo passa para o registo policial, logo ancorado na
        investigadora da PSP Pilar Benamor. Uma reinvenção deliberada e
        assumida, não um desvio pontual.
    - id: tordo-namora-prize-2021
      title: Vence o Prémio Fernando Namora com Felicidade
      description: >
        [[work:joao-tordo/felicidade|Felicidade]] arrecada o Prémio Fernando
        Namora, distinção para a qual já fora finalista no início da carreira:
        uma confirmação a meio do percurso.
