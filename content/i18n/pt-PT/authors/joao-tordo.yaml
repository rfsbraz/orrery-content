# Português europeu (pt-PT) - biografia e prosa dos acontecimentos de vida.
# O nome do autor, as datas, os ids e as fontes ficam intocados.

- id: joao-tordo
  bio: >
    Romancista português, nascido em Lisboa. Licenciou-se em Filosofia na
    Universidade Nova de Lisboa e estudou jornalismo e escrita criativa em
    Londres e em Nova Iorque, e esses anos no estrangeiro marcam a sua primeira
    ficção: cosmopolita, passada em hotéis e cidades estrangeiras, metafísica e
    de tonalidade noir. A consagração chegou com
    [[work:joao-tordo/as-tres-vidas|As Três Vidas]], que venceu o Prémio José
    Saramago de 2009. A obra viria a reunir-se na atmosférica trilogia insular
    [[work:joao-tordo/o-luto-de-elias-gro|Trilogia dos Lugares Sem Nome]] e, a
    partir de 2019, numa viragem para a ficção policial. Escreve também para a
    televisão portuguesa e orienta oficinas de escrita criativa. Filho do cantor
    Fernando Tordo.
  lifeEvents:
    - id: tordo-born-1975
      title: Nasce em Lisboa
      description: >
        Nasce em Lisboa, filho do cantor Fernando Tordo (presença constante da
        música portuguesa, conhecido lá fora sobretudo pela Eurovisão de 1973).
        A casa musical é contexto, não a afirmação de uma carreira musical
        própria.
    - id: tordo-philosophy-nova
      title: Licencia-se em Filosofia na Universidade Nova de Lisboa
      description: >
        Uma licenciatura em Filosofia que deixa marca permanente na ficção: os
        primeiros romances são tão ensaísticos e metafísicos quanto narrativos.
        O ano é aproximado (licenciatura concluída no final da década de 1990).
    - id: tordo-creative-writing-london-ny
      title: Estuda jornalismo e escrita criativa em Londres e em Nova Iorque
      description: >
        Anos de formação no estrangeiro que alimentam os cenários voltados para
        fora da primeira obra (cidades estrangeiras, narradores expatriados).
        Datas aproximadas.
    - id: tordo-debut-manuscript-2004
      title: Publica o romance de estreia e começa como jornalista freelancer
      description: >
        Terminou [[work:joao-tordo/o-livro-dos-homens-sem-luz|O Livro dos
        Homens Sem Luz]] em Nova Iorque, imprimiu o manuscrito uma dezena de
        vezes, escreveu à mão cada morada nos envelopes e enviou-os para
        editoras em Portugal. Quando a Temas e Debates respondeu que deviam
        falar, fez as malas e deixou Nova Iorque, onde vivia há mais de dois
        anos. De volta a Lisboa, tornou-se jornalista freelancer, escrevendo
        para O Independente, a Sábado e a Notícias Magazine, um trabalho que
        mais tarde descreveu como pouco talhado para si (desorganizado, com
        medo do telefone). O livro vendeu cerca de 700 exemplares no primeiro
        ano.
    - id: tordo-sp-televisao-as-tres-vidas-2008
      title: Deixa o jornalismo pela escrita de guiões e escreve As Três Vidas no Algarve
      description: >
        Por volta de 2006-2007 deixou o jornalismo freelancer, passou a fazer
        traduções e entrou para a produtora SP Televisão como argumentista,
        trabalho que manteve cerca de dois anos. No verão de 2008 pediu uma
        licença para terminar [[work:joao-tordo/as-tres-vidas|As Três
        Vidas]], escrevendo-o ao longo de dois ou três meses no Algarve;
        voltou brevemente à empresa e depois demitiu-se sem outro emprego à
        vista. O romance, publicado nesse setembro, venceria o Prémio José
        Saramago no ano seguinte.
    - id: tordo-saramago-prize-2009
      title: Vence o Prémio José Saramago com As Três Vidas
      description: >
        O acontecimento que lhe fez a carreira. O Prémio José Saramago, bienal e
        atribuído a um escritor de língua portuguesa com menos de 40 anos, foi
        para [[work:joao-tordo/as-tres-vidas|As Três Vidas]]: um prémio que só se
        ganha uma vez na vida, com o nome do único Nobel da Literatura
        português, decidido no ano anterior à morte de Saramago. Passou Tordo de
        promessa a nome fixo das letras portuguesas.
    - id: tordo-bom-inverno-identity-crisis-2010
      title: Uma crítica devastadora e, depois, um ano de falsos começos
      description: >
        [[work:joao-tordo/o-bom-inverno|O Bom Inverno]], publicado no ano
        seguinte ao Prémio Saramago, vendeu dez vezes mais do que
        [[work:joao-tordo/as-tres-vidas|As Três Vidas]], mas uma crítica no
        Expresso (então com uma tiragem de cerca de 250 mil exemplares)
        desancou o livro e deixou-o, nas suas próprias palavras, destroçado e
        inseguro quanto ao futuro. O livro seguinte,
        [[work:joao-tordo/anatomia-dos-martires|Anatomia dos Mártires]],
        tornou-se aquilo a que chamou um pesadelo: quase um ano de falsos
        começos sob a pressão auto-imposta de escrever algo tão bom como o
        livro premiado, até decidir escrever o que lhe apetecia.
    - id: tordo-farewell-letter-father-2014
      title: Publica uma carta de despedida quando o pai emigra
      description: >
        O pai, o cantor Fernando Tordo, então com 65 anos e descontente com o
        país em crise, emigrou para o Recife, no Brasil. João publicou no seu
        blogue uma carta dirigida a ele ("Ontem, o meu pai foi-se embora..."),
        reproduzida na íntegra pelo Público, que circulou amplamente;
        Fernando Tordo respondeu-lhe publicamente no Facebook dias depois. Um
        dos raros momentos em que as vidas públicas do filho e do pai
        conhecido se cruzam diretamente.
    - id: tordo-crime-turn-2019
      title: Vira-se para a ficção policial
      description: >
        Com [[work:joao-tordo/a-noite-em-que-o-verao-acabou|A Noite em que o
        Verão Acabou]], Tordo passa para o registo policial, logo ancorado na
        investigadora da PSP Pilar Benamor. Uma reinvenção deliberada e
        assumida, não um desvio pontual.
    - id: tordo-namora-prize-2021
      title: Vence o Prémio Fernando Namora com Felicidade
      description: >
        [[work:joao-tordo/felicidade|Felicidade]] arrecada o Prémio Fernando
        Namora, distinção para a qual já fora finalista no início da carreira:
        uma confirmação a meio do percurso.
