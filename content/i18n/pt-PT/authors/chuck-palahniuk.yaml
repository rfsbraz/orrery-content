# Overlay pt-PT do autor: bio + prosa dos lifeEvents.
# Os lifeEvents ficam aninhados sob o autor e são fundidos por id (ver
# SCHEMA.md, "Nested lists merge by id"). Levam `title` + `description`, que
# são prosa; datas, impact e sources nunca se traduzem, nem o nome do autor.
- id: chuck-palahniuk
  bio: >
    Romancista norte-americano, o nome mais conhecido da ficção transgressiva.
    Nasceu em Pasco, Washington, tirou o curso de jornalismo na Universidade do
    Oregon em 1986, escreveu manuais de reparação como mecânico de diesel na
    Freightliner e foi voluntário num serviço de cuidados paliativos antes de
    publicar seja o que for. Chegou à ficção pouco depois dos trinta anos, pela
    oficina de escrita de Tom Spanbauer em Portland, cujo minimalismo despido e
    físico é a voz de tudo o que escreveu desde então. O seu primeiro romance,
    [[work:chuck-palahniuk/fight-club|Clube de Combate]] (1996), foi uma edição
    de capa dura modesta até o filme de 1999 mandar os leitores de volta a ele.
    Foi membro da Cacophony Society de Portland, cujas partidas e desmandos
    usou como modelo para o Project Mayhem e mais tarde descreveu em
    [[work:chuck-palahniuk/fugitives-and-refugees|Fugitives and Refugees]].
  lifeEvents:
    - id: palahniuk-born-1962
      title: Nasce em Pasco, Washington
      description: >
        Criado no leste do estado de Washington; curso de jornalismo na
        Universidade do Oregon em 1986, depois anos de trabalho manual e de
        voluntariado antes de qualquer ficção. Só começa a escrever romances
        depois dos trinta.

    - id: palahniuk-spanbauer-workshop-1991
      title: 'A oficina de Spanbauer e a "escrita perigosa"'
      description: >
        Palahniuk entra na oficina de escrita de Tom Spanbauer, em Portland. O
        método de Spanbauer, a que ele chamava escrita perigosa, exige um
        minimalismo extremo e que o escritor trabalhe a partir do corpo e
        daquilo que mais o assusta. É o maior facto técnico sobre Palahniuk: as
        frases cortadas, os refrões repetidos, a segunda pessoa e a recusa de
        explicação interior saem todos desses cinco anos, e todos os livros
        seguintes são escritos nessa voz.

    - id: palahniuk-fight-club-origin-1995
      title: Uma recusa, uma sova sobre a qual ninguém perguntou, e sete páginas
      description: >
        O romance que veio a ser
        [[work:chuck-palahniuk/invisible-monsters|Monstros invisíveis]] foi
        escrito primeiro e recusado pelas editoras por ser perturbador demais.
        A resposta de Palahniuk foi escrever coisa pior. A semente foi sua: foi
        espancado numa acampada, voltou ao trabalho com a cara visivelmente
        desfeita e descobriu que os colegas não lhe perguntavam nada. O
        resultado foi um conto de sete páginas, "Fight Club", publicado na
        compilação Pursuit of Happiness de 1995 e mais tarde expandido no
        romance, onde sobrevive como capítulo seis.

    - id: palahniuk-father-murdered-1999
      title: O homicídio de Fred Palahniuk
      description: >
        Fred, pai de Palahniuk, e a companheira Donna Fontaine foram mortos
        perto de Kendrick, Idaho, em maio de 1999, pelo antigo companheiro de
        Fontaine, Dale Shackelford, condenado em 2000 por dois homicídios
        qualificados e sentenciado à morte na primavera de 2001. Palahniuk foi
        chamado a participar na decisão de pedir essa pena e disse ter escrito
        [[work:chuck-palahniuk/lullaby|Lullaby canção de embalar]], um romance
        sobre um homem que descobre que pode matar quem quiser, para lidar com
        ter participado nela. Os livros de um lado e do outro são obra de
        alguém a pensar se uma pessoa pode decidir a morte de outra. A pena em
        si não se manteve: a história como costuma contar-se acaba no corredor
        da morte, mas depois da decisão Ring v. Arizona do Supremo Tribunal
        dos Estados Unidos a pena de morte foi anulada, e em junho de 2011
        Shackelford voltou a ser condenado, desta vez a duas penas de prisão
        perpétua consecutivas, sem possibilidade de liberdade condicional.

    - id: palahniuk-discloses-relationship-2003
      title: Uma revelação antecipada, e depois um pedido de desculpa
      description: >
        Em digressão pela Europa e convencido de que um perfil da Entertainment
        Weekly estava prestes a expor a sua vida privada, Palahniuk publicou
        uma mensagem áudio no seu próprio site a revelar uma relação de onze
        anos com um homem. O artigo publicado nunca mencionou a sua vida
        privada. Dias depois pediu desculpa pelo que dissera sobre quem
        assinava o perfil, dizendo que o fizera por raiva e por medo. Vale a
        pena saber isto antes de ler os romances sobre a masculinidade
        representada e sobre o que os homens não dizem uns aos outros.

    - id: palahniuk-agency-embezzlement-2018
      title: 'O desfalque na Donadio & Olson'
      description: >
        Em maio de 2018, Palahniuk percebeu porque é que o seu rendimento
        vinha a encolher há anos. Darin Webb, o contabilista da sua agência
        literária nova-iorquina, a Donadio & Olson, desviava dinheiro dos
        clientes desde 2011, cerca de 3,4 milhões de dólares ao todo, dos
        quais 1,44 milhões eram de Palahniuk. Ele passara esses anos a culpar
        publicamente a pirataria e as editoras lentas a pagar; no seu próprio
        site escreveu que todos os direitos de autor, adiantamentos e
        pagamentos de opções para cinema acumulados na sua conta de autor
        tinham desaparecido. Webb declarou-se culpado e foi condenado a dois
        anos de prisão em dezembro de 2018, no mesmo mês em que a própria
        agência entrou em insolvência. É o facto discreto por baixo da estante
        tardia: daqui em diante, um escritor perto dos sessenta anos está a
        reconstruir um rendimento que julgava estar apenas a escapar-lhe.

    - id: palahniuk-spanbauer-dies-2024
      title: A morte de Tom Spanbauer
      description: >
        Tom Spanbauer, cuja oficina de Portland deu a Palahniuk a voz de todos
        os livros que escreveu, morreu a 21 de setembro de 2024, aos 78 anos,
        ao fim de cerca de oito anos de doença de Parkinson. Palahniuk
        anunciou a morte na sua própria newsletter, reconhecendo Spanbauer
        como o escritor que ensinou, a ele e a muitos outros, o estilo do
        minimalismo. [[work:chuck-palahniuk/consider-this|Consider This]] é,
        entre outras coisas, o livro dessa dívida, e lê-se agora como um
        memorial.
