# Overlay pt-PT para Jo Nesbø: a bio e os títulos e a prosa dos lifeEvents,
# aninhados e fundidos por id. O nome do autor nunca é traduzido, e nenhuma
# estrutura (datas, impact) é restabelecida aqui.
# Citações diretas ficam na língua em que foram efetivamente ditas (mesma
# convenção de events.yaml desta ala e de gillian-flynn/events.yaml):
# traduzi-las substituiria as palavras de Nesbø por outras que ele nunca
# disse.

- id: jo-nesbo
  bio: >
    Autor policial e músico norueguês, nascido em Oslo e criado em Molde.
    Formou-se em economia na Norwegian School of Economics (1986) e
    trabalhou como analista financeiro e corretor, ao mesmo tempo que era
    vocalista da banda country-pop Di Derre, cujo segundo álbum atingiu
    duplo platina na Noruega. Escreveu o primeiro romance,
    [[work:jo-nesbo/flaggermusmannen|O Morcego]] (1997), que apresenta o
    detetive alcoólico de Oslo, Harry Hole, alegadamente durante e depois
    de uma longa estadia em Sydney; o livro venceu o Prémio Riverton e a
    Chave de Vidro, e Nesbø deixou as finanças pela escrita no ano
    seguinte. A série Harry Hole conta desde então catorze romances, a par
    de uma série paralela de livros infantis Doktor Proktor (a partir de
    2007), dos romances policiais autónomos que compõem o resto do seu
    catálogo, de uma releitura de Macbeth em 2018 para a coleção Hogarth
    Shakespeare, e de duas coletâneas de contos (2021). Segundo a própria
    editora, os seus livros já venderam mais de 60 milhões de exemplares em
    todo o mundo, em mais de 50 línguas. Vive em Oslo.
  lifeEvents:
    - id: nesbo-father-eastern-front-1975
      title: Descobre que o pai combateu pela Alemanha na guerra
      description: >
        Aos quinze anos, o pai de Nesbø, Per, sentou-o e contou-lhe que,
        aos dezoito, se tinha voluntariado para a Frente Oriental sob
        comando alemão durante a Segunda Guerra Mundial, cumprindo depois
        uma pena de três anos de prisão por isso. Nesbø descreveu essa
        conversa como o momento em que sentiu, pela primeira vez, "a lot of
        distance" de um pai que conhecia e admirava, e como algo que
        moldou a forma como passou a ver as pessoas e as escolhas que
        fazem. Uma obra construída em torno de homens moralmente
        comprometidos que cruzam uma linha e depois têm de viver no mundo
        que criaram - a própria violência e o vício de Harry Hole, o
        narrador assassino de [[work:jo-nesbo/blod-pa-sno|Sangue na
        Neve]] - remonta a uma conversa real sobre uma escolha real, e não
        a uma invenção de romancista.

    - id: nesbo-debut-1997
      title: Escreve uma estreia best-seller entre as finanças e a música
      description: >
        Nesbø escreveu [[work:jo-nesbo/flaggermusmannen|O Morcego]]
        enquanto trabalhava como analista financeiro e era vocalista dos Di
        Derre, tendo, ao que consta, terminado grande parte do livro
        durante e depois de uma longa estadia no King's Cross de Sydney,
        que se torna o próprio cenário do romance. Enviado à sua futura
        editora, a Aschehoug, sob o pseudónimo "Kim Erik Lokker", para que o
        nome já reconhecível de Nesbø na música não influenciasse a
        leitura, o livro venceu o Prémio Riverton de melhor romance
        policial norueguês e a Chave de Vidro de melhor romance policial
        nórdico do ano. Nesbø deixou as finanças pela escrita a tempo
        inteiro no ano seguinte.

    - id: nesbo-doctor-proctor-2007
      title: Inicia uma segunda carreira, em paralelo, a escrever para crianças
      description: >
        No mesmo ano em que [[work:jo-nesbo/snomannen|O Boneco de Neve]] se
        tornou o romance norueguês mais vendido de sempre até então, Nesbø
        publicou Doktor Proktors prompepulver, o seu primeiro livro
        infantil, dando início à série Doktor Proktor. Ao longo da década
        seguinte, a série cresceu para cinco livros e foi, segundo a sua
        editora, um enorme sucesso por direito próprio - o que explica
        porque é que uma bibliografia construída em torno de detetives
        alcoólicos e assassinos contratados também contém um inventor que
        arma crianças em idade escolar com pó de peidos.

    - id: nesbo-climbing-8a-2023
      title: "Alcança um objetivo de escalada que a si próprio impusera, com três anos de atraso, aos 62"
      description: >
        Nesbø começou a escalar a sério por volta dos 50 anos e, segundo o
        próprio contou ao site de escalada 8a.nu, deu-se dois anos, aos 59,
        para subir o seu grau de 7b+ até um redpoint de 8a francês; levou
        três. Descreve o projeto como uma espécie de método de ator
        aplicado a um livro planeado sobre escaladores que ultrapassaram os
        próprios limites: "in order to get into the heads of these
        achievers, I needed to push my own limits, to set a goal that
        bordered on unrealistic." Chama à ascensão eventual a sua última
        escalada de recorde pessoal, e diz estar a começar a sua "descent
        with a smile" no rosto - o mesmo cultivo deliberado do medo que,
        segundo as suas próprias palavras em 2012, alimenta Harry Hole.
