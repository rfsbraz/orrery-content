# Tradução pt-PT. bio + lifeEvents (título e descrição); as datas, o impacto
# e as fontes nunca se traduzem. As listas encaixadas fundem-se pelo id (ver
# SCHEMA.md), pelo que cada lifeEvent traz apenas id/title/description.

- id: valter-hugo-mae
  bio: >
    Romancista e poeta português, nascido em Vila Henrique de Carvalho
    (hoje Saurimo), Angola, então parte da Angola colonial portuguesa.
    Passou a infância em Paços de Ferreira antes de a família se fixar em
    Vila do Conde (Caxinas) em 1980, onde ainda vive. É licenciado em
    Direito e tem uma pós-graduação em Literatura Portuguesa Moderna e
    Contemporânea pela Universidade do Porto. Estreou-se como poeta nos
    anos 90, co-fundou a pequena editora Quasi Edições em 1999 e, na
    década de 2000, escreveu quatro romances publicados inteiramente sem
    maiúsculas, recebidos como a "tetralogia das minúsculas":
    [[work:valter-hugo-mae/o-nosso-reino|O Nosso Reino]] (2004),
    [[work:valter-hugo-mae/o-remorso-de-baltazar-serapiao|o remorso de
    baltazar serapião]] (2006),
    [[work:valter-hugo-mae/o-apocalipse-dos-trabalhadores|o apocalipse
    dos trabalhadores]] (2008) e
    [[work:valter-hugo-mae/a-maquina-de-fazer-espanhois|a máquina de
    fazer espanhóis]] (2010). O segundo destes valeu-lhe o Prémio José
    Saramago de 2007 e tornou-o um nome conhecido. Continuou a escrever
    ficção que passa pelo Portugal medieval, pelo Japão, pela Islândia,
    pela Madeira e pelo Brasil colonial, além de livros infantis, contos
    e prosa autobiográfica, trabalhando também como artista plástico,
    apresentador de televisão e cantor. Em 2026 continua a publicar e não
    há indicação de que se tenha reformado.
  lifeEvents:
    - id: vhm-born-1971
      title: Nasce em Angola
      description: >
        Nasce em Vila Henrique de Carvalho (hoje Saurimo), no que era
        então a Angola portuguesa. A família muda-se para o território
        continental português, primeiro para Paços de Ferreira e depois,
        a partir de 1980, para a vila piscatória de Vila do Conde
        (Caxinas), onde vive desde então.

    - id: vhm-quasi-edicoes-1999
      title: Co-funda a editora Quasi Edições
      description: >
        Co-funda a pequena editora Quasi Edições, trabalhando na edição
        até 2004. Os anos dentro do ofício, a editar e a produzir livros
        de outros autores, precedem e enquadram a sua própria chegada
        como romancista, já nessa década.

    - id: vhm-saramago-prize-2007
      title: Vence o Prémio José Saramago com o remorso de baltazar serapião
      description: >
        [[work:valter-hugo-mae/o-remorso-de-baltazar-serapiao|o remorso
        de baltazar serapião]], o segundo dos quatro romances das
        "minúsculas", vence a quinta edição do bienal Prémio José
        Saramago (para um escritor lusófono com menos de 40 anos). O
        próprio José Saramago, ainda em vida, chamou ao livro um
        "tsunami literário" e disse sentir estar a testemunhar um novo
        nascimento da língua portuguesa - um elogio público, vindo do
        escritor que dá nome ao prémio, que transforma um poeta de
        pequena editora num nome das letras portuguesas da noite para o
        dia.

    - id: vhm-multidisciplinary-2007
      title: Torna-se cantor e realiza a primeira exposição individual
      description: >
        No mesmo ano em que o remorso de baltazar serapião vence o
        Prémio José Saramago, Mãe torna-se vocalista dos Governo, uma
        banda formada com dois músicos dos Mão Morta (segue-se um EP,
        "Propaganda Sentimental", em 2009 pela Optimus Discos), e realiza
        a sua primeira exposição individual de desenho, na Galeria
        Símbolo, no Porto. A prática nas artes plásticas continua: mais
        tarde ilustra os seus próprios livros infantis, entre eles
        [[work:valter-hugo-mae/serei-sempre-o-teu-abrigo|Serei Sempre o
        Teu Abrigo]] (2020).

    - id: vhm-portugal-telecom-2012
      title: Vence o Grande Prémio Portugal Telecom com a máquina de fazer espanhóis
      description: >
        [[work:valter-hugo-mae/a-maquina-de-fazer-espanhois|a máquina de
        fazer espanhóis]] (2010), o quarto e último romance do percurso
        das "minúsculas", vence o 10º Grande Prémio Portugal Telecom de
        Literatura - Melhor Livro e Melhor Romance do ano - confirmando
        um autor em meio de carreira que já vai bem para lá da estreia
        premiada, e entra na corrente principal das letras do país.

    - id: vhm-ape-prize-2021
      title: Vence o Grande Prémio de Romance e Novela da APE com Contra Mim
      description: >
        [[work:valter-hugo-mae/contra-mim|Contra Mim]], construído a
        partir de cerca de quinze anos de notas fragmentárias sobre a
        sua própria infância e adolescência, vence o Grande Prémio de
        Romance e Novela 2020 da Associação Portuguesa de Escritores
        (atribuído em junho de 2021) entre 61 obras a concurso - um
        livro autobiográfico recebido, e premiado, em pé de igualdade
        com a sua ficção.

    - id: vhm-two-losses-2023
      title: Perde uma amiga de sempre e um sobrinho
      description: >
        Uma artista plástica e amiga próxima de trinta anos morre em
        Vila do Conde, aos 70 anos. A sua morte, e a perda anterior de
        um sobrinho adolescente, são os dois lutos por trás de
        [[work:valter-hugo-mae/educacao-da-tristeza|Educação da
        Tristeza]] (2025), cuja dedicatória lhes pertence.
