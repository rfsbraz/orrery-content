# Portuguese (pt-PT) overlay for the co-author bio. `name`, `aka` and `sources`
# are never translated. None of the Gaiman titles named here has been given a
# published Portuguese title in this catalogue, so they stay in English.

- id: neil-gaiman
  bio: >
    Autor inglês de fantasia em romance, banda desenhada e cinema (The Sandman,
    American Gods, Coraline), que escreveu
    [[work:terry-pratchett/good-omens|Good Omens]] com Terry Pratchett em 1990, os
    dois a trocar o manuscrito por correio e por telefone.
