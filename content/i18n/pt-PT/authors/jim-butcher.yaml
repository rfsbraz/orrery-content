# Overlay pt-PT do autor: bio + prosa dos lifeEvents.
# Os lifeEvents ficam aninhados sob o autor e são fundidos por id (ver
# SCHEMA.md, "Nested lists merge by id"). Levam `title` + `description`, que
# são prosa; datas, impact e sources nunca se traduzem, nem o nome do autor.
- id: jim-butcher
  bio: >
    Romancista norte-americano, nascido em Independence, Missouri, o mais
    novo de três irmãos. As duas irmãs mais velhas apresentam-lhe a fantasia
    e a ficção científica, entregando-lhe O Senhor dos Anéis e os romances
    de Han Solo para passar o tempo durante uma doença de infância. Escreveu
    a sua estreia, [[work:jim-butcher/storm-front|Storm Front]], como
    exercício técnico de uma aula de escrita, lançando em 2000 a série de
    fantasia contemporânea em curso The Dresden Files. Entre romances de
    Dresden escreveu os seis livros da fantasia épica Codex Alera
    (2004-2009), completa, e a partir de 2015 a série steampunk Cinder
    Spires, ainda em curso. Já declarou que as três séries não partilham
    universo nem personagens. O seu filho, James J. Butcher, é também
    romancista de fantasia publicado.
  lifeEvents:
    - id: jim-butcher-born-1971
      title: Nasce em Independence, Missouri
      description: >
        O mais novo de três irmãos. As duas irmãs mais velhas apresentam-lhe
        a fantasia e a ficção científica enquanto ele está de cama com uma
        amigdalite, lendo-lhe O Senhor dos Anéis e os romances de Han Solo.

    - id: jim-butcher-storm-front-exercise
      title: Uma aposta na aula de escrita dá origem a Storm Front
      description: >
        Como aluno do curso de escrita de Deborah Chester, Butcher resiste à
        abordagem sistemática da professora para a construção de enredos.
        Quando ela sugere que experimente um romance ao estilo dos livros de
        Anita Blake, de Laurell K. Hamilton, e de Buffy, a Caçadora de
        Vampiros, ambos já admirados por ele, Butcher propõe-se provar que o
        método dela está errado seguindo-o à risca. O resultado, que precisa
        de pouca revisão, é
        [[work:jim-butcher/storm-front|Storm Front]] - o livro que dá origem
        a The Dresden Files. Descreveu a experiência como "uma lição valiosa
        de humildade."

    - id: jim-butcher-storm-front-published-2000
      title: Storm Front é publicado, após dois anos a tentar vender o manuscrito
      description: >
        Butcher oferece o manuscrito de Storm Front a várias editoras
        durante dois anos, antes de percorrer o circuito de convenções para
        conhecer contactos da indústria. A agente Ricia Mainhardt, que
        descobriu Laurell K. Hamilton, assina com ele depois de o conhecer
        pessoalmente, e a Roc/Penguin publica
        [[work:jim-butcher/storm-front|Storm Front]] em brochura seis meses
        depois - o início de uma carreira de escrita que, um quarto de
        século depois, ainda assenta sobretudo nesta única série.

    - id: jim-butcher-codex-alera-bet-2003
      title: Uma aposta tola no fórum de escrita da Del Rey dá origem a Codex Alera
      description: >
        No então recente Del Rey Online Writers' Workshop, Butcher discute,
        em maiúsculas e a plenos pulmões, que um escritor suficientemente
        competente consegue fazer funcionar qualquer premissa, por mais
        fraca que seja. Desafiado a prová-lo, ele próprio sobe a aposta -
        "porque não me dão DUAS ideias terríveis... e eu uso as DUAS" - e
        recebe Legião Romana Perdida e Pokémon, nas suas próprias palavras,
        "foi assim que Alera nasceu." Constrói com elas o mundo de magia
        elemental de inspiração romana de Alera. A Ace vence uma disputa
        entre editoras pelo resultado em março de 2003;
        [[work:jim-butcher/furies-of-calderon|Furies of Calderon]] é
        publicado no ano seguinte como o primeiro de seis, uma série
        completa concebida para responder a uma aposta, e não para dar
        continuidade a The Dresden Files.
