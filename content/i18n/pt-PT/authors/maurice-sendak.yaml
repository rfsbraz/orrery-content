# Portuguese (pt-PT) overlay for the co-author bio. `name`, `aka` and `sources`
# are never translated. The cited titles keep their original form: no verified
# Portuguese edition was available to the curator.

- id: maurice-sendak
  bio: >
    Ilustrador e autor de literatura infantil norte-americano, conhecido
    sobretudo por "Where the Wild Things Are". Os cenários e figurinos que
    desenhou em 1997 para a ópera "Hansel and Gretel" foram associados
    postumamente à recontagem de Stephen King em
    [[work:stephen-king/hansel-and-gretel|Hansel and Gretel]].
