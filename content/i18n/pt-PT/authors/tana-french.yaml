# Overlay pt-PT da autora: bio + prosa dos lifeEvents.
# Os lifeEvents ficam aninhados sob a autora e são fundidos por id (ver
# SCHEMA.md, "Nested lists merge by id"). Levam `title` + `description`, que
# são prosa; datas, impact e sources nunca se traduzem, nem o nome da
# autora.

- id: tana-french
  bio: >
    Romancista policial e atriz de teatro, nascida nos Estados Unidos e de
    nacionalidade irlandesa. Nascida em Burlington, no Vermont, filha de um
    economista cujo trabalho levou a família a viver na Irlanda, em Itália
    e no Maláui durante a infância, estudou no Trinity College Dublin,
    formou-se como atriz profissional e vive em Dublin desde 1990. Trabalhou
    em teatro, cinema e trabalhos de voz ao longo da casa dos vinte anos,
    escrevendo o romance de estreia
    [[work:tana-french/in-the-woods|Desaparecidos]] (2007) nos intervalos
    entre castings; o livro venceu os prémios Edgar, Anthony, Macavity e
    Barry de melhor romance de estreia e deu início à série de seis livros
    da Brigada de Homicídios de Dublin, que muda o detetive principal de
    livro para livro à medida que personagens secundárias regressam para
    assumir o caso seguinte. Seguiu-se o romance autónomo
    [[work:tana-french/the-witch-elm|The Witch Elm]] (2018) e a trilogia de
    Cal Hooper, ambientada no interior rural da Irlanda
    ([[work:tana-french/the-searcher|The Searcher]],
    [[work:tana-french/the-hunter|The Hunter]] e
    [[work:tana-french/the-keeper|The Keeper]], 2020-2026). Vive em Dublin
    com o marido e as duas filhas.
  lifeEvents:
    - id: french-born-1973
      title: Nasce no Vermont, cresce em quatro países
      description: >
        Nasceu Tana Elizabeth French, em Burlington, no Vermont, filha de
        Elena Hvostoff-Lombardi e de David French, economista que
        trabalhava em gestão de recursos para o mundo em desenvolvimento.
        As colocações do pai levaram a família à Irlanda, a Itália, aos
        Estados Unidos e ao Maláui durante a sua infância, uma criação
        itinerante e de quem olha de fora para dentro que volta a surgir
        nos seus próprios forasteiros de ficção: o sotaque inglês
        inventado de Rob Ryan em
        [[work:tana-french/in-the-woods|Desaparecidos]], e, de forma mais
        literal, o detetive reformado de Chicago que se muda para a
        Irlanda rural na trilogia de Cal Hooper.

    - id: french-settles-dublin-1990
      title: Fixa-se em definitivo em Dublin
      description: >
        Matriculou-se no Trinity College Dublin e formou-se aí como atriz
        profissional; vive em Dublin desde então. Todos os seus dez
        romances até hoje se passam na Irlanda, e todos menos a trilogia de
        Cal Hooper na própria Dublin, o que faz da cidade e da sua Brigada
        de Homicídios a constante contra a qual investiga o seu elenco
        rotativo de detetives.

    - id: french-debut-written-between-castings-2007
      title: Escreve um romance de estreia entre trabalhos de atriz
      description: >
        Formada e a trabalhar como atriz de teatro, cinema e voz ao longo
        da casa dos vinte anos, French escreveu
        [[work:tana-french/in-the-woods|Desaparecidos]] já na casa dos
        trinta, durante os intervalos de meses entre castings. O livro
        venceu, em 2008, os prémios Edgar, Anthony, Macavity e Barry de
        melhor romance de estreia e tornou-a, na expressão do The
        Independent, "a primeira-dama do crime irlandês" - uma viragem de
        carreira, de interpretar palavras alheias para escrever detetives
        cujo traço definidor é a forma convincente como representam, uns
        para os outros e para os seus suspeitos.
