# Português europeu (pt-PT) - biografia e prosa dos acontecimentos de vida.
# O nome do autor, as datas, os ids e as fontes ficam intocados. As citações
# em português já existentes no texto de base mantêm-se textuais, sem serem
# traduzidas de volta para um português diferente do que o autor disse.

- id: jose-luis-peixoto
  bio: >
    Nasceu em Galveias, uma aldeia do concelho de Ponte de Sor, no Alto
    Alentejo, onde viveu até partir, aos dezoito anos, para a Universidade
    Nova de Lisboa, onde se licenciou em línguas e literaturas modernas
    (estudos ingleses e alemães). Deu aulas em escolas portuguesas e na
    Praia, em Cabo Verde, antes de passar a escritor a tempo inteiro em
    2001, o ano a seguir à sua estreia,
    [[work:jose-luis-peixoto/morreste-me|Morreste-me]] (2000). O seu segundo
    livro, [[work:jose-luis-peixoto/nenhum-olhar|Nenhum Olhar]] (2000),
    venceu o Prémio José Saramago em 2001, tornando-o, aos 27 anos, o mais
    jovem vencedor da história do prémio. A crítica tem-no colocado ao lado
    de Faulkner e de Rulfo pela forma como o fantástico convive com o
    quotidiano na sua ficção, e os seus livros, traduzidos em mais de trinta
    línguas, levaram a ficção de língua portuguesa a mercados onde nunca
    tinha chegado: foi o primeiro autor de língua portuguesa traduzido e
    publicado na Arménia (2019), na Geórgia (2017) e na Mongólia (2016). A
    sua obra move-se livremente entre formas - romances enraizados no
    Alentejo e na história portuguesa, alegoria, poesia, literatura de
    viagens, livros infantis, teatro e crónicas de jornal - e em 2003
    estendeu-se, uma vez, à música, escrevendo a novela
    [[work:jose-luis-peixoto/antidoto|Antídoto]] ao lado da banda de gothic
    metal Moonspell, como gémea literária do álbum The Antidote. Continua a
    publicar em 2026.
  lifeEvents:
    - id: peixoto-fathers-death
      title: A morte do pai molda a sua estreia
      description: >
        Peixoto já disse diretamente, nas suas próprias palavras, que não
        teria escrito os livros que escreveu sem a perda do pai: "Sem essa
        perda, não teria escrito os livros que escrevi... Esse pequeno
        livro é a fundação de tudo o que haveria de vir". O seu primeiro
        livro, [[work:jose-luis-peixoto/morreste-me|Morreste-me]] (2000),
        uma coletânea de ficções interligadas que confronta a morte de um
        pai, é lido pela crítica portuguesa como o mais diretamente
        autobiográfico dos seus livros, exatamente por essa razão.

    - id: peixoto-saramago-prize-2001
      title: O mais jovem vencedor de sempre do Prémio José Saramago
      description: >
        [[work:jose-luis-peixoto/nenhum-olhar|Nenhum Olhar]] vence a
        segunda edição do Prémio José Saramago, atribuído ao melhor romance
        publicado em todo o espaço de língua portuguesa nos dois anos
        anteriores. Aos 27 anos, Peixoto torna-se o mais jovem escritor de
        sempre a vencê-lo, um recorde que a vitória de Valter Hugo Mãe em
        2007 (aos 36 anos) não quebrou. O prémio leva o próprio nome de
        José Saramago e, segundo a imprensa portuguesa da época, o seu aval
        pessoal, e transforma um romancista estreante num nome das letras
        portuguesas da noite para o dia.

    - id: peixoto-moonspell-antidoto-2003
      title: Escreve uma novela a par de The Antidote, dos Moonspell
      description: >
        Peixoto acompanha a composição do álbum The Antidote, dos
        Moonspell, escrevendo [[work:jose-luis-peixoto/antidoto|Antídoto]]
        como o seu par literário: cada canção corresponde a um capítulo, e
        o livro e o disco são lançados em conjunto. É a única vez em que a
        sua ficção nasce diretamente da música de outro artista, e não de
        matéria própria, e a razão pela qual "songwriter" figura entre as
        categorias em que a Wikipedia o classifica.

    - id: peixoto-oceanos-prize-2016
      title: Vence o Prémio Oceanos com Galveias
      description: >
        [[work:jose-luis-peixoto/galveias|Galveias]] (2014), passado na sua
        própria terra natal, vence o Oceanos - Prémio de Literatura em
        Língua Portuguesa, o principal prémio literário pan-lusófono,
        abrangendo Portugal, o Brasil e os países africanos de língua
        portuguesa. O romance é depois o primeiro livro de língua
        portuguesa traduzido e publicado na Geórgia (2017) e vence o Best
        Translation Award do Japão em 2019.

    - id: peixoto-nabeiro-almoco-de-domingo-2019
      title: A biografia de um estranho, proposta depois de o ver na televisão
      description: >
        Em 2019, no lançamento de
        [[work:jose-luis-peixoto/autobiografia|Autobiografia]] - um romance
        sobre um jovem escritor a quem é pedido que escreva a biografia de
        José Saramago - Manuel Rui Nabeiro, fundador da Delta Cafés, então
        com 88 anos, viu Peixoto a ser entrevistado na televisão e, sem
        ainda o conhecer pessoalmente, pediu para ser posto em contacto com
        ele. Propôs que Peixoto escrevesse a sua própria biografia. O
        resultado,
        [[work:jose-luis-peixoto/almoco-de-domingo|Almoço de Domingo]]
        (2021), transforma a premissa de um romance na forma como o
        seguinte veio a ser escrito. Nabeiro morreu em março de 2023, dois
        anos depois da publicação; Peixoto chamou-lhe "alguém muito
        especial", uma amizade que tinha crescido bem para lá do próprio
        livro.

    - id: peixoto-montanha-closes-circle-2025
      title: Um serviço de oncologia pede-lhe um livro, e anos depois ele diz que sim
      description: >
        Anos antes de o escrever, médicos do Instituto Português de
        Oncologia (IPO) do Porto pediram a Peixoto que escrevesse um livro
        reunindo histórias de doentes; manteve-se interessado, mas o
        projeto, então pensado como um volume coletivo, foi sendo adiado.
        Voltou a ele depois de reencontrar um desses médicos, e acabou por
        o reformular como um romance,
        [[work:jose-luis-peixoto/a-montanha|A Montanha]] (2025), tecido a
        partir de testemunhos reais de doentes do IPO. Questionado sobre a
        razão de, finalmente, ter dito que sim, Peixoto remeteu diretamente
        para a sua própria estreia: "Era um tema que, sob um ponto de vista
        autobiográfico e também da obra, uma vez que tenho o livro
        Morreste-me, que fala sobre a morte do meu pai, me interessava".
