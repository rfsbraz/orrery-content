# European Portuguese (pt-PT) overlay for the author entity.
# The author `name`, the aka list, the pseudonyms and the sources are never
# translated. Only the bio and the lifeEvent prose.
#
# The inline reference to the series renders as "A Roda do Tempo", the name
# Bertrand Editora uses for the Portuguese collection.
- id: robert-jordan
  bio: >
    Pseudónimo de James Oliver Rigney Jr., autor norte-americano de
    [[work:wheel-of-time/the-eye-of-the-world|A Roda do Tempo]], uma das
    sequências que definiram a fantasia épica. Nascido em Charleston, na Carolina
    do Sul, cumpriu duas comissões no Vietname como atirador de helicóptero antes
    de se dedicar à escrita - ficção histórica, pastiches de Conan e, por fim, o
    mundo secundário em catorze volumes que ocupou as duas últimas décadas da sua
    vida. Morreu em 2007 com a série a um volume do fim, deixando notas extensas a
    partir das quais [[author:brandon-sanderson|Brandon Sanderson]] a completou.
  lifeEvents:
    - id: rj-born-1948
      title: Nasce em Charleston, na Carolina do Sul
      description: >
        Charleston continua a ser a sua casa durante toda a vida, e as cadências
        da cidade correm por baixo da formalidade cortês e antiquada da sua prosa.
    - id: rj-vietnam-1968
      title: Duas comissões no Vietname como atirador de helicóptero
      description: >
        Rigney cumpriu duas comissões no Exército dos Estados Unidos, recebendo a
        Distinguished Flying Cross, a Bronze Star com "V" e duas Cruzes de
        Galantaria vietnamitas. O olhar do soldado - a logística, o comando, o
        peso dos homens que cumprem uma ordem - dá chão às vastas batalhas dos
        livros posteriores.
    - id: rj-amyloidosis-2006
      title: Anuncia o diagnóstico de amiloidose
      description: >
        Rigney comunica aos seus leitores que lhe foi diagnosticada amiloidose
        cardíaca, uma doença rara do sangue, e que a sobrevivência mediana
        apontada é de quatro anos. Promete publicamente contrariar as
        probabilidades e terminar a série, e escreve
        [[work:wheel-of-time/knife-of-dreams|Knife of Dreams]] e boa parte do
        final contra o relógio. Toda a série gira em torno deste momento.
    - id: rj-death-2007
      title: Morre com a série por terminar
      description: >
        Rigney morre em Charleston aos 58 anos, com o volume final por escrever
        mas exaustivamente planeado: notas, cenas ditadas e um desfecho já
        definido que partilhara com a família. São essas notas que tornam possível
        a conclusão e que moldam cada página do que se segue; a alma desta série
        está na lacuna que ele deixou e na forma como lhe foi dada resposta.
