# European Portuguese (pt-PT) overlay for the author entity.
# The author `name`, the aka list, the pseudonyms and the sources are never
# translated. Only the bio and the lifeEvent prose.
#
# The inline reference to the series renders as "A Roda do Tempo", the name
# Bertrand Editora uses for the Portuguese collection.
- id: robert-jordan
  bio: >
    Pseudónimo de James Oliver Rigney Jr., autor norte-americano de
    [[work:robert-jordan/the-eye-of-the-world|A Roda do Tempo]], uma das
    sequências que definiram a fantasia épica. Nascido em Charleston, na Carolina
    do Sul, cumpriu duas comissões no Vietname como atirador de helicóptero antes
    de se dedicar à escrita: os romances históricos
    [[work:robert-jordan/the-fallon-blood|Fallon]] como Reagan O'Neal, um western
    como Jackson O'Reilly, sete romances de
    [[work:robert-jordan/conan-the-invincible|Conan]] e, por fim, o mundo
    secundário em catorze volumes que ocupou as duas últimas décadas da sua vida.
    Morreu em 2007 com a série a um volume do fim, deixando notas extensas a
    partir das quais [[author:brandon-sanderson|Brandon Sanderson]] a completou;
    o primeiro romance que escreveu,
    [[work:robert-jordan/warrior-of-the-altaii|Warrior of the Altaii]], só saiu
    postumamente, em 2019.
  lifeEvents:
    - id: rj-born-1948
      title: Nasce em Charleston, na Carolina do Sul
      description: >
        Charleston continua a ser a sua casa durante toda a vida, e as cadências
        da cidade correm por baixo da formalidade cortês e antiquada da sua prosa.
    - id: rj-vietnam-1968
      title: Duas comissões no Vietname como atirador de helicóptero
      description: >
        Rigney cumpriu duas comissões no Exército dos Estados Unidos, recebendo a
        Distinguished Flying Cross, a Bronze Star com "V" e duas Cruzes de
        Galantaria vietnamitas. O olhar do soldado - a logística, o comando, o
        peso dos homens que cumprem uma ordem - dá chão às vastas batalhas dos
        livros posteriores.
    - id: rj-injury-ends-engineering-1977
      title: Uma lesão no joelho põe fim à carreira de engenheiro
      description: >
        Rigney estudou física em The Citadel depois do Vietname, formou-se em
        1974 e trabalhava para a Marinha dos Estados Unidos como engenheiro
        nuclear, projetando testes e fazendo a revisão de reatores em navios
        de guerra, quando uma queda entre a doca seca e o seu gabinete lhe
        lesiona gravemente o joelho e o obriga a um internamento prolongado.
        Aborrecido com o que lhe dão para ler no hospital, atira um livro
        pelo quarto fora e, segundo o relato de Harriet McDougal, diz-lhe:
        "I can do better than that." Escreve
        [[work:robert-jordan/warrior-of-the-altaii|Warrior of the Altaii]] e
        demite-se do lugar de engenheiro para escrever a tempo inteiro. Toda
        a carreira, e a série de catorze volumes que se segue, nasce de um
        engenheiro aborrecido e ferido a responder a um mau romance.
    - id: rj-marries-mcdougal-1981
      title: Casa com a sua editora, Harriet McDougal
      description: >
        Um livreiro de Charleston põe Rigney em contacto com a editora
        Harriet McDougal depois de Warrior of the Altaii não encontrar
        comprador; em vez de o editar, ela pede-lhe algo novo, e
        [[work:robert-jordan/the-fallon-blood|The Fallon Blood]] (1980)
        torna-se o seu primeiro livro publicado, pela chancela dela própria,
        a Popham Press. Começam a namorar, e um jogo de Dungeons & Dragons
        que McDougal dirige com o filho, Will, fornece uma semente inicial
        daquilo que se torna
        [[work:robert-jordan/the-eye-of-the-world|A Roda do Tempo]].
        Consciente de que está prestes a casar com a sua única fonte de
        rendimento, Rigney deixa de publicar pela Popham Press antes do
        casamento: os livros seguintes vão para outras editoras, embora
        McDougal continue a editá-los. É a este casamento, e a esta editora,
        que a Tor recorre em 2007 para decidir como terminar a série.
    - id: rj-amyloidosis-2006
      title: Anuncia o diagnóstico de amiloidose
      description: >
        Rigney comunica aos seus leitores que lhe foi diagnosticada amiloidose
        cardíaca, uma doença rara do sangue, e que a sobrevivência mediana
        apontada é de quatro anos. Promete publicamente contrariar as
        probabilidades e terminar a série, e escreve
        [[work:robert-jordan/knife-of-dreams|Knife of Dreams]] e boa parte do
        final contra o relógio. Toda a série gira em torno deste momento.
    - id: rj-death-2007
      title: Morre com a série por terminar
      description: >
        Rigney morre em Charleston aos 58 anos, com o volume final por escrever
        mas exaustivamente planeado: notas, cenas ditadas e um desfecho já
        definido que partilhara com a família. São essas notas que tornam possível
        a conclusão e que moldam cada página do que se segue; a alma desta série
        está na lacuna que ele deixou e na forma como lhe foi dada resposta.
