# European Portuguese (pt-PT) overlay for the author entity.
# The author `name` and the sources are never translated. Only bio and
# lifeEvent prose.
#
# Series names inside the prose use the Portuguese collection names in print:
# "O Arquivo das Tempestades" (Kathartika) and "A Roda do Tempo" (Bertrand).
# "Mistborn" and "Cosmere" stay in the original: Saída de Emergência published
# the trilogy as "Mistborn - Nascida nas Brumas", keeping the English word.
# The three Wheel of Time volumes Sanderson completed keep their English
# titles: the Portuguese edition of the series does not reach them.
- id: brandon-sanderson
  bio: >
    Autor norte-americano de fantasia e ficção científica, nascido em Lincoln,
    no Nebraska. Um construtor de mundos prolífico e de espírito sistemático,
    mais conhecido pelo [[franchise:brandon-sanderson|Cosmere]] - um único universo
    interligado que sustenta [[work:brandon-sanderson/elantris|Elantris]], a saga Mistborn
    e [[work:brandon-sanderson/the-way-of-kings|O Arquivo das Tempestades]] - e pela sua
    filosofia de "magia dura", sistemas mágicos coerentes e regidos por regras.
    À volta desse núcleo publicou muito mais: a série de ópera espacial
    [[work:brandon-sanderson/skyward|Skyward]], o policial de super-heróis Reckoners
    ([[work:brandon-sanderson/steelheart|Steelheart]]), os livros juvenis Alcatraz, as
    novelas [[work:brandon-sanderson/legion|Legion]] e um fluxo constante de volumes
    autónomos, originais em áudio e colaborações. Completou
    [[franchise:robert-jordan|A Roda do Tempo]] de Robert Jordan após a morte
    deste - esses três volumes,
    [[work:robert-jordan/the-gathering-storm|The Gathering Storm]],
    [[work:robert-jordan/towers-of-midnight|Towers of Midnight]] e
    [[work:robert-jordan/a-memory-of-light|A Memory of Light]], pertencem à saga
    de Jordan e estão catalogados aí. Dá há muitos anos um curso de escrita
    criativa na Brigham Young University e, em 2022, lançou o Kickstarter mais
    financiado da história da plataforma.
  lifeEvents:
    - id: sanderson-born-1975
      title: Nasce em Lincoln, no Nebraska
      description: >
        Cresce como leitor indiferente até um professor lhe pôr nas mãos um
        romance de fantasia, ainda no ensino básico; o género torna-se o trabalho
        da sua vida.
    - id: sanderson-korea-mission-1995
      title: Uma missão mórmon na Coreia semeia a magia de Elantris
      description: >
        Sanderson tira uma licença de dois anos na Brigham Young University
        para cumprir uma missão da Igreja de Jesus Cristo dos Santos dos
        Últimos Dias em Seul, escrevendo num caderno de esboços nos dias
        livres enquanto os companheiros de missão jogam pingue-pongue. Mais
        tarde atribui à imersão na língua coreana a origem do sistema de
        magia baseado na linguagem do seu eventual romance de estreia,
        [[work:brandon-sanderson/elantris|Elantris]]: "My very first
        published novel, Elantris, used Korean linguistics as a foundation
        for part of the language, and the magic in that world is
        language-based."
    - id: sanderson-byu-trunk-novels
      title: Os anos na BYU e os romances na gaveta
      description: >
        A trabalhar em turnos da noite num hotel para poder escrever, Sanderson
        redigiu treze romances enquanto estudava na Brigham Young University. A
        maioria nunca foi publicada, mas a pilha de recusas construiu a disciplina
        e a cosmologia partilhada que viria a ser o Cosmere.
        [[work:brandon-sanderson/elantris|Elantris]] foi o sexto deles - o primeiro que
        conseguiu vender.
    - id: sanderson-cosmere-conceived-2000
      title: O Cosmere é planeado como uma obra única, desde o início
      description: >
        Ainda inédito, Sanderson decide não escrever uma sequência de
        continuações passadas num só mundo, por considerar que uma editora
        que rejeite o primeiro livro não vai ler o segundo, e que mundos
        autónomos se vendem mais facilmente vindos de um autor novo. Mas,
        querendo a epopeia interligada com que cresceu a sonhar, começa
        ainda assim a ligar discretamente os seus romances de gaveta, a
        começar por [[work:brandon-sanderson/elantris|Elantris]] e pelo seu
        companheiro ainda inédito, Dragonsteel, a que chama "a hidden epic,
        mostly for myself." Mais tarde aponta como inspiração Isaac Asimov,
        que ligou entre si as séries Robot e Foundation já perto do fim da
        carreira, e propõe-se construir essas ligações desde o primeiro
        dia, em vez de as acrescentar depois.
    - id: sanderson-elantris-debut-2005
      title: Elantris é publicado, a estreia
      description: >
        O editor Moshe Feder compra [[work:brandon-sanderson/elantris|Elantris]] para a Tor,
        pondo fim a anos de recusas e lançando uma carreira. O posfácio deixa
        abertamente entender que este mundo é um entre muitos, semeando o Cosmere
        para os leitores.
    - id: sanderson-wot-succession-2007
      title: Escolhido para terminar A Roda do Tempo
      description: >
        Após a morte de Robert Jordan, a sua mulher e editora Harriet McDougal
        escolhe Sanderson - então um autor relativamente recente - para completar
        A Roda do Tempo, convencida pelo seu primeiro romance de Mistborn,
        [[work:brandon-sanderson/the-final-empire|O Império Final]]. O trabalho transforma-o
        num nome grande da fantasia e molda o seu ofício no Cosmere.
    - id: sanderson-byu-lectures
      title: As aulas de escrita criativa da BYU tornam-se públicas
      description: >
        O curso universitário de Sanderson sobre escrita de ficção científica e
        fantasia é filmado e publicado gratuitamente online, chegando a milhões de
        pessoas e consolidando a reputação de professor de ofício mais aberto do
        género - a figura pública feita de produtividade e método que define a sua
        imagem.
    - id: sanderson-words-of-radiance-2014
      title: Palavras de Radiância e o auge de O Arquivo das Tempestades
      description: >
        [[work:brandon-sanderson/words-of-radiance|Palavras de Radiância]] estreia-se em
        primeiro lugar na lista do New York Times, confirmando O Arquivo das
        Tempestades como o pilar do Cosmere e Sanderson como uma das grandes vozes
        da fantasia épica da sua geração.
    - id: sanderson-kickstarter-2022
      title: 'O recorde do Kickstarter dos "Quatro Romances Secretos"'
      description: >
        Ao revelar que escrevera discretamente romances adicionais durante a
        pandemia, Sanderson lança um Kickstarter que termina como o mais
        financiado da história da plataforma: 185 341 apoiantes e cerca de 41,75
        milhões de dólares. Remodela o seu negócio em torno da sua própria
        empresa, a Dragonsteel, e dá origem aos lançamentos do "Ano de Sanderson",
        em 2023.
