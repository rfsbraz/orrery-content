# European Portuguese (pt-PT) overlay for the author entity.
# The author `name` and the sources are never translated. Only bio and
# lifeEvent prose.
#
# Series names inside the prose use the Portuguese collection names in print:
# "O Arquivo das Tempestades" (Kathartika) and "A Roda do Tempo" (Bertrand).
# "Mistborn" and "Cosmere" stay in the original: Saída de Emergência published
# the trilogy as "Mistborn - Nascida nas Brumas", keeping the English word.
- id: brandon-sanderson
  bio: >
    Autor norte-americano de fantasia épica, nascido em Lincoln, no Nebraska. Um
    construtor de mundos prolífico e de espírito sistemático, mais conhecido pelo
    [[franchise:cosmere|Cosmere]] - um único universo interligado que sustenta
    [[work:cosmere/elantris|Elantris]], a saga Mistborn e
    [[work:cosmere/the-way-of-kings|O Arquivo das Tempestades]] - e pela sua
    filosofia de "magia dura", sistemas mágicos coerentes e regidos por regras.
    Completou A Roda do Tempo de Robert Jordan após a morte deste, dá há muitos
    anos um curso de escrita criativa na Brigham Young University e, em 2022,
    lançou o Kickstarter mais financiado da história da plataforma.
  lifeEvents:
    - id: sanderson-born-1975
      title: Nasce em Lincoln, no Nebraska
      description: >
        Cresce como leitor indiferente até um professor lhe pôr nas mãos um
        romance de fantasia, ainda no ensino básico; o género torna-se o trabalho
        da sua vida.
    - id: sanderson-byu-trunk-novels
      title: Os anos na BYU e os romances na gaveta
      description: >
        A trabalhar em turnos da noite num hotel para poder escrever, Sanderson
        redigiu treze romances enquanto estudava na Brigham Young University. A
        maioria nunca foi publicada, mas a pilha de recusas construiu a disciplina
        e a cosmologia partilhada que viria a ser o Cosmere.
        [[work:cosmere/elantris|Elantris]] foi o sexto deles - o primeiro que
        conseguiu vender.
    - id: sanderson-elantris-debut-2005
      title: Elantris é publicado, a estreia
      description: >
        O editor Moshe Feder compra [[work:cosmere/elantris|Elantris]] para a Tor,
        pondo fim a anos de recusas e lançando uma carreira. O posfácio deixa
        abertamente entender que este mundo é um entre muitos, semeando o Cosmere
        para os leitores.
    - id: sanderson-wot-succession-2007
      title: Escolhido para terminar A Roda do Tempo
      description: >
        Após a morte de Robert Jordan, a sua mulher e editora Harriet McDougal
        escolhe Sanderson - então um autor relativamente recente - para completar
        A Roda do Tempo, convencida pelo seu primeiro romance de Mistborn,
        [[work:cosmere/the-final-empire|O Império Final]]. O trabalho transforma-o
        num nome grande da fantasia e molda o seu ofício no Cosmere.
    - id: sanderson-byu-lectures
      title: As aulas de escrita criativa da BYU tornam-se públicas
      description: >
        O curso universitário de Sanderson sobre escrita de ficção científica e
        fantasia é filmado e publicado gratuitamente online, chegando a milhões de
        pessoas e consolidando a reputação de professor de ofício mais aberto do
        género - a figura pública feita de produtividade e método que define a sua
        imagem.
    - id: sanderson-words-of-radiance-2014
      title: Palavras de Radiância e o auge de O Arquivo das Tempestades
      description: >
        [[work:cosmere/words-of-radiance|Palavras de Radiância]] estreia-se em
        primeiro lugar na lista do New York Times, confirmando O Arquivo das
        Tempestades como o pilar do Cosmere e Sanderson como uma das grandes vozes
        da fantasia épica da sua geração.
    - id: sanderson-kickstarter-2022
      title: 'O recorde do Kickstarter dos "Quatro Romances Secretos"'
      description: >
        Ao revelar que escrevera discretamente romances adicionais durante a
        pandemia, Sanderson lança um Kickstarter que termina como o mais
        financiado da história da plataforma: 185 341 apoiantes e cerca de 41,75
        milhões de dólares. Remodela o seu negócio em torno da sua própria
        empresa, a Dragonsteel, e dá origem aos lançamentos do "Ano de Sanderson",
        em 2023.
