# Portuguese (pt-PT) overlay for the co-author bio. `name`, `aka` and `sources`
# are never translated.

- id: ian-stewart
  bio: >
    Matemático britânico e prolífico divulgador científico, professor emérito
    da Universidade de Warwick. Com o biólogo [[author:jack-cohen|Jack Cohen]]
    escreveu os quatro livros de The Science of Discworld, que alternam a
    narrativa do Discworld de Pratchett com ensaios de ciência do mundo real.
