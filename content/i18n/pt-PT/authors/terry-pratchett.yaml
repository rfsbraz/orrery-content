# Portuguese (pt-PT) overlay for Terry Pratchett: the bio plus the life-event
# titles and prose. Life events are listed as flat entries keyed by their own
# stable ids, which the validator resolves. The author's name is never
# translated.

- id: terry-pratchett
  bio: >
    Autor inglês de fantasia cómica, mais conhecido pela série
    [[franchise:discworld|Discworld]], composta por 41 romances. Antigo
    jornalista e assessor de imprensa, escreveu
    [[work:discworld/the-colour-of-magic|A Cor da Magia]] (1983) como uma paródia
    afetuosa à espada e feitiçaria e passou três décadas a transformar o Disco
    num veículo para algumas das sátiras sociais e morais mais afiadas da ficção
    inglesa contemporânea. Um dos autores mais vendidos do Reino Unido, foi feito
    cavaleiro em 2009. Diagnosticado com Alzheimer precoce em 2007, continuou a
    escrever, nos últimos anos por ditado, até morrer em 2015.

- id: pratchett-born-1948
  title: Nasce em Beaconsfield, Buckinghamshire
  description: >
    Criado em Buckinghamshire; deixou a escola aos 17 anos para se dedicar ao
    jornalismo e trabalhou como repórter e, mais tarde, como assessor de imprensa
    do setor da energia, antes de passar a escrever a tempo inteiro.

- id: pratchett-fulltime-writer-1987
  title: Deixa o emprego para escrever a tempo inteiro
  description: >
    Depois de terminar [[work:discworld/mort|Mort]], o quarto romance do
    Discworld, Pratchett deixou o lugar de assessor de imprensa do Central
    Electricity Generating Board para escrever a tempo inteiro. A produção que se
    seguiu, cerca de um ou dois romances por ano durante duas décadas, fez do
    Disco um mundo inteiro.

- id: pratchett-obe-1998
  title: Nomeado OBE por serviços prestados à literatura
  description: >
    Um primeiro aceno das instituições a um escritor que ainda era muitas vezes
    arrumado na prateleira do "género". Pratchett gracejou que esses tais
    "serviços prestados à literatura" deviam consistir em abster-se de tentar
    escrevê-la.

- id: pratchett-alzheimers-2007
  title: "Anuncia um Alzheimer precoce: \"an embuggerance\""
  description: >
    Em dezembro de 2007, Pratchett revelou um diagnóstico de atrofia cortical
    posterior, uma forma rara e precoce de Alzheimer a que chamou "an
    embuggerance". Tornou-o público para fazer campanha por mais investigação e
    para continuar a trabalhar às claras; a mortalidade e os mecanismos da memória
    pesam mais nos romances que se seguem.

- id: pratchett-knighthood-2009
  title: Feito cavaleiro por serviços prestados à literatura
  description: >
    Nomeado Knight Bachelor nas Honras de Ano Novo de 2009. Fiel a si próprio,
    forjou depois a sua própria espada com ferro de meteorito para a ocasião.

# "Shaking Hands with Death" is the lecture's own title, kept in English.
- id: pratchett-dimbleby-lecture-2010
  title: "A conferência Dimbleby: \"Shaking Hands with Death\""
  description: >
    Pratchett aproveitou a conferência Richard Dimbleby da BBC de 2010 para
    defender a morte assistida (o termo que preferia a "suicídio assistido"). A
    doença dificultava-lhe a leitura, pelo que a maior parte do texto foi lida
    pelo seu amigo Tony Robinson. A campanha tornou-se a causa pública que definiu
    os seus últimos anos.

- id: pratchett-death-2015
  title: Morre aos 66 anos
  description: >
    Pratchett morreu em casa a 12 de março de 2015, com o gato a dormir na sua
    cama. O seu assistente Rob Wilkins anunciou-o na voz da própria Morte, em
    versaletes, no Twitter do próprio Pratchett: "AT LAST, SIR TERRY, WE MUST WALK
    TOGETHER."

- id: pratchett-hard-drive-crushed-2017
  title: A obra inacabada esmagada por um cilindro a vapor
  description: >
    Cumprindo um desejo explícito, o espólio de Pratchett mandou destruir o disco
    rígido que guardava a sua obra inacabada: foi esmagado por um cilindro a vapor
    John Fowler de época, na Great Dorset Steam Fair, e depois passado por uma
    britadeira. Aquilo que não tinha terminado, não queria ver terminado por
    outras mãos.
