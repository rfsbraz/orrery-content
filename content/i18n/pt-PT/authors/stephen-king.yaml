# Overlay pt-PT do autor: bio + prosa dos lifeEvents.
# Os lifeEvents ficam aninhados sob o autor e são fundidos por id (ver
# SCHEMA.md, "Nested lists merge by id"). Levam `title` + `description`, que
# são prosa; datas, impact e sources nunca se traduzem, nem o nome do autor.
- id: stephen-king
  bio: >
    Autor norte-americano de terror, sobrenatural, suspense, policial e
    fantasia. Nasceu em Portland, Maine, e foi professor de Inglês no ensino
    secundário até [[work:stephen-king/carrie|Carrie]] (1974) lhe lançar a
    carreira. Um dos autores mais vendidos de sempre, com uma obra vagamente
    unificada por um multiverso comum centrado na Torre Negra.
  lifeEvents:
    - id: king-born-1947
      title: Nasce em Portland, Maine
      description: >
        Cresceu sobretudo em Durham, Maine, que viria a ser o cenário e a alma
        de grande parte da sua ficção.

    - id: king-marries-tabitha-1971
      title: Casa com Tabitha Spruce
      description: >
        Casa com a também escritora Tabitha, a sua primeira leitora para toda a
        vida e, dois anos depois, a razão por que
        [[work:stephen-king/carrie|Carrie]] existe.

    - id: carrie-rescued-from-trash-1973
      title: Tabitha resgata do lixo o manuscrito de Carrie
      description: >
        Desanimado, King deitou fora as primeiras páginas de
        [[work:stephen-king/carrie|Carrie]]; Tabitha resgatou-as do lixo e
        disse-lhe para continuar. A venda que se seguiu permitiu-lhe deixar o
        ensino e escrever a tempo inteiro, a charneira de toda a sua carreira.

    - id: king-addiction-1980s
      title: O agravamento da dependência de álcool e cocaína
      description: >
        Ao longo dos seus anos mais prolíficos e bem-sucedidos, King escreveu
        agarrado à dependência: já disse que mal se lembra de ter escrito
        [[work:stephen-king/cujo|Cujo]]. A dependência e as suas metáforas
        impregnam a obra da década.

    - id: bachman-unmasked-1985
      title: Richard Bachman é desmascarado
      description: >
        Um funcionário de uma livraria liga King ao seu pseudónimo. King "mata"
        Bachman e mais tarde canaliza o episódio para
        [[work:stephen-king/the-dark-half|A Metade Sombria]].

    - id: king-intervention-sobriety-1987
      title: A intervenção da família e o caminho para a sobriedade
      description: >
        Tabitha e a família encenam uma intervenção; King fica sóbrio no final
        da década de 1980. A obra dos anos 90 torna-se marcadamente mais
        introspetiva e psicológica.

    - id: king-van-accident-1999
      title: Acidente quase fatal na berma da estrada
      description: >
        Uma carrinha atropela King enquanto este caminha perto de casa e
        estilhaça-lhe a perna e a anca. A dor crónica e a consciência da morte
        remodelam a obra posterior e empurram-no a terminar finalmente a Torre
        Negra, na qual o acidente acaba escrito.

    - id: king-national-book-medal-2003
      title: Medalha da National Book Foundation para Contributo Notável
      description: >
        Uma distinção outrora polémica para um escritor "popular", que ajudou a
        consolidar a sua reavaliação como autor americano a sério. (A National
        Medal of Arts chega em 2015.)
