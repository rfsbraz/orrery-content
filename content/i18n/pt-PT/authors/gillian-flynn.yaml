# Overlay pt-PT da autora: bio + prosa dos lifeEvents.
# Os lifeEvents ficam aninhados sob a autora e são fundidos por id (ver
# SCHEMA.md, "Nested lists merge by id"). Levam `title` + `description`, que
# são prosa; datas, impact e sources nunca se traduzem, nem o nome da
# autora.
- id: gillian-flynn
  bio: >
    Romancista, argumentista e produtora norte-americana, natural de Kansas
    City, no Missouri, conhecida pela ficção policial centrada em
    personagens sobre as falsas aparências da vida doméstica no Midwest.
    Licenciou-se em Inglês e Jornalismo na Universidade do Kansas, tirou
    depois um mestrado na Medill School of Journalism da Northwestern, e
    trabalhou como redatora e, mais tarde, crítica de televisão na
    Entertainment Weekly, de 1998 até ser despedida em 2008. Ao romance de
    estreia, [[work:gillian-flynn/sharp-objects|Sharp Objects]] (2006),
    seguiram-se [[work:gillian-flynn/dark-places|Dark Places]] (2009) e
    [[work:gillian-flynn/gone-girl|Gone Girl]] (2012), que se tornou um
    fenómeno cultural e ajudou a consolidar o thriller de narrador pouco
    fiável como categoria comercial própria. Desde que adaptou Gone Girl
    para o cinema em 2014, tem escrito com regularidade para cinema e
    televisão a par da ficção: o argumento de
    [[work:gillian-flynn/widows|Widows]] (2018, com Steve McQueen), três
    episódios da minissérie da HBO
    [[work:gillian-flynn/sharp-objects-tv|Sharp Objects]] (2018), e a
    criação e escrita integral de [[work:gillian-flynn/utopia|Utopia]]
    (2020), da Amazon. Em 2021 foi escolhida para dirigir a sua própria
    chancela, a Gillian Flynn Books, na editora independente Zando; em 2025
    trabalhava num quarto romance para a Penguin Random House, e uma
    minissérie da HBO a adaptar Dark Places, da qual é co-criadora e
    co-showrunner, tinha sido anunciada mas ainda não tinha estreado.
  lifeEvents:
    - id: flynn-born-1971
      title: Nasce em Kansas City, cresce a ver filmes de terror
      description: >
        Nasceu Gillian Schieber Flynn, em Kansas City, no Missouri, e
        cresceu no bairro de Coleman Highlands; os pais eram ambos
        professores, a mãe de leitura e compreensão, o pai de cinema.
        Descreveu uma infância dolorosamente tímida, passada a ler e a
        escrever, e atribuiu ao gosto do pai por filmes de terror o
        despertar do seu interesse pelas histórias sombrias.

    - id: flynn-ew-layoff-2008
      title: Despedida da Entertainment Weekly
      description: >
        Depois de uma década como redatora e, mais tarde, crítica de
        televisão na Entertainment Weekly, Flynn foi despedida em dezembro
        de 2008, na mesma recessão que serve de pano de fundo a
        [[work:gillian-flynn/gone-girl|Gone Girl]]: tanto Nick como Amy
        Dunne perdem os seus empregos na imprensa por causa da mesma crise,
        e é isso que os arrasta para fora de Nova Iorque e para o casamento
        que o romance passa a desfazer.

    - id: flynn-anxious-no-novel-2018
      title: Ansiosa, seis anos sem romance desde Gone Girl
      description: >
        No outono de 2018, Flynn já tinha adaptado o seu próprio
        [[work:gillian-flynn/gone-girl|Gone Girl]] para o cinema, escrito
        três episódios da minissérie Sharp Objects da HBO e coescrito
        Widows com Steve McQueen, mas não publicava um romance desde Gone
        Girl, em 2012. "I am starting to get anxious because I haven't
        published a book since Gone Girl," disse à revista Interview
        nesse novembro, "aside from The Grownup. I've done a lot of
        screenwriting, but that's different." A frase, dita por ela
        própria a meio da sequência de trabalho para ecrã que preencheu o
        intervalo, é o relato mais direto e documentado de como o
        silêncio entre romances se sentia, por dentro dele.

    - id: flynn-zando-imprint-2021
      title: Torna-se editora
      description: >
        Flynn foi escolhida para dirigir a Gillian Flynn Books, uma nova
        chancela na editora independente Zando, a par de uma chancela
        paralela de Lena Waithe. Situa-se dentro do longo intervalo entre
        [[work:gillian-flynn/gone-girl|Gone Girl]] e o quarto romance cuja
        escrita confirmou em 2023, e marca uma viragem para o lado mais
        empresarial dos livros, a par de continuar a escrevê-los.
