# Portuguese (pt-PT) overlay for the co-author bio. `name`, `aka` and `sources`
# are never translated. The Xeelee sequence and the Long Earth novels have no
# published Portuguese titles in this catalogue, so they stay in English.

- id: stephen-baxter
  bio: >
    Autor inglês de ficção científica dura, nascido em 1957 em Liverpool,
    conhecido pela sequência Xeelee; escreveu com Terry Pratchett os cinco
    romances do [[work:discworld/the-long-earth|Long Earth]] entre 2012 e 2016.
