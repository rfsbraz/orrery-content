# Overlay pt-PT dos eventos globais (partilhados por todas as obras).
# Apenas prosa: `title` + `description`. As datas, o alcance, o impacto e as
# fontes nunca sao traduzidos.
- id: sept-11-2001
  title: Atentados de 11 de Setembro
  description: >
    Ataques coordenados contra os Estados Unidos; uma rutura cultural que
    moldou uma década de inquietações na ficção ocidental.

- id: financial-crisis-2008
  title: Crise financeira global
  description: >
    O colapso e a recessão de 2008; um pano de fundo de precariedade económica
    e de desconfiança nas instituicoes.

- id: covid-19-pandemic-2020
  title: Declarada a pandemia de COVID-19
  description: >
    Uma pandemia global e os confinamentos; um período de isolamento e de
    mortalidade que tinge a ficção escrita durante e depois dele.

- id: world-war-i-1914
  title: A Primeira Guerra Mundial
  description: >
    A guerra global de 1914-1918, que pôs fim à longa paz europeia, dizimou uma
    geração e deixou o mundo do entreguerras, feito de soldados desmobilizados,
    de neurose de guerra e de certezas abaladas, onde se situa boa parte da
    ficção do início do século XX.

- id: world-war-ii-1939
  title: A Segunda Guerra Mundial
  description: >
    A guerra global de 1939-1945; a guerra total, a Blitz, o racionamento e a
    perda em massa remodelam as sociedades e os escritores que a atravessam, e
    marcam uma linha divisória nas carreiras que a abrangem.

- id: pulp-magazines-1926
  title: Chegam as revistas de género
  description: >
    A Amazing Stories surge como a primeira revista dedicada a um só género, na
    sequência das revistas populares de crime e de fantástico do início da
    década de 1920. A ficção que andava dispersa por publicações generalistas
    passa a ser arrumada em categorias com nome próprio, com leitores,
    convenções e secções de correspondência próprias, e ficam fixados os
    rótulos de prateleira sob os quais se vende o resto do século.

- id: penguin-paperback-1935
  title: O livro de bolso a seis pence
  description: >
    A Penguin Books começa a editar ficção e ensaio em livros de bolso vendidos
    a seis pence em lojas de cadeia e não em livrarias, e imprime um milhão de
    exemplares no espaço de um ano. Ler deixa de ser uma compra de classe média
    e a reedição barata torna-se o formato em que a maior parte dos romances
    chega de facto à maior parte dos leitores.

- id: armed-services-editions-1943
  title: Livros distribuídos aos exércitos
  description: >
    Entre 1943 e 1947, o Council on Books in Wartime distribui mais de 120
    milhões de livros de bolso gratuitos, de mais de 1300 títulos, pelos
    militares norte-americanos. Uma geração regressa a casa já habituada a
    comprar livros como objetos baratos e descartáveis, e é sobre esse hábito
    que se constrói o comércio de livro de bolso das décadas seguintes.

- id: lady-chatterley-trial-1960
  title: O veredicto do caso Lady Chatterley
  description: >
    Um júri de Londres absolve um editor acusado de obscenidade por ter
    publicado sem cortes Lady Chatterley's Lover, de D. H. Lawrence, e fica
    firmado o princípio de que o mérito literário pode defender um livro dessa
    acusação. O limite prático daquilo que um romance em língua inglesa podia
    descrever desloca-se acentuadamente, e é aqui que começam as décadas
    permissivas da edição.

- id: fantasy-paperback-boom-1965
  title: A fantasia torna-se uma categoria de livro de bolso
  description: >
    Duas edições norte-americanas concorrentes de The Lord of the Rings, uma
    não autorizada e outra autorizada, transformam uma trilogia de venda lenta
    num fenómeno universitário que vende um quarto de milhão de exemplares em
    dez meses. Os editores descobrem um público de massas para a ficção longa
    de mundos secundários e nasce a categoria comercial em que se virá a
    escrever a fantasia épica posterior.

- id: carnation-revolution-1974
  title: O fim da censura em Portugal
  description: >
    A Revolução dos Cravos põe fim ao Estado Novo e, com ele, à censura prévia
    que durante quase cinco décadas sujeitou ao lápis azul todos os livros,
    jornais e peças de teatro. Uma literatura inteira deixa de um dia para o
    outro de escrever a contornar o censor e passa a escrever sem ele, e em
    1975 chega uma lei de imprensa sem restrições prévias.

- id: chain-bookshop-1982
  title: As livrarias de cadeia
  description: >
    Ao longo da década de 1980 espalha-se um novo modo de vender livros: lojas
    grandes e de marca própria, com grande profundidade de catálogo, pessoal
    formado e forte destaque de montra e de mesa, que em dez anos se tornam
    cadeias nacionais. Aquilo que uma loja escolhe empilhar à entrada passa a
    decidir o que vende, e os editores começam a comprar e a embalar livros a
    pensar nessa mesa.

- id: online-bookselling-1995
  title: Os livros passam a vender-se online
  description: >
    A Amazon abre como livraria online, com um catálogo que nenhuma loja física
    conseguiria ter. Os fundos de catálogo e os títulos esgotados voltam a
    poder encontrar-se e comprar-se, em vez de desaparecerem discretamente, e a
    prateleira deixa de ser o limite daquilo que um leitor pode alcançar.

- id: ebook-and-self-publishing-2007
  title: O livro eletrónico e a porta aberta da edição
  description: >
    Chega o primeiro Kindle, acompanhado de uma plataforma que permite a
    qualquer pessoa publicar diretamente para ele. Os livros passam a
    descarregar-se a um preço que nenhuma tiragem em papel consegue igualar e,
    pela primeira vez, um escritor pode chegar aos leitores sem que um editor
    tenha primeiro de concordar, o que altera tanto o que se publica como o
    modo como começa uma carreira.

- id: prestige-fantasy-adaptation-2011
  title: A fantasia chega ao centro da cultura
  description: >
    Uma adaptação televisiva de grande orçamento, para público adulto, de uma
    série de fantasia épica torna-se um dos dramas mais vistos do mundo, e o
    género deixa de ser tratado pela televisão como matéria infantil. A
    adaptação ao ecrã passa a ser o destino esperado de uma série de fantasia
    bem-sucedida, e não um extra improvável.

- id: booktok-2020
  title: Os leitores começam a recomendar em escala
  description: >
    A partir de 2020 crescem depressa as comunidades de vídeo curto dedicadas a
    livros, que empurram títulos para as listas de mais vendidos anos depois da
    publicação e levam os editores a comprar obras autopublicadas que ali
    encontraram público. A descoberta desloca-se das críticas e do destaque nas
    livrarias para os leitores a falarem uns com os outros.

- id: portugal-bailout-2011
  title: O resgate financeiro a Portugal e os anos de austeridade
  description: >
    Perante uma crise da dívida soberana, Portugal anuncia que vai pedir um
    resgate conjunto à União Europeia e ao FMI; o programa resultante, de 78
    mil milhões de euros e acordado nesse mês de maio, traz subidas de
    impostos, cortes nos salários e nas pensões e privatizações que mantêm o
    desemprego acima dos 15% durante três anos. A emigração sobe a níveis
    que não se viam desde a década de 1960, com mais de 100 mil pessoas a
    sair todos os anos até 2013 - a chamada quarta vaga emigratória do
    país, segundo os investigadores. O programa de ajustamento decorre até
    Portugal sair dele em meados de 2014.
