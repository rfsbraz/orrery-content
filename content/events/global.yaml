# Global aura events - world / culture / industry events shared across ALL franchises.
# reach: global. Franchise-specific and author-life events live in each franchise's events.yaml.
# See docs/SCHEMA.md for the schema and rules.
# A few high-impact anchors spanning the franchises' eras; keep summaries
# neutral and franchise-agnostic. Grows as franchises are added.

events:
  - id: sept-11-2001
    date: 2001-09-11
    title: September 11 attacks
    scope: world
    reach: global
    impact: med
    description: >
      Coordinated attacks on the United States; a cultural rupture that reshapes
      a decade of anxieties in Western fiction.
    sources: [https://en.wikipedia.org/wiki/September_11_attacks]

  - id: financial-crisis-2008
    date: 2008-09-15
    title: Global financial crisis
    scope: world
    reach: global
    impact: low
    description: >
      The 2008 crash and recession; a backdrop of economic precarity and
      institutional distrust.
    sources: [https://en.wikipedia.org/wiki/2008_financial_crisis]

  - id: covid-19-pandemic-2020
    date: 2020-03-11
    title: COVID-19 pandemic declared
    scope: world
    reach: global
    impact: high
    description: >
      A global pandemic and lockdowns; a period of isolation and mortality that
      colors fiction written during and after it.
    sources: [https://en.wikipedia.org/wiki/COVID-19_pandemic]

  - id: world-war-i-1914
    date: 1914-07-28
    title: The First World War
    scope: world
    reach: global
    impact: med
    description: >
      The 1914-1918 global war that ended the long European peace, drained a
      generation, and left the interwar world of demobilised soldiers, shell
      shock, and shaken certainties in which much early twentieth-century fiction
      is set.
    sources: [https://en.wikipedia.org/wiki/World_War_I]

  - id: world-war-ii-1939
    date: 1939-09-01
    title: The Second World War
    scope: world
    reach: global
    impact: high
    description: >
      The 1939-1945 global war; total war, the Blitz, rationing and mass loss
      reshape the societies and the writers living through it, and mark a hard
      line across the careers that span it.
    sources: [https://en.wikipedia.org/wiki/World_War_II]

  - id: pulp-magazines-1926
    date: 1926-04-01
    title: The genre magazines arrive
    scope: culture
    reach: global
    impact: med
    description: >
      Amazing Stories launches as the first magazine devoted to a single genre,
      following the crime and weird-fiction pulps of the early 1920s. Fiction
      that had been scattered through general-interest magazines is sorted into
      named categories with their own readers, conventions and letter columns,
      and the shelf labels the rest of the century sells under are set.
    sources: [https://en.wikipedia.org/wiki/Amazing_Stories]

  - id: penguin-paperback-1935
    date: 1935-07-30
    title: The sixpenny paperback
    scope: industry
    reach: global
    impact: med
    description: >
      Penguin Books begins issuing serious fiction and non-fiction as sixpenny
      paperbacks sold in chain stores rather than bookshops, printing a million
      copies inside a year. Reading stops being a middle-class purchase, and
      the cheap reprint becomes the format in which most novels actually reach
      most readers.
    sources: [https://en.wikipedia.org/wiki/Penguin_Books]

  - id: armed-services-editions-1943
    date: 1943-10-01
    title: Books issued to the armies
    scope: industry
    reach: global
    impact: low
    description: >
      From 1943 to 1947 the Council on Books in Wartime distributes over 120
      million free pocket paperbacks of more than 1,300 titles to American
      service personnel. A generation returns home already in the habit of
      buying books as cheap disposable objects, and the mass-market paperback
      trade of the following decades is built on that habit.
    sources: [https://en.wikipedia.org/wiki/Armed_Services_Editions]

  - id: lady-chatterley-trial-1960
    date: 1960-11-02
    title: The Lady Chatterley verdict
    scope: culture
    reach: global
    impact: med
    description: >
      A London jury acquits a publisher prosecuted for issuing an unexpurgated
      Lady Chatterley's Lover, establishing that literary merit can defend a
      book against an obscenity charge. The practical limit on what a novel in
      English could describe moves sharply, and the permissive decades of
      publishing that follow start here.
    sources: [https://en.wikipedia.org/wiki/R_v_Penguin_Books_Ltd]

  - id: fantasy-paperback-boom-1965
    date: 1965-10-01
    title: Fantasy becomes a paperback category
    scope: industry
    reach: global
    impact: med
    description: >
      Competing American paperback editions of The Lord of the Rings, one
      unauthorised and one authorised, turn a slow-selling hardback trilogy
      into a campus phenomenon selling a quarter of a million copies in ten
      months. Publishers discover a mass audience for long secondary-world
      fiction, and the commercial category that later epic fantasy is written
      into comes into existence.
    sources: [https://en.wikipedia.org/wiki/The_Lord_of_the_Rings]

  - id: carnation-revolution-1974
    date: 1974-04-25
    title: The end of Portuguese censorship
    scope: world
    reach: global
    impact: med
    description: >
      The Carnation Revolution ends the Estado Novo and with it the prior
      censorship that had vetted every book, newspaper and play in Portugal for
      close to five decades. An entire national literature moves overnight from
      writing around a censor to writing without one, and a press law without
      prior restraint follows in 1975.
    sources:
      - https://en.wikipedia.org/wiki/Carnation_Revolution
      - https://pt.wikipedia.org/wiki/Censura_em_Portugal

  - id: chain-bookshop-1982
    date: 1982-09-01
    title: The chain bookshop
    scope: industry
    reach: global
    impact: low
    description: >
      A new style of bookselling spreads through the 1980s: large branded shops
      with deep stock, trained staff and prominent window and table display,
      growing into national chains within a decade. What a shop chooses to pile
      by the door starts to decide what sells, and publishers begin acquiring
      and packaging for that table.
    sources: [https://en.wikipedia.org/wiki/Waterstones]

  - id: online-bookselling-1995
    date: 1995-07-16
    title: Books go on sale online
    scope: industry
    reach: global
    impact: med
    description: >
      Amazon opens as an online bookshop, offering a catalogue no physical shop
      could hold. Backlist and out-of-print titles become findable and buyable
      again rather than quietly disappearing, and the shelf stops being the
      limit on what a reader can reach.
    sources: ["https://en.wikipedia.org/wiki/Amazon_(company)"]

  - id: ebook-and-self-publishing-2007
    date: 2007-11-19
    title: The ebook and the open publishing door
    scope: industry
    reach: global
    impact: med
    description: >
      The first Kindle ships alongside a platform that lets anyone publish
      directly to it. Books become downloadable at a price no print run can
      match, and for the first time a writer can reach readers without a
      publisher agreeing first, reshaping both what gets published and how
      careers begin.
    sources: [https://en.wikipedia.org/wiki/Amazon_Kindle]

  - id: prestige-fantasy-adaptation-2011
    date: 2011-04-17
    title: Fantasy moves to the centre of the culture
    scope: culture
    reach: global
    impact: low
    description: >
      A lavish adult adaptation of an epic fantasy series becomes one of the
      most watched dramas in the world, and the genre stops being something
      television treated as children's material. Screen adaptation becomes the
      expected destination of a successful fantasy series rather than an
      unlikely bonus.
    sources: [https://en.wikipedia.org/wiki/Game_of_Thrones]

  - id: booktok-2020
    date: 2020-06-01
    title: Readers start recommending at scale
    scope: culture
    reach: global
    impact: low
    description: >
      Short-form video communities built around books grow rapidly from 2020,
      pushing titles onto bestseller lists years after publication and sending
      publishers to acquire self-published work that found an audience there.
      Discovery shifts away from reviews and shop display toward readers
      talking to each other.
    sources: [https://en.wikipedia.org/wiki/BookTok]

  - id: portugal-bailout-2011
    date: 2011-04-06
    title: The Portuguese bailout and the austerity years
    scope: world
    reach: global
    impact: med
    description: >
      Facing a sovereign-debt crisis, Portugal announces it will seek a joint
      EU/IMF rescue; the resulting 78 billion euro programme, agreed that May,
      comes with tax rises, wage and pension cuts and privatisations that hold
      unemployment above 15% for three years. Emigration climbs to levels not
      seen since the 1960s, over 100,000 people leaving each year through
      2013 in what researchers call the country's fourth wave. The
      adjustment programme runs until Portugal exits it in mid-2014.
    sources:
      - https://en.wikipedia.org/wiki/2010%E2%80%9314_Portuguese_financial_crisis
      - https://economy-finance.ec.europa.eu/eu-financial-assistance/euro-area-countries/financial-assistance-portugal_en
      - https://www.migrationpolicy.org/research/emigration-portugal-old-wine-new-bottles
