id: bernie-wrightson
name: Bernie Wrightson
aka: ["Berni Wrightson"]
born: 1948-10-27
died: 2017-03-18
bio: >
  American comics artist, co-creator of Swamp Thing and a defining horror
  illustrator; drew the [[work:stephen-king/creepshow|Creepshow]] graphic novel
  and later illustrated editions of
  [[work:stephen-king/cycle-of-the-werewolf|Cycle of the Werewolf]] and
  [[work:stephen-king/the-stand|The Stand]].
sources:
  - https://en.wikipedia.org/wiki/Bernie_Wrightson
