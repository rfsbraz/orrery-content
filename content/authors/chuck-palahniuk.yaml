# Global author entity. Authors are referenced by id from franchises and works
# (authorIds / withAuthorIds), so the same person resolves the same everywhere.
# Author-LIFE events live here (they follow the person); franchise-specific
# events stay in content/franchises/chuck-palahniuk/events.yaml.
#
# Editorial note on restraint: this life contains a murder, a trial, a
# disclosure made under pressure, and a theft discovered late. Each entry below
# is written from what Palahniuk himself has said publicly or from
# contemporaneous reporting, states what changes the reading, and stops there.
# Distress is not content.
id: chuck-palahniuk
name: Chuck Palahniuk
aka: ["Charles Michael Palahniuk"]
born: 1962-02-21
died: null
bio: >
  American novelist, the best-known name in transgressive fiction. Born in
  Pasco, Washington, he took a journalism degree at the University of Oregon in
  1986, wrote repair manuals as a diesel mechanic for Freightliner, and
  volunteered at a hospice before he published anything. He came to fiction in
  his early thirties through Tom Spanbauer's Portland workshop, whose stripped,
  physical minimalism is the voice of everything he has written since. His
  first novel [[work:chuck-palahniuk/fight-club|Fight Club]] (1996) was a
  modest hardcover until the 1999 film sent readers back to it. He was a member
  of Portland's Cacophony Society, whose pranks and rampages he used as the
  model for Project Mayhem and later described in
  [[work:chuck-palahniuk/fugitives-and-refugees|Fugitives and Refugees]].

