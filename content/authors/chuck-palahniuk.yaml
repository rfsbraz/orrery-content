lifeEvents:
  - id: palahniuk-born-1962
    date: 1962-02-21
    title: Born in Pasco, Washington
    impact: low
    description: >
      Raised in eastern Washington state; a journalism degree at the University
      of Oregon in 1986, then years of manual and volunteer work before any
      fiction. He does not start writing novels until his thirties.
    spoilerAfter: null
    sources: [https://en.wikipedia.org/wiki/Chuck_Palahniuk]

  - id: palahniuk-spanbauer-workshop-1991
    date: 1991
    dateRange: "1991-1996"
    title: The Spanbauer workshop and "dangerous writing"
    impact: high
    description: >
      Palahniuk joins Tom Spanbauer's writing workshop in Portland. Spanbauer's
      method, which he called dangerous writing, asks for extreme minimalism and
      for the writer to work from the body and from what frightens them most.
      This is the single largest technical fact about Palahniuk: the clipped
      sentences, the repeated choruses, the second person, and the refusal of
      interior explanation all come out of those five years, and every book
      after is written in that voice.
    spoilerAfter: null
    sources:
      - https://en.wikipedia.org/wiki/Chuck_Palahniuk
      - https://en.wikipedia.org/wiki/Tom_Spanbauer

  - id: palahniuk-fight-club-origin-1995
    date: 1995
    title: A rejection, a beating nobody asked about, and seven pages
    impact: high
    description: >
      The novel that became [[work:chuck-palahniuk/invisible-monsters|Invisible
      Monsters]] was written first and rejected by publishers as too disturbing.
      Palahniuk's answer was to write something worse. The seed was his own: he
      was beaten up on a camping trip, went back to work with his face visibly
      wrecked, and found that his colleagues would not ask him about it. The
      result was a seven-page short story, "Fight Club", published in the 1995
      compilation Pursuit of Happiness and later expanded into the novel, where
      it survives as chapter six.
    spoilerAfter: null
    sources:
      - https://en.wikipedia.org/wiki/Fight_Club_(novel)
      - https://en.wikipedia.org/wiki/Chuck_Palahniuk

  - id: palahniuk-father-murdered-1999
    date: 1999
    title: The murder of Fred Palahniuk
    impact: high
    description: >
      Palahniuk's father Fred and his partner Donna Fontaine were killed near
      Kendrick, Idaho in May 1999 by Fontaine's former partner, Dale
      Shackelford, who was convicted of two counts of first-degree murder in
      2000 and sentenced to death in the spring of 2001. Palahniuk was asked to
      take part in the decision to seek that sentence, and has said he wrote
      [[work:chuck-palahniuk/lullaby|Lullaby]], a novel about a man who
      discovers he can kill people at will, to cope with having participated in
      it. The books either side of it are the work of someone thinking about
      whether a person may decide another person's death. The sentence itself
      did not stand: the received story ends at death row, but after the US
      Supreme Court's Ring v. Arizona ruling the death sentence was set aside,
      and in June 2011 Shackelford was resentenced to two consecutive life
      terms without parole.
    spoilerAfter: null
    sources:
      - https://dnews.com/local/latah-murder-inspires-novel-choke-a-dark-story-of-sexual-addiction/article_e59f0598-74e2-5ef0-b712-e5176dd555cd.html
      - http://www.gobshitequarterly.com/arkive/issue001/morton_lullaby_gobqa_eng.htm
      - https://www.spokesman.com/stories/2011/jun/21/death-penalty-table-shackelford-resentencing/
      - https://en.wikipedia.org/wiki/Lullaby_(Palahniuk_novel)

  - id: palahniuk-discloses-relationship-2003
    date: 2003-09-30
    title: An outing pre-empted, then apologised for
    impact: med
    description: >
      Touring in Europe and convinced that an Entertainment Weekly profile was
      about to out him, Palahniuk posted an audio message to his own website
      disclosing an eleven-year relationship with a man. The published article
      never mentioned his private life. He apologised days later for what he
      had said about the reporter, calling it something he did out of anger and
      fear. It is worth knowing before reading the novels about performed
      masculinity and about what men will not say to each other.
    spoilerAfter: null
    sources:
      - https://www.wweek.com/portland/article-2498-a-hazardous-outing.html
      - https://www.independent.co.uk/arts-entertainment/books/features/chuck-palahniuk-stranger-than-fiction-554764.html

  - id: palahniuk-agency-embezzlement-2018
    date: 2018
    title: "The Donadio & Olson embezzlement"
    impact: med
    description: >
      In May 2018 Palahniuk learned why his income had been shrinking for
      years. Darin Webb, the bookkeeper at his New York literary agency
      Donadio & Olson, had been diverting client money since 2011, some 3.4
      million dollars in all, of which 1.44 million was Palahniuk's. He had
      spent those years publicly blaming piracy and slow-paying publishers;
      on his own site he wrote that all the royalties, advance monies and
      film-option payments that had accumulated in his author's account were
      gone. Webb pleaded guilty and was sentenced to two years in December
      2018, the same month the agency itself filed for bankruptcy. It is the
      quiet fact under the late shelf: from here on, a writer in his late
      fifties is rebuilding an income he had believed was merely leaking.
    spoilerAfter: null
    sources:
      - https://www.publishersweekly.com/pw/by-topic/industry-news/publisher-news/article/78860-darin-webb-gets-two-years-in-prison-for-embezzlement-scheme-that-destroyed-donadio-olson.html
      - https://www.wweek.com/arts/books/2018/06/01/chuck-palahniuks-literary-agency-was-the-victim-of-a-34-million-embezzlement-scheme/
      - https://www.spokesman.com/stories/2018/jun/01/chuck-palahniuk-close-to-broke-as-accountant-faces/

  - id: palahniuk-spanbauer-dies-2024
    date: 2024-09-21
    title: The death of Tom Spanbauer
    impact: low
    description: >
      Tom Spanbauer, whose Portland workshop gave Palahniuk the voice of
      every book he has written, died on 21 September 2024 at 78, after some
      eight years of Parkinson's disease. Palahniuk announced the death in
      his own newsletter, crediting Spanbauer as the writer who taught him,
      and many others, the style of minimalism.
      [[work:chuck-palahniuk/consider-this|Consider This]] is among other
      things the book of that debt, and it reads as a memorial now.
    spoilerAfter: null
    sources:
      - https://www.wweek.com/arts/books/2024/09/24/author-and-writing-teacher-tom-spanbauer-dies-at-78/
      - https://nwbooklovers.org/2024/10/08/rip-tom-spanbauer/

