#
# Portuguese literary novelist. English-language coverage is thin, so this entity
# leans on Portuguese primary sources (his own site, publisher pages, national
# press) per the franchise-research skill's sparse/non-English guidance.
id: joao-tordo
name: João Tordo
aka: ["Joao Tordo"]
born: 1975-08-28
died: null
bio: >
  Portuguese novelist, born in Lisbon. He read philosophy at the Universidade
  Nova de Lisboa and studied journalism and creative writing in London and New
  York, and those years abroad mark his early fiction - cosmopolitan, set in
  hotels and foreign cities, metaphysical and noir-tinged. His breakthrough came
  with [[work:joao-tordo/as-tres-vidas|As Três Vidas]], which won the 2009
  Prémio José Saramago. His work later gathered into the atmospheric island
  trilogy [[work:joao-tordo/o-luto-de-elias-gro|Trilogia dos Lugares Sem Nome]]
  and, from 2019, a turn to crime fiction. He also writes for Portuguese
  television and teaches creative-writing workshops. Son of the singer Fernando
  Tordo.
