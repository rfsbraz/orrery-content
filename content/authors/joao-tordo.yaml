# Global author entity. Authors are referenced by id from franchises and works
# (authorIds / withAuthorIds). Author-LIFE events live here (they follow the
# person); franchise-specific events stay in the franchise.
#
# Portuguese literary novelist. English-language coverage is thin, so this entity
# leans on Portuguese primary sources (his own site, publisher pages, national
# press).
id: joao-tordo
name: João Tordo
aka: ["Joao Tordo"]
born: 1975-08-28
died: null
bio: >
  Portuguese novelist, born in Lisbon. He read philosophy at the Universidade
  Nova de Lisboa and studied journalism and creative writing in London and New
  York, and those years abroad mark his early fiction - cosmopolitan, set in
  hotels and foreign cities, metaphysical and noir-tinged. His breakthrough came
  with [[work:joao-tordo/as-tres-vidas|As Três Vidas]], which won the 2009
  Prémio José Saramago. His work later gathered into the atmospheric island
  trilogy [[work:joao-tordo/o-luto-de-elias-gro|Trilogia dos Lugares Sem Nome]]
  and, from 2019, a turn to crime fiction. He also writes for Portuguese
  television and teaches creative-writing workshops. Son of the singer Fernando
  Tordo.
images:
  portrait: "https://upload.wikimedia.org/wikipedia/commons/thumb/5/59/%40JoaoTordoPF.jpg/960px-%40JoaoTordoPF.jpg"
  portraitCredit: "Pedro Ferreira, CC BY-SA 4.0"
  portraitSource: "https://commons.wikimedia.org/wiki/File:@JoaoTordoPF.jpg"
lifeEvents:
  - id: tordo-born-1975
    date: 1975-08-28
    title: Born in Lisbon
    impact: low
    description: >
      Born in Lisbon, the son of the singer Fernando Tordo (a fixture of
      Portuguese music, best known abroad for Eurovision 1973). The musical
      household is context, not a claim of a music career of his own.
    spoilerAfter: null
    sources: [https://pt.wikipedia.org/wiki/Jo%C3%A3o_Tordo]
  - id: tordo-philosophy-nova
    date: 1998
    title: Reads philosophy at the Universidade Nova de Lisboa
    impact: med
    description: >
      A degree in philosophy that leaves a permanent mark on the fiction: the
      early novels are essayistic and metaphysical as much as narrative. Year is
      approximate (degree completed in the late 1990s).
    spoilerAfter: null
    sources: [https://pt.wikipedia.org/wiki/Jo%C3%A3o_Tordo]
  - id: tordo-creative-writing-london-ny
    date: 2000
    title: Studies journalism and creative writing in London and New York
    impact: med
    description: >
      Formative years abroad that feed the outward-looking settings of the early
      work (foreign cities, expatriate narrators). Dates approximate.
    spoilerAfter: null
    sources: [https://en.wikipedia.org/wiki/Jo%C3%A3o_Tordo]
  - id: tordo-debut-manuscript-2004
    date: 2004
    title: Publishes his debut novel and starts out as a freelance journalist
    impact: high
    description: >
      He finished [[work:joao-tordo/o-livro-dos-homens-sem-luz|O Livro dos
      Homens Sem Luz]] in New York, printed the manuscript himself a dozen
      times, hand-addressed the envelopes and posted them to publishers in
      Portugal. When Temas e Debates wrote back to say they should talk, he
      packed up and left New York, where he had lived more than two years.
      Back in Lisbon he became a freelance journalist, writing for O
      Independente, Sábado and Notícias Magazine, work he later described as
      ill-suited to him (disorganised, afraid of the telephone). The book
      sold around 700 copies in its first year.
    spoilerAfter: null
    sources:
      - https://observador.pt/especiais/joao-tordo-fugi-disto-durante-muito-tempo-porque-e-uma-vida-que-da-medo/
      - https://pt.wikipedia.org/wiki/Jo%C3%A3o_Tordo
  - id: tordo-sp-televisao-as-tres-vidas-2008
    date: 2008
    title: Leaves journalism for screenwriting, and writes As Três Vidas in the Algarve
    impact: high
    description: >
      Around 2006-2007 he gave up freelance journalism, took up translation
      work and joined the production company SP Televisão as a scriptwriter,
      work he kept for about two years. In the summer of 2008 he took leave
      from the job to finish [[work:joao-tordo/as-tres-vidas|As Três Vidas]],
      writing it over two or three months in the Algarve; he returned to the
      company briefly afterward, then resigned without another job lined up.
      The novel, published that September, would win the Prémio José
      Saramago the following year.
    spoilerAfter: null
    sources:
      - https://observador.pt/especiais/joao-tordo-fugi-disto-durante-muito-tempo-porque-e-uma-vida-que-da-medo/
      - https://pt.wikipedia.org/wiki/Jo%C3%A3o_Tordo
  - id: tordo-saramago-prize-2009
    date: 2009-10-17
    title: Wins the Prémio José Saramago for As Três Vidas
    impact: high
    description: >
      The career-making event. The biennial Prémio José Saramago, for a Lusophone
      writer under 40, went to [[work:joao-tordo/as-tres-vidas|As Três Vidas]] -
      a prize awarded once in a lifetime, named for Portugal's only literature
      Nobel laureate, decided the year before Saramago's death. It moved Tordo
      from promising newcomer to a fixed name in Portuguese letters.
    spoilerAfter: null
    sources:
      - https://www.publico.pt/2009/10/18/jornal/premio-jose-saramago-paraas-tres-vidasde-joao-tordo-18039614
      - https://www.rtp.pt/noticias/cultura/joao-tordo-ganha-premio-literario-jose-saramago-com-as-tres-vidas_a287759
  - id: tordo-bom-inverno-identity-crisis-2010
    date: 2010
    title: A scathing review and a paralysing identity crisis follow the prize
    impact: high
    description: >
      [[work:joao-tordo/o-bom-inverno|O Bom Inverno]], published the year
      after the Saramago prize, sold ten times what
      [[work:joao-tordo/as-tres-vidas|As Três Vidas]] had, but a review in
      Expresso (circulation then around 250,000) tore the book apart and left
      him, in his own words, destroyed and unsure of his future. The
      follow-up, [[work:joao-tordo/anatomia-dos-martires|Anatomia dos
      Mártires]], became what he called a nightmare: nearly a year of false
      starts under the self-imposed pressure to write something as good as
      the prize-winning book, before he decided to write what he wanted
      instead.
    spoilerAfter: null
    sources: [https://observador.pt/especiais/joao-tordo-fugi-disto-durante-muito-tempo-porque-e-uma-vida-que-da-medo/]
  - id: tordo-farewell-letter-father-2014
    date: 2014-02-19
    title: Publishes a farewell letter as his father emigrates
    impact: med
    description: >
      His father, the singer Fernando Tordo, then 65 and dissatisfied with a
      crisis-era Portugal, emigrated to Recife, Brazil. João published a
      letter to him on his blog ("Ontem, o meu pai foi-se embora..."),
      reproduced in full by Público, that was widely shared; Fernando Tordo
      answered him publicly on Facebook days later. One of the few moments
      the son's and the well-known father's public lives touch directly.
    spoilerAfter: null
    sources:
      - https://www.publico.pt/2014/02/19/culturaipsilon/cronica/carta-ao-pai-1624299
      - https://www.cmjornal.pt/cultura/detalhe/joao-tordo-escreve-carta-de-despedida-ao-pai
      - https://www.esquerda.net/artigo/fernando-tordo-responde-ao-filho/31432
  - id: tordo-crime-turn-2019
    date: 2019
    title: Turns to crime fiction
    impact: med
    description: >
      With [[work:joao-tordo/a-noite-em-que-o-verao-acabou|A Noite em que o Verão
      Acabou]] Tordo pivots into the crime/detective register, soon anchored by
      the recurring PSP investigator Pilar Benamor. A deliberate, discussed
      reinvention rather than a one-off.
    spoilerAfter: null
    sources: [https://deusmelivro.com/mil-folhas/a-noite-em-que-o-verao-acabou-joao-tordo-1-5-2020/]
  - id: tordo-namora-prize-2021
    date: 2021
    title: Wins the Prémio Fernando Namora for Felicidade
    impact: med
    description: >
      [[work:joao-tordo/felicidade|Felicidade]] takes the Prémio Fernando Namora,
      a prize for which he had been shortlisted earlier in his career - a mid-career
      confirmation.
    spoilerAfter: null
    sources: ["https://www.portaldaliteratura.com/autores.php?autor=848"]
