# Global author entity. Authors are referenced by id from franchises and works
# (authorIds / withAuthorIds). Author-LIFE events live here (they follow the
# person); franchise-specific events stay in the franchise.
#
# Portuguese novelist and poet. English-language coverage is thin outside
# review aggregators, so this entity leans on Portuguese primary sources (his
# own site, the official José Saramago prize page, publisher pages, national
# press: Público, DN, RTP, Observador).
id: valter-hugo-mae
name: Valter Hugo Mãe
aka: ["Valter Hugo Lemos"]  # birth name; "Mãe" is a chosen authorial surname, used for every publication
born: 1971-09-25
died: null
bio: >
  Portuguese novelist and poet, born in Vila Henrique de Carvalho (now
  Saurimo), Angola, then part of Portuguese colonial Angola. He spent his
  childhood in Paços de Ferreira before the family settled in Vila do Conde
  (Caxinas) in 1980, where he still lives. He holds a law degree and a
  postgraduate qualification in Modern and Contemporary Portuguese Literature
  from the University of Porto. He began as a poet in the 1990s, co-founded
  the small press Quasi Edições in 1999, and in the 2000s wrote four novels
  published entirely without capital letters, received as the "tetralogia das
  minúsculas": [[work:valter-hugo-mae/o-nosso-reino|O Nosso Reino]] (2004),
  [[work:valter-hugo-mae/o-remorso-de-baltazar-serapiao|o remorso de baltazar
  serapião]] (2006), [[work:valter-hugo-mae/o-apocalipse-dos-trabalhadores|o
  apocalipse dos trabalhadores]] (2008) and [[work:valter-hugo-mae/a-maquina-de-fazer-espanhois|a
  máquina de fazer espanhóis]] (2010). The second of those won him the 2007
  Prémio José Saramago and made his name. He has continued writing fiction
  spanning medieval Portugal, Japan, Iceland, Madeira and colonial Brazil, as
  well as children's books, short stories and autobiographical prose, while
  also working as a visual artist, television presenter and singer. As of
  2026 he continues to publish and is not known to have retired.
lifeEvents:
  - id: vhm-born-1971
    date: 1971-09-25
    title: Born in Angola
    impact: low
    description: >
      Born in Vila Henrique de Carvalho (now Saurimo), in what was then
      Portuguese Angola. The family relocated to mainland Portugal, first
      Paços de Ferreira and then, from 1980, the fishing town of Vila do
      Conde (Caxinas), where he has lived since.
    spoilerAfter: null
    sources:
      - https://www.infopedia.pt/artigos/$valter-hugo-mae
      - https://pt.wikipedia.org/wiki/Valter_Hugo_M%C3%A3e
  - id: vhm-quasi-edicoes-1999
    date: 1999
    title: Co-founds the press Quasi Edições
    impact: med
    description: >
      Co-founds the small publishing house Quasi Edições, working in
      publishing until 2004. The years inside the trade, editing and
      producing other writers' books, precede and frame his own arrival as a
      novelist later that decade.
    spoilerAfter: null
    sources:
      - https://www.infopedia.pt/artigos/$valter-hugo-mae
      - https://pt.wikipedia.org/wiki/Valter_Hugo_M%C3%A3e
  - id: vhm-saramago-prize-2007
    date: 2007-10-26
    title: Wins the Prémio José Saramago for o remorso de baltazar serapião
    impact: high
    description: >
      [[work:valter-hugo-mae/o-remorso-de-baltazar-serapiao|o remorso de
      baltazar serapião]], the second of the four "minúsculas" novels, wins
      the biennial Prémio José Saramago (for a Lusophone writer under 40) at
      its fifth edition. José Saramago himself, still alive, called the book
      a "tsunami literário" and said he felt he was witnessing a new birth of
      the Portuguese language - a public endorsement, from the writer whose
      name the prize carries, that turns a small-press poet into a name in
      Portuguese letters overnight.
    spoilerAfter: null
    sources:
      - https://www.publico.pt/2007/10/26/culturaipsilon/noticia/valter-hugo-mae-venceu-premio-literario-jose-saramago-2007-1308823
      - https://www.rtp.pt/noticias/cultura/livro-premiado-de-valter-hugo-mae-e-um-tsunami-diz-jose-saramago_n163093
      - https://www.premiojosesaramago.pt/vencedores/2007/valter-hugo-mae
  - id: vhm-multidisciplinary-2007
    date: 2007
    title: Becomes a singer and holds his first solo art exhibition
    impact: med
    description: >
      In the same year o remorso de baltazar serapião wins the Prémio José
      Saramago, Mãe becomes the vocalist of Governo, a band formed with two
      musicians from Mão Morta (an EP, "Propaganda Sentimental", follows in
      2009 on Optimus Discos), and holds his first solo exhibition of
      drawings, at Galeria Símbolo in Porto. The visual-art practice
      continues: he goes on to illustrate his own children's books, among
      them [[work:valter-hugo-mae/serei-sempre-o-teu-abrigo|Serei Sempre o
      Teu Abrigo]] (2020).
    spoilerAfter: null
    sources:
      - https://pt.wikipedia.org/wiki/Governo_(banda)
      - https://artebrasileiros.com.br/arte/valter-hugo-mae-na-generosidade-das-palavras-e-na-dificuldade-das-artes-plasticas-cresci/
      - https://eterogemeas.com/autores/valter-hugo-mae/
  - id: vhm-portugal-telecom-2012
    date: 2012-11-27
    title: Wins the Grande Prémio Portugal Telecom for a máquina de fazer espanhóis
    impact: med
    description: >
      [[work:valter-hugo-mae/a-maquina-de-fazer-espanhois|a máquina de fazer
      espanhóis]] (2010), the fourth and closing novel of the "minúsculas"
      run, takes the 10th Grande Prémio Portugal Telecom de Literatura - both
      Best Book and Best Novel of the year - confirming a mid-career writer
      who has moved well past his prize-winning debut into the country's
      literary mainstream.
    spoilerAfter: null
    sources:
      - https://www.publico.pt/2012/11/27/culturaipsilon/noticia/valter-hugo-mae-e-o-grande-vencedor-do-premio-portugal-telecom-2012-1575085
      - https://correiodominho.pt/noticias/valter-hugo-mae-vence-10-premio-portugal-telecom-de-literatura-em-lingua-portuguesa/65812
  - id: vhm-ape-prize-2021
    date: 2021-06-18
    title: Wins the APE Grande Prémio de Romance e Novela for Contra Mim
    impact: med
    description: >
      [[work:valter-hugo-mae/contra-mim|Contra Mim]], built from around
      fifteen years of fragmentary notes on his own childhood and
      adolescence, wins the Associação Portuguesa de Escritores' Grande
      Prémio de Romance e Novela 2020 (awarded June 2021) over 61 submitted
      works - an autobiographical book received, and prized, on the same
      footing as his fiction.
    spoilerAfter: null
    sources:
      - https://www.publico.pt/2021/06/18/culturaipsilon/noticia/valter-hugo-mae-vence-premio-romance-novela-ape-1967097
      - https://observador.pt/2021/06/18/valter-hugo-mae-vence-grande-premio-de-romance-e-novela-da-ape/
  - id: vhm-two-losses-2023
    date: 2023-12-10
    title: Loses a lifelong friend and a nephew
    impact: high
    description: >
      A visual artist and close friend of thirty years dies in Vila do Conde,
      aged 70. Her death, and the earlier loss of a teenage nephew, are the
      two griefs behind
      [[work:valter-hugo-mae/educacao-da-tristeza|Educação da Tristeza]]
      (2025), whose dedication belongs to them.
    note: >
      Both are named in the book's dedication and by Mãe in interviews, and
      the artist's death carries national obituaries. They are described here
      by their relation to him only, following the reticence of Porto
      Editora's own copy: the deaths are recent and the family is living.
    spoilerAfter: null
    sources:
