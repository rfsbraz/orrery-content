# Global author entity. Authors are referenced by id from franchises and works
# (authorIds / withAuthorIds), so the same person resolves the same everywhere.
# Author-LIFE events live here (they follow the person); franchise-specific
# events live in content/franchises/gillian-flynn/events.yaml. The three
# lifeEvents below are a small set of well-sourced, clearly dated anchors
# rather than a complete account of the life.
id: gillian-flynn
name: Gillian Flynn
aka: ["Gillian Schieber Flynn"]
born: 1971-02-24
died: null
bio: >
  American novelist, screenwriter and producer from Kansas City, Missouri,
  known for character-driven crime fiction about the false surfaces of
  Midwestern domestic life. She earned degrees in English and journalism at
  the University of Kansas, then a master's at Northwestern's Medill School of
  Journalism, and worked as a feature writer and later television critic at
  Entertainment Weekly from 1998 until she was laid off in 2008. Her debut
  novel [[work:gillian-flynn/sharp-objects|Sharp Objects]] (2006) was followed
  by [[work:gillian-flynn/dark-places|Dark Places]] (2009) and
  [[work:gillian-flynn/gone-girl|Gone Girl]] (2012), which became a cultural
  phenomenon and helped establish the unreliable-narrator thriller as a
  commercial category of its own. Since adapting Gone Girl for the screen in
  2014 she has written steadily for film and television alongside her
  fiction: the screenplay for [[work:gillian-flynn/widows|Widows]] (2018,
  with Steve McQueen), three episodes of HBO's
  [[work:gillian-flynn/sharp-objects-tv|Sharp Objects]] miniseries (2018),
  and the creation and writing in full of Amazon's
  [[work:gillian-flynn/utopia|Utopia]] (2020). In 2021 she was named to lead
  her own imprint, Gillian Flynn Books, at the independent publisher Zando;
  as of 2025 she was at work on a fourth novel for Penguin Random House, and
  an HBO limited series adapting Dark Places, on which she is a co-creator
  and co-showrunner, had been announced but had not yet aired.
