lifeEvents:
  - id: flynn-born-1971
    date: 1971-02-24
    title: Born in Kansas City, raised on horror films
    impact: med
    description: >
      Born Gillian Schieber Flynn in Kansas City, Missouri, and raised in its
      Coleman Highlands neighborhood; both of her parents taught for a
      living, her mother reading comprehension, her father film. She has
      described a painfully shy childhood spent reading and writing, and
      credited her father's love of horror movies with cultivating her
      interest in dark storytelling.
    spoilerAfter: null
    sources: [https://en.wikipedia.org/wiki/Gillian_Flynn]

  - id: flynn-ew-layoff-2008
    date: 2008
    title: Laid off from Entertainment Weekly
    impact: high
    description: >
      After a decade as a feature writer and television critic at
      Entertainment Weekly, Flynn was made redundant in December 2008, in the
      same recession that frames [[work:gillian-flynn/gone-girl|Gone Girl]]:
      Nick and Amy Dunne both lose their media jobs to the same downturn, and
      it is what drags them out of New York and into the marriage the novel
      spends itself taking apart.
    spoilerAfter: null
    sources:
      - https://en.wikipedia.org/wiki/Gillian_Flynn
      - https://time.com/3429666/gillian-flynns-marriage-plot/
      - https://www.hollywoodreporter.com/movies/movie-features/gillian-flynn-talks-utopia-and-6-year-journey-to-screen-we-were-playing-a-little-bit-of-a-game-of-chicken-4060720/

  - id: flynn-zando-imprint-2021
    date: 2021-09-21
    title: Becomes a publisher herself
    impact: low
    description: >
      Flynn was named to lead Gillian Flynn Books, a new imprint at the
      independent publisher Zando, alongside a parallel imprint from Lena
      Waithe. It sits inside the long gap between
      [[work:gillian-flynn/gone-girl|Gone Girl]] and the fourth novel she
      confirmed writing in 2023, and marks a turn toward the wider business
      of books alongside making them.
    spoilerAfter: null
    sources: [https://en.wikipedia.org/wiki/Gillian_Flynn]

