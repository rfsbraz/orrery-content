# Global author entity. Authors are referenced by id from franchises and works
# (authorIds / withAuthorIds), so the same person resolves the same everywhere.
# Author-LIFE events live here (they follow the person); franchise-specific
# events stay in the franchise (content/franchises/terry-pratchett/events.yaml).
id: terry-pratchett
name: Terry Pratchett
aka: ["Sir Terry Pratchett", "Terence David John Pratchett"]
born: 1948-04-28
died: 2015-03-12
bio: >
  English author, best known for the 41-novel
  [[franchise:terry-pratchett|Discworld]] series. A former journalist and press
  officer who published his first novel,
  [[work:terry-pratchett/the-carpet-people|The Carpet People]], at 23, he wrote
  [[work:terry-pratchett/the-colour-of-magic|The Colour of Magic]] (1983) as an
  affectionate send-up of sword-and-sorcery and spent three decades turning
  the Disc into a vehicle for some of the sharpest social and moral satire in
  modern English fiction - alongside science fiction, celebrated children's
  books, and collaborations from [[work:terry-pratchett/good-omens|Good Omens]]
  (with Neil Gaiman) to the Long Earth novels (with Stephen Baxter). One of
  the UK's best-selling authors, he was knighted in 2009. Diagnosed with
  early-onset Alzheimer's in 2007, he kept writing - latterly by dictation -
  until his death in 2015.
pseudonyms:
  - name: Uncle Jim
    note: >
      The byline on his boyhood stories for the Bucks Free Press Children's
      Circle section, written from 1965 while he worked there as a junior
      reporter; collected posthumously in the Dragons at Crumbling Castle
      line of story collections.
  - name: Patrick Kearns
    note: >
      A pen name for stories in regional newspapers in the 1970s and 80s,
      identified as Pratchett's decades later and collected in
      [[work:terry-pratchett/a-stroke-of-the-pen|A Stroke of the Pen]] (2023).
lifeEvents:
  - id: pratchett-born-1948
    date: 1948-04-28
    title: Born in Beaconsfield, Buckinghamshire
    impact: low
    description: >
      Raised in Buckinghamshire; left school for journalism at 17 and worked as a
      reporter and later a power-industry press officer before writing full time.
    spoilerAfter: null
    sources: [https://en.wikipedia.org/wiki/Terry_Pratchett]
  - id: pratchett-carpet-people-sold-1968
    date: 1968
    title: Sells his first novel to the publisher who interviewed him
    impact: med
    description: >
      A junior reporter on the Bucks Free Press, Pratchett interviewed Peter
      Bander van Duren, co-director of the small publisher Colin Smythe Ltd,
      about a book Bander van Duren had edited on education; in passing,
      Pratchett mentioned he had written a manuscript of his own. It was
      passed to Colin Smythe, who published it in 1971 as
      [[work:terry-pratchett/the-carpet-people|The Carpet People]] and remained
      Pratchett's publisher, and later his agent, for the rest of his career.
    spoilerAfter: null
    sources:
      - https://en.wikipedia.org/wiki/Terry_Pratchett
      - https://colinsmythe.co.uk/terry-pratchett/
  - id: pratchett-rhianna-born-1976
    date: 1976-12-30
    title: Daughter Rhianna is born
    impact: med
    description: >
      Terry and Lyn Pratchett's daughter Rhianna was born in Rowberrow,
      Somerset, the same year as his second novel,
      [[work:terry-pratchett/the-dark-side-of-the-sun|The Dark Side of the Sun]].
      Many of his books are dedicated to her. She became a video game and
      comics writer in her own right, and after his death took up
      stewardship of the Discworld estate.
    spoilerAfter: null
    sources:
      - https://colinsmythe.co.uk/terry-pratchett/
      - https://en.wikipedia.org/wiki/Rhianna_Pratchett
  # Wikipedia (citing Burrows 2020) dates this appointment to 1979; Colin
  # Smythe's own site and the L-Space biography (drawing on Cabell 2011) date
  # it 1980, which this entry follows. Both agree on three-to-four stations;
  # Pratchett's own count of "four" is quoted directly to avoid picking a
  # number the sources don't agree on.
  - id: pratchett-cegb-press-officer-1980
    date: 1980
    title: Becomes a nuclear press officer for the CEGB
    impact: med
    description: >
      After a decade in provincial newspapers - the Bucks Free Press, the
      Western Daily Press, and from 1973 the Bath & West Evening Chronicle -
      Pratchett became a publicity officer for the Central Electricity
      Generating Board, with responsibility for nuclear power stations
      including Oldbury and Hinkley Point A and B: "four nuclear power
      stations on my patch," by his own later count.
      [[work:terry-pratchett/strata|Strata]] (1981), his last novel before
      Discworld, was written on winter evenings around the job, which he kept
      until sales let him write full time in 1987.
    spoilerAfter: null
    sources:
      - https://en.wikipedia.org/wiki/Terry_Pratchett
      - https://www.lspace.org/about-terry/interviews/pczone22.html
  - id: pratchett-fulltime-writer-1987
    date: 1987
    title: Gives up the day job to write full time
    impact: med
    description: >
      After finishing [[work:terry-pratchett/mort|Mort]], the fourth Discworld novel,
      Pratchett left his job as a press officer for the Central Electricity
      Generating Board to write full time. The output that followed - roughly a
      novel or two a year for two decades - built the Disc into a whole world.
    spoilerAfter: null
    sources: [https://en.wikipedia.org/wiki/Terry_Pratchett]
  # Colin Smythe's own chronology dates the end of the co-publishing
  # arrangement to "by this time" of Sourcery's 26 May 1988 publication; no
  # sharper date is on record.
  - id: pratchett-smythe-agent-1988
    date: 1988
    title: Colin Smythe becomes his literary agent
    impact: med
    description: >
      Colin Smythe's arrangement co-publishing Discworld hardbacks with
      Gollancz, in place since [[work:terry-pratchett/equal-rites|Equal
      Rites]] (1987), had ended by the publication of
      [[work:terry-pratchett/sourcery|Sourcery]] in May 1988. Gollancz became
      sole hardback publisher, and Smythe continued instead as Pratchett's
      literary agent, a role he held for the rest of Pratchett's career.
    spoilerAfter: null
    sources:
      - "https://colinsmythe.co.uk/terry-pratchett/discworld/convention-reports-index/terry-pratchett-chronology/"
  - id: pratchett-obe-1998
    date: 1998
    title: Appointed OBE for services to literature
    impact: low
    description: >
      An early establishment nod to a writer still often shelved as "genre" -
      Pratchett quipped that he supposed the "services to literature" consisted of
      refraining from trying to write any.
    spoilerAfter: null
    sources: [https://en.wikipedia.org/wiki/Terry_Pratchett]
  - id: pratchett-alzheimers-2007
    date: 2007-12
    title: Announces early-onset Alzheimer's - "the embuggerance"
    impact: high
    description: >
      In December 2007 Pratchett disclosed a diagnosis of posterior cortical
      atrophy, a rare early-onset form of Alzheimer's he called "an embuggerance".
      He went public to campaign for research and to keep working openly; mortality
      and the mechanics of memory press harder on the novels that follow.
    spoilerAfter: null
    sources:
      - https://en.wikipedia.org/wiki/Terry_Pratchett
      - https://www.ginnydougary.co.uk/sir-terry-pratchett-alzheimers-and-me/
  - id: pratchett-knighthood-2009
    date: 2009-01-01
    title: Knighted for services to literature
    impact: med
    description: >
      Appointed Knight Bachelor in the 2009 New Year Honours. Characteristically,
      he later forged his own sword from meteoric iron for the occasion.
    spoilerAfter: null
    sources: [https://en.wikipedia.org/wiki/Terry_Pratchett]
  - id: pratchett-dimbleby-lecture-2010
    date: 2010-02-01
    title: The Dimbleby Lecture - "Shaking Hands with Death"
    impact: med
    description: >
      Pratchett used the 2010 BBC Richard Dimbleby Lecture to argue for assisted
      dying (his preferred term over "assisted suicide"). His condition made
      reading difficult, so most of the text was delivered by his friend Tony
      Robinson. The campaign became a defining public cause of his final years.
    spoilerAfter: null
    sources: [https://en.wikipedia.org/wiki/Terry_Pratchett]
  - id: pratchett-death-2015
    date: 2015-03-12
    title: Death at 66
    impact: high
    description: >
      Pratchett died at home on 12 March 2015, his cat sleeping on his bed. His
      assistant Rob Wilkins announced it in the voice of Death himself, in small
      capitals, on Pratchett's own Twitter - "AT LAST, SIR TERRY, WE MUST WALK
      TOGETHER."
    spoilerAfter: null
    sources: [https://en.wikipedia.org/wiki/Terry_Pratchett]
  - id: pratchett-hard-drive-crushed-2017
    date: 2017-08-25
    title: Unfinished works crushed by a steamroller
    impact: med
    description: >
      Honouring an explicit wish, Pratchett's estate had the hard drive holding
      his unfinished work destroyed - flattened by a vintage John Fowler steamroller
      at the Great Dorset Steam Fair and then run through a stone crusher. Whatever
      he had not finished, he did not want completed by other hands.
    spoilerAfter: null
    sources: [https://www.bbc.com/news/uk-england-dorset-41108278]
sources:
  - https://en.wikipedia.org/wiki/Terry_Pratchett
  - https://www.terrypratchettbooks.com/about-sir-terry/
