# Global author entity - co-author of the five Long Earth novels with Terry
# Pratchett. Referenced via withAuthorIds in works.yaml.
# born is year-only in the record (Wikipedia gives 1957 with no day), so the
# date field is left out and the year is carried in the bio.
id: stephen-baxter
name: Stephen Baxter
aka: []
bio: >
  English hard science fiction author, born 1957 in Liverpool, known for the
  Xeelee sequence; co-wrote the five
  [[work:discworld/the-long-earth|Long Earth]] novels with Terry Pratchett
  between 2012 and 2016.
sources:
