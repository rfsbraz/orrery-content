# Global author entity. Authors are referenced by id from franchises and works
# (authorIds / withAuthorIds). Author-LIFE events live here (they follow the
# person); franchise-specific events stay in the franchise.
#
# Portuguese novelist, poet and playwright. Sourced from Portuguese and
# English Wikipedia (both consulted directly; they cross-check each other on
# every date and prize below), Portal da Literatura's author page, and the
# publisher/venue pages cited on individual works. No English-language
# biography site was found that goes deeper than Wikipedia's own.
id: jose-luis-peixoto
name: José Luís Peixoto
aka: ["José Luís Marques Peixoto"]  # full name, per the civil registry as given on Wikipedia
born: 1974-09-04
died: null
bio: >
  Born in Galveias, a village in Ponte de Sor in the Alto Alentejo, where he
  lived until he left at eighteen for Lisbon's Universidade Nova, taking a
  degree in modern languages and literatures (English and German studies). He
  taught in Portuguese schools and in Praia, Cape Verde, before becoming a
  full-time writer in 2001, the year after his debut,
  [[work:jose-luis-peixoto/morreste-me|Morreste-me]] (2000). His second book,
  [[work:jose-luis-peixoto/nenhum-olhar|Nenhum Olhar]] (2000), won the Prémio
  José Saramago in 2001, making him, at 27, the youngest winner in the
  prize's history. Reviewers have since placed him alongside Faulkner and
  Rulfo for the way the fantastic sits inside the everyday in his fiction,
  and his books, translated into more than thirty languages, have carried
  Portuguese-language fiction to markets it had not reached before: he was
  the first Portuguese-language author translated and published in Armenia
  (2019), Georgia (2017) and Mongolia (2016). His work moves freely between
  forms - novels rooted in the Alentejo and in Portuguese history, allegory,
  poetry, travel writing, children's books, theatre and newspaper crónicas -
  and in 2003 extended once into music, writing the novella
  [[work:jose-luis-peixoto/antidoto|Antídoto]] alongside the gothic metal
  band Moonspell as the literary twin of their album The Antidote. He
  continues to publish as of 2026.
lifeEvents:
  - id: peixoto-fathers-death
    date: null
    title: The death of his father shapes his debut
    impact: high
    description: >
      Peixoto has said directly, in a headline interview, that he would not
      have written the books he wrote without the loss of his father. His
      first book, [[work:jose-luis-peixoto/morreste-me|Morreste-me]] (2000),
      a collection of interlinked fictions confronting a father's death, is
      read by Portuguese criticism as the most directly autobiographical of
      his works for exactly that reason.
    note: >
      The interview headline names the loss but not a date.
    spoilerAfter: null
    sources:
      - https://pt.wikipedia.org/wiki/José_Luís_Peixoto
  - id: peixoto-saramago-prize-2001
    date: 2001-10-09
    title: Youngest-ever winner of the Prémio José Saramago
    impact: high
    description: >
      [[work:jose-luis-peixoto/nenhum-olhar|Nenhum Olhar]] wins the second
      edition of the Prémio José Saramago, awarded to the best novel
      published across the Portuguese-speaking world in the two preceding
      years. At 27, Peixoto becomes the youngest writer ever to win it, a
      record Valter Hugo Mãe's 2007 win (at 36) did not break. The prize
      carries José Saramago's own name and, per Portuguese press coverage at
      the time, his personal endorsement, and it turns a first-time novelist
      into a name in Portuguese letters overnight.
    spoilerAfter: null
    sources:
      - https://pt.wikipedia.org/wiki/José_Luís_Peixoto
      - https://en.wikipedia.org/wiki/José_Luís_Peixoto
  - id: peixoto-moonspell-antidoto-2003
    date: 2003
    title: Writes a novella alongside Moonspell's The Antidote
    impact: med
    description: >
      Peixoto works through the composition of Moonspell's album The
      Antidote, writing [[work:jose-luis-peixoto/antidoto|Antídoto]] as its
      literary counterpart: each song is paired with a chapter, and the book
      and the record are released together. It is the one time his fiction
      is built directly from another artist's music rather than from his own
      material, and the reason "songwriter" appears among the categories
      Wikipedia files him under.
    spoilerAfter: null
    sources:
      - https://en.wikipedia.org/wiki/The_Antidote_(Moonspell_album)
      - https://pt.wikipedia.org/wiki/José_Luís_Peixoto
  - id: peixoto-oceanos-prize-2016
    date: 2016
    title: Wins the Oceanos Prize for Galveias
    impact: med
    description: >
      [[work:jose-luis-peixoto/galveias|Galveias]] (2014), set in Peixoto's
      own birthplace, wins the Oceanos - Prémio de Literatura em Língua
      Portuguesa, the major pan-Lusophone literary prize spanning Portugal,
      Brazil and the African Portuguese-speaking countries. The novel is
      later the first Portuguese-language book translated and published in
      Georgia (2017) and wins Japan's Best Translation Award in 2019.
    spoilerAfter: null
    sources:
      - https://pt.wikipedia.org/wiki/José_Luís_Peixoto
      - https://en.wikipedia.org/wiki/José_Luís_Peixoto
