id: maurice-sendak
name: Maurice Sendak
aka: []
born: 1928-06-10
died: 2012-05-08
bio: >
  American illustrator and children's author, best known for "Where the Wild
  Things Are". His 1997 set and costume designs for the Humperdinck opera
  "Hansel and Gretel" were paired posthumously with
  [[author:stephen-king|Stephen King]]'s retelling in
  [[work:stephen-king/hansel-and-gretel|Hansel and Gretel]].
sources:
  - https://en.wikipedia.org/wiki/Maurice_Sendak
  - https://www.mauricesendak.com/hansel-and-gretel/
