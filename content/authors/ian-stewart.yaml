# Global author entity - co-author of the Science of Discworld books with
# Terry Pratchett and Jack Cohen. Referenced via withAuthorIds in works.yaml.
id: ian-stewart
name: Ian Stewart
aka: ["Ian Nicholas Stewart"]
born: 1945-09-24
bio: >
  British mathematician and prolific popular-science writer, Emeritus Professor
  at the University of Warwick. With biologist [[author:jack-cohen|Jack Cohen]]
  he co-wrote the four Science of Discworld books, alternating Pratchett's
  Discworld narrative with real-world science essays.
sources:
  - https://en.wikipedia.org/wiki/Ian_Stewart_(mathematician)
