# Global author entity. Authors are referenced by id from franchises and works
# (authorIds / withAuthorIds), so the same person resolves the same everywhere -
# across franchises and past name collisions. Author-LIFE events live here (they
# follow the person); franchise-specific events stay in the franchise.
#
# This is the CANONICAL, full version of the Brandon Sanderson entity, shared
# by the Cosmere wing and (via withAuthorIds on the concluding volumes) the
# Wheel of Time wing.
id: brandon-sanderson
name: Brandon Sanderson
aka: ["Brandon Sanderson"]
born: 1975-12-19
died: null
bio: >
  American fantasy and science fiction author, born in Lincoln, Nebraska. A
  prolific, systems-minded worldbuilder best known for the
  [[franchise:brandon-sanderson|Cosmere]] - a single connected universe underlying
  [[work:brandon-sanderson/elantris|Elantris]], the Mistborn saga, and
  [[work:brandon-sanderson/the-way-of-kings|The Stormlight Archive]] - and for his "hard
  magic" design philosophy of rule-bound, consistent magic systems. Around
  that heart he has published widely beyond it: the
  [[work:brandon-sanderson/skyward|Skyward]] space-opera series, the superhero-noir
  Reckoners ([[work:brandon-sanderson/steelheart|Steelheart]]), the young-readers
  Alcatraz books, the [[work:brandon-sanderson/legion|Legion]] novellas, and a steady
  stream of standalones, audio originals and collaborations. He completed
  Robert Jordan's [[franchise:robert-jordan|Wheel of Time]] after Jordan's
  death - those three volumes, [[work:robert-jordan/the-gathering-storm|The
  Gathering Storm]], [[work:robert-jordan/towers-of-midnight|Towers of
  Midnight]] and [[work:robert-jordan/a-memory-of-light|A Memory of Light]],
  belong to Jordan's saga and are catalogued there. He teaches a long-running
  creative-writing course at Brigham Young University, and in 2022 ran the
  most-funded Kickstarter in the platform's history.
pseudonyms: []
lifeEvents:
  - id: sanderson-born-1975
    date: 1975-12-19
    title: Born in Lincoln, Nebraska
    impact: low
    description: >
      Grows up an indifferent reader until a teacher hands him a fantasy novel in
      junior high; the genre becomes his life's work.
    spoilerAfter: null
    sources: [https://en.wikipedia.org/wiki/Brandon_Sanderson]
  - id: sanderson-korea-mission-1995
    date: 1995
    dateRange: "1995-1997"
    title: An LDS mission to Korea seeds Elantris's magic
    impact: high
    description: >
      Sanderson takes a two-year leave from Brigham Young University to serve a
      mission for the Church of Jesus Christ of Latter-day Saints in Seoul,
      writing in a sketchbook on his free days while his companions play
      ping-pong. He later credits the immersion in Korean with shaping the
      language-based magic system of his eventual debut,
      [[work:brandon-sanderson/elantris|Elantris]]: "My very first published novel,
      Elantris, used Korean linguistics as a foundation for part of the
      language, and the magic in that world is language-based."
    spoilerAfter: null
    sources:
      - https://en.wikipedia.org/wiki/Brandon_Sanderson
      - https://www.ldsliving.com/the-way-of-the-cosmere-king-how-brandon-sanderson-rose-to-the-top-of-the-fantasy-world/s/11106
  - id: sanderson-byu-trunk-novels
    date: 2000
    dateRange: "1997-2004"
    title: The BYU years and the trunk novels
    impact: high
    description: >
      Working night shifts at a hotel so he could write, Sanderson drafted
      thirteen novels while studying at Brigham Young University. Most were never
      published, but the reject pile built the discipline and the shared cosmology
      that would become the Cosmere. [[work:brandon-sanderson/elantris|Elantris]] was the
      sixth of them - the first he sold.
    spoilerAfter: null
    sources: [https://www.brandonsanderson.com/pages/about-brandon]
  - id: sanderson-cosmere-conceived-2000
    date: 2000
    dateRange: "1999-2003"
    title: The Cosmere is planned connected, from the start
    impact: high
    description: >
      Still unpublished, Sanderson decides against writing a run of sequels
      set in one world, reasoning that a publisher who rejects book one will
      not read book two, while standalone worlds sell more easily from a new
      author. But wanting the connected epic he grew up loving, he starts
      quietly linking his trunk novels anyway, beginning with
      [[work:brandon-sanderson/elantris|Elantris]] and its then-unpublished companion
      Dragonsteel, calling it "a hidden epic, mostly for myself." He later
      names his inspiration as Isaac Asimov tying the Robot and Foundation
      series together late in his career, and sets out to build the same
      connections in from day one rather than stitch them on afterward.
    spoilerAfter: null
    sources:
      - https://faq.brandonsanderson.com/knowledge-base/how-when-did-you-come-up-with-the-idea-of-the-brandon-sanderson/
  - id: sanderson-elantris-debut-2005
    date: 2005-04-21
    title: Elantris published - the debut
    impact: high
    description: >
      Editor Moshe Feder buys [[work:brandon-sanderson/elantris|Elantris]] for Tor, ending
      years of rejections and launching a career. Its afterword openly hints that
      this world is one of many, seeding the Cosmere for readers.
    spoilerAfter: null
    sources: [https://en.wikipedia.org/wiki/Elantris]
  - id: sanderson-wot-succession-2007
    date: 2007-12-07
    title: Chosen to finish the Wheel of Time
    impact: high
    description: >
      After Robert Jordan's death, his wife and editor Harriet McDougal picks
      Sanderson - then a relatively new author - to complete The Wheel of Time,
      having been convinced by his first Mistborn novel,
      [[work:brandon-sanderson/the-final-empire|The Final Empire]]. The assignment turns him
      into a household name in fantasy and shapes his craft on the Cosmere.
    spoilerAfter: null
    sources: [https://en.wikipedia.org/wiki/Brandon_Sanderson]
  - id: sanderson-byu-lectures
    date: 2016
    dateRange: "2010-present"
    title: The BYU creative-writing lectures go public
    impact: med
    description: >
      Sanderson's university course on writing science fiction and fantasy is
      filmed and posted free online, reaching millions and cementing a reputation
      as the genre's most open teacher of craft - the productivity-and-process
      persona that defines his public image.
    spoilerAfter: null
    sources: [https://en.wikipedia.org/wiki/Brandon_Sanderson]
  - id: sanderson-words-of-radiance-2014
    date: 2014-03-04
    title: Words of Radiance and the peak-Stormlight era
    impact: med
    description: >
      [[work:brandon-sanderson/words-of-radiance|Words of Radiance]] debuts at number one
      on the New York Times list, confirming The Stormlight Archive as the tentpole
      of the Cosmere and Sanderson as a leading epic-fantasy voice of his generation.
    spoilerAfter: null
    sources: [https://en.wikipedia.org/wiki/Words_of_Radiance]
  - id: sanderson-kickstarter-2022
    date: 2022-03-01
    dateRange: "2022-03"
    title: The "Four Secret Novels" Kickstarter record
    impact: high
    description: >
      Revealing he had quietly written extra novels during the pandemic,
      Sanderson launches a Kickstarter that ends as the most-funded in the
      platform's history - 185,341 backers and roughly 41.75 million dollars. It
      reshapes his business around his own company, Dragonsteel, and produces the
      2023 "Year of Sanderson" releases.
    spoilerAfter: null
    sources: [https://www.cbr.com/wheel-of-time-brandon-sanderson-kickstarter-most-funded/]
sources:
  - https://en.wikipedia.org/wiki/Brandon_Sanderson
  - https://www.brandonsanderson.com/pages/about-brandon
