# Global author entity - Terry Pratchett's long-time collaborator on Discworld
# companion works (maps, the Companion, stage adaptations). Referenced via
# withAuthorIds in works.yaml.
id: stephen-briggs
name: Stephen Briggs
bio: >
  English writer and actor, Terry Pratchett's principal collaborator on Discworld
  ephemera and reference works - the maps ("Mapps"), the Discworld Companion, the
  diaries, and many authorised stage adaptations. His cartography and lore-keeping
  fixed much of the Disc's geography and administrative detail in canon.
sources:
  - https://wiki.lspace.org/Stephen_Briggs
