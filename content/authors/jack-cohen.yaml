# Global author entity - co-author of the Science of Discworld books with
# Terry Pratchett and Ian Stewart. Referenced via withAuthorIds in works.yaml.
id: jack-cohen
name: Jack Cohen
aka: ["Jack Cohen (biologist)"]
born: 1933-01-19
died: 2019-05-06
bio: >
  British reproductive biologist and science populariser, a frequent collaborator
  with mathematician [[author:ian-stewart|Ian Stewart]]. The two supplied the
  real-world science woven through the four Science of Discworld books alongside
  Terry Pratchett's narrative.
sources:
  - https://en.wikipedia.org/wiki/Jack_Cohen_(scientist)
