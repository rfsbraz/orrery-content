name: Enrich content

# Fills externalIds on works from OpenLibrary and opens a PR for a curator to
# review. It NEVER pushes to main directly and only ADDS metadata (see
# scripts/enrich.py). Manual (workflow_dispatch) or weekly.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1" # Mondays 04:00 UTC

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: enrich
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - name: Enrich from OpenLibrary
        run: python scripts/enrich.py
      - name: Validate the result
        run: python scripts/validate.py
      - name: Open enrichment PR
        uses: peter-evans/create-pull-request@v6
        with:
          add-paths: content/**
          branch: bot/enrichment
          delete-branch: true
          title: "enrich: OpenLibrary IDs (bot)"
          body-path: .enrichment-report.md
          labels: "content:work,curator-review"
          commit-message: "enrich: OpenLibrary work IDs (bot, additive)"
