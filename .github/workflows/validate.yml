name: Validate content

on:
  pull_request:
    paths:
      - "content/**"
      - "scripts/validate.py"
      - ".github/workflows/validate.yml"
  push:
    branches: [main]
    paths:
      - "content/**"
      - "scripts/validate.py"

concurrency:
  group: validate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - name: Validate canon content
        run: python scripts/validate.py
      - name: Translation coverage report
        # Reports only - a partially translated locale is a valid state. This
        # exists so a file that belongs to no franchise (shared global events,
        # co-author bios, character rosters) cannot be silently forgotten when
        # translation work is split by franchise.
        run: python scripts/i18n_coverage.py
