stage: prose
date: 2026-07-21
stagesRun: [eras, reading-orders, spoiler-audit, translation]
summary: >
  Four prose stages over the widened Robert Jordan wing, one commit each. Eras:
  no era was cut for the 1980-1984 career and none was invented; the negative
  result and every orphan ruling are now recorded in eras.yaml. Reading orders:
  the two Wheel of Time orders and all four startHere paths were rescoped to say
  they are series-only, the known New Spring contradiction between the
  recommended-integrated order and its own cited sources was closed on the prose
  side, and one new order was admitted, Jordan's own 1987 Conan chronology.
  Spoiler audit: thirteen new synopses ruled against jacket copy fetched fresh;
  one rewrite (the-fallon-legacy), twelve left alone with reasons. Translation:
  pt-PT taken from 57/58 to 58/58, including the two stale-but-live strings the
  coverage script cannot see.
gates:
  validateBefore: "OK - 341 works, 29 warnings"
  validateAfter: "OK - 341 works, 29 warnings (identical list; no work orphaned, none un-orphaned)"
  i18nBefore: "pt-PT 57/58 - franchises/wheel-of-time/works.yaml 17/30 (missing: synopsis)"
  i18nAfter: "pt-PT 58/58 - complete"
  eventDensity: not run - events/global.yaml and events.yaml unchanged

changedProse:
  eras.yaml:
    - "No era added, removed or re-cut. File-header data notes only: the 1980-1984 negative result with its four checked sources, and a per-work record of why each of the sixteen works outside every era span is left there."
  orders.yaml:
    - "wheel-of-time/chronological - rationale now states it is The Wheel of Time only and names what it leaves out."
    - "wheel-of-time/recommended-integrated - rationale rewritten: the unsupported 'most often after book five' consensus claim is gone, replaced by a statement that book five is the early end of a contested range with its tradeoff named. debated[0] now says both cited sources argue for book ten and that this position is the minority of the two."
    - "wheel-of-time/conan-chronological - NEW order, chronological-inuniverse, seven works."
    - "header comment rewritten for a 30-work wing."
  franchise.yaml:
    - "startHere header comment: records that all entry advice on the record is Wheel of Time entry advice, so no path claims a Conan or Fallon entry point."
    - "just-start - description and note rewritten for an author wing; fit.commitment gained 'taste'."
    - "recommended-integrated, chronological - descriptions now say they are series-only."
    - "publication-complete - title changed to 'The whole career, publication order'; description rewritten for the 30-work derived order; note added. The id is untouched."
  works.yaml:
    - "wheel-of-time/the-fallon-legacy - synopsis rewritten (spoiler + accuracy); curator-only note added disarming the back-cover text for the next enrichment pass."
  i18n:
    - "content/i18n/pt-PT/franchises/wheel-of-time/works.yaml - 13 new synopsis entries."
    - "content/i18n/pt-PT/franchises/wheel-of-time/orders.yaml - two rationales and one debated string re-synced, conan-chronological entry added."
    - "content/i18n/pt-PT/franchises/wheel-of-time/franchise.yaml - stale description replaced, all four paths re-synced, publication-complete title and note."
    - "content/i18n/pt-PT/authors/robert-jordan.yaml - stale bio replaced."

deviations:
  - >
    CURATION.md 3 asks that an English prose change and its overlay land in the
    same commit. The four commits here are split by stage instead, on the
    instruction that spoiler-audit must precede translation because translation
    copies prose. The English changes from the eras, orders and spoiler commits
    are all mirrored in the fourth. The branch is only correct as a whole, so it
    should not be split across PRs at these commit boundaries.

forStages:
  visual-metadata: >
    Nothing here changed the imagery position. Still thirteen works with no
    cover. Two prose facts now on the page that the header should not contradict:
    the franchise description and the publication-complete path both present this
    as a whole career in three genres, while theme.yaml is still the
    age-of-legends preset with the wheel-and-serpent signature (which the
    validator separately reports as unimplemented and silently rendered as
    'thread'). The wing header question raised by the restructure is now visible
    in reader-facing prose, not just in the data.
  editions: >
    The Conan order's rationale cites in-world years, not publication data, so it
    creates no edition leads. Two edition facts were confirmed in passing while
    fetching jacket copy: The Fallon Legacy has ISBN 9780312867010 (Tor) and
    9780523480299 (an earlier edition), and Macmillan currently lists ebook
    editions of the Fallon books (9781250311030 for The Fallon Pride). None were
    recorded, since editions are not this stage's file. The Fallon Blood's
    contested first-edition publisher (Popham Press vs Ace) was not touched.
    Note for translation-adjacent edition work: Bertrand published Wheel of Time
    volumes 1-6 only, and nothing else on this shelf has a Portuguese edition, so
    every non-series title correctly stands in English in the overlays.
  wing-audit: >
    The subseries inconsistency the restructure flagged is now also a prose
    inconsistency worth ruling on: the orders and paths repeatedly say "The Wheel
    of Time only" about works that carry subseries: null, so a reader is told a
    grouping exists that the data does not express. Either the fourteen volumes
    plus the prequel get a subseries label or the prose is the only thing
    carrying the grouping. Separately: four startHere paths for a 30-work author
    wing, three of which are the same series, is within the 2-5 rule but is
    thin on the non-series half of the shelf, and deliberately so (see the
    openQuestion on Conan entry advice).

openQuestions:
  - >
    The Turning of the Wheel (1990-1994) is still an admitted coinage carrying
    provenance: none, and its own note says no source periodises the early books
    this way and that the 1994 boundary is contested by the retrospective it
    cites. This run did not touch it, per the instruction not to recut received
    Wheel of Time boundaries, but it is the one era in this wing that fails the
    skill's own test and the pre-1990 ruling above makes the inconsistency
    sharper: we declined to coin an era for eleven works while keeping a coined
    one for five. Removing it is a curator's call because it changes a full-bleed
    plate. My recommendation is to keep it and change provenance to a neutral
    label only if a source turns up, since removal would orphan five more works.
  - >
    Ordering change, escalated rather than made: wheel-of-time/recommended-
    integrated still places New Spring after book five while both sources it
    cites recommend after book ten. The prose no longer claims consensus for
    five, so nothing on the page is now false, but the sequence itself is still
    the minority position. Moving New Spring to position eleven would align the
    order with its own citations. That is an orderedWorkIds change and therefore
    the curator's, not mine.
  - >
    Should the Conan order have a startHere path? I did not add one: no guide
    anywhere recommends entering Robert Jordan through Conan, and inventing an
    entry claim to balance the wizard is exactly what the skill forbids. If the
    curator wants the non-series half of the shelf represented in the wizard, the
    honest shape is a path pointing at wheel-of-time/conan-chronological tagged
    experience: [returning] and commitment: [taste], described as a side door for
    someone who has already read the series, not as a way in.
  - >
    My weakest decision this run: ruling that no publishing-historical era fits
    1980-1984. Rung 4 was genuinely available (the Reagan O'Neal historicals, the
    Tor Conan licence) and I rejected it on the fit test, because 1982 alone
    holds three bylines in three genres and era membership is computed by year.
    A curator who weighs coverage higher than I did could reasonably cut
    1982-1984 as a Conan era and accept that it swallows The Fallon Legacy and
    Cheyenne Raiders. I think that plate would be false for two of its works, but
    it is a judgement, not a fact.
  - >
    The Fallon Pride synopsis says Robert Fallon survives Barbary pirates and the
    siege of Tripoli. Neither the 1981 back cover nor the current Macmillan copy
    mentions Tripoli; both open on the War of 1812, Bladensburg, New Orleans,
    Andrew Jackson and Jean Lafitte. Not a spoiler either way (our version stops
    earlier than the jacket does), so it was left alone, but the detail rests on
    whatever the restructure stage sourced it from and a plot-verification pass
    should confirm it.
  - >
    Not verifiable from this worktree: the app is not checked out here, so no
    pt-PT page was rendered and read. Coverage is 58/58 and every overlay id
    resolves against its base (checked by re-deriving both id sets), but that is
    evidence of merge-ability, not of delivery. Somebody with the app should open
    /pt-PT/f/wheel-of-time and its /start page before this ships, particularly
    the new order's name in the order selector and the era themes, which the
    coverage script has previously reported as covered while rendering English.
