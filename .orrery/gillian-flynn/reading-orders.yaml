stage: reading-orders
slug: gillian-flynn
status: validate.py --slug gillian-flynn green (exit 0), sync_skill_blocks.py green

shipped:
  orders: none - orders.yaml created with a reasons-only header, []
  startHere: none - franchise.yaml gets no startHere block; a research note
    was added to its existing CAPABILITIES comment instead

orders_considered_and_rejected:
  - candidate: "novels-only, publication order"
    verdict: fails the divergence test
    why: >
      Sharp Objects (2006), Dark Places (2009), Gone Girl (2012) publish in
      three different years - no same-year tie for a curated order to
      settle, unlike agatha-christie/poirot-novels. The candidate would be
      byte-for-byte the derived default filtered to three titles: same
      sequence, nothing added.
  - candidate: "chronological-inuniverse"
    verdict: not applicable
    why: >
      No shared characters, setting or timeline across the three novels or
      The Grownup - nothing to reconstruct an in-universe order from.
  - candidate: prequel-handling order (wheel-of-time shape)
    verdict: not applicable
    why: nothing in the wing is a prequel to a later-published work.

startHere_paths_considered_and_rejected:
  - candidate: entry-point path among the three novels ("start with X")
    verdict: UNSOURCED, not shipped
    evidence_checked: >
      gillian-flynn.com (no FAQ/reading-order page); Penguin Random House
      product pages for Gone Girl and Dark Places (book-club discussion
      questions, not entry advice); Washington Post, Salon and AwardsWatch
      Gone Girl anniversary retrospectives (2022 x2, 2024) - none address
      entry order; dozens of "books in order" SEO sites
      (bookseriesinorder.com, mostrecommendedbooks.com, tlbranson.com,
      readupnext.com, readersvibe.com, whatwereading.com and near-identical
      pages) that recite publication order or say "standalone, start
      anywhere" with no named recommender; Goodreads and Facebook fan Q&A,
      unattributed. None is a dated, bylined recommendation from a
      qualifying source (major paper's books desk, bookshop editorial,
      publisher, or Flynn herself).
  - candidate: screen-to-page path (watch the film or HBO series, then read
      the novel it restages, or the reverse)
    verdict: UNSOURCED, not shipped
    reasoning: >
      The one entry shape worth testing given the wing holds both novel and
      adaptation for two stories (Gone Girl / gone-girl-film, Sharp Objects
      / sharp-objects-tv). No source recommends this direction either -
      found only comparison journalism (Refinery29 etc.) on what the
      adaptations change, never entry-order advice. Shipping it anyway would
      be curatorial invention the sourcing bar forbids.
  - candidate: "Complete Gillian Flynn" omnibus (Crown, 2014) as
      official-publication evidence
    verdict: rejected
    why: >
      Bundles Gone Girl / Sharp Objects / Dark Places for retail; its own
      product pages state no reading sequence, so it is not a publisher
      claim about order, just a sales package.

startHere_ruling: >
  No wizard. Every avenue named in the brief was checked and none clears
  the bar - see startHere_paths_considered_and_rejected. This is a "no
  citable entry-path consensus exists" finding, not a gap: three
  standalone novels with genuine mainstream fame (especially Gone Girl)
  attract enormous SEO content and zero editorial "start here" advice from
  a source that stands behind it.

prequel_spoiler_vector: not present in this wing (see orders.yaml header) -
  checked and ruled out explicitly rather than left silent.

i18n: no pt-PT overlay exists for this slug; nothing to mirror since no
  prose (order rationale/debated, path title/description/note) was written.

tool_calls: >
  24 total. 10 were network fetches: 8 WebSearch calls (entry-point
  advice, screen-to-page advice, Barnes & Noble/Waterstones/Foyles
  editorial content, the Gone Girl anniversary press, the omnibus contents)
  and 2 WebFetch calls (gillian-flynn.com; an NPR "revisiting Gone Girl"
  piece, which timed out and was not retried since the WebSearch results
  around it were already sufficient to rule out that whole avenue). The
  rest were Bash (worktree/git status, wing_digest.py, validate.py,
  sync_skill_blocks.py, a find for stray pt-PT files) and Read (SKILL.md,
  SCHEMA.md excerpt, works.yaml, franchise.yaml, franchise-research.yaml,
  joao-tordo and jose-luis-peixoto orders.yaml/franchise.yaml as shape
  references) plus one Write and two Edits.
