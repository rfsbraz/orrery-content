stage: visual-metadata
slug: gillian-flynn
status: validate.py --slug gillian-flynn green (exit 0, checked after last write), sync_skill_blocks.py green

coverage: 5/11 works carry a cover; portrait and header both set.

covers_set:
  - "sharp-objects: US Shaye Areheart 2006 first edition (isbn 9780307341549), fetched and eyeballed - the real debossed dark jacket, not a placeholder."
  - "dark-places: US Shaye Areheart 2009 first edition (isbn 9780307341563), fetched and eyeballed - padlock/hasp jacket, no watermark. UK edition also has a clean cover (windmill over farmland) but was not used, for US/UK consistency across the four novels."
  - "gone-girl: US Crown 2012 first edition (isbn 9780307588364), fetched and eyeballed."
  - "the-grownup: US Crown 2015 first edition (isbn 9780804188975), fetched and eyeballed."
  - "ill-be-gone-in-the-dark: HarperCollins 2018 host-book jacket (isbn 9780062319784) - its own cover type credits McNamara as author and Flynn only for the introduction, so using it cannot imply she wrote the book."

rejected_on_rights_or_trap_grounds:
  - "gone-girl UK (isbn 9780297859383): resolves, no watermark, but its promotional sticker reads 'soon to be a major film' - text that cannot predate the 2013 film announcement, so the photographed copy is a later tie-in-adjacent printing, not the 2012 first edition this entry records. This is exactly the film-tie-in trap named in the brief; rejected in favor of the US cover."
  - "chicagos-fine-arts-building (isbn 9781951963330): Open Library holds the edition record (confirmed via the isbn json endpoint) but no cover field on it - checked directly, not merely unsearched. Trope Publishing's product page was not used as a substitute: a small press with no stated editorial-use terms."

left_bare_and_why:
  - "masks: a comics short story in a newspaper supplement and a periodical issue, no ISBN of its own (editions.yaml already established this absent). comics.org and LOC block automated fetches; no other licensable image found."
  - "gone-girl-film, sharp-objects-tv, widows, utopia: the four screen/TV credits named in the brief - no book, no ISBN, so no OpenLibrary cover is possible. Studio poster/key art was not substituted anywhere; it is not this wing's to license."

portrait: >
  File:Gillian_Flynn_2014_(cropped).jpg, Wikimedia Commons - aphrodite-in-nyc,
  CC BY 2.0, attribution required, no Restrictions flag. A head-and-shoulders
  crop from the Gone Girl premiere at the 52nd NYFF, October 2014; confirmed
  by eye to be a clear, well-framed, correctly identified photo of Flynn
  herself. The other candidate on Commons, File:Gillian_Flynn.jpg (a 2009
  bookshop event), was rejected after viewing it: she is small, off-centre,
  back-lit, with audience heads filling the foreground.

header: >
  File:Farmland_in_Bevier_Missouri_-_panoramio.jpg, Wikimedia Commons -
  VoyagerMU, CC BY-SA 3.0, attribution required, no Restrictions flag. Flat
  north Missouri farmland - pond, treeline, farmhouse at the horizon under
  overcast spring sky - matching theme.yaml's art motifs (flat farmland to
  the horizon, a distant outbuilding) without depicting any book's specific
  setting. Used the API's 1920px thumburl per the skill's rule against
  hand-built Wikimedia URLs. A second candidate, a barn-and-silo photo from
  the same photographer, was viewed and passed over: too much empty sky, the
  subject off to one side rather than in the middle third.

curator_questions:
  - "The Grownup and Sharp Objects both have equally clean US and UK covers on Open Library; the US edition was used throughout for consistency (also the earlier region in every case but The Grownup, where it leads by two days). Happy to add the UK jacket as an edition-level coverUrl in editions.yaml if a curator wants both visible - that field is outside this stage's remit."
  - "No licensed cover exists for Chicago's Fine Arts Building (2025, no Open Library cover) or for Masks (no ISBN at all). Worth a second pass if either surfaces a cover later - the 2025 book in particular may simply not be catalogued on Open Library yet."

tool_calls: >
  24 total, 19 network-touching: 10 OpenLibrary cover checks, 8 saved
  downloads covering the 8 candidate ISBN covers, 1 isbn/json check for the
  Chicago's Fine Arts Building absence, 3 Commons API lookups (portrait
  candidates, header candidates, per-file extmetadata), 2 saved portrait
  downloads, 2 saved header downloads, plus a final 7-URL --check batch on
  every URL actually written. Every fetched image was opened and looked at,
  not just HTTP-checked.
