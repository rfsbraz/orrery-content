work_ids_core: >
  sharp-objects (2006), dark-places (2009), gone-girl (2012),
  the-grownup (2014) - the four works of prose fiction, the reading spine

work_ids_extended: >
  masks (2014, comic short story w/ Dave Gibbons), gone-girl-film (2014,
  sole screenwriter), sharp-objects-tv (2018, wrote 2 of 8 episodes + EP,
  Marti Noxon is creator/showrunner), widows (2018, co-screenplay with
  Steve McQueen), utopia (2020, sole writer of all 8 episodes, creator,
  showrunner). Tiered off the prose spine by medium, not by importance;
  Utopia and the Gone Girl screenplay are entirely hers, Widows and Sharp
  Objects TV are real but partial writing credits, distinguished in each
  note rather than by tier.

theme_preset: heartland-noir

theme_palette: >
  Cold overcast newsprint-grey background (not near-black, not warm ivory -
  the only other light-ground wing is Agatha Christie's warm ivory, and this
  is deliberately not warm), near-black ink, bruise-plum accent around hue
  300 - unclaimed by any sibling wing (Palahniuk green ~160, King oxblood
  ~10, Peixoto wheat-gold ~40).

theme_faces: >
  displayFace sourceSerif (journalism register, fits a bibliography that
  runs through two newsrooms and Flynn's own decade at Entertainment
  Weekly). signature rule (a straight incision/copy-desk line) - also used
  by Palahniuk and Valter Hugo Mae, but the palette carries the
  distinctness here.

theme_art: >
  Screen doors, flat farmland heat-haze, hand-written diary pages, a
  hog-farm outbuilding at a distance, clinical ballpoint-pen linework on
  halftone newsprint texture. Avoid list explicitly rules out knives/blades
  (the "sharp objects" literalism trap), gore, tabloid lettering, storm
  imagery, and southern-gothic decay (this is the Midwest, not the South).

capabilities_activated: >
  hall (always on) and connections (auto, real two-edge graph: gone-girl-film
  and sharp-objects-tv each point back at the novel they restage). river,
  companion, wizard and editions stay dark - no events.yaml, eras.yaml,
  orders.yaml/startHere or editions.yaml exists. No characters.yaml: nothing
  recurs across her separate novels or The Grownup.

left_deliberately_empty:
  - "eras.yaml, events.yaml, orders.yaml, achievements.yaml, editions.yaml, characters.yaml - each belongs to its own specialist and none was attempted here"
  - "externalIds on every work - left null for enrich.py"
  - "startHere - no publisher-numbered sequence or citable community entry recommendation was found"

open_questions_for_curator:
  - "Sharp Objects (HBO) and Widows are real, credited, produced work but Flynn is a co-writer on someone else's production rather than sole author; tiered extended with the exact credit split stated in each note. A curator could reasonably want a finer distinction than canonTier currently offers between these two and the fully-hers Gone Girl screenplay and Utopia - flagged rather than invented a field for."
  - "\"The Grownup\" is recorded as one work rather than as a Rogues anthology entry plus a separate reprint; reasoning is in works.yaml's own note, since it turns on a real distinction from how the Palahniuk wing handles its own anthology-origin story."

gaps_for_completeness_auditor:
  - "no plot summary was reachable anywhere for Masks (2014); the work entry states form and collaborators only, no premise - genuinely absent from the sources checked, not an oversight"
  - "three unproduced/unpublished projects exist and are deliberately excluded, named in works.yaml's header: a fourth novel in progress since 2023, an HBO Dark Places limited series announced 2024, a Grownup film adaptation in development, and a Tim Burton Attack of the 50 Foot Woman remake announced 2024 - watch for any of these to premiere or publish"

gaps_for_press_archaeology:
  - "only 3 lifeEvents scaffolded; aura_density.py flags an 8-year dark run, 2012-2019, with no aura at all across her highest-visibility decade"
  - "the 2003 marriage, two children (2010, 2014), and the Kansas City upbringing beyond the one bundled origin event were found but not judged high-impact enough to include on a thin first pass - worth a second look"

tool_calls: >
  Roughly 60 total; about 20 were network-touching (python scripts/fetch.py
  invocations, ~30 distinct URLs, almost entirely English-language Wikipedia
  and heavily cache-assisted after the first two batches - no WebSearch was
  needed, unlike the Portuguese-language wings). A handful of guessed
  publisher/Guardian/NYT URLs for the Masks comic 404'd or 403'd and were
  abandoned in favor of the Wikipedia article actually read, rather than
  guessed further.
