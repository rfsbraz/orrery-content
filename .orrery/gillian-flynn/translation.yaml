stage: translation
slug: gillian-flynn
locale: pt-PT
status: >
  i18n_coverage.py pt-PT 82/82 files fully covered (before: 78/82, missing
  franchise.yaml, works.yaml, events.yaml, authors/gillian-flynn.yaml - no
  regression elsewhere). validate.py --slug gillian-flynn green, exit 0, run
  after the last write including this handoff. sync_skill_blocks.py green.

files_created:
  - content/i18n/pt-PT/franchises/gillian-flynn/franchise.yaml (description)
  - content/i18n/pt-PT/franchises/gillian-flynn/works.yaml (11 synopses)
  - content/i18n/pt-PT/franchises/gillian-flynn/events.yaml (3 events, title+description)
  - content/i18n/pt-PT/authors/gillian-flynn.yaml (bio + 3 lifeEvents, title+description)

scope_deviation_from_brief: >
  The brief listed "notes" among what to translate. Found and followed
  instead the established, explicit, repo-wide convention (headers already
  written into joao-tordo/works.yaml and jose-luis-peixoto/{works,events}.yaml):
  works.yaml `note:` fields are curatorial annotations, not reader-facing
  prose, and stay in the base language in every existing wing - none of
  stephen-king/chuck-palahniuk/agatha-christie's combined 26 work notes are
  translated either. i18n_coverage.py's own PROSE map agrees (works.yaml
  counts only `synopsis`). Flynn's notes carry this furthest: several read as
  literal curatorial instructions ("SPOILER CARE... Do not extend it toward
  the family's secret") rather than museum copy, which is exactly the kind
  of text the convention exists to keep off the translated page. Translated
  only synopsis/description/bio/lifeEvent fields; the 1+11+6+7=25 gap the
  coverage script reported before this pass matches exactly.

titles: >
  Every [[work:...|text]] reference translates its display text but never
  the id, and no work `title` was touched anywhere. Kept in English
  throughout: editions.yaml records only US/UK editions for this wing (see
  editions-stage.yaml), so no Portuguese published title exists to cite -
  including for Gone Girl, whose real Portuguese title ("Em Parte Incerta")
  belongs to an edition entry nobody has written, not to this overlay. Said
  so directly in works.yaml's header rather than leaving a future translator
  to rediscover it.

quotations: >
  Flynn's two direct quotes (the TIME "I've certainly been called a
  misogynist..." passage and the Utopia "game of chicken" line, both in
  events.yaml) are kept verbatim in the English she actually spoke, with the
  surrounding narration translated. Stated as a rule in events.yaml's header.
  No precedent existed elsewhere in the repo for this (grepped all pt-PT
  files for direct English quotes in Portuguese prose; found none - every
  prior wing is either Portuguese-language or has no directly quoted
  speech), so this is a first application of the brief's instruction, not a
  match to an existing pattern.

spoiler_discipline: >
  Translated what the redacted base text already says, without restoring
  cut detail. The Grownup's synopsis ends on "Não acredita no sobrenatural -
  até lá entrar" (until she walks in) - same cutoff point as the English,
  nothing resolved. franchise.yaml's Sharp Objects line stays at "uma
  repórter enviada de volta à terra natal que a assombra" (sent back to the
  home town that haunts her) - no physical detail added. The two
  press-archaeology events (bestseller run, misogyny-question reception) are
  publishing/reception history with no plot content to leak in either
  language, translated in full. No Portuguese-language knowledge of Gone
  Girl's twist was drawn on anywhere - nothing in the base text needed it.

base_file_errors_found: none.

curator_questions:
  - >
    The scope deviation above (notes not translated) is a judgment call
    against an explicit brief line, made because it matches this repo's own
    stated and consistently-applied convention. Worth confirming that's the
    right call, though reversing it would mean translating first-person
    curatorial instructions into reader-facing Portuguese, which every other
    wing avoids for good reason.
  - >
    "co-showrunner" and "co-criadora" in the author bio hyphenate
    inconsistently (showrunner is an English loanword, criadora isn't) - a
    native proofreader's call, not mine to force either way.

tool_calls: >
  36 total. Reads: SKILL.md, all 8 prior-stage handoffs, 4 base content files
  (franchise/works/events/author) plus eras.yaml and orders.yaml (both empty,
  confirmed nothing to translate), SCHEMA.md's Translations section, 8
  existing pt-PT files across 4 other wings for style/convention precedent.
  Bash: worktree/branch check, i18n_coverage.py x2, validate.py --slug,
  sync_skill_blocks.py, a yaml-parse smoke test, 2 grep sweeps for
  Brazilianisms/gerunds and for existing English-quote precedent, one mkdir.
  Write: 4 content files + this handoff.
