stage: editions
slug: gillian-flynn
status: validate.py and sync_skill_blocks.py green

capability: >
  editions activates. content/franchises/gillian-flynn/editions.yaml created
  with 10 entries covering 6 of 11 works.

works_with_editions:
  - "sharp-objects (US Shaye Areheart 2006 + UK Weidenfeld & Nicolson 2006)"
  - "dark-places (US Shaye Areheart 2009 + UK Weidenfeld & Nicolson 2009)"
  - "gone-girl (US Crown 2012 + UK Weidenfeld & Nicolson 2012)"
  - "the-grownup (US Crown 2015 hardcover + UK Weidenfeld & Nicolson 2015 paperback)"
  - "ill-be-gone-in-the-dark (HarperCollins 2018 - McNamara's book, Flynn wrote only the intro)"
  - "chicagos-fine-arts-building (Trope Publishing 2025 - Graff's book, Flynn wrote only the foreword)"

works_without_editions:
  - "gone-girl-film, sharp-objects-tv, widows, utopia: screen/TV works, no ISBN, no entry"
  - "masks: comics short story in a Guardian supplement and Dark Horse Presents #200, a periodical single issue with no ISBN of its own (checked, confirmed absent)"

isbn_check_digits_verified: >
  All 10 arithmetically by hand and re-verified by calling the repo's own
  valid_isbn13() directly, with a negative control (corrupted last digit)
  confirmed to fail: 9780307341549, 9780297851523, 9780307341563,
  9780297851578, 9780307588364, 9780297859383, 9780804188975, 9781474603041,
  9780062319784, 9781951963330. No duplicates.

deviation_from_default_rule: >
  The skill's default is the most recent in-print edition; this file instead
  records each work's first edition per region, per the assignment brief
  ("record the first edition... do not let a UK reissue, a film tie-in cover,
  or a later mass-market paperback masquerade as it"). Flagging the
  divergence from the Palahniuk/King precedent (current in-print reissue,
  historical first edition only in a note) since a curator may want the
  in-print ISBN recorded here instead, or alongside.

rejected_as_unverifiable_or_not_first:
  - "Sharp Objects US: Wikipedia's infobox ISBN 0307341550 resolves via OpenLibrary to the 2007 Three Rivers Press paperback reprint, one transposed digit from the true 2006 Shaye Areheart hardcover ISBN 9780307341549 - not used."
  - "Sharp Objects UK: OpenLibrary catalogues ISBN 9780297851523 as 'Orion Publishing Group, Limited', 2007, no format - the same company's imprint name and a different year than Biblio/AbeBooks/eBay's agreeing 2006 hardcover-first-edition record for the identical ISBN. Used the 2006 hardcover date; the OL year is not used."
  - "The Grownup UK: bookshopapocalypse.com lists a 2014 'UK first edition' paperback with no stated ISBN, uncorroborated by Wikipedia, Browns Books (UK trade supplier) or AbeBooks, all of which place the UK Weidenfeld & Nicolson paperback at 5 Nov 2015. Not used."
  - "Sharp Objects and Dark Places UK true first-edition ISBNs were absent from OpenLibrary's own work-level edition lists (all editions fetched, none matched); recovered instead via Biblio.com's per-ISBN page and corroborated by AbeBooks/eBay for Sharp Objects."

curator_questions:
  - "Confirm whether first-region-editions (this file) or current in-print ISBNs (repo default) is the right call for this wing; happy to add current-in-print entries alongside if wanted."
  - "The Grownup has no UK hardcover in any source checked - paperback only. Worth a second look if a UK hardcover surfaces later."
  - "No coverUrl set on any entry; visual-metadata is a separate stage."

tool_calls: >
  55 total, 28 network-touching (fetch.py batches - Wikipedia infoboxes,
  OpenLibrary isbn/ and works/.../editions.json, Biblio.com per-ISBN pages,
  publisher sites HarperCollins/PRH/Trope/Browns Books - plus 5 WebSearch
  calls for UK first-edition ISBNs OpenLibrary's own work records lacked).
  Google Books API was tried once and 429'd; abandoned rather than retried.
  ISFDB and Jisc Library Hub Discover were tried and abandoned (ISFDB barely
  indexes this non-genre author; Jisc 403'd). fantasticfiction.com and
  search.worldcat.org returned bot-blocked/JS-only pages and were dropped.
