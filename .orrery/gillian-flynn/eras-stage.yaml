stage: eras
slug: gillian-flynn
status: validate.py --slug gillian-flynn green (exit 0, warning list byte-identical to before), sync_skill_blocks.py green

outcome: >
  eras: [] with the reasoning in the file's header comment. No received
  periodisation of this career exists in the sources reachable here. All 11
  works sit outside every era by design; validate.py raises no orphan warning
  for the wing, matching the jose-luis-peixoto precedent.

eras_written: none

candidates_tested_and_rejected:
  - candidate: "the three novels as a named group (trilogy, cycle, 'the Missouri novels')"
    rung: 2 and 4
    finding: >
      No critical source groups them. The only groupings found are publisher
      bundles (The Complete Gillian Flynn) and retailer box sets, which are
      marketing, not periodisation. "The Missouri novels" is also false to the
      books: Dark Places is set on a Kansas farm.
  - candidate: "the post-2012 turn to screen, as a named phase"
    rung: 1 and 2
    finding: >
      Flynn names the gap, never a period. Interview (Nov 2018): "I am
      starting to get anxious because I haven't published a book since Gone
      Girl, aside from The Grownup. I've done a lot of screenwriting, but
      that's different." People (May 2025): "It's hard to write after Gone
      Girl", "lightning in a bottle, never gonna be replicated". Both frame an
      unfinished book, not a phase of work, with no name, start or end. No
      critic found who names it either.
  - candidate: "Gone Girl as a dividing line in the career"
    rung: 2
    finding: >
      Criticism divides the genre at 2012, not this author. CrimeReads dates
      the rise of domestic noir to "a decade after Gone Girl"; Literature/Film
      Quarterly's "Before Gone Girl" (Szaranski, 53.2) uses the division to
      argue that Gone Girl's success eclipsed Sharp Objects in attention, a
      reception claim about one novel. What both cut in two is other writers'
      work.
  - candidate: "Midwestern noir / domestic noir as era labels"
    rung: 2 and 3
    finding: >
      Genre labels covering the whole prose corpus, so they cannot cut it
      anywhere. "Midwestern noir" is the interviewer's proposal to Flynn in
      2018 ("I'd argue that you created a new genre..."), not her term.
      "Domestic noir" is Julia Crouch's, proposed on her own blog in 2013 for
      a set of writers that does not include Flynn.
  - candidate: "Gillian Flynn Books (Zando imprint, 2021) as a publishing-record era"
    rung: 4
    finding: "A real publishing fact with bad fit: it names an editorial venture, not a body of her writing, and none of her 11 works belong to it."

negative_controls:
  - "Britannica's biography (Wayback capture, live page 403s) is chronological and names no phase."
  - "gillian-flynn.com's About text lists the books without grouping them."
  - >
    LARB (Aug 2018) reads all four prose books as one undivided body united by
    class. A critic building an argument across the corpus and never reaching
    for a period is the clearest evidence none is available.
  - "No obituary tier: Flynn is alive, so the best periodising document type does not exist."

languages_searched: "English only, correct for an American writer with an entirely anglophone critical and interview record."

sources_that_refused: "britannica.com 403s automated fetches; read via Wayback. Nothing else refused."

years_uncovered: 'All of 2006-2025, honest rather than a gap to close. "outside every era: 11" in wing_digest is not a defect here.'

curator_questions:
  - >
    The fourth novel, on publication, closes the 2012-onward silence into an
    interval and may attract a critical name that does not exist today. Worth
    re-running this stage then, not before.
  - >
    My weakest judgment: Flynn's 2018 "I haven't published a book since Gone
    Girl... I've done a lot of screenwriting, but that's different" is the
    closest thing to an author framing on record. I read it as naming an
    absence of novels, not a phase of work, so it does not reach rung 1. A
    curator reading it as her dividing her own career would get one era from
    2012 with her sentence as its description. I judged that a full-bleed
    plate built on it would be our inference wearing her quote.

tool_calls: >
  43 total; 20 network-touching (12 fetch.py invocations covering 12 distinct
  URLs, 4 of those invocations served entirely from cache, plus 8 WebSearch
  calls to discover candidate framings before fetching the pages themselves).
  The Wayback lookups ran at --workers 2.
