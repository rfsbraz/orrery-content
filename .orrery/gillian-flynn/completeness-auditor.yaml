added:
  - id: gillian-flynn/ill-be-gone-in-the-dark
    published: 2018
    canonTier: apocrypha
    evidence: >
      Introduction to Michelle McNamara's "I'll Be Gone in the Dark"
      (HarperCollins, Feb 27, 2018). Confirmed on three independent sources:
      Wikipedia infobox (pub date, ISBN, publisher), HarperCollins's own
      product page ("Introduction by Gillian Flynn"), and Amazon's
      structured contributor field ("Gillian Flynn - Introdução"). Not on
      Wikipedia's bibliography table - found via a direct forewords/
      introductions search.
  - id: gillian-flynn/chicagos-fine-arts-building
    published: 2025
    canonTier: apocrypha
    evidence: >
      Foreword to Keir Graff's "Chicago's Fine Arts Building: Music, Magic,
      and Murder" (Trope Publishing Co., June 3, 2025, ISBN
      978-1-951963-33-0). Confirmed on the publisher's own product page and
      Amazon's structured contributor field ("Gillian Flynn (Prólogo)").
      Same search path as above.

corrections:
  - work: gillian-flynn/sharp-objects-tv
    what: >
      Flynn's writing credit was undercounted at 2 of 8 episodes (2 "Dirt"
      solo, 7 "Falling" with Scott Brown). Wikipedia's own episode-by-episode
      writer table (not the summary filmography grid) also credits her on
      episode 8 "Milk", co-written with Marti Noxon. Corrected to 3
      episodes; note now cites the episode table directly.
    reorders: "no - published year (2018) unchanged, only the note's detail"
  - work: gillian-flynn/masks
    what: >
      Note said Dark Horse Presents "collected [Masks] that year" (2014).
      Three independent trade sources (Multiverse's publisher press release,
      Bleeding Cool, CBR) date DHP #200 to February 18, 2015. Corrected;
      also specified the Guardian run as April 26, 2014 (a complete 26-page
      comics special, not an excerpt) and the exhibition as the British
      Library's "Comics Unmasked" (CBR alone says "British Museum" - not
      repeated).
    reorders: >
      no - published stays 2014 (the Guardian run, which is the actual first
      publication and was already correct); only the DHP reprint date in the
      note was wrong.

found_and_rejected:
  - what: "Gillian Flynn Books, the Zando imprint she runs, launched 2021"
    why: >
      She acquires and edits across the imprint's list, e.g. Araminta
      Hall's "One of the Good Guys" (2024), but is not credited as author,
      editor or contributor on that book's own title/copyright page - it
      carries a Flynn blurb, nothing more. Running an imprint is not
      authorship of what it publishes. Documented in works.yaml's exclusion
      list so a future sweep doesn't rediscover the imprint and mistake a
      blurbed title for hers.
  - what: "recipe contribution to The Mystery Writers of America Cookbook (Quirk Books)"
    why: >
      Surfaced via OpenLibrary's author-work list. One recipe among a
      dozen-plus crime novelists (Lee Child, Sue Grafton, James Patterson)
      in a themed collection - no individual byline or prose, unlike the
      introduction/foreword entries added. Judged out of scope rather than
      left unresolved, since the record is unambiguous; flagged below in
      case a stricter completionist standard is wanted later.

