dark_run_before_after: >
  Before: 13 aura entries, 1.18/work, longest dark run 8 years (2012-2019) -
  her highest-visibility decade with no context at all. After: 16 aura
  entries, 1.45/work, longest dark run 4 years (2016-2019), below the
  script's 5-year flag threshold. Filled with three new franchise events
  dated 2013, 2014-09-25 and 2015.

added:
  - id: gone-girl-bestseller-run-2013 (content/franchises/gillian-flynn/events.yaml)
    what: >
      Gone Girl's leap from an editor's cautious "the ending is a risk, there's
      no hero" expectations to entering the NYT list at No. 2 and rising to
      No. 1 the following week, ~2 million copies in year one, 91 weeks total
      on the list. Med impact: explains why the screenplay and TV career
      happened at all.
    sources: Northwestern alumni magazine (Spring 2013), TIME's Lev Grossman
      cover story (Sep 25 2014), a Guardian piece by Emma Brockes read via its
      Gulf News syndication (Guardian byline visible; original
      theguardian.com URL not locatable, see below) - all read directly.
  - id: gone-girl-misogynist-question-2014 (events.yaml)
    what: >
      TIME's cover interview put the "is this misogyny" charge to Flynn
      directly; her on-record answer ("I've certainly been called a
      misogynist... it's worse to only write about good women") is a
      reception rupture with a real mark on the canon - the same defense she
      has made of every difficult woman she's written since. High impact,
      named characters only (Camille, Libby Day), no plot.
    sources: TIME, Sep 25 2014 (primary quote) and TIME, Oct 6 2014 (Eliana
      Dockterman, the wider debate) - both read directly.
  - id: utopia-hbo-collapse-2015 (events.yaml)
    what: >
      Fincher recruits her on the Gone Girl set (2013) to adapt Utopia for
      HBO; she writes 10 episodes over two years; HBO and Fincher break down
      over a ~$9M budget gap in 2015 ("we were playing a game of chicken");
      the scripts sit dead three years until Amazon orders it to series
      April 19, 2018, Flynn now sole showrunner. Med impact: the career
      rupture that explains the gap between the abandoned HBO version and
      the show that actually aired.
    sources: Hollywood Reporter interview (2020, read directly, primary
      quotes) and Wikipedia's Utopia (2020 TV series) development section
      (dates cross-checked).

corrections:
  - what: >
      flynn-ew-layoff-2008 (author lifeEvent) carried only a Wikipedia
      citation for a high-impact claim. Added two independent, directly-read
      sources corroborating the EW decade and the layoff: TIME's 2014 cover
      story and the 2020 Hollywood Reporter piece.
    reorders: "no - text unchanged, sources only"

found_and_rejected:
  - what: "the film's reported changed third act"
    why: >
      Explicitly a spoiler trap: describing what changed requires describing
      what the novel does at its climax. Dropped entirely rather than written
      around, per the brief's own instruction. Documented in events.yaml's
      header comment so it isn't re-attempted.
  - what: "2015 Edgar Award for The Grownup"
    why: "already carried in that work's own note in works.yaml; a duplicate event would pad, not add."
  - what: "the exact 'psycho bitches' quote chased via WebSearch"
    why: >
      Only found on quote-aggregator sites (Goodreads, BrainyQuote,
      QuoteCatalog), ruled out as sources by CURATION §4. TIME's directly-
      sourced quote serves the same editorial purpose.
  - what: "Washington Post's '52 weeks on the bestseller list' milestone (Jul 2013)"
    why: >
      washingtonpost.com refused the fetch twice (RemoteDisconnected); no
      Wayback snapshot exists (checked via the availability API). Only ever
      seen as a search snippet, never opened - dropped. The underlying
      phenomenon survives on three sources actually read.
  - what: "PEOPLE/aol.com 'hard to write after Gone Girl' quote"
    why: >
      Dated 2025, about her unpublished fourth novel, not the 2012-2019 gap.
      aol.com is a syndicated mirror, not independent corroboration.

