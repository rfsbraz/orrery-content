stage: spoiler-audit
slug: jose-luis-peixoto
status: validate.py exit 0, sync_skill_blocks.py exit 0, i18n_coverage unchanged

files_with_prose_changed:
  - content/authors/jose-luis-peixoto.yaml
  - content/franchises/jose-luis-peixoto/works.yaml
  - content/franchises/jose-luis-peixoto/events.yaml
# No pt-PT overlay exists for this wing yet, so nothing was owed a mirror;
# translation reads the corrected base prose.

engine_verified: >
  spoilerAfter is consumed only for events (river, timeline, companion) and
  character appearances: lib/spoilers/index.ts, types.ts
  AuraEvent/CharacterAppearance, and the four components passing the field.
  works[].synopsis and works[].note have no consumer, so rewriting was the
  only lever here. The river is live on this wing (capabilities.ts derives it
  from timeline.length > 0; nine aura entries), so the aura really renders.

redactions:
  - file: content/authors/jose-luis-peixoto.yaml
    entry: peixoto-montanha-closes-circle-2025 (lifeEvent, high)
    work: A Montanha (2025)
    revealed: >
      Title asserted "A Montanha closes the circle Morreste-me opened";
      description closed "he returns to his father's death by way of a
      hospital ward full of strangers". Quetzal's own synopsis stops at the
      premise and withholds the turn ("um escritor... tenta construir um
      romance com todas as histórias que lhe foram confiadas, até que o
      impensável acontece"). The aura resolved, for a novel published this
      year, an arc the publisher leaves open, and asserted a periodisation
      the author refuses in the interview the eras stage cites.
    action: >
      Rewritten, not gated. The sourced making-of survives (IPO doctors'
      proposal, years of postponement, his quoted reason naming Morreste-me),
      so the biography reaches every reader and the turn is never stated.

  - file: content/franchises/jose-luis-peixoto/works.yaml
    entry: autobiografia synopsis
    revealed: >
      Called the novel "Peixoto's own tribute to the writer whose prize made
      his career" - an unsourced reading that pre-resolves the book's stance
      and contradicts the publisher's own framing of the young writer toward
      the master, "admiração e um incontrolável repúdio".
    action: characterisation removed, factual prize relation kept.

kept_after_checking:
  - entry: peixoto-cemiterio-francisco-lazaro
    ruling: >
      Not a spoiler; I expected to gate it and the jacket overturned that.
      Bloomsbury's cover copy for The Piano Cemetery states Peixoto "weaves
      the tragic true story of the marathon-runner, Francisco Lázaro" into
      the novel, and names the family Lázaro. Recorded in the event note.
  - entry: peixoto-coreia-do-norte-2012 (low)
    ruling: >
      Borderline, kept. It narrates a whole micro-episode of Dentro do
      Segredo including its payoff (the summons that is only a lost coat).
      Not load-bearing, reportage rather than fiction, and the author retold
      it himself while promoting the book. Gating would also backfire: the
      shield would announce that the travel book has a reveal. Tightenable.
  - entry: o-caminho-imperfeito synopsis
    ruling: >
      Not a spoiler. The Bangkok post-office remains are Quetzal's own
      SINOPSE almost verbatim.
  - entry: peixoto-fathers-death (high)
    ruling: >
      Kept. No cause of death, no private detail about the father, and the
      disclosure is the author's own repeated public statement in his own
      words. 1996 is labelled an approximation. Not a spoiler for
      Morreste-me: the father's death is that book's own subject.
  - entry: peixoto-nabeiro-almoco-de-domingo-2019
    ruling: Kept. Nabeiro's 2023 death postdates the 2021 novel; all press-sourced.
  - entry: em-teu-ventre synopsis
    ruling: >
      Register checked, kept. The children "reported" the apparitions,
      adjudicating nothing; only Lúcia and her mother named; nothing stated
      about the seers who died as children.
  - entry: Saramago (autobiografia, peixoto-saramago-death-2010)
    ruling: >
      Nothing invented about him is stated as fact; both entries flag the
      invention explicitly, which is the correct register.
  - swept: >
      No spoilerAfter decorates a field that cannot carry one; all nine sit on
      events or lifeEvents, all null. Sibling prose read on every entity
      touched. eras.yaml and orders.yaml hold reasoning in comments, unrendered.

curator_questions:
  - >
    validate.py's comment scanner reads YAML "#" comments but not prose field
    values. "TODO for the curator" inside a note: passes silently; the same
    text in a comment fires. Falsified both ways here. Its silence over
    note:, synopsis: and description: is not evidence they are clean.
  - >
    Almoço de Domingo's synopsis names "Manuel Rui Azinhais Nabeiro", but the
    wing's own cited Visão interview has Peixoto saying he omitted the
    Nabeiro surname so the character could stand as exemplary. Not a spoiler,
    but it runs against the author's framing. An accuracy call, not mine.
  - My weakest decision, named: keeping the North Korea lost-coat payoff.

tool_calls: >
  40 total; 9 touched the network - 9 batched fetch.py invocations covering
  15 URL requests, 6 cache-served. Zero WebSearch: publisher pages were found
  by querying the Wayback CDX API for the ficha URL rather than searching for
  it, which is why the jacket lookups cost nine calls instead of forty.
