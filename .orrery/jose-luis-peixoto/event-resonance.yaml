# José Luís Peixoto (b. 1974): Event resonance judgement
#
# Born April 25, 1974, the day of the Carnation Revolution. Publishing career
# 2000-2025 across 11 novels, 4 poetry collections, 3 travel narratives, 4
# theatre works, 2 children's books, and other forms. All works checked against
# the author's own bibliography, Wikipedia entries (Portuguese and English),
# and publisher pages.

rulings:

  excluded:
    - sept-11-2001: "no novel reaches for it"
    - financial-crisis-2008: "no work answers it"
    - carnation-revolution-1974: >
        born at the Revolution's moment (April 25), never under censorship.
        Tordo (born 1975) includes this with the insight that his freedom to
        write apolitical interior novels is the Revolution's direct gift.
        Peixoto benefits from the same freedom but does not write about
        it - no novel engages the event or its legacy. Unlike Mãe (born 1971),
        who sets his debut in the Estado Novo world the Revolution closed,
        Peixoto's novels are set elsewhere (rural Alentejo, 1917 Fátima, 1990s
        Lisbon, North Korea) or are poetry/travel. Freedom is the condition of
        his work, not its subject.
    - chain-bookshop-1982: "a British and American shop format; his trade is small Portuguese presses"
    - online-bookselling-1995: "domestic, bookshop-led readership; no title answers this"
    - ebook-and-self-publishing-2007: "traditionally published throughout (Quasi, Objectiva, Alfaguara, Porto Editora); no self-publishing story"
    - prestige-fantasy-adaptation-2011: "he does not write fantasy"
    - portugal-bailout-2011: >
        emigration in Livro (2010) is post-Salazar historical, not austerity.
        Novels of the bailout decade (2011-2014) are set elsewhere: Dentro do
        Segredo (2012) in North Korea, Galveias (2014) in 1984. Later works
        continue to avoid the period (Em Teu Ventre 1917, Autobiografia 1990s,
        Almoço de Domingo is biography spanning 1931-2021 but not framed around
        crisis). Contrast João Tordo, whose Anatomia dos Mártires (2011) is
        built on the bailout directly.
    - booktok-2020: "Lusophone literary fiction is not what short-form video moves; no work here answers book-discovery culture"

  included:
    - covid-19-pandemic-2020: >
        Regresso a Casa (2020), his first poetry in twelve years, is "written
        in confinement, mapping the four walls of a house and the memories
        held there: solitude, closed doors, a mother, a father, childhood, and
        a homesickness that runs alongside a restless urge to travel the whole
        world and always return." The pandemic's isolation and the interior
        memory-work it provoked are the direct subject.

curator_notes:
  - >
    Carnation-revolution-1974: The comparison is instructive. Tordo (born 16
    months after it) includes it because his career is built on the freedom.
    Mãe (born in 1971, before it) sets his debut IN the State Novo, showing the
    world it closed. Peixoto (born the day of it) inherits the freedom but does
    not write about it or the absence of what preceded it. His interior,
    apolitical style could exist anywhere. So he's excluded: the event made his
    career possible but does not reach the page.
  - >
    Portugal-bailout-2011: Contemporaneous works are set in the past or abroad.
    Unlike Tordo (Anatomia), Mãe (excluded), or other Portuguese writers of that
    decade, Peixoto's novels refuse the present crisis entirely. Whether this
    reflects artistic choice (interior fiction over contemporary engagement) or
    simple luck of subject (he happened to write elsewhere that year) is unclear,
    but the bibliographic fact is solid: no novel answers it.
  - >
    Covid-19: The single inclusion. A book written in confinement about
    confinement. Clear resonance.

reading_orders_follow: true
