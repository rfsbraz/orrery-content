record_gaps: >
  2020-2024 (Regresso a Casa, Onde) stayed dark on purpose: their press
  record (confinement, all 2020 plans cancelled, a literary itinerary
  through Abrantes, Constância and Sardoal) doesn't say anything past what
  the wing's own synopses already carry. Genuinely quiet at the aura
  standard, not unsearched - a future pass shouldn't re-run these same
  queries.

