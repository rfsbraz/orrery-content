added:
  - id: peixoto-nabeiro-almoco-de-domingo-2019 (lifeEvent)
    what: >
      Rui Nabeiro, founder of Delta Cafés, watched Peixoto interviewed on TV
      at the 2019 launch of Autobiografia - itself about a young writer
      asked to write Saramago's biography - and, not knowing him, asked to
      be put in touch and proposed his own biography. Nabeiro died March
      2023.
    sources: [visao.sapo.pt 2021-03-24, noticiasaominuto.com/Lusa 2023-03-19]
  - id: peixoto-montanha-closes-circle-2025 (lifeEvent)
    what: >
      A Montanha's cancer-ward premise began as an IPO Porto doctors'
      proposal, shelved for years, revived after Peixoto reconnected with
      one of the doctors. His own stated reason for finally saying yes -
      Morreste-me, his book about his father's death.
    sources: [dn.pt 2025-11-10, primary interview quote]
  - id: peixoto-cemiterio-francisco-lazaro (franchise event)
    what: >
      Cemitério de Pianos's central Francisco draws on Francisco Lázaro, the
      Portuguese marathon runner who died of heatstroke at the 1912
      Stockholm Olympics; Peixoto also built in a deliberate echo of the
      biblical Lazarus (two sisters named Maria and Marta).
    sources: [rtp.pt 2007, pt.wikipedia]
  - id: peixoto-coreia-do-norte-2012 (franchise event, impact low)
    what: >
      A phone call home from North Korea, followed by a summons to
      reception he braced for as trouble - it was a lost coat. Texture, not
      a rupture; kept low-impact deliberately.
    sources: [visao.pt 2013-04-10]

corrections:
  - what: >
      peixoto-fathers-death dated null -> 1996 (a Sábado, Dec 2023
      interview has him saying his father died almost 28 years ago,
      corroborated by convergent profiles at 1996, age 21). Note added
      explaining the approximation rather than asserting a day.
  - what: >
      peixoto-saramago-death-2010 enriched, not just a namesake prize -
      nine years of real contact (travelled together, guest at his home),
      sourced to a 2019 TSF interview, explaining why Autobiografia was
      hard to write while Saramago lived.

rejected:
  - what: >
      Galveias won Italy's Premio Libro d'Europa. False. It is Livro
      (2010) that won the Salerno Libro d'Europa, awarded 2013; confirmed
      by a Público headline and journeytoportugalrevisited's biography. No
      change needed to my files; flagging since the prompt's lead named
      Galveias.
  - what: >
      A book about Saramago's death. Not a distinct work. That subject is
      Autobiografia (2019), already the sourced content in this wing.
  - what: >
      Saramago's blurb quote calling Peixoto one of the most surprising
      revelations of Portuguese literature. Only found on an aggregator
      blog's "what's been said" list, undated, unattributed to a specific
      outlet. Reads like back-cover copy laundered through a fan site; not
      used.
  - what: >
      Andre Serrano as a pseudonym Peixoto used to win the 2008 Premio
      Daniel Faria. A WebSearch summary asserted this with no source
      behind it, and a second targeted search found nothing corroborating
      it. Looks fabricated; not used, and flagged here so it is not
      retried as if plausible.
  - what: >
      Antidoto and the 2001 Saramago Prize. Already verified in the
      existing entries; no changes made. Publico's 2001-10-09 reaction
      quote is known only via a search summary, since publico.pt still
      bot-challenges direct fetch; sourcing left as-is (Wikipedia), not
      upgraded on unread text.

curator_questions:
