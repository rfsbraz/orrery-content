stage: visual-metadata
slug: jose-luis-peixoto
status: images blocks written; validate.py, i18n_coverage.py (byte-identical to baseline) and sync_skill_blocks.py all green

coverage: 12 of 27 works carry a verified Open Library cover; 15 stay
  typographic. Ceiling was expected to be low for a Portuguese-market
  backlist (SCHEMA.md names ~20% as realistic) - 44% landed higher than
  that, mostly because English/Dutch translation editions of the anglophone
  hits are indexed even where the Portuguese Quetzal printings are not.

covers_confirmed: >
  All 12 cover URLs fetched with ?default=false (HTTP 200, real image
  bytes, not placeholder), then downloaded in full and looked at one by one
  - no retailer watermarks, no wrong-book jackets. Two needed real
  verification work: dentro-do-segredo's OL work record (OL23232612W)
  wrongly merges the correct Quetzal 2012 Portuguese edition with a Dutch
  translation of a different book (Cemitério de Pianos, mistitled "Het
  pianokerkhof") under the same work id - the specific cover used
  (12918252) was checked against the edition list and confirmed to belong
  to the correct Portuguese printing, not the Dutch one. gaveta-de-papeis'
  only indexed cover (14588250) turned out to belong to a different
  candidate image (13144025) on first pull - the initial cover_i for
  dentro-do-segredo resolved to a scanned title page rather than the jacket
  (an Internet Archive artefact); the edition's second cover id was the
  real front cover and is what got used. Both nuances are commented in
  place in works.yaml.

covers_left_empty: >
  15 works: 3 core (antidoto, a-montanha - both too recent, 2023/2025
  reprints, for OL to have indexed) and 12 extended (cal, a-casa-a-
  escuridao, regresso-a-casa, o-caminho-imperfeito, abraco, em-teu-ventre,
  onde, a-mae-que-chovia, hoje-nao, estrangeiras, and the theatre trio
  anatema/a-manha/quando-o-inverno-chegar, which never had a book edition
  at all). Each was checked two ways before being left bare: an OL title
  search and a direct ISBN cover lookup against the exact ISBN in
  editions.yaml, both negative. Every gap is commented in place in
  works.yaml with the ISBN checked, so a later pass does not re-search it.

portrait: >
  "Jose Luis Peixoto (cropped).jpg" on Commons - Helena Canhoto, CC BY-SA
  4.0, 2010, already framed as a head-and-shoulders portrait (425x641,
  correct ratio). Preferred over two other free-licensed candidates that
  were viewed and rejected on framing: a 2017 Goa conference photo (subject
  small, mid-gesture, red-eye) and a 2008 Mexico City reading (landscape,
  environmental clutter) - both CC BY-SA/PD but neither reads as a portrait
  without a blind centre-crop.

header: >
  "Alentejo banner.jpg" on Commons - derivative work by Jjtkk from Nuno
  Sequeira André and Joaquim Alves Gaspar's photograph, CC BY-SA 2.0,
  already a 2100x300 banner crop: isolated cork oaks on a flat, sun-
  bleached gold wheat field, no middle ground, matching theme.yaml's art
  motifs directly. Four other Alentejo landscapes were pulled and viewed
  first and rejected: a vineyard with roses (wrong crop and lush green,
  against the avoid list), a hazy pine-scrub hillside (doesn't read as
  montado), a spring pasture with grazing sheep (lush green sky-heavy
  composition), and a sepia-toned montado photo (real cork oaks but overly
  processed and dramatic-sky, a weaker match than the banner).

curator_questions: >
  None rise to a curator call. One item worth a human's eventual glance:
  gaveta-de-papeis' pictured cover is the original 2008 Quasi Edições
  edition, not the current Quetzal 2011 printing in editions.yaml - correct
  per the skill (OL's cover need not match a specific editions.yaml entry)
  but noted in case a future edition-cover push wants to reconcile it.

tool_calls: >
  Approximately 55 total; about 40 touched the network. Batched via
  fetch.py: 2 calls covering 11 OL title searches (core novels), 1 call
  covering 13 more (extended tier), 1 author-works.json sweep, 1
  editions.json check on the merged dentro-do-segredo record, 2 rounds of
  ISBN-cover-fallback checks (6 URLs each, needed --refresh after the
  default 25s timeout hit a stale negative cache on the first attempt), 1
  --check batch confirming all 12 final cover URLs at once, and roughly 10
  Commons API calls (search plus per-file extmetadata) for the portrait and
  header. Image bytes themselves (12 covers + 3 portrait candidates + 5
  header candidates, all viewed) were downloaded outside fetch.py with a
  small local script, since fetch.py decodes bodies as UTF-8 text and would
  corrupt binary image data - each one still counts as a network fetch.
