work_ids_extended: >
  abraco (cronicas), cal (mixed), hoje-nao (short stories),
  a-crianca-em-ruinas, a-casa-a-escuridao, gaveta-de-papeis,
  regresso-a-casa (poetry), dentro-do-segredo, o-caminho-imperfeito,
