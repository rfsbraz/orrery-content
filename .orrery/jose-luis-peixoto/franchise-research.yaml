theme_preset: alentejo-plains

theme_palette: >
  Near-black scorched-earth background, bleached-limestone ink, wheat-gold
  accent around hue 40 - deliberately distinct from valter-hugo-mae's
  terracotta (hue ~15) and joao-tordo's blue (hue ~200).

theme_faces: >
  displayFace sourceSerif (vhm has spectral, tordo's invalid "canela" falls
  back to fraunces - all three Lusophone wings now land on a different real
  face). signature beam (vhm has rule, tordo's invalid "tideline" falls back
  to thread).

theme_art: >
  Dry plains, cork oaks, whitewash, noon heat-shimmer, sun-bleached line
  work on limestone-wash paper. The avoid list rules out wine-tourism/cork
  kitsch, azulejo tiling, fado cliche, and lush-green or golden-hour gloss.

capabilities_activated: >
  hall only (always on by default). Everything else stays auto and dark -
  no characters.yaml, no work connections, no eras.yaml, no
  orders.yaml/startHere, no editions.yaml - so river, wizard, connections,
  companion and editions all read as genuinely absent rather than half-lit.

left_deliberately_empty:
  - "characters.yaml and work connections - no recurring character or crossover found across works set in an unnamed Alentejo village, 1917 Fatima, 1990s Lisbon, a Porto oncology ward, and emigrant France; each novel is its own world"
  - "eras.yaml - no author-stated or critical periodisation on record, unlike Valter Hugo Mae who names his own tetralogies in interviews; nothing invented to fill it"
  - "orders.yaml and startHere - no publisher-numbered sequence or named entry path found"
  - "editions.yaml and images - out of this stage's scope per the skill (editions, visual-metadata own them); not attempted"
  - "externalIds on every work - left null for enrich.py"

open_questions_for_curator: >
  None rise to a curator call. The editorial judgments made - the
  core/extended split, reclassifying Onde from Wikipedia's own "Ficcao"
  heading to travel writing, and following Cal's 2007 date over English
  Wikipedia's lone 2008 - are documented in works.yaml's own notes with
  sources.

gaps_for_completeness_auditor:
  - "regresso-a-casa (poetry, 2020) and the children's book todos-os-escritores-do-mundo-tem-a-cabeca-cheia-de-piolhos (2016) have title-only synopses; no plot or theme detail was found"
  - "anatema (2005, theatre) rests on secondary sourcing only - a dated Publico headline plus convergent mentions elsewhere - because publico.pt returns a bot-challenge page rather than article text"
  - "poetry-anthology contributions, the pattern that produced apocrypha entries on other Lusophone wings, were not searched for; none are recorded here, which is an absence rather than a ruling-out"
  - "Wook, Bertrand, Quetzal (his actual publisher) and Infopedia all blocked repeated attempts with the browser user agent; the working sources were Portuguese and English Wikipedia (both fetched directly and cross-checked against each other), Portal da Literatura, and individual publisher or press pages reachable via search"

gaps_for_press_archaeology:
  - "only 4 author lifeEvents and 1 franchise event scaffolded, deliberately lean; aura_density.py flags a 9-year gap (2017-2025) with no aura at all"
  - "the father's-death lifeEvent carries no date - a headline interview names the loss, not when it happened"

tool_calls: >
  Approximately 70 total; roughly 39 touched the network - 14 batched
  fetch.py invocations covering about 25 URLs (now cached under
  .cache/fetch/), plus 24 individual WebSearch queries for facts fetch.py
  could not reach, since Wook, Bertrand, Quetzal and Infopedia all block
  automated fetches and WebSearch itself has no batching the way fetch.py
  does.
