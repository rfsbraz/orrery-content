note_fields_not_translated: >
  Followed the convention already set by joao-tordo and valter-hugo-mae's own
  pt-PT overlays (and confirmed by i18n_coverage.py's PROSE map, which omits
  `note` from works.yaml/events.yaml fields, and SCHEMA.md's "Optional curator
  aside"): `note:` is a curatorial/sourcing aside, not reader prose, so the
  notes on cemiterio-de-pianos, autobiografia, almoco-de-domingo, a-montanha,
  onde, anatema and the Francisco Lázaro event were left in English,
  untranslated, matching precedent rather than re-deciding it here.

spoiler_discipline: >
  Translated exactly what spoiler-audit left in the base, added nothing back.
  peixoto-montanha-closes-circle-2025 (author lifeEvent) and the a-montanha
  synopsis: both hold to the premise only, no restored "closes the circle"
  framing, no resolution of "até que o impensável acontece" - the redacted
  shape survives in Portuguese. almoco-de-domingo's synopsis keeps "Rui
  Nabeiro" exactly as the base names him (not the full "Manuel Rui Azinhais
  Nabeiro" the novel itself withholds); the author lifeEvent, which the base
  already names "Manuel Rui Nabeiro" (no Azinhais), is translated at that same
  level, not expanded. Direct Portuguese quotes already embedded in the
  English base (father's-death interview, Saramago conviction line, the
  "sempre me fascinou" and "alguém muito especial" lines, the Morreste-me
  interview quote on A Montanha) are kept byte-for-byte, with no re-paraphrase
  and no redundant English gloss re-added in the Portuguese version.

register_calls: >
  pt-PT discriminators applied throughout: telemóvel (not celular), no
  estar+gerund constructions, AO90 orthography (coletânea, not colectânea).
  "saudade de casa" used for "homesickness" on regresso-a-casa's synopsis as
  the idiomatic reach rather than a literal "nostalgia de casa". Grepped the
  four new files for estar+gerund patterns and the SKILL.md brasileirismo
  list after writing; zero hits.

