curator_questions:
  - >
    None are genuinely a curator call; the record supports the ruling. My
    weakest decision, named: shipping eras.yaml at all rather than leaving it
    absent. Both are supported states. The file earns its place by storing the
    negative result where the next reader will look, so the Abraço and A
    Montanha quotes are not re-researched and, worse, re-read as a
    periodisation.

