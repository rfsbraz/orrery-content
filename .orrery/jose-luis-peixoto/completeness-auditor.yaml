      Rita Correia): the lice-on-every-writer's-head parable about text,
      reading and books. Illustrator credit added, matching the convention
      already used for a-mae-que-chovia.

could_not_verify:
  - anatema: >
      Retested Público directly (per the trap registry's "worth one cheap
      retest"): still returns HTTP 202 with no readable body, same
      bot-challenge the scaffold hit. The existing note (secondary sourcing,
      PEN America and Teatro Nacional D. Maria II corroborating) stands
      unchanged; not rewritten on unread search-summary text per the
      no-laundering rule.
  - poetry_anthology_contributions: >
      Searched directly this pass (not merely left unsearched). Found only a
      2026 preface Peixoto wrote for another author's anthology - an
      introduction credit for someone else's book, not his own contribution
      to record - and no anthology containing a poem of his own. Absence
      confirmed, not just unattempted.
  - newer_work_after_a_montanha: >
      Searched for anything past A Montanha (2025); found none. The author's
      own bibliography page (wayback snapshot) does not yet list A Montanha
      at all, so its absence there is a snapshot-staleness artefact, not
      evidence against completeness.

