added:
  - id: jose-luis-peixoto/estrangeiras
    published: 2016
    canonTier: extended (theatre)
    evidence: >
      Missing from the scaffold's four sources (both Wikipedias, Portal da
      Literatura), but present on the author's own bibliography page
      (joseluispeixoto.net/tag/bibliografia, fetched via wayback since its
      cert has expired live) as "Estrangeiras (Teatro, 2016)". Confirmed
      directly against three independently-read sources: Teatro Municipal do
      Porto's own programme page (premiere 8-9 July 2016, Rivoli small
      auditorium, coproduction directed by João Branco), Quetzal's own blog
      (dated 07.07.16, previewing the premiere), and
      observalinguaportuguesa.org (Lusa wire, Jan 2017, on the Cape Verde
      book launch by Rosa de Porcelana, plus a Brazil run). Dated by the July
      2016 premiere, consistent with how the wing already dates its other
      three plays (stage date, not book date) and with the author's own
      listing.
    reordering: >
      Inserted after quando-o-inverno-chegar (2007) in file order; in the
      derived chronology it sits between em-teu-ventre (2015) and
      todos-os-escritores... (2016, same year) - does not displace any
      existing work's neighbours in a reader-facing sequence, since no
      orders.yaml/startHere exists for this wing.

corrections:
  - work: cal
    change: none - 2007 retained, now triple-sourced
    evidence: >
      Author's own bibliography page also lists "Cal (Prosa e Teatro, 2007)",
      agreeing with Portuguese Wikipedia and bookshop listings against English
      Wikipedia's lone 2008. Added as a third source; DATE NOTE updated.
      Quetzal's own retail ficha (via wayback) shows "Edição/reimpressão:
      10-2009" - a later reprint, not contrary evidence, and deliberately not
      cited as a date source per the edition-vs-first-publication trap.
  - work: onde
    change: note strengthened, tier and date unchanged
    evidence: >
      The author's own bibliography page tags "Onde" as "Narrativa" - not
      "Romance" like his eleven novels, and not "Viagens" like his other two
      travel books - independently corroborating the scaffold's Ficção-to-
      travel-writing reclassification from a source the scaffold hadn't used.

enriched_synopses:
  - work: regresso-a-casa
    was: title-only
    now: >
      Sourced to Quetzal's own SINOPSE (fetched via wayback, publisher ficha
      pages 403 live) plus a Lusa wire piece (dnoticias.pt, fetched directly):
      a pandemic-written collection on the four walls of a house, family,
      solitude and a restless urge to travel that always returns home; Prémio
      Livro do Ano Bertrand 2020.
  - work: todos-os-escritores-do-mundo-tem-a-cabeca-cheia-de-piolhos
    was: title-only
    now: >
      Sourced to Quetzal's own SINOPSE (wayback) and the BNP catalogue record
      (id.bnportugal.gov.pt/bib/bibnacional/1948999, fetched live, confirming
