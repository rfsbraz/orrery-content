    owner: completeness-auditor
    found: >
      18 of 27 works cite only wikipedia.org, including 10 of 11 core novels.
      editions.yaml corroborates 24 works' ISBNs against Quetzal, BNP and
      OpenLibrary, so the years hold up elsewhere but works.yaml's citation
      line does not show it. Carry those sources across.
  - id: magnum-opus-infobox-in-reader-prose
    owner: completeness-auditor, then translation to mirror
    found: >
      morreste-me's synopsis, base and pt-PT, tells the reader the book is
      tagged "magnum opus" on his Wikipedia infobox, then argues with that in
      the same sentence. CURATION 1 and 4.

