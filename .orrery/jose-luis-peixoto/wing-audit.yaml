stage: wing-audit
slug: jose-luis-peixoto
status: >
  validate.py green, 79 warnings identical to baseline, none on this wing.
  i18n 78/78. sync_skill_blocks green. One mechanical fix committed (fc68055).

blocking:
  - id: cover-is-a-title-page
    owner: visual-metadata
    found: >
      dentro-do-segredo ships cover 12918252, the scanned interior title page,
      not a jacket. Downloaded and looked at. The real cover is 13144025 on
      the same record OL31068776M, confirmed by eye; that edition's covers
      array is [13144025, 12918252] and the stage took the second. Its handoff
      claims the defect was found and corrected, so the diagnosis was right
      and the fix never landed. Swap the id and rewrite the comment beside it,
      which documents a correction that never happened.

  - id: aura-density-counts-no-global-events
    owner: curator (tooling)
    found: >
      aura_density.py iterates global.yaml (a mapping with an events key) as a
      list, walks the string "events", and drops every global event for every
      wing. With the one-line fix this wing goes 9 aura to 10 and its dark run
      5 yrs to 4, off the flag list; stephen-king 21 yrs to 11, cosmere 6 to
      3. press-archaeology tuned this wing against the broken number. Left
      unfixed: it re-baselines nine wings.

  - id: cemiterio-date-contradicts-itself
    owner: completeness-auditor (work date), press-archaeology (event date)
    found: >
      works.yaml dates the novel 2006 and calls Portuguese Wikipedia's October
      2007 sentence the outlier; events.yaml dates
      peixoto-cemiterio-francisco-lazaro 2007-10 on that same rejected
      sentence, so the timeline shows the launch a year after the book. Both
      opened: the Wikipedia page does contradict itself (infobox Bertrand
      2006, ISBN 972-25-1534-9), and the RTP/Lusa launch piece carries no date
      in its served text, so it cannot date the event. OpenLibrary gives
      first_publish_year 2006. Evidence favours 2006 and a 2006-10 launch but
      does not settle it; a human should open the RTP article's own date.

  - id: revolution-ruling-rests-on-a-wrong-birth-date
    owner: event-resonance
    found: >
      franchise.yaml excludes carnation-revolution-1974 as "born at the
      Revolution's moment"; the handoff says "the day of the Carnation
      Revolution". He was born 1974-09-04 per this repo's own author entity,
      four months after. Not a no-op: relevantGlobalEvents compares years, so
      a 1974 event reaches a 1974-born author and the exclude removes it.
      joao-tordo includes the same event on near-identical reasoning.

missing:
