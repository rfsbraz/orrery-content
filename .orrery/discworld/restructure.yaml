stage: restructure
summary: >
  Widened the discworld wing from the Discworld series to Terry Pratchett's
  complete published bibliography per the 2026-07-21 curator ruling (a wing
  spans its author's complete works). franchise.yaml is now name "Terry
  Pratchett", kind author; the slug and every existing work id are unchanged
  and new works take the discworld/ prefix. Works 48 -> 75 (+27): three early
  novels, The Bromeliad, Johnny Maxwell, Good Omens (with a new neil-gaiman
  entity, authorRole co-author), Nation, Dodger and its Guide, the five Long
  Earth novels (new stephen-baxter entity, co-author), seven collections, The
  Unadulterated Cat. Every added year verified against two independent
  sources, with Colin Smythe's publisher bibliography as the anchor; one
  correction to received wisdom en route (Wikipedia's main Pratchett article
  dates Truckers 1988, the publisher record says 25 September 1989 - 1989
  kept). terry-pratchett bio widened to the career and the two record-backed
  pseudonyms (Uncle Jim, Patrick Kearns) added. startHere, globalEvents,
  orders and eras deliberately NOT rewritten - what the widening makes stale
  is routed below. Validator green (8 new era-orphan warnings, all expected
  and listed under forStages.eras); i18n regression is the expected one for
  new base prose and is itemised for translation.

