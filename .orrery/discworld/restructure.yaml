forStages:
  eras: >
    Eight works now sit outside every era span (validator warnings, expected):
    the-carpet-people (1971), the-dark-side-of-the-sun (1976), strata (1981),
    the-long-cosmos (2016), the-witchs-vacuum-cleaner (2016),
    father-christmass-fake-beard (2017), the-time-travelling-caveman (2020),
    a-stroke-of-the-pen (2023). The spans (1983-1991, 1992-2006, 2007-2015)
    assume the career starts with Discworld; it now starts in 1971 and the
    catalogue runs posthumously to 2023. Also note the within-span mismatch:
    non-Discworld works (Truckers 1989, Good Omens 1990, Johnny Maxwell
    1992-1996) arithmetically land inside eras whose titles and descriptions
    are Discworld-shaped (The Parody Years, the parody-to-satire framing).
    eras.yaml was not touched.
  reading-orders: >
    The derived default order changed head and tail: it now opens on The
    Carpet People (1971) and closes on A Stroke of the Pen (2023), not The
    Colour of Magic -> The Shepherd's Crown. startHere is stale in two ways:
    the "the-whole-disc" path (orderId: default) says "All 41 novels in
    publication order" but the default now walks 75 works; and no path covers
    the non-Discworld shelf (Good Omens, Nation, the trilogies). Consider
    publisher/community-received orders for The Bromeliad, Johnny Maxwell and
    The Long Earth (internal order for each is publication order; Diggers
    precedes Wings within 1990, per the note on discworld/wings). orders.yaml
    untouched; its existing subseries orders still resolve.
  event-resonance: >
    The globalEvents exclude rulings were made against the Discworld-only
    catalogue and several rationales are Disc-specific ("no Disc novel
    answers it"). Re-rule against the full span: the career now starts 1971
    (fantasy-paperback-boom-1965 include rationale still holds), Good Omens
    (1990) is an apocalypse-culture book, the Long Earth sequence (2012-2016)
    is SF, and the posthumous collections run to 2023.
  spoiler-audit: >
    New prose: 27 synopses, the rewritten franchise description, the
    rewritten terry-pratchett bio, two pseudonym notes, two new author bios.
    All judged premise-only, none carry spoilerAfter. Worth a second pair of
    eyes: the-long-utopia synopsis is deliberately vague about what is under
    the colony world; good-omens names the mislaid-Antichrist premise, which
    is jacket-level; the strata/colour-of-magic connection reveals only a
    conceptual link, not plot.
  visual-metadata: >
    27 new works need covers. The franchise header (if any is chosen) should
    now read as the author, not the Disc, since the wing is Terry Pratchett.
  editions: >
    27 new works have no editions. Colin Smythe's bibliography pages
    (colinsmythe.co.uk, cited per work) carry first-edition ISBNs and full
    translation histories - leads to re-verify, not sources to copy.
  translation: >
    pt-PT went from 58/58 complete to 57/60: authors/neil-gaiman.yaml and
    authors/stephen-baxter.yaml are missing entirely, and
    franchises/discworld/works.yaml is partial at 48/75 (27 synopses).
    STALENESS the coverage script cannot see, fix in the same pass: the
    discworld franchise.yaml overlay still translates the old Discworld-only
    description (base was rewritten); the terry-pratchett author overlay
    still translates the old bio (base was rewritten) and has nothing for the
    new pseudonyms notes, which the script does not count.
  wing-audit: >
    Consistency to critique: the Science of Discworld and maps entries carry
    no authorRole while the new full collaborations carry co-author (the
    older entries predate the convention; harmonising them is a mechanical
    fix if ruled). Also check the franchise.yaml capability comment still
    matches reality (it does today: all auto).

openQuestions:
  - >
    The derived default order now opens on The Carpet People (1971) instead
    of The Colour of Magic. This is the intended consequence of the author-
    span ruling, but it reorders every existing reader's walk and the
    startHere prose still promises the old one - flagging the reorder itself
    for the curator as the completeness rules require.
  - >
    Discworld companion long tail scope: the wing deliberately holds only
    three major map/companion works. The record shows many more
    Pratchett-credited companions (Where's My Cow?, The World of Poo, Nanny
    Ogg's Cookbook, The Folklore of Discworld with Jacqueline Simpson, The
    Compleat Ankh-Morpork, Mrs Bradshaw's Handbook, diaries, quiz and art
    books). Completeness argues for them; the schema warns that apocrypha
    entries still take numbered slots in the derived order. Curator's scope
    call - not silently rejected.
  - >
    Shaking Hands with Death (Corgi, 2015) was rejected as a standalone
    republication of the 2010 Dimbleby lecture already collected in A Slip
    of the Keyboard - a publication of part of an existing work, not a
    distinct work. Confirm or overrule.
  - >
    Once More* with Footnotes is tiered extended (a real, generally
    available NESFA trade collection) rather than apocrypha (small-press
    convention volume). Both readings are defensible; my ruling was
    extended, weakest tier call of the run.
  - >
    Baxter's author entity omits born (the record gives year 1957 only; the
    field wants a date). The year is carried in the bio instead.
