stage: press-archaeology
wing: discworld
refresh: true

darkRun:
  before: "11 years, 1971-1981"
  after: >
    Closed. The 1971-1981 stretch no longer appears; the new longest run is
    8 years, 1988-1995 - a different, previously-masked gap, out of scope
    for this pass (see curatorQuestions).

added:
  - id: pratchett-carpet-people-sold-1968
    file: content/authors/terry-pratchett.yaml
    fact: >
      1968: as a Bucks Free Press reporter, interviewed Peter Bander van
      Duren of Colin Smythe Ltd about an education book; mentioned his own
      manuscript, which Smythe published in 1971 as The Carpet People and
      remained Pratchett's publisher, later agent, for life.
    sources: [en.wikipedia.org/wiki/Terry_Pratchett, colinsmythe.co.uk/terry-pratchett]
  - id: pratchett-rhianna-born-1976
    file: content/authors/terry-pratchett.yaml
    fact: Daughter Rhianna born 30 Dec 1976, Rowberrow, Somerset - the year of The Dark Side of the Sun.
    sources: [colinsmythe.co.uk/terry-pratchett, en.wikipedia.org/wiki/Rhianna_Pratchett]
  - id: pratchett-cegb-press-officer-1980
    file: content/authors/terry-pratchett.yaml
    fact: >
      1980: after a decade in provincial newspapers, became CEGB publicity
      officer over nuclear stations including Oldbury and Hinkley Point A/B
      ("four nuclear power stations on my patch," his own count); wrote
      Strata (1981) on evenings around the job, kept it until 1987.
    sources: [en.wikipedia.org/wiki/Terry_Pratchett, lspace.org/about-terry/interviews/pczone22.html]
  - id: discworld-convention-1996
    file: content/franchises/discworld/events.yaml
    fact: >
      First Discworld Convention, Britannia Sacha Hotel, Manchester, 28-30
      June 1996, born from the alt.fan.pratchett Usenet group; Pratchett
      attended every UK one as guest of honour until 2014, when ill health
      meant a video link and a costumed stand-in at the venue.
    sources: [en.wikipedia.org/wiki/International_Discworld_Convention, colinsmythe.co.uk (chronology page)]

strengthened:
  - id: pratchett-alzheimers-2007
    file: content/authors/terry-pratchett.yaml
    change: >
      Added a second, independent source in Pratchett's own words (a
      first-person Times interview, reprinted with permission) alongside
      Wikipedia - the entry previously rested on one source for a health
      fact, against the standard this stage was told to hold to.
    sources: [ginnydougary.co.uk/sir-terry-pratchett-alzheimers-and-me]

rejected:
  - lead: 'BrainyQuote "Eight years involved with the nuclear industry..."'
    reason: >
      Widely recirculated but I could not trace it to an editorially
      accountable primary appearance; a quote aggregator is not a source.
  - lead: >
      Colin Smythe's "typing pool" standoff and "What leak? - Oh, that leak"
      anecdotes about the CEGB job
    reason: >
      Vivid and specific but third-hand (Smythe narrating, not a Pratchett
      quote), on a single non-independent site (his own publisher). Used the
      one line that is unambiguously his own words instead (the 1995 PCzone
      interview).
  - lead: "Telegraph, 'how Terry Pratchett met Roald Dahl'"
    reason: Surfaced in a Wikipedia reference list; outside the 1971-1981 target window, not pursued this pass.
  - lead: theguardian.com/books/2015/mar/12/terry-pratchett-obituary
    reason: 404 - could not locate the live obituary URL; other sources covered the same ground.

recordNotAsked:
  - >
    Exact CEGB start year is contested between biographers (1979 vs 1980);
    documented as a data-decision comment in the file rather than resolved,
    since neither source is more authoritative than the other.
  - >
    1987 full-time-writer entry and its sales figures were already sourced
    by an earlier pass and were not touched, per refresh scope.

curatorQuestions:
  - >
    aura_density now flags a fresh 8-year dark run, 1988-1995 - mid-boom
    Discworld years, previously hidden behind the worse 1971-1981 gap. Worth
    a dedicated press-archaeology pass; not investigated here.

