stage: prose
summary: >
  Ran eras, reading-orders, spoiler-audit and translation over the widened
  Terry Pratchett wing (75 works, 1971-2023), one commit per stage. eras gained
  one span (before-the-discworld, 1971-1981, publishing provenance) which
  resolved three of the eight era orphans; the remaining five are posthumous
  publications and now carry a data note saying so, so the validator warning is
  answered rather than closed by stretching a span. No received periodisation of
  Pratchett's career exists: obituaries, the estate, the SF Encyclopedia and the
  book-length criticism were all checked and all decline to name phases, so the
  two unsourced middle eras were kept, flagged and left for the curator rather
  than silently deleted or renamed. orders rejected all three candidate new
  threads with reasons, rescoped the four Discworld startHere paths to say they
  are Discworld-scoped, retargeted the completionist path from "All 41 novels"
  to the 75-work career walk, and gave all six thread orders the cost statement
  the skill requires and none of them had. spoiler-audit ruled against jacket
  copy fetched fresh for every reveal-carrying new work and changed nothing in
  the 27 synopses; the only spoiler fix was to prose this run's own stage 2 had
  written. translation took pt-PT from 57/60 to 60/60 and additionally
  re-synced three stale overlays the coverage script cannot see.

stagesRun: [eras, reading-orders, spoiler-audit, translation]

gates:
  validateBefore: "OK, 25 warnings (8 discworld era orphans)"
  validateAfter: "OK, 22 warnings (5 discworld era orphans, all deliberate)"
  i18nBefore: "pt-PT 57/60"
  i18nAfter: "pt-PT 60/60 complete"
  i18nGuardFalsified: >
    Coverage was not trusted on a green number. One overlay entry id was
    deliberately duplicated to orphan discworld/nation; the script dropped to
    59/60 and named the file and field, then returned to 60/60 on restore.

changedProse:
  eras:
    - "discworld/eras.yaml: before-the-discworld (new era, title + description + note)"
    - "discworld/eras.yaml: the-parody-years description (non-Discworld books of the span added)"
    - "discworld/eras.yaml: the-golden-middle description (Johnny Maxwell added)"
    - "discworld/eras.yaml: the-embuggerance description (Nation, Dodger, Long Earth added)"
  orders:
    - "discworld/orders.yaml: header comment (career scope + the rejection log)"
    - "discworld/orders.yaml: all six thread rationales gained a cost clause"
  startHere:
    - "franchise.yaml: three-ways-in title + description (Discworld-scoped, cost named)"
    - "franchise.yaml: straight-into-the-watch description (Discworld-scoped)"
    - "franchise.yaml: the-witches description (Discworld-scoped, cost named)"
    - "franchise.yaml: start-young description (Discworld-scoped, cost named)"
    - "franchise.yaml: the-whole-disc title + description + note (now the career walk)"
    - "franchise.yaml: startHere header comment (why no non-Discworld path exists)"
  i18n:
    - "pt-PT franchise.yaml: description re-synced (was translating the old Discworld-only base) + all five paths"
    - "pt-PT eras.yaml: new era + three re-synced descriptions"
    - "pt-PT orders.yaml: six rationales re-synced"
    - "pt-PT authors/terry-pratchett.yaml: bio re-synced (was translating the old pre-widening bio)"
    - "pt-PT authors/neil-gaiman.yaml: created"
    - "pt-PT authors/stephen-baxter.yaml: created"
    - "pt-PT franchises/discworld/works.yaml: 27 synopses added, 48/75 -> 75/75"

forStages:
  visual-metadata: >
    Unchanged from the restructure handoff: 27 new works need covers and the
    franchise header should read as the author rather than the Disc. One
    addition from this run: the wing now opens, in the derived default and in
    the completionist path, on The Carpet People (1971). That is the first
    cover a reader walking the default will see, so it is the highest-value
    cover in the wing, not just one of 27.
  editions: >
    Unchanged from the restructure handoff, with one caution learned here:
    colinsmythe.co.uk refused every connection attempt during this run (HTTP
    000 on both a plain fetch and a browser User-Agent retry, twice, on two
    different paths). The publisher bibliography that anchored the restructure
    stage was NOT reachable from this environment. Treat any Smythe-sourced
    fact handed down as a lead needing a live re-check, and expect to need a
    human with a browser.
  wing-audit: >
    Still open from the restructure handoff: the Science of Discworld and maps
    entries carry no authorRole while the new collaborations carry co-author.
    Added by this run: (a) era `themes` are untranslated on this wing and on
    every other wing, and the coverage script does not count them, so the
    reader sees English theme lists under a Portuguese era title - a repo-wide
    gap, deliberately not fixed here to avoid making this wing inconsistent
    with the other six; (b) author `pseudonyms` notes are reader-facing prose
    that the overlay model cannot carry, because pseudonym entries have no id
    and nested lists merge by id - Pratchett's two pseudonym notes are
    therefore permanently English until the schema gives them ids.

spoilerRulings:
  - work: discworld/good-omens
    ruling: "checked, jacket copy, left alone"
    evidence: "Penguin: 'someone appears to have misplaced the Antichrist . . .' and the angel/demon gone native. Our synopsis is at or below this."
  - work: discworld/nation
    ruling: "checked, jacket copy, left alone"
    evidence: "Estate copy: 'Then the wave comes... The village has gone. The Nation as it was has gone.' The wave and the girl are both jacket-level."
  - work: discworld/dodger
    ruling: "checked, jacket copy, left alone"
    evidence: >
      The estate's short copy stops at the sewer scavenger and the rescued girl
      and does NOT name Dickens, so a second source was pulled: HarperCollins
      names 'his meetings with the great writer Charles Dickens' outright. The
      shorter copy alone would have made this look like a reveal.
  - work: discworld/only-you-can-save-mankind
    ruling: "checked, jacket copy, left alone"
    evidence: "Estate copy quotes the aliens' message: 'We surrender'."
  - work: discworld/johnny-and-the-dead
    ruling: "checked, jacket copy, left alone"
    evidence: "Estate copy: 'Twelve-year-old Johnny Maxwell can [see the dead]' and the council selling the cemetery."
  - work: discworld/johnny-and-the-bomb
    ruling: "checked, jacket copy, left alone"
    evidence: "Estate copy names Mrs Tachyon and 'the Blackbury Blitz in 1941'."
  - work: discworld/the-long-utopia
    ruling: "checked, left alone, and the restructure handoff's worry is answered"
    evidence: >
      Jacket says 'something is very awry with this particular world' and names
      a threat from beneath the surface. Our synopsis is no more specific.
  - work: discworld/the-long-war
    ruling: "checked, left alone, with a shade of doubt recorded"
    evidence: >
      Jacket says the trolls are 'beginning to react to humanity's thoughtless
      exploitation'; ours says they 'begin to disappear'. Premise-level either
      way and it is this book's own jacket, but ours is a shade more specific
      than the publisher's. Loosenable-in-reverse if a curator disagrees.
  - work: discworld/the-dark-side-of-the-sun
    ruling: "left alone - my weakest ruling of the run"
    evidence: >
      Estate copy does not name the Jokers and does not state the death
      prediction; it gestures at it ('in an age when prediction was a science,
      why was his future in doubt?'). The prediction is first-act setup rather
      than a reveal, so premise-level, but this is the one new synopsis where
      the jacket is vaguer than we are. Flagged rather than quietly kept.
  - work: "the other 18 new synopses"
    ruling: "checked, premise-level, left alone"
    evidence: "Collections, companions and the Bromeliad books carry no reveals; the collection entries describe contents and provenance only."
  - work: "stage 2 prose (this run's own)"
    ruling: "REWRITTEN - the only content change the spoiler stage made"
    evidence: >
      The cost clause stage 2 added to the Witches order and the-witches path
      named Granny Weatherwax's 'last appearances' in the Tiffany books, which
      is a survival claim plus a pointer at where her story ends. Rewritten to
      say the thread is a complete arc but not the whole story it belongs to.
      The Tiffany cost clause was likewise softened from 'meeting her at the
      end of a story you have not had yet' to 'with a history you have not read
      yet'.
  - work: "no inert spoilerAfter found"
    ruling: "checked"
    evidence: "None of the 27 new works carries a spoilerAfter on a field the engine ignores."

openQuestions:
  - >
    Carried forward unanswered from the restructure handoff, because it is
    still the curator's: the derived default now opens on The Carpet People
    (1971) rather than The Colour of Magic, reordering every existing reader's
    walk. This run made the prose honest about it (the completionist path now
    says plainly that the route does not open on Discworld at all) but did not
    and could not undo the reorder.
  - >
    The two middle eras remain unsourced and the file says so. the-golden-middle
    ("The Satire Years", 1992-2006) was already recommended for removal or
    merging by a previous pass and this run did not find anything to rescue it:
    the search was widened from Discworld to the whole career and still returned
    no periodisation. Removing an era changes a full-bleed plate, so it stays a
    curator call. My recommendation: keep both, because with before-the-
    discworld added they now tile the working career 1971-2015 with only 1982
    empty, and deleting them would strand 40-odd works with no era at all.
  - >
    A sixth startHere path for the non-Discworld standalones (Good Omens,
    Nation) is the obvious gap and was deliberately not added. Two reasons, both
    curator-overrulable: the wizard takes two to five paths and five are
    declared, so a sixth needs one removed; and the entry advice for those books
    exists only in content-farm and Q&A listicles, not in the author, the estate
    or a canonical community guide. If the curator wants the path, the honest
    version says it is our recommendation, not received advice.
  - >
    Three candidate thread orders were REJECTED, not overlooked: The Bromeliad,
    Johnny Maxwell and The Long Earth. Each is a self-contained,
    publisher-numbered sequence published in story order, already threaded by
    its subseries label, with no community guide navigating it the way the
    L-Space flowchart navigates the Disc. The one thing a Bromeliad order would
    have contributed is the Diggers/Wings 1990 tie-break, and that fact already
    lives on the work. Overrule if the curator wants per-series orders as a
    presentation convention rather than as navigation.
  - >
    Two further groupings have no order and predate this run: Maps and
    Companions (3) and Science of Discworld (4). Left as reference volumes
    rather than reading routes. Consistent with the rejections above, but worth
    a ruling since the inconsistency question is the skill's own.
  - >
    Not verified and not verifiable from this repo: no page was rendered and
    read in pt-PT, because this is the content repo and the app is not here.
    Coverage is 60/60 and the guard was falsified, but per the translation
    skill that is a floor, not a finish. Someone should open the Portuguese
    franchise page, the Pratchett author page and one signed-in surface and
    read them before this wing is called done.
