stage: wing-audit
summary: >
  Final audit of the Valter Hugo Mãe wing, run against the artefacts rather
  than the nine handoffs. Every gate re-derived here: validate.py green (445
  works, 29 authors, 20 characters, 11 achievements, all references resolve;
  78 warnings, unchanged in number and kind by this pass), i18n_coverage.py
  pt-PT 74/74 complete, event_density.py 17 global events across 11 decades
  with the 1950s empty, aura_density.py valter-hugo-mae 37 works / 12 aura
  entries / 0.32 per work / longest dark run 4 years (2000-2003, unflagged),
  sync_sanctuary_block.py green, wing_freshness.py flagging aura stopping at
  2023 against a shelf running to 2026. Fourteen findings, four of them
  reaching a reader. The two discrepancies the editions stage could not
  settle are both settled here against sources opened directly, and both go
  against editions.yaml. The pre-ship verification lead the spoiler audit
  said "should be closed before this wing ships" is closed here, in the
  wing's favour. One of the four false claims this run has been chasing
  survives in franchise.yaml, doing load-bearing work for a globalEvents
  ruling.

gatesRerun:
  validate: "OK - 445 works, 29 authors, 20 characters, 11 achievements, all references resolve. 78 warnings; the three touching this wing are the era-coverage ones below."
  i18n_coverage: "pt-PT 74/74 files fully covered - complete."
  event_density: "catalogue span 1920-2026, 11 decades, 445 works; 17 global events (2 high, 10 med, 5 low); high budget 2 of ~4; 1950s empty, 1940s/1970s/1980s/1990s at 1 of a budget of 3."
  aura_density: "valter-hugo-mae 37 works, 12 aura, 0.32 per work, span 1996-2026, longest dark run 4 yrs (2000-2003), not flagged. Second-densest wing in the repo after wheel-of-time (0.47); the repo's thinnest is stephen-king at 0.09."
  sync_sanctuary_block: "OK - the sanctuary rule is identical in every skill."
  wing_freshness: "valter-hugo-mae: living author, shelf to 2026, aura stops 2023. A lead, not a defect."

mechanicalFixesApplied:
  commit: 6322270
  files:
    - path: content/franchises/valter-hugo-mae/eras.yaml
      change: 'header comment "Contra Mim (2021)" -> "(2020)".'
    - path: content/franchises/valter-hugo-mae/orders.yaml
      change: 'header comment "Contra Mim (2021)... ten years apart" -> "(2020)... nine years apart".'
    - path: content/franchises/valter-hugo-mae/editions.yaml
      change: >
        The file header recorded Contra Mim as an open discrepancy against
        works.yaml's 2021. works.yaml now says 2020, so the block was
        collapsed to the settled fact. The discrepancy no longer exists and
        the comment was the last thing asserting it did.
    - path: content/franchises/valter-hugo-mae/franchise.yaml
      change: >
        The bundle comment still described the wing as the scaffold left it:
        "2 franchise events, 5 author lifeEvents... one sourced era". It now
        reads 5 franchise events, 7 life events, four eras. The orders
        sentence said "one per tetralogy Mãe names himself", true when two
        tetralogies were named and false since Crimes e Vindouros was added
        as a third; it now says which two and why the third has no order.
  notFixedDeliberately: >
    Everything else. The reader-facing prose errors below all need a mirrored
    pt-PT edit in the same commit (CURATION §3) and carry an editorial
    judgement, so they are routed rather than patched here.

blocking:
  - id: orders-eleven-works
    finding: >
      The Irmãos, Ilhas e Ausências order's rationale tells a reader "eleven
      other works fall inside these same eleven years and none of them is
      here". Six do. Works published 2013-2024 are ten: the four in the
      order, plus O Paraíso São os Outros (2014), Contos de Cães e Maus
      Lobos (2015), Publicação da Mortalidade (2018), Contra Mim (2020),
      Serei Sempre o Teu Abrigo (2020) and A Minha Mãe é a Minha Filha
      (2022).
    checked: >
      Re-derived from works.yaml directly, not read off a report. The claim
      is rendered: components/orders/order-selector.tsx renders `rationale`
      for any non-derived order. It is live in both locales -
      content/franchises/valter-hugo-mae/orders.yaml:89 and
      content/i18n/pt-PT/franchises/valter-hugo-mae/orders.yaml:54 ("onze
      outros livros caem dentro destes mesmos onze anos").
    owner: reading-orders, with translation mirroring in the same commit
    note: >
      "Eleven years" for 2013-2024 is elapsed years and defensible; only the
      work count is wrong.

  - id: orders-debated-stale-date
    finding: >
      The same order carries a `debated` entry telling readers "Homens
      Imprudentemente Poéticos carries no year in its own eras.yaml entry
      because sources disagree (2016 in the bibliography used here, 2015 in
      Revista Pernambuco and Observador)". The editions stage settled the
      date at 2016 against the Porto Editora product page. The wing now
      advertises as unsettled a date it has settled, and correspondingly
      omits the year from the era description and the order rationale while
      giving years for the other three volumes.
    checked: >
      works.yaml:204 published 2016 with the publisher's own product page
      cited. `debated` is rendered (order-selector.tsx:92, inside a
      details/summary). Live in both locales: orders.yaml:101 and the pt-PT
      overlay:61. The matching prose is eras.yaml's irmaos-ilhas-e-ausencias
      description and note, and both locales' order rationale.
    owner: reading-orders for the debated entry and rationale; eras (this stage) for the era description and note; translation for both mirrors
    note: >
      Caused by stage order. Eras and orders were written at a7056e2/e90d645,
      the date was confirmed later, and nothing swept back.

  - id: booktok-comment-social-media
    finding: >
      franchise.yaml's globalEvents block excludes booktok-2020 with the
      reason "O Século dos Imbecis (2026) satirises social media broadly,
      not book-discovery culture". This is the same unsupported reading the
      spoiler audit removed from that book's synopsis as an unfounded
      author attribution. The publisher's copy contains no mention of social
      media, the internet or anything digital; it reaches only for "o século
      da informação, mas parecemos resistir ao conhecimento". Softened from
      "Mãe has described" to "satirises", but it is the same claim, and here
      it is the stated justification for a standing exclusion.
    checked: >
      franchise.yaml:119. The removal from works.yaml is at works.yaml:293-300
      and documented in spoiler-audit.yaml's corrections block. The
      event-resonance handoff still asserts the strong form ("a village...
      that Mãe has described as a stand-in for social media") and reasoned
      the booktok exclusion partly from it.
    owner: event-resonance
    note: >
      The exclusion itself is almost certainly right on its other ground
      (Lusophone literary fiction is not what short-form video moves). What
      needs replacing is the second half of the reason, so the ruling does
      not rest on a reading nobody has sourced. This is the fourth false
      claim of this run resurfacing in a fifth place; it survived because
      the correction was applied to the synopsis only.

  - id: editions-publisher-and-year
    finding: >
      Both discrepancies the editions stage flagged as unresolvable are
      resolvable, and both resolve against editions.yaml.
      (1) "Estou Escondido na Cor Amarga do Fim da Tarde": editions.yaml
      records publisher "Casa das Letras" from the BNP record. The author's
      own bibliography page says "estou escondido na cor amarga do fim da
      tarde, Porto, Campo das Letras, 2000" - works.yaml is right. The BNP
      record itself corroborates it against its own field: it places the book
      in Porto and in the collection "Campo da poesia ; 30", both Campo das
      Letras, a Porto press. Casa das Letras is a Lisbon imprint. BNP has a
      transcription error.
      (2) "A Cobrição das Filhas": editions.yaml records year 2002 from BNP.
      The author's own bibliography says "a cobrição das filhas, V.N.
      Famalicão, Quasi Edições, 2001", and the same BNP record's legal
      deposit is "PT -- 174181/01" - deposited in 2001. works.yaml's 2001 is
      right and BNP's stated 2002 contradicts BNP's own deposit field.
    checked: >
      Both BNP records fetched directly with a browser User-Agent and read in
      full (id.bnportugal.gov.pt/bib/catbnp/2225809 and /1084099; both HTTP
      200, ~75KB, the ipac20 workaround in CURATION §4 works). The author's
      bibliography fetched at valterhugomae.com/biblio.html, HTTP 200, and
      both lines quoted above read off it. As a control, the other record's
      deposit number is "PT -- 158164/00", matching its stated year 2000, so
      the field is a real signal rather than noise.
    owner: the editions skill
    note: >
      Fix editions.yaml entries (publisher Campo das Letras; year 2001),
      keep works.yaml as it stands, and rewrite the file header block that
      currently presents both as open. Do not "correct" works.yaml to match
      BNP.

missing:
  - id: inert-provenance
    finding: >
      eras.yaml's `provenance` field is read by nothing. All four VHM eras
      carry it (author / publishing), and it is the field the eras stage
      spent most of its argument on. It is not in the app, not in
      docs/SCHEMA.md, and not in validate.py.
    checked: >
      grep -rn "provenance" across E:/dev/orrery (excluding node_modules)
      returns nothing in .ts/.tsx. grep -n "provenance" docs/SCHEMA.md
      returns nothing. All eight wings carry it in eras.yaml, so this is
      repo-wide, not a VHM defect.
    owner: the curator - it is a schema/app question, not a content one
    note: >
      Two honest resolutions: render it (a reader benefits from knowing an
      era is the author's own name rather than a critic's) or document it in
      SCHEMA as a curator-only field so nobody assumes it ships. Today it is
      the coverFor()/images.cover shape exactly: careful work producing an
      inert field.
  - id: inert-contribution-title
    finding: >
      `authorRole` and `contributionTitle` are validated but never rendered.
      Contos Policiais carries contributionTitle "O Criminoso Portuguesinho";
      a reader sees the anthology and no indication which piece is his.
    checked: >
      validate.py:232-241 enforces both. grep across the app returns nothing
      for either identifier. Repo-wide, not VHM-specific.
    owner: the curator / app side
  - id: i18n-script-blind-spots
    finding: >
      i18n_coverage.py's PROSE map counts franchise.yaml `description` only
      and orders.yaml `name`/`rationale` only. It therefore does not count
      startHere path title/description/note (rendered by
      components/wizard/start-wizard.tsx) or order `debated` (rendered by
      order-selector.tsx). A wing could ship an untranslated wizard and
      report 100%.
    checked: >
      scripts/i18n_coverage.py PROSE map read directly. Then checked all
      eight wings: every one has its startHere paths and its `debated`
      entries fully mirrored in pt-PT, VHM included (4 of 4 paths, 2 of 2
      debated). So nothing is currently broken; the guard simply is not there.
    owner: the curator, or whoever next hardens the scripts
    note: >
      This is the reason to fix it now rather than after it bites: the
      convention is currently held by eight consecutive agents doing the
      right thing unprompted.
  - id: aura-stops-2023
    finding: >
      The wing's most recent aura entry is December 2023 while the shelf runs
      to June 2026 - across the close of one tetralogy, the publication of
      Educação da Tristeza (2025), and the opening of a third cycle (2026).
      Not a dark run by aura_density's threshold, but the freshness script
      names it and the years in question are the ones a reader arriving today
      is reading about.
    checked: "wing_freshness.py, re-run: aura 2023, latest work 2026."
    owner: press-archaeology
  - id: poetry-count-unreconciled
    finding: >
      works.yaml's header states 15 poetry collections; the eras
      antes-dos-romances note states "Fourteen books in verse exist by 2018",
      Observador's number; and Publicação da Mortalidade's own note records
      that the publisher describes it as collecting nine. Three numbers, one
      shelf, none reconciled. The eras stage asked completeness-auditor to
      reconcile this; completeness-auditor had already run.
    checked: >
      Counted works.yaml directly: 15 poetry entries, 9 of them before 2004,
      which is the one number every source agrees on and the one the era
      description and both order rationales use.
    owner: completeness-auditor
    note: >
      Editions has since added evidence: Folclore Íntimo (2008) and
      Contabilidade (2010) both carry publisher subtitles marking them as
      themselves retrospective ("poesia reunida", "poesia 1996-2010"). Three
      collected volumes in a 15-title list is very likely the whole
      explanation for "nine".
  - id: friendship-duration-unsourced
    finding: >
      Both locales state the friend was "a close friend of thirty years" /
      "amiga próxima de trinta anos" (lifeEvent vhm-two-losses-2023 and the
      Educação da Tristeza synopsis). No source I opened carries a duration.
    checked: >
      The JN obituary (fetched, HTTP 200) gives Vila do Conde, 10 December
      2023, aged 70, 50 years of career, and thanks Mãe by name; it does not
      date the friendship. resenhando.com calls her "grande amiga...
      companheira de geração". Porto Editora's page says only "uma amiga".
      The press-archaeology handoff cites no source for thirty years either.
    owner: press-archaeology
    note: >
      Small, but it is a specific number attached to a real recent
      bereavement, which is where this run's error rate has been highest.
      Source it or drop the duration.

stale:
  - id: unanswered-curator-questions
    finding: >
      Four curator calls were escalated by earlier stages and none has been
      answered. They are invisible in the content and will be ratified by
      merging.
    items:
      - "eras: the 2004-2010 era is titled 'A Idade Inteira' (the author's, rung 1) rather than 'A Tetralogia das Minúsculas' (rung 2, far more widely used, and still the wording in this wing's own events.yaml, theme.yaml and author bio). The eras stage asked for a ruling. Note for whoever answers: it is no longer free to flip, because the pt-PT eras overlay now mirrors the title."
      - "eras: antes-dos-romances (1996-2003) is the stage's own named weakest decision - a real bibliographic fact, but a period nobody else treats as one. The alternative is deleting it and returning nine poetry works to the orphan list."
      - "reading-orders: whether one bookshop editorial post can carry two of four wizard paths. See checkedAndClean - I judge it can."
      - "spoiler-audit: 'a medieval marriage curdling into witchcraft' appears in three reader-facing places plus two pt-PT mirrors and rests on a 2007 jacket blurb found only on a literature portal. All five move together or not at all."
  - id: event-resonance-handoff-carries-the-false-claim
    finding: >
      The event-resonance handoff still states the social-media attribution
      in its strong form as settled fact. Handoffs are deleted before merge,
      so it reaches no reader, but it is the most likely place for the claim
      to be resurrected from if anyone re-reads this run.
    owner: noted for the curator, no content change

checkedAndClean:
  - check: "Whether the two deliberately unnamed people leaked back anywhere, in any file or locale."
    result: >
      They did not. Neither name appears in any prose field, era, event,
      order, synopsis or startHere path in either locale. The pt-PT lifeEvent
      and synopsis carry the same relation-only framing as the English. The
      medical detail press-archaeology gathered (aneurysm, cancer, age 16)
      was also correctly left out. The artist's name does appear in two
      citation URLs on the author entity (the JN and CM obituaries) and, as
      the brief notes, legitimately in works.yaml's editorial-work note as a
      2004 co-author. Neither reaches a reader: `sources` is typed in
      lib/content/types.ts but rendered by no component - grep for "sources"
      across components/ and app/ .tsx returns nothing. Leave both as they
      are; a claim about a real death with the obituary citation stripped out
      would be worse, not better.
  - check: "Whether the second grief in Educação da Tristeza is the friend or the author's father - the spoiler audit's explicit pre-ship blocker."
    result: >
      CLOSED, in favour of what ships. Quatro Cinco Um's standfirst does say
      "a morte do pai e do sobrinho" (fetched and read; the phrase appears
      twice), which is why the lead was raised. Three sources contradict it:
      resenhando.com, reproducing the Brazilian launch copy, says the book
      "surge de duas perdas centrais: a morte precoce de seu sobrinho Eduardo
      ... e a morte da grande amiga Isabel Lhano, artista plástica"; Porto
      Editora's own product page describes it as centred on "a perda de uma
      amiga e de um sobrinho" - a female friend, not a father; and the JN
      obituary independently confirms the death, the date and the connection
      to Mãe. Quatro Cinco Um appears simply to be wrong. The shipped wording
      in both locales is correct and needs no change. This one was worth the
      fetches: it was the only unresolved factual question in the wing that
      concerned living people.
  - check: "Whether the startHere entry paths carry the weight the wizard puts on them."
    result: >
      They do. The Wook article was fetched (HTTP 200, browser UA) and says
      what the wing claims, in the words the wing claims. Of O Filho de Mil
      Homens: "foi a nossa porta de entrada na obra do autor e ficámos
      encantados", which is exactly the-unlikely-door's "the way its own
      writers actually started". Of Contos de Cães e Maus Lobos: "uma
      excelente forma de descobrir, pela primeira vez, a tão premiada escrita
      de Valter Hugo Mãe", exactly gentler-initiation's claim. Byline and
      date match the citation (Álvaro Curia/Ludgero Cardoso, 11 de outubro de
      2021). My judgement on the curator call: keep all four paths. It is a
      dated, bylined editorial piece from the country's largest bookshop that
      answers the exact question, the wing discloses its own weakness in
      franchise.yaml including the Porto Editora group relationship, and the
      alternative on offer was inventing a stronger source. One observation
      rather than a finding: the article has a third pick, As Doenças do
      Brasil, which the wing does not use; that is a sound omission (a
      mid-tetralogy volume is a poor door) but franchise.yaml's comment
      reads as though the article picked only two books.
  - check: "Whether the late date corrections broke anything downstream."
    result: >
      Contra Mim 2021 -> 2020 broke four comments, all fixed above; it
      changes no era membership (2020 sits inside 2013-2024 either way), no
      order (it is in neither), no event year, and no edition. Homens
      Imprudentemente Poéticos 2016 left the two stale reader-facing artefacts
      routed above and nothing else; either candidate year leaves it second
      in its order and inside its era, so no sequence moves.
  - check: "theme.yaml, which validate.py never opens."
    result: >
      displayFace `spectral` and signature `rule` are both in the app's
      implemented sets (lib/theme.ts DISPLAY_FACES; validate.py's own theme
      warning fires for four other wings and not this one). All five palette
      keys present. Contrast, computed rather than eyeballed: ink on bg
      13.85:1, ink on surface 12.95:1, muted on bg 5.33:1, muted on surface
      4.98:1 - the usual failure point clears AA. One flag below. The palette
      is a genuine design decision rather than another wing's look recoloured,
      and deliberately avoids the coastal blues of the other Portuguese wing.
      The sanctuary problem spoiler-audit flagged in theme.yaml's `notes`
      field ("a curator can still swap either") has been fixed and no longer
      addresses anyone.
  - check: "achievements."
    result: >
      This wing has none, and should not. No badge in content/achievements.yaml
      references it. Correct state: franchise_complete over 37 works
      including 15 poetry collections and an anthology contribution would be
      a badge nobody earns, and era_reader over four eras where one holds a
      single book would be generic. Absence here is a decision, not a gap.
  - check: "capabilities against reality."
    result: >
      `features: {}` - everything auto, nothing forced, which is right at
      every layer. No characters.yaml and no work `connections`, verified, so
      the connections map stays dark rather than lighting up with one edge.
      Wizard activates on 4 startHere paths (lib/content/capabilities.ts:25).
      The timeline has 12 entries over a 30-year span, comfortably enough to
      be worth entering. The startHere path using `orderId: default` resolves:
      lib/groups/order-ref.ts:38 special-cases "default" to the derived order.
  - check: "globalEvents."
    result: >
      The block exists and is reasoned per event. Nine exclusions, each with
      a stated reason. Working the arithmetic gate by hand: of the 17 pool
      events, ten predate his 1971 birth and are dropped by the lifetime
      filter without curation; the remaining seven are all excluded except
      carnation-revolution-1974, which is deliberately left to render and
      justified by o nosso reino's Estado Novo setting. So exactly one global
      event reaches this wing, by design. That is a defensible answer for a
      Portuguese literary novelist against a pool that is mostly Anglophone
      trade history.
  - check: "era period parsing and coverage."
    result: >
      All four periods parse (validate.py resolves them to 1996-2003,
      2004-2010, 2013-2024, 2026-9999) and none overlap, which is the defect
      that would matter. 2011-2012 and 2025 are uncovered, orphaning three
      works, and the validator warns on all three. Per the eras skill's own
      provenance rule this is a result, not a gap: the eras are the author's
      own named cycles, and extending one to cover 2011 would contradict the
      source the era borrows its legitimacy from. The header comment states
      this and names what was checked. Do not close these by tiling.
  - check: "spoiler boundary distribution."
    result: >
      Zero non-null spoilerAfter in the wing, which the skill flags as a
      possible sign the audit did not happen. Here it did: five documented
      redactions, all by rewriting. And it is structurally correct - the
      spoiler audit verified against lib/content/types.ts that Work has no
      spoilerAfter property at all, so every reveal it found sat in prose a
      boundary cannot gate. Three other wings (chuck-palahniuk, joao-tordo,
      wheel-of-time) also carry zero.
  - check: "proportion against the other seven wings."
    result: >
      37 works, 12 aura entries, 0.32 per work: second-densest in the repo,
      against a median nearer 0.17 and stephen-king at 0.09. Longest dark run
      4 years, the only wing under the flag threshold. This wing is not thin.

notApplicableNotAbsent:
  - "No characters.yaml, no connections, connections map dark. His novels are standalone, each in a different setting; there is nothing to connect. Do not fabricate edges."
  - "No achievements. See above - correct, and better than generic ones."
  - "3 of 37 works have no edition (two 1990s chapbooks from defunct presses, one Spanish-press poetry title with a single uncorroborated ISBN). That is the realistic ceiling of the open record for Portuguese small-press poetry, not a coverage gap."
  - "No covers anywhere in this wing. The typographic fallback is the primary rendering for a Portuguese literary novelist, not a degraded one. Reporting this as 0% invites somebody to launder retailer scrapes."
  - "One global event reaching the wing. Correct, not thin - see globalEvents above."
  - "No pen names. The `aka` is his public birth name; he has one authorial name."
  - "2011-2012 and 2025 uncovered by eras. A result of following the author's own periodisation, documented in the file."
  - "Only one locale. pt-PT is complete at 74/74; there is no second locale to be missing."

curatorsCall:
  - >
    accent contrast. theme.yaml's accent #a8461f is 3.02:1 on bg and 2.82:1
    on surface, and the file says it is used "for links and markers only".
    That clears the 3:1 floor for non-text marks but is below the 4.5:1 AA
    floor for link text. Every other pair in the palette passes comfortably.
    Whether this matters depends on where the app actually paints accent, and
    that is a design question with a browser open, not a content one -
    reporting rather than ruling, per CURATION §5.
  - >
    The four unanswered escalations listed under stale. Merging without
    answering them ratifies four guesses, one of which (antes-dos-romances)
    the stage that made it named as its own weakest decision.
  - >
    Whether `provenance` should render. The eras layer's central argument is
    currently invisible to readers.

mustFixBeforeShipping:
  - orders-eleven-works
  - orders-debated-stale-date
  - booktok-comment-social-media
  - editions-publisher-and-year

canWait:
  - inert-provenance
  - inert-contribution-title
  - i18n-script-blind-spots
  - aura-stops-2023
  - poetry-count-unreconciled
  - friendship-duration-unsourced
  - unanswered-curator-questions

verification: >
  This wing is not deployed, so no live route exists and none was checked -
  no render-check.mjs run, no page fetched. What was verified instead: every
  content-side script re-run here rather than quoted; every field this report
  relies on grepped in the app at E:/dev/orrery for the code that reads it
  (rationale, debated, startHere note, orderId "default", displayFace,
  signature, canonTier, spoilerAfter, globalEvents all confirmed consumed;
  sources, provenance, authorRole, contributionTitle, era/work note confirmed
  not consumed); and seven external pages fetched and read in full with a
  browser User-Agent - two BNP catalogue records, the author's own
  bibliography, the Wook reading guide, quatrocincoum, resenhando, Porto
  Editora's Educação da Tristeza page, and the JN obituary. Every factual
  ruling above quotes a line from a page I opened. A live-locale sweep once
  this merges and deploys remains the honest next check, and is the one thing
  this audit could not do.
