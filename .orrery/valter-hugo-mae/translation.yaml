stage: translation
summary: >
  Full pt-PT overlay written for the Valter Hugo Mãe wing. Coverage before
  this pass: 68/74 files fully covered (missing entirely: works.yaml 37
  fields, eras.yaml 12, events.yaml 10, authors/valter-hugo-mae.yaml 15;
  partial: franchise.yaml 8/9 missing top-level description, events/global.yaml
  32/34 missing the new portugal-bailout-2011 entry). After this pass:
  74/74 fully covered, no regression, no locale left partial. Four new
  overlay files written (works.yaml, eras.yaml, events.yaml,
  authors/valter-hugo-mae.yaml) and three existing files edited
  (franchise.yaml: added the missing top-level description; orders.yaml and
  franchise.yaml: five pre-existing pre-AO90 orthography slips corrected to
  match the rest of the catalogue's post-1990-agreement spelling, see below);
  events/global.yaml gained the portugal-bailout-2011 entry's title and
  description. validate.py green (445 works, 29 authors, 20 characters, 11
  achievements, all references resolve including every inline [[work:...]]
  reference in the new overlays; the only warnings are pre-existing ones on
  other franchises, unchanged in kind and number). sync_sanctuary_block.py
  green. The three "published year falls outside every era" warnings on this
  wing (o-filho-de-mil-homens 2011, quatro-tesouros 2011, educacao-da-tristeza
  2025) are the same pre-existing, eras-owned gaps every prior stage already
  reported, untouched by this pass.
produced:
  filesCreated:
    - content/i18n/pt-PT/franchises/valter-hugo-mae/works.yaml (37 synopses)
    - content/i18n/pt-PT/franchises/valter-hugo-mae/eras.yaml (4 eras: title/description/themes)
    - content/i18n/pt-PT/franchises/valter-hugo-mae/events.yaml (5 franchise events: title/description)
    - content/i18n/pt-PT/authors/valter-hugo-mae.yaml (bio + 7 lifeEvents: title/description)
  filesEdited:
    - path: content/i18n/pt-PT/franchises/valter-hugo-mae/franchise.yaml
      change: >
        Added the missing top-level `description` field (the one gap the
        reading-orders stage's overlay left, by design, out of its own
        footprint). Also corrected "colectânea" to "coletânea" (pre-AO90
        spelling left over from that stage's pass; see orthography note
        below).
    - path: content/i18n/pt-PT/franchises/valter-hugo-mae/orders.yaml
      change: >
        No prose gap (already fully covered); four pre-AO90 spellings
        corrected: "exactamente" -> "exatamente", "citação directa" ->
        "citação direta", "retrospectiva" -> "retrospetiva", "afecta" ->
        "afeta". All four sit in curator prose describing sources, not
        inside a direct quote, so none of the corrections touches quoted
        material.
    - path: content/i18n/pt-PT/events/global.yaml
      change: >
        Appended the portugal-bailout-2011 entry (title + description),
        appended in the same relative position as the base file (last
        entry). Neutral, factual register throughout, as instructed: the
        bailout, the austerity measures and the emigration wave are stated
        as facts with no editorializing adjective attached to any of them.
  orthographyCorrection: >
    The two overlay files the reading-orders stage wrote (franchise.yaml,
    orders.yaml) were drafted in pre-1990-Orthographic-Agreement spelling
    ("colectânea", "exactamente", "directa", "retrospectiva", "afecta") while
    every other translated wing in this catalogue (agatha-christie,
    chuck-palahniuk, joão-tordo, stephen-king) uses the post-agreement (AO90)
    spelling in current use in Portugal ("coletânea", "exatamente", "direta",
    "retrospetiva", "afeta"). Both are legitimate pt-PT, but a catalogue that
    mixes them wing to wing reads as inconsistent, not as regional variety, so
    the five instances were normalised to match the rest of the site. Nothing
    else in either file needed correcting: register, tone and the absence of
    Brazilianisms were already right.
  registerNotes: >
    Followed the outgoing spoiler-audit handoff's explicit instruction:
    translated the reticence rather than the plot detail, even where the
    Portuguese or Brazilian jacket copy is more explicit than the rewritten
    English (Contra Mim, A Desumanização, o nosso reino, o apocalipse dos
    trabalhadores) - none of the redacted material was restored. Portuguese
    quotations already embedded in eras.yaml and events.yaml (the author's own
    words on his tetralogies, on the "minúsculas" typography, on Crimes e
    Vindouros, on the Japan research trips) are reproduced verbatim, with no
    English gloss carried over and no re-paraphrase into different Portuguese.
    Era titles "A Idade Inteira", "Irmãos, Ilhas e Ausências", "Crimes e
    Vindouros" and "Antes dos Romances" are repeated unchanged, never
    reworded. Work titles are never translated (Mãe writes in Portuguese, so
    every title in works.yaml already is its own Portuguese form; inline
    [[work:id|display text]] references simply repeat that same title).
  notFieldsSkipped: >
    Neither works.yaml's per-work `note` nor eras.yaml's per-era `note` was
    translated. Both are absent from SCHEMA.md's field list for their
    entities, i18n_coverage.py does not count them (its PROSE map lists only
    synopsis for works.yaml and title/description/themes for eras.yaml), and
    the spoiler-audit handoff's own engineVerification established that
    works[].note is never loaded or rendered by the app at all. Treated the
    same way for eras.yaml's note on the same evidence (schema-absent,
    coverage-script-absent) rather than assumed reader-facing without
    checking; flagged here rather than silently translated or silently
    dropped.
  gatesRun:
    before: "i18n_coverage.py: pt-PT 68/74 files fully covered"
    after: "i18n_coverage.py: pt-PT 74/74 files fully covered - complete"
    validate: "OK - 445 works, 29 authors, 20 characters, 11 achievements, all references resolve"
    sanctuary: "OK - the sanctuary rule is identical in every skill"
  verification: >
    This is a brand-new wing on an unmerged stage branch, so there is no live
    orrery.homeberry.me route to fetch and no rendered pt-PT page to quote
    from yet - the same limitation every prior stage in this run reported
    (none of the eight handoffs ran render-check.mjs or curl+grep against a
    live URL for this wing either; all verified through the content-side
    scripts only). What was actually checked: validate.py's own inline-
    reference resolver walks the i18n tree and confirmed every
    [[work:id|text]] link inside the four new files and the three edited
    ones resolves; i18n_coverage.py's non-zero counts for every new file
    (rather than the file registering as "missing") confirm each one parsed
    as valid YAML with the expected id/field structure, not just that a file
    exists on disk. A live-locale sweep (franchise page, author page, home
    page, an account-only surface, quoting a rendered pt-PT line) is the
    honest next check once this wing is merged and deployed; it could not be
    performed pre-merge.
baseFileErrorFound: >
  content/authors/valter-hugo-mae.yaml's bio states Mãe has worked "as a
  visual artist, television presenter and singer." The "television
  presenter" claim directly contradicts this same wing's own
  press-archaeology handoff, which investigated and explicitly rejected an
  identical claim (that Mãe "coordinates and presents Todas as Palavras
  since 2015") after a Diário de Notícias piece on the actual 8 April 2016
  premiere named three other presenters and never mentioned him - the
  handoff calls this "the second time in this run a search engine's own
  synthesized answer stated a specific, plausible-sounding fact that a
  direct fetch of a primary source did not support." The bio's claim was not
  edited or removed here (base files are out of this stage's footprint) and
  was translated as written, since a translation stage's job is to carry the
  base prose faithfully, not to silently correct it. Flagged loudly per
  CURATION §7: whoever next touches authors/valter-hugo-mae.yaml should
  re-verify this specific clause before it ships further, since the wing's
  own research already produced the evidence against it.
openQuestions:
  - >
    Not escalated, informational only: the pt-PT overlay for
    portugal-bailout-2011 in events/global.yaml is franchise-agnostic by
    design (per event-resonance's ruling, this wing excludes the event via
    globalEvents; joao-tordo's franchise.yaml is the one that renders it).
    Nothing about this translation is valter-hugo-mae-specific; it simply
    closes the one remaining global.yaml gap this run's own world-events
    stage created.
  - >
    Carried forward, not mine to resolve: the "curdling into witchcraft"
    clause (o remorso synopsis, the tetralogy order's rationale, and the
    the-tetralogy-that-made-him startHere path) rests on a 2007 jacket blurb
    found only on a literature portal, never a publisher's own page - flagged
    by spoiler-audit as its weakest decision. The pt-PT translations of all
    three English locations mirror the English exactly (the phrase's fate is
    the same in both languages, since it was translated, not re-decided,
    here). If a curator drops the clause from the English, drop the matching
    Portuguese in the same commit - all three English instances and their
    three Portuguese mirrors move together.
  - >
    Carried forward, not mine to resolve: whether Educação da Tristeza's
    second grief belongs to Isabel Lhano or to the author's father is
    unresolved per spoiler-audit's own verification lead. The pt-PT
    lifeEvent and work synopsis both translate the currently-shipped English
    (Isabel Lhano), so if that gets corrected, the Portuguese needs the same
    correction in the same commit.
