stage: completeness-auditor
summary: >
  Audited the 34-work scaffold against primary and near-primary Portuguese
  sources (the author's own bibliography page, publisher pages retested with
  a browser user-agent past Porto Editora's block, publisher/illustrator
  blogs, national and cultural press). 37 works after this pass (+3): two
  children's books absent from every source the scaffold checked (Serei
  Sempre o Teu Abrigo, 2020; A Minha Mãe é a Minha Filha, 2022) and one
  multi-author anthology contribution with a now-resolved authorRole (Contos
  Policiais, 2008, contributor). No published year changed on any existing
  work; nothing reorders the derived reading order. The poetry list's
  single-source weakness is substantially closed: 13 of 15 titles (all
  through 2010) now carry a second, publisher-and-title-bearing source, with
  every date matching what was already recorded. Quatro Tesouros' existence
  is confirmed by the publisher's own announcement and the illustrator's
  portfolio. Eight anthology/collective-volume credits where Mãe organized
  or co-credited other people's work are researched (existence, year,
  publisher all resolved) but deliberately NOT added, escalated to the
  curator as an author-is-secondary scope call. validate.py green: 445
  works catalogue-wide, all references resolve; the only warnings for this
  wing are the pre-existing "outside every era" ones the scaffold already
  flagged as eras' problem to solve, unchanged in kind by this pass.
