stage: world-events
summary: >
  Assessed content/events/global.yaml against the gap Valter Hugo Mãe's
  arrival exposes: a second Lusophone wing publishing mostly in the 2000s and
  2010s, against a global layer that carried exactly one Portugal-specific
  entry (carnation-revolution-1974) predating his career. Measured the
  before-state (16 events: 2 high, 9 med, 5 low; 2010s at 1/3 of budget,
  1970s/1990s at 1/3, 1950s empty) via event_density.py, and evaluated all
  four candidates named in the brief plus the Saramago-death promotion
  question.

  First pass rejected all five, reading "reach: global" as "renders on every
  wing" and applying the skill's three-franchise reach test as a hard render
  cost. On review that premise was wrong: docs/SCHEMA.md line 94 makes
  global.yaml a candidate pool ("any franchise **could** carry this"), with
  event-resonance deciding per wing via franchise.yaml's globalEvents
  include/exclude, default exclude. A wrong inclusion costs one exclude line
  on the wings it doesn't suit; an omission leaves a wing with no way to opt
  in at all. That asymmetry, plus the standing precedent that
  carnation-revolution-1974 is already in the pool without naming three
  Anglophone franchises either, changes the call on exactly one candidate:
  **the 2011 troika bailout / austerity years is now ADDED** to global.yaml
  as portugal-bailout-2011 (med impact, scope world). The other four
  rejections (Saramago's death promotion, the euro, the 1998 Nobel, publisher
  consolidation) are unchanged and are re-stated below with their original
  reasoning intact, not re-litigated.

  Density after: 17 events (2 high, 10 med, 5 low); 2010s now 2/3 of budget
  (was 1/3), still one slot of headroom. validate.py green, no new pipeline-
  narration warnings on the new entry. i18n_coverage.py shows the new entry
  untranslated in pt-PT (title + description), a genuine net-new gap, not a
  regression against the pre-existing 16.
produced:
  changedEvents: []
  addedEvents:
    - id: portugal-bailout-2011
      date: "2011-04-06"
      impact: med
      scope: world
      note: >
        Written for the pool: the bailout, the austerity programme (tax
        rises, wage and pension cuts, privatisations, unemployment above 15%
        for three years) and the resulting emigration wave (100,000+ leaving
        annually through 2013, the highest rate since the 1960s), through
        Portugal's exit from the programme in mid-2014. No author or
        franchise is named in the description; event-resonance sharpens the
        per-wing meaning.
  densityBefore: "16 events (2 high, 9 med, 5 low); 2010s 1/3, 1970s 1/3, 1990s 1/3, 1950s 0/3"
  densityAfter: "17 events (2 high, 10 med, 5 low); 2010s 2/3, 1970s 1/3, 1990s 1/3, 1950s 0/3"
forStages:
  event-resonance: >
    portugal-bailout-2011 is a strong include candidate for joao-tordo and
    currently NOT a supportable include for valter-hugo-mae, on asymmetric
    evidence found in this pass: joao-tordo/works.yaml's own entry for
    Anatomia dos Mártires (2011) already states its protagonist is "an
    ambitious journalist, out to prove himself during Portugal's financial
    crisis" - a direct textual answer to this exact event, in the exact
    year. No work in valter-hugo-mae/works.yaml was found (by synopsis or
    note) to engage the 2011 crisis, austerity, or emigration - his novels
    of that decade are set in Iceland, Japan and colonial Brazil, not
    contemporary Portugal. Recommend including it for joao-tordo's
    globalEvents and leaving it out (or excluding it explicitly) for
    valter-hugo-mae's unless a future works pass finds a textual anchor
    there too. Also worth weighing for any Anglophone wing whose author was
    writing British or Irish fiction through the same austerity years
    (outside this pass's research scope; not checked here).
  franchise-events (joao-tordo, currently running, not touched here): >
    The evidence above is a ready-made citation for a franchise-scoped
    companion event on joao-tordo/events.yaml itself, dated 2011 and built
    from Anatomia dos Mártires's own synopsis plus the same bailout sourcing
    used in global.yaml - sharper and safely higher-impact there than the
    neutral pool entry can be, per the skill's own guidance on scope.
  translation: >
    events/global.yaml drops from fully covered to 32/34 fields in pt-PT
    (missing: title, description for portugal-bailout-2011) - a genuine
    net-new gap from this pass's own addition, not a regression against the
    prior 16-entry baseline, and not yet closed here.
openQuestions:
  - >
    RULING, UNCHANGED: José Saramago's death (2010) is NOT promoted from the
    two franchise-scoped copies (joao-tordo's saramago-death-2010,
    valter-hugo-mae's vhm-saramago-death-2010) to global.yaml, despite
    joao-tordo/events.yaml's own comment naming "a second Lusophone
    franchise" as its trigger to reconsider - that condition is now true, but
    the trigger as written predates and is looser than this skill's actual
    global bar. Confirmed on reconsideration: promoting an event to the pool
    costs nothing on wings that exclude it (see the reversal above), but a
    biographical death is still the sharper, more specific kind of fact where
    each franchise-scoped copy already names a load-bearing reason (the
    prize namesake, awarded to Tordo in 2009 and to Mãe in 2007) that a
    neutral, franchise-agnostic global description would flatten rather than
    sharpen - unlike the bailout, which is genuinely one event any number of
    wings could independently answer. Recommend the "two Lusophone
    franchises" trigger comment in joao-tordo/events.yaml be corrected in a
    future pass to point at the real bar instead.
  - >
    RULING, UNCHANGED: Portugal's adoption of the euro (transition
    1999-2002) stays rejected. Fails the narrative test outright, reach
    aside - no work in any of the eight franchises, Lusophone or not, was
    found to answer a currency changeover.
  - >
    RULING, UNCHANGED: José Saramago's 1998 Nobel Prize in Literature (the
    first for a Portuguese-language writer) stays rejected for now. It is
    the deep cause of the prize-namesake effect that demonstrably launched
    both Tordo's and Mãe's careers, and is a stronger candidate than his
    death for a future pool entry if a third non-Anglophone, prize-adjacent
    wing is ever added - "what a national literature meant" reaches further
    than one person's death - but nothing in the current catalogue answers
    it outside the two Lusophone wings, so it was not added alongside the
    bailout.
  - >
    RULING, UNCHANGED: the collapse/consolidation of Portuguese publishing
    into a few large groups (Porto Editora, Leya) stays rejected, on weak
    evidence rather than a reach failure - it fails even the floor check of
    being one shared fact across the two Lusophone wings' own catalogues.
    Mãe publishes with Porto Editora and several small presses (Quasi
    Edições, Objectiva, Cosmorama); Tordo publishes with Companhia das
    Letras/Penguin Portugal, a different group entirely. No source was
    opened establishing a single dated consolidation event both wings sit
    inside.
  - >
    Coverage note, not acted on: 1950s remains the one fully empty decade in
    the catalogue (budget 3, currently 0), and 1970s/1990s each still sit at
    1/3 after this pass's one addition to the 2010s. No genuinely
    franchise-agnostic candidate for those decades was researched in this
    pass - it was scoped to the Lusophone gap named in the brief, not a
    general sweep. Left empty rather than filled with something
    unresearched; a dedicated future world-events pass is the right place to
    look for real candidates there.
