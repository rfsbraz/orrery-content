stage: world-events
summary: >
  Assessed content/events/global.yaml against the gap Valter Hugo Mãe's
  arrival exposes: a second Lusophone wing publishing mostly in the 2000s and
  2010s, against a global layer that carries exactly one Portugal-specific
  entry (carnation-revolution-1974) predating his career. Measured the
  before-state (16 events: 2 high, 9 med, 5 low; 2010s at 1/3 of budget,
  1970s/1990s at 1/3, 1950s empty) via event_density.py, evaluated all four
  candidates named in the brief plus the Saramago-death promotion question,
  and rejected all five against the skill's reach test ("name three
  franchises it changes the reading for; if you cannot, it is not global").
  No entry in the catalogue's other six franchises (all Anglophone: Christie,
  Palahniuk, Cosmere, Discworld, King, Wheel of Time) is affected by any
  Portugal-specific candidate, so none clears three franchises. No change
  made to global.yaml; density after is identical to before. This is a
  reasoned rejection, not an oversight - see openQuestions for the concrete
  franchise-level alternative the evidence actually supports.
produced:
  changedEvents: []
  addedEvents: []
  densityBefore: "16 events (2 high, 9 med, 5 low); 2010s 1/3, 1970s 1/3, 1990s 1/3, 1950s 0/3"
  densityAfter: "unchanged - no entries added or re-graded"
forStages:
  event-resonance: >
    No globalEvents include/exclude judgment is needed on valter-hugo-mae/franchise.yaml
    as a consequence of this pass, since nothing new landed in global.yaml.
    The existing global.yaml entry most likely to be in his lifetime window
    (carnation-revolution-1974, born 1971) is a default-arithmetic inclusion
    for that stage to weigh on its own terms, not something this pass
    resolved.
  franchise-events (joao-tordo, currently running, not touched here): >
    Concrete, evidenced recommendation for that file: joao-tordo/works.yaml's
    own entry for Anatomia dos Mártires (2011) already states the protagonist
    is "an ambitious journalist, out to prove himself during Portugal's
    financial crisis." That is a real, sourced, franchise-scoped anchor for
    a 2011 troika-bailout/austerity event that this pass could not add
    (out of file footprint) and global.yaml could not carry (fails the
    three-franchise reach test - see openQuestions). Recommend a
    franchise-scoped event on joao-tordo/events.yaml, dated 2011, built from
    that synopsis plus independent sourcing of the bailout itself.
  franchise-events (valter-hugo-mae, currently running, not touched here): >
    By contrast, no work in valter-hugo-mae/works.yaml was found (by
    synopsis text or note) to engage the 2011 crisis, austerity, or
    emigration - his novels of that decade are set in Iceland, Japan and
    colonial Brazil, not contemporary Portugal. Flagging the asymmetry so
    that stage does not assume parity with joao-tordo's case: a troika
    event on this wing would currently have no textual anchor and should not
    be added without one.
openQuestions:
  - >
    RULING: José Saramago's death (2010) is NOT promoted from the two
    franchise-scoped copies (joao-tordo's saramago-death-2010,
    valter-hugo-mae's vhm-saramago-death-2010) to global.yaml, despite
    joao-tordo/events.yaml's own comment naming "a second Lusophone
    franchise" as its trigger to reconsider - that condition is now true, but
    the trigger as written predates and is looser than this skill's actual
    global bar. The reach test asks for three franchises the event changes
    the reading for; Saramago's death changes nothing about how a reader
    reads Christie, Palahniuk, Sanderson, King, Pratchett or Jordan, so it
    cannot clear three even generously. It is also sharper where it already
    lives: each franchise-scoped copy names a specific, load-bearing reason
    (the prize namesake, awarded to Tordo in 2009 and to Mãe in 2007) that a
    neutral, franchise-agnostic global description would have to flatten out.
    Recommend the "two Lusophone franchises" trigger comment in
    joao-tordo/events.yaml be corrected in a future pass to name the actual
    bar (three franchises, franchise-agnostic resonance) so it does not
    mislead the next stage into re-litigating this with the same wrong
    threshold.
  - >
    REJECTED for global: the 2011 troika bailout / austerity / emigration
    wave. Real and defining for Portugal, and joao-tordo's own bibliography
    already answers it (see forStages above), but it does not reach a third
    franchise anywhere in the catalogue - the other six wings are Christie
    (dead 1976), Palahniuk, Sanderson, Pratchett (dead 2015, but no
    Discworld-adjacent work engages Portuguese/European austerity), King and
    Jordan (dead 2007). Promoting it to global would put a Lisbon-specific
    bailout on a Sanderson or Christie reader's timeline by default (every
    franchise carries a global event unless its own franchise.yaml excludes
    it), creating cleanup work on four unrelated wings for a fact that
    explains nothing about their shelves. Stays a franchise-level candidate.
  - >
    REJECTED for global: Portugal's adoption of the euro (transition
    1999-2002). Fails the narrative test outright before reach is even
    considered - no work in any of the eight franchises, Lusophone or not,
    was found to answer a currency changeover. Genuinely "important context,
    not changed reading" - the SKILL's own disqualifying example.
  - >
    REJECTED for global: José Saramago's 1998 Nobel Prize in Literature (the
    first for a Portuguese-language writer). Weighed seriously - it is the
    deep cause of the prize-namesake effect that demonstrably launched both
    Tordo's and Mãe's careers - but it fails the same three-franchise reach
    test as his death, for the same reason: it recolors nothing about
    reading an Anglophone wing. If a third Lusophone (or more broadly
    non-Anglophone, prize-adjacent) wing is ever added, this is a stronger
    global candidate than the death itself, since a Nobel first is closer to
    "what a genre/national literature meant" than an individual's passing;
    worth revisiting then rather than now.
  - >
    REJECTED for global, on weak evidence rather than a hard reach failure:
    the collapse/consolidation of Portuguese publishing into a few large
    groups (Porto Editora, Leya). Checked whether it is even a shared fact
    across the two Lusophone wings first, since that would be the necessary
    floor before considering reach at all - it is not: Mãe publishes with
    Porto Editora and several small presses (Quasi Edições, Objectiva,
    Cosmorama); Tordo publishes with Companhia das Letras/Penguin Portugal,
    a different group entirely. No source was opened establishing a single
    dated consolidation event both wings' catalogues actually sit inside, so
    this was dropped before the reach test was even reached, rather than
    coined from the general "Portuguese publishing has consolidated" premise
    named in the brief.
  - >
    Coverage note, not acted on: 1950s remains the one fully empty decade in
    the catalogue (budget 3, currently 0), and 1970s/1990s each sit at 1/3.
    None of this pass's five rejected candidates touch any of those decades
    usefully, and no genuinely franchise-agnostic candidate for them was
    researched in this pass - it was scoped to the Lusophone gap named in the
    brief, not a general sweep. Left empty rather than filled with something
    unresearched; a dedicated future world-events pass, not this one, is the
    right place to look for real cross-catalogue candidates there.
