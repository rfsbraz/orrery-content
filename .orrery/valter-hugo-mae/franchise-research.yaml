forStages:
  completeness-auditor: >
    Treat as a genuine first draft, weakest section first: the 15-item poetry
    list (1996-2018) rests on a single detailed source pass
    (pt.wikipedia's bibliography table) with only 6 of 15 titles
    independently corroborated by a second source; none has a verified
    publisher-primary year or a synopsis. The 6 children's books are
    similarly thin (titles/years only, no plot verified); "Quatro Tesouros"
    (2011) appears in only one of the two bibliography sources checked and
    should be the first one re-verified for existence. Also unresolved: a
    set of anthology/magazine credits (Série Poeta 2001, A Alma não é
    Pequena 2003, Desfocados Pelo Vento 2004, Contos Policiais 2008, O
    Futuro em Anos-Luz 2011, the co-directed magazine Apeadeiro 2001-2004)
    where authorRole could not be established from a source actually opened
    - deliberately left out rather than guessed at apocrypha tier; worth a
    dedicated pass. Also flag: "Publicação da Mortalidade" (2018) is
    described elsewhere as collecting "nine books of poetry" against the
    14-15 individually dated collections catalogued here - unreconciled,
    noted in its own works.yaml entry.
  press-archaeology: >
    Only 5 lifeEvents scaffolded (birth, Quasi Edições 1999, Saramago Prize
    2007, Portugal Telecom 2012, APE prize 2021) - deliberately lean per
    scaffold discipline. wing_freshness.py already flags the 2013-2020 span
    as an 8-year dark run. Two specific leads NOT included in the scaffold
    because they weren't aura-tested against the two-source rule for a
    living person: (1) he was the vocalist of the band Governo
    (2007-2008 debut, EP "Propaganda sentimental") and reportedly had to
    stop due to a vocal-cord injury from shouting during a performance - the
    injury claim needs a second independent source before it could ever be
    an aura item; (2) he is a practising visual artist with a first solo
    exhibition in Porto in 2007, running in parallel with the Saramago Prize
    year - possibly worth a combined "multidisciplinary practice" life event
    if it explains critical language about his "painterly"/"musical" prose,
    but not included here as a coined inference. A Desumanização (2013) was
    also a 2015 Prémio Oceanos finalist per one press hit
    (publico.pt/2015/11/11) - not verified further, not added as a lifeEvent
    or work note beyond one flag in works.yaml.
  reading-orders: >
    No orders.yaml or startHere written. The tetralogia das minúsculas
    (2004-2010) is the one candidate grouping, but no publisher numbering or
    author-endorsed entry-path statement was found for it (unlike joao-tordo's
    trilogy, which is numbered 1/2/3 on the publisher's own product pages) -
    this needs its own discovery pass before any order or wizard path is
    written.
  world-events / event-resonance: >
    No globalEvents block written on franchise.yaml (that is event-resonance's
    file per the pipeline's footprint table, not scaffold's). Flagging one
    specific decision for that stage: events.yaml here duplicates
    joao-tordo/events.yaml's vhm... no, joao-tordo's own
    "saramago-death-2010" event (id kept distinct here as
    "vhm-saramago-death-2010" to avoid any id collision) - joao-tordo's
    comment already names "a second Portuguese-language franchise" as the
    trigger to consider promoting it to events/global.yaml. That condition is
    now true. Not promoted in this pass (out of scaffold's file footprint);
    flagged as a decision for event-resonance/the curator.
  eras: >
    Only the tetralogia das minúsculas (2004-2010) is scaffolded, provenance
    critical. The 2011-2026 span (9 more novels across wildly different
    settings - Japan, Iceland, Madeira, colonial Brazil, his own childhood)
    has no citable periodisation found in this pass and is left uncovered
    rather than coined; aura_density.py and the validator both flag works
    "outside every era" as expected.
  translation: >
    Brand-new wing, zero pt-PT coverage yet (i18n_coverage.py: franchise.yaml
    1 field, works.yaml 34 entries, eras.yaml 3, events.yaml 4, authors file
    11 - all missing). Not a regression against the baseline (these files did
    not exist before this pass); simply unstarted, per the normal pipeline
    order.
openQuestions:
  - "Contra Mim (2021) won the APE's Grande Prémio de Romance e Novela (a fiction prize) but the publisher's own '8th novel' count for As Doenças do Brasil (same year) excludes it - tiered extended (autobiographical prose) here rather than core; a curator call if that tension should be resolved differently."
  - "Should vhm-saramago-death-2010 (this file) be promoted to events/global.yaml now that two Lusophone franchises (joao-tordo, valter-hugo-mae) both carry a franchise-scoped copy of the same event? joao-tordo/events.yaml's own comment names this exact condition as the trigger to reconsider. Not done here; belongs to event-resonance/world-events."
  - "The poetry list (15 titles, 1996-2018) and the children's-book list (6 titles, 2009-2014) are this wing's weakest-sourced sections - single-source for most entries, no synopsis for any. Recommend completeness-auditor treats these as the priority before anything else in this wing."
  - "No recurring characters or work-to-work connections were found across the 34 works - each novel is set in a different place and time with a distinct cast (medieval Portugal, a Bragança boarding house, Japan, Iceland, Madeira, colonial Brazil, an imagined mountain village). connections capability is off by design; flag if a future pass finds a thread this one missed."
