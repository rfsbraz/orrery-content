stage: franchise-research
summary: >
  New wing scaffolded from scratch for Valter Hugo Mãe (b. 1971, poet turned
  novelist, 2007 Prémio José Saramago). 34 works (10 core novels, 24 extended:
  15 poetry, 6 children's books, 1 short-story collection, 2 autobiographical
  prose), 1 author entity with 5 lifeEvents, 1 sourced era (the received
  "tetralogia das minúsculas", 2004-2010), 2 franchise events. No
  characters.yaml, connections, orders.yaml, startHere, editions.yaml,
  achievements.yaml or images - all deliberately left for their owning
  stages. validate.py green (442 works, 29 authors catalogue-wide, all
  references resolve).
