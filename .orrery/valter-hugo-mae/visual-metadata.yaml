forStages:
  wing-audit: >
    6/37 covers is the realistic ceiling SCHEMA.md documents for a Portuguese
    literary novelist (~20%); do not read the low number as an incomplete
    pass. The repo-wide OpenLibrary-by-ISBN pattern (agatha-christie 5/73,
    joao-tordo 9/24, this wing) is worth a standing decision - see the open
    question below.
openQuestions:
  - >
    Repo-wide: should the OpenLibrary-by-ISBN path (SKILL.md "Path B") be
    deprioritised for Portuguese-market editions specifically? Evidence from
    this run: of 7 works with an OpenLibrary cover_i at all, only 6 actually
    served the Portuguese edition - the 7th (Homens Imprudentemente Poéticos)
    had a cover_i formally attached to the Portuguese edition record that
    turned out, on inspection, to be the Brazilian jacket art. Five more works
    had covers only under a visibly Brazilian edition (Biblioteca Azul,
    Cosac Naify, or a 978-65 ISBN prefix) with no Portuguese-edition cover
    at all. That is a 5-6x higher wrong-edition rate than the OL-work-id path
    (6/6 correct via search.json's cover_i cross-checked against
    editions.json) produced. Three other wings hit the same wall
    (agatha-christie, joao-tordo, and this one), all non-anglophone or
    partly-non-anglophone catalogues. This is evidence for a curator
    decision, not a ruling: the pattern is real, but abandoning Path B
    entirely would also lose the 20-25% of cases (like 4 of this wing's 6)
    where it is the only route to a genuine Portuguese cover.
  - >
    Porto Editora's own product pages were considered as a direct image
    source (they carry clean cover photography for nearly every work in this
    bibliography, more than OpenLibrary holds) and rejected: they are a
    publisher's retail product pages with no stated editorial-reuse terms
    found, the same posture SCHEMA.md's rights section treats as
    retailer-adjacent rather than a press/media kit. The OpenLibrary-hosted
    copies of the same Porto Editora jacket art are used instead, since
    OpenLibrary is the permitted host regardless of which publisher's art it
    mirrors.
