stage: spoiler-audit
summary: >
  Audited every prose surface in the Valter Hugo Mãe wing against the
  publishers' own copy, fetched verbatim rather than recalled: works.yaml
  synopses and notes, eras.yaml descriptions, orders.yaml rationale/debated,
  franchise.yaml description and startHere paths, events.yaml, and
  authors/valter-hugo-mae.yaml lifeEvents. Six load-bearing reveals were
  removed, all six by rewriting rather than deleting an entry, all six in
  works.yaml. No spoilerAfter boundary was set anywhere in this wing, and none
  needed to be: every reveal found sat in an ungated field (synopsis), where a
  boundary is decoration and rewriting is the only real remedy. The wing has no
  characters.yaml and no work connections, so the two densest usual vectors are
  absent by construction. One non-spoiler correction rode along: an
  author-attribution in the O Século dos Imbecis synopsis that no opened source
  supports. validate.py green with no new warnings, sync_sanctuary_block.py
  passing, i18n coverage unchanged at 68/74 files.

engineVerification: >
  The skill's field table was verified against the app rather than trusted.
  In orrery/lib/content/types.ts, spoilerAfter exists only on AuraEvent (used
  for franchise events and author lifeEvents) and CharacterAppearance. Work has
  no spoilerAfter property and no note property at all, and Era, Order and
  startHere paths carry no boundary field. So every synopsis, era description,
  order rationale and startHere description in this wing is ungated prose that
  ships to every visitor, and works[].note is genuinely curator-only - never
  loaded, never rendered - which is why the reasoning below is parked there.
  startHere[].note IS rendered (components/wizard/start-wizard.tsx), so the
  tetralogy path's note was audited as reader-facing prose.

produced:
  changedFiles:
    # The only file whose prose changed. The translation stage must re-sync
    # exactly this one; nothing else in the wing was edited.
    - content/franchises/valter-hugo-mae/works.yaml
  overlaysNeedingResync: >
    None outstanding from this stage. works.yaml has no pt-PT overlay yet (it
    sits in i18n_coverage.py's MISSING list, 37 fields, as it did before this
    pass), so the rewritten English is what the translation stage will
    translate from. The two overlays that DO exist for this wing
    (i18n/pt-PT/franchises/valter-hugo-mae/orders.yaml and .../franchise.yaml)
    were deliberately not touched, because the base prose they mirror was not
    touched either - they remain in sync.

  redactions:
    - work: valter-hugo-mae/a-desumanizacao
      severity: high
      revealed: >
        The synopsis stated the sister's age at death ("who died at twelve"),
        the mother's motive ("is hated by her own mother for having lived"),
        and the book's structural frame ("Death runs through the novel as its
        narrative guide").
      why: >
        The twin's death itself is the premise and stays: Porto Editora's copy
        is built on it ("a voz de uma menina diferente que nos conta o que
        sobra depois de perder a irmã gémea"). The other three appear in no
        publisher copy in either market. The mother's motive is the book's
        central cruelty and the reason for a coldness the Brazilian copy will
        only call "a violenta frieza da mãe". The narrative-frame line is the
        literary-fiction reveal shape exactly: what the book turns out to be.
      action: rewritten to the publisher's own altitude; entry kept in full.

    - work: valter-hugo-mae/homens-imprudentemente-poeticos
      severity: high
      revealed: >
        That Itaro is "preparing for his own death", and that Saburo is
        "widowed".
      why: >
        Neither is in publisher copy in any market, and both are developments
        inside the book. The publisher's own line about "os modos
        incondicionais de amarem suas distintas mulheres" cuts directly against
        "widowed" - a one-word leak of a death, which is the quiet shape this
        kind of failure usually takes. Itaro's intent is the book's gravity.
      action: >
        Rewritten from the Porto Editora sinopse. The Aokigahara setting was
        also dropped from the synopsis, not because the setting is itself a
        reveal, but because sitting one clause away from a character's
        intentions it functioned as foreshadowing. It survives as author-life
        aura in events.yaml (vhm-japan-research-2016), which is the
        rewrite-before-redact shape: the fact reaches every reader, the reveal
        is simply never stated.

    - work: valter-hugo-mae/deus-na-escuridao
      severity: med
      revealed: >
        That the brothers are born "without origins" and stigmatised for it,
        and that the community around them is "biological family and adoptive".
      why: >
        Porto Editora's product page gives only Madeira, "dois irmãos" and "a
        necessidade de cuidar de alguém"; the publisher's own launch release
        (15 January 2024) names the brothers but goes no further than "crescem
        em circunstâncias peculiares". That euphemism is a deliberate
        withholding, and a synopsis that resolves what the jacket left open is
        spoiling even when it states no event. The adoptive clause additionally
        answers the question the originlessness raises.
      action: rewritten; brothers still named, since the publisher names them.

    - work: valter-hugo-mae/o-remorso-de-baltazar-serapiao
      severity: low
      revealed: >
        That the cow Sarga's name becomes the family's mocking nickname, "the
        Sargas".
      why: >
        Appears in no publisher copy in either market and lands inside the
        book. Cheap to remove and nothing is lost.
      action: >
        Clause excised, nothing else altered. NOTE ON A NEAR-MISS: the first
        rewrite of this entry tracked the 2007 jacket blurb more closely and in
        doing so ADDED a fact (that Baltazar's father treated his mother as he
        treated the cow) on the strength of a blurb whose publisher attribution
        is one step short of primary. That was reverted to a minimal excision
        before commit. A spoiler pass that enriches while it redacts is doing
        two jobs badly.

    - work: valter-hugo-mae/o-nosso-reino
      severity: low
      revealed: >
        That Benjamim is seen "by turns saintly and demonic" by the adults
        around him.
      why: >
        The saint half is Cosac Naify's copy; the demonic half is in no
        publisher copy in either market and traces to encyclopedia summaries
        bleeding into search snippets. It also hints that the village turns on
        the boy. Removing it costs nothing and improves the sourcing.
      action: rewritten to follow the Brazilian publisher copy.

  corrections:
    - work: valter-hugo-mae/o-seculo-dos-imbecis
      kind: attribution, not a spoiler
      wasLive: true
      problem: >
        The synopsis described the village as one "that Mãe has described as a
        stand-in for social media". No source opened in this pass supports
        attributing that reading to the author, and the publisher's copy
        contains no mention of social media, the internet or anything digital,
        reaching only for "o século da informação, mas parecemos resistir ao
        conhecimento".
      action: >
        Clause removed and replaced with the publisher's own framing; the
        altitude conceit and the village's preference for bringing the marquis
        down are both verbatim in that copy and stay. The phrase "intelligence
        runs backwards with altitude" was also corrected - his wits track the
        altitude directly (sharper going up, duller coming down), which is what
        the copy says and what the previous wording muddled.
      caveat: >
        This one deserves scepticism about its own evidence. A first research
        report supplied a dated CNN Portugal interview with a direct quote in
        which Mãe takes up the social-media analogy after a journalist puts it
        to him; the same researcher then filed a correction stating it had
        verified no interview either way and that the attribution should not be
        made on its evidence. The two accounts contradict each other, so
        neither was relied on. What the removal rests on is only the
        publisher's copy, which was fetched verbatim twice. If an author
        statement is found and read, the social-media reading may well be
        restorable - as his, or as the press's.

  keptAfterChecking:
    - work: valter-hugo-mae/o-apocalipse-dos-trabalhadores
      ruling: >
        KEPT UNCHANGED, and this one overturned the initial instinct. Both
        women's names and both love stories (Maria da Graça with her employer,
        Quitéria with the young Ukrainian immigrant) read like inside-the-book
        detail, but they are Cosac Naify's own jacket copy, confirmed
        word-for-word across two unrelated retailers. The carpideiras work is
        in Porto Editora's Portuguese copy too. Redacting this would have
        shielded the back cover.
    - work: valter-hugo-mae/a-maquina-de-fazer-espanhois
      ruling: >
        KEPT UNCHANGED. "Enters a nursing home after his wife's death" is the
        opening clause of the Brazilian jacket ("Depois de perder a mulher, o
        barbeiro António Jorge da Silva passa a viver num lar de idosos"), so
        it is premise, not reveal. The synopsis states no structural turn, so
        there is no exposure even though whether this book HAS a late turn
        could not be settled from publisher copy - see openQuestions.
    - work: valter-hugo-mae/as-doencas-do-brasil
      ruling: >
        KEPT UNCHANGED. Our synopsis sits well below jacket altitude: Porto
        Editora's copy discloses considerably more, including Honra's
        conception in rape, which we do not state.
    - work: valter-hugo-mae/o-filho-de-mil-homens
      ruling: >
        KEPT UNCHANGED. Near-verbatim to the jacket, which names only
        Crisóstomo and leaves the invented family abstract - as our synopsis
        does. No cross-work leakage into Contra Mim in either direction.
    - work: valter-hugo-mae/contra-mim
      ruling: >
        KEPT UNCHANGED, and defended. The Portuguese publisher's copy stays
        general; the copy circulating in the Brazilian market itemises the
        book's disclosures, among them the early death of an elder brother the
        author never met. That brother is the one thing here functioning as a
        revelation to a first reader. A note was added to the work recording
        why the Portuguese altitude was followed, because the next enrichment
        pass will otherwise pull the fuller blurb in wholesale.
    - work: valter-hugo-mae/educacao-da-tristeza
      ruling: >
        KEPT UNCHANGED after the closest look in this audit, and the reasoning
        should be re-examined rather than inherited. Porto Editora's copy
        deliberately names nobody, so naming his nephew Eduardo and Isabel
        Lhano goes beyond the jacket. It was kept anyway on three grounds: the
        book is autobiographical prose about the author's own life, not a
        fiction with an experience to protect; there is no turn to spoil, which
        the research confirms; and the author disclosed all of it himself, in
        his own published words, in the book's own authorised excerpt ("O
        menino, meu sobrinho, meu afilhado, que tanto me comoveu e permitiu
        inventar o livro O filho de mil homens"). The cross-work clause about O
        Filho de Mil Homens was specifically checked and kept: it is an origin
        fact in Mãe's own words and discloses nothing about the 2011 novel's
        plot. A curator preferring the publisher's own reticence could tighten
        this to unnamed losses, and that would be a defensible call rather than
        a correction.
    - entity: eras.yaml, both descriptions
      ruling: >
        KEPT UNCHANGED, checked at full-bleed altitude as asked. "Closes on the
        old and forgotten inside a nursing home" describes a máquina de fazer
        espanhóis' setting, which is the Brazilian jacket's opening clause, not
        its ending. "The cycle closes with Deus na Escuridão" is a publication
        fact, stated by Mãe in two January 2024 interviews and by Porto Editora
        in its own launch release; cycle completions are not plot and take no
        boundary.
    - entity: orders.yaml rationale and franchise.yaml startHere descriptions
      ruling: >
        KEPT UNCHANGED. The shared four-clause summary of the tetralogy ("a
        fishing village under the Estado Novo, a medieval marriage curdling
        into witchcraft, two mourners in Bragança, a nursing home at the end of
        a life") was audited hardest, since a reader meets it having read
        nothing. Each clause is jacket-attested: the village and regime in
        Cosac Naify's copy, the carpideiras in Porto Editora's, the nursing
        home in the Brazilian jacket. "Curdling into witchcraft" is the weakest
        of the four - see openQuestions.
    - entity: events.yaml, all five
      ruling: >
        ALL KEPT AT spoilerAfter null. Four are publication, prize, craft or
        cultural facts and cannot carry a boundary meaningfully.
        vhm-japan-research-2016 is the only one with a real question attached -
        see openQuestions.
    - entity: authors/valter-hugo-mae.yaml, all seven lifeEvents
      ruling: >
        ALL KEPT AT spoilerAfter null. Six are birth, trade and prize facts.
        vhm-isabel-lhano-eduardo-2023 states real deaths, but they are
        biography rather than plot, the book they relate to has no reveal to
        protect, and the author put every element in public himself. The
        two-independent-source bar for a living person's family matter is met.
        The author-entity aka ("Valter Hugo Lemos") is his public birth name,
        not a twist identity.
    - entity: events/global.yaml
      ruling: >
        CHECKED, NOTHING TO DO. Only carnation-revolution-1974 reaches this
        wing (every other pool entry is excluded in franchise.yaml). It is
        history that closed the world o nosso reino is set in, not that novel's
        plot.

openQuestions:
  - >
    CURATOR CALL, and the weakest decision in this pass: "a medieval marriage
    curdling into witchcraft" appears in three reader-facing places (the
    o remorso synopsis, the tetralogy order's rationale, and the
    the-tetralogy-that-made-him startHere path, plus the pt-PT mirrors of the
    latter two). The witchcraft, possession and remorse run is jacket copy for
    the 2007 first edition, and "remorso" is the title, so it was kept in all
    three. But that 2007 blurb was only found reproduced on a literature
    portal, never on a publisher's own page, and the CURRENT Porto Editora copy
    is far more abstract and carries none of it. If a curator wants the ruling
    to rest on primary attribution, the honest fix is to find the 2007 jacket
    or drop the clause from all three places at once. It should not be loosened
    or tightened in one place only.
  - >
    CURATOR CALL, tightenable: vhm-japan-research-2016 states that Aokigahara,
    "the forest near Mount Fuji known for its high rate of suicides", gives
    Homens Imprudentemente Poéticos its setting. Porto Editora's copy places
    that novel only "num Japão antigo", so the event discloses a setting the
    publisher withholds. It was kept ungated: setting is the most incidental
    category there is, Mãe told the story himself in two interviews three
    months apart, and a shield here would read oddly over an author's research
    trip while still announcing that something exists. A curator who disagrees
    would anchor it on valter-hugo-mae/homens-imprudentemente-poeticos. Noting
    the tension honestly: the same forest was removed from that book's
    synopsis, but there it sat beside a character's intentions, which is what
    made it foreshadowing rather than setting.
  - >
    VERIFICATION LEAD, and it should be closed before this wing ships, because
    it concerns real and recently bereaved people. The synopsis of Educação da
    Tristeza and the lifeEvent vhm-isabel-lhano-eduardo-2023 both frame the
    book around two losses, his nephew Eduardo and the artist Isabel Lhano. The
    Eduardo half is solid: it is in Mãe's own published text. The Lhano pairing
    is where the record wobbled during this pass. One research report supplied
    a dated Diário de Notícias quote in which Mãe names both; the same
    researcher later filed a correction disavowing part of its own reporting,
    and separately noted that Quatro Cinco Um's editorial framing describes the
    book as circling "a morte do pai e do sobrinho" - the father, not the
    friend. That is a flag, not a refutation, and press-archaeology cited four
    sources including two national obituaries. Nothing was changed on the
    strength of one contradicted aside, and nothing should be: someone should
    open the DN interview and the book's dedication and settle whether the
    second loss is Isabel Lhano, the author's father, or both.
  - >
    NOT A SPOILER QUESTION, passed on because it lands in eras/reading-orders
    territory: press coverage of O Século dos Imbecis reportedly describes it
    as opening a planned third tetralogy, "Crimes e Vindouros". If true, that
    directly contradicts eras.yaml's current statement that no cycle is named
    after Irmãos, Ilhas e Ausências closes in 2024, and it would give the
    2025-2026 works the era they currently lack (they are two of the four
    "outside every era" validator warnings on this wing). This reached here
    second-hand and was NOT verified against a source actually opened, so it is
    a lead, not a fact.
  - >
    REPORTABLE NEGATIVE, so nobody re-runs it: whether a máquina de fazer
    espanhóis has a late structural turn could not be settled from publisher
    copy in either market. It does not matter for shipping, because the
    synopsis states no turn and therefore leaks nothing either way, but it is
    the one book in this wing whose spoiler surface was NOT fully characterised
    and it would need someone with the text in hand rather than more blurbs.
  - >
    METHOD NOTE worth carrying to the next wing, because it changed outcomes
    twice here. Porto Editora, Wook and Bertrand all return 403 to the normal
    fetch path but serve fine to curl with a desktop browser User-Agent, which
    is how every quote in this audit was obtained; the pages are latin-1. And
    three separate "facts" checked in this pass (the saint/demon duality, the
    Sargas nickname, and a Homens Imprudentemente Poéticos blurb line about "um
    lugar de morte no Japão") appear confidently in search-engine snippets and
    vanish when the page is actually opened. Every negative recorded above is a
    negative confirmed by reading the page, not by absence from a snippet.
  - >
    OUT OF SCOPE, noted in passing rather than acted on: theme.yaml's `notes`
    field ends "a curator can still swap either without changing the intent",
    which addresses a reader the way the sanctuary rule forbids. It is a field
    rather than a YAML comment, so validate.py does not flag it, and it is not
    this stage's footprint - but it will read oddly to anyone applying that
    rule strictly.

forStages:
  translation: >
    Re-sync exactly one file: content/franchises/valter-hugo-mae/works.yaml.
    Five synopses were rewritten (o nosso reino, o remorso de baltazar
    serapião, A Desumanização, Homens Imprudentemente Poéticos, Deus na
    Escuridão) and one more edited for attribution (O Século dos Imbecis);
    several `note` fields were rewritten or extended, but notes are
    curator-only and are not translated content. works.yaml had no pt-PT
    overlay before this pass and still has none, so there is no stale
    translation to invalidate - the rewritten English is simply what gets
    translated. The two existing overlays for this wing (orders.yaml,
    franchise.yaml startHere) were deliberately left untouched because their
    base prose was left untouched; do not treat them as drifted.
    IMPORTANT, since this stage ran precisely so translation would not have to
    do it twice: the redactions above are spoiler decisions, not stylistic
    ones. Translate the reticence. Do not restore detail from a Portuguese or
    Brazilian blurb while translating, even where the target-language copy is
    more explicit than the English - which for Contra Mim, A Desumanização, o
    nosso reino and o apocalipse dos trabalhadores it demonstrably is.
  gatesAtHandoff: >
    python scripts/validate.py - green, 445 works, all references resolve; the
    only valter-hugo-mae warnings are the four pre-existing "published year
    falls outside every era" ones, unchanged in number and kind by this pass.
    python scripts/sync_sanctuary_block.py - passing.
    python scripts/i18n_coverage.py - 68/74 files fully covered, identical to
    the number recorded before this stage started.
    validate.py was additionally falsified rather than trusted: a reference in
    the edited file was broken on purpose, the validator failed on it by name,
    and it went quiet again when restored.
