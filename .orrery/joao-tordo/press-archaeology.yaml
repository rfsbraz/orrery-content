dark_run_before_after: >
  Before: 10 aura entries, 0.38/work, longest dark run 5 years (2004-2008,
  the debut to just before the Saramago prize). After: 14 entries, 0.54/work,
  that run closed with three entries in 2004, 2008 and 2010. Closing it
  exposed a second 5-year run at 2012-2016 that the tool had been masking
  (only the single worst run is reported); one more entry (2014) closed that
  too. Longest remaining run is now 4 years (2022-2025, the last two books),
  under the flag threshold and left dark: too recent for retrospective press.

added:
  - id: tordo-debut-manuscript-2004 (authors/joao-tordo.yaml, lifeEvent, high)
    what: >
      Hand-mailed the manuscript of O Livro dos Homens Sem Luz to Portuguese
      publishers from New York; left NY for Lisbon when Temas e Debates
      wrote back. Became a freelance journalist (O Independente, Sabado,
      Noticias Magazine), work he calls ill-suited to him. First book sold
      ~700 copies. Fills the debut year with the true origin story.
    sources: observador.pt 2023 20th-anniversary interview (his own words); pt.wikipedia (dates).
  - id: tordo-sp-televisao-as-tres-vidas-2008 (lifeEvent, high)
    what: >
      Leaves journalism ~2006-2007 for translation and scriptwriting at SP
      Televisao; takes leave summer 2008 to finish As Tres Vidas in the
      Algarve, then resigns without another job. Bridges straight into the
      2009 prize entry already on file.
    sources: same observador interview; pt.wikipedia.
  - id: tordo-bom-inverno-identity-crisis-2010 (lifeEvent, high)
    what: >
      O Bom Inverno outsells As Tres Vidas tenfold, but a savage Expresso
      review (circ. ~250k) leaves him "destroyed"; Anatomia dos Martires
      becomes a year of false starts under self-imposed pressure to match
      the prize book. Inner-weather anchor for what the prize actually cost.
    sources: same observador interview (single-source; not a health/family/legal claim).
  - id: tordo-farewell-letter-father-2014 (lifeEvent, med)
    what: >
      Father Fernando Tordo, 65, emigrates to Recife amid crisis-era
      dissatisfaction; Joao publishes a farewell letter on his blog,
      Fernando answers publicly on Facebook. Closes the second dark run.
    sources: >
      Publico (reproduces the letter in full, via web.archive.org),
      Correio da Manha, esquerda.net - three independent outlets, satisfying
      the two-source rule for a living person's family matter.

also_added: >
  Matching pt-PT translations for all four entries (title+description) in
  i18n/pt-PT/authors/joao-tordo.yaml, one file outside the two I was
  assigned - done to avoid leaving base and overlay out of sync on this
  branch tip; flagging it rather than hiding it.

rejected:
  - >
    A search summary claimed Tordo himself was a surviving twin whose
    sibling died at birth. Traced this to its actual source, which is the
    backstory of Hugo, the fictional protagonist of O Ano Sabatico (2013),
    not the author. A search engine conflated character and author; did not
    go in, and flagged here as the kind of trap the skill warns about.
  - >
    The Loafing Heroes, confirmed: he has played double bass in this band
    since 2011 (multiple sources). Not jazz, and a hobby by his own
    description, not a recurring motif in the books as far as found. Trivia
    tier; left out.
  - >
    Creative-writing teaching and workshops, real and ongoing since the
    2010s (Publico 2014, several municipal libraries), but no single dated
    origin moment; an ongoing practice, not an event. Industry-context
    ceiling, not an anchor.
  - >
    The Ricardo Reis "blow to the head" reawakening, reading Saramago while
    a stagnant journalist in a shabby London flat, is a genuine, excellent,
    first-person origin story, but its date (around 2001) falls before the
    publishing span the aura tool measures (2004 onward), so it cannot
    register against any dark run. Left out this pass for density's sake; a
    strong candidate if the pre-career years ever get their own slot.

