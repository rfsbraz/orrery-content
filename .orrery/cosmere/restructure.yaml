stage: restructure
summary: >
  The cosmere wing widened from the Cosmere shared universe (28 works) to
  Brandon Sanderson's complete published works (68). Identity is now
  name "Brandon Sanderson", kind author; the slug and every existing work id
  are unchanged (ids are permanent) and new works take the same cosmere/
  prefix. Non-Cosmere threads added: The Reckoners, Skyward + Skyward Flight,
  Alcatraz vs the Evil Librarians, Legion, Infinity Blade, Dark One, plus
  standalones and collaborations. Five new author entities were created for
  collaborators.
produced:
  worksBefore: 28
  worksAfter: 68
  newAuthorEntities:
    - janci-patterson
    - dan-wells
    - ethan-skarstedt
    - collin-kelly
    - jackson-lanzing
  identityChanged: true
  eraOrphans: []
notes:
  - >
    Sanderson's three Wheel of Time completion volumes are deliberately NOT in
    this wing. A work lives in exactly one franchise and a continued universe
    belongs to its originating author, so they stay in wheel-of-time and are
    cross-referenced from his bio instead.
  - >
    No achievement anywhere keys off this franchise (verified against
    content/achievements.yaml and every franchises/*/achievements.yaml: only
    stephen-king and chuck-palahniuk ship badges). The widening therefore
    changes no franchise_complete target and makes no badge unearnable.
  - >
    The wing produced no new era-coverage warnings: the existing era spans
    already cover 2005-present, which is the whole publishing career.
forStages:
  eras: >
    No orphans to close, but the era prose was written for a Cosmere-only
    shelf and now sits over a career-wide wing. Re-read the era descriptions
    for claims that only hold for the Cosmere.
  reading-orders: >
    Orders and startHere were written against 28 Cosmere works. The derived
    default now spans 68 and opens on the same debut, but any prose promising
    to cover "everything" or "the Cosmere" needs to say which it means. New
    threads (Reckoners, Skyward, Alcatraz, Legion) may or may not earn orders:
    subseries labels already thread them, so rejection is a valid outcome.
  spoiler-audit: >
    40 new synopses are unaudited. The Reckoners and Skyward books are YA
    series with reveal-driven plots; Legion and Dark One are short-form with
    twist structures.
  visual-metadata: >
    40 new works have no cover. The author has no portrait in content at all,
    which the app now renders as a monogram tile on the home and franchise
    pages.
  editions: >
    40 new works have no edition. Portuguese coverage for the non-Cosmere
    threads is likely thin to absent (Saida de Emergencia did Mistborn Era 1
    and stopped) - report the real fraction rather than padding.
  translation: >
    pt-PT regressed from 58/58 complete to partial: cosmere/works.yaml is
    28/68 on synopsis, and the five new author entities have no overlay. The
    franchise description and the Sanderson bio were both rewritten, so their
    existing pt-PT entries are STALE (coverage cannot see this) and must be
    re-synced, not merely counted.
  wing-audit: >
    Check the widened wing for prose that still speaks as though the wing is
    the Cosmere, and confirm the capability set still fits a wing with far
    more works and the same connections density.
openQuestions:
  - >
    Tiering of the licensed/media tie-in work (Infinity Blade, Dark One) and
    of the Skyward Flight novellas co-written with Janci Patterson: recorded
    as written but worth a curator ruling on whether tie-ins belong in core.
  - >
    Whether the wing should keep the slug "cosmere" now that it is Brandon
    Sanderson's complete works. Ids are permanent so the slug stays by policy,
    but the URL now reads /f/cosmere for an author page. A future alias route
    would be an app change, not a content one.
