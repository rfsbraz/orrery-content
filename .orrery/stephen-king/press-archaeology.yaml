dark_run_before_after: >
  Before: 16 aura entries, 0.17/work, longest dark run 11 years (1988-1998).
  After: 21 entries, 0.22/work, that run closed; five new entries land in
  1989, 1995 and 1996. A second dark run now shows at 2012-2019 (8 years),
  unaddressed this pass - flagged below.

added:
  - id: king-bangor-west-stadium-1989 (authors/stephen-king.yaml, lifeEvent)
    what: >
      Coaches son Owen's Little League team, Bangor West, to the 1989 Maine
      title - the season behind his essay "Head Down" (New Yorker 1990,
      later in Nightmares & Dreamscapes). He and Tabitha fund the $1.2M
      Shawn T. Mansfield Stadium (opened 1992). Med: explains a baseball
      memoir inside a horror collection; the only philanthropy fact on file.
    sources: Wikipedia (Head Down) and Bangor Daily News, 26 May 2022 - both read directly.
  - id: king-retirement-announcement-2002 (stephen-king.yaml, lifeEvent)
    what: >
      Tells the LA Times (Jan 2002), quoted directly, that he means to stop
      publishing novels; ties to hints from a 1998 interview around Bag of
      Bones. Med: explains the "final book" framing on Everything's Eventual
      and From a Buick 8, and the push to finish the Dark Tower.
    sources: ABC News, 30 Jan 2002, quoting the LA Times - read directly.
  - id: man-in-black-suit-prize-1995 (franchises/stephen-king/events.yaml)
    what: >
      "The Man in the Black Suit" (New Yorker 1994) wins the World Fantasy
      and O. Henry Awards in 1995, rare mainstream-literary notice
      mid-career. Anchors the limited Six Stories (1997), reprinted in
      Everything's Eventual (2002). Med: a quieter precursor to the 2003 medal's genre-legitimacy story.
    sources: Wikipedia - read directly; no plot detail used.
  - id: bachman-regulators-desperation-1996 (events.yaml)
    what: >
      Eleven years after being unmasked, King revives Bachman for The
      Regulators, published the same day as its "mirror" novel Desperation.
      Med: explains why two dissimilar 1996 books share a cast and split jacket art.
    sources: Wikipedia (both novels) - read directly.
  - id: green-mile-serial-1996 (events.yaml)
    what: >
      The Green Mile ships as six monthly paperback installments (Mar-Aug
      1996), a format borrowed from Dickens's serials, before a 1997
      one-volume collection. Med: explains the chapbook-format first editions.
    sources: Wikipedia and a contemporary Boston Globe piece (via
      Spokesman-Review, 26 Mar 1996) - both read directly.

