    why: Confirmed, but inside the already-covered 1979-1987 window, not the gap; doesn't recolor a reading alone - trivia.
  - what: Rock Bottom Remainders band (1992)
    why: Well documented but texture without a mark on the canon - cut per the density rule.
  - what: Malcolm Edwards "house guest" anecdote as Green Mile's specific Dickens origin
    why: Only found paraphrased, never in a source I could open - kept the corroborated Dickens framing, dropped the anecdote.
  - what: 2013 NPR quote tying the 2002 retirement talk to OxyContin
    why: >
      Only in secondary outlets citing an unnamed NPR interview; the two
      NPR URLs I located didn't contain it. A living person's health claim
      needs two sources I can actually read - left out.
  - what: Harold Bloom's 2003 attack on the NBF medal
    why: Real and sourced, but the medal is already a lifeEvent from an earlier pass; a second 2003 entry would re-litigate. Flagged below instead.

