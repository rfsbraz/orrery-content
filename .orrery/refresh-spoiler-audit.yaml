stage: spoiler-audit
mode: delta
scope: >
  The ~949 added lines of `git diff main -- content/authors content/franchises`
  (new author lifeEvents and franchise events across six wings), plus the
  pre-existing Roger Ackroyd event and the entity sweep that ruling required.
  Existing wing prose was not re-audited.

gates:
  validate: "exit 0, 483 works, all references resolve; no new warnings (two eras.yaml warnings shifted one line)"
  i18n_coverage: "pt-PT 72/82, unchanged from baseline; joao-tordo still fully covered"
  sync_skill_blocks: "exit 0, 2 shared blocks identical"

# Files whose ENGLISH prose changed. The translation pass re-syncs exactly these.
# Where a pt-PT string already existed it was mirrored in the same commit and is
# listed as done; the rest are new entries the overlay has never carried.
changed_prose:
  - file: content/franchises/agatha-christie/events.yaml
    entries: [roger-ackroyd-breaks-the-rules, witness-for-the-prosecution-1953]
    pt_pt: "Ackroyd mirrored; Witness is new and untranslated"
  - file: content/franchises/agatha-christie/eras.yaml
    entries: [styles-years]
    pt_pt: mirrored
  - file: content/franchises/agatha-christie/franchise.yaml
    entries: ["startHere/meet-poirot (description + note)"]
    pt_pt: mirrored
  - file: content/authors/agatha-christie.yaml
    entries: [christie-late-novels-vocabulary-decline]
    pt_pt: "new entry, untranslated"
  - file: content/franchises/discworld/events.yaml
    entries: [discworld-convention-1996]
    pt_pt: "new entry, untranslated"
  - file: content/authors/joao-tordo.yaml
    entries: [tordo-bom-inverno-identity-crisis-2010]
    pt_pt: mirrored

redactions:
  - wing: agatha-christie
    where: "events.yaml roger-ackroyd-breaks-the-rules (pre-existing)"
    revealed: >
      That the novel turns on a narrative device, is a twist, and that critics
      thought it might be cheating. A structural tell: it primes a reader who
      has never opened the book to watch the narration, which is the whole game.
    action: >
      Rewritten as reception history (the fair-play quarrel, the codes it fed).
      spoilerAfter dropped to null: the prose no longer needs a gate, and the
      shield rendered "Hidden until you finish The Murder of Roger Ackroyd",
      which announced the secret by existing. Loosening, recorded deliberately.
  - wing: agatha-christie
    where: "eras.yaml styles-years description (ungated, pre-existing)"
    revealed: '"detonates a twist" - stated the tell outright to every reader.'
    action: "clause removed. Found by the entity sweep; the event fix was worthless without it."
  - wing: agatha-christie
    where: "franchise.yaml startHere/meet-poirot description + note (ungated, pre-existing)"
    revealed: '"the village twist" and "Roger Ackroyd first for the shock".'
    action: "restated as case/order. Same fact as above, same sweep."
  - wing: agatha-christie
    where: "events.yaml witness-for-the-prosecution-1953 (new)"
    revealed: '"the Roger Ackroyd scandal thirty years before" - brands the book as controversial.'
    action: 'replaced with "how far her standing had travelled in thirty years".'

kept_borderline:
  - "wheel-of-time wot-slows-pace-1994: 'the slog' is reception and craft history, names pace not plot, and is settled community vocabulary. Keeps."
  - "stephen-king bachman-regulators-desperation-1996: the mirror-novel pairing and the joined jacket art were the 1996 marketing and are physical properties of the objects. Jacket-level."
  - "stephen-king green-mile-serial-1996: format and sales only, no plot."
  - "chuck-palahniuk palahniuk-mother-dies-2009: 'a dead child who misses her parents' is already in the ungated Damned synopsis and is the jacket premise."
  - "chuck-palahniuk rant-sold-as-trilogy-2007: the oral-biography form is the book's own subtitle and already in the ungated synopsis."
  - "robert-jordan rj-marries-mcdougal-1981: forward reference to 2007 is publication history, and frames McDougal with agency."

sensitivity:
  - "Fixed - discworld-convention-1996 claimed a 'costumed stand-in' and 'failing health'. The record says the organisers announced he could not travel for health reasons, he took part by on-camera Q&A from home, and his black hat was named guest of honour. A factual correction as well as a dignity one."
  - "Fixed - christie-late-novels-vocabulary-decline was titled 'Health fails; the last novels thin out'. Retitled to lead with her still writing. The body was already careful: it states she was never diagnosed, and attributes the vocabulary finding to the researchers."
  - "Fixed - tordo-bom-inverno-identity-crisis-2010 was titled 'a paralysing identity crisis', a clinical label applied to a living person and absent from the source. Retitled in his own sourced register."
  - "Flagged, kept - the same Tordo entry rests on ONE source. It concerns a living person's distress, which normally wants two, but it is his own first-person account in a feature interview, which is the provenance the rule exists to secure. A curator may want a second."
  - "Checked, no action - Pratchett's Alzheimer's entry gained a second source and no prose change. Jordan's amyloidosis, Palahniuk's mother and Tordo's father are all factual, dated, multiply sourced, and public acts by the people involved."

engine_notes:
  - "A shielded event names its unlocking work in shieldCopy. When the anchor IS the book being protected, the shield discloses the secret. Ungating safe prose beats gating unsafe prose."

open_for_curator:
  - "The Ackroyd loosening is the one to revisit if anyone disagrees: the event now reaches every reader, by design."
