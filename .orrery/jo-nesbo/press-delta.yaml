stage: press-delta
summary: >
  Settled the unresolved claim from the full press-archaeology run: whether
  Nesbø wrote Flaggermusmannen "on the flight" to Australia. The strong
  folklore version does not hold, but a more precise, better-sourced version
  does. Two independent Norwegian sources, both quoting Nesbø's own account
  in separate interviews years apart, agree: Janne Gro Rygg, an Aschehoug
  non-fiction editor he knew from Bergen, asked him for a memoir about
  touring with Di Derre; he declined but said he might return from a planned
  Australia trip with something else; on the Oslo-Sydney flight he conceived
  the character Harry Hole and the book's plot; landing in Sydney jetlagged
  in the middle of the night, he stayed up while his travelling companion
  slept and wrote the opening chapter that same night, in which Harry lands
  in Sydney and checks into the same hotel. Added one franchise event,
  content/franchises/jo-nesbo/events.yaml, dated 1997 (the wing's first
  aura year). validate.py --slug jo-nesbo shows no new errors; the one
  failure is the pre-existing theme.yaml art-block gap, unrelated to this
  wing. Aura moved from 20 to 21 entries (0.59 to 0.62 per work); the
  1998-2000 dark run is unaffected since 1997 already carried aura via the
  full run's nesbo-debut-1997 lifeEvent.
produced:
  newFranchiseEventIds:
    - jo-nesbo/di-derre-memoir-declined-1997
forStages:
  - >
    translation: one new dated entry needs pt-PT coverage.
openQuestions:
  - >
    Does the "wrote it on the flight" detail survive: no, not as stated. What
    survives, sourced from Nesbø's own words in BOK365 (BokPod interview,
    Nov 2015) and NRK (reporting a Sveriges Radio interview), is more precise
    than the folklore: the character and plot were conceived during the
    Oslo-Sydney flight, and actual writing began hours later, the same
    night, after landing in Sydney - not in the air. This reads as a
    correction to the commonly repeated version rather than a confirmation
    of it.
  - >
    Dropped: Britannica, nordics.info and lifeinnorway.net (the secondary
    corroboration already in hand before this pass) do not distinguish
    conceiving the idea from writing prose, so none of them was usable to
    settle the flight claim either way - only the two primary-quote Norwegian
    sources actually pin down what happened on the plane versus after
    landing.
  - >
    Not verified either way: Norwegian Wikipedia's summary (30-hour flight
    develops the plot, manuscript written over a 5-week vacation) is
    consistent with the BOK365/NRK account but was not itself treated as a
    source, since it is an unsourced paraphrase rather than a primary quote.
  - >
    Not mine to add: the existing nesbo-debut-1997 lifeEvent already
    describes the debut in hedged terms ("reportedly finishing much of it
    during and after an extended stay in Sydney's King's Cross"); this new
    franchise event firms up and slightly corrects that account with a
    precise, dated night, but the full run's lifeEvent itself was not
    reopened per scope.
