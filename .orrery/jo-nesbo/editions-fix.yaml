stage: editions-fix
summary: >
  jo-nesbo/politi/aschehoug-2013-nb, isbn 9788203355530: the OpenLibrary
  source cited did 404, confirmed directly, and OpenLibrary's search index
  also returns zero hits for this ISBN. But aschehoug.no/politi-2 is a live,
  current product page selling this exact ISBN today - Utgitt 2013, Salgsdato
  05.06.2013, Format Ebok, orig. tittel "Police", 159 kr. The ISBN was never
  wrong; the cited source was the wrong one. Fixed by swapping the source to
  the live Aschehoug page and rewriting the note. nb.no's isbn query for this
  ISBN also returns zero (confirmed), but that is not independent evidence
  against it: five other nb rows in this same file (Hodejegerne, Karusellmusikk,
  Doktor Proktors prompepulver, Doktor Proktors tidsbadekar, Kan Doktor Proktor
  redde jula) are ebook/audiobook-only Aschehoug SKUs that also return zero on
  nb.no by isbn query despite being live, current storefront items - checked
  each of the six (five plus Politi) directly against aschehoug.no by
  re-fetching the cited URL and grepping ISBN/Utgitt/Format/Salgsdato, and
  every one matches the file's recorded isbn13, year and format exactly.
  Added a header caveat naming this exception so the "nb.no silence is strong
  negative evidence" rule (true for print, stated in the file header) is not
  misapplied to a digital SKU again. Also checked nb.no's isbn query is zero
  for rotteoya's cited ISBN 9788203368264, confirming the audit's "decorative
  citation" finding; rotteoya already carries a live aschehoug.no source and
  needs nothing else, so the dead api.nb.no line was deleted and nothing else
  on that entry touched.
produced:
  - >
    content/franchises/jo-nesbo/editions.yaml - politi/aschehoug-2013-nb
    source and note rewritten; rotteoya-og-andre-fortellinger/aschehoug-2021-nb
    lost its dead nb.no source line; file header gained one clause on the
    ebook/audiobook nb.no-silence exception.
forStages: []
