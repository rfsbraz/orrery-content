stage: event-resonance
summary: >
  Ruled on globalEvents for the Jo Nesbø wing under the current opt-in
  semantics (docs/SCHEMA.md "globalEvents"): nothing renders unless named in
  `include`, and `exclude` gates nothing but records ground already covered.
  Nesbø (born 1960-03-29, living) overlaps every content/events/global.yaml
  entry dated 1960 or later; the four before 1960 (world-war-i-1914,
  world-war-ii-1939, pulp-magazines-1926, penguin-paperback-1935,
  armed-services-editions-1943) sit outside his lifetime and were left
  unruled, per the skill's instruction not to spend judgement on arithmetic
  the engine already does. None of the twelve in-lifetime events passed the
  one-sentence resonance test against this wing's sourced bibliography and
  aura (eras.yaml, franchise-research.yaml, press-archaeology.yaml,
  completeness-auditor.yaml, content/authors/jo-nesbo.yaml,
  content/franchises/jo-nesbo/events.yaml) - each written test collapsed to
  "he lived through it" or "this shaped the era he wrote in," which the skill
  names as the sound of a sentence with nothing in it. `include` is written
  empty; `exclude` carries all twelve with a short book-specific or
  genre-specific reason each. financial-crisis-2008 got the closest look,
  given Nesbø's own pre-1997 stockbroker/financial-analyst background, but
  that background predates the crash by decades and no work in the
  bibliography is plotted around the 2008 crash itself - it is biography, not
  a book answering the event. lady-chatterley-trial-1960 also got real
  consideration (it falls inside his life by seven months, and his violence
  in Panserhjerte/The Leopard is itself a documented flashpoint, see
  leopard-violence-regret-2012 in this wing's own events.yaml) but no source
  ties the era's obscenity-law shift to his specific content decisions; the
  connection would have to be invented. validate.py --slug jo-nesbo is
  unchanged from baseline: same single pre-existing theme.yaml art-block
  error (visual-language's territory), no new errors or warnings.
produced:
  changedFiles:
    - content/franchises/jo-nesbo/franchise.yaml
  globalEventsBlock:
    include: []
    exclude:
      - sept-11-2001
      - financial-crisis-2008
      - covid-19-pandemic-2020
      - lady-chatterley-trial-1960
      - fantasy-paperback-boom-1965
      - carnation-revolution-1974
      - chain-bookshop-1982
      - online-bookselling-1995
      - ebook-and-self-publishing-2007
      - prestige-fantasy-adaptation-2011
      - booktok-2020
      - portugal-bailout-2011
  unruled_outside_lifetime:
    - world-war-i-1914
    - world-war-ii-1939
    - pulp-magazines-1926
    - penguin-paperback-1935
    - armed-services-editions-1943
forStages:
  - >
    reading-orders: franchise.yaml now also carries a `globalEvents` block
    (inserted between `features: {}` and `sources:`) in addition to whatever
    you write there; it is a sibling key, not something reading-orders needs
    to preserve content of, just not clobber structurally.
  - >
    world-events: this wing surfaced two real gaps in the shared catalogue,
    neither of which is this skill's file to write. (1) content/events/global.yaml
    has no entry for the international Nordic-noir / translated-crime-fiction
    boom (the actual commercial engine of Nesbø's career - Rødstrupe/The
    Redbreast, Stieg Larsson's Millennium trilogy and the wave they rode
    starting roughly 2005-2011), despite entries for other genre-commercial
    moments (fantasy-paperback-boom-1965, prestige-fantasy-adaptation-2011).
    If added with real sourcing, this wing would very likely `include` it.
    (2) There is no global event at all for the 2011 Norway/Utøya attacks,
    which press-archaeology flagged: Nesbø gave an on-record reflection on
    them in the same 2012 Guardian interview already cited in this wing's
    events.yaml ("too soon to tell... may one day read more like a natural
    disaster... than a political shift"). This is a stronger, more specific
    candidate than the Nordic-noir gap and closer to author-life than world
    scope; whether it belongs in global.yaml or as a new franchise event in
    jo-nesbo/events.yaml (press-archaeology's file, not this skill's) is a
    judgement call for whichever skill owns it, not fabricated here.
openQuestions:
  - >
    None of the twelve exclusions is a close call in the sense of "might flip
    with more research" - each rests on an absence already checked across
    four prior stages' sourcing. The two items worth a future pass are the
    additions named above for world-events, not a re-litigation of this
    file's exclude list.
