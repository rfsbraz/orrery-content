stage: press-archaeology
summary: >
  Dark run before: 8 years (2012-2019); the script only reports the single
  worst, but two more spans also qualified, 9 years (1998-2006) and 6 years
  (2021-2026). Dark run after: 3 years (1998-2000). Ratio moved 0.44 to 0.59
  aura entries per work. Added four franchise events
  (content/franchises/jo-nesbo/events.yaml, new file) and one lifeEvent
  (content/authors/jo-nesbo.yaml): a 2004 NRK Nitimen poll naming Rødstrupe
  Norway's best crime novel ever (nb.no/no.wikipedia, NBL); a 2012 Guardian
  interview where Nesbø volunteers, unprompted, that he "went a little bit
  too far" with the violence in Panserhjerte/The Leopard, and separately
  calls climbing a deliberate courting of the fear his fiction runs on; the
  2013 discovery that Blod på snø began as a mock-documentary about a
  kidnapped invented author, "Tom Johansen," whose own referenced novel
  Nesbø got curious enough to write for real, then planned to publish as a
  genuine 1970s cult novel (Wikipedia page and stand-in photos included)
  until his foreign publisher's lawyers called it false advertising, so both
  books shipped under Nesbø's own name in 2015 (Dagbladet x2, Variety, read
  directly, not laundered through Wikipedia's citation); the October 2017
  Snowman film, panned internationally (7% Rotten Tomatoes) and domestically
  (mostly terningkast 2), its director telling NRK that 10-15% of the
  screenplay went unfilmed, Nesbø himself telling NRK weeks later that not
  having seen it yet has been "rather convenient"; and a 2023 lifeEvent
  closing the climbing thread, Nesbø's own 8a.nu account of reaching a
  self-set goal three years late at 62. Both NRK articles and both Dagbladet
  articles were fetched directly rather than relied on via Wikipedia's
  citations. validate.py --slug jo-nesbo shows no new errors or warnings;
  the one failure is the pre-existing theme.yaml art-block gap.
produced:
  newFranchiseEventIds:
    - jo-nesbo/rodstrupe-nitimen-poll-2004
    - jo-nesbo/leopard-violence-regret-2012
    - jo-nesbo/tom-johansen-scheme-2013
    - jo-nesbo/snowman-film-disowned-2017
  newLifeEventIds:
    - nesbo-climbing-8a-2023
  newFiles:
    - content/franchises/jo-nesbo/events.yaml
forStages:
  - >
    translation: five new dated entries (four franchise events, one
    lifeEvent) need pt-PT coverage; nothing existing was reworded, so no
    orphaned overlay results from this pass.
  - >
    event-resonance: globalEvents stays this skill's call, untouched here.
    But the 2012 Guardian interview has Nesbø reflecting, on the record, on
    the 2011 Utøya massacre ("too soon to tell," maybe read one day "more
    like a natural disaster... than a political shift") - worth weighing for
    globalEvents.include even though it earned no franchise event here.
  - >
    editions: no ISBN data surfaced; the Tom Johansen event does document an
    unrecorded 2013 Warner Bros/DiCaprio rights deal for Blod på snø.
  - >
    spoiler-audit: none of the five new entries reveal any book's ending;
    all carry spoilerAfter: null deliberately, not by default.
openQuestions:
  - >
    Weakest call: dating the Tom Johansen event 2013-10. Nesbø's own account
    puts the idea's origin around 2012 and the lawyers' verdict somewhere in
    an undated middle; October 2013 is just the best-dated public moment, so
    one date covers a year-plus sequence.
  - >
    Not mine to add: a March 2015 Dagbladet interview has Nesbø describing a
    separate "Tom Johansen" kidnapping mock-documentary, expected "next
    year." No such title is in this wing's 34-work bibliography - unfinished,
    or filed under an unconnected-looking title. Worth one targeted look.
  - >
    Rejected: English Wikipedia's line that Nesbø "lives close to his
    ex-wife and their daughter." Single source, no self-disclosure found,
    fails this wing's bar for a living person's family. Left out entirely.
  - >
    Rejected as pre-career trivia: the torn ACLs ending his Molde FK
    football career and his Air Force national service both check out
    (NBL, both Wikipedias, Guardian, 8a.nu) but predate 1997.
  - >
    Rejected as award-listing trivia: Oslo bys kulturpris and Årets Peer
    Gynt (2013), Rivertonklubbens ærespris (2016), and the 2023 honorary
    doctorate all check out but recolor nothing on their own.
