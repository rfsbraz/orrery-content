openQuestions:
  - >
    Undocumented field. jo-nesbo/nadeskudd carries forthcoming: 2026-08-19,
    which docs/SCHEMA.md does not define. The field exists only on branch
    feat/forthcoming-works, which is not in origin/main. The wing depends on a
    schema change that has not landed.
  - >
    Sanctuary language. Eighteen sites across five files narrate the research
    rather than the data ("anywhere searched", "as of the sources checked",
    eras.yaml's "Searched in Norwegian first, then Danish and English").
    validate.py's regex does not catch these. Collapsing a hedge into an
    assertion is an editorial call, so routed rather than fixed.
  - >
    displayFace and signature. SCHEMA names three faces and four signatures;
    five wings ship values outside both sets (ivar, canela, instrument-serif,
    double-rule, filament, tideline, wheel-and-serpent, horizon). Either SCHEMA
    is stale or those wings render in a fallback nobody chose. jo-nesbo itself
    is compliant. No app code in this repo, so unresolvable here.
  - >
    Palahniuk, Flynn and jo-nesbo all ship sourceSerif + rule. Reasons are not
    rendered; Flynn and jo-nesbo are both pale-ground crime wings. Palette and
    accent do carry the difference. Curator's call.
