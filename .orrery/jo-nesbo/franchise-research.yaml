stage: franchise-research
summary: >
  Scaffolded the Jo Nesbø wing (kind: author, slug jo-nesbo) from Norwegian
  and English Wikipedia, Norsk biografisk leksikon (Store norske leksikon),
  and the dedicated Norwegian Wikipedia article for Blod på snø. 33 works
  across six groupings: Harry Hole (14, 1997-2026), Kongeriket (2, a
  publisher-numbered duology), Olav Johansen (2), six further standalone
  crime novels, three short-fiction collections, and the five-book Doktor
  Proktor children's series (tiered extended, off the crime spine). Titles
  are Norwegian originals and published years are Norwegian first-publication
  years throughout, per the ruling that the derived default order must run
  Norwegian-chronological rather than translation-chronological (English
  publishing translated books one and two over a decade after the rest).
  Corrected one year against English Wikipedia's own infobox: Blod på snø
  and Mere blod are dated 2015, not 2014, on the strength of Norwegian
  Wikipedia's dedicated article, its two cited March 2015 reviews, and Norsk
  biografisk leksikon agreeing independently. Author entity carries three
  sourced lifeEvents (father's wartime past and its stated effect on him;
  the 1997 debut written while working in finance and music; the 2007 start
  of the Doktor Proktor line). Theme (vinterlys: pale cold blue-white ground,
  cobalt accent, sourceSerif, rule) is written without an art block, which is
  visual-language's territory. No characters.yaml, eras.yaml, orders.yaml,
  events.yaml, editions.yaml, or startHere block is written. validate.py
  --slug jo-nesbo is green apart from the expected missing-art-block error.
produced:
  - content/authors/jo-nesbo.yaml
  - content/franchises/jo-nesbo/franchise.yaml
  - content/franchises/jo-nesbo/works.yaml
  - content/franchises/jo-nesbo/theme.yaml
forStages:
  - >
    completeness-auditor: verify the 33-work list against primary sources;
    close the two dated gaps below (Nådeskudd, Kan Doktor Proktor redde
    jula?); locate print homes (or confirm there are none) for the short
    stories Twelve and I Am Victor; find plot detail for Det hvite hotellet,
    Doktor Proktor og verdens undergang. Kanskje., Doktor Proktor og det
    store gullrøveriet, Kan Doktor Proktor redde jula?, Natthuset, Kongen av
    Os and Minnesota, none of which turned up a synopsis in the sources
    checked; settle whether Mere blod's connection to Olav Johansen (a
    different narrator, Jon Hansen, per Norwegian Wikipedia's general
    bibliography note) supports keeping it in that subseries.
  - >
    press-archaeology: the aura beyond the three scaffolded lifeEvents. NBL's
    biography is a rich further source (Nesbø's football career at Molde FK
    ended by a torn cruciate ligament, three years' national service in the
    Royal Norwegian Air Force, starting competitive rock climbing at 50) not
    drawn on for lifeEvents here because the aura editorial bar is that
    skill's call, not this one's.
  - >
    eras: no eras.yaml is written. A three-decade, fourteen-book main series
    plausibly supports one, but periodization needs its own sourcing pass.
  - >
    editions: English titles for all 33 works are already gathered in
    works.yaml sources/notes (mostly from English Wikipedia's own
    bibliography section, cross-referenced per book) and can seed edition
    records without re-deriving them from scratch.
  - >
    reading-orders: the Norwegian-vs-English translation-order gap named in
    both franchise.yaml and works.yaml is exactly this wing's reading-order
    story and is not written up as an order here.
  - >
    event-resonance: globalEvents is entirely unruled; Nesbø's lifetime
    (1960-present) overlaps most of the catalogue's world events.
  - >
    spoiler-audit: Kniv's amnesia premise and Blodmåne's Los Angeles setup
    both carry information a synopsis has to walk carefully; neither is
    flagged with spoilerAfter here because no character or event data exists
    yet to hang it on.
  - >
    visual-language: theme.yaml has palette/displayFace/signature only.
openQuestions:
  - >
    Nådeskudd (2026), the 14th Harry Hole novel: year rests on a single
    source (Norwegian Wikipedia's Harry Hole article, itself citing a title
    reveal, not a publication confirmation). Needs a publisher or review
    source before it can be called settled.
  - >
    Kan Doktor Proktor redde jula?: Norwegian Wikipedia says 2016 (citing an
    Aschehoug page not opened directly); English Wikipedia says 2017. 2016
    is recorded provisionally on the stronger-sourced side.
  - >
    Whether Mere blod belongs in the Olav Johansen subseries despite a
    different narrator is a naming call for whoever closes the bibliography,
    not resolved here.
