stage: translation-fixes
summary: >
  Closed the pt-PT gap opened by audit-fixes in content/i18n/pt-PT/franchises/jo-nesbo/
  only. i18n_coverage.py moved from 84/93 back to 85/93, jo-nesbo fully
  covered again, no regression on the eight pre-existing partial files
  belonging to other wings (agatha-christie, robert-jordan, stephen-king,
  terry-pratchett - unchanged). Three changes, all in works.yaml and
  franchise.yaml: (1) Rewrote rotteoya-og-andre-fortellinger's synopsis from
  scratch to translate the new base text (five near-future stories on
  power, lawlessness and surveillance: a walled skyscraper elite, a
  moonlighting killer-psychologist, a Pamplona bull-run love triangle, a
  memory-eraser) rather than patching the old one, which had claimed a
  non-existent 2021 English edition. The work's `note` field (also rewritten
  upstream) was left untranslated, per this wing's own established
  convention that `note` is inert in the app (lib/content/types.ts never
  reads it on Work) - consistent with every other entry in this file.
  (2) Added a fresh pt-PT synopsis for the new apocrypha work
  jo-nesbo/books-to-die-for (Nesbø's contributed essay on Jim Thompson's Pop.
  1280 in the Connolly & Burke anthology); its title is left in English since
  no Portuguese edition of this anthology exists, matching how the other ten
  editionless works on this wing keep their Norwegian originals. Updated the
  file's header comment to reflect the new 24-of-35 split (was 24-of-34) and
  named Books to Die For among the now-eleven editionless works, noting its
  fallback title is English rather than Norwegian. (3) Fixed
  franchise.yaml's description: "duas coletâneas de contos" -> "três
  coletâneas de contos", matching the base's "two" -> "three" short-story-collections
  fix. Politi's images-only change needed no translation action. Did not
  touch content/authors/jo-nesbo.yaml: its base bio still says "two
  short-story collections (2021)" (audit-fixes only touched works.yaml and
  franchise.yaml), so the pt-PT bio correctly still says "duas coletâneas" -
  translating faithfully means not silently fixing a base string nobody
  changed. validate.py --slug jo-nesbo is green but for the one pre-existing
  wing-audit.yaml word-count warning, which belongs to the audit-fixes stage's
  own handoff file, not to this stage.
produced:
  - content/i18n/pt-PT/franchises/jo-nesbo/works.yaml
  - content/i18n/pt-PT/franchises/jo-nesbo/franchise.yaml
forStages:
  - >
    editions: if a Portuguese edition of Books to Die For ever surfaces,
    the pt-PT works.yaml header comment and its editionless-work count need
    updating alongside editions.yaml, not just editions.yaml alone.
  - >
    wing-audit or a future audit pass: the pre-existing 741-word
    wing-audit.yaml warning (soft cap 700) was not this stage's to fix and
    is left exactly as validate.py reports it.
openQuestions:
  - >
    Register call worth a native check: "a ausência de lei" for "lawlessness"
    and "o encerro de Pamplona" for "the Pamplona bull run" (the Spanish loan
    word as used in Portuguese press, e.g. RTP/Público coverage of San
    Fermín) - both defensible, neither independently verified against a
    style guide.
  - >
    Not translated on purpose: rotteoya-og-andre-fortellinger's new `note`
    field. This matches the wing's standing rule that `note` never reaches
    the reader, but a future app change that starts rendering `note` would
    silently surface it in English here, same as every other work's note in
    this file.
