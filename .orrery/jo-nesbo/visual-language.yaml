stage: visual-language
summary: >
  Wrote the missing art: block on content/franchises/jo-nesbo/theme.yaml,
  clearing the wing's only validate.py error. Emblem: a ruled ledger page,
  columns straightedge-true, one row struck through, its entries unreadable
  pen-strokes rather than legible writing - resting on Nesbø's own pre-fiction
  decade as a financial analyst and stockbroker (Norwegian School of
  Economics, 1986), lived in parallel with fronting Di Derre until the
  Oslo-Sydney flight that produced Harry Hole (jo-nesbo/di-derre-memoir-
  declined-1997). The ledger stands for an appetite for imposed structure
  that produces both a serial killer's exacting method and Doktor Proktor's
  precisely calibrated, deranged inventions - one instrument covering both
  registers because one mind built them. Seven motifs mix Oslo interiors,
  the foreign hotel rooms the first cases open in (Sydney, Bangkok, later
  Hong Kong, Los Angeles), a child's workbench, boxed cold-case files and the
  Tom Johansen hoax, deliberately avoiding an incident-room case board
  (Tana French's own motif) and Midwest farmland (Gillian Flynn's). Line
  character alternates a genuinely ruled hand for structure with a genuinely
  freehand one for people and living things - distinct from Palahniuk's flat
  mechanical ruling pen, French's doubled dry-point scratch and Flynn's
  even-weight ballpoint. Atmosphere is flat, cold, deadpan daylight held
  constant from 1997 to 2026 on purpose, since eras.yaml records no eras to
  vary it against and the strands (crime and children's) run concurrently
  throughout. avoid names this wing's specific cliches: literal snow or
  blood as content (the cold is carried by palette alone, per the wing's
  existing notes), Nordic-noir paperback cover imagery, Norway-as-tourist-
  brochure iconography (bunad, stave churches, aurora, ski jumps), WWII
  uniform or a soldier's face (the frontkjemper history is drawn only as
  document or aftermath), twee cartoon styling for Doktor Proktor, graphic
  gore (Nesbø's own regretted "screaming blood" in Panserhjerte), and the
  disowned 2017 Snowman film's visual identity. Did not touch palette,
  preset, displayFace, signature or notes. validate.py --slug jo-nesbo now
  reports zero errors (previously one: the missing art: block); no new
  warnings. asset_audit.py jo-nesbo confirms art:yes and lists all 13
  currently-eligible jobs (4 life events, 9 franchise events).
produced:
  - content/franchises/jo-nesbo/theme.yaml (art: block added)
forStages:
  - >
    Any future prompt-writing for this wing (life-event, franchise-event,
    and eventually era-related work should eras.yaml ever change): quote
    motifs/atmosphere/lineCharacter/backgroundTexture/accentUse verbatim per
    VISUAL.md §5; the emblem's ledger page is already folded into motifs so
    it reaches prompts through that list, not by re-deriving it.
  - >
    A future press pass reopening the 2008-2011 dark run (flagged as open in
    press-dark-run.yaml) or adding new franchise events changes what gets
    illustrated, not this file - the art law covers whatever the bibliography
    already holds and needs no revisit purely for new events, only if the
    bibliography's registers themselves changed shape.
openQuestions:
  - >
    Least certain choice: leaning the emblem on the financial-analyst/
    stockbroker decade rather than on the frontkjemper family history or the
    Tom Johansen hoax. Both alternatives were considered and are carried
    instead as a motif (the hotel room) and a motif (the crossed-out
    parcel) plus an avoid entry (WWII uniform); the ledger was chosen because
    it is the one throughline that plausibly touches every register on the
    shelf, crime and children's alike, where the other two are crime-only or
    single-book anchors.
  - >
    Not settled here: whether the ruled-vs-freehand line contrast will read
    clearly at the small card size these assets render at (§ the block calls
    for small cards, not era plates). Worth a look once the first few life
    and franchise events are actually generated and placed side by side.
