stage: translation
summary: >
  Wrote the pt-PT overlay for the Jo Nesbø wing: content/i18n/pt-PT/franchises/jo-nesbo/{franchise,works,events,orders}.yaml
  and content/i18n/pt-PT/authors/jo-nesbo.yaml. Coverage moved from 80/93 to
  85/93 files fully covered (jo-nesbo's five files: franchise.yaml 9/9,
  works.yaml 34/34, events.yaml 18/18, orders.yaml 4/4, authors/jo-nesbo.yaml
  9/9); the eight pre-existing partial files on other wings are unchanged, so
  there is no regression. validate.py --slug jo-nesbo is green; the full
  catalogue-wide run shows the same 79 pre-existing warnings on other wings,
  none new. Of the 34 works, 24 carry a real published pt-PT edition
  (editions.yaml) and use it as inline [[work:...]] display text throughout
  every file (franchise description, all nine events, both orders, the
  author bio and its four lifeEvents); the other 10 (Nådeskudd, Det hvite
  hotellet, Karusellmusikk, Stemmer fra Balkan, all six Doktor Proktor
  titles) have no pt-PT edition and keep the Norwegian original everywhere,
  matching the tana-french precedent named in the brief. All six spoiler-audit
  rewrites (politi, torst, gjenferd, kongeriket, kongen-av-os, mere-blod) were
  translated from the base strings exactly as they now stand: Harry's status
  withheld in politi, his post-Politi employment withheld in torst, Oleg
  correctly translated as the accused (not a shooting victim) in gjenferd, no
  guilt or resolution assigned in kongeriket or kongen-av-os, and mere-blod's
  narrator identity left exactly as unresolved as the base leaves it. The
  rodstrupe-fathers-history-2000 event was translated without the cut
  identity-scheme clause. Direct quotations (Nesbø's own words, a critic's,
  Alfredson's) are left in the language they were actually given in - English
  quotes in English, the one Norwegian quote (Alfredson to NRK) with its
  English gloss both kept as in the base - per the house convention already
  used on gillian-flynn/events.yaml; only the surrounding narrative prose is
  translated. `note:` on works.yaml entries was deliberately NOT translated:
  grepping the app repo (lib/content/types.ts, the Work interface) shows the
  app never reads a work's `note` field at all, unlike lifeEvents/events/
  startHere paths where `note` does render - translating an inert field would
  cost effort for zero reader-facing change, and this is flagged for
  franchise-research/editions rather than silently padded. Verified against
  the rendered app, not just the coverage report: fetched the jo-nesbo/build
  branch content into the app's orrery-content submodule, added these five
  overlay files on top, ran `next dev` locally, and read /pt/f/jo-nesbo,
  /pt/author/jo-nesbo (redirects to the franchise page; its <meta
  description> already carries the translated bio), and /pt/f/jo-nesbo/start.
  Confirmed in the actual rendered HTML (not the RSC data payload): the
  translated franchise description, all 34 synopses, all 9 event titles and
  descriptions, both order names/rationales/debated entries (orders have no
  dedicated route - they render inline on the franchise page), all 4
  startHere paths, and that every [[work:...]] reference resolves to a real
  anchor using the correct edition title. The submodule and dev server were
  reverted/stopped afterward; no changes were left in the app repo.
produced:
  changedFiles:
    - content/i18n/pt-PT/franchises/jo-nesbo/franchise.yaml
    - content/i18n/pt-PT/franchises/jo-nesbo/works.yaml
    - content/i18n/pt-PT/franchises/jo-nesbo/events.yaml
    - content/i18n/pt-PT/franchises/jo-nesbo/orders.yaml
    - content/i18n/pt-PT/authors/jo-nesbo.yaml
forStages:
  - >
    wing-audit: eras.yaml ships `[]` and theme.yaml is not a translatable
    file per i18n_coverage.py's PROSE map, so neither needed an overlay -
    not a gap. `note:` fields on works.yaml were skipped as inert (see
    summary); worth a real app-side fix someday, not a content-layer one.
openQuestions:
  - >
    Base-language error found and left alone, per instructions: works.yaml's
    rotteoya-og-andre-fortellinger synopsis states it was "published in
    English the same year as Rat Island and Other Stories," but this wing's
    own editions.yaml (a later, more careful stage) found that edition does
    not exist anywhere checked - a real Wikipedia error the earlier synopsis
    inherited. Translated faithfully rather than silently corrected, since a
    translation overlay is not the place to fix base prose.
  - >
    Least confident register calls: (1) "não-ficção" with a hyphen -
    defensible and matches chuck-palahniuk's overlay, but Portuguese
    publishers are inconsistent about the AO90 hyphenation here. (2) Dropping
    the English parenthetical gloss "(Phantom)" after
    [[work:jo-nesbo/gjenferd|O Fantasma]] in the leopard-violence-regret
    event, since the real pt-PT title already carries that information and
    an English gloss next to it read redundant - the base keeps the gloss
    next to the Norwegian original for the same reason English readers need
    it, which does not apply once the display text is already the market's
    own title.
