stage: audit-fixes
summary: >
  Closed all four wing-audit findings in works.yaml and franchise.yaml only;
  editions.yaml untouched (separate worktree). (1) rotteoya's synopsis
  asserted a non-existent 2021 English edition. Verified: ISBN 2072946913 is
  Gallimard's 2024 French "Rat island" (Nesbø/Romand-Monnier) per Gallimard's
  own catalogue, Fnac and Amazon.fr, all in French; several retailer
  aggregators attach an English working title to that same French ISBN,
  almost certainly the source of English Wikipedia's "English, 2021" claim -
  no genuine English edition exists. Rewrote the synopsis to describe the
  book (five near-future stories on power, lawlessness and surveillance -
  skyscraper elites, a hitman-psychologist, a Pamplona love triangle, a
  memory-eraser), sourced from Aschehoug's and ARK.no's own retail copy,
  cross-checked against Salomonsson Agency; added a note on the correction.
  (2) Fetched the Politi cover directly: confirmed it reads "HARRY HOLE ER
  TILBAKE" over a bloodied, fingerwritten "POLITI" - Open Library's only
  Norwegian edition for this work, no alternate there. A clean 2017
  Aschehoug pocket cover exists at ark.no, but retailer jacket scans are a
  hard no per docs/SCHEMA.md, so it could not substitute. Removed the cover,
  documented what the image shows and why no replacement was used. (3)
  Verified Books to Die For (Connolly & Burke, eds., 2012) via Goodreads'
  own description, which lists "Jo Nesbø on Jim Thompson's Pop. 1280" -
  same sourcing standard as the Tana French wing's own entry for this
  anthology. Added as apocrypha/contributor, mirroring that entry's shape.
  Re-ran the editor axis: nothing further to add. Two weaker leads run down
  and left out, reasoned in the new Apocrypha comment: a March 2015
  Dagbladet "Tom Johansen" kidnapping mockumentary never shipped under any
  title (reads as a dead end of the already-recorded tom-johansen-scheme-2013
  hoax); and "Og derr! var sommeren i gang" (2001), Nesbø-credited and
  catalogued as a Book by the National Library of Norway, but contradicted
  by Aschehoug's and Norli's own pages for its later audio editions, which
  call the material "audio files, made for radio" - left for a future
  completeness pass, not added on one contradicted record. (4) Fixed "two
  short-story collections" to "three" in franchise.description. Checked
  every other count in that sentence: correct, and unaffected by the new
  apocrypha entry, which (per Tana French precedent) is not counted in the
  headline prose or the "thirty-four works" tally - the works.yaml header
  now names the apocrypha section separately. validate.py --slug jo-nesbo:
  green but for one pre-existing warning on wing-audit.yaml's own word
  count; zero new warnings introduced.
produced:
  - content/franchises/jo-nesbo/works.yaml
  - content/franchises/jo-nesbo/franchise.yaml
forStages:
  - >
    translation: three strings changed or added, none touched yet in
    content/i18n/pt-PT/franchises/jo-nesbo/ (which does exist, contrary to
    spoiler-audit's belief that no overlay existed yet). Re-translate in
    full: jo-nesbo/rotteoya-og-andre-fortellinger's synopsis (wholly new) and
    its new note; franchise.yaml's description ("duas coletâneas de contos"
    also needs to become "três"). Translate fresh: jo-nesbo/books-to-die-for
    (new work, no pt-PT entry exists). jo-nesbo/politi's synopsis and note
    are unchanged - only its images block changed, nothing for translation
    there.
  - >
    visual-metadata or a future asset pass: a clean, tagline-free 2017
    Aschehoug pocket cover for Politi is confirmed to exist at retail
    (ark.no, ISBN 9788203361906) but is not catalogued on Open Library under
    any edition. If it (or any other clean Norwegian Aschehoug edition)
    surfaces there later, Politi can get a real cover back without
    revisiting the spoiler question.
  - >
    completeness-auditor: "Og derr! var sommeren i gang" (2001) is an
    unresolved contradiction between a National Library Book record and the
    publisher's own audio-only framing, worth settling with a library holds
    check rather than web retail copy. The Tom Johansen kidnapping
    mockumentary lead is most likely closed (scrapped hoax extension, no
    title ever shipped) but not independently confirmed dead.
openQuestions:
  - >
    Least confident: the rotteoya synopsis's story-by-story detail comes
    from Aschehoug's and ARK's retail copy, not a library or agency primary
    source for every one of the five stories - solid for four, and the
    collection's throughline, but not independently verified story-by-story
    against a Norwegian review.
  - >
    Not settled here: whether "Og derr! var sommeren i gang" belongs in this
    bibliography at all. Genuinely contradictory sourcing (a national
    library Book record vs. the publisher's own "audio only" description of
    later editions of the same title) needs a holds check, not another web
    search, to close.
