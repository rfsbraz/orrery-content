stage: spoiler-audit
summary: >
  Audited all 34 works, 9 franchise events, 4 lifeEvents, 2 orders, 4 startHere
  paths and franchise.description against Aschehoug's own jacket copy, pulled
  per title and per edition (one page per format, and the blurbs differ
  materially between them). Zero spoilerAfter gates set: every finding was
  fixable by rewriting, and where a gate was considered it would itself have
  announced the secret. Six rewrites, all works.yaml synopses, plus one clause
  cut from an event. (1) politi - dropped "Harry's status - alive, missing, or worse -
  is itself held back from the reader at the start"; that announces the device
  and answers what Gjenferd's own jacket leaves open. Politi's jacket performs
  the withholding without naming it, which prose can copy but a gate cannot.
  (2) kongeriket - dropped "responsible for a string of monstrous acts keeps
  getting away with them"; Aschehoug assigns no guilt ("det tragiske dødsfallet")
  and settles no consequence ("hvor langt han er villig til å gå"). Rewritten to
  the jacket's own shape. (3) kongen-av-os - dropped "back into the kind of dirty
  work they thought they had left behind" and "technology that could finally
  prove their past crimes"; that is the sequel's publisher answering book one.
  (4) mere-blod - dropped "a drug courier's flight" and "Olav is not this book's
  narrator"; the jacket withholds the man deliberately ("han kaller seg Ulf") and
  naming who he is not points straight at how Blod på snø ends. Rewritten to the
  jacket. (5) torst - dropped "now teaching at the police academy", which is in
  no Tørst jacket and resolves the question Politi is built on; the jacket says
  only "tidligere etterforsker". (6) gjenferd - a plot correction, not a
  redaction: the synopsis had Oleg shot, all three jackets have Oleg accused.
  Event cut: rodstrupe-fathers-history-2000 lost "one of them building a nearly
  sixty-year identity scheme worthy of Houdini". No Aschehoug jacket in any
  edition mentions a false name or an identity swap, and that mechanism is the
  novel's solution. The frontkjempere thread and the father parallel both stay
  ungated - the older jacket names "norske frontkjempere" outright, so the
  premise reaches every reader and only the answer is gone. Checked and left
  alone: kakerlakkene-reprise-1998's child-prostitution plot device (the 2026
  jacket names "et pedofilinettverk" as the frame of the investigation - more
  disclosing than the event); blodmane's "drinking himself toward the end" (Kniv's
  own jacket opens "Harry Hole har mistet alt. Han har begynt å drikke igjen",
  so it reads back into nothing Kniv withholds); panserhjerte's Hong Kong exile
  and gjenferd's Oleg-as-son (verbatim jacket); marekors' "the colleague he
  trusts least" (the jacket names Tom Waaler and Harry's failed attempt to expose
  him as a murderer); blod-pa-sno and the one-quiet-book path (jacket, both
  variants); tom-johansen-scheme-2013 (publishing history, no plot); nadeskudd
  (unpublished, Nesbø's own press description); both orders and all four
  startHere paths (premise level, and the taste path points at a standalone, not
  mid-series). validate.py --slug jo-nesbo shows only the pre-existing
  theme.yaml art-block error.
produced:
  changedFiles:
    - content/franchises/jo-nesbo/works.yaml
    - content/franchises/jo-nesbo/events.yaml
  gatesSet: []
  gatesLoosened: []
forStages:
  - >
    translation: six work synopses were rewritten in full and must be
    re-translated from the new base string, not patched - jo-nesbo/politi,
    jo-nesbo/torst, jo-nesbo/gjenferd, jo-nesbo/kongeriket,
    jo-nesbo/kongen-av-os, jo-nesbo/mere-blod. One event description changed,
    jo-nesbo/rodstrupe-fathers-history-2000, by deletion of one clause only.
    No pt-PT overlay exists for this wing yet, so nothing is orphaned;
    translate what is in the files now, and do not restore detail from an
    English jacket or a plot summary while doing it - five of these six
    strings are shorter than their sources on purpose.
  - >
    editions: Aschehoug URLs for the six rewritten works are now in works.yaml
    sources and carry ISBNs and edition dates.
openQuestions:
  - >
    Least confident: torst. Removing Harry's employment is a light-touch
    precaution rather than a hard finding - the shelf already lists fourteen
    Harry Hole novels, so his survival past Politi is structurally visible
    whatever the synopsis says. Loosenable.
  - >
    Unresolved, stated plainly: this wing has no characters.yaml, the densest
    spoiler vector in a fourteen-book recurring-cast series. When one is
    written, Rakel Fauke, Oleg and Tom Waaler each need per-appearance
    boundaries, and the leak runs backwards through the series, not forwards.
