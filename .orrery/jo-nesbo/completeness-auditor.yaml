forStages:
  - >
    editions: the new work (D.D.S.Ø.I.F, 2010, Aschehoug) and all eight
    reworded synopses are ready to seed edition records; the agency URLs
    cited also carry English titles for several already-recorded works.
  - >
    translation: nine works plus franchise.yaml gained new or changed base
    prose (see changedProse) and need pt-PT coverage; nothing was removed or
    renamed, so no existing translation is orphaned.
  - >
    reading-orders: no published year moved, so the derived default order is
    unchanged by this pass; the new work slots into 2010 alongside Doktor
    Proktor og verdens undergang. Kanskje.
  - >
    press-archaeology: the shared "Fiskeren" antagonist across Blod på snø
    and Mere blod is a connections-worthy thread once characters.yaml exists.
openQuestions:
  - >
    Nådeskudd is announced with a firm street date (19 August 2026) but had
    not reached shops as of the sources checked. It is recorded here as
    canonTier: core with published: 2026, matching how this wing already
    treats forthcoming work, but whether an unreleased title belongs in a
    core bibliography before it actually publishes is a scope call, not a
    completeness one.
