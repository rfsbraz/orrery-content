stage: completeness-auditor
summary: >
  Audited the 33-work scaffold against primary Norwegian sources (nb.no
  legal-deposit catalogue, Norsk biografisk leksikon, Norwegian Wikipedia,
  and Nesbø's own literary agency, Salomonsson Agency). Added one missing
  work: Doktor Proktors sensasjonelle samling av dyr du skulle ønske ikke
  fantes (2010), a Doktor Proktor bestiary companion credited to Nesbø alone
  in library catalogue records (Deichman, tibi.no) and his agency's own
  bibliography, absent from both Wikipedias and NBL. The wing is now 34
  works. Filled seven missing synopses (det-hvite-hotellet,
  doktor-proktor-og-verdens-undergang-kanskje,
  doktor-proktor-og-det-store-gullroveriet, kan-doktor-proktor-redde-jula,
  natthuset, kongen-av-os, minnesota) plus the new work and Nådeskudd, all
  from Salomonsson Agency blurbs, a Norwegian publisher-linked retail page,
  or (Nådeskudd) Nesbø's own words to press. No `published` year changed:
  Blod på snø/Mere blod 2015 and Kan Doktor Proktor redde jula? 2016 were
  both re-verified independently (nb.no catalogue holds no 2014 or 2015
  edition respectively for either) and are now settled rather than
  single/conflict-sourced. Nådeskudd's 2026 stands but is now confirmed
  forthcoming (19 August 2026 street date, per VG's own retail coverage and
  BOK365/NTB), not yet released as of the sources checked - the single-source
  problem the scaffold flagged is closed, but the release-status question is
  new and is the curator's call (see openQuestions). Settled the Mere blod
  subseries question the scaffold left open: both Olav Johansen books share
  an antagonist ("Fiskeren," an Oslo drug baron) named as such in Norwegian
  reader coverage, and Norwegian press described the second book as the same
  "machouniverset" as the first - the grouping rests on that shared world
  now, not only on publisher packaging. Corrected a genuine miscount in
  franchise.yaml's prose (five further standalone crime novels, not four;
  Doktor Proktor is five novels plus a companion). Searched the editor axis
  deliberately: anthology and multi-author-collection searches (Norwegian and
  English), forewords/introductions, journalism, and picture books beyond
  Doktor Proktor turned up nothing further to add. Two candidates were
  checked and rejected: "De nye krimheltene" (a 2002 anthology edited by Nils
  Nordberg, featuring twelve other Norwegian crime writers' detectives, not
  Nesbø) and "Tre Jo Nesbø og et båtsportkart" (a 2014 collection by Ellen
  Mari Thelle whose chapter titles borrow other authors' names). Confirmed
  "Twelve" and "I Am Victor" are screen properties (a film story handed
  directly to a director; an NBC pilot synopsis), not print works under any
  title, closing that gap as a checked negative rather than an open one.
  validate.py --slug jo-nesbo is green apart from the pre-existing,
  out-of-scope theme.yaml art-block error.
