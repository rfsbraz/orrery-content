forStages:
  completeness-auditor: >
    28 works, all sourced primarily to English Wikipedia's works list plus
    per-work articles. FOUR specific things to settle, none of which this stage
    could close: (1) "Greener Pastures", a collection I could not confirm exists
    in any reachable source - zero OpenLibrary hits, absent from Wikipedia - it
    is either not real, self-published, or under another title. (2) "Unquiet
    Guests" (2025), an OpenLibrary work record (OL44547136W) with three
    unnamed authors, created December 2025 and carrying no metadata; if it is a
    Palahniuk anthology it is missing here. (3) Bait (2016) and Legacy (2017)
    are single-sourced on date. (4) Kindle-single-era short works (I could not
    verify whether "Phoenix" or "Cannibal" had standalone publication events).
    Also re-check my two graphic-novel dates: I moved Fight Club 2 from the
    commonly-listed 2015 to 2016 and kept Fight Club 3 at 2019 (serialisation
    complete) rather than 2020 (collection) - both change the derived order.
    Note the exclusion of "You Do Not Talk About Fight Club" (2008), which
    Wikipedia wrongly lists under his non-fiction; it is an essay collection
    ABOUT him edited by Read Mercer Schuchardt. Do not let it back in.
  press-archaeology: >
    The aura is thin on purpose (3 franchise + 5 life events) and there is
    known unexploited material. Highest-value gap: the 2018 reports that
    Palahniuk lost most of his book earnings to an alleged embezzlement by a
    bookkeeper at his literary agency. I could not reach a single primary
    source for it here (Publishers Weekly and Lit Hub both 404'd, and the web
    search budget was exhausted), and it concerns a living person's finances,
    which needs two independent sources. It is left OUT rather than guessed.
    Verify it and it is probably a high-impact entry. Other untouched threads:
    the Cacophony Society membership (real and sourced, but I found no date for
    when he joined, so it lives in the bio rather than as an undated event);
    the "Guts" classroom suspension case; the reception of Beautiful You and
    Adjustment Day; and Tom Spanbauer's death in 2024.
  world-events: >
    Probably run NOTHING. Palahniuk publishes 1996-2024, a span the catalogue
    already covers densely via King, and I appended nothing to global.yaml. The
    one candidate worth a thought is whether the 1999-2000 DVD-driven cult-film
    economy deserves a global entry, but it is recorded here as a franchise
    event because it is specifically about this book's readership.
  eras: >
    Three eras, and only the FIRST is sourced (a publishing fact: the pre-film
    W. W. Norton run). Eras 2 and 3 are marked provenance: none and both notes
    recommend curator review or merging. No published periodisation of
    Palahniuk exists - the academic literature (Kuhn/Rubin 2009, Sartain 2009,
    Collado-Rodriguez 2013, Keesey 2016, McCracken 2016) organises by novel and
    theme, not period. If you can find one, eras 2 and 3 should be re-cut to it
    or deleted. Current spans cover every work with no orphans, so any re-cut
    must preserve coverage of 1996-2024.
  reading-orders: >
    One order only (chuck-palahniuk/fight-club-sequence), and it is a thread
    filter identical to publication order for its three works, justified solely
    by Dark Horse's own numbering. I found NO author-recommended order and no
    community order with standing. If you cannot source a second order, one is
    the honest number; do not coin a "thematic" or "best-first" order. If the
    curator retiers the two comics to extended, this order should probably go
    with them.
  event-resonance: >
    franchise.yaml has NO globalEvents block at all - that ruling is yours.
    Lifetime gate is born 1962, so lady-chatterley-trial-1960 already drops.
    My reading, offered not applied: sept-11-2001 is a genuine candidate (he
    published Lullaby in 2002 and Survivor's hijacked-airliner frame acquired a
    different meaning after 2001, though the book predates it); booktok-2020 is
    a real one for this author specifically, since Fight Club has had a
    sustained second life with young readers on short-form video. The
    bookselling and paperback-boom entries look like noise here.
  where-to-start: >
    Four paths already written, each resting on a stated FACT rather than on a
    recommendation, because no source recommending a Palahniuk entry point was
    found. The comments in franchise.yaml flag this in the same terms as the
    audited King and Tordo files. If you find a real received recommendation,
    it should replace fight-club-first, which is the weakest of the four.
  spoiler-audit: >
    Nothing in this bundle carries a spoilerAfter, deliberately: no event or
    life event states a plot fact. The one real exposure to check is
    [[work:chuck-palahniuk/fight-club]]'s synopsis and the fight-club-film-1999
    event description, both of which circle the novel's famous reveal without
    stating it - re-read them adversarially, since synopses and event prose are
    ungated. Also check the Fight Club 2 synopsis ("something he thought was
    finished is being run again without him"), which is deliberately vague
    because a plainer sentence would spoil the first book's ending. There is no
    characters.yaml, so the usual roster leak (an `aka` that equates two
    identities) cannot happen here - that was part of the reason for leaving it
    out.
  visual-metadata: >
    ZERO images anywhere in this wing: no author portrait, no franchise header,
    no work covers. That is not an oversight, it is the whole slot left for
    you. All 28 works need covers considered. Palahniuk is anglophone and
    well-covered, so OpenLibrary coverage should be good, but pass
    ?default=false on ISBN lookups and open every image - the two colouring
    books (bait, legacy) and the two Dark Horse comics are the likeliest to
    return retailer scrapes or blanks.
  editions: >
    No editions.yaml. All 28 works need editions considered, and Portuguese
    (pt-PT) coverage matters for this repo's primary reader - Fight Club and
    Choke certainly have pt-PT editions. Watch the 978-85 / 978-65 Brazilian
    prefixes; Palahniuk is heavily published in pt-BR and OpenLibrary merges
    the two under one work record.
  translation: >
    Everything here is new and untranslated: 1 franchise description, 28
    synopses (11 of which also carry a `note`), 3 era titles + descriptions +
    notes, 3 event titles + descriptions, 5 life-event titles + descriptions, 1
    author bio, 1 order name + rationale + 2 debated strings, 4 startHere path
    titles + descriptions + 2 notes, and 4 achievement names + descriptions.
    Nothing exists for any locale.

openQuestions:
  - >
    SCOPE, the biggest one. Fight Club 2 and Fight Club 3 are tiered `core`
    rather than `extended`. They are graphic novels, which argues for extended
    (canonTier records the kind of publication), but they are Palahniuk's own
    sole-written direct sequels to the title work, which argues for core. I
    chose core because the sequel relationship dominates. The cost is real: a
    reader walking the core spine hits two comics between prose novels. If the
    curator flips them, the fight-club-sequence order and the
    chuck-palahniuk/the-whole-thread badge should probably go too.
  - >
    DATES that reorder the derived order. Fight Club 2 is recorded as 2016, not
    the commonly listed 2015: the ten-issue run finished 30 March 2016 and the
    collection followed 18 May 2016, so the complete work first appeared in
    2016 on either reading. Fight Club 3 is recorded as 2019 (serialisation
    complete 26 December 2019) rather than 2020 (collected 14 April 2020). Both
    are defensible and both move works in the default order.
  - >
    ERAS 2 and 3 are our own coinage and are flagged as such in the file. There
    is no published periodisation of Palahniuk to receive. A curator may prefer
    to merge them into one post-1999 era, or to delete both and ship the wing
    with a single sourced era covering 1996-1999 - which would orphan 25 works
    from era coverage and trip the validator warning for each. That tradeoff is
    the curator's, not this stage's.
  - >
    THE EMBEZZLEMENT. Reporting exists that Palahniuk lost most of his book
    earnings to an alleged embezzlement at his literary agency around 2018. It
    is omitted from this bundle because no primary source was reachable and it
    concerns a living person's finances, which the editorial standard says
    needs two independent sources. It is a gap, not a judgement that it is
    false, and it is probably the strongest missing aura entry.
  - >
    BIBLIOGRAPHY GAPS, unresolved: "Greener Pastures" (unconfirmed anywhere
    reachable), "Unquiet Guests" (2025, an unlabelled OpenLibrary record), and
    whether any Kindle-single-era short work had a standalone publication
    event. Each is left out rather than guessed.
  - >
    THE 2003 DISCLOSURE DATE. English Wikipedia's prose dates it 2004, but the
    Willamette Week report it cites is dated 30 September 2003 and describes
    the posts as having happened that week. I dated the life event 2003-09-30
    on the contemporaneous source over the encyclopedia summary. Worth a second
    pair of eyes.
  - >
    BURNT TONGUES CO-EDITORS. Richard Thomas and Dennis Widmyer are named in a
    `note` rather than in `withAuthorIds`, because neither has an author entity
    in this repo and creating two near-empty ones to hold a single anthology
    credit seemed worse than a prose note. If the curator wants the credit
    machine-readable, those two author files need creating.
