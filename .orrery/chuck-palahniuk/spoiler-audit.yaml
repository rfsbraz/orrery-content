stage: spoiler-audit
summary: >
  Twenty-eight synopses, three franchise events, five life events, four
  startHere paths, one order and three era descriptions read adversarially. Two
  real leaks found, both in ungated synopsis prose, both rewritten. Zero
  spoilerAfter boundaries before and zero after, which is a finding rather than
  an omission: nothing on this wing's eight gateable slots states a plot fact,
  and the two things that did sit in fields the engine cannot gate at all. The
  famous reveal was never in the file. Four defensive curator notes added so the
  next enrichment pass cannot restore what was cut.

boundaries:
  before: 0
  after: 0
  gateableSlots: 8      # 3 franchise events + 5 author lifeEvents
  charactersYaml: none  # connections deliberately off; no appearsIn surface
  note: >
    No boundary was set and none was loosened. Every gateable slot carries
    publication history or biography that states no plot fact. The one clause
    that looked like a candidate (Lullaby, on the father's-murder life event)
    turned out to be jacket copy - see rulingsAgainstFetchedCopy.

rewritten:
  - entity: chuck-palahniuk/adjustment-day
    field: synopsis
    severity: load-bearing
    was: >
      "A crowdsourced list decides who is to be removed, and the United States
      is partitioned into three states organised by identity."
    now: >
      "Politicians drift toward a war that would thin a generation of young men,
      a blue-black book of directives circulates, and a crowdsourced list
      decides who is to be removed."
    why: >
      The partition is the book's turn, not its premise, and Norton's own copy
      deliberately withholds it: it stops at "when Adjustment Day arrives, it
      fearlessly makes real the logical conclusion of every separatist fantasy",
      immediately after asking "are the directives in the Talbott book the
      secrets to surviving, or are they something else entirely?". A synopsis
      that answers the question the jacket leaves open is spoiling even when it
      states no death. Rewrite, not redact, because a synopsis cannot be gated.
    basis: fetched jacket copy (OpenLibrary OL19739254W)
    curatorNote: added

  - entity: chuck-palahniuk/invisible-monsters-remix
    field: synopsis
    severity: minor
    was: '"...plus new material and a different ending."'
    now: >
      "...plus new chapters of memoir and further scenes with the same
      characters."
    why: >
      The old clause told a reader of the 1999 novel that the book has an ending
      the author wanted changed. It states neither ending, so it is a nudge
      rather than a reveal, but it is a nudge at the one thing that novel spends
      itself buying and no publisher copy supported it. The replacement follows
      Palahniuk's own site and the Norton copy, so the entry is now both safer
      and better sourced. Cheapest possible fix; no reason not to take it.
    basis: fetched publisher copy (OpenLibrary OL16558149W, chuckpalahniuk.net)
    curatorNote: added

defensiveNotesAdded:
  - entity: chuck-palahniuk/fight-club
    why: >
      The highest-value artefact of this run. The reveal is in no field and must
      never enter one, and the note says so with both traps named: that Norton's
      jacket presents Tyler as a separate person (so the publisher test passes
      and this synopsis is deliberately more restrained still, naming neither
      man), and that Dark Horse's Fight Club 2 copy states the reveal outright
      and must not be pulled forward.
  - entity: chuck-palahniuk/fight-club-2
    why: >
      Records that the vagueness is deliberate, quotes the Dark Horse line that
      would destroy it, and states which parts of Dark Horse's copy WERE safe to
      keep and why. Without this, the next enrichment pass pulls the
      solicitation wholesale and ships the reveal.

rulingsAgainstFetchedCopy:
  - entity: "author lifeEvent palahniuk-father-murdered-1999"
    field: description
    ruling: "checked, jacket copy, left alone - and it overturned my instinct"
    detail: >
      The clause "a novel about a man who discovers he can kill people at will"
      read like a Lullaby spoiler, and the wing's own Lullaby synopsis is more
      coy than it ("learns what it does when read aloud"), which made it look
      like an internal inconsistency worth fixing. The Doubleday jacket settles
      it: "this song turns out to be lethal when spoken or even thought in
      anyone's direction - and once it lodges in Streator's brain, he finds
      himself becoming an involuntary serial killer". Premise, first act, and on
      the object the reader buys. Left alone. This is exactly the failure the
      skill warns nobody anticipates - ruling from memory that something is
      dangerous - and it would have cost a redaction over back-cover copy.
  - entity: chuck-palahniuk/fight-club
    ruling: "checked, not a spoiler"
    detail: >
      Norton: "comes under the thrall of Tyler Durden, an enigmatic young man
      who holds secret after-hours boxing matches in the basement of bars." The
      publisher presents them as two people; our synopsis names neither. Safe by
      a wide margin.
  - entity: chuck-palahniuk/invisible-monsters
    ruling: "checked, not a spoiler"
    detail: >
      Norton BOOK JACKET: "Enter Brandy Alexander, Queen Supreme, one operation
      away from becoming a real woman, who will teach her that reinventing
      yourself means erasing your past and making up something better." Our
      "a self-invented woman who is remaking her from the identity up" is a
      strict subset, and says nothing of who Brandy turns out to be. Mondadori's
      Italian copy goes further still ("niente e nessuno e mai quello che sembra
      a prima vista").
  - entity: chuck-palahniuk/survivor
    ruling: "checked, not a spoiler"
    detail: >
      Norton: "Tender Branson, the last surviving member of the Creedish death
      cult, has commandeered a Boeing 747, emptied of passengers, in order to
      tell his story to the plane's black box before it crashes." Ours matches
      and omits the crash. Also confirms the sept-11 resonance rationale in
      franchise.yaml states nothing beyond the jacket.
  - entity: chuck-palahniuk/rant
    ruling: "checked, not a spoiler - notably more restrained than the publisher"
    detail: >
      The jacket gives away the death outright ("Rant Casey will die a
      spectacular highway death") and the time travel ("he found a way to escape
      the prison house of linear time"). Our synopsis gives neither. No change,
      and no case for loosening.
  - entity: chuck-palahniuk/doomed
    ruling: "checked, not a spoiler"
    detail: >
      Ours ("stuck between worlds and blogging from purgatory") is less than the
      publisher's own ("the heroine of DAMNED, who escapes Hell and comes back
      to Earth").
  - entities: [choke, diary, snuff, pygmy, tell-all, damned, beautiful-you, the-invention-of-sound]
    ruling: "checked, not spoilers"
    detail: >
      Each synopsis is a strict subset of the fetched publisher description. In
      several cases dramatically so: the Tell-All and Beautiful You blurbs give
      away most of their plots and ours give a sentence of setup.
  - entity: chuck-palahniuk/fight-club-2
    ruling: "checked, correct as stage 1 left it, note added"
    detail: >
      Dark Horse's copy opens "Some imaginary friends never go away" and closes
      on "the return of Tyler Durden". That is the sequel's jacket spoiling the
      first book, which the publisher test explicitly does not license. The
      existing vague synopsis is right. What it keeps (decade gap, medication,
      wife and child) is Dark Horse's framing of THIS book's present and states
      nothing about how the novel ends.

rulingsOnOwnJudgement:
  reason: "no publisher copy reachable; WebSearch exhausted 200/200, fetch attempted and failed or returned nothing"
  rulings:
  - entities: [haunted, not-forever-but-for-now, shock-induction]
    ruling: "kept, judged safe on structure rather than against copy"
    detail: >
      No description exists on OpenLibrary for any of the three and no publisher
      page was reachable. Each synopsis states a setup and no outcome: writers
      sealed in a theatre competing over whose story is worst; two brothers
      raised into "the family trade"; students disappearing and a thing being
      sold to them as a way out. None names a death, an identity, a betrayal or
      an ending, so none can be load-bearing whatever the books do later. That
      is a structural argument, not a verified one, and it is the softest ground
      in this audit.
  - entity: "event fight-club-film-1999 + startHere path fight-club-first"
    ruling: "kept, both instances, deliberately"
    detail: >
      Stage 4 escalated this rather than deciding it alone, correctly. The claim
      is that the novel "ends differently" from the film. It discloses neither
      ending; it is a comparative fact about two texts. Three reasons to keep
      it. It is the documented central fact of how this author is read and the
      whole thesis of the event. It is the single most useful thing to tell this
      wing's dominant reader, who arrives from the film. And gating it would be
      theatre: startHere is ungated, so shielding the event would leave the
      identical claim shipping in the wizard while making the site look broken
      next to a back cover. Agreed with stage 4.

engineLimits:
  - >
    The sequels disclose that Fight Club's narrator lives. Titles, subseries,
    the derived publication order, the fight-club-sequence order and the
    fight-club-continues-in-comics-2015 event all carry it, and no field in this
    schema can hide a book's existence. Not fixable, recorded rather than
    papered over.
  - >
    Both real findings sat in `works[].synopsis`, which carries no boundary.
    Verified empirically rather than trusted: I added `spoilerAfter` to a work
    and ran the validator, which failed with "spoilerAfter is not honoured by
    the app here (only events, author lifeEvents and character appearances
    support it) - rewrite the prose instead", then reverted. The guard is real
    and I watched it fire before relying on it.

verified:
  validator: "green - 328 works, 18 authors, 20 characters, 11 achievements, all references resolve"
  warnings: >
    9, all pre-existing era-coverage warnings in Christie, Tordo, King and Wheel
    of Time. None in this wing, and none introduced.
  i18n: >
    52/58 files fully covered, before and after. This wing has no pt-PT overlay
    at all, so no rewrite could orphan a locale string and there was nothing to
    mirror. If an overlay is ever created it must be built from the CURRENT
    English, not from any cached copy.
  method: >
    WebSearch was exhausted for the session (200/200) and was not attempted.
    Publisher jacket copy was pulled by direct fetch of OpenLibrary work and
    edition records, which carry BOOK JACKET copy verbatim for most of this
    catalogue. Penguin Random House 404'd and W. W. Norton returned a page
    shell to automated fetches; Google Books API rate-limited at 429. Twenty
    titles were swept, sixteen returned publisher copy.

forStages:
  translation: >
    TRANSLATE THE REWRITTEN VERSION, NOT THE ORIGINAL. Two synopsis bodies
    changed after every earlier handoff was written:
      - chuck-palahniuk/adjustment-day (synopsis fully rewritten, and it gained
        a `note`)
      - chuck-palahniuk/invisible-monsters-remix (synopsis final clause replaced)
    Read both from the current works.yaml. Any cached or pre-translated copy of
    these two carries a spoiler that was removed on purpose, and translating it
    would reintroduce the leak in pt-PT while the English reads clean - which is
    the exact failure this stage runs before translation to prevent.
    Also note four `note` bodies changed or were added (fight-club,
    fight-club-2, adjustment-day, invisible-monsters-remix). `note` on a work is
    curator-only and never rendered, so it does NOT need translating - but do
    not let its presence confuse the string count. Scope is otherwise unchanged:
    the wing is 100% untranslated.
  wing-audit: >
    Zero boundaries in a wing whose author is famous for twist endings looks
    wrong at a glance and is not. The gateable surface here is three franchise
    events and five life events, all publication history and biography; there is
    no characters.yaml. The reveals live in synopses, which cannot be gated, so
    the protection is the absence of sentences and the four curator notes that
    keep them absent. Judge this wing on the notes, not on a boundary count.
  visual-metadata: >
    One thing in your lane. Fight Club 2's cover art and Dark Horse's product
    imagery carry the "some imaginary friends never go away" tagline in several
    editions. A cover is ungated prose with pictures. Check any FC2 image you
    select for that line before shipping it.
  editions: >
    Same warning as above, one layer down. Edition-level blurbs for the Fight
    Club sequels and for any post-film reissue of Fight Club itself routinely
    state the reveal. If editions.yaml ever carries descriptive text, it is
    ungated too.
  reading-orders: >
    Nothing changed. The fight-club-sequence rationale and both `debated`
    strings were read adversarially and state only that sequels exist, which the
    bibliography cannot hide anyway. No late-payoff telegraphing found.

openQuestions:
  - >
    THE WEAKEST DECISION, and it is the Haunted / Not Forever But For Now /
    Shock Induction trio. Three synopses cleared without a single line of
    publisher copy, on a structural argument that a sentence stating only a
    setup cannot spoil an ending. I believe that argument, but it is the one
    place in this audit where a book could turn out to have its reveal IN its
    setup and I would not know. Haunted is the one I would check first: it is a
    frame narrative, and "what the book turns out to be" is precisely the
    literary-fiction reveal category, so a frame described plainly is a
    different risk from a plot described plainly. A search-enabled run should
    pull Doubleday's Haunted copy and re-rule. If it disagrees with me the fix
    is a rewrite, not a gate.
  - >
    ADJUSTMENT DAY, stated as uncertainty so a curator can loosen it
    deliberately. I removed the partition clause on the reasoning that the
    jacket withholds it, but this is a satire whose conceit is arguably its
    selling point rather than its twist, and the partition occupies most of the
    book rather than arriving at the end. A curator who reads it as premise
    should restore a version of the clause, and I would not argue hard. I cut it
    because the jacket poses the question and our sentence answered it, which is
    the cleanest test available to me, and because the rewrite costs the reader
    almost nothing.
  - >
    NORTON AND PRH WERE NEVER REACHED. Every jacket ruling here rests on
    OpenLibrary's transcription of BOOK JACKET copy rather than on the
    publisher's live page. That transcription is explicitly labelled and has
    been accurate everywhere I could cross-check it, but it is one remove from
    the source and it is the thinnest point in this audit's evidence claim. A
    human with a browser closes it in ten minutes.
  - >
    THE LULLABY ASYMMETRY, left as found and flagged rather than fixed. The
    father's-murder life event states plainly what the Lullaby synopsis is coy
    about. Both are defensible (the life event matches the jacket; the synopsis
    is merely more restrained than the jacket, which harms nobody because no
    shield renders over a synopsis), but they are inconsistent with each other
    and a curator may want one voice. If they harmonise, harmonise TOWARD the
    jacket, not away from it.
  - >
    NO CHARACTERS.YAML is why the densest spoiler vector does not exist here,
    and stage 1 says that was partly deliberate: a roster entry for Fight Club
    would leak a reveal that `aka` and `description` have no way to gate. That
    reasoning is correct and I want it preserved. If a curator ever turns
    connections on and builds a roster, THIS is the decision that has to be
    re-audited first, and the Randall Flagg precedent in the skill is the exact
    shape of what would go wrong.
