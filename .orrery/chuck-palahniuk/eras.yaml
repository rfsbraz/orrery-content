openQuestions:
  - >
    franchise.yaml's closing comment still says "three eras (one sourced, two
    flagged unsourced)"; now five (three carrying provenance, two flagged
    none). Out of this stage's file footprint; whoever next touches
    franchise.yaml should refresh the sentence.
  - >
    Curator call: the two residue eras (after-the-film 2000-2001,
    after-the-trilogy 2006-2014) exist to keep every work inside an era while
    honouring the three sourced boundaries. The skill would also permit
    shipping them as gaps instead (works then render era-less). Kept as
    flagged bridges because the works in them are interior to an active
    career, which the skill says is a gap to close, not a legitimate orphan.
  - >
    Curator call: "The Horror Trilogy" era plate will greet Fugitives and
    Refugees and Stranger than Fiction (2003-2004 nonfiction). Disclosed in
