    - after-the-film        # title kept, description and note rewritten, period recut to 2000-2001
    - the-horror-trilogy    # NEW era, 2002-2005, provenance author
    - after-the-trilogy     # NEW era, 2006-2014, provenance none
    - from-2015             # description gained the author quote, note rewritten, provenance upgraded
