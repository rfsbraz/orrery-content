stage: completeness-auditor
summary: >
  28 works before, 28 after. No work added, none removed, no date changed. The
  bibliography stage 1 built survives the audit intact: every Palahniuk-authored
  BOOK in the reachable record is already present. Four of stage 1's five open
  bibliography questions are now closed, and the fifth (the anthology tail) is
  escalated to the curator with the evidence assembled. Changes are prose only:
  two single-sourced dates corroborated, two comics dates re-derived and their
  reasoning written down, and an artist-credit ruling recorded.

produced:
  newWorkIds: []
  removedWorkIds: []
  changedDates: []
  changedProse:
    - chuck-palahniuk/bait
    - chuck-palahniuk/legacy
    - chuck-palahniuk/fight-club-2
    - chuck-palahniuk/fight-club-3
    - "works.yaml header comment (audit record + the open anthology tail)"
  changedTiers: []
  changedRoles: []

verified:
  scope: >
    Swept the OpenLibrary author record OL24312A (75 works, sorted oldest and
    newest) and the English Wikipedia works list, and cross-checked the four
    disputed titles individually. Web search budget for the session was
    exhausted before this stage began, so everything here rests on direct
    fetches of OpenLibrary and Wikipedia. Say so to anyone who asks how deep
    this went.
  categoriesConfirmedComplete: >
    novels (18 plus Invisible Monsters Remix), short-story collections (Make
    Something Up, Bait; Haunted sits as a core novel by stage 1's judgement),
    nonfiction (Fugitives and Refugees, Stranger than Fiction), the writing
    guide (Consider This), colouring books (Bait, Legacy), graphic novels
    (Fight Club 2, Fight Club 3), edited anthology (Burnt Tongues).
  nothingAfter2024: >
    Verified negative, not assumed: an OpenLibrary sort=new sweep of OL24312A
    returns nothing by Palahniuk after Shock Induction (2024) except the Dead
    Ink anthology below, and the current Wikipedia article ends at the same
    book. chuckpalahniuk.net announces no forthcoming title. Simon & Schuster's
    author page 403s to automated fetches and was NOT checked - a human with a
    browser should close that one.
  burntTongues: >
    Checked as instructed and correct as recorded. apocrypha + authorRole
    editor + contributionTitle "The Power of Persisting: An Introduction" all
    match the record: Medallion Press, 12 August 2014, co-edited with Richard
    Thomas and Dennis Widmyer, Palahniuk wrote the introduction and contributed
    no story of his own. No change.
  datesReDerived:
    - work: chuck-palahniuk/fight-club-2
      value: 2016
      note: >
        Held at 2016, unchanged. Ten-issue Dark Horse run 27 May 2015 to
        30 March 2016; collection 18 May 2016. Both routes land in 2016.
    - work: chuck-palahniuk/fight-club-3
      value: 2019
      note: >
        Held at 2019, unchanged. Twelve-issue run 30 January to 26 December
        2019; collection 14 April 2020. The RULING, since it was asked for: a
        limited comics series carries the complete work verbatim across its
        issues, which is the positive statement of completeness the
        serialisation rule demands. That is the difference from an abridged
        prose serial. The run finishing is first publication; the collected
        hardcover is a reprint. If a curator overturns this, Fight Club 3 moves
        from 2019 to 2020 and would sit after The Invention of Sound and
        Consider This rather than before them.
  datesCorroborated:
    - work: chuck-palahniuk/bait
      note: >
        Was flagged single-sourced. OpenLibrary independently records the Dark
        Horse Comics edition at 2016 under the cover title "Off-Color Stories
        for You to Color". Date unchanged, flag removed.
    - work: chuck-palahniuk/legacy
      note: >
        Was flagged single-sourced. OpenLibrary independently records the Dark
        Horse Comics edition at 2017. Date unchanged, flag removed.
  eraCoverage: >
    No warning for this wing. The validator's nine era-coverage warnings are
    all in other franchises (Christie, Tordo, King, Wheel of Time). Palahniuk's
    three eras still cover 1996-2024 with no orphan, because no work was added.
    Nothing here for the eras agent to fix.
  translationDelta: >
    Zero structural change. The wing was and remains 100% untranslated (28
    works, 9 franchise strings, 6 era, 6 event, 2 order, 11 author). Four
    `note` bodies were rewritten, which matters only if the translation stage
    had already run, and it has not.

settled:
  greenerPastures: >
    Stays out. A direct OpenLibrary query for "Greener Pastures" Palahniuk
    returns zero results, matching stage 1's failure to find it anywhere. Not a
    Palahniuk book under that title. Stop looking.
  kindleSingles: >
    Stays out, and now for a positive reason rather than an unresolved one.
    "Phoenix" has no standalone record on OpenLibrary; it resolves into
    [[work:chuck-palahniuk/make-something-up|Make Something Up]]. That puts it
    under works.yaml's existing exclusion of individual stories inside a listed
    collection, the same rule that keeps "Guts" inside Haunted.
  youDoNotTalkAboutFightClub: >
    Still out, as stage 1 insisted. Nothing found contradicts it: it is
    Schuchardt's essay collection about Palahniuk. Did not let it back in.
  illustrators: >
    RULING, since it was asked for. An illustrator is NOT an author here, and
    Cameron Stewart, David Mack, Dave Stewart and Dave McCaig are not in
    withAuthorIds. Two reasons, and the second is the binding one: authorRole's
    enum is author|co-author|contributor|editor with no illustrator value, and
    withAuthorIds resolves against global author entities that do not exist in
    this repo. Creating four near-empty author files to hold art credits is the
    same trade stage 1 declined for the Burnt Tongues co-editors, so this is
    consistent with the wing's existing precedent rather than a new policy. The
    artists are named in prose on both comics instead.

forStages:
  visual-metadata: >
    Nothing changed for you. Still exactly 28 works needing covers, the same 28
    stage 1 listed, with the same warning about bait, legacy, fight-club-2 and
    fight-club-3 being the likeliest to return retailer scrapes or blanks. Two
    ISBNs surfaced during this audit that may save you a lookup: Fight Club 2
    collected hardcover 9781616559458, Fight Club 3 collected hardcover
    9781506711805. Both are the COLLECTION, not the work's first publication.
  editions: >
    Nothing changed for you either: the same 28 works. One concrete find,
    though. The Dark Horse collected hardcovers are editions, not works, and
    now that the comics dates are settled as 2016 and 2019 you should expect to
    record 2016-05-18 and 2020-04-14 editions against works dated 2016 and
    2019. An edition postdating its work by a year is correct here, not a bug -
    do not "fix" it back.
  spoiler-audit: >
    Unchanged surface: no new works, no new prose that states a plot fact. The
    four notes I rewrote are publication-history and credit prose only. Stage
    1's exposure list still stands as written.
  translation: >
    Unchanged scope, still the full wing. Re-read the notes on bait, legacy,
    fight-club-2 and fight-club-3 rather than any cached version, since all
    four changed after stage 1 wrote its handoff.
  reading-orders: >
    The derived publication order is UNCHANGED - no work added, no date moved.
    Your inputs are exactly what stage 1 described. The fight-club-sequence
    order still has its three works in the same positions.
  eras: >
    Nothing for you from this stage. Coverage of 1996-2024 is intact and
    unbroken, and eras.yaml was not touched. Stage 1's question about eras 2
    and 3 being our own coinage is still live and still the curator's.

openQuestions:
  - >
    THE ANTHOLOGY TAIL, and this is the one real decision left. Palahniuk has a
    tail of books that carry a contribution by him rather than a book by him. I
    did not add any of them, because the skill reserves multi-author-anthology
    scope for the curator and because the schema warns that the app treats
    canonTier as a display label only: an apocrypha entry still takes a
    numbered slot in the derived reading order. So adding nine of these would
    push nine non-Palahniuk books into the walk. It is ONE ruling covering the
    whole list, which is why I assembled it rather than deciding it piecemeal:
    "Unquiet Guests" (2025, Dead Ink, ed. Dan Coxon, 272pp, 9781917792073 -
    OpenLibrary links Palahniuk and Grady Hendrix to it), "Stories" (2010,
    Headline), "Chiral Mad 3" (2016), "It's Alive" (2018, Crystal Lake),
    "Expedition" (2015, Rare Bird), "Zombies", "Nightmare Magazine" October
    2015, and his introduction to Lidia Yuknavitch's The Chronology of Water.
    Each would be authorRole contributor + canonTier apocrypha. If the curator
    says yes, this is a second completeness pass, not a patch.
  - >
    UNQUIET GUESTS specifically, if the curator wants only one of the above.
    It is the strongest candidate and it closes stage 1's open question. It is
    confirmed real: an anthology edited by Dan Coxon, published by Dead Ink in
    2025, and Dead Ink's own site lists it. What is NOT confirmed is the title
    of Palahniuk's contribution, because the Dead Ink product page 404s to
    automated fetches. The attribution rests on OpenLibrary linking three
    authors to the work record, and the Palahniuk record it links is the
    DUPLICATE OL14057689A (two works) rather than the main OL24312A, which is
    weaker evidence than it first looks. Do not add it on my say-so without a
    contents list.
  - >
    PEOPLE, PLACES, THINGS (2021, Scribd Inc.). An OpenLibrary work stub,
    OL26823527W, attributed to the main Palahniuk author record but carrying no
    description, no subjects, no publication date and one edition. It has the
    same shape as the "Unquiet Guests" record stage 1 could not resolve. It
    could be a Scribd Original, which would be a genuine standalone digital
    publication and a real gap, or it could be a metadata artefact. I could not
    tell, and I would rather say so than guess it into the file. Needs one
    human with a Scribd search.
  - >
    THE COMICS TIER, still unresolved and still stage 1's question, not mine to
    close. Fight Club 2 and Fight Club 3 remain core. I left them there
    deliberately: the skill lists scope as the curator's call, and flipping
    them is a scope change, not a correction. Note the consequence has not gone
    away - a reader walking the core spine still meets two comics between prose
    novels, and if they flip to extended the fight-club-sequence order and the
    the-whole-thread badge should probably go with them.
  - >
    SIMON & SCHUSTER'S AUTHOR PAGE was not checked; it returns 403 to automated
    fetches. My "nothing published after Shock Induction" finding therefore
    rests on OpenLibrary plus Wikipedia plus his own site, three sources that
    agree, but not on his current publisher's own catalogue. That is the single
    thinnest point in this audit's coverage claim.
