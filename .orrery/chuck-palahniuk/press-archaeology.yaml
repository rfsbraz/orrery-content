stage: press-archaeology
summary: >
  Deferred second pass on the Palahniuk wing, run with a fresh search budget.
  Three facts survived the aura standard and one correction was made to an
  existing life event. lifeEvents 5 -> 7 (the 2018 Donadio & Olson
  embezzlement, med; the death of Tom Spanbauer, 2024-09-21, low). Franchise
  events 3 -> 4 (the 2021 Substack serialisation of Greener Pastures, med,
  industry). The correction: the father-murder entry now dates the killings to
  May 1999, dates the conviction to 2000, and records that the death sentence
  Palahniuk helped seek was set aside after Ring v. Arizona, with Shackelford
  resentenced in June 2011 to two consecutive life terms without parole - the
  received story stops at death row and is wrong from 2011 on. The Substack
  event also settles the completeness audit's "Greener Pastures" mystery: it
  was never a book, it was the 2021-2022 Substack serial that was cut down and
  published in 2024 as Shock Induction, in Palahniuk's own account.

produced:
  file1: content/authors/chuck-palahniuk.yaml
  file2: content/franchises/chuck-palahniuk/events.yaml
  newLifeEventIds:
    - palahniuk-agency-embezzlement-2018
    - palahniuk-spanbauer-dies-2024
  newEventIds:
    - greener-pastures-substack-2021
  changedProse:
    - palahniuk-father-murdered-1999
  changedDates: []
  sourcingTiers:
    palahniuk-agency-embezzlement-2018: >
      Court-record facts via Publishers Weekly sentencing report (2018-12) and
      Deadline-corroborated figures; Palahniuk's own account via Willamette
      Week (2018-06-01) and the Guardian piece syndicated by the
      Spokesman-Review (2018-06-01). Living-person finances, three independent
      outlets plus his own words. All three cited URLs were opened and read.
    palahniuk-spanbauer-dies-2024: >
      Willamette Week obituary (2024-09-24, full detail incl. cause and
      Palahniuk's newsletter announcement) plus NW Book Lovers (date and age
      confirmed). Subject deceased; both cited URLs opened.
    greener-pastures-substack-2021: >
      Publishers Weekly announcement (2021-09-20) for the deal, the 52-week
      format and the Hachette handback in Palahniuk's own quote; This Is
      Horror interview for Palahniuk's own account that the serial was the
      longer draft of Shock Induction. Both cited URLs opened.
    palahniuk-father-murdered-1999: >
      Spokesman-Review (2011-06-21) for the May 1999 recovery of the bodies,
      the 2000 conviction, Ring v. Arizona, and the 2011 resentencing to
      consecutive life terms. URL opened and added to the entry's sources.

forStages:
  spoiler-audit: >
    Three new prose blocks and one amended one, none carrying spoilerAfter.
    Judged safe: the Substack event describes publication mechanics only and
    names no plot of Shock Induction; the embezzlement and Spanbauer entries
    touch no book's content; the father-murder amendment adds only court
    outcomes to an entry that already existed. Worth a second pair of eyes on
    whether naming Greener Pastures as Shock Induction's draft discloses
    anything - my ruling was no, since the platform name is in the publisher's
    own copy and every review.
  translation: >
    pt-PT overlay now has gaps by design of this stage: the new franchise
    event (greener-pastures-substack-2021: title + description), two new
    lifeEvents (palahniuk-agency-embezzlement-2018,
    palahniuk-spanbauer-dies-2024: title + description), and one STALE
    translation - palahniuk-father-murdered-1999's description changed in
    English (May 1999 date, 2000 conviction, 2011 resentencing added), so its
    existing pt-PT description must be re-synced, not just kept.
    i18n_coverage.py now reports events.yaml 6/8 and authors 11/15 for pt-PT.

openQuestions:
  - >
    works.yaml's audit header says "Greener Pastures returns zero hits
    anywhere reachable... Treated as not existing under that title." That is
    now explained rather than open: it was the 2021-2022 Substack serial, cut
    down into Shock Induction (2024). works.yaml is outside this stage's
    footprint and other agents hold it; a later pass should update that header
    comment. My recommendation is that it stays a non-work (a superseded
    serial draft, like a magazine serialisation), with the event as its record.
  - >
    franchise.yaml's closing comment ("Stage 3 (press-archaeology...) never
    ran, so the aura ... remain as the first pass left them") is stale as of
    this run. franchise.yaml is outside this stage's footprint; wing-audit or
    the curator should refresh it.
  - >
    Whether the embezzlement demonstrably shaped Consider This (2020) or the
    publisher moves is left unstated on purpose: I found no source in which
    Palahniuk draws that line himself, so the entry stops at the sourced facts
    and lets the timeline do the implying. If a later interview surfaces where
    he says it directly, the entry can be sharpened.

rejected:
  - fact: "Fight Club won the 1997 Oregon Book Award and Pacific Northwest Booksellers Award"
    reason: awards trivia tier; recorded in the events.yaml header so nobody re-litigates
  - fact: "Haunted's brutal 2005 reception (savage reviews at publication)"
    reason: >
      the reception story that matters is already carried by the fainting-
      readings event; a clippings file is noise. Recorded in events.yaml header.
  - fact: "Details of the Shackelford trial beyond verdict and sentence"
    reason: distress is not content; only the outcomes that reach Lullaby survive
  - fact: "Palahniuk's 'man-crush' description of the embezzler, and other blog-post colour"
    reason: quotable but appetite, not aura; the sourced financial facts carry the event
  - fact: "The 2022 Chinese streaming edit of the film's ending"
    reason: re-confirmed stage 1's rejection; film distribution, no mark on the page
  - fact: "Substack free-tier 'Plot Spoiler' mechanics, student showcases, posting cadence"
    reason: platform trivia; only the serial that became a book changes the shelf
  - fact: "Reports of his mother's illness/death in the 2000s"
    reason: >
      not pursued to sourcing standard and no public statement by the author
      ties it to a book; private grief with no demonstrated mark on the page
      fails both the two-source rule and the admission test
