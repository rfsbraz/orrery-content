stage: event-resonance
summary: >
  Sixteen global events, six dropped by the lifetime gate (born 1962, living),
  ten ruled on. One kept, nine excluded, no include override. The wing renders
  exactly one borrowed world event: sept-11-2001.

produced:
  file: content/franchises/chuck-palahniuk/franchise.yaml
  block: globalEvents
  keptByDefault:
    - id: sept-11-2001
      resonance: >
        Two of his 1999 books were read differently from 2001 onward without a
        word of them changing: Survivor is narrated into the flight recorder of
        a hijacked airliner as it goes down, and the film made of his debut ends
        with towers coming apart. The event did not shape the writing; it
        permanently changed how the already-written page is met, which is what a
        reader arriving now actually needs told.
  excluded:
    - id: fantasy-paperback-boom-1965
      reason: not his category, shelf or readership; nothing inherited
    - id: carnation-revolution-1974
      reason: Portuguese censorship; no work here answers it
    - id: chain-bookshop-1982
      reason: the pre-film novels sold badly on exactly that table; the format shaped his sales, not his page
    - id: online-bookselling-1995
      reason: never out of print; the film carried the backlist, not catalogue search
    - id: ebook-and-self-publishing-2007
      reason: traditionally published throughout, and the completeness audit closed the Kindle-single question negative
    - id: financial-crisis-2008
      reason: no novel answers the crash; Adjustment Day is political collapse, not economic
    - id: prestige-fantasy-adaptation-2011
      reason: heavily adapted, but never a line of fantasy
    - id: covid-19-pandemic-2020
      reason: the two post-2020 novels do not reach for it; excluded rather than used as filler for a silent tail
    - id: booktok-2020
      reason: the second life with young readers runs through film and meme; no evidence of a reader-video effect specific to him
  includeOverrides: []
  droppedByLifetimeGate:
    - world-war-i-1914
    - world-war-ii-1939
    - pulp-magazines-1926
    - penguin-paperback-1935
    - armed-services-editions-1943
    - lady-chatterley-trial-1960

verified:
  method: >
    Repo-only. WebSearch was exhausted for the session before this stage began
    and no fetch was made, so every ruling rests on content/events/global.yaml,
    the wing's own works.yaml and authors file, and the two prior handoffs. Say
    so to anyone who asks how deep this went. The sept-11 resonance is grounded
    in this repo's own Survivor synopsis (hijacked airliner, flight recorder),
    not in outside recall.
  noGlobalYamlEdit: content/events/global.yaml was not touched.

forStages:
  where-to-start: >
    Nothing blocking. The one kept event sits in 2001, between the pre-film
    novels and the post-film run, which mildly supports a path built on the
    before-the-film shelf split.
  translation: >
    Zero new translatable strings. globalEvents carries ids and YAML comments
    only, and comments are not translated.
  wing-audit: >
    Nine exclusions and one keep. The two worth re-litigating are booktok-2020
    and covid-19-pandemic-2020, both excluded for want of evidence rather than
    for a positive finding; see openQuestions.
  spoiler-audit: >
    No prose added. The sept-11 rationale lives in a YAML comment and states no
    plot fact beyond what works.yaml already says about Survivor.

openQuestions:
  - >
    BOOKTOK, the weakest decision in this half. Stage 1 offered it as a genuine
    candidate and I overruled that, on the reasoning that Fight Club's sustained
    pull on young readers is film-clip and meme driven rather than reader-video
    driven. I could not test either reading this session: no search, no fetch of
    a source that would show Palahniuk sales or reissues moving with short-form
    video. It is excluded because the exclusion bar is low and the evidence for
    inclusion was absent, not because I found the link false. One good source
    showing a BookTok-driven Fight Club resurgence flips it.
  - >
    COVID. There is an argument I could not evidence and therefore did not use:
    Palahniuk is the one author in this catalogue whose reception is built on
    mass in-person readings (guts-fainting-readings-2003 is a franchise event
    here), and lockdown removed that instrument. If a curator can source what
    happened to his live-reading practice from 2020, that is a real resonance
    and this exclusion should be revisited.
  - >
    THE ASYMMETRY OF THE KEEP. sept-11-2001 is kept for reception rather than
    for composition: no Palahniuk book was written out of the attacks, two were
    re-read because of them. The aura standard asks whether an event passes
    through the author into the page, and this one runs the other way, from the
    world back onto a finished page. I judged that legitimate and worth stating
    plainly rather than dressing up as influence. A curator who reads the
    standard more narrowly would exclude it and leave the wing with no global
    events at all, which is a defensible outcome for this author.
