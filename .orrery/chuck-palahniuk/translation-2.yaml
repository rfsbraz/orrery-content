    The stephen-king eras overlay still carries no translated `themes`, so
    that wing's era plates show English theme chips under Portuguese titles
    (the exact failure the translation skill records). Out of this wing's
    work order, so not touched here; a small dedicated pass on
    content/i18n/pt-PT/franchises/stephen-king/eras.yaml would close it.
  - >
    Rendered-page verification was not possible from this environment (no
    running app instance in the worktree); the gate here is the coverage
    script, the validator, and the diff-level register checks. The skill's
    live-sweep of the wing in pt-PT (era plates, the two new lifeEvents, the
