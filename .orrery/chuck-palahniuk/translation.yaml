stage: translation
locale: pt-PT
summary: >
  The Palahniuk wing translated into European Portuguese from zero coverage to
  full. Six overlay files, 62 prose slots, no structure restated and no
  published title invented. Both synopses the spoiler audit rewrote were
  translated from the current works.yaml, so the pt-PT prose carries the cut
  rather than the leak. Coverage 52/58 before, 58/58 after, validator green
  with the same nine pre-existing era warnings and none in this wing.

coverage:
  before: "52/58 files fully covered"
  after: "58/58 files fully covered - complete"
  regression: none
  command: "python scripts/i18n_coverage.py"

filesWritten:
  - path: content/i18n/pt-PT/franchises/chuck-palahniuk/works.yaml
    slots: 28
    fields: [synopsis]
  - path: content/i18n/pt-PT/franchises/chuck-palahniuk/franchise.yaml
    slots: 9
    fields: [description, "startHere.paths[].title", "startHere.paths[].description"]
    alsoTranslated: ["startHere.paths[].note on fight-club-thread (prose, not counted by the script)"]
  - path: content/i18n/pt-PT/franchises/chuck-palahniuk/eras.yaml
    slots: 6
    fields: [title, description]
  - path: content/i18n/pt-PT/franchises/chuck-palahniuk/events.yaml
    slots: 6
    fields: [title, description]
  - path: content/i18n/pt-PT/franchises/chuck-palahniuk/orders.yaml
    slots: 2
    fields: [name, rationale]
    alsoTranslated: ["debated[] (both entries; prose, not counted by the script)"]
  - path: content/i18n/pt-PT/authors/chuck-palahniuk.yaml
    slots: 11
    fields: [bio, "lifeEvents[].title", "lifeEvents[].description"]

spoilerAuditRespected:
  confirmed: >
    Both rewritten synopses were read from the CURRENT
    content/franchises/chuck-palahniuk/works.yaml and translated from that text.
    No cached or pre-translated copy was used, and the pt-PT prose was grepped
    afterwards for the removed clauses to prove it.
  works:
    - id: chuck-palahniuk/adjustment-day
      note: >
        The partition clause is absent in Portuguese. The pt sentence stops
        where the jacket stops: "uma lista colaborativa decide quem ha de ser
        removido".
    - id: chuck-palahniuk/invisible-monsters-remix
      note: >
        The "different ending" clause is absent. Portuguese carries the
        replacement: "novos capitulos de memorias e outras cenas com as mesmas
        personagens".
  fightClub: >
    The Fight Club synopsis names neither man in Portuguese either, and the
    Fight Club 2 synopsis keeps its deliberate vagueness ("algo que julgava
    terminado esta a ser posto a andar outra vez sem ele"). Dark Horse's
    "some imaginary friends never go away" was not pulled in.
  notesNotTranslated: >
    The four curator `note` bodies on works are curator-only and never
    rendered, so they were not translated, as the handoff instructed.

titlesLeftInBaseLanguage:
  rule: >
    Work titles are never translated. Where a published pt-PT edition exists,
    its real title is used as inline-reference display text and in prose; where
    none exists, the English title stands.
  usedPublishedPtTitles:
    - "Fight Club -> Clube de Combate (Marcador 2016 / Noticias 1999)"
    - "Choke -> Asfixia (Noticias 2003)"
    - "Lullaby -> Lullaby cancao de embalar (Noticias 2004)"
    - "Invisible Monsters -> Monstros invisiveis (Casa das Letras 2006)"
    - "Diary -> Diario (Casa das Letras 2007)"
  leftInEnglish:
    - "Survivor, Haunted, Rant, Snuff, Pygmy, Tell-All, Damned, Doomed, Fight Club 2, Fight Club 3, Adjustment Day, Shock Induction, Consider This, Bait, Legacy, Beautiful You, Burnt Tongues, Make Something Up, Fugitives and Refugees, Stranger than Fiction, Invisible Monsters Remix, The Invention of Sound, Not Forever But For Now - no Portuguese edition exists, so the original title stands."
  properNounsKept:
    - "Project Mayhem and Cacophony Society kept in English: proper nouns from the novel and a real Portland organisation. The Portuguese edition's rendering of Project Mayhem could not be verified, and inventing one would be worse than leaving it."
    - '"Guts" kept in English: the story is referred to by that title in the event prose and has no verified published Portuguese title.'
    - "Pursuit of Happiness kept in English: a US compilation with no Portuguese edition."

registerCalls:
  - >
    Lullaby's published Portuguese title is recorded as "Lullaby cancao de
    embalar" - the BNP transcription, with no punctuation between the two
    parts, which the editions stage explicitly said not to tidy without seeing
    the jacket. It reads slightly awkwardly inside flowing prose. Used verbatim
    anyway, because the alternative is inventing punctuation into a published
    title.
  - >
    "hospice" was translated as "servico de cuidados paliativos", NOT
    "hospicio". In Portuguese "hospicio" is a psychiatric asylum, so the
    obvious cognate would have put Palahniuk in the wrong institution.
  - >
    "comic" is "banda desenhada" throughout, never "quadrinhos" (pt-BR). The
    files were grepped for the whole pt-BR discriminator list and for
    estar+gerund constructions; both came back empty.
  - >
    "rapariga" does not appear in this wing, so the pt-PT/pt-BR trap on that
    word did not arise here.

verified:
  validator: "green - 328 works, 18 authors, 20 characters, 11 achievements, all references resolve"
  warnings: "9, all pre-existing era-coverage warnings in Christie, Tordo, King and Wheel of Time. None in this wing, none introduced."
  guardProven: >
    The overlay-id guard was made to fail on purpose before being trusted: the
    choke overlay id was renamed to chuck-palahniuk/choke-BOGUS and the
    validator failed with "translation for unknown id
    'chuck-palahniuk/choke-BOGUS' (pt-PT)", then the file was restored and the
    validator returned to green. The guard is real and I watched it fire.
  notRendered: >
    STATED PLAINLY: I did not render and read the pages. The skill's
    verification section asks for a live sweep in the target locale with a
    quoted line from a rendered page, and this run was content-repo only on a
    feature branch with no deployment of this wing. Coverage and validation are
    shape evidence, not delivery evidence. The overlay merge for this wing has
    therefore NOT been observed reaching a reader.

openQuestions:
  - >
    THE WEAKEST DECISION, and it is The Invention of Sound. The English "A
    Hollywood sound engineer produces the industry's most convincing screams"
    is gender-neutral only by accident of English grammar; Portuguese forces a
    choice. I wrote "Uma engenheira de som", feminine, because the novel's
    sound engineer is Mitzi Ives and the masculine would have asserted
    something false. But this is the one place in the wing where the Portuguese
    states a fact the English withholds, and I decided it from knowledge of the
    novel rather than from any publisher copy, which is exactly the failure
    mode the spoiler audit warned about one stage earlier. It is not a spoiler
    by any reading I can construct, but it is an addition, and a curator who
    wants strict parity should rephrase it impersonally.
  - >
    NOT RENDERED, repeated here because it is a gap and not a formality. Trap 1
    in the translation skill is precisely a wing that passes every check and
    ships in English anyway, and the author lifeEvents shape was the file type
    it happened to. I followed the King exemplar's nested shape exactly, which
    is the shape the loader has always merged, so I expect this to be fine -
    but expecting is not seeing. Someone with the site running should open the
    pt-PT Palahniuk franchise page and the author page and quote a line back.
  - >
    "crowdsourced" became "uma lista colaborativa" in Adjustment Day. It is
    terse and it fits the flat register, but it loses the specific sense of a
    crowd voting. The fuller rendering was long enough to unbalance a
    two-line synopsis against its neighbours, so terseness won. Worth a native
    reviewer's eye.
  - >
    "demolition derby" became "corridas de destruicao" in Rant. There is no
    settled European Portuguese term; Portuguese coverage tends to keep the
    English. A native reviewer may prefer leaving it in English.
  - >
    The franchise startHere prose mentions Clube de Combate, Survivor and
    Monstros invisiveis in plain text without inline references, matching the
    base, which also uses plain text there. I did not add references the base
    does not have. If a later stage adds them to the English, this overlay
    needs the same edit in the same commit.
