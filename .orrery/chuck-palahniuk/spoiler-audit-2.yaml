    ruling: clean
    basis: >
      Court-record and financial biography only; names no book's content. The
      closing line gestures at the late shelf without stating anything any
      jacket withholds. spoilerAfter null is correct.
  - id: palahniuk-spanbauer-dies-2024
    file: content/authors/chuck-palahniuk.yaml
    ruling: clean
    basis: >
      Obituary fact plus a reading of Consider This, which is nonfiction craft
      writing with no plot to spoil. spoilerAfter null is correct.
  - id: palahniuk-father-murdered-1999
    file: content/authors/chuck-palahniuk.yaml
    ruling: clean
    basis: >
      The amendment adds only public court outcomes (May 1999 date, 2000
      conviction, Ring v. Arizona, the 2011 resentencing). The Lullaby framing
      it retains ("a man who discovers he can kill people at will") was ruled
      fine on the first pass and re-verified now against the Doubleday/Anchor
