stage: visual-metadata
summary: >
  26 covers on 28 works, one portrait, one header. Every URL was fetched and
  every image was opened and looked at, which is the only reason this run is
  honest: nine of the twenty-seven covers that passed every HTTP check were
  wrong in the pixels, and two works end up deliberately bare. No binary was
  committed, no prose was touched, and no credit was invented.

produced:
  portrait:
    file: content/authors/chuck-palahniuk.yaml
    image: "File:Chuck Palahniuk (21955) (cropped).jpg"
    url: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c7/Chuck_Palahniuk_%2821955%29_%28cropped%29.jpg/1280px-Chuck_Palahniuk_%2821955%29_%28cropped%29.jpg"
    credit: "Rhododendrites, CC BY-SA 4.0"
    source: "https://commons.wikimedia.org/wiki/File:Chuck_Palahniuk_(21955)_(cropped).jpg"
    licenceRead: >
      From the file's own extmetadata, not assumed: LicenseShortName CC BY-SA
      4.0, Artist Rhododendrites, AttributionRequired true, Restrictions empty
      (no personality flag), ImageDescription "Chuck Palahniuk / BookCon 2018 at
      the Javits Convention Center in New York City". Attribution field was
      empty, so the credit is composed from Artist plus licence as the skill
      directs. Original is 1780x2370; the URL is Wikimedia's own 1280px bucket
      taken verbatim from the API rather than hand-built.
    why: >
      Chosen from ten licensed candidates in Category:Chuck Palahniuk. It is the
      only one already framed tall and head-and-shoulders against a plain
      backdrop, and it is level rather than grinning at a convention camera,
      which suits a wing built as an instruction manual.

  header:
    file: content/franchises/chuck-palahniuk/franchise.yaml
    image: "File:Panorama of Willamette River Bridge and Downtown - Portland - Oregon - USA.jpg"
    url: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a2/Panorama_of_Willamette_River_Bridge_and_Downtown_-_Portland_-_Oregon_-_USA.jpg/1920px-Panorama_of_Willamette_River_Bridge_and_Downtown_-_Portland_-_Oregon_-_USA.jpg"
    credit: "Adam Jones, Ph.D., CC BY-SA 3.0"
    source: "https://commons.wikimedia.org/wiki/File:Panorama_of_Willamette_River_Bridge_and_Downtown_-_Portland_-_Oregon_-_USA.jpg"
    licenceRead: >
      extmetadata: LicenseShortName CC BY-SA 3.0, Artist "Adam Jones, Ph.D.",
      AttributionRequired true, Restrictions empty. Original 4912x1080.
    why: >
      Portland from the Willamette, looking downtown from under the Marquam
      Bridge with the Hawthorne Bridge at right. It is the city he has written
      out of for thirty years and the literal subject of Fugitives and Refugees,
      so it reads as the franchise rather than as one adaptation. A true 4.55:1
      panorama, so the app's horizontal crop has pixels to spare and the skyline
      sits in the middle band.

  coversApplied: 26
  worksTotal: 28
  uniqueCoverUrls: 26
  coverCredit: "Open Library on all 26, each coverSource pointing at the OL work record the id came from"

verified:
  method: >
    Direct curl of OpenLibrary and Wikimedia. WebSearch was exhausted for the
    session (200/200) before this stage began and was not attempted, so nothing
    here rests on a search result. Works were resolved by sweeping the author
    record OL24312A (73 works returned) rather than by title search, then each
    match checked against the edition list where it was not obvious.
  urlsFetched: >
    All 26 final cover URLs fetched with ?default=false: every one HTTP 200,
    content-type image/jpeg, 15KB to 100KB. All 26 OL work records fetched, all
    200. Both Commons image URLs and both Commons file-description pages
    fetched, all 200. 26 rows, 26 unique cover ids, 26 unique work ids - no
    image is repeated across works.
  imagesLookedAt: >
    ALL of them, on labelled contact sheets, in two passes. The first pass at
    thumbnail size caught six failures; a second pass at 480px tiles caught a
    seventh that was invisible at thumbnail size (the Choke price sticker). Both
    passes were necessary and I would not trust a single-pass audit again.
  validator: >
    Green. 328 works, 18 authors, 20 characters, 11 achievements, all references
    resolve. 9 warnings, all pre-existing era-coverage warnings in Christie,
    Tordo, King and Wheel of Time; none in this wing and none introduced.
  guardTestedNotAssumed: >
    I did not trust the validator's pass. I deleted one coverCredit and re-ran
    it, and it failed with "chuck-palahniuk/fight-club: image 'cover' has no
    'coverCredit'", then restored the file and confirmed green again. The
    credit rule is really enforced and I watched it fire.
  scopeDiscipline: >
    git diff on works.yaml is 130 insertions and ZERO deletions - only images
    blocks and comments. No synopsis, no note, no id, no externalIds, no
    sources, no date touched. editions.yaml was never opened or written; it
    belongs to the concurrent editions agent.

rejected:
  - work: chuck-palahniuk/choke
    id: 10925829
    reason: >
      RETAILER STICKER. A blue "UNIVERSITY BOOK STORE 1/2 PRICE USED" price tag
      is burned into the jacket. Invisible at contact-sheet thumbnail size and
      only caught on the second pass at 480px, which is the single most useful
      thing I learned this run. Replaced with 243825 (Anchor 2002), same design,
      clean.
  - work: chuck-palahniuk/rant
    id: 6748655
    reason: >
      Library-copy scan: a pale accession label in the lower-left corner, a
      visible spine edge down the left side, dust speckles. Right book, shabby
      object. Replaced with 242955 (Doubleday 2007), the same artwork clean.
  - work: chuck-palahniuk/rant
    id: 10318678
    reason: >
      Rejected outright rather than merely downgraded: the Vintage scan carries
      a "HALF PRICE BOOKS CLEARANCE" sticker with a scannable barcode across the
      top. That is a retailer mark, not a library one.
  - work: chuck-palahniuk/haunted
    id: 9035064
    reason: >
      WRONG LANGUAGE. The work-level cover OpenLibrary serves for Haunted is the
      Spanish "Fantasmas" (Mondadori). OL merges translations under one work
      record, so the representative cover is not necessarily the work's own
      language. Replaced with 242536, the English Doubleday jacket.
  - work: chuck-palahniuk/tell-all
    id: 7233777
    reason: >
      A BOSTON PUBLIC LIBRARY barcode sticker is burned across the top of the
      jacket. Replaced with 6401231 (Knopf Doubleday), clean.
  - work: chuck-palahniuk/adjustment-day
    id: 9254037
    reason: >
      Library barcode sticker burned into the upper-left of the jacket.
      Replaced with 8809284 (W. W. Norton 2019), clean.
  - works: [chuck-palahniuk/doomed, chuck-palahniuk/beautiful-you, chuck-palahniuk/burnt-tongues]
    ids: [7928992, 7927001, 12936667]
    reason: >
      NOT COVERS AT ALL. All three work-level images OpenLibrary serves are
      scans of the book's interior TITLE PAGE, not the jacket - plain
      typography, publisher imprint, no art. Burnt Tongues' also carries an
      "ELSIE QUIRK LIBRARY, 100 WEST DEARBORN ST, ENGLEWOOD, FL" ownership
      stamp. Every one of the three passes an HTTP check and a content-type
      check perfectly. Replaced with 9002240 (Anchor), 8950902 (Anchor) and
      14807509 (Turner) respectively.
  - work: chuck-palahniuk/choke
    id: 12290210
    reason: >
      WRONG ART FORM. The Vintage tie-in jacket is banded "NOW A MAJOR MOTION
      PICTURE". Rejected on the same principle the brief applies to Fight Club
      film imagery, and rejected for this wing specifically, whose theme.yaml is
      an explicit refusal of the film costume.
  - work: chuck-palahniuk/fight-club-2
    ids: [8827470, 15122094, 8908090, 10493930, 12863137]
    reason: >
      SPOILER IN THE PIXELS - see openQuestions, this is the run's real
      decision. Left bare.
  - work: chuck-palahniuk/bait
    ids: [12220750, 11426209]
    reason: >
      Turkish ("Zoka") and German ("Koder") jackets. Same original artwork, but
      the printed title is the translated one, so either would put a
      foreign-language jacket on an English work. Left bare.
  - subject: franchise header
    candidate: "Fight Club (1999) film imagery"
    reason: >
      Never sourced and never considered as a live option. It credits the wrong
      art form, and theme.yaml builds this whole wing as a refusal of the film's
      visual costume.

leftBare:
  - id: chuck-palahniuk/fight-club-2
    why: >
      All five available covers state the reveal of Fight Club. The Dark Horse
      trade and collected jackets print "SOME IMAGINARY FRIENDS / NEVER GO AWAY"
      tracked out across the face artwork; the Library Edition (8908090) is
      worse, two faces bleeding into one behind a "HELLO my name is TYLER"
      badge; the Bao edition prints the line in Italian. The only clean image
      (12863137) is an interior title page, not a jacket. Documented in place
      with a curator note offering 8827470 if the ruling goes the other way.
  - id: chuck-palahniuk/bait
    why: >
      No English cover exists to find, and that is a proven negative rather
      than a failed search: the sole English record OL21138051W has one edition
      and no cover, its ISBN 9781506703114 returns an honest 404 under
      ?default=false, and the full 73-work sweep of OL24312A surfaces only the
      Turkish and German jackets. Documented in place.

forStages:
  editions: >
    CORRECTED after the editions agent flagged it; my original wording here was
    misleading. (1) Fight Club 3's collected hardcover ISBN is 9781506711782,
    NOT the 9781506711805 the completeness auditor passed down. I had written
    that 9781506711805 "returns 404 so expect no coverUrl", which framed a
    nonexistent ISBN as a missing cover - right symptom, wrong diagnosis. The
    real position is better than I reported: 9781506711782 resolves to a cover
    BYTE-IDENTICAL (md5 b9a5825ef8313fa417b2269430239907) to the one I shipped
    for fight-club-3 via cover id 10156787, so both routes agree and the cover
    needs no change. (2) Fight Club 2's collected hardcover ISBN 9781616559458
    does resolve to a cover; that one was right as passed. (3) The English Bait
    edition ISBN is 9781506703114, Dark Horse 2016, and it has no cover
    anywhere - checked with ?default=false, an honest 404. (4) IMPORTANT,
    unchanged: if editions.yaml grows a coverUrl for any Fight Club 2 edition,
    it reintroduces the reveal this stage deliberately kept out of works.yaml.
    Same warning the spoiler audit gave me, passed one layer down. (5) The
    pt-BR trap checked against my set: none of my 26 coverSources points at
    OL34307280W (Clube da Luta) or OL30918903W (Sobrevivente); Fight Club and
    Survivor resolve to OL18941W and OL18939W, the English records.
  wing-audit: >
    Coverage is 26/28, which is high because Palahniuk is anglophone. Do not
    read the two gaps as thin sourcing: one is a spoiler refusal and one is a
    proven absence, both documented in place. The weakest thing here is the
    header, not the covers - see openQuestions.
  translation: >
    Nothing for you. Image URLs, credits and sources are not translatable
    strings, and every explanation I added is a YAML comment, which is not
    translated. The wing's string count is unchanged.
  spoiler-audit: >
    Your Fight Club 2 warning was correct and it fired. Every FC2 cover on
    OpenLibrary carries the tagline you named, in English or Italian, or shows
    it pictorially. I left the slot bare rather than ship it. Recording it here
    so a later visual pass does not "fix" the gap.

openQuestions:
  - >
    MY WEAKEST DECISION, and it is Fight Club 2. I left the slot empty on the
    reasoning that the jacket states the first novel's reveal and this wing's
    entire spoiler posture is the absence of that sentence. The honest
    counter-argument, which I could not dismiss: it is the real published cover.
    Every bookshop, every retail listing and the physical object itself carry
    it, the wing already discloses that a sequel exists (the title alone does
    that), and there is something precious about a museum refusing to show a
    book's actual face. I still think the cautious call is right, because "a
    sequel exists" and "Tyler was imaginary" are very different disclosures and
    only the first is unavoidable. But it is a judgement, not a rule, and a
    curator should rule on it explicitly. The id to use if the ruling goes the
    other way is 8827470.
  - >
    THE HEADER'S TONE. It is a bright blue-sky photograph pinned to a wing whose
    palette is deliberately cold near-black, and I know that is a compromise.
    The better tonal match by a wide margin is the public-domain HAER
    large-format survey of the Burnside Bridge - institutional black and white,
    exactly this wing's register, and free of attribution burden. I rejected it
    only because every HAER scan on Commons carries the black film-holder border
    and edge notches, the app crops blindly, and I cannot crop an image without
    committing a binary. If a curator can crop and host one, it is the better
    header and I would swap it.
  - >
    THE FIGHT CLUB 3 RECORD IS MISLABELLED and I did not fix it, because
    externalIds and prose are outside my remit. OpenLibrary work OL20846578W is
    titled "Fight club 3. Masterpiece gambit", which is not a real subtitle of
    that book, and it holds a single edition (ISBN 9781506711782). The COVER is
    unambiguously correct - I opened it: the English Dark Horse jacket, teddy
    bear pierced with arrows, credits Palahniuk, Cameron Stewart, Dave McCaig,
    Nate Piekos and David Mack. So the image is right and the record's title is
    junk. Worth an enrichment-bot fix, not a blocker.
    RESOLVED FURTHER by the editions agent: that single edition's ISBN
    9781506711782 is the CORRECT collected-hardcover ISBN, confirmed against
    Dark Horse's own product page and the Library of Congress. So OL20846578W is
    a real, correctly-identified edition record wearing a junk title - which is
    a smaller problem than I implied. The lesson I would keep is that I judged
    this record on its title and its cover and got the right answer, but only
    because I opened the image; the title alone would have argued for rejecting
    a record that was actually correct.
  - >
    I DID NOT RE-AUDIT THE 19 COVERS THAT PASSED BOTH PASSES at higher
    magnification than 480px. The Choke sticker was invisible at 300px and
    obvious at 480px, which tells me my detection threshold is resolution
    dependent and I do not know where the floor is. A third pass at full size
    could plausibly surface another small sticker or stamp I have called clean.
    I am reporting 26 verified because I did verify 26 by the standard I
    applied; I am not claiming that standard is exhaustive.
  - >
    THE HAUNTED CASE GENERALISES and someone should check the other wings for
    it. OpenLibrary's work-level cover_i for Haunted is a SPANISH jacket, even
    though the work record is the English novel and English editions with covers
    exist. Path A (the representative work cover) is therefore not
    language-safe, which the skill does not currently warn about - it warns
    about ISBN lookups crossing pt-BR into pt-PT, but this failure came through
    the work-level route instead. Any wing built with Path A alone may be
    carrying wrong-language jackets nobody looked at.
