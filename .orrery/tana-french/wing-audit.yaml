stage: wing-audit
summary: >
  Audited the finished wing against its own artefacts rather than its handoffs.
  Two claims broke under test. The bibliography is NOT ten works: French
  contributed a critical essay on Donna Tartt's The Secret History to Books to
  Die For (Connolly/Burke, 2012) and a piece to Down These Green Streets (Burke,
  Liberties Press, 2011). Both are contributions to books edited by others, so
  every source the completeness audit used - all organised by author-as-primary
  -creator - was structurally blind to them. The "no non-fiction, no anthology"
  claim is refuted; "no short fiction" survives, pending the Green Streets table
  of contents, which that book bills as "essays, interviews and short fictions".
  Second, the eleven bookreporter.com citations were recorded over http, which
  the host answers 520; https serves the page. That source carries the publisher
  synopses behind six works, both late detectives and the birthplace, so those
  facts rested on a citation that did not resolve. Fixed.
  Everything else held. Intruso/The Trespasser is confirmed outright by the
  Biblioteca Nacional de Portugal record for 9789897244155 ("Tit. orig.: The
  trespasser"), a stronger source than the synopsis inference it was built on;
  the same index confirms the five-title pt-PT list is complete. All 24 ISBNs
  pass check digit, all five pt-PT carry Portuguese prefixes. All 11 images
  fetched as real bytes and were looked at: correct titles, no watermarks, no
  library marks, Broken Harbour correctly carrying the Irish/UK spelling. Zero
  broken references in either locale. pt-PT is genuinely European.
produced:
  changedFiles:
    - content/authors/tana-french.yaml
    - content/franchises/tana-french/characters.yaml
    - content/franchises/tana-french/franchise.yaml
    - content/franchises/tana-french/works.yaml
    - content/franchises/tana-french/events.yaml
  mechanicalFixes:
    - "11 bookreporter.com citations http -> https (dead 520 -> live 200)."
    - "franchise.yaml capabilities note said 'No editions.yaml yet' and paired Intruso with The Witch Elm, the pairing editions.yaml disproved; rewritten to the shipped record."
    - "works.yaml and events.yaml comments naming tooling and a stage; collapsed to the data (CURATION section 2)."
    - "franchise.yaml description was missing an article in reader-facing prose."
  gates: "validate.py OK (493 works, 32 authors, 26 characters); i18n 80/88; same three known warnings."
forStages:
  completeness-auditor: >
    Add the two anthology contributions, or record them as deliberately out of
    scope with the reason. Resolve whether the Down These Green Streets piece is
    an essay or short fiction before cataloguing; that answer also settles the
    last standing "no short fiction" claim. Note the failure mode for future
    wings: author-indexed sources cannot see contributions filed under an
    editor's name.
  editions: >
    BNP names a translator for all five pt-PT editions; the file records only
    one and states no other source names one. Isabel Baptista (Desaparecidos,
    Sombras do Passado), Ana Figueira (A Semelhanca), Ana Lourenco (O Sitio
    Secreto, Intruso). Also: BNP dates Desaparecidos "imp. 2007" against the
    catalogue's 2008, and its A Semelhanca record carries a malformed ISBN that
    makes an ISBN-index lookup return nothing.
  visual-metadata: >
    OpenLibrary holds an author photo at a/id/7400645, user-uploaded with no
    licence, source or provenance. It is not usable, but it is freely
    downloadable from the host this wing already uses for all ten covers, so the
    portrait note should record it as checked and rejected rather than leave the
    slot silent. Tighten "no photograph" to "no freely licensed photograph":
    Getty, Alamy and her own site all carry rights-reserved shots.
  press-archaeology: >
    The dark run moved after event-resonance excluded the globals that were
    filling it. The handoff's "final dark run: 3 years (2013-2015)" is now 4
    years (2008-2011), and events.yaml's header still reasons from the old
    figure ("this wing's dark run sits after 2012"), which is now false. Under
    the 5-year threshold, so not a breach; the stale premise is the finding.
openQuestions:
  - >
    Curator's call: the Dublin cityscape header. Visual-metadata flagged it as
    its own weakest decision and I agree it is unresolved rather than wrong. The
    image is specifically the IFSC financial district, which suits the Celtic
    Tiger Squad books well and the rural Cal Hooper trilogy not at all.
  - >
    Curator's call: whether the two anthology essays belong in a wing whose
    stated shape is "all of them French's own prose fiction, all tiered core".
    Including them changes that framing; excluding them needs to be a recorded
    decision rather than an oversight, which is what it currently is.
