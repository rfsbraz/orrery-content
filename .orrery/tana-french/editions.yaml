  correctedClaims:
    - >
      franchise-research's editions lead paired "Intruso" (2020) with The
      Witch Elm (2018) on the assumption that Clube do Autor's two releases
      tracked her two most recent books in publication order. Intruso's own
      WOOK synopsis is The Trespasser's plot (a dead woman, no forced entry,
      a table set for a dinner that never happened, a detective who
      recognises her), confirmed by reading it against works.yaml rather
      than trusting the title/year proximity. The Witch Elm has no pt-PT
      edition recorded as a result.
rejected:
  - "No pt-PT edition for Broken Harbour, The Witch Elm, or the Cal Hooper trilogy: absent from WOOK's own author-page bibliography (archived copy checked, not truncated - idioma=PT surfaces exactly the five titles recorded)."
  - "No UK edition for The Witch Elm under its real UK title 'The Wych Elm': OpenLibrary splits it across two publisher names with no single ISBN carrying a reliable year."
  - "No Ireland/UK print edition for The Hunter or The Keeper beyond a UK ebook ISBN each; recorded as ebook rather than presented as print."
  - "No second entry for The Secret Place's Irish/UK ISBN cluster: OpenLibrary merges a Hachette Books Ireland and a Hodder & Stoughton ISBN into one edition record; recorded once, with a note, not as two editions."
openQuestions:
  - "Genuinely unresolved: whether Hachette Books Ireland's Irish edition of The Secret Place and its Hodder & Stoughton UK counterpart are two physically distinct print runs or one book cross-listed under both imprint names - OpenLibrary's own data merges them and no independent bookseller record was checked to split them apart."
  - "The Keeper's two ISBNs (US Viking, UK Viking Penguin) are sourced to Wikipedia's infobox alone; OpenLibrary has no record for the US one and the UK one has no second corroborating source beyond OpenLibrary itself. Worth a second check once the book has been out longer and picked up more catalogue coverage."
