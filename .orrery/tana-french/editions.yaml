stage: editions
summary: >
  Wrote content/franchises/tana-french/editions.yaml: 24 entries, 5 pt-PT
  over 5 of 10 works plus 19 English (US/Ireland/UK) over all 10. Ireland/UK
  first editions run Hodder & Stoughton (Britain) / Hodder Headline Ireland
  then Hachette Books Ireland (Ireland, one imprint renamed mid-run); US runs
  Viking throughout. Corrected a wrong prior lead: "Intruso" (Clube do Autor,
  2020) had been paired with The Witch Elm on title/year proximity, but its
  own WOOK synopsis (dead woman, no forced entry, a table set for a dinner
  that never happened, a detective who recognises her) is unmistakably The
  Trespasser's plot - "Intruso"/"Intruder" is in fact the closer literal
  rendering of the two. The Witch Elm has no pt-PT edition as a result.
  Portuguese coverage stops at 5/10 as a market fact: Livraria Civilização
  Editora ran DMS #1-3 in sequence (2008/2009/2011) then stopped; Clube do
  Autor picked up two later, non-consecutive titles (2015, 2020) and added
  nothing since. Broken Harbour, The Witch Elm and the Cal Hooper trilogy
  have never been published in Portuguese per WOOK's own catalogue. English
  coverage is fuller but not total: no Ireland/UK edition verified for The
  Searcher beyond its Penguin UK print ISBN (found), and only a UK ebook (not
  print) verified for The Hunter and The Keeper; a real UK "The Wych Elm"
  retitling exists but no single record gave it a firm year without
  contradicting another, so it is not recorded. Every ISBN's check digit was
  hand-verified; every pt-PT title was matched by synopsis, never by title
  or year alone. validate.py --slug tana-french: 0 new errors, 0 new
  warnings (2 pre-existing handoff-length warnings and the-witch-elm's
  era gap untouched, none this stage's to fix).
