stage: eras
summary: >
  Two eras, both received, with 2018 deliberately uncovered. The Dublin Murder
  Squad (2007-2016) stands on the publishing record: the six-novel series is
  stated by Wikipedia, carried as a series by Penguin, and used as a career
  phase by Kirkus ("After six intense books focusing on the Dublin Murder
  Squad"). No source names it a period of her career, so the era takes the
  series' own name and adds no framing. The Cal Hooper Trilogy (2020-2026)
  stands on the author: her site bills The Keeper as "the third and final book
  in the million-copy-bestselling Cal Hooper trilogy", and she calls it "my
  first completed trilogy" and the next book a standalone. The span is closed at
  2026, not left open, on that evidence. The Witch Elm (2018) sits outside both
  by design, reasoned in the file header. Searched in English only, the author's
  language. Britannica's biography refused the request twice (403); nothing
  cited depends on it. validate.py --slug tana-french: same single pre-existing
  error (theme.yaml missing art:), plus the intended 2018 gap warning.
produced:
  newEraIds:
    - dublin-murder-squad
    - cal-hooper-trilogy
  newProse:
    - "eras.yaml: 2 era titles, 2 descriptions, no pt-PT overlay yet"
  worksOutsideEveryEra:
    - "tana-french/the-witch-elm (2018): intended"
rejected:
  - "A 2018-2020 standalone era. Wikipedia states the grouping ('two standalone
    novels, The Witch Elm and The Searcher') but it no longer holds: The Searcher
    became book one of the trilogy, which French confirms ('No trilogy, although
    I said that with The Searcher'). The span would cut the trilogy in half."
  - "A one-book era around The Witch Elm. Every source defines that novel by what
    it is not. Nothing periodises 2018."
  - "A Celtic Tiger / recession era. Real theme, but every candidate span sits
    inside 2007-2016 and would overlap the Squad era, which is a bug regardless
    of sourcing. It lives in that era's themes and in event-resonance."
forStages:
  visual-language: >
    Two eras, tonally opposed, which is the wing's shape. The Dublin Murder Squad
    (2007-2016): urban, institutional, boom-and-crash Dublin, a different
    narrator each book, so plural and unsettled rather than one signature mood.
    The Cal Hooper Trilogy (2020-2026): the west of Ireland, Western tropes,
    harsh open landscape, a small community making its own law, rural decline.
    If the plates want one axis, it is city interior against open country. The
    Witch Elm has no era plate and renders bare; it is the hinge between the two
    and should not be styled as belonging to either.
  translation: >
    All prose here is new: 2 era titles and 2 descriptions, no pt-PT overlay for
    any of it. Kirkus is paraphrased; French's two quotes are verbatim, so
    translate the frame and keep the attribution intact.
  reading-orders: >
    Two spans plus one deliberate gap, matching the subseries structure rather
    than cutting across it: Squad 1-6, The Witch Elm alone, Cal Hooper 1-3.
    Publication order and era order are identical, so no boundary argues for a
    non-chronological path. Carry one subtlety: The Searcher was written as a
    standalone and absorbed into the trilogy afterwards.
  achievements: >
    No era_reader achievement exists here. If one is added the counts are 6 for
    dublin-murder-squad and 3 for cal-hooper-trilogy; The Witch Elm counts to
    neither.
openQuestions:
  - >
    Weakest call: the first era's provenance. Genuinely received as a series and
    used by reviewers as a phase, but no source periodises her career in those
    words, so it is publishing rather than critical. A critical retrospective
    naming the span would upgrade the rung without moving the boundaries. The
    Irish press (Irish Times, RTE) was not swept and is the likeliest home.
  - >
    The 2026 closure rests on a stated intention about unwritten books, and this
    one already reversed in the other direction when The Searcher stopped being a
    standalone. A fourth Cal Hooper novel would mean reopening the period rather
    than extending it.
