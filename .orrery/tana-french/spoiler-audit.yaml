stage: spoiler-audit
summary: >
  Audited every reader-facing string in the wing against the publisher copy for
  each book, not from memory. The wing's structural vector is real and confirmed
  on both ends: The Secret Place's jacket stops at Stephen Moran "has been
  waiting for his chance to join" the Murder Squad, while The Trespasser's opens
  "Being on the Murder squad is nothing like Detective Antoinette Conway dreamed
  it would be. Her partner, Stephen Moran..." - so the outcome book five is built
  around is absent from book five's jacket and present on book six's. Fixed by
  rewriting, not gating: characters.yaml described Moran from the end of the run
  ("the Murder Squad case that makes his name"), which is the leak; it now stops
  where his own book's jacket stops. No spoilerAfter was set anywhere. Set none
  deliberately: The Trespasser's ungated synopsis names Moran as Conway's partner
  because its own back cover does in its second sentence, so a gate on the
  character row would be defeated by prose rendering beside it - the Randall
  Flagg failure the skill names - while removing him from his own book's synopsis
  would shield what a reader meets in a bookshop. The line drawn instead: the
  wing states what each book's own jacket states and never narrates an earlier
  book's payoff. Three checks overturned an initial instinct. Rob Ryan's
  aka "Adam Ryan" reads like a twist identity and is verbatim publisher copy
  (Penguin's own description: "At the age of twelve, then known as Adam Ryan"),
  so it and his description stand untouched. The Hunter's and The Keeper's
  synopses match their own jackets ("his fiancee, Lena" is The Keeper's back
  cover) and are relationship continuity, not reveals. The Witch Elm event is
  milder than that book's jacket, which already says Toby must "face the
  possibility that his past may not be what he has always believed".
produced:
  changedFiles:
    - content/franchises/tana-french/characters.yaml
    - content/franchises/tana-french/works.yaml
    - content/franchises/tana-french/events.yaml
    - content/franchises/tana-french/franchise.yaml
  spoilerAftersSet: 0
  spoilerAftersLoosened: 0
  rewrittenNotGated: 6
forStages:
  translation: >
    EXACTLY SIX reader-facing strings changed; every other string in the wing is
    byte-identical to what earlier stages left. Translate from the CURRENT text
    only - three of these were changed because the old wording spoils, so
    carrying an older string into pt-PT reintroduces the spoiler in the locale.
    No pt-PT overlay exists for this wing yet, so nothing needed re-mirroring.
      1. characters.yaml, tana-french/stephen-moran, description (rewritten).
      2. characters.yaml, tana-french/rob-ryan, appearsIn[the-likeness].note
         (now "Mentioned briefly; does not appear.").
      3. characters.yaml, tana-french/frank-mackey,
         appearsIn[the-secret-place].note (career-status clause dropped).
      4. works.yaml, tana-french/the-searcher, synopsis: "A local boy" ->
         "A local kid", "his older brother's" -> "an older brother's". Keep the
         translation unnamed and ungendered; Portuguese forces a gender choice
         on "kid", so prefer a neutral noun over "rapaz"/"menino".
      5. events.yaml, french-hunter-trilogy-decision-2023, description: the
         French quote is now elided mid-quote. Keep the ellipsis and keep the
         quote attributed; do not restore the cut clause from the source
         interview, which describes where The Searcher ends.
      6. characters.yaml header comment (not translatable, listed for
         completeness).
    Work `note:` fields are curator-only and never rendered, so the two enlarged
    SPOILER CARE notes (the-secret-place, the-searcher) need no overlay - but
    read them before writing synopsis overlays, as they say what must stay out.
openQuestions:
  - >
    Least certain ruling, and the one to revisit first: setting no gate on
    Stephen Moran's appearance in The Trespasser. A curator who disagrees should
    know that tightening it requires ALSO rewriting The Trespasser's synopsis to
    drop Moran; gating the character row alone protects nothing, because the
    synopsis states the same fact ungated on the same page.
  - >
    Could not verify and therefore removed rather than corrected: characters.yaml
    claimed Frank Mackey is "Now a Murder Squad detective himself" in The Secret
    Place. Faithful Place's jacket has him "working as an undercover cop" and no
    source checked confirms a move to Murder. The claim was dropped rather than
    replaced, since asserting the opposite would be invention and, if true, would
    be a career-arc reveal of the same shape as Moran's.
  - >
    The app's spoiler engine could not be read from this repo (content only, no
    lib/spoilers/). The field table in SCHEMA.md was taken as authority.
