stage: visual-metadata
summary: >
  Covers 10/10, all Open Library, each fetched with ?default=false and looked
  at in a contact sheet before being written, and each work id cross-checked
  against a title+author search (edition_count and title) to rule out the
  omnibus and wrong-work traps this skill names. Nine resolve to the work's
  own Viking/Hachette/Penguin first or early edition; The Keeper's US edition
  is too recent for Open Library (a direct ISBN lookup 404s), so its UK
  Viking Penguin ebook edition is recorded, the only one with a cover. Two
  initial picks were rejected on sight and replaced: Faithful Place's Viking
  US ISBN resolved to a scan with a visible library barcode and checkout
  sticker, replaced with the Penguin US paperback (9780143119494), a clean
  scan of the same work; The Witch Elm's Open-Library-assigned representative
  cover resolved to the German "Der dunkle Garten" edition, lettered in
  German, replaced with the Viking US paperback (9781984877604), same work,
  correctly titled. Broken Harbour deliberately carries the Irish/UK Hachette
  Books Ireland cover, not the Viking US "Broken Harbor" jacket: it matches
  this work's own title exactly, per works.yaml's own TITLE NOTE. Portrait:
  none recorded. Wikidata (Q271423) carries no P18 image claim, the English,
  German and French Wikipedia articles carry no infobox image, and Wikimedia
  Commons holds no author photograph of her under an exact-title search, an
  "intitle" search, an author-plus-"writer" search, or her own (nonexistent)
  Commons category - the only hits were unrelated photographs captioned with
  quotes from her novels. Documented in the author file rather than left
  silent. Franchise header: a Dublin cityscape at sunset (the Liffey quays,
  the Custom House), Giuseppe Milo, CC BY 3.0, from his own 500px account via
  Wikimedia Commons - the city itself, where six of the ten works are set and
  where French has lived since 1990, rather than any one book's setting or
  the 2019 TV adaptation's look. validate.py --slug tana-french: same three
  pre-existing warnings as before this stage; no new errors. asset_audit.py
  tana-french: covers 0/10 -> 10/10, portrait 0/1 -> 0/1 (unchanged:
  documented absent, not filled).
produced:
  changedFiles:
    - content/franchises/tana-french/works.yaml
    - content/franchises/tana-french/franchise.yaml
    - content/authors/tana-french.yaml
  coverage: "10/10 covers, 0/1 portrait, 1/1 header"
  rejectedImages:
    - "Faithful Place's Viking US 2010 hardcover cover (OL id 8372218): a library-scan copy with a visible barcode and checkout sticker."
    - "The Witch Elm's OL-assigned work cover (id 9334087): the German 'Der dunkle Garten' edition, wrong-language jacket lettering."
    - "Broken Harbor's Viking US cover and its own work-level alternate: correct and clean, but the wrong market for a work titled 'Broken Harbour'."
forStages:
  translation: >
    No reader-facing prose changed. images fields (cover, header, portrait
    and their *Credit/*Source) are not translatable per SCHEMA.md, so no
    i18n follow-up. The new YAML comments explain cover swaps and the market
    choice; they are content-file comments, not prose.
  asset-generation: >
    Unrelated to this stage: theme.yaml's art block was already complete and
    is untouched. The 11 generated assets asset_audit.py lists are unchanged
    from visual-language's handoff.
openQuestions:
  - >
    Weakest call: the franchise header. No building or landscape is sourced
    as *the* place this wing belongs to; a Dublin skyline is a defensible
    generic choice, not one tied to an interview or record. A curator
    preferring the Cal Hooper trilogy's west-of-Ireland bogland instead (4 of
    10 works, her most recent writing) would have equal grounds - nothing in
    the record argues for one over the other.
  - >
    The Keeper's UK ebook cover is the only one Open Library holds; if its US
    Viking hardcover gets catalogued later (editions.yaml already expects
    this), its cover should be checked and would likely be preferred.
