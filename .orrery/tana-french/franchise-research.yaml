stage: franchise-research
summary: >
  Scaffolded a new wing from scratch: franchise.yaml, a 10-work bibliography
  (6 Dublin Murder Squad, 3 Cal Hooper trilogy, 1 standalone), the global
  author entity with 3 lifeEvents, a 6-character roster covering the
  Squad's recurring-detective handoffs, and theme.yaml (palette/face/
  signature, deliberately no art). validate.py --slug tana-french: 1 error
  (missing theme.art - out of this stage's scope, needs visual-language),
  0 warnings after fixing an initial contrast failure and 3 comment-policy
  hits.
