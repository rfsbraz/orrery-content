stage: visual-language
summary: >
  Wrote theme.yaml's art block, closing the wing's one blocking error
  (missing art:). Emblem: a single straight-backed chair alone under one
  bare bulb, grounded in two sourced facts read together - French's own
  stage-acting career through her twenties, and her account of sitting as
  the subject of a real interrogation while researching The Trespasser
  ("like flicking a switch"). No detective is ever drawn in it; the chair
  stands for the act of performing under pressure, not a scene. Motifs
  split the wing's two eras (ghost estates and incident rooms for Dublin
  Murder Squad; bogland, drystone walls and a lone farmhouse for Cal
  Hooper) plus one crossroads shop motif for the community-justice theme
  common to both. lineCharacter is a doubled, retraced incised line, tying
  the mark itself to the rotating-narrator structure and French's own
  "we're all unreliable narrators" line. accentUse ties the heather-violet
  accent to string, thread and moor heather, echoing the wing's own
  "thread" signature. avoid names seven cliches specific to this author:
  tourist-board Ireland (shamrocks, stout, tin whistle, leprechauns),
  thatched-cottage postcard Ireland, Celtic knotwork, literal Western
  costume, generic procedural shorthand (tape, chalk outlines, magnifying
  glass), Sherlock-adjacent gaslit fog, and the 2019 TV adaptation's own
  visual identity. validate.py --slug tana-french: the missing-art: error
  is gone; only the three pre-existing warnings remain (two overlong
  earlier handoffs, The Witch Elm outside every era). asset_audit.py
  tana-french now reports art:yes and lists 11 jobs (2 era plates, 3 life
  events, 6 franchise events).
produced:
  changedFiles:
    - content/franchises/tana-french/theme.yaml
  artFieldsWritten:
    - emblem
    - motifs
    - atmosphere
    - lineCharacter
    - backgroundTexture
    - accentUse
    - avoid
forStages:
  translation: >
    Nothing in the art block is reader-facing prose; it is read only by
    /asset-prompt, never by the app. No i18n follow-up. The two verbatim
    French quotes inside emblem.why ("like flicking a switch", "this
    concentrated, full-on, unstoppable force, locked on to me like a pit
    bull") already carry their attribution in events.yaml and the author
    entity; nothing here needs a parallel translation pass.
  asset-generation: >
    theme.art is complete and validate.py passes clean for this wing.
    asset_audit.py tana-french lists 11 jobs in priority order (era
    plates first, per docs/VISUAL.md workflow). The Dublin Murder Squad
    era plate and the Cal Hooper Trilogy era plate should be drawn first
    since they set the palette in practice and the wing's two registers
    (institutional Dublin vs. open bogland) are most visible there.
openQuestions:
  - >
    Weakest call: putting the chair-as-emblem grounding on two separate
    sourced events (the acting career, the 2016 interrogation research)
    rather than one clean origin. Both are individually well sourced in
    events.yaml and the author entity; reading them together as one
    object is this stage's own synthesis, not a claim either source makes
    jointly. A future curator could reasonably prefer a single-source
    emblem instead.
  - >
    The line-doubling rationale (retraced stroke = rotating narrators)
    is a formal metaphor, not a sourced fact the way the emblem's why is.
    It is offered as the load-bearing lineCharacter description because
    it is physically specific and follows the skill's instruction to
    name an instrument and a kind of imperfection; it does not rest on
    any interview or record the way the emblem does.
  - >
    Left for a future asset-generation pass to watch: the Witch Elm has
    no era to sit inside (confirmed again by validate.py's warning) and
    the art block's atmosphere section says it should render "plainer
    than either era" rather than borrowing either register wholesale.
    Whoever writes its life-event or cover prompt should re-read that
    paragraph rather than defaulting to whichever era plate was drawn
    most recently.
